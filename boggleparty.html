<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boggle Party</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2307030f' width='100' height='100' rx='20'/><rect x='12' y='12' width='76' height='76' rx='14' fill='%231d1140' stroke='%23ff2d78' stroke-width='4'/><text x='50' y='66' font-size='44' text-anchor='middle' fill='%23fff' font-family='sans-serif' font-weight='bold'>B!</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #07030f;
            --surface: rgba(26,16,48,0.72);
            --s2: rgba(40,26,74,0.85);
            --border: rgba(139,92,246,0.28);
            --text: #ffffff;
            --muted: #8f86b8;
            --pink: #ff2d78;
            --violet: #8b5cf6;
            --cyan: #22d3ee;
            --gold: #ffc93c;
            --accent: #ff2d78;
            --ag: rgba(255,45,120,0.25);
            --danger: #f43f5e;
            --dg: rgba(244,63,94,0.2);
            --success: #34d399;
        }


        
        html { height: 100%; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 14px 48px;
            overflow-x: hidden;
        }

        /* ── Animated aurora background ── */
        body::before {
            content: '';
            position: fixed; inset: -25%;
            z-index: -3;
            background:
                radial-gradient(ellipse 60% 50% at 20% 15%, rgba(255,45,120,0.16) 0%, transparent 60%),
                radial-gradient(ellipse 55% 45% at 82% 85%, rgba(34,211,238,0.13) 0%, transparent 60%),
                radial-gradient(ellipse 45% 55% at 75% 18%, rgba(139,92,246,0.16) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 15% 80%, rgba(255,201,60,0.07) 0%, transparent 60%);
            animation: aurora 20s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes aurora {
            0%   { transform: translate3d(-2%,-1%,0) scale(1) ;   filter: hue-rotate(0deg); }
            100% { transform: translate3d(2%,2%,0)  scale(1.12);  filter: hue-rotate(45deg); }
        }
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: -2;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1.5px);
            background-size: 28px 28px;
            mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 75%);
            pointer-events: none;
        }

        /* ── Floating letter field ── */
        #letterfield { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        #letterfield span {
            position: absolute; bottom: -8vh;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            color: rgba(139,92,246,0.14);
            animation: letterDrift linear infinite;
            will-change: transform;
        }
        @keyframes letterDrift {
            0%   { transform: translateY(0) rotate(-8deg); opacity: 0; }
            8%   { opacity: 1; }
            92%  { opacity: 1; }
            100% { transform: translateY(-118vh) rotate(14deg); opacity: 0; }
        }

        #app { width: 100%; max-width: 480px; position: relative; }

        /* ── Audio toggles ── */
        .audio-togs { position: fixed; top: 12px; right: 12px; z-index: 1000; display: flex; gap: 8px; }
        .audio-togs button {
            background: var(--s2); border: 1px solid var(--border); color: var(--text);
            border-radius: 10px; width: 40px; height: 40px; font-size: 1.15rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s; -webkit-tap-highlight-color: transparent;
        }
        .audio-togs button:hover { border-color: var(--pink); }
        .audio-togs button.off { opacity: .35; filter: grayscale(1); }

        /* ── Header ── */
        .hdr { text-align: center; margin-bottom: 18px; padding-top: 4px; }
        .hdr h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 6.5vw, 2.2rem);
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #ff2d78, #8b5cf6, #22d3ee, #ff2d78);
            background-size: 300% 100%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradShift 7s linear infinite;
            filter: drop-shadow(0 0 18px rgba(255,45,120,0.35));
        }
        @keyframes gradShift { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        .hdr .sub { color: var(--muted); font-size: 0.68rem; letter-spacing: 3px; margin-top: 5px; text-transform: uppercase; }

        /* ── Card (glass) ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 10px 32px rgba(0,0,0,0.4);
            animation: cardIn .3s cubic-bezier(.22,1.2,.36,1) both;
        }
        .card.highlight { border-color: rgba(255,45,120,0.55); box-shadow: 0 0 0 1px rgba(255,45,120,0.4), 0 0 30px rgba(255,45,120,0.18), 0 10px 32px rgba(0,0,0,0.4); }
        @keyframes cardIn { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* ── Buttons ── */
        .btn {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700; font-size: .875rem; letter-spacing: 1px;
            padding: 13px 20px; border-radius: 12px; border: none;
            cursor: pointer; transition: all .15s ease;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            -webkit-tap-highlight-color: transparent;
            position: relative; overflow: hidden;
        }
        .btn:active { transform: scale(.96); }
        .btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
        .btn-full { width: 100%; }
        .btn-p {
            background: linear-gradient(120deg, var(--pink), #c026d3);
            color: #fff; box-shadow: 0 6px 20px rgba(255,45,120,0.4);
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .btn-p::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.35) 50%, transparent 75%);
            background-size: 250% 100%; background-position: 130% 0;
            transition: background-position .5s;
        }
        .btn-p:not(:disabled):hover::after { background-position: -30% 0; }
        .btn-p:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(255,45,120,0.55); }
        .btn-c {
            background: linear-gradient(120deg, var(--cyan), #3b82f6);
            color: #041018; box-shadow: 0 6px 20px rgba(34,211,238,0.35);
        }
        .btn-c:not(:disabled):hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn-d { background: var(--danger); color: #fff; box-shadow: 0 4px 14px var(--dg); }
        .btn-g { background: rgba(255,255,255,0.03); color: var(--text); border: 1px solid var(--border); }
        .btn-g:not(:disabled):hover { border-color: var(--pink); color: var(--pink); }
        .btn-sm { padding: 8px 14px; font-size: .78rem; border-radius: 9px; }

        /* ── Inputs ── */
        .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .fg label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
        .fg input {
            background: rgba(10,6,24,0.6); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 14px; color: var(--text);
            font-family: 'JetBrains Mono', monospace; font-size: .95rem;
            outline: none; transition: border-color .15s, box-shadow .15s;
            -webkit-appearance: none; appearance: none;
        }
        .fg input:focus { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(255,45,120,0.15); }
        .fg input::placeholder { color: var(--muted); }

        /* ── Segmented option buttons ── */
        .seg { display: flex; gap: 8px; flex-wrap: wrap; }
        .seg .btn { flex: 1; min-width: 52px; }

        /* ── Room code + QR ── */
        .room-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.3rem; font-weight: 900; letter-spacing: 10px;
            text-align: center;
            background: linear-gradient(90deg, var(--pink), var(--violet), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            padding: 14px 10px 10px; margin: 4px 0;
            filter: drop-shadow(0 0 14px rgba(255,45,120,0.4));
        }
        .qr-wrap { display: flex; justify-content: center; margin: 10px 0 14px; }
        .qr-wrap svg { width: 158px; height: 158px; border-radius: 12px; box-shadow: 0 0 0 5px #fff, 0 0 26px rgba(139,92,246,0.5); }
        .share-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }

        /* ── Player list ── */
        .player-list { display: flex; flex-direction: column; gap: 7px; margin: 10px 0; }
        .player-row {
            display: flex; align-items: center; gap: 10px; padding: 10px 13px;
            background: var(--s2); border-radius: 10px; border: 1px solid var(--border);
            font-size: .85rem; animation: cardIn .25s both;
        }
        .player-row .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); flex-shrink: 0; }
        .player-row.host-row { border-color: rgba(255,45,120,.45); }
        .player-row .pav {
            width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: .8rem; color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,.4);
        }

        /* ── Misc ── */
        .slbl { font-size: .66rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .status { text-align: center; padding: 10px; border-radius: 10px; font-size: .82rem; color: var(--muted); background: var(--s2); border: 1px solid var(--border); margin-bottom: 14px; }
        hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
        .err { color: #fff; font-size: .78rem; padding: 10px 12px; background: var(--dg); border: 1px solid var(--danger); border-radius: 10px; margin-top: 8px; }
        .spin { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--pink); border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .connecting { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 30px 20px; color: var(--muted); }

        /* ══════════════════════════════════════
           GAME SCREEN (phone)
        ══════════════════════════════════════ */
        .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 42px; margin-bottom: 10px; }
        .timer-ring { position: relative; width: 62px; height: 62px; flex-shrink: 0; }
        .timer-ring svg { transform: rotate(-90deg); }
        .timer-ring .tr-bg { fill: none; stroke: var(--s2); stroke-width: 5; }
        .timer-ring .tr-fg { fill: none; stroke: var(--cyan); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke .5s; filter: drop-shadow(0 0 5px currentColor); }
        .timer-ring.warn .tr-fg { stroke: var(--gold); }
        .timer-ring.urgent .tr-fg { stroke: var(--pink); }
        .timer-ring .tr-txt {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: .82rem;
        }
        .timer-ring.urgent .tr-txt { color: var(--pink); animation: urgentPulse .5s ease-in-out infinite alternate; }
        @keyframes urgentPulse { from { transform: scale(1); } to { transform: scale(1.18); } }
        .round-badge { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        .round-badge b { display: block; font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--text); letter-spacing: 1px; }
        .my-score { text-align: right; }
        .my-score .ms-val { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.3rem;
            background: linear-gradient(90deg, var(--gold), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .my-score .ms-lbl { font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

        /* Score strip (opponents) */
        .score-strip { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 8px; scrollbar-width: none; }
        .score-strip::-webkit-scrollbar { display: none; }
        .score-chip {
            flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
            padding: 6px 12px; border-radius: 10px; background: var(--s2);
            border: 1px solid var(--border); min-width: 68px;
        }
        .score-chip.you { border-color: rgba(255,45,120,.55); box-shadow: 0 0 10px rgba(255,45,120,.15); }
        .score-chip .sc-name { font-size: .62rem; color: var(--muted); max-width: 76px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .score-chip .sc-score { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: .92rem; }
        .score-chip .sc-words { font-size: .58rem; color: var(--muted); }

        /* ── Board ── */
        .board-wrap { position: relative; margin-bottom: 10px; border-radius: 18px; }
        .board-wrap.dizzy { animation: dizzySpin 5s cubic-bezier(.45,.05,.55,.95) both; }
        @keyframes dizzySpin {
            0% { transform: rotate(0); } 12% { transform: rotate(-16deg); } 26% { transform: rotate(14deg); }
            42% { transform: rotate(-190deg); } 58% { transform: rotate(-170deg); }
            72% { transform: rotate(-372deg); } 84% { transform: rotate(-354deg); } 100% { transform: rotate(-360deg); }
        }
        .board-wrap.shake { animation: boardShake .4s ease-in-out; }
        @keyframes boardShake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-9px); } 40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); } 80% { transform: translateX(4px); }
        }
        .board-grid {
            display: grid;
            grid-template-columns: repeat(var(--n, 4), 1fr);
            gap: 8px;
            touch-action: none;
            position: relative; z-index: 1;
        }
        .tile {
            position: relative; aspect-ratio: 1; border-radius: 18%;
            background: linear-gradient(150deg, #33205c 0%, #1d1140 55%, #150b30 100%);
            border: 1px solid rgba(139,92,246,0.42);
            box-shadow: 0 8px 18px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.16), inset 0 -8px 14px rgba(0,0,0,.4);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            font-size: var(--tf, clamp(1.3rem, 8vw, 2rem));
            color: #ece7ff; text-shadow: 0 2px 8px rgba(0,0,0,.6);
            user-select: none; -webkit-user-select: none; touch-action: none; cursor: pointer;
            transition: transform .1s, box-shadow .12s, background .12s, color .12s;
            animation: tileIn .55s cubic-bezier(.34,1.56,.64,1) both;
        }
        .tile.qu { font-size: calc(var(--tf, 1.6rem) * 0.72); }
        @keyframes tileIn { from { opacity: 0; transform: scale(.2) rotate(-15deg); } to { opacity: 1; transform: scale(1) rotate(0); } }
        .tile.path {
            transform: scale(1.02);
            background: linear-gradient(150deg, #7c3aed, #4c1d95);
            border-color: rgba(167,139,250,.85); color: #fff;
            box-shadow: 0 0 16px rgba(139,92,246,.55), 0 8px 18px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.25);
        }
        .tile.sel {
            transform: scale(1.12);
            background: linear-gradient(150deg, var(--pink), #b3178f 65%, #7a0f66);
            border-color: rgba(255,255,255,.6); color: #fff;
            box-shadow: 0 0 24px rgba(255,45,120,.7), 0 8px 18px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.35);
        }
        .tile .path-num {
            position: absolute; top: 5%; right: 8%;
            font-size: .55rem; font-family: 'JetBrains Mono', monospace; font-weight: 700;
            color: rgba(255,255,255,.75);
        }
        .tile.flash-good { animation: tileGood .45s ease-out; }
        @keyframes tileGood {
            0% { background: linear-gradient(150deg, #10b981, #047857); box-shadow: 0 0 26px rgba(52,211,153,.8); transform: scale(1.14); }
            100% { transform: scale(1); }
        }
        #trail {
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
            width: 100%; height: 100%;
        }

        /* ── Current word display ── */
        .word-row { min-height: 52px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .current-word {
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            font-size: clamp(1.2rem, 7vw, 1.8rem); letter-spacing: 5px; text-align: center;
            animation: wordPop .12s ease-out;
        }
        .current-word.live {
            background: linear-gradient(90deg, var(--cyan), var(--violet), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            filter: drop-shadow(0 0 12px rgba(34,211,238,.4));
        }
        .current-word.short { color: var(--muted); }
        .current-word.empty { color: var(--muted); font-size: .72rem; font-family: 'JetBrains Mono', monospace; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
        @keyframes wordPop { from { transform: scale(1.15); } to { transform: scale(1); } }
        .word-actions { display: flex; gap: 8px; margin-bottom: 10px; }
        .word-actions .btn { flex: 1; }

        /* ── Prank bar ── */
        .prank-bar {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
            padding: 10px 14px; margin-bottom: 10px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .prank-meter { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .prank-meter .pm-lbl { font-size: .58rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
        .prank-meter .pm-dots { display: flex; gap: 5px; align-items: center; }
        .pm-dot { width: 11px; height: 11px; border-radius: 50%; background: rgba(255,255,255,.07); border: 1px solid var(--border); transition: all .3s; }
        .pm-dot.on { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 9px var(--gold); }
        .pm-tokens { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: .85rem; color: var(--gold); margin-left: 6px; }
        .prank-btns { display: flex; gap: 7px; }
        .prank-btn {
            width: 46px; height: 46px; border-radius: 13px; border: 1px solid var(--border);
            background: var(--s2); font-size: 1.3rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s; -webkit-tap-highlight-color: transparent;
        }
        .prank-btn:not(:disabled) { border-color: rgba(255,201,60,.6); box-shadow: 0 0 12px rgba(255,201,60,.25); animation: prankReady 1.6s ease-in-out infinite alternate; }
        @keyframes prankReady { from { box-shadow: 0 0 8px rgba(255,201,60,.2); } to { box-shadow: 0 0 18px rgba(255,201,60,.5); } }
        .prank-btn:disabled { opacity: .3; cursor: not-allowed; }
        .prank-btn:not(:disabled):active { transform: scale(.92); }

        /* Target picker sheet */
        .target-sheet {
            position: fixed; inset: 0; z-index: 900;
            background: rgba(7,3,15,0.8); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
            animation: fadeBg .2s ease-out;
        }
        @keyframes fadeBg { from { opacity: 0; } to { opacity: 1; } }
        .target-sheet .ts-title { font-family: 'Orbitron', sans-serif; font-size: 1.05rem; letter-spacing: 2px; }
        .target-sheet .ts-emoji { font-size: 2.6rem; animation: wobble 1s ease-in-out infinite; }
        @keyframes wobble { 0%,100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
        .ts-targets { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 340px; }
        .ts-target {
            padding: 13px 20px; border-radius: 13px; border: 1px solid var(--border);
            background: var(--s2); color: var(--text); font-family: 'JetBrains Mono', monospace;
            font-weight: 700; font-size: .9rem; cursor: pointer; transition: all .15s;
        }
        .ts-target:hover { border-color: var(--pink); box-shadow: 0 0 14px rgba(255,45,120,.35); transform: translateY(-2px); }

        /* ── Word pills ── */
        .word-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .word-pill {
            padding: 4px 11px; border-radius: 16px; font-size: .72rem; font-weight: 600;
            background: var(--s2); border: 1px solid var(--border); color: var(--text);
            animation: pillIn .3s cubic-bezier(.34,1.56,.64,1) both;
            display: inline-flex; align-items: center; gap: 6px;
        }
        @keyframes pillIn { from { opacity: 0; transform: scale(.5); } to { opacity: 1; transform: scale(1); } }

function boardNbrs(n) {
    const nbrs = [];

// Count how many easy words are actually findable on a board (standard

function countEasyWords(board, n) {
    const cells = board.map(t => t.toLowerCase());
    const nbrs = boardNbrs(n);

    const used = new Array(n * n).fill(false);
    const dfs = (i, word) => {
        const w = word + cells[i];
        if (!EASY_PREFIX.has(w)) return;
        if (EASY_WORDS.has(w)) found.add(w);
        used[i] = true;
        for (const j of nbrs[i]) if (!used[j]) dfs(j, w);
        used[i] = false;
    };
    for (let i = 0; i < n * n; i++) dfs(i, '');

// Solve the whole board against the full dictionary (host, once per round).

function solveBoard(board, n) {
    if (!(dictionary instanceof Set)) return [];
    const cells = board.map(t => t.toLowerCase());

    cells.forEach(t => { for (const ch of t) avail[ch] = (avail[ch] || 0) + 1; });

        if (!ok) continue;
        wordSet.add(w);
        for (let i = 1; i <= w.length; i++) prefixes.add(w.slice(0, i));

    const found = new Set();
    const used = new Array(n * n).fill(false);

        const w = word + cells[i];
        if (!prefixes.has(w)) return;
        if (wordSet.has(w)) found.add(w);
        used[i] = true;
        for (const j of nbrs[i]) if (!used[j]) dfs(j, w);
        used[i] = false;
    };
    for (let i = 0; i < n * n; i++) dfs(i, '');

function rollBoard(n) {
    const dice = n === 5 ? DICE5 : DICE4;
    let best = null, bestCount = -1;
    for (let tries = 0; tries < 80; tries++) {

            const letter = faces[Math.floor(Math.random() * faces.length)];
            return letter === 'Q' ? 'Qu' : letter;
        });
        const count = countEasyWords(board, n);
        if (count >= MIN_EASY_WORDS) return board;
        if (count > bestCount) { bestCount = count; best = board; }

function ac() {

        const dlp = AC.createBiquadFilter(); dlp.type = 'lowpass'; dlp.frequency.value = 2200;

        leadBus.connect(musicDelay); musicDelay.connect(dlp); dlp.connect(fb); fb.connect(musicDelay);

        const len = AC.sampleRate * 1.2;
        noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
        const d = noiseBuf.getChannelData(0);

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {

}

let musicTrack = 'lobby', musicStep = 0, musicBar = 0, musicNext = 0, musicTimer = null, musicUrgent = false;
// Adaptive arrangement: 0 = rhythm section, 1 = +lead, 2 = +stabs/arp shimmer.
// musicKeyShift transposes every melodic voice (final-round key change).
let musicIntensity = 2, musicKeyShift = 0;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Swing: push every off-16th slightly late for a looser groove
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) { tone(150, 0.22, { type: 'sine', vol: 0.5, when: rel, slide: 45, dest: musicGain }); }
    if (tr.hat[i]) {
        const open = musicTrack === 'game' && (i === 14 || i === 30);
        const hv = (i % 4 === 2 ? 0.15 : 0.08) * (0.8 + Math.random() * 0.4);
        noiseHit(open ? 0.14 : 0.05, { vol: hv, when: rel, hp: 9000, dest: musicGain });
    }
    const b = tr.bass[i];
    if (b != null) tone(mf(b + k), stepDur * 1.5, { type: 'square', vol: 0.22, when: rel, dest: musicGain, lp: 900, attack: 0.004 });
    const pad = tr.pads[bar % tr.pads.length];
    // Offbeat chord stabs (square comping) — full arrangement only
    if (full && tr.stab && tr.stab[i]) {
        const ch = i < 16 ? pad[0] : pad[16];
        if (ch) ch.forEach(m => tone(mf(m + 12 + k), stepDur * 0.9, { type: 'square', vol: 0.03, when: rel, lp: 2800, dest: musicGain, attack: 0.004 }));
    }
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12;
        // Classic arcade pulse lead: single bright square voice
        const lv = 0.12 * (0.9 + Math.random() * 0.2);
        tone(mf(l + k), stepDur * 1.4, { type: 'square', vol: lv, when: rel, dest: leadBus, lp: 4800, attack: 0.004 });
    }
    // Running arpeggio channel — the signature arcade chord shimmer
    // (arp: 1 = every 16th, 2 = every 8th) — full arrangement only
    if (full && tr.arp && i % tr.arp === 0) {
        const ch = i < 16 ? pad[0] : pad[16];
        if (ch) tone(mf(ch[(i / tr.arp) % ch.length] + 12 + k), stepDur * tr.arp * 0.9, { type: 'square', vol: 0.04, when: rel, lp: 5500, dest: musicGain, attack: 0.003 });
    }
    if (musicUrgent && i % 4 === 0) noiseHit(0.04, { vol: 0.12, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    // Rounds start stripped back and build to the full mix at half-time
    musicIntensity = track === 'game' ? 1 : 2;
    if (track === 'lobby' || track === 'over') musicKeyShift = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'game') musicUrgent = false;
    // one-beat snare fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) noiseHit(0.06, { vol: 0.1 + f * 0.035, when: f * s, hp: 2800 + f * 900, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}

function burst(x, y, colors, n = 14) {
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;

            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);

}

// ── Fireworks (canvas) ──
let _fw = { running: false, parts: [], raf: null, until: 0, lastLaunch: 0 };
function startFireworks(dur = 12000) {
    const cv = $id('fireworks');
    cv.width = innerWidth; cv.height = innerHeight;
    _fw.until = performance.now() + dur;
    if (_fw.running) return;
    _fw.running = true;
    const ctx = cv.getContext('2d');
    const colors = ['#ff2d78', '#22d3ee', '#ffc93c', '#8b5cf6', '#34d399', '#ffffff'];
    function explode(x, y) {
        const col = colors[Math.floor(Math.random() * colors.length)];
        const n = 42 + Math.floor(Math.random() * 30);
        for (let i = 0; i < n; i++) {
            const ang = (i / n) * Math.PI * 2 + Math.random() * 0.2;
            const sp = 1.6 + Math.random() * 3.4;
            _fw.parts.push({ x, y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, life: 1, col, sz: 2 + Math.random() * 2 });
        }
        sBoom();
    }
    function frame(t) {
        ctx.clearRect(0, 0, cv.width, cv.height);
        if (t < _fw.until && t - _fw.lastLaunch > 550 + Math.random() * 500) {
            _fw.lastLaunch = t;
            explode(cv.width * (0.15 + Math.random() * 0.7), cv.height * (0.12 + Math.random() * 0.45));
        }
        ctx.globalCompositeOperation = 'lighter';
        _fw.parts = _fw.parts.filter(p => p.life > 0.02);
        for (const p of _fw.parts) {
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.035; p.vx *= 0.985; p.vy *= 0.985;
            p.life *= 0.965;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.col;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.sz * p.life, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
        if (t < _fw.until || _fw.parts.length) _fw.raf = requestAnimationFrame(frame);
        else { _fw.running = false; ctx.clearRect(0, 0, cv.width, cv.height); }
    }
    _fw.raf = requestAnimationFrame(frame);
}

// ── QR code (themed SVG) ──
function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++)
            for (let c = 0; c < n; c++)
                if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#ffffff"/>` +
            `<g fill="#150b30">${rects}</g></svg>`;
    } catch (e) { return ''; }
}

async function loadDictionary() {
    if (dictionary !== null || _dictLoading) return;
    _dictLoading = true;
    if (ui === 'lobby_h') render();
    try {
        const resp = await fetch('https://raw.githubusercontent.com/dolph/dictionary/master/enable1.txt');

        dictionary = new Set(text.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length >= 3));

    H.players.push({
        id, name, color: PLAYER_COLORS[H.players.length % PLAYER_COLORS.length],
        words: [], score: 0, roundBase: 0, bonus: 0, tokens: 0, meter: 0,
    });
}

function lobbyMsg() {
    return { type: 'lobby', players: H.players.map(p => ({ name: p.name, color: p.color })),
             roomCode, roundsTarget: H.roundsTarget, duration: H.duration, n: H.n,
             tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null };
}
function broadcastLobby() {
    Object.values(guestConns).forEach(c => send(c, lobbyMsg()));
    broadcastViewers({ ...lobbyMsg(), type: 'viewer_lobby' });
    tvHostSync();
    render();
}

function stateFor(p) {
    return {
        type: 'state',
        phase: H.phase, board: H.board, n: H.n,
        timeLeft: H.timeLeft, duration: H.duration,
        round: H.round, roundsTarget: H.roundsTarget, roomCode,
        players: H.players.map(q => ({ name: q.name, color: q.color, score: q.score, wordCount: q.words.length })),
        results: H.results, winner: H.winner,
        myTokens: p ? p.tokens : 0, myMeter: p ? p.meter : 0,
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}

function broadcastState() {
    H.players.forEach(p => {
        const conn = guestConns[p.id];
        if (conn) send(conn, stateFor(p));
    });
    broadcastViewers({ ...stateFor(null), type: 'viewer_state', feed: H.feed.slice(-12) });
    if (isHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) { myTokens = me.tokens; myMeter = me.meter; }
    }
    tvHostSync();
}

let _feedSeq = 0;
function feedPush(ev) {
    ev.id = ++_feedSeq;  // stable id so viewers animate only new items
    H.feed.push(ev);
    if (H.feed.length > 12) H.feed.shift();
}

// ── Host: judge a word live ──
function hostJudge(p, raw) {
    const w = String(raw || '').toLowerCase();
    if (w.length < 3) return { ok: false, reason: 'Too short' };
    if (p.words.find(x => x.word === w)) return { ok: false, reason: 'Already found' };
    if (dictionary instanceof Set && !dictionary.has(w)) return { ok: false, reason: 'Not a word' };
    const pts = wordScore(w);
    const prevLeader = H.players.reduce((a, b) => (b.score > a.score ? b : a), H.players[0]);
    p.words.push({ word: w, pts, unique: false });
    p.score += pts;
    p.roundBase += pts;
    p.meter += 1;
    let tokenEarned = false;
    if (p.meter >= 3) { p.meter = 0; p.tokens += 1; tokenEarned = true; }
    feedPush({ t: 'word', name: p.name, color: p.color, len: w.length, pts });
    const newLeader = H.players.reduce((a, b) => (b.score > a.score ? b : a), H.players[0]);
    if (H.players.length > 1 && newLeader.id === p.id && prevLeader.id !== p.id)
        feedPush({ t: 'lead', name: p.name, color: p.color });
    // Streak callout: 4+ words inside 30s (with a cooldown so it doesn't spam)
    const now = Date.now();
    p._hits = (p._hits || []).filter(ts => now - ts < 30000);
    p._hits.push(now);
    if (p._hits.length >= 4 && (!p._streakAt || now - p._streakAt > 25000)) {
        p._streakAt = now;
        feedPush({ t: 'streak', name: p.name, color: p.color, count: p._hits.length });
    }
    return { ok: true, pts, tokens: p.tokens, meter: p.meter, tokenEarned };
}

// ── Host: prank routing ──
function hostPrank(sender, kind, targetName) {
    if (!PRANKS[kind] || sender.tokens < 1 || H.phase !== 'playing') return;
    const target = H.players.find(p => p.name === targetName && p.id !== sender.id);
    if (!target) return;
    sender.tokens -= 1;
    feedPush({ t: 'prank', from: sender.name, target: target.name, kind });
    if (target.id === myId) applyPrank(kind, sender.name);
    else { const c = guestConns[target.id]; if (c) send(c, { type: 'pranked', kind, from: sender.name }); }
    broadcastState();
    if (isHost && ui === 'game') patchGame(stateFor(H.players.find(p => p.id === myId)));
}

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            if (H.phase === 'lobby') send(conn, { ...lobbyMsg(), type: 'viewer_lobby' });
            else send(conn, { ...stateFor(null), type: 'viewer_state', feed: H.feed.slice(-12) });
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const zombie = H.players.find(p => p.name === msg.name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else hostAddPlayer(conn.peer, String(msg.name || 'Player').slice(0, 16));
                if (H.phase === 'lobby') broadcastLobby();
                else if (H.players.find(p => p.id === conn.peer)) {
                    // Mid-game join: send state (not lobby) so existing players stay on their screens
                    const p2 = H.players.find(p => p.id === conn.peer);
                    feedPush({ t: 'join', name: p2.name, color: p2.color });
                    broadcastState();
                } else {
                    send(conn, lobbyMsg()); // room full — let them see the full lobby
                }
                break;
            }
            case 'word': {
                if (!player || H.phase !== 'playing') break;
                const res = hostJudge(player, msg.word);
                send(conn, { type: 'word_result', word: String(msg.word || '').toLowerCase(), ...res });
                broadcastState();
                break;
            }
            case 'prank': {
                if (player) hostPrank(player, msg.kind, msg.target);
                break;
            }
            case 'ctl': {
                // TV-host mode: the captain (first player) drives the flow from their phone
                if (!isTvHost || !player || player.id !== H.players[0]?.id) break;
                if (msg.action === 'start' && (H.phase === 'lobby' || (H.phase === 'results' && !H.results?.final))) hostStartRound();
                else if (msg.action === 'podium' && H.phase === 'results' && H.results?.final) hostShowPodium();
                else if (msg.action === 'newgame' && H.phase === 'gameover') hostNewGame();
                else if (msg.action === 'set' && H.phase === 'lobby') {
                    if ([4, 5].includes(msg.n)) H.n = msg.n;
                    if ([60, 90, 120].includes(msg.duration)) H.duration = msg.duration;
                    if ([1, 3, 5].includes(msg.rounds)) H.roundsTarget = msg.rounds;
                    broadcastLobby();
                }
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        }
    });
    conn.on('error', e => console.warn('conn err', e));
}

// ── Host game ──
function hostGame(name) {
    myName = name.trim().slice(0, 16) || 'Host';
    localStorage.setItem('bp-name', myName);
    uiErr = '';
    ui = 'creating';
    render();

    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    const code = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    roomCode = code;

    peer = new Peer('BGPARTY-' + code, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        isHost = true;
        hostAddPlayer(myId, myName);
        loadDictionary();
        ui = 'lobby_h';
        render();
    });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => { uiErr = 'Connection error: ' + e.message; ui = 'home'; render(); });
}

// ── Guest ──
function joinGame(code, name) {
    myName = name.trim().slice(0, 16) || 'Player';
    localStorage.setItem('bp-name', myName);
    uiErr = '';
    ui = 'connecting';
    render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        isHost = false;
        hostConn = peer.connect('BGPARTY-' + code.trim().toUpperCase(), { reliable: true });

        hostConn.on('open', () => send(hostConn, { type: 'join', name: myName }));

        hostConn.on('data', msg => {
            switch (msg.type) {
                case 'lobby':
                    D = { ...msg, phase: 'lobby' };
                    if (ui !== 'lobby_g') { ui = 'lobby_g'; setMusic('lobby'); }
                    render();
                    break;
                case 'state':  clientApplyState(msg); break;
                case 'word_result': applyWordResult(msg); break;
                case 'pranked': applyPrank(msg.kind, msg.from); break;
            }
        });
        hostConn.on('close', () => { uiErr = 'Disconnected from host.'; ui = 'home'; D = null; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'home'; render();
    });
}

function clientApplyState(msg) {
    const newRound = msg.phase === 'playing' && (!D || D.round !== msg.round || D.phase !== 'playing');
    const prevPhase = D?.phase;
    myTokens = msg.myTokens ?? myTokens;
    myMeter  = msg.myMeter  ?? myMeter;
    D = msg;
    if (newRound) {
        myWords = []; currentPath = []; frozen = false; prankPick = null;
        ui = 'game'; setMusic('game');
        musicKeyShift = msg.round >= msg.roundsTarget ? 2 : 0;   // final round: key up
        render();
        showCountdown(msg.round, msg.roundsTarget);
        return;
    }
    if (msg.phase === 'playing') {
        if (ui === 'game') patchGame(msg);
        else { ui = 'game'; setMusic('game'); render(); }
        return;
    }
    if (msg.phase === 'results' && ui !== 'results') {
        currentPath = []; prankPick = null; frozen = false;
        ui = 'results'; setMusic('results'); sRoundEnd();
        render();
        return;
    }
    if (msg.phase === 'gameover' && ui !== 'gameover') {
        ui = 'gameover'; setMusic('over');
        render();
        sWin(); startFireworks();
        return;
    }
    render();
}

// ── Viewer ──
function joinAsViewer(code, _attempt) {
    const attempt = _attempt || 1;
    isViewer = true;
    uiErr = '';
    ui = 'connecting';
    render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect('BGPARTY-' + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join_viewer' }));
        hostConn.on('data', msg => {
            if (msg.type === 'viewer_lobby') {
                vD = { ...msg, phase: 'lobby' };
                ui = 'viewer';
                document.body.classList.add('viewer-mode');
                setMusic('lobby');
                render();
            } else if (msg.type === 'viewer_state') {
                const prev = vD;
                vD = msg;
                ui = 'viewer';
                document.body.classList.add('viewer-mode');
                const newRound = msg.phase === 'playing' && (prev?.round !== msg.round || prev?.phase !== 'playing');
                if (msg.phase === 'playing') {
                    setMusic('game');
                    if (newRound) musicKeyShift = msg.round >= msg.roundsTarget ? 2 : 0;   // final round: key up
                    if (!newRound && prev?.phase === 'playing') { patchViewer(msg); return; }
                } else if (msg.phase === 'results') { setMusic('results'); if (prev?.phase !== 'results') sRoundEnd(); }
                else if (msg.phase === 'gameover' && prev?.phase !== 'gameover') { setMusic('over'); sWin(); startFireworks(16000); }
                render();
            }
        });
        hostConn.on('close', () => { uiErr = 'Disconnected from host.'; isViewer = false; vD = null; document.body.classList.remove('viewer-mode'); ui = 'home'; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; isViewer = false; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

// ── TV host: this screen creates and runs the party; phones control it.
//    The first player to join is the captain and starts rounds. ──
function hostOnTV() {
    uiErr = '';
    ui = 'creating';

// Keep the TV's own viewer data mirrored to the authoritative host state
function tvHostSync() {
    if (!isTvHost) return;
    vD = H.phase === 'lobby'
        ? { ...lobbyMsg(), phase: 'lobby' }
        : { ...stateFor(null), feed: H.feed.slice(-12) };
    ui = 'viewer';
    // Mid-round updates (timer ticks, words, pranks) patch in place like a remote viewer
    if (H.phase === 'playing' && $id('v-timer')) patchViewer(vD);
}

function guestCtl(action, extra) {
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ═══════════════════════════════════════════
// HOST GAME FLOW
// ═══════════════════════════════════════════
let _timerInterval = null;

function hostStartRound() {
    if (H.players.length < 1) return;
    uiErr = '';
    H.board = rollBoard(H.n);
    H.phase = 'playing';
    H.timeLeft = H.duration;
    H.round += 1;
    H.results = null;
    H.feed = [];
    H.players.forEach(p => { p.words = []; p.roundBase = 0; p.bonus = 0; p._hits = []; p._streakAt = 0; });
    myWords = []; currentPath = []; frozen = false; prankPick = null;

    broadcastState();
    ui = 'game';
    setMusic('game');
    musicKeyShift = H.round >= H.roundsTarget ? 2 : 0;   // final round: key up
    render();
    showCountdown(H.round, H.roundsTarget);
    clearInterval(_timerInterval);
    setTimeout(startTimer, 3400); // timer starts once the 3-2-1-GO finishes
}

function startTimer() {
    clearInterval(_timerInterval);
    _timerInterval = setInterval(() => {
        H.timeLeft--;
        if (H.timeLeft <= H.duration / 2) musicIntensity = 2;   // second half: full mix
        if (H.timeLeft <= 10 && H.timeLeft > 0) musicUrgent = true;
        broadcastState();
        if (isHost && ui === 'game') patchGame(stateFor(H.players.find(p => p.id === myId)));
        if (H.timeLeft <= 0) {
            clearInterval(_timerInterval);
            musicUrgent = false;
            hostEndRound();
        }
    }, 1000);
}

function hostEndRound() {
    H.phase = 'results';

    // Unique-word ×2 bonus: words found by exactly one player double
    const counts = {};
    H.players.forEach(p => p.words.forEach(w => { counts[w.word] = (counts[w.word] || 0) + 1; }));
    H.players.forEach(p => {
        p.bonus = 0;
        p.words.forEach(w => {
            w.unique = counts[w.word] === 1 && w.pts > 0;
            if (w.unique) p.bonus += w.pts;
        });
        p.score += p.bonus;
        p.words.sort((a, b) => (b.pts + (b.unique ? b.pts : 0)) - (a.pts + (a.unique ? a.pts : 0)) || a.word.localeCompare(b.word));
    });

    // Keep a game-long hall of fame of the best-scoring words.
    // Grouped by word: every player who found it is credited in `finders`.
    H.players.forEach(p => p.words.forEach(w => {
        if (w.pts <= 0) return;
        const pts = w.pts * (w.unique ? 2 : 1);
        let entry = H.hall.find(h => h.word === w.word);
        if (!entry) { entry = { word: w.word, pts, unique: w.unique, finders: [] }; H.hall.push(entry); }
        else { entry.pts = Math.max(entry.pts, pts); entry.unique = entry.unique && w.unique; }
        if (!entry.finders.some(f => f.name === p.name)) entry.finders.push({ name: p.name, color: p.color });
    }));
    H.hall.sort((a, b) => b.pts - a.pts || b.word.length - a.word.length);
    H.hall = H.hall.slice(0, 20);

    // Valid words on the board that nobody found: the longest (impressive
    // misses) and the shortest (embarrassing ones — common words first)
    let missed = [], missedEasy = [];
    if (dictionary instanceof Set) {
        const foundAll = new Set();
        H.players.forEach(p => p.words.forEach(w => foundAll.add(w.word)));
        const unfound = solveBoard(H.board, H.n).filter(w => !foundAll.has(w));
        missed = [...unfound]
            .sort((a, b) => b.length - a.length || a.localeCompare(b))
            .slice(0, 5);
        missedEasy = [...unfound]
            .filter(w => !missed.includes(w))
            .sort((a, b) => a.length - b.length
                || (EASY_WORDS.has(b) ? 1 : 0) - (EASY_WORDS.has(a) ? 1 : 0)
                || a.localeCompare(b))
            .slice(0, 5);
    }

    const sorted = [...H.players].sort((a, b) => b.score - a.score);
    H.results = {
        players: sorted.map(p => ({
            name: p.name, color: p.color, score: p.score,
            roundBase: p.roundBase, bonus: p.bonus,
            words: p.words.map(w => ({ word: w.word, pts: w.pts, unique: w.unique })),
        })),
        final: H.round >= H.roundsTarget,
        missed, missedEasy,
    };
    if (H.results.final) {
        H.winner = sorted[0]?.name || null;
        // Pick words so every player gets celebrated at least once, then top up by score
        const covered = new Set(), picks = [];
        H.hall.forEach(w => {
            if (picks.length >= 6) return;
            if (w.finders.some(f => !covered.has(f.name))) {
                picks.push(w);
                w.finders.forEach(f => covered.add(f.name));
            }
        });
        H.hall.forEach(w => { if (picks.length < 6 && !picks.includes(w)) picks.push(w); });
        H.results.hall = picks.sort((a, b) => b.pts - a.pts);
    }

    broadcastState();
    currentPath = []; prankPick = null; frozen = false;
    ui = 'results';
    setMusic('results');
    sRoundEnd();
    render();
}

function hostShowPodium() {
    H.phase = 'gameover';
    broadcastState();
    ui = 'gameover';
    setMusic('over');
    render();
    sWin();
    startFireworks();
}

function hostNewGame() {
    H.phase = 'lobby';
    H.round = 0;
    H.results = null; H.winner = null; H.feed = []; H.hall = [];
    H.players.forEach(p => { p.words = []; p.score = 0; p.roundBase = 0; p.bonus = 0; p.tokens = 0; p.meter = 0; });
    myWords = []; myTokens = 0; myMeter = 0;
    ui = 'lobby_h';
    setMusic('lobby');
    broadcastLobby();
}

// ═══════════════════════════════════════════
// BOARD INTERACTION — swipe or tap
// ═══════════════════════════════════════════
function boardN()    { return isHost ? H.n : (D?.n || 4); }
function boardArr()  { return isHost ? H.board : (D?.board || []); }
function isAdjacent(a, b) {
    const n = boardN();
    const ar = Math.floor(a / n), ac = a % n, br = Math.floor(b / n), bc = b % n;
    return Math.abs(ar - br) <= 1 && Math.abs(ac - bc) <= 1 && a !== b;
}
function currentWord() { return currentPath.map(i => boardArr()[i]).join('').toUpperCase(); }

let _ptrActive = false, _ptrMoved = false, _downIdx = -1, _downAdded = false;

function initBoardEvents() {
    const grid = $id('grid');
    if (!grid) return;
    grid.addEventListener('pointerdown', e => {
        if (inputLocked || frozen) return;
        const t = e.target.closest('.tile');
        if (!t) return;
        e.preventDefault();
        _ptrActive = true; _ptrMoved = false; _downAdded = false;
        _downIdx = +t.dataset.i;
        const last = currentPath[currentPath.length - 1];
        if (currentPath.length === 0) {
            currentPath = [_downIdx];
            _downAdded = true;
            sTick(0);
        } else if (!currentPath.includes(_downIdx) && isAdjacent(last, _downIdx)) {
            currentPath.push(_downIdx);
            _downAdded = true;
            sTick(currentPath.length - 1);
        }
        updateBoardVisual();
    });
    grid.addEventListener('pointermove', e => {
        if (!_ptrActive || inputLocked || frozen) return;
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const t = el && el.closest ? el.closest('.tile') : null;
        if (!t || t.parentElement !== grid) return;
        const idx = +t.dataset.i;
        const r = t.getBoundingClientRect();
        const dx = e.clientX - (r.left + r.width / 2), dy = e.clientY - (r.top + r.height / 2);
        if (Math.hypot(dx, dy) > r.width * 0.4) return;   // require near tile centre — clean diagonals
        const last = currentPath[currentPath.length - 1];
        if (idx === last) return;
        _ptrMoved = true;
        if (currentPath.length >= 2 && idx === currentPath[currentPath.length - 2]) {
            currentPath.pop();                             // slide back = rewind
            updateBoardVisual();
            return;
        }
        if (!currentPath.includes(idx) && isAdjacent(last, idx)) {
            currentPath.push(idx);
            sTick(currentPath.length - 1);
            updateBoardVisual();
        }
    });
    const up = () => {
        if (!_ptrActive) return;
        _ptrActive = false;
        if (_ptrMoved) {                                   // swipe → release to submit
            if (currentWord().length >= 3) submitWord();
            else { currentPath = []; updateBoardVisual(); }
        } else {
            // tap mode: tapping the last tile again (one it didn't just add) removes it
            if (!_downAdded && currentPath.length > 0 && _downIdx === currentPath[currentPath.length - 1]) {
                currentPath.pop();
            }
            updateBoardVisual();
        }
        _downIdx = -1;
    };
    grid.addEventListener('pointerup', up);
    grid.addEventListener('pointercancel', up);
}

function clearPath() { currentPath = []; updateBoardVisual(); }
function backspacePath() { currentPath.pop(); updateBoardVisual(); }

function updateBoardVisual() {
    const grid = $id('grid');
    if (!grid) return;
    const last = currentPath[currentPath.length - 1];
    [...grid.children].forEach((el, i) => {
        el.classList.toggle('sel', i === last);
        el.classList.toggle('path', currentPath.includes(i) && i !== last);
        const pos = currentPath.indexOf(i);
        const numEl = el.querySelector('.path-num');
        if (pos >= 0) {
            if (numEl) numEl.textContent = pos + 1;
            else el.insertAdjacentHTML('afterbegin', `<span class="path-num">${pos + 1}</span>`);
        } else if (numEl) numEl.remove();
    });
    updateTrail();
    updateWordRow();
}

function updateTrail() {
    const svg = $id('trail'), grid = $id('grid');
    if (!svg || !grid) return;
    const gr = grid.getBoundingClientRect();
    svg.setAttribute('viewBox', `0 0 ${gr.width} ${gr.height}`);
    const defs = `<defs>
        <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22d3ee"/><stop offset="50%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#ff2d78"/>
        </linearGradient>
        <filter id="tglow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter></defs>`;
    if (currentPath.length < 2) { svg.innerHTML = defs; return; }
    const pts = currentPath.map(i => {
        const t = grid.children[i].getBoundingClientRect();
        return `${(t.left - gr.left + t.width / 2).toFixed(1)},${(t.top - gr.top + t.height / 2).toFixed(1)}`;
    }).join(' ');
    svg.innerHTML = defs + `<polyline points="${pts}" fill="none" stroke="url(#tg)" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9" filter="url(#tglow)"/>`;
}

function updateWordRow() {
    const row = $id('word-row');
    if (!row) return;
    const w = currentWord();
    if (!w) row.innerHTML = `<div class="current-word empty">swipe or tap tiles to spell a word</div>`;
    else row.innerHTML = `<div class="current-word ${w.length >= 3 ? 'live' : 'short'}">${esc(w)}</div>`;
    const back = $id('btn-back'), sub = $id('btn-sub');
    if (back) back.disabled = currentPath.length === 0;
    if (sub)  sub.disabled  = w.length < 3;
}

// ── Submit + verdict ──
function submitWord() {
    const word = currentWord();
    currentPath = [];
    updateBoardVisual();
    if (word.length < 3) return;
    const w = word.toLowerCase();
    if (myWords.find(x => x.word === w && !x.pending)) {
        wordFeedback(false, w, 'Already found');
        return;
    }
    if (isHost) {
        const me = H.players.find(p => p.id === myId);
        const res = hostJudge(me, w);
        if (res.ok) { myWords.push({ word: w, pts: res.pts }); myTokens = res.tokens; myMeter = res.meter; }
        wordFeedback(res.ok, w, res.reason, res.pts, res.tokenEarned);
        broadcastState();
        renderWordPills(); renderPrankBar();
    } else {
        myWords.push({ word: w, pts: 0, pending: true });
        send(hostConn, { type: 'word', word: w });
        renderWordPills();
    }
}

function applyWordResult(msg) {
    const i = myWords.findIndex(x => x.word === msg.word && x.pending);
    if (msg.ok) {
        if (i >= 0) { myWords[i].pending = false; myWords[i].pts = msg.pts; }
        myTokens = msg.tokens; myMeter = msg.meter;
    } else if (i >= 0) myWords.splice(i, 1);
    wordFeedback(msg.ok, msg.word, msg.reason, msg.pts, msg.tokenEarned);
    renderWordPills(); renderPrankBar();
}

function wordFeedback(ok, word, reason, pts, tokenEarned) {
    const row = $id('word-row');
    const r = row ? row.getBoundingClientRect() : { left: innerWidth / 2 - 60, top: innerHeight / 2, width: 120 };
    const cx = r.left + r.width / 2, cy = r.top;
    if (ok) {
        sGood(pts);
        popText(cx, cy, `+${pts}`, pts >= 400 ? 'gold' : 'good');
        burst(cx, cy + 14, pts >= 400 ? ['#ffc93c', '#ff2d78', '#fff'] : ['#34d399', '#22d3ee', '#8b5cf6'], pts >= 400 ? 22 : 14);
        if (pts >= 600) banner('🔥', `${word.toUpperCase()} — huge word! +${pts}`);
        if (tokenEarned) { setTimeout(() => { sToken(); banner('🃏', 'Prank token earned!'); }, 450); }
    } else {
        if (reason === 'Already found') { sDupe(); popText(cx, cy, reason, 'info'); }
        else { sBad(); popText(cx, cy, reason || 'Nope', 'bad'); shakeBoard(); }
    }
}

// ── Pranks (client side) ──
function openPrankPicker(kind) {
    if (myTokens < 1 || inputLocked) return;
    const others = (isHost ? H.players.map(p => p.name) : (D?.players || []).map(p => p.name)).filter(n => n !== myName);
    if (others.length === 0) return;
    if (others.length === 1) { firePrank(kind, others[0]); return; }
    prankPick = kind;
    renderTargetSheet(others);
}

function firePrank(kind, target) {
    prankPick = null;
    const sheet = $id('target-sheet');
    if (sheet) sheet.remove();
    myTokens -= 1; // optimistic; authoritative count comes back in state
    sPrankSend();
    banner(PRANKS[kind].emoji, `You hit ${target} with ${PRANKS[kind].name}!`);
    if (isHost) {
        const me = H.players.find(p => p.id === myId);
        hostPrank(me, kind, target);
    } else send(hostConn, { type: 'prank', kind, target });
    renderPrankBar();
}

function renderTargetSheet(others) {
    document.getElementById('target-sheet')?.remove();
    const el = document.createElement('div');
    el.className = 'target-sheet';
    el.id = 'target-sheet';
    el.innerHTML = `
        <div class="ts-emoji">${PRANKS[prankPick].emoji}</div>
        <div class="ts-title">${esc(PRANKS[prankPick].name)} — pick a victim</div>
        <div class="ts-targets">${others.map(n =>
            `<button class="ts-target" onclick="firePrank('${prankPick}','${esc(n).replace(/'/g, "\\'")}')">${esc(n)}</button>`).join('')}</div>
        <button class="btn btn-g btn-sm" onclick="prankPick=null;document.getElementById('target-sheet').remove()">Cancel</button>`;
    el.addEventListener('click', e => { if (e.target === el) { prankPick = null; el.remove(); } });
    document.body.appendChild(el);
}

function applyPrank(kind, from) {
    sPranked(kind);
    banner(PRANKS[kind].emoji, `${from} hit you with ${PRANKS[kind].name}!`);
    const wrap = $id('board-wrap');
    if (!wrap) return;
    if (kind === 'ink') {
        const layer = document.createElement('div');
        layer.className = 'ink-layer';
        let blobs = '';
        for (let i = 0; i < 6; i++) {
            const s = 24 + Math.random() * 36;
            blobs += `<div class="ink-blob" style="width:${s}%;padding-top:${s}%;left:${Math.random() * (92 - s)}%;top:${Math.random() * (92 - s)}%;animation-delay:${i * 0.07}s,${1.4 + i * 0.07}s"></div>`;
        }
        layer.innerHTML = blobs;
        wrap.appendChild(layer);
        setTimeout(() => layer.remove(), 6500);
    } else if (kind === 'dizzy') {
        wrap.classList.remove('dizzy');
        void wrap.offsetWidth;
        wrap.classList.add('dizzy');
        setTimeout(() => wrap.classList.remove('dizzy'), 5200);
    } else if (kind === 'freeze') {
        frozen = true;
        currentPath = [];
        updateBoardVisual();
        const layer = document.createElement('div');
        layer.className = 'freeze-layer';
        layer.innerHTML = `<div class="fz-ice">🧊</div><div class="fz-txt">FROZEN</div>`;
        wrap.appendChild(layer);
        setTimeout(() => {
            layer.classList.add('thaw');
            setTimeout(() => { layer.remove(); frozen = false; }, 500);
        }, 4000);
    }
}

// ── Countdown ──
function showCountdown(round, total) {
    document.getElementById('count-overlay')?.remove();
    inputLocked = true;
    const el = document.createElement('div');
    el.className = 'count-overlay';
    el.id = 'count-overlay';
    document.body.appendChild(el);
    const seq = ['3', '2', '1', 'GO!'];
    let i = 0;
    const step = () => {
        if (i >= seq.length) { el.remove(); inputLocked = false; return; }
        sCount(seq[i] === 'GO!' ? 0 : 1);
        el.innerHTML = `<div class="cd-round">Round ${round} of ${total}</div><div class="cd-num">${seq[i]}</div>`;
        i++;
        setTimeout(step, i === seq.length ? 750 : 880);
    };
    step();
}

// ── Game screen (phone) ──
const RING_C = 2 * Math.PI * 27; // r=27 circle circumference

function timerRingHTML(timeLeft, duration) {
    const frac = Math.max(0, timeLeft / duration);
    const cls = timeLeft <= 10 ? 'urgent' : timeLeft <= 25 ? 'warn' : '';
    return `
    <div class="timer-ring ${cls}" id="timer-ring">
        <svg width="62" height="62" viewBox="0 0 62 62">
            <circle class="tr-bg" cx="31" cy="31" r="27"></circle>
            <circle class="tr-fg" id="tr-fg" cx="31" cy="31" r="27"
                stroke-dasharray="${RING_C.toFixed(1)}"
                stroke-dashoffset="${(RING_C * (1 - frac)).toFixed(1)}"></circle>
        </svg>
        <div class="tr-txt" id="tr-txt">${timeLeft}</div>
    </div>`;
}

function myScore() {
    if (isHost) return H.players.find(p => p.id === myId)?.score || 0;
    return (D?.players || []).find(p => p.name === myName)?.score || 0;
}

function renderWordPills() {
    const list = $id('word-list'), lbl = $id('words-lbl');
    if (!list) return;
    const confirmed = myWords.filter(w => !w.pending);
    if (lbl) lbl.textContent = `${confirmed.length} word${confirmed.length !== 1 ? 's' : ''} found`;
    list.innerHTML = [...myWords].reverse().map(w =>
        `<div class="word-pill${w.pending ? ' pending' : ''}">${esc(w.word.toUpperCase())}${w.pending ? '' : `<span class="wp-pts">+${w.pts}</span>`}</div>`
    ).join('') || '<span style="color:var(--muted);font-size:.72rem">No words yet — get swiping!</span>';
}

// per-second patch — never rebuilds the board mid-swipe
function patchGame(st) {
    if (!st) return;
    const ring = $id('timer-ring'), fg = $id('tr-fg'), txt = $id('tr-txt');
    if (ring && fg && txt) {
        const frac = Math.max(0, st.timeLeft / st.duration);
        fg.style.strokeDashoffset = (RING_C * (1 - frac)).toFixed(1);
        txt.textContent = st.timeLeft;
        ring.classList.toggle('warn', st.timeLeft <= 25 && st.timeLeft > 10);
        ring.classList.toggle('urgent', st.timeLeft <= 10);
        if (st.timeLeft <= st.duration / 2) musicIntensity = 2;   // second half: full mix
        if (st.timeLeft <= 10 && st.timeLeft > 0) { sUrgent(); musicUrgent = true; }
    }
    const strip = $id('score-strip');
    if (strip) strip.innerHTML = scoreStripHTML(st.players || []);
    const ms = $id('ms-val');
    if (ms) ms.textContent = myScore();
    renderPrankBar();
}

// ── Word definitions (results-screen taps + TV trivia) ──
const _defs = {};
function fetchDef(word) {
    if (_defs[word]) return Promise.resolve(_defs[word]);
    return fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word))
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(d => {
            const meaning = (d[0]?.meanings || [])[0];
            const def = meaning?.definitions?.[0]?.definition;
            return (_defs[word] = def ? `(${meaning.partOfSpeech}) ${def}` : 'No definition found.');
        })
        .catch(() => (_defs[word] = 'Definition unavailable.'));
}
function toggleDef(word, row) {
    const next = row.nextElementSibling;
    if (next && next.classList.contains('def-box')) { next.remove(); return; }
    const box = document.createElement('div');
    box.className = 'def-box';
    box.textContent = _defs[word] || 'Looking up…';
    row.after(box);
    if (!_defs[word]) fetchDef(word).then(def => { if (box.isConnected) box.textContent = def; });
}
// TV: show what the round's best word actually means
function loadTrivia(word) {
    fetchDef(word).then(def => {
        const el = $id('v-trivia');
        if (el && !def.startsWith('Definition unavailable')) el.innerHTML = `📖 <b>${esc(word.toUpperCase())}</b> — ${esc(def)}`;
    });
}

function missedPhoneRows(list) {
    return list.map((w, i) =>
        `<div class="word-result-row" style="animation-delay:${i * 45}ms;cursor:pointer" onclick="toggleDef('${esc(w)}', this)">
            <div class="wr-word">${esc(w)}</div>

}

// In-place leaderboard update: rows keep their identity, overtakes slide
// (FLIP) instead of the whole list being rebuilt every second
function updateViewerLb() {
    const lb = $id('v-lb');
    if (!lb) return;
    const players = [...(vD.players || [])].sort((a, b) => b.score - a.score);
    const maxScore = Math.max(1, ...players.map(p => p.score));
    const prevTop = {};
    [...lb.children].forEach(el => { prevTop[el.dataset.name] = el.offsetTop; });
    players.forEach((p, i) => {
        let row = [...lb.children].find(el => el.dataset.name === p.name);
        if (!row) {
            lb.insertAdjacentHTML('beforeend',
                `<div class="v-lb-row" data-name="${esc(p.name)}">
                    <div class="v-lb-bar"></div>
                    <span class="v-lb-rank"></span>
                    <span class="v-lb-name" style="color:${esc(p.color)}">${esc(p.name)}</span>
                    <span class="v-lb-words"></span>
                    <span class="v-lb-score"></span>
                </div>`);
            row = lb.lastElementChild;
        }
        row.querySelector('.v-lb-bar').style.width = (p.score / maxScore * 100).toFixed(0) + '%';
        const rank = row.querySelector('.v-lb-rank');
        rank.textContent = i + 1;
        rank.className = 'v-lb-rank' + (i === 0 ? ' g' : '');
        row.querySelector('.v-lb-words').textContent = p.wordCount + 'w';
        row.querySelector('.v-lb-score').textContent = p.score;
        lb.appendChild(row); // reorder into sorted position
    });
    [...lb.children].forEach(el => { if (!players.some(p => p.name === el.dataset.name)) el.remove(); });
    // FLIP: jump each moved row back to its old spot, then let the transition slide it home
    [...lb.children].forEach(el => {
        const from = prevTop[el.dataset.name];
        if (from == null) return;
        const dy = from - el.offsetTop;
        if (dy) {
            el.style.transition = 'none';
            el.style.transform = `translateY(${dy}px)`;
            requestAnimationFrame(() => { el.style.transition = ''; el.style.transform = ''; });
        }
    });
}

    const n = vD.n || 4;
    const tiles = (vD.board || []).map((letter, i) =>
        `<div class="v-tile${letter === 'Qu' ? ' qu' : ''}" style="animation-delay:${i * 30}ms">${esc(letter)}</div>`).join('');
    const mins = String(Math.floor((vD.timeLeft || 0) / 60)).padStart(1, '0');
    const secs = String((vD.timeLeft || 0) % 60).padStart(2, '0');
    const tCls = vD.timeLeft <= 10 ? 'urgent' : vD.timeLeft <= 25 ? 'warn' : '';
    return `
    <div class="v-layout">
        <div class="v-hdr">
            <div class="v-title">BOGGLE PARTY</div>
            <div class="v-hdr-right">
                <div class="v-hdr-round">Round ${vD.round} / ${vD.roundsTarget}</div>
                <div class="v-hdr-code">${esc(vD.roomCode || '')}</div>
                <button class="v-fs-btn" onclick="toggleFullscreen()">⛶</button>
            </div>
        </div>
        <div class="v-body">
            <div class="v-board-panel">
                <div class="v-board-wrap">
                    <div class="v-board" style="--n:${n}">${tiles}</div>
                    <div class="v-timer-row">
                        <div class="v-timer ${tCls}" id="v-timer">${mins}:${secs}</div>
                        <div class="v-timebar"><div id="v-timebar" style="width:${(Math.max(0, vD.timeLeft / vD.duration) * 100).toFixed(1)}%"></div></div>
                    </div>
                </div>
                <div class="v-count" id="v-count"></div>
            </div>
            <div class="v-side">
                <div class="v-side-lbl">Leaderboard</div>
                <div id="v-lb" style="display:flex;flex-direction:column;gap:inherit;min-height:0;overflow:hidden">${viewerLeaderboardHTML()}</div>
                <div class="v-side-lbl" style="margin-top:clamp(6px,1.2vh,12px)">Live finds</div>
                <div class="v-feed" id="v-feed">${feedHTML()}</div>
            </div>
            ${viewerOverlayHTML()}
        </div>
    </div>`;
}

let _lastCount = -1;
function patchViewer(st) {
    const t = $id('v-timer'), bar = $id('v-timebar'), feed = $id('v-feed');
    if (!t) { render(); return; }
    const mins = String(Math.floor((st.timeLeft || 0) / 60)).padStart(1, '0');
    const secs = String((st.timeLeft || 0) % 60).padStart(2, '0');
    t.textContent = `${mins}:${secs}`;
    t.className = 'v-timer ' + (st.timeLeft <= 10 ? 'urgent' : st.timeLeft <= 25 ? 'warn' : '');
    if (bar) bar.style.width = (Math.max(0, st.timeLeft / st.duration) * 100).toFixed(1) + '%';
    if (st.timeLeft <= st.duration / 2) musicIntensity = 2;   // second half: full mix
    // Final-10-seconds mode: dim the board, giant countdown, heartbeat
    const layout = document.querySelector('.v-layout');
    const count = $id('v-count');
    const final = st.timeLeft <= 10 && st.timeLeft > 0;
    if (layout) layout.classList.toggle('v-final', final);
    if (count) {
        if (final && _lastCount !== st.timeLeft) {
            count.innerHTML = `<span class="v-count-num">${st.timeLeft}</span>`;
            sHeartbeat();
        } else if (!final) count.innerHTML = '';
        _lastCount = final ? st.timeLeft : -1;
    }
    updateViewerLb();
    if (feed) {
        // Prepend only NEW events so existing rows never re-animate (no flashing)
        const lastId = Number(feed.firstElementChild?.dataset.fid ?? 0);
        const fresh = (vD.feed || []).filter(ev => (ev.id ?? 0) > lastId);
        fresh.forEach(ev => {
            feed.insertAdjacentHTML('afterbegin', feedItemHTML(ev));
            if (ev.t === 'word' && ev.len >= 6) sGood(ev.pts);   // big-word stinger on the TV
        });
        while (feed.children.length > 12) feed.lastElementChild.remove();
    }
}

// INIT
// ═══════════════════════════════════════════
window.addEventListener('resize', () => { if (ui === 'game') updateTrail(); });

(function init() {
    const params = new URLSearchParams(location.search);
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    spawnLetterField();
    render();
    if (ui === 'game') renderPrankBar();
})();
</script>
