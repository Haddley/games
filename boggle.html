<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Boggle</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0f' width='100' height='100' rx='20'/><rect x='12' y='12' width='76' height='76' rx='14' fill='%231e1e2e' stroke='%23f59e0b' stroke-width='4'/><text x='50' y='68' font-size='50' text-anchor='middle'>🔤</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #14141f;
            --s2: #1a1a2a;
            --border: #2a2a3a;
            --text: #ffffff;
            --muted: #6b6b8a;
            --accent: #f59e0b;
            --ag: rgba(245,158,11,0.2);
            --danger: #ef4444;
            --dg: rgba(239,68,68,0.2);
            --success: #4ade80;
        }

        body.day {
            --bg: #f5f4ef;
            --surface: #ffffff;
            --s2: #edede7;
            --border: #d4d4cc;
            --text: #1a1a2a;
            --muted: #6b6b7a;
            --accent: #d97706;
            --ag: rgba(217,119,6,0.15);
            --danger: #dc2626;
            --dg: rgba(220,38,38,0.15);
            --success: #16a34a;
        }
        body.day::before {
            background:
                radial-gradient(ellipse at 15% 10%, rgba(217,119,6,0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 90%, rgba(220,38,38,0.05) 0%, transparent 55%);
        }
        body.day .hdr h1 {
            filter: drop-shadow(0 0 12px rgba(217,119,6,0.2));
        }
        /* Viewer always stays dark */
        body.day.viewer-mode {
            --bg: #05050a;
            --surface: #14141f;
            --s2: #1a1a2a;
            --border: #2a2a3a;
            --text: #ffffff;
            --muted: #6b6b8a;
            --accent: #f59e0b;
            --ag: rgba(245,158,11,0.2);
            --danger: #ef4444;
            --dg: rgba(239,68,68,0.2);
            --success: #4ade80;
        }

        /* ── Theme toggle button ── */
        .theme-toggle {
            position: fixed; top: 14px; right: 14px; z-index: 1000;
            background: var(--s2); border: 1px solid var(--border);
            color: var(--text); border-radius: 8px;
            width: 38px; height: 38px; font-size: 1.1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: border-color .15s, background .15s;
        }
        .theme-toggle:hover { border-color: var(--accent); }
        body.viewer-mode .theme-toggle { display: none; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 14px 48px;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 15% 10%, rgba(245,158,11,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 90%, rgba(239,68,68,0.07) 0%, transparent 55%);
            pointer-events: none; z-index: -1;
        }

        #app { width: 100%; max-width: 480px; }

        /* ── Header ── */
        .hdr { text-align: center; margin-bottom: 20px; padding-top: 4px; }
        .hdr h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.4rem, 6vw, 2rem);
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 16px rgba(245,158,11,0.3));
        }
        .hdr .sub { color: var(--muted); font-size: 0.7rem; letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .card.highlight { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 24px var(--ag); }

        /* ── Buttons ── */
        .btn {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600; font-size: .875rem; letter-spacing: 1px;
            padding: 13px 20px; border-radius: 8px; border: none;
            cursor: pointer; transition: all .15s ease;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(.97); }
        .btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
        .btn-full { width: 100%; }
        .btn-p { background: var(--accent); color: #0a0a0f; box-shadow: 0 4px 14px var(--ag); }
        .btn-p:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-d { background: var(--danger); color: #fff; box-shadow: 0 4px 14px var(--dg); }
        .btn-d:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-g { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-g:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm { padding: 8px 14px; font-size: .78rem; }
        .btn-icon { background: var(--s2); color: var(--text); border: 1px solid var(--border); width: 42px; height: 42px; padding: 0; font-size: 1.1rem; border-radius: 8px; }
        .btn-icon:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }

        /* ── Inputs ── */
        .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .fg label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .fg input {
            background: var(--s2); border: 1px solid var(--border); border-radius: 8px;
            padding: 11px 14px; color: var(--text);
            font-family: 'JetBrains Mono', monospace; font-size: .9rem;
            outline: none; transition: border-color .15s;
            -webkit-appearance: none; appearance: none;
        }
        .fg input:focus { border-color: var(--accent); }
        .fg input::placeholder { color: var(--muted); }

        /* ── Toggle ── */
        .tog-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 4px 0; }
        .tog-label { font-size: .83rem; }
        .tog-desc { font-size: .68rem; color: var(--muted); margin-top: 2px; }
        .tog { position: relative; width: 42px; height: 22px; flex-shrink: 0; }
        .tog input { opacity: 0; width: 0; height: 0; }
        .tog-track { position: absolute; inset: 0; background: var(--border); border-radius: 11px; cursor: pointer; transition: background .2s; }
        .tog-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: var(--muted); border-radius: 50%; transition: all .2s; }
        .tog input:checked + .tog-track { background: var(--accent); }
        .tog input:checked + .tog-track::after { transform: translateX(20px); background: #0a0a0f; }

        /* ── Room code ── */
        .room-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem; font-weight: 900; letter-spacing: 8px;
            color: var(--accent); text-align: center;
            background: var(--s2); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px; margin: 12px 0;
        }
        .share-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }

        /* ── Player chips ── */
        .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
        .chip {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 10px; border-radius: 20px;
            border: 1px solid var(--border); background: var(--s2);
            font-size: .75rem; color: var(--muted); transition: all .2s;
        }
        .chip.you { border-color: rgba(245,158,11,.5); color: var(--text); }

        /* ── Section label ── */
        .slbl { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .slbl-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

        /* ── Status banner ── */
        .status { text-align: center; padding: 10px; border-radius: 8px; font-size: .82rem; color: var(--muted); background: var(--s2); border: 1px solid var(--border); margin-bottom: 14px; }

        /* ── Info row ── */
        .info-row { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); margin-bottom: 4px; }
        .info-row strong { color: var(--text); }

        /* ── Divider ── */
        hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

        /* ── Game over ── */
        .trophy { text-align: center; padding: 12px 0; }
        .trophy .icon { font-size: 3.5rem; margin-bottom: 10px; }
        .trophy .w-name { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; color: var(--accent); letter-spacing: 3px; }
        .trophy .w-sub { color: var(--muted); font-size: .75rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .rankings { display: flex; flex-direction: column; gap: 7px; margin: 14px 0; }
        .rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--s2); border-radius: 8px; border: 1px solid var(--border); font-size: .88rem; }
        .rank-num { font-family: 'Orbitron', sans-serif; font-size: .95rem; font-weight: 700; width: 26px; color: var(--muted); }
        .rank-num.g { color: #f59e0b; } .rank-num.s { color: #94a3b8; } .rank-num.b { color: #b45309; }

        /* ── Spinner ── */
        .spin { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Connecting ── */
        .connecting { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 30px 20px; }

        /* ── Error ── */
        .err { color: var(--danger); font-size: .78rem; padding: 8px 12px; background: var(--dg); border: 1px solid var(--danger); border-radius: 8px; margin-top: 8px; }

        /* ── Player list in lobby ── */
        .player-list { display: flex; flex-direction: column; gap: 7px; margin: 10px 0; }
        .player-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--s2); border-radius: 8px; border: 1px solid var(--border); font-size: .85rem; }
        .player-row .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
        .player-row.host-row { border-color: rgba(245,158,11,.3); }

        /* ── Confetti ── */
        .confetti { position: fixed; top: -20px; width: 10px; height: 10px; border-radius: 2px; z-index: 9999; pointer-events: none; }
        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
        }

        /* ══════════════════════════════════════════
           VIEWER MODE CSS
        ══════════════════════════════════════════ */
        body.viewer-mode {
            padding: 0; overflow: hidden;
            display: block;
            height: 100dvh; width: 100vw;
        }
        body.viewer-mode #app { max-width: none; width: 100vw; height: 100dvh; }

        .v-screen {
            position: fixed; inset: 0;
            background: #05050a;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* ── Viewer header ── */
        .v-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: clamp(10px,2vh,20px) clamp(16px,3vw,40px);
            border-bottom: 1px solid rgba(245,158,11,0.15);
            flex-shrink: 0; position: relative; z-index: 10;
        }
        .v-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem,3vw,2rem);
            font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .v-header-code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.9rem,2vw,1.3rem);
            color: var(--accent); letter-spacing: 4px;
        }
        .v-header-sub {
            font-size: clamp(0.7rem,1.5vw,0.9rem);
            color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
        }
        .v-fs-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--muted); font-size: clamp(1rem,2vw,1.4rem);
            width: 2.2em; height: 2.2em; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .15s; flex-shrink: 0; padding: 0; line-height: 1;
        }
        .v-fs-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── Viewer lobby ── */
        .v-lobby-screen {
            position: fixed; inset: 0; background: #05050a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: clamp(16px,3vh,32px); padding: 40px; z-index: 1;
        }
        .v-lobby-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem,7vw,5rem); font-weight: 900; letter-spacing: 6px;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; text-align: center;
        }
        .v-lobby-code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem,8vw,6rem); font-weight: 900; color: var(--accent);
            letter-spacing: 10px; text-align: center;
        }
        .v-lobby-waiting { font-size: clamp(0.75rem,1.5vw,1rem); color: var(--muted); text-transform: uppercase; letter-spacing: 3px; }

        /* ── Gameover animations ── */
        @keyframes trophyBounce {
            0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
            60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes winnerSlide {
            0%   { transform: translateY(40px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideIn {
            0%   { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .v-gameover-trophy { font-size: clamp(3rem,8vw,6rem); animation: trophyBounce .8s cubic-bezier(.34,1.56,.64,1) both; }
        .v-gameover-winner {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem,6vw,5rem); font-weight: 900; color: var(--accent);
            letter-spacing: 4px; text-align: center;
            animation: winnerSlide .6s .3s ease-out both;
        }
        .v-gameover-sub { font-size: clamp(0.8rem,2vw,1.3rem); color: var(--muted); text-transform: uppercase; letter-spacing: 4px; animation: winnerSlide .6s .5s ease-out both; }
        .v-gameover-rankings { display: flex; flex-direction: row; gap: clamp(8px,2vw,20px); flex-wrap: wrap; justify-content: center; animation: slideIn .6s .7s ease-out both; }
        .v-rank-chip { display: flex; align-items: center; gap: 8px; background: rgba(26,26,42,0.9); border: 1px solid #2a2a3a; border-radius: 8px; padding: 8px 16px; font-size: clamp(0.7rem,1.3vw,0.9rem); }
        .v-rank-medal { font-size: 1.2rem; }

        /* ── Phase overlays ── */
        .v-overlay {
            position: absolute; inset: 0; z-index: 50;
            background: rgba(5,5,10,0.88);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: clamp(12px,2.5vh,28px); padding: clamp(20px,4vw,60px);
        }
        @keyframes resultPop {
            0%   { transform: scale(0.5); opacity: 0; }
            70%  { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); }
        }
        .v-reveal-headline {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem,5vw,4rem);
            font-weight: 900; letter-spacing: 3px; text-align: center;
            animation: resultPop .6s cubic-bezier(.34,1.56,.64,1) both;
            color: var(--success);
        }

        /* ══════════════════════════════════════════
           VIEWER TV LAYOUT (Step 13)
        ══════════════════════════════════════════ */

        /* ── Main layout ── */
        .v-layout {
            position: fixed; inset: 0; background: #05050a;
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 1fr;
            overflow: hidden;
        }

        /* ── Header ── */
        .v-hdr {
            display: flex; align-items: center; justify-content: space-between;
            padding: clamp(8px,1.5vh,16px) clamp(16px,3vw,40px);
            border-bottom: 1px solid rgba(245,158,11,0.15);
            grid-column: 1; grid-row: 1;
        }
        .v-hdr-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem,3vw,2.2rem); font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .v-hdr-code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.9rem,2vw,1.4rem); color: var(--accent); letter-spacing: 6px;
        }
        .v-hdr-right { display: flex; align-items: center; gap: clamp(8px,1.5vw,20px); }
        .v-hdr-round { font-size: clamp(0.6rem,1.2vw,0.85rem); color: var(--muted);
                       text-transform: uppercase; letter-spacing: 2px; }

        /* ── Body: board + sidebar ── */
        .v-body {
            display: grid;
            grid-template-columns: 1fr clamp(200px, 28vw, 360px);
            grid-row: 2;
            overflow: hidden;
            position: relative;
        }

        /* ── Board panel ── */
        .v-board-panel {
            display: flex; align-items: center; justify-content: center;
            padding: clamp(12px,2vw,32px);
        }
        .v-board-grid {
            display: grid; grid-template-columns: repeat(4,1fr);
            gap: clamp(4px,0.8vw,12px);
            width: min(45vh, 44vw);
        }
        .v-tile {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: clamp(6px,1vw,14px);
            font-family: Arial, Helvetica, sans-serif;
            font-size: clamp(1.8rem,6vw,4.8rem); font-weight: 900;
            background: var(--s2); border: 2px solid var(--border);
            color: var(--text);
        }
        .v-tile.qu { font-size: clamp(1.2rem,4vw,3.2rem); }

        /* ── Sidebar ── */
        .v-sidebar {
            border-left: 1px solid rgba(245,158,11,0.12);
            display: flex; flex-direction: column;
            padding: clamp(10px,1.5vh,20px) clamp(10px,1.5vw,20px);
            gap: clamp(6px,1vh,12px); overflow-y: auto;
        }
        .v-player-row {
            display: flex; flex-direction: column; gap: 5px;
            padding: clamp(8px,1.2vh,14px) clamp(10px,1.2vw,14px);
            background: var(--s2); border: 1px solid var(--border); border-radius: 10px;
            transition: border-color .3s;
        }
        .v-player-row.leader { border-color: rgba(245,158,11,0.5); }
        .v-player-top { display: flex; justify-content: space-between; align-items: baseline; }
        .v-player-name { font-size: clamp(0.75rem,1.5vw,1rem); font-weight: 700;
                         white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%; }
        .v-player-score { font-family: 'Orbitron', sans-serif;
                          font-size: clamp(0.85rem,1.8vw,1.2rem); color: var(--accent); font-weight: 700; }
        .v-word-bar { height: clamp(4px,0.6vh,7px); background: var(--border); border-radius: 3px; overflow: hidden; }
        .v-word-fill { height: 100%; background: var(--accent); border-radius: 3px;
                       transition: width .5s ease; opacity: .7; }
        .v-player-meta { font-size: clamp(0.55rem,1vw,0.72rem); color: var(--muted); }

        /* ── Footer timer ── */
        .v-footer {
            grid-row: 3; grid-column: 1;
            display: flex; align-items: center; gap: clamp(10px,2vw,28px);
            padding: clamp(6px,1.2vh,14px) clamp(16px,3vw,40px);
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(5,5,10,0.6);
        }
        .v-timer {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem,3.5vw,2.5rem); font-weight: 900;
            color: var(--accent); letter-spacing: 2px; flex-shrink: 0;
            transition: color .3s;
        }
        .v-timer.urgent { color: var(--danger); animation: timerPulse .6s ease-in-out infinite; }
        .v-phase-label { font-size: clamp(0.6rem,1.2vw,0.85rem); color: var(--muted);
                         text-transform: uppercase; letter-spacing: 3px; flex-shrink: 0; }

        /* ── Overlay (scoring / results / gameover) ── */
        .v-overlay {
            position: absolute; inset: 0; z-index: 50;
            background: rgba(5,5,10,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: clamp(12px,2.5vh,28px); padding: clamp(20px,4vw,60px);
        }

<script>
// TURN relay (Metered) so players on restrictive/remote networks can connect,

const ICE_CFG = { config: { iceServers: [
    { urls: 'stun:stun.relay.metered.ca:80' },
    { urls: 'turn:standard.relay.metered.ca:80', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' },
    { urls: 'turn:standard.relay.metered.ca:80?transport=tcp', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' },
    { urls: 'turn:standard.relay.metered.ca:443', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' },
    { urls: 'turns:standard.relay.metered.ca:443?transport=tcp', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' }
] } };

'use strict';
// ══════════════════════════════════════════
// BOGGLE — Steps 1 & 2: Shell + Home Screen
// ══════════════════════════════════════════

// ══════════════════════════════════════════
// STEP 5: Board Generation
// ══════════════════════════════════════════

const DICE = [
    'AAEEGN','ELRTTY','AOOTTW','ABBJOO',
    'EHRTVW','CIMOTU','DISTTY','EIOSST',
    'DELRVY','ACHOPS','HIMNQU','EEINSU',
    'EEGHNW','AFFKPS','HLNNRZ','DEILRX',
];

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function rollBoard() {
    return shuffle(DICE).map(faces => {
        const letter = faces[Math.floor(Math.random() * faces.length)];
        return letter === 'Q' ? 'Qu' : letter;
    });
}

// ── Peer / network ──
let peer       = null;
let myId       = '';
let myName     = '';
let isHost     = false;
let roomCode   = '';
let hostConn   = null;      // guest/viewer → host
let guestConns = {};        // host: { peerId: DataConnection }
let viewerConns= {};        // host: { peerId: DataConnection }

// ── UI State ──
let ui      = 'home'; // home | creating | connecting | lobby_h | lobby_g | game | scoring | results | gameover | viewer
let uiErr   = '';
let fName   = localStorage.getItem('boggle-name') || '';
let fCode   = '';
let fVCode  = '';
let fRounds = 5;      // 3 | 5 | 10
let isViewer = false;
let simTvHost = false; // simulation: this screen runs the host flow but renders the TV view
let vD       = null;  // viewer display state (driven by host)

// ── Client display state (driven by host) ──
let D = null;

// ── Host-only authoritative state ──
let H = {
    players:      [],      // [{id, name, words:[], roundScore:0, totalScore:0}]
    phase:        'lobby', // lobby | playing | scoring | results | gameover
    board:        [],      // 16-element flat array
    timeLeft:     180,
    roundsTarget: 5,
    currentRound: 0,
    roundResults: null,
    winner:       null,
};

// ── Helpers ──
function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hdrHTML(sub) {
    return `<div class="hdr"><h1>BOGGLE</h1><p class="sub">${esc(sub || 'Word Search Game')}</p></div>`;
}

// ═══════════════════════════════════════════
// AUDIO — procedural "wordsmith's study" music + SFX
// (thoughtful E-minor/G-major lounge: triangle
//  walking bass, mellow leads, soft brushes —
//  the calm sibling of boggleparty's arcade set.
//  Gesture-started, music ~0.3 vol, SFX on top)
// ═══════════════════════════════════════════
let AC = null, masterGain = null, musicGain = null, sfxGain = null, noiseBuf = null;
let leadBus = null, musicDelay = null;
let musicOn = localStorage.getItem('boggle-music') !== '0';
let sfxOn   = localStorage.getItem('boggle-sfx')   !== '0';
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function ac() {
    if (!AC) {
        try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
        masterGain = AC.createGain(); masterGain.gain.value = 1; masterGain.connect(AC.destination);
        musicGain  = AC.createGain(); musicGain.gain.value = musicOn ? 0.3 : 0; musicGain.connect(masterGain);
        sfxGain    = AC.createGain(); sfxGain.gain.value   = sfxOn   ? 0.55 : 0; sfxGain.connect(masterGain);
        // Lead bus with a soft echo — a quiet study, not an arcade PCB
        leadBus = AC.createGain(); leadBus.gain.value = 1; leadBus.connect(musicGain);
        musicDelay = AC.createDelay(1.5); musicDelay.delayTime.value = 0.31;
        const fb  = AC.createGain(); fb.gain.value = 0.2;
        const dlp = AC.createBiquadFilter(); dlp.type = 'lowpass'; dlp.frequency.value = 1900;
        const wet = AC.createGain(); wet.gain.value = 0.18;
        leadBus.connect(musicDelay); musicDelay.connect(dlp); dlp.connect(fb); fb.connect(musicDelay);
        dlp.connect(wet); wet.connect(musicGain);
        const len = AC.sampleRate * 1.2;
        noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    if (AC.state === 'suspended') AC.resume();
    return AC;
}

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide, 20), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    if (lp) {
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
        o.connect(f); f.connect(g);
    } else {
        o.connect(g);
    }
    g.connect(dest || sfxGain);
    o.start(t); o.stop(t + dur + 0.06);
}

function noiseHit(dur, { vol = 0.3, when = 0, hp = 6000, dest = null } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const src = AC.createBufferSource(); src.buffer = noiseBuf;
    const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(dest || sfxGain);
    src.start(t); src.stop(t + dur + 0.05);
}

const mf = m => 440 * Math.pow(2, (m - 69) / 12); // midi → freq

// ── SFX (study palette: pencil ticks, warm triangle chimes — never harsh) ──
// E-minor pentatonic ladder for tile taps: pitch climbs with word length
const PENTA = [0, 3, 5, 7, 10, 12, 15, 17, 19, 22, 24, 27, 29, 31, 34, 36];
function sTick(n) {
    if (!sfxOn || !AC) return;
    const m = 62 + (PENTA[Math.min(Math.max(n, 0), PENTA.length - 1)] || 0);
    tone(mf(m), 0.06, { type: 'triangle', vol: 0.2, slide: mf(m) * 1.12 });
    noiseHit(0.02, { vol: 0.035, hp: 8500 }); // pencil-on-paper tick
}
// Soft thud: tapping a non-adjacent (disabled) tile
function sReject() { if (!sfxOn || !AC) return; tone(110, 0.09, { type: 'sine', vol: 0.14, slide: 70 }); }
function sJoin() {
    if (!sfxOn || !AC) return;
    tone(mf(64), 0.08, { type: 'triangle', vol: 0.22 });
    tone(mf(71), 0.15, { type: 'triangle', vol: 0.22, when: 0.07 });
}
// Word accepted: warm coin chime on G, grows with the word's point value
function sGood(pts) {
    if (!sfxOn || !AC) return;
    const steps = pts >= 11 ? [0, 4, 7, 12, 16, 19, 24] : pts >= 5 ? [0, 4, 7, 12, 16] : pts >= 2 ? [0, 4, 7, 12] : [0, 7, 12];
    steps.forEach((s, i) => tone(mf(79 + s), 0.1, { type: 'triangle', vol: 0.27, when: i * 0.055 }));
    if (pts >= 5) noiseHit(0.25, { vol: 0.1, when: steps.length * 0.055, hp: 8000 });
}
// Duplicate word: gentle B/Bb wobble
function sDupe() {
    if (!sfxOn || !AC) return;
    tone(mf(71), 0.07, { type: 'triangle', vol: 0.18 });

let musicTrack = 'lobby', musicStep = 0, musicBar = 0, musicNext = 0, musicTimer = null, musicUrgent = false;
// Adaptive arrangement: 1 = stripped-back round focus, 2 = full mix; key lifts a whole step for the final round
let musicIntensity = 2, musicKeyShift = 0;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Swing: push every off-16th slightly late for a looser lounge feel
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) tone(140, 0.22, { type: 'sine', vol: 0.4, when: rel, slide: 44, dest: musicGain });
    if (tr.hat[i]) {
        const hv = (i % 4 === 2 ? 0.1 : 0.05) * (0.8 + Math.random() * 0.4);
        noiseHit(0.045, { vol: hv, when: rel, hp: 9500, dest: musicGain }); // brushed
    }
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) tone(mf(b + k), stepDur * 1.6, { type: w.bass || 'triangle', vol: 0.3, when: rel, dest: musicGain, lp: 1000, attack: 0.006 });
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    if (tr.stab && tr.stab[i] && ch && full)
        ch.forEach(m => tone(mf(m + 12 + k), stepDur * 0.9, { type: w.stab || 'sine', vol: 0.035, when: rel, lp: 2600, dest: musicGain, attack: 0.005 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12; // final-10s lift: lead up an octave
        tone(mf(l + k), stepDur * 1.5, { type: w.lead || 'triangle', vol: 0.13 * (0.9 + Math.random() * 0.2), when: rel, dest: leadBus, lp: tr.leadLp || 3400, attack: 0.006 });
    }
    // Music-box shimmer two octaves above the pads
    if (tr.arp && i % tr.arp === 0 && ch && full)
        tone(mf(ch[(i / tr.arp) % ch.length] + 24 + k), stepDur * tr.arp * 0.9, { type: w.arpW || 'sine', vol: 0.04, when: rel, lp: 5200, dest: musicGain, attack: 0.004 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.035, { vol: 0.1, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    musicIntensity = track === 'game' ? 1 : 2;  // rounds open stripped back; tickUrgency fills in
    if (track === 'lobby' || track === 'over') musicKeyShift = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'game') musicUrgent = false;
    // one-beat snare fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) noiseHit(0.06, { vol: 0.1 + f * 0.035, when: f * s, hp: 2800 + f * 900, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}

// Urgency (final 10s): lifts the music + one tick per host second
function tickUrgency(timeLeft) {
    const u = timeLeft <= 10 && timeLeft > 0;
    musicUrgent = u;
    // Second half of the round: bring the stab + shimmer layers back in
    if (timeLeft > 0 && timeLeft <= 90) musicIntensity = Math.max(musicIntensity, 2);
    if (u) sUrgent();
}

function toggleMusic() {
    musicOn = !musicOn;
    localStorage.setItem('boggle-music', musicOn ? '1' : '0');
    if (!AC && musicOn) { ac(); startMusicLoop(); }
    if (AC && musicGain) musicGain.gain.linearRampToValueAtTime(musicOn ? 0.3 : 0, AC.currentTime + 0.2);
    document.getElementById('tog-music').classList.toggle('off', !musicOn);

// ── Particle bursts + floating score text ──
function burst(x, y, colors, n = 14) {
    if (REDUCED) return;
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;
        p.style.cssText = `left:${x}px;top:${y}px;background:${colors[i % colors.length]};` +
            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}
function popText(x, y, text, cls = 'good') {
    const el = document.createElement('div');
    el.className = 'pop ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1150);
}

let _lastUi = '', _lastVPhase = '';
function render() {
    const app = document.getElementById('app');
    // In tv-simulation the host flow drives the game but the big screen always shows the TV view
    if (simTvHost && ui !== 'home' && ui !== 'creating') ui = 'viewer';
    const vphase = ui === 'viewer' ? (vD?.phase || '') : '';
    const fresh = ui !== _lastUi || vphase !== _lastVPhase;
    _lastUi = ui; _lastVPhase = vphase;
    let html = '';
    switch (ui) {
        case 'home':       html = renderHome();       break;
        case 'creating':   html = renderSpinner('Setting up room\u2026');    break;
        case 'connecting': html = renderSpinner('Connecting to room\u2026'); break;
        case 'lobby_h':    html = renderLobbyH();  break;
        case 'lobby_g':    html = renderLobbyG();  break;
        case 'viewer':     html = renderViewer();  break;
        case 'game':       html = renderGame();   break;
        case 'scoring':    html = renderScoring(); break;
        case 'results':    html = renderResults(); break;
        case 'gameover':   html = renderGameOver(); break;
        default:           html = renderHome();
    }
    app.innerHTML = html;
    app.classList.toggle('fresh', fresh);
}

// ══════════════════════════════════════════
// STEP 3: PeerJS Connection Layer
// ══════════════════════════════════════════

// ── Helpers ──
function send(conn, msg) {
    try { conn.send(msg); } catch(e) { console.warn('send err', e); }
}

function broadcast(msg) {
    Object.values(guestConns).forEach(c => send(c, msg));
}

function broadcastViewers(msg) {
    Object.values(viewerConns).forEach(c => send(c, msg));
}

// ── Host: add player to H ──
function hostAddPlayer(id, name) {
    if (H.players.find(p => p.id === id)) return;
    H.players.push({ id, name, words: [], roundScore: 0, totalScore: 0 });
}

// ── Host: broadcast lobby state to all guests + viewers ──
function broadcastLobby() {
    const players = H.players.map(p => p.name);
    broadcast({ type: 'lobby', players, roomCode, roundsTarget: H.roundsTarget });
    broadcastViewers({ type: 'viewer_lobby', players, roomCode });
    render();
}

// ── Host: incoming connection handler ──
function setupGuestConn(conn) {
    conn.on('open', () => {
        conn._role = null;
    });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            if (H.phase === 'lobby') {
                send(conn, { type: 'viewer_lobby', players: H.players.map(p => p.name), roomCode });
            }
            return;
        }

        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }

        switch (msg.type) {
            case 'join': {
                // Reconnect: reuse slot if same name, disconnected peer
                const zombie = H.players.find(
                    p => p.name === msg.name && p.id !== conn.peer && !guestConns[p.id]
                );
                if (zombie) {
                    zombie.id = conn.peer;
                } else {
                    hostAddPlayer(conn.peer, msg.name);
                    if (H.phase === 'lobby') sJoin();
                }
                broadcastLobby();
                break;
            }
            case 'words': {
                const player = H.players.find(p => p.id === conn.peer);
                if (player) {
                    player._submitted = msg.payload;
                    hostCheckAllSubmitted();
                }
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        }
    });

    conn.on('error', e => console.warn('conn err', e));
}

// ── Host game ──
function hostGame(name, rounds) {
    myName = name.trim() || 'Host';
    localStorage.setItem('boggle-name', myName);
    H.roundsTarget = rounds;
    uiErr = '';
    ui = 'creating';
    render();

    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // no I/O
    const code = 'BOGGLE-' + Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    roomCode = code.replace('BOGGLE-', '');

    peer = new Peer(code, ICE_CFG);

    peer.on('open', id => {
        myId   = id;
        isHost = true;
        hostAddPlayer(myId, myName);
        loadDictionary(); // fire and forget — will be ready long before scoring
        ui = 'lobby_h';
        render();
    });

    peer.on('connection', conn => setupGuestConn(conn));

    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        ui = 'home';
        render();
    });
}

// ── Join game ──
function joinGame(code, name) {
    myName = name.trim() || 'Player';
    localStorage.setItem('boggle-name', myName);
    const pid = 'BOGGLE-' + code.trim().toUpperCase();
    uiErr = '';
    ui = 'connecting';
    render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId   = id;
        isHost = false;

        hostConn = peer.connect(pid, { reliable: true });

        hostConn.on('open', () => {
            send(hostConn, { type: 'join', name: myName });
        });

        hostConn.on('data', msg => {
            if (msg.type === 'lobby') {
                const prevN = D && D.phase === 'lobby' ? (D.players || []).length : -1;
                D = { phase: 'lobby', players: msg.players, roomCode: msg.roomCode, roundsTarget: msg.roundsTarget };
                ui = 'lobby_g';
                setMusic('lobby');
                if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
                render();
                return;
            }
            if (msg.type === 'game_state') {
                const prevPhase = D?.phase;
                // New round starting: clear local word state and flash
                if (msg.phase === 'playing' && (!D || D.currentRound !== msg.currentRound)) {
                    myWords         = [];
                    currentPath     = [];
                    _expandedPlayer = null;
                    showRoundFlash(msg.currentRound, msg.roundsTarget);
                }
                // Timer expired: submit words to host immediately (Step 9 collects them)
                if (msg.phase === 'scoring' && D?.phase === 'playing') {
                    currentPath = [];
                    send(hostConn, { type: 'words', payload: myWords });
                    sRoundEnd();
                }
                D = msg;
                if (msg.phase === 'playing') {
                    ui = 'game';
                    setMusic('game');
                    musicKeyShift = msg.currentRound >= (msg.roundsTarget ?? Infinity) ? 2 : 0; // final round plays a whole step up
                    tickUrgency(msg.timeLeft ?? 0);
                }
                else if (msg.phase === 'scoring')   { ui = 'scoring'; setMusic('results'); }
                else if (msg.phase === 'results') {
                    ui = 'results';
                    setMusic('results');
                    if (prevPhase !== 'results') sResults();
                }
                else if (msg.phase === 'gameover') {
                    ui = 'gameover';
                    setMusic('over');
                    if (prevPhase !== 'gameover') sWin();
                    confetti();
                }
                render();
            }
        });

        hostConn.on('close', () => {
            uiErr = 'Disconnected from host.';
            ui = 'home'; D = null; render();
        });

        hostConn.on('error', e => {
            uiErr = 'Could not connect: ' + e.message;
            ui = 'home'; render();
        });
    });

    peer.on('error', () => {
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'home'; render();
    });
}

// ── Join as viewer ──
function joinAsViewer(code, _attempt) {
    const pid = 'BOGGLE-' + code.trim().toUpperCase();
    const attempt = _attempt || 1;
    isViewer = true;
    uiErr = '';
    ui = 'connecting';
    render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(pid, { reliable: true });

        hostConn.on('open', () => {
            send(hostConn, { type: 'join_viewer' });
        });

        hostConn.on('data', msg => {
            if (msg.type === 'viewer_lobby') {
                const prevN = vD && vD.phase === 'lobby' ? (vD.players || []).length : -1;
                vD = { phase: 'lobby', players: msg.players, roomCode: msg.roomCode };
                ui = 'viewer';
                document.body.classList.add('viewer-mode');
                setMusic('lobby');
                if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
                render();
            } else if (msg.type === 'viewer_state') {
                const prevPhase  = vD?.phase;
                const prevRound  = vD?.currentRound;
                vD = msg;
                if (msg.phase === 'playing') {
                    setMusic('game');
                    musicKeyShift = msg.currentRound >= (msg.roundsTarget ?? Infinity) ? 2 : 0; // final round plays a whole step up
                    tickUrgency(msg.timeLeft ?? 0);
                }
                else if (msg.phase === 'scoring' || msg.phase === 'results') setMusic('results');
                else if (msg.phase === 'gameover') setMusic('over');
                if (prevPhase === 'playing' && msg.phase === 'scoring') sRoundEnd();
                if (prevPhase !== 'results' && msg.phase === 'results') sResults();
                if (prevPhase !== 'gameover' && msg.phase === 'gameover') { sWin(); confetti(); }
                if (msg.phase === 'playing' && prevRound !== msg.currentRound) {
                    showRoundFlash(msg.currentRound, msg.roundsTarget);
                }
                ui = 'viewer';
                document.body.classList.add('viewer-mode');
                render();
            }
        });

        hostConn.on('close', () => {
            uiErr = 'Disconnected from host.';
            isViewer = false; vD = null; ui = 'home'; render();
        });

        hostConn.on('error', e => {
            uiErr = 'Could not connect: ' + e.message;
            isViewer = false; ui = 'home'; render();
        });
    });

    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch(_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

function hostStartGame() {
    if (H.players.length < 2) return;
    uiErr = '';

    H.board        = rollBoard();
    H.phase        = 'playing';
    H.timeLeft     = 180;
    H.currentRound += 1;
    H.roundResults = null;

    // Reset per-round state
    H.players.forEach(p => { p.words = []; p.roundScore = 0; p._submitted = undefined; });
    myWords         = [];
    currentPath     = [];
    _expandedPlayer = null;

    broadcastGameState();
    startTimer();
    setMusic('game');
    musicKeyShift = H.currentRound >= H.roundsTarget ? 2 : 0; // final round plays a whole step up
    musicUrgent = false;
    ui = 'game';
    render();
    showRoundFlash(H.currentRound, H.roundsTarget);
}

function showRoundFlash(round, total) {
    // Remove any existing flash first
    document.getElementById('round-flash')?.remove();
    const el = document.createElement('div');
    el.id = 'round-flash';
    el.className = 'round-flash';
    el.innerHTML = `<div class="rf-round">Round ${round}</div>
        <div class="rf-sub">of ${total} &nbsp;&mdash;&nbsp; Go!</div>`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
    sRoundStart();
}

// ── Broadcast current game state to all guests + viewers ──
function broadcastGameState() {
    // Guests get the board + phase + timeLeft (no other players' words)
    H.players.forEach(p => {
        const conn = guestConns[p.id];
        if (!conn) return; // host player, no conn needed
        send(conn, {
            type:         'game_state',
            board:        H.board,
            phase:        H.phase,
            timeLeft:     H.timeLeft,
            currentRound: H.currentRound,
            roundsTarget: H.roundsTarget,
            players:      H.players.map(q => ({ name: q.name, wordCount: q.words.length, totalScore: q.totalScore })),
            roundResults: H.roundResults,
            winner:       H.winner,
        });
    });

    // Viewers get the same (Steps 13+ will render it)
    const viewerState = {
        type:         'viewer_state',
        board:        H.board,
        phase:        H.phase,
        timeLeft:     H.timeLeft,
        currentRound: H.currentRound,
        roundsTarget: H.roundsTarget,
        roomCode,
        players:      H.players.map(p => ({ name: p.name, wordCount: p.words.length, totalScore: p.totalScore })),
        roundResults: H.roundResults,
        winner:       H.winner,
    };
    Object.values(viewerConns).forEach(c => send(c, viewerState));
}

// ══════════════════════════════════════════
// STEP 8: Host-Authoritative Timer
// ══════════════════════════════════════════

let _timerInterval = null;

function startTimer() {
    clearInterval(_timerInterval);
    _timerInterval = setInterval(() => {
        H.timeLeft--;
        broadcastGameState();
        if (H.timeLeft > 0) tickUrgency(H.timeLeft);  // host's own urgency lift + tick
        if (isHost) render();          // update host's own timer display each second
        if (H.timeLeft <= 0) {
            clearInterval(_timerInterval);
            H.phase = 'scoring';
            broadcastGameState();      // push 'scoring' phase to all clients
            setMusic('results');
            sRoundEnd();
            if (isHost) { ui = 'scoring'; render(); hostCollectWords(); }
        }
    }, 1000);
}

// STEP 6: Board CSS render — Player View
// ══════════════════════════════════════════

// currentPath: array of tile indices making up the in-progress word
let currentPath = [];
// myWords: the current player's submitted words for this round (local)
let myWords = [];

function tileState(idx) {
    if (currentPath.length === 0) return 'default';
    const pos = currentPath.indexOf(idx);
    if (pos === currentPath.length - 1) return 'selected';
    if (pos >= 0)                        return 'in-path';

    // disabled if path is started and this tile is not adjacent to the last selected
    if (currentPath.length > 0) {
        const last = currentPath[currentPath.length - 1];
        const lr = Math.floor(last / 4), lc = last % 4;
        const tr = Math.floor(idx  / 4), tc = idx  % 4;
        if (Math.abs(lr - tr) <= 1 && Math.abs(lc - tc) <= 1) return 'default';
        return 'disabled';
    }
    return 'default';
}

function renderBoard(board) {
    return board.map((letter, idx) => {
        const state = tileState(idx);
        const pathPos = currentPath.indexOf(idx);
        const isQu = letter === 'Qu';
        const badge = pathPos >= 0
            ? `<span class="path-num">${pathPos + 1}</span>`
            : '';
        return `<div class="tile ${state}${isQu ? ' qu' : ''}" style="--i:${idx}" onclick="tapTile(${idx})">${badge}${esc(letter)}</div>`;
    }).join('');
}

function currentWord() {
    const board = isHost ? H.board : (D?.board || []);
    return currentPath.map(i => board[i]).join('').toUpperCase();
}

function renderGame() {
    const board      = isHost ? H.board        : (D?.board        || []);
    const timeLeft   = isHost ? H.timeLeft     : (D?.timeLeft     ?? 180);
    const round      = isHost ? H.currentRound : (D?.currentRound ?? 1);
    const total      = isHost ? H.roundsTarget : (D?.roundsTarget ?? 5);
    // For score strip: merge broadcast data, but show own live word count
    const players = (isHost
        ? H.players.map(p => ({ name: p.name, wordCount: p.words.length, totalScore: p.totalScore }))
        : (D?.players || [])
    ).map(p => p.name === myName ? { ...p, wordCount: myWords.length } : p);

    const mins = String(Math.floor(timeLeft / 60)).padStart(2, '0');
    const secs = String(timeLeft % 60).padStart(2, '0');
    const urgent = timeLeft <= 10;

    const scoreStrip = players.map(p =>
        `<div class="score-chip${p.name === myName ? ' you' : ''}">
            <div class="sc-name">${esc(p.name)}</div>
            <div class="sc-score">${p.totalScore}</div>
            <div class="sc-words">${p.wordCount} word${p.wordCount !== 1 ? 's' : ''}</div>
        </div>`
    ).join('');

    const word   = currentWord();
    const wordDisplay = word
        ? `<div class="current-word">${esc(word)}</div>`
        : `<div class="current-word empty">tap a tile to start</div>`;

    const pills = myWords.map(w =>
        `<div class="word-pill">${esc(w.toUpperCase())}</div>`
    ).join('');

    return `
    ${hdrHTML('Round ' + round + ' of ' + total)}
    <div class="timer-row">
        <div class="timer-val${urgent ? ' urgent' : ''}">${mins}:${secs}</div>
        <div class="round-badge">Round ${round} / ${total}</div>
    </div>
    <div class="score-strip">${scoreStrip}</div>
    <div class="board-grid">${renderBoard(board)}</div>
    ${wordDisplay}
    <div class="word-actions">
        <button class="btn btn-g" onclick="tapBackspace()" ${currentPath.length ? '' : 'disabled'}>&#x232B; Back</button>
        <button id="btn-submit" class="btn btn-p" onclick="tapSubmit()"
            ${word.length >= 3 ? '' : 'disabled'}>&#x2713; Submit</button>
    </div>
    <div class="slbl">${myWords.length} word${myWords.length !== 1 ? 's' : ''} found</div>
    <div class="word-list">${pills || '<span style="color:var(--muted);font-size:.76rem">No words yet</span>'}</div>`;
}

// ══════════════════════════════════════════
// STEP 7: Tap-to-Chain Interaction
// ══════════════════════════════════════════

function isAdjacent(a, b) {
    const ar = Math.floor(a / 4), ac = a % 4;
    const br = Math.floor(b / 4), bc = b % 4;
    return Math.abs(ar - br) <= 1 && Math.abs(ac - bc) <= 1 && a !== b;
}

function tapTile(idx) {
    // Already in path — ignore (can't revisit a tile)
    if (currentPath.includes(idx)) return;

    // Start a new path
    if (currentPath.length === 0) {
        currentPath = [idx];
        sTick(1);
        render();
        return;
    }

    // Must be adjacent to the last tile in the path
    const last = currentPath[currentPath.length - 1];
    if (!isAdjacent(last, idx)) { sReject(); return; }

    currentPath = [...currentPath, idx];
    sTick(currentPath.length);  // pitch climbs with word length
    render();
}

function tapBackspace() {
    if (currentPath.length === 0) return;
    currentPath = currentPath.slice(0, -1);
    sTick(Math.max(currentPath.length, 1));  // steps back down the ladder
    render();
}

function tapSubmit() {
    const word = currentWord();
    if (word.length < 3) return;

    // Silent duplicate rejection (case-insensitive)
    const lower = word.toLowerCase();
    const isNew = !myWords.includes(lower);
    if (isNew) {
        myWords = [...myWords, lower];
        // Host: keep H.players in sync so broadcastGameState has correct wordCount
        if (isHost) {
            const p = H.players.find(p => p.id === myId);
            if (p) p.words = myWords;
        }
    }

    currentPath = [];
    render();

    if (isNew) {
        // Coin chime + particle burst scaled by the word's (potential) points
        const pts = wordScore(lower);
        sGood(pts);
        const btn = document.getElementById('btn-submit');
        if (btn) {
            const r = btn.getBoundingClientRect();
            const cx = r.left + r.width / 2, cy = r.top;
            burst(cx, cy, ['#f59e0b', '#ef4444', '#4ade80', '#60a5fa'], 8 + Math.min(14, pts * 2));
            popText(cx, cy - 6, '+' + pts, pts >= 5 ? 'gold' : 'good');
        }
    } else {
        // Duplicate: wobble sound + shake the existing pill
        sDupe();
        const pills = document.querySelectorAll('.word-pill');
        for (const p of pills) {
            if (p.textContent === word.toUpperCase()) { p.classList.add('shake-x'); break; }
        }
    }
}

// ══════════════════════════════════════════
// STEP 9: Word Collection
// ══════════════════════════════════════════

let _collectTimeout = null;

function hostCollectWords() {
    // Host's own words are already in myWords; copy into H.players slot
    const hostPlayer = H.players.find(p => p.id === myId);
    if (hostPlayer) hostPlayer._submitted = myWords;

    // 3-second timeout: any guest that hasn't replied yet gets an empty list
    _collectTimeout = setTimeout(() => {
        H.players.forEach(p => {
            if (p._submitted === undefined) p._submitted = [];
        });
        hostRunScoring();
    }, 3000);

    // If all guests already replied (e.g. fast connections), go immediately
    hostCheckAllSubmitted();
}

function hostCheckAllSubmitted() {
    // Only guests need to submit; host slot is set in hostCollectWords
    const guests = H.players.filter(p => p.id !== myId);
    const allIn  = guests.every(p => p._submitted !== undefined);
    if (allIn && H.phase === 'scoring') {
        clearTimeout(_collectTimeout);
        hostRunScoring();
    }
}

// ══════════════════════════════════════════
// STEP 11: Dictionary Validation (Option A)
// ══════════════════════════════════════════

// null  = not yet loaded
// false = load failed (skip validation)
// Set   = ready
let dictionary = null;
let _dictLoading = false;

async function loadDictionary() {
    if (dictionary !== null || _dictLoading) return;
    _dictLoading = true;
    if (ui === 'lobby_h') render(); // show "Loading…" immediately
    try {
        const resp = await fetch('https://raw.githubusercontent.com/dolph/dictionary/master/enable1.txt');
        const text = await resp.text();
        dictionary = new Set(
            text.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length >= 3)
        );
        console.log(`Dictionary loaded: ${dictionary.size} words`);
    } catch (e) {
        console.warn('Dictionary load failed — skipping validation', e);
        dictionary = false;
    }
    _dictLoading = false;
    if (ui === 'lobby_h') render(); // update to "Ready" or "Unavailable"
}

const WORD_POINTS = { 3: 1, 4: 1, 5: 2, 6: 3, 7: 5 }; // 8+ → 11

function wordScore(word) {
    const len = word.replace('qu', 'qu').length; // 'qu' counts as 2 letters already
    if (len >= 8) return 11;
    return WORD_POINTS[len] ?? 0;
}

function hostRunScoring() {
    if (H.phase !== 'scoring') return;
    H.phase = 'results';

    // 1. Normalise all submissions to lowercase
    H.players.forEach(p => { p.words = (p._submitted || []).map(w => w.toLowerCase()); });

    // 2. Count how many players found each word
    const wordCount = {};
    H.players.forEach(p => {
        // Deduplicate within a single player's list first
        p.words = [...new Set(p.words)];
        p.words.forEach(w => { wordCount[w] = (wordCount[w] || 0) + 1; });
    });

    // 3 & 4. Score: dupes → 0, invalid → 0, unique valid words → length-based pts
    let roundResults = {};
    H.players.forEach(p => {
        let roundScore = 0;
        const scored = p.words.map(w => {
            const dupe    = wordCount[w] > 1;
            // dictionary === false means load failed: skip validation (treat as valid)
            const invalid = !dupe && dictionary instanceof Set && !dictionary.has(w);
            const pts     = (dupe || invalid) ? 0 : wordScore(w);
            roundScore += pts;
            return { word: w, pts, dupe, invalid };
        });
        // Sort: scoring words first (desc pts), then invalid, then dupes
        scored.sort((a, b) => {
            if (a.pts !== b.pts)     return b.pts - a.pts;
            if (a.dupe !== b.dupe)   return a.dupe ? 1 : -1;
            if (a.invalid !== b.invalid) return a.invalid ? 1 : -1;
            return a.word.localeCompare(b.word);
        });
        p.roundScore  = roundScore;
        p.totalScore += roundScore;
        roundResults[p.name] = { words: scored, roundScore, totalScore: p.totalScore };
    });

    // 5. Attach to H so broadcastGameState picks it up
    H.roundResults = roundResults;

    // 6. Determine winner if final round
    if (H.currentRound >= H.roundsTarget) {
        const sorted = [...H.players].sort((a, b) => b.totalScore - a.totalScore);
        H.winner  = sorted[0].name;
        H.phase   = 'gameover';
    }

    broadcastGameState();
    ui = H.phase === 'gameover' ? 'gameover' : 'results';
    setMusic(H.phase === 'gameover' ? 'over' : 'results');
    render();
    if (H.phase === 'gameover') { sWin(); confetti(); }
    else sResults();
}

function renderScoring() {
    const round      = isHost ? H.currentRound : (D?.currentRound ?? 1);
    const total      = isHost ? H.roundsTarget : (D?.roundsTarget ?? 5);
    const wordCount  = myWords.length;

    const pills = myWords.map(w =>
        `<div class="word-pill">${esc(w.toUpperCase())}</div>`
    ).join('');

    return `
    ${hdrHTML('Round ' + round + ' of ' + total)}
    <div class="card highlight" style="text-align:center;padding:28px 20px">
        <div style="font-size:2.5rem;margin-bottom:10px">&#x23F1;</div>
        <div style="font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;color:var(--accent);letter-spacing:3px">TIME'S UP</div>
        <div style="color:var(--muted);font-size:.78rem;margin-top:8px;letter-spacing:1px">
            ${isHost ? 'Collecting words from all players\u2026' : 'Words submitted \u2014 waiting for results\u2026'}
        </div>
    </div>
    <div class="card">
        <div class="slbl">Your words this round (${wordCount})</div>
        <div class="word-list" style="max-height:none">${pills || '<span style="color:var(--muted);font-size:.76rem">No words submitted</span>'}</div>
    </div>
    <div class="connecting" style="padding:16px 0">
        <div class="spin"></div>
        <div style="color:var(--muted);font-size:.8rem">Waiting for scoring\u2026</div>
    </div>`;
}

// ═══════════════════════════════════════════
// SIMULATION MODES — ?mode=tvsimulation | playersimulation  (&players=N)
// Self-driving demos with no PeerJS and no real people. Bots are counted as
// "connected" via stub guestConns so the normal host flow drives everything.
//   • tvsimulation     — watch the big-screen BOGGLE play itself (TV view)
//   • playersimulation — watch a phone player ("You") find words automatically
// (?mode=simulation stays as an alias for tvsimulation.)
// Boggle has no built-in TV-host mode, so tv mode sets `simTvHost` (which coerces
// render() to the viewer screen) and pipes viewer broadcasts into a stub viewer
// connection that mirrors the real viewer's data handler.
// ═══════════════════════════════════════════
let simTimer = null, simMode = 'tv', simActive = false, simPool = [];
const SIM_NAMES = ['Ace', 'Bux', 'Cash', 'Duke', 'Edie', 'Fox', 'Gwen', 'Hawk'];

function startSimulation(nPlayers, mode) {
    simMode = mode === 'player' ? 'player' : 'tv';
    simActive = true;
    roomCode = 'DEMO';
    H.roundsTarget = 2;
    H.players = []; guestConns = {}; viewerConns = {};
    const n = Math.max(2, Math.min(nPlayers || 4, 8));
    if (simMode === 'tv') {
        isHost = true; simTvHost = true; myId = '__sim_host__';
        document.body.classList.add('viewer-mode');
        viewerConns['__sim_viewer__'] = { peer: '__sim_viewer__', send: simViewerApply };
        ui = 'viewer';
    } else {
        isHost = true; simTvHost = false; myName = 'You'; myId = '__you__';
        hostAddPlayer(myId, myName);                  // you are player #1 (the host)
        ui = 'lobby_h';
    }
    for (let i = H.players.length; i < n; i++) {
        const id = '__bot_' + i;
        hostAddPlayer(id, SIM_NAMES[i % SIM_NAMES.length]);
        guestConns[id] = { peer: id, send() {} };     // stub so bots count as present
    }
    loadDictionary();
    setMusic('lobby');
    broadcastLobby();                                 // show the lobby first
    simWaitDict(() => { simTimer = setTimeout(simRound, 1800); });
}

// The stub TV connection: mirror the real viewer's data handler so vD, music
// and stingers all behave exactly as they would on a remote scoreboard.
function simViewerApply(msg) {
    if (msg.type === 'viewer_lobby') {
        vD = { phase: 'lobby', players: msg.players, roomCode: msg.roomCode };
        ui = 'viewer'; document.body.classList.add('viewer-mode'); setMusic('lobby'); render();
    } else if (msg.type === 'viewer_state') {
        const prevPhase = vD?.phase, prevRound = vD?.currentRound;
        vD = msg;
        if (msg.phase === 'playing') { setMusic('game'); tickUrgency(msg.timeLeft ?? 0); }
        else if (msg.phase === 'scoring' || msg.phase === 'results') setMusic('results');
        else if (msg.phase === 'gameover') setMusic('over');
        if (prevPhase === 'playing' && msg.phase === 'scoring') sRoundEnd();
        if (prevPhase !== 'results' && msg.phase === 'results') sResults();
        if (prevPhase !== 'gameover' && msg.phase === 'gameover') { sWin(); confetti(); }
        if (msg.phase === 'playing' && prevRound !== msg.currentRound) showRoundFlash(msg.currentRound, msg.roundsTarget);
        ui = 'viewer'; document.body.classList.add('viewer-mode'); render();
    }
}

// Bots want real words, which need the dictionary; wait (with a cap) for it.
function simWaitDict(cb, tries) {
    tries = tries || 0;
    if (!simActive) return;
    if (dictionary !== null || tries > 40) { cb(); return; }
    simTimer = setTimeout(() => simWaitDict(cb, tries + 1), 300);
}

// A compact Boggle solver (DFS over the 4×4 adjacency against the dictionary),
// pre-filtered by available letters — mirrors boggleparty's solveBoard.
function simSolve(board) {
    if (!(dictionary instanceof Set)) return [];
    const cells = board.map(t => t.toLowerCase());   // 'qu' stays a single cell
    const nbrs = [];
    for (let i = 0; i < 16; i++) {
        const r = i >> 2, c = i & 3, a = [];
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
            if (!dr && !dc) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < 4 && nc >= 0 && nc < 4) a.push(nr * 4 + nc);
        }
        nbrs.push(a);
    }
    const avail = {};
    cells.forEach(t => { for (const ch of t) avail[ch] = (avail[ch] || 0) + 1; });
    const maxLen = cells.join('').length;
    const wordSet = new Set(), prefixes = new Set();
    for (const w of dictionary) {
        if (w.length > maxLen) continue;
        let ok = true; const cnt = {};
        for (const ch of w) { cnt[ch] = (cnt[ch] || 0) + 1; if (cnt[ch] > (avail[ch] || 0)) { ok = false; break; } }
        if (!ok) continue;
        wordSet.add(w);
        for (let i = 1; i <= w.length; i++) prefixes.add(w.slice(0, i));
    }
    const used = new Array(16).fill(false), found = new Set();
    const dfs = (i, word) => {
        const w = word + cells[i];
        if (!prefixes.has(w)) return;
        if (w.length >= 3 && wordSet.has(w)) found.add(w);
        used[i] = true;
        for (const j of nbrs[i]) if (!used[j]) dfs(j, w);
        used[i] = false;
    };
    for (let i = 0; i < 16; i++) dfs(i, '');
    return [...found];
}

function simPickWord(player) {
    if (simPool.length) {
        for (let t = 0; t < 8; t++) {
            const w = simPool[Math.floor(Math.random() * simPool.length)];
            if (!player.words.includes(w)) return w;
        }
        return null;
    }
    // Dictionary unavailable: assemble a short board string (validation is skipped
    // when the dictionary failed to load, so these still count).
    const letters = H.board.map(t => t.toLowerCase());
    let w = '';
    for (let i = 0, k = 3 + Math.floor(Math.random() * 2); i < k; i++)
        w += letters[Math.floor(Math.random() * letters.length)];
    return w;
}

function simRound() {
    if (!simActive) return;
    hostStartGame();                                  // rolls board, phase 'playing', starts timer
    H.timeLeft = 12;                                  // shorten the 180s round for the demo
    simPool = simSolve(H.board);
    simTimer = setTimeout(simFeed, 1600);             // let the round-flash play
}

// While the round is live, bots (and You, in player mode) keep finding words.
// Each found word is also stashed in `_submitted` so end-of-round scoring has it.
function simFeed() {
    if (!simActive) return;
    if (H.phase !== 'playing') { simAfterRound(); return; }
    H.players.forEach(p => {
        if (simMode === 'player' && p.id === myId) return;  // You is driven separately
        if (Math.random() < 0.6) {
            const w = simPickWord(p);
            if (w) { p.words = [...new Set([...p.words, w])]; p._submitted = p.words; }
        }
    });
    if (simMode === 'player' && Math.random() < 0.7) simYouWord();
    broadcastGameState();
    simTimer = setTimeout(simFeed, 480 + Math.random() * 420);
}

// You (phone demo): add a word and fire the same burst/pop/chime as a real tap.
function simYouWord() {
    if (H.phase !== 'playing') return;
    const me = H.players.find(p => p.id === myId);
    if (!me) return;
    const w = simPickWord(me);
    if (!w || myWords.includes(w)) return;
    myWords = [...myWords, w];
    me.words = myWords; me._submitted = myWords;
    const pts = wordScore(w);
    sGood(pts);
    const btn = document.getElementById('btn-submit');
    if (btn) {
        const r = btn.getBoundingClientRect(), cx = r.left + r.width / 2, cy = r.top;
        burst(cx, cy, ['#f59e0b', '#ef4444', '#4ade80', '#60a5fa'], 8 + Math.min(14, pts * 2));
        popText(cx, cy - 6, '+' + pts, pts >= 5 ? 'gold' : 'good');
    }
    render();
}

// The round timer flips us to 'scoring' → 'results'/'gameover' on its own; from
// there advance to the next round, then loop the whole game.
function simAfterRound() {
    if (!simActive) return;
    if (H.phase === 'results') simTimer = setTimeout(simRound, 4500);
    else if (H.phase === 'gameover') simTimer = setTimeout(simRestart, 7000);
    else simTimer = setTimeout(simAfterRound, 400);   // still 'scoring' — wait for the tally
}

function simRestart() {
    if (!simActive) return;
    hostNewGame();
    simTimer = setTimeout(simRound, 2600);
}

// ── Init ──
(function boot() {
    const params = new URLSearchParams(location.search);
    const mode = (params.get('mode') || '').toLowerCase();
    const simPlayers = parseInt(params.get('players'), 10) || 4;
    if (mode === 'playersimulation') { startSimulation(simPlayers, 'player'); return; }
    if (mode === 'tvsimulation' || mode === 'simulation') { startSimulation(simPlayers, 'tv'); return; }
    render();
})();
</script>
