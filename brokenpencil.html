<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Broken Pencil</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23141920' width='100' height='100' rx='20'/><text x='50' y='68' font-size='52' text-anchor='middle'>✏️</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #141920; --panel: rgba(30,38,50,0.85);
            --border: rgba(148,163,184,0.25); --border-hot: rgba(244,114,182,0.5);
            --text: #eef2f8; --muted: #8fa0b5;
            --paper: #fffdf5; --paper2: #f4efdf; --ink: #2b3442; --ink-soft: #6b7686;
            --pink: #f472b6; --blue: #38bdf8; --green: #4ade80; --gold: #fbbf24;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            padding: 26px 16px 48px; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 65% 45% at 50% -5%, rgba(244,114,182,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 55% 45% at 10% 100%, rgba(56,189,248,0.08) 0%, transparent 60%),
                repeating-linear-gradient(0deg, transparent 0 30px, rgba(148,163,184,0.05) 30px 31px),
                repeating-linear-gradient(90deg, transparent 0 30px, rgba(148,163,184,0.05) 30px 31px);
        }
        body.viewer-mode { padding: 0; overflow: hidden; display: block; height: 100dvh; width: 100vw; }

        h1.logo {
            font-family: 'Patrick Hand', cursive; font-weight: 400; letter-spacing: 1px;
            font-size: clamp(1.9rem, 8vw, 2.8rem); text-align: center; color: var(--pink);
            text-shadow: 0 0 26px rgba(244,114,182,.4);
        }
        .sub { color: var(--muted); font-size: .7rem; letter-spacing: 2.5px; text-transform: uppercase; margin: 6px 0 22px; text-align: center; font-weight: 800; }

        #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 13px; }
        body.viewer-mode #app { max-width: none; height: 100dvh; display: block; }

        .card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
            padding: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 12px 34px rgba(0,0,0,.45);
        }
        .card.paper { background: var(--paper); color: var(--ink); border: none; box-shadow: 0 14px 40px rgba(0,0,0,.5), inset 0 0 0 1px rgba(107,118,134,.18); }
        .card.highlight { border: 1px solid var(--border-hot); box-shadow: 0 0 26px rgba(244,114,182,.15), 0 12px 34px rgba(0,0,0,.45); }
        .slbl { font-size: .64rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 11px; }
        .card.paper .slbl { color: var(--ink-soft); }

        .fg { margin-bottom: 12px; }
        .fg label { display: block; font-size: .64rem; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        .card.paper .fg label { color: var(--ink-soft); }
        input[type=text] {
            width: 100%; padding: 12px 14px; font-family: inherit; font-size: 1rem; font-weight: 700;
            border: 2px solid var(--border); border-radius: 11px; background: rgba(20,25,32,.6); color: var(--text);
            outline: none;
        }
        input[type=text]:focus { border-color: var(--pink); }
        .card.paper input[type=text] { background: #fff; color: var(--ink); border-color: rgba(107,118,134,.35); }
        .card.paper input[type=text]:focus { border-color: var(--pink); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit; font-weight: 900; font-size: .92rem; letter-spacing: .4px;
            padding: 13px 18px; border: none; border-radius: 13px; cursor: pointer;
            transition: filter .12s, opacity .12s; user-select: none; -webkit-user-select: none;
            color: var(--text);
        }
        .btn:active { filter: brightness(1.2); }
        .btn-p { background: linear-gradient(180deg, #f89bd0, #ec4899); color: #3d0722; box-shadow: 0 5px 0 #9d174d, 0 10px 22px rgba(236,72,153,.3); }
        .btn-p:active { box-shadow: 0 2px 0 #9d174d; }
        .btn-b { background: linear-gradient(180deg, #7dd3fc, #0ea5e9); color: #082f49; box-shadow: 0 5px 0 #075985, 0 10px 22px rgba(14,165,233,.3); }
        .btn-b:active { box-shadow: 0 2px 0 #075985; }
        .btn-g { background: rgba(148,163,184,.12); box-shadow: inset 0 0 0 2px var(--border); }
        .card.paper .btn-g { color: var(--ink); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 8px 13px; font-size: .74rem; border-radius: 10px; }
        .btn:disabled { opacity: .4; cursor: default; }

        .err {
            background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.5); color: #fca5a5;
            padding: 11px 14px; border-radius: 12px; font-size: .8rem; font-weight: 800; text-align: center;
        }
        hr { border: none; border-top: 1px dashed var(--border); margin: 13px 0; }

        .connecting { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 46px 0; color: var(--muted); font-weight: 800; }
        .spin { width: 34px; height: 34px; border-radius: 50%; border: 4px solid rgba(244,114,182,.2); border-top-color: var(--pink); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .avrow { display: flex; flex-wrap: wrap; gap: 7px; }
        .av {
            width: 42px; height: 42px; border-radius: 12px; font-size: 1.35rem; display: flex; align-items: center; justify-content: center;
            background: rgba(20,25,32,.6); border: 2px solid var(--border); cursor: pointer;
        }
        .av.sel { border-color: var(--pink); background: rgba(244,114,182,.15); box-shadow: 0 4px 12px rgba(244,114,182,.3); }

        .player-row { display: flex; align-items: center; gap: 11px; padding: 8px 4px; border-bottom: 1px dashed var(--border); font-weight: 800; font-size: .92rem; }
        .player-row:last-child { border-bottom: none; }
        .pav { width: 36px; height: 36px; border-radius: 10px; background: rgba(20,25,32,.6); border: 1px solid var(--border); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); margin-left: auto; }
        .qr-wrap { width: min(210px, 58vw); margin: 6px auto 10px; border-radius: 13px; overflow: hidden; box-shadow: 0 8px 22px rgba(0,0,0,.35); }
        .qr-wrap svg { display: block; width: 100%; height: auto; }
        .room-code { font-family: 'Patrick Hand', cursive; font-size: 2.6rem; letter-spacing: 12px; text-align: center; color: var(--pink); padding-left: 12px; }
        .card.paper .room-code { color: #be185d; }
        .share-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px; }
        .seg-row { display: flex; flex-wrap: wrap; gap: 7px; }

        /* ── work phase ── */
        .w-meta { display: flex; justify-content: space-between; align-items: center; font-size: .72rem; font-weight: 900; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
        .timebar-wrap { height: 9px; border-radius: 6px; background: rgba(148,163,184,.15); overflow: hidden; }
        .timebar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--blue), var(--pink)); transition: width .2s linear; }
        .prompt-line { font-family: 'Patrick Hand', cursive; font-size: 1.5rem; line-height: 1.3; }
        .cv-wrap { position: relative; border-radius: 12px; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(107,118,134,.25); background: var(--paper); touch-action: none; }
        canvas.sketch { display: block; width: 100%; touch-action: none; }
        .toolbar { display: flex; gap: 7px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
        .pen {
            width: 36px; height: 36px; border-radius: 50%; border: 3px solid rgba(107,118,134,.25); cursor: pointer; flex-shrink: 0;
        }
        .pen.sel { border-color: var(--ink); box-shadow: 0 0 0 3px #fff, 0 0 0 5px var(--ink); }
        .tool { width: 40px; height: 36px; border-radius: 10px; border: none; background: var(--paper2); color: var(--ink); font-size: 1rem; cursor: pointer; font-weight: 900; }
        .tool.sel { outline: 3px solid var(--ink); }
        .done-note { text-align: center; font-weight: 900; color: var(--green); padding: 6px 0 0; }
        .prog-list { display: flex; flex-direction: column; gap: 5px; }
        .prog-row { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: .85rem; }
        .prog-row .st { margin-left: auto; }

        /* ── reveal / vote (phone) ── */
        .eyes { text-align: center; padding: 34px 10px; }
        .eyes .big { font-size: 3.2rem; animation: bob 2.2s ease-in-out infinite; }
        @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
        .eyes .t { font-family: 'Patrick Hand', cursive; font-size: 1.6rem; margin-top: 8px; }
        .eyes .s { color: var(--muted); font-weight: 800; font-size: .82rem; margin-top: 6px; }
        .lol-btn {
            width: 100%; font-size: 2.2rem; padding: 16px; border: none; border-radius: 16px; cursor: pointer;
            background: linear-gradient(180deg, #fde68a, #f59e0b); box-shadow: 0 5px 0 #92600a;
        }
        .lol-btn:active { box-shadow: 0 2px 0 #92600a; }
        .vote-opt {
            width: 100%; text-align: left; font-family: inherit; font-weight: 800; font-size: .92rem;
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            border-radius: 13px; padding: 14px; cursor: pointer; margin-bottom: 9px;
        }
        .vote-opt:disabled { opacity: .4; }
        .vote-opt.mine { opacity: .4; }
        .vote-opt .who { color: var(--muted); font-size: .72rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 3px; }
        .chip { display: inline-block; padding: 4px 12px; border-radius: 11px; background: rgba(244,114,182,.12); border: 1px solid var(--border-hot); color: var(--pink); font-weight: 900; font-size: .76rem; margin: 3px; }
        .standings .sc { margin-left: auto; font-weight: 900; }
        .standings .delta { color: var(--green); font-size: .74rem; font-weight: 900; margin-left: 7px; }

        /* ═════════ TV ═════════ */
        .tv { height: 100dvh; display: flex; flex-direction: column; padding: 2.6vmin 3.2vmin; gap: 1.8vmin; }
        .tv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2vmin; }
        .tv-logo { font-family: 'Patrick Hand', cursive; font-size: 3.6vmin; color: var(--pink); text-shadow: 0 0 24px rgba(244,114,182,.4); }
        .tv-meta { font-size: 1.8vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .tv-main { flex: 1; display: flex; gap: 2.2vmin; min-height: 0; }

        .tv-lobby { flex: 1; display: flex; gap: 4vmin; align-items: center; min-height: 0; }
        .tv-lobby .qr-side { background: var(--paper); color: var(--ink); border-radius: 2.2vmin; padding: 3.2vmin; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
        .tv-lobby .qr-side .qr-wrap { width: 32vmin; margin: 1.4vmin auto; }
        .tv-lobby .qr-side .room-code { font-size: 5vmin; letter-spacing: 2vmin; padding-left: 2vmin; }
        .tv-lobby .join-hint { font-size: 1.7vmin; font-weight: 800; color: var(--ink-soft); }
        .tv-players { flex: 1; display: flex; flex-direction: column; gap: 1.5vmin; min-width: 0; }
        .tv-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20vmin, 1fr)); gap: 1.5vmin; }
        .tv-pcard {
            background: var(--panel); border: 1px solid var(--border); border-radius: 1.7vmin;
            padding: 1.7vmin; text-align: center; font-weight: 900; font-size: 2vmin;
        }
        .tv-pcard .big { font-size: 4vmin; }
        .tv-waiting { color: var(--muted); font-weight: 800; font-size: 1.9vmin; }

        /* TV work wall */
        .tv-wall { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(24vmin, 1fr)); gap: 1.8vmin; align-content: center; }
        .tv-wall .wcard {
            background: var(--panel); border: 1px solid var(--border); border-radius: 1.8vmin;
            padding: 2.2vmin; text-align: center; font-weight: 900; font-size: 2.2vmin;
        }
        .tv-wall .wcard .big { font-size: 4.6vmin; }
        .tv-wall .wcard.done { border-color: rgba(74,222,128,.5); box-shadow: 0 0 18px rgba(74,222,128,.12); }
        .tv-timebar-wrap { height: 1.4vmin; border-radius: .8vmin; background: rgba(148,163,184,.15); overflow: hidden; }
        .tv-timebar { height: 100%; background: linear-gradient(90deg, var(--blue), var(--pink)); border-radius: .8vmin; transition: width .2s linear; }

        /* TV reveal theatre */
        .tv-stagewrap { flex: 1; display: flex; gap: 2.2vmin; min-height: 0; }
        .tv-history { width: 24vmin; display: flex; flex-direction: column; gap: 1.2vmin; overflow: hidden; }
        .tv-history .hcard { background: var(--panel); border: 1px solid var(--border); border-radius: 1.3vmin; padding: 1vmin 1.3vmin; font-weight: 800; font-size: 1.5vmin; color: var(--muted); }
        .tv-history .hcard canvas { width: 100%; border-radius: .8vmin; background: var(--paper); display: block; margin-top: .6vmin; }
        .tv-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 0; min-height: 0; }
        .beat-paper {
            background: var(--paper); color: var(--ink); border-radius: 2.2vmin; padding: 3vmin 3.6vmin;
            box-shadow: 0 18px 60px rgba(0,0,0,.55); max-width: 92%; max-height: 100%; overflow: hidden;
            text-align: center;
        }
        .beat-paper .bwho { font-size: 1.7vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 1.2vmin; }
        .beat-paper .btext { font-family: 'Patrick Hand', cursive; font-size: 4vmin; line-height: 1.3; }
        .beat-paper canvas { background: var(--paper); border-radius: 1.2vmin; box-shadow: inset 0 0 0 1px rgba(107,118,134,.2); }
        .lol-layer { position: fixed; inset: 0; pointer-events: none; z-index: 55; overflow: hidden; }
        .lol-fly { position: absolute; bottom: -8vmin; font-size: var(--sz, 5vmin); animation: lolUp var(--t, 1.8s) ease-out forwards; }
        @keyframes lolUp {
            from { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            to   { transform: translate(var(--dx, 0px), -64vmin) rotate(var(--rot, 0deg)); opacity: 0; }
        }

        /* TV vote / podium */
        .tv-voteopts { display: flex; flex-direction: column; gap: 1.4vmin; max-width: 70%; margin: 0 auto; }
        .tv-voteopt { background: var(--panel); border: 1px solid var(--border); border-radius: 1.5vmin; padding: 1.6vmin 2vmin; font-weight: 800; font-size: 2.2vmin; display: flex; justify-content: space-between; gap: 2vmin; }
        .tv-voteopt .votes { color: var(--gold); font-weight: 900; }
        .podium-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 2.4vmin; padding-bottom: 1vmin; }
        .pod { text-align: center; font-weight: 900; animation: podRise .55s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes podRise { from { transform: translateY(35%); opacity: 0; } to { transform: none; opacity: 1; } }
        .pod .pname { font-size: 2.4vmin; margin-bottom: .8vmin; }
        .pod .pscore { font-size: 2vmin; color: var(--gold); margin-bottom: .8vmin; }
        .pod .block { border-radius: 1.5vmin 1.5vmin 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 1.3vmin; font-size: 3.2vmin; width: 17vmin; }
        .pod.p1 .block { height: 21vmin; background: linear-gradient(180deg, #f9a8d4, #be185d); }
        .pod.p2 .block { height: 14vmin; background: linear-gradient(180deg, #d7d7e0, #8f8fa3); }
        .pod.p3 .block { height: 9.5vmin; background: linear-gradient(180deg, #7dd3fc, #0369a1); }
        .pod .big { font-size: 4.6vmin; }
        .awards-row { display: flex; gap: 1.5vmin; justify-content: center; flex-wrap: wrap; padding-bottom: 2vmin; }
        .award { background: var(--panel); border: 1px solid var(--border-hot); border-radius: 1.5vmin; padding: 1.3vmin 2vmin; font-weight: 800; font-size: 1.8vmin; text-align: center; }
        .award .aw-t { color: var(--pink); font-weight: 900; }

        #confetti-cv { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

        /* sound toggles */
        #sound-togs { position: fixed; top: 10px; right: 10px; z-index: 70; display: flex; gap: 6px; }
        #sound-togs button {
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); cursor: pointer; font-size: 1rem;
            background: rgba(30,38,50,.85); transition: opacity .2s, transform .12s;
        }
        #sound-togs button:active { transform: scale(.88); }
        #sound-togs button.off { opacity: .35; filter: grayscale(1); }
        body.viewer-mode .tv-top { padding-right: 96px; }

        /* FX layer — particles + score pops */
        .pt {
            position: fixed; width: 9px; height: 9px; border-radius: 2px;
            z-index: 950; pointer-events: none;
            animation: ptFly .75s cubic-bezier(.15,.65,.4,1) forwards;
        }
        @keyframes ptFly {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(560deg) scale(.3); opacity: 0; }
        }
        .pop {
            position: fixed; z-index: 960; pointer-events: none;
            font-family: 'Patrick Hand', cursive; font-size: 1.8rem;
            animation: popUp 1.1s cubic-bezier(.2,.8,.3,1) forwards;
            text-shadow: 0 2px 12px rgba(0,0,0,.6); white-space: nowrap;
        }
        .pop.good { color: var(--green); }
        .pop.gold { color: var(--gold); }
        @keyframes popUp {
            0%   { transform: translate(-50%, 0) scale(.5); opacity: 0; }
            15%  { transform: translate(-50%, -12px) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -78px) scale(1); opacity: 0; }
        }

        /* screen entrances — only on real screen changes (#app.fresh), so
           same-screen re-renders (drawing, joins, vote acks) never re-trigger */
        @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        @keyframes tvIn { from { opacity: 0; transform: translateY(2.4vmin); } to { opacity: 1; transform: none; } }
        #app.fresh .card { animation: cardIn .35s cubic-bezier(.2,.8,.3,1) both; }
        #app.fresh .player-row, #app.fresh .vote-opt { animation: cardIn .3s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 40ms); }
        #app.fresh .tv-pcard, #app.fresh .wcard, #app.fresh .tv-voteopt { animation: tvIn .35s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 45ms); }
        .beat-paper { animation: beatIn .4s cubic-bezier(.2,.8,.3,1) both, sketchWobble 3.4s .5s ease-in-out infinite; }
        @keyframes beatIn { from { opacity: 0; transform: translateY(3vmin) rotate(-1.2deg) scale(.96); } to { opacity: 1; transform: none; } }
        /* hand-drawn jiggle — the paper never sits perfectly still */
        @keyframes sketchWobble { 0%, 100% { transform: rotate(-.3deg); } 50% { transform: rotate(.35deg); } }
        /* newest history card slides off the stage into the rail */
        .tv-history .hcard:last-child { animation: histIn .45s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes histIn { from { opacity: 0; transform: translateX(6vmin) rotate(3deg) scale(.9); } to { opacity: 1; transform: none; } }

        /* 🥁 vote-count suspense curtain */
        .votes-curtain {
            position: fixed; inset: 0; z-index: 65; display: flex; flex-direction: column; gap: 2.4vmin;
            align-items: center; justify-content: center; background: rgba(20,25,32,.82);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            font-family: 'Patrick Hand', cursive; animation: curtainIn .25s ease both;
        }
        .votes-curtain .drum { font-size: 9vmin; animation: drumShake .14s linear infinite; }
        .votes-curtain .ct { font-size: 3.6vmin; color: var(--pink); letter-spacing: .3vmin; }
        @keyframes drumShake { 0%, 100% { transform: rotate(-7deg) scale(1); } 50% { transform: rotate(7deg) scale(1.06); } }
        @keyframes curtainIn { from { opacity: 0; } to { opacity: 1; } }

        /* winning vote rows get a golden shine sweep */
        .tv-voteopt.win { border-color: rgba(251,191,36,.65); position: relative; overflow: hidden; }
        .tv-voteopt.win::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: linear-gradient(115deg, transparent 30%, rgba(251,191,36,.3) 50%, transparent 70%);
            transform: translateX(-110%); animation: shineSweep 1.3s .45s ease forwards;
        }
        @keyframes shineSweep { to { transform: translateX(110%); } }

        /* last-seconds red vignette pulse */
        body.time-low::after {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 940;
            box-shadow: inset 0 0 64px 14px rgba(239,68,68,.3);
            animation: vignettePulse .9s ease-in-out infinite;
        }
        @keyframes vignettePulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }

        /* podium crown drop */
        .pod { position: relative; }

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {

let musicTrack = 'lobby', musicStep = 0, musicBar = 0, musicNext = 0, musicTimer = null, musicUrgent = false;
// Adaptive arrangement: 0 = rhythm section only, 1 = +lead, 2 = full (stabs + shimmer).
// Key shift lifts everything a whole tone for the final chain — "it's serious now".
let musicIntensity = 2, musicKeyShift = 0;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Swing: push every off-16th slightly late for the doodly bounce
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) tone(140, 0.22, { type: 'sine', vol: 0.4, when: rel, slide: 44, dest: musicGain });
    if (tr.hat[i]) {
        const hv = (i % 4 === 2 ? 0.1 : 0.05) * (0.8 + Math.random() * 0.4);
        noiseHit(0.045, { vol: hv, when: rel, hp: 9500, dest: musicGain });
    }
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) tone(mf(b + k), stepDur * 1.6, { type: w.bass || 'triangle', vol: 0.28, when: rel, dest: musicGain, lp: 1000, attack: 0.006 });
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    // Plucky "ukulele" comping — short triangle chord stabs on the offbeats
    if (full && tr.stab && tr.stab[i] && ch)
        ch.forEach(m => tone(mf(m + 12 + k), stepDur * 0.7, { type: w.stab || 'triangle', vol: 0.04, when: rel, lp: 3000, dest: musicGain, attack: 0.003 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12;
        tone(mf(l + k), stepDur * 1.4, { type: w.lead || 'triangle', vol: 0.12 * (0.9 + Math.random() * 0.2), when: rel, dest: leadBus, lp: tr.leadLp || 3800, attack: 0.005 });
    }
    // Music-box doodle shimmer two octaves above the pads
    if (full && tr.arp && i % tr.arp === 0 && ch)
        tone(mf(ch[(i / tr.arp) % ch.length] + 24 + k), stepDur * tr.arp * 0.9, { type: w.arpW || 'sine', vol: 0.04, when: rel, lp: 5200, dest: musicGain, attack: 0.004 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.035, { vol: 0.1, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    // adaptive: rounds build up from the rhythm section (bumpWorkIntensity raises it)
    musicIntensity = track === 'work' ? 0 : 2;
    if (track === 'lobby' || track === 'over') musicKeyShift = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'work') musicUrgent = false;
    // one-beat snare fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) noiseHit(0.06, { vol: 0.1 + f * 0.035, when: f * s, hp: 2800 + f * 900, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}
// Adaptive layers: the lead joins once half the players are done;
// timer urgency (musicUrgent) forces the full arrangement on its own
function bumpWorkIntensity(progress) {
    const list = progress || [];
    const done = list.filter(p => p.done).length;
    if (list.length && done / list.length >= 0.5) musicIntensity = Math.max(musicIntensity, 1);
}

function toggleMusic() {

// ── Particle bursts + floating score text ──
function burst(x, y, colors, n = 14) {
    if (REDUCED) return;
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;
        p.style.cssText = `left:${x}px;top:${y}px;background:${colors[i % colors.length]};` +
            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}

}

// ── Stroke rendering (shared phone/TV) ──
function drawStrokes(cv, strokes, frac) {
    const ctx = cv.getContext('2d');
    const sx = cv.width / CV_W, sy = cv.height / CV_H;
    ctx.fillStyle = '#fffdf5';
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    const total = strokes.reduce((s, st) => s + st.p.length / 2, 0) || 1;
    let budget = (frac === undefined ? 1 : frac) * total;
    for (const st of strokes) {
        const pts = st.p.length / 2;
        const take = Math.min(pts, Math.max(0, budget));
        budget -= pts;
        if (take < 1) break;
        ctx.strokeStyle = st.c < 0 ? '#fffdf5' : PENS[st.c];
        ctx.lineWidth = (st.c < 0 ? ERASER_W : PEN_W) * sx;
        ctx.beginPath();
        ctx.moveTo(st.p[0] * sx, st.p[1] * sy);
        if (take === 1) ctx.lineTo(st.p[0] * sx + 0.5, st.p[1] * sy + 0.5);
        for (let i = 1; i < take; i++) ctx.lineTo(st.p[i * 2] * sx, st.p[i * 2 + 1] * sy);
        ctx.stroke();
    }
}
function sizeCanvas(cv) {
    const w = cv.clientWidth || 300;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = Math.round(w * dpr);
    cv.height = Math.round(w * (CV_H / CV_W) * dpr);
}

function stepKind(s) { return s === 0 ? 'write' : (s % 2 === 1 ? 'draw' : 'describe'); }
function stepSecs(s) {
    const base = stepKind(s) === 'draw' ? 90 : 45;
    return H.settings.pace === 'relaxed' ? Math.round(base * 1.5) : base;
}

// ═══════════════════════════════════════════
// NETWORK (familytrivia/pit pattern)
// ═══════════════════════════════════════════
function send(conn, msg) { try { conn.send(msg); } catch (e) { console.warn('send err', e); } }
function broadcastViewers(msg) { Object.values(viewerConns).forEach(c => send(c, msg)); }
function broadcastPlayers(fn) {
    H.players.forEach(p => {
        if (p.id === myId) return;
        const c = guestConns[p.id];
        if (c) send(c, typeof fn === 'function' ? fn(p) : fn);
    });
}
function connectedPlayers() {
    return H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
}
function minPlayers() { return H.settings.shortCircuit ? 2 : 3; }

function hostAddPlayer(id, name, avatar) {
    if (H.players.find(p => p.id === id) || H.players.length >= MAX_PLAYERS) return;
    const taken = new Set(H.players.map(p => p.avatar));
    const av = avatar && !taken.has(avatar) ? avatar : (AVATARS.find(a => !taken.has(a)) || '🙂');
    H.players.push({ id, name, avatar: av, score: 0, lols: 0 });
}

function capName() { return isTvHost ? (H.players[0]?.name || null) : null; }
function lobbyMsg() {
    return {
        type: 'lobby', roomCode,
        players: H.players.map(p => ({ name: p.name, avatar: p.avatar })),
        settings: { ...H.settings },
        tvHost: isTvHost, captain: capName(),
    };
}
function broadcastLobby() {
    broadcastPlayers(lobbyMsg());
    broadcastViewers({ ...lobbyMsg(), type: 'viewer_lobby' });
    hostSyncSelf(lobbyMsg());
}

function progressList() {
    return H.players.map(p => ({ name: p.name, avatar: p.avatar, done: !!H.pending[p.id] }));
}
function seatOf(id) { return H.players.findIndex(p => p.id === id); }
function chainForSeat(seat, step) { return (seat + step) % H.players.length; }
function nameOf(id) { return H.players.find(p => p.id === id)?.name || '?'; }

function workMsgFor(p) {
    const seat = seatOf(p.id);
    const chain = H.chains[chainForSeat(seat, H.step)];
    const kind = stepKind(H.step);
    const last = chain.beats[chain.beats.length - 1] || null;
    return {
        type: 'work', step: H.step, total: H.totalSteps, kind,
        seconds: stepSecs(H.step),
        input: kind === 'write' ? null : (kind === 'draw' ? { text: last?.text || '…no words…' } : { strokes: last?.strokes || [] }),
        done: !!H.pending[p.id],
        progress: progressList(),
        roomCode, tvHost: isTvHost, captain: capName(),
    };
}
function viewerWorkMsg() {
    return {
        type: 'viewer_work', step: H.step, total: H.totalSteps, kind: stepKind(H.step),
        seconds: stepSecs(H.step), progress: progressList(),
        roomCode, tvHost: isTvHost, captain: capName(),
    };
}

function revealMsg() {
    const chain = H.chains[H.revealChain];
    return {
        type: 'reveal', chainNum: H.revealChain + 1, totalChains: H.chains.length,
        beatNum: H.revealBeat + 1, totalBeats: chain.beats.length,
        owner: nameOf(chain.owner),
        tvHost: isTvHost, captain: capName(),

}
function viewerRevealMsg() {

    return {
        type: 'viewer_reveal', chainNum: H.revealChain + 1, totalChains: H.chains.length,
        owner: nameOf(chain.owner),
        beats: chain.beats.slice(0, H.revealBeat + 1).map(b => ({
            kind: b.kind, author: nameOf(b.author), text: b.text, strokes: b.strokes,
        })),

}

function voteOptions() {
    const chain = H.chains[H.revealChain];
    return chain.beats.map((b, i) => ({
        beat: i,
        label: b.kind === 'text' ? `“${(b.text || '').slice(0, 44)}”` : `🖼️ ${nameOf(b.author)}'s drawing`,
        author: nameOf(b.author), authorId: b.author,
    }));
}
function voteMsgFor(p) {
    return {
        type: 'vote', chainNum: H.revealChain + 1, totalChains: H.chains.length,
        options: voteOptions().map(o => ({ beat: o.beat, label: o.label, author: o.author, mine: o.authorId === p.id })),
        voted: H.votes[p.id] !== undefined,
        tvHost: isTvHost, captain: capName(),
    };
}
function viewerVoteMsg() {
    return {
        type: 'viewer_vote', chainNum: H.revealChain + 1, totalChains: H.chains.length,
        options: voteOptions().map(o => ({ beat: o.beat, label: o.label, author: o.author })),
        votesIn: Object.keys(H.votes).length, playerCount: connectedPlayers().length,
        tvHost: isTvHost, captain: capName(),
    };
}
function standings() {
    return H.players.slice().sort((a, b) => b.score - a.score || b.lols - a.lols)
        .map(p => ({ name: p.name, avatar: p.avatar, score: p.score, lols: p.lols }));
}
function votedMsg() {
    return {
        type: 'voted', chainNum: H.revealChain + 1, totalChains: H.chains.length,
        result: H.voteResult, standings: standings(),
        isLast: H.revealChain >= H.chains.length - 1,
        tvHost: isTvHost, captain: capName(),

}
function podiumMsg() {
    const st = standings();
    const byLols = H.players.slice().sort((a, b) => b.lols - a.lols)[0];
    const awards = [];
    if (byLols && byLols.lols > 0) awards.push({ emoji: '😂', title: 'Comedy Gold', name: byLols.name, detail: byLols.lols + ' LOLs' });
    return { type: 'podium', standings: st, awards, tvHost: isTvHost, captain: capName() };
}

function phaseSnapshotFor(p) {
    if (H.phase === 'work') return workMsgFor(p);
    if (H.phase === 'reveal') return revealMsg();
    if (H.phase === 'vote') return voteMsgFor(p);
    if (H.phase === 'voted') return votedMsg();
    if (H.phase === 'podium') return podiumMsg();
    return lobbyMsg();
}
function viewerSnapshot() {
    if (H.phase === 'work') return viewerWorkMsg();
    if (H.phase === 'reveal') return viewerRevealMsg();
    if (H.phase === 'vote') return viewerVoteMsg();
    if (H.phase === 'voted') return { ...votedMsg(), type: 'viewer_voted' };
    if (H.phase === 'podium') return { ...podiumMsg(), type: 'viewer_podium' };
    return { ...lobbyMsg(), type: 'viewer_lobby' };
}

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            send(conn, viewerSnapshot());
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const name = String(msg.name || 'Player').slice(0, 16);
                const zombie = H.players.find(p => p.name === name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else if (H.phase === 'lobby') hostAddPlayer(conn.peer, name, msg.avatar);
                const p2 = H.players.find(p => p.id === conn.peer);
                if (!p2) { send(conn, lobbyMsg()); break; }
                if (H.phase === 'lobby') broadcastLobby();
                else { send(conn, phaseSnapshotFor(p2)); if (isTvHost) tvHostSync(); }
                break;
            }
            case 'submit': if (player) hostSubmit(player, msg); break;
            case 'lol':    if (player) hostLol(player); break;
            case 'vote':   if (player) hostVote(player, msg.beat); break;
            case 'ctl': {
                if (!isTvHost || !player || player.id !== H.players[0]?.id) break;
                hostCtl(msg.action, msg, conn);
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        } else if (H.phase === 'work') maybeFinishStep();
        else if (H.phase === 'vote') maybeFinishVote();
    });
    conn.on('error', e => console.warn('conn err', e));
}

function hostCtl(action, msg, conn) {
    if (action === 'start' && H.phase === 'lobby') {
        if (!hostStartGame() && conn) send(conn, { type: 'notice', text: uiErr });
    }
    else if (action === 'next' && H.phase === 'reveal') hostNextBeat();
    else if (action === 'next' && H.phase === 'voted') hostNextChain();
    else if (action === 'again' && H.phase === 'podium') hostNewGame();
    else if (action === 'set' && H.phase === 'lobby') {
        if (['brisk', 'relaxed'].includes(msg.pace)) H.settings.pace = msg.pace;
        broadcastLobby();
    }
}
function guestCtl(action, extra) {
    if (isHost && !isTvHost) { hostCtl(action, extra || {}); return; }
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ── Create a room ──
function makeRoom(onOpen) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(PFX + roomCode, ICE_CFG);
    peer.on('open', id => { myId = id; isHost = true; onOpen(); });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        isHost = false; isTvHost = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

function joinGame(code, name) {

    peer = new Peer(undefined, ICE_CFG);

        myId = id;
        isHost = false;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join', name: myName, avatar: myAvatar }));
        hostConn.on('data', msg => applyMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the game.'; ui = 'home'; D = null; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'home'; render();
    });
}

function joinAsViewer(code, _attempt) {
    const attempt = _attempt || 1;
    isViewer = true;
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join_viewer' }));
        hostConn.on('data', msg => applyViewerMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the game.'; isViewer = false; vD = null; document.body.classList.remove('viewer-mode'); ui = 'home'; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; isViewer = false; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';

// ═══════════════════════════════════════════
// HOST GAME FLOW
// ═══════════════════════════════════════════
function clearHostTimers() { clearTimeout(_stepTimer); clearTimeout(_voteTimer); }

function hostStartGame() {
    if (connectedPlayers().length < minPlayers()) {
        uiErr = 'Need at least ' + minPlayers() + ' players.';
        if (ui === 'lobby_h') render();
        return false;
    }
    clearHostTimers();
    // seat order fixes here; late joiners spectate till next game
    H.players.forEach(p => { p.score = 0; p.lols = 0; });
    H.totalSteps = Math.min(H.players.length, MAX_STEPS);
    H.chains = H.players.map(p => ({ owner: p.id, beats: [] }));
    H.step = 0;
    H.pending = {};
    H.phase = 'work';
    broadcastWork();
    armStepTimer();
    return true;
}

function armStepTimer() {
    clearTimeout(_stepTimer);
    _stepTimer = setTimeout(finalizeStep, stepSecs(H.step) * 1000 + 2500);
}

function broadcastWork() {
    broadcastPlayers(p => workMsgFor(p));
    broadcastViewers(viewerWorkMsg());
    hostSyncSelf(isTvHost ? null : workMsgFor(H.players.find(p => p.id === myId)));
    if (isTvHost) tvHostSync();
}

function sanitizeStrokes(raw) {
    if (!Array.isArray(raw)) return [];
    const out = [];
    let points = 0;
    for (const st of raw.slice(0, 220)) {
        if (!st || !Array.isArray(st.p)) continue;
        const c = Number.isInteger(st.c) && st.c >= -1 && st.c < PENS.length ? st.c : 0;
        const p = st.p.slice(0, Math.max(0, (4200 - points) * 2)).map(n => Math.max(0, Math.min(CV_W, Math.round(Number(n) || 0))));
        if (p.length < 2) continue;
        if (p.length % 2) p.pop();
        points += p.length / 2;
        out.push({ c, p });
        if (points >= 4200) break;
    }
    return out;
}

function hostSubmit(player, msg) {
    if (H.phase !== 'work' || msg.step !== H.step || H.pending[player.id]) return;
    if (seatOf(player.id) < 0) return;
    const kind = stepKind(H.step);
    if (kind === 'draw') H.pending[player.id] = { strokes: sanitizeStrokes(msg.strokes) };
    else H.pending[player.id] = { text: String(msg.text || '').slice(0, 90).trim() || '…no words…' };
    broadcastProgress();
    maybeFinishStep();
}

function broadcastProgress() {
    const msg = { type: 'progress', progress: progressList() };
    broadcastPlayers(msg);
    broadcastViewers({ ...viewerWorkMsg() });
    hostSyncSelf(isTvHost ? null : msg);
    if (isTvHost) tvHostSync();
}

function maybeFinishStep() {
    if (H.phase !== 'work') return;
    const active = connectedPlayers().filter(p => seatOf(p.id) >= 0);
    if (active.length && active.every(p => H.pending[p.id])) {
        const s = H.step;   // token: a queued call must not finalize a LATER step
        setTimeout(() => { if (H.phase === 'work' && H.step === s) finalizeStep(); }, 500);
    }
}

function finalizeStep() {
    if (H.phase !== 'work') return;
    clearTimeout(_stepTimer);
    const kind = stepKind(H.step);
    H.players.forEach((p, seat) => {
        const chain = H.chains[chainForSeat(seat, H.step)];
        const sub = H.pending[p.id];
        if (kind === 'draw') chain.beats.push({ kind: 'drawing', author: p.id, strokes: sub ? sub.strokes : [] });
        else chain.beats.push({ kind: 'text', author: p.id, text: sub ? sub.text : '…no words…' });
    });
    H.pending = {};
    H.step += 1;
    if (H.step >= H.totalSteps) {
        H.phase = 'reveal';
        H.revealChain = 0;
        H.revealBeat = 0;
        broadcastReveal();
    } else {
        broadcastWork();
        armStepTimer();
    }
}

function broadcastReveal() {
    broadcastPlayers(revealMsg());
    broadcastViewers(viewerRevealMsg());
    hostSyncSelf(isTvHost ? null : revealMsg());
    if (isTvHost) tvHostSync();
}

function hostNextBeat() {
    if (H.phase !== 'reveal') return;
    const chain = H.chains[H.revealChain];
    if (H.revealBeat + 1 >= chain.beats.length) startVote();
    else { H.revealBeat += 1; broadcastReveal(); }
}

function startVote() {
    H.phase = 'vote';
    H.votes = {};
    H.voteResult = null;
    broadcastPlayers(p => voteMsgFor(p));
    broadcastViewers(viewerVoteMsg());
    hostSyncSelf(isTvHost ? null : voteMsgFor(H.players.find(p => p.id === myId)));
    if (isTvHost) tvHostSync();
    clearTimeout(_voteTimer);
    _voteTimer = setTimeout(finalizeVote, 30_000);
}

function hostVote(player, beat) {
    if (H.phase !== 'vote' || H.votes[player.id] !== undefined) return;
    const beats = H.chains[H.revealChain].beats;
    if (!Number.isInteger(beat) || beat < 0 || beat >= beats.length) return;
    if (beats[beat].author === player.id) return;
    H.votes[player.id] = beat;
    const conn = guestConns[player.id];
    if (conn) send(conn, voteMsgFor(player));
    broadcastViewers(viewerVoteMsg());
    if (isTvHost) tvHostSync();
    maybeFinishVote();
}

function maybeFinishVote() {
    if (H.phase !== 'vote') return;
    const active = connectedPlayers().filter(p => seatOf(p.id) >= 0);
    if (active.length && active.every(p => H.votes[p.id] !== undefined)) {
        const c = H.revealChain;
        setTimeout(() => { if (H.phase === 'vote' && H.revealChain === c) finalizeVote(); }, 500);
    }
}

function finalizeVote() {
    if (H.phase !== 'vote') return;
    clearTimeout(_voteTimer);
    const beats = H.chains[H.revealChain].beats;
    const counts = beats.map(() => 0);
    Object.values(H.votes).forEach(b => { counts[b] += 1; });
    const max = Math.max(...counts, 0);
    const winners = [];
    if (max > 0) {
        counts.forEach((c, i) => {
            if (c === max) {
                const b = beats[i];
                const pl = H.players.find(p => p.id === b.author);
                if (pl) pl.score += 100;
                winners.push({
                    label: b.kind === 'text' ? `“${(b.text || '').slice(0, 44)}”` : `🖼️ ${nameOf(b.author)}'s drawing`,
                    author: nameOf(b.author), votes: c,
                });
            }
        });
    }
    H.voteResult = { winners, pts: 100 };
    H.phase = 'voted';
    broadcastPlayers(votedMsg());
    broadcastViewers({ ...votedMsg(), type: 'viewer_voted' });
    hostSyncSelf(isTvHost ? null : votedMsg());
    if (isTvHost) tvHostSync();
}

function hostNextChain() {
    if (H.phase !== 'voted') return;
    H.revealChain += 1;
    if (H.revealChain >= H.chains.length) {
        H.phase = 'podium';
        broadcastPlayers(podiumMsg());
        broadcastViewers({ ...podiumMsg(), type: 'viewer_podium' });
        hostSyncSelf(isTvHost ? null : podiumMsg());
        if (isTvHost) tvHostSync();
    } else {
        H.revealBeat = 0;
        H.phase = 'reveal';
        broadcastReveal();
    }
}

function hostLol(player) {
    if (H.phase !== 'reveal') return;
    const now = Date.now();
    if (H.lastLolAt[player.id] && now - H.lastLolAt[player.id] < 2000) return;
    H.lastLolAt[player.id] = now;
    const beat = H.chains[H.revealChain].beats[H.revealBeat];
    const author = H.players.find(p => p.id === beat.author);
    if (author && author.id !== player.id) author.lols += 1;
    broadcastViewers({ type: 'viewer_lol' });
    if (isTvHost) spawnLol();
}

function hostNewGame() {
    clearHostTimers();
    H.phase = 'lobby';
    H.chains = []; H.pending = {}; H.votes = {}; H.voteResult = null;
    H.step = 0; H.revealChain = 0; H.revealBeat = 0; H.lastLolAt = {};
    H.players.forEach(p => { p.score = 0; p.lols = 0; });
    H.players = H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
    broadcastLobby();
    if (isHost && !isTvHost) { ui = 'lobby_h'; render(); }
}

function hostSet(patch) {
    Object.assign(H.settings, patch);
    broadcastLobby();
    if (ui === 'lobby_h') render();
}

function stopClientTimers() { clearInterval(_clientTick); _clientTick = null; document.body.classList.remove('time-low'); }

function applyMsg(msg) {
    switch (msg.type) {
        case 'notice':
            uiErr = String(msg.text || '');
            if (ui === 'lobby_g' || ui === 'lobby_h') render();
            break;
        case 'lobby': {
            const prevN = D && D.type === 'lobby' ? (D.players || []).length : -1;
            D = msg;
            uiErr = '';
            stopClientTimers();
            ui = (isHost && !isTvHost) ? 'lobby_h' : 'lobby_g';
            setMusic('lobby');
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            render();
            break;
        }
        case 'work': {
            const fresh = !D || D.type !== 'work' || D.step !== msg.step;
            D = msg;
            if (fresh) {
                stopClientTimers();
                myStrokes = []; curStroke = null; workText = ''; submitted = !!msg.done;
                wEndsAt = Date.now() + msg.seconds * 1000;
                ui = 'work';
                _lastTickSec = -1;
                setMusic('work');
                musicIntensity = 0;   // new step: strip back to the rhythm section
                bumpWorkIntensity(msg.progress);
                render();
                sPage();
                _clientTick = setInterval(patchWorkTimer, 250);
            } else if (ui === 'work') {
                bumpWorkIntensity(msg.progress);
                const pr = $id('w-progress');
                if (pr) pr.innerHTML = progressHTML(msg.progress);
            }
            break;
        }
        case 'progress': {
            if (D) D.progress = msg.progress;
            bumpWorkIntensity(msg.progress);
            const pr = $id('w-progress');
            if (pr) pr.innerHTML = progressHTML(msg.progress);
            break;
        }
        case 'reveal':
            D = msg; stopClientTimers(); ui = 'reveal';
            setMusic('reveal');
            musicKeyShift = msg.chainNum === msg.totalChains ? 2 : 0;   // final chain: key up
            render(); sTada();
            break;
        case 'vote':
            D = msg; stopClientTimers();
            setMusic('reveal');
            if (ui !== 'vote') { ui = 'vote'; render(); }
            else render();
            break;
        case 'voted': {
            D = msg; stopClientTimers(); ui = 'voted';
            setMusic('reveal');
            render();
            const wins = (msg.result && msg.result.winners) || [];
            if (!wins.length) sTrombone();
            else {
                sTada();
                if (wins.some(w => w.author === myName)) {
                    popText(innerWidth / 2, innerHeight * 0.3, '+' + (msg.result.pts || 100), 'gold');
                    burst(innerWidth / 2, innerHeight * 0.3 + 20, ['#f472b6', '#38bdf8', '#4ade80', '#fbbf24'], 18);
                }
            }
            break;
        }
        case 'podium':
            D = msg; stopClientTimers(); ui = 'podium';
            setMusic('over');
            render();
            sWin(); startConfetti(3600);
            break;
    }
}

let _lastTickSec = -1;
function patchWorkTimer() {

    const bar = $id('w-timebar'), num = $id('w-timenum');
    const low = left <= 5200 && left > 0 && !submitted;

    if (num) { num.textContent = sec + 's'; num.classList.toggle('low', low); }

}

function submitWork() {
    if (submitted || !D || ui !== 'work') return;
    const payload = D.kind === 'draw'
        ? { strokes: myStrokes }
        : { text: (workText || '').trim() };
    submitted = true;
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);

    } else send(hostConn, { type: 'submit', step: D.step, ...payload });

function sendVote(beat) {
    if (!D || ui !== 'vote' || D.voted) return;
    D.voted = true;
    sVote();
    if (isHost && !isTvHost) {

// ── phone canvas input ──
function logicalXY(cv, e) {
    const r = cv.getBoundingClientRect();
    return [
        Math.max(0, Math.min(CV_W, Math.round((e.clientX - r.left) / r.width * CV_W))),
        Math.max(0, Math.min(CV_H, Math.round((e.clientY - r.top) / r.height * CV_H))),
    ];
}
function redrawSketch() {
    const cv = $id('draw-cv');
    if (!cv) return;
    drawStrokes(cv, curStroke ? myStrokes.concat([curStroke]) : myStrokes);
}
function initSketchCanvas() {
    const cv = $id('draw-cv');
    if (!cv) return;
    sizeCanvas(cv);
    redrawSketch();
    cv.onpointerdown = e => {
        if (submitted) return;
        e.preventDefault();
        try { cv.setPointerCapture(e.pointerId); } catch (_) {}
        const [x, y] = logicalXY(cv, e);
        curStroke = { c: isEraser ? -1 : curPen, p: [x, y] };
        sScribble();   // audio only — never touches the canvas or DOM
    };
    cv.onpointermove = e => {
        if (!curStroke) return;
        e.preventDefault();
        const [x, y] = logicalXY(cv, e);
        const n = curStroke.p.length;
        const dx = x - curStroke.p[n - 2], dy = y - curStroke.p[n - 1];
        if (dx * dx + dy * dy < 16) return;
        curStroke.p.push(x, y);
        // live incremental segment
        const ctx = cv.getContext('2d');
        const sx = cv.width / CV_W;
        ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        ctx.strokeStyle = curStroke.c < 0 ? '#fffdf5' : PENS[curStroke.c];
        ctx.lineWidth = (curStroke.c < 0 ? ERASER_W : PEN_W) * sx;
        ctx.beginPath();
        ctx.moveTo(curStroke.p[n - 2] * sx, curStroke.p[n - 1] * (cv.height / CV_H));
        ctx.lineTo(x * sx, y * (cv.height / CV_H));
        ctx.stroke();
    };
    const up = e => {
        if (!curStroke) return;
        if (curStroke.p.length === 2) curStroke.p.push(curStroke.p[0] + 1, curStroke.p[1] + 1);
        myStrokes.push(curStroke);
        curStroke = null;
        redrawSketch();
    };
    cv.onpointerup = up;
    cv.onpointercancel = up;
}
function setPen(i) { curPen = i; isEraser = false; syncToolbar(); }
function setEraser() { isEraser = true; syncToolbar(); }
function undoStroke() { myStrokes.pop(); redrawSketch(); }
function clearSketch() { myStrokes = []; redrawSketch(); }
function syncToolbar() {
    document.querySelectorAll('.pen').forEach((el, i) => el.classList.toggle('sel', !isEraser && i === curPen));
    const er = $id('tool-eraser');
    if (er) er.classList.toggle('sel', isEraser);
}

// newest beat animation: typewriter for text, stroke replay for drawings
function animateNewestBeat() {
    const beats = vD.beats || [];
    const beat = beats[beats.length - 1];
    if (!beat) return;
    if (beat.kind === 'drawing') {
        const cv = $id('beat-cv');
        if (!cv) return;
        sizeCanvas(cv);
        if (REDUCED || !beat.strokes.length) { drawStrokes(cv, beat.strokes); return; }
        const t0 = performance.now(), DUR = 2200;
        let lastScratch = 0;
        (function frame(t) {
            const f = Math.min(1, (t - t0) / DUR);
            drawStrokes(cv, beat.strokes, f);
            // pencil scratches in time with the replay, sparkle when it lands
            if (f < 1 && t - lastScratch > 130) { lastScratch = t; sReplayScratch(); }
            if (f < 1) _beatAnim = requestAnimationFrame(frame);
            else {
                sSparkle();
                const r = cv.getBoundingClientRect();
                burst(r.left + r.width / 2, r.top + r.height / 2, ['#f472b6', '#38bdf8', '#fbbf24'], 10);
            }
        })(t0);
    } else {
        const el = $id('beat-text');
        if (!el) return;
        const words = String(beat.text || '').split(/\s+/);
        if (REDUCED || words.length < 2) { el.textContent = beat.text; return; }
        el.textContent = '';
        let i = 0;
        _typeTimer = setInterval(() => {
            el.textContent = words.slice(0, ++i).join(' ');
            if (i >= words.length) clearInterval(_typeTimer);
        }, 140);
    }
}

function paintHistory() {
    document.querySelectorAll('canvas.mini-cv').forEach(cv => {
        const i = Number(cv.dataset.i);
        const beat = (vD.beats || [])[i];
        if (!beat || beat.kind !== 'drawing') return;
        sizeCanvas(cv);
        drawStrokes(cv, beat.strokes);
    });
}

let _lastScreenKey = '';
function render() {
    const app = $id('app');
    if (isTvHost || isViewer) ui = 'viewer';
    // 'fresh' marks a real screen change → entrance animations run once, never
    // on same-screen re-renders (drawing/toolbar, vote acks, avatar picks, joins)
    const screenKey = ui === 'viewer'
        ? 'v:' + (vD ? vD.type + ':' + (vD.step ?? '') + ':' + (vD.chainNum ?? '') + ':' + (vD.beats ? vD.beats.length : '') : '')
        : ui + (ui === 'work' ? ':' + (D ? D.step : '') : '');
    const fresh = screenKey !== _lastScreenKey;
    _lastScreenKey = screenKey;
    let html = '';
    switch (ui) {
        case 'home':       html = renderHome(); break;
        case 'creating':   html = renderSpinner('Sharpening pencils…'); break;
        case 'connecting': html = renderSpinner('Joining the game…'); break;
        case 'lobby_h':    html = renderLobbyH(); break;
        case 'lobby_g':    html = renderLobbyG(); break;
        case 'work':       html = renderWork(); break;
        case 'reveal':     html = renderRevealPhone(); break;
        case 'vote':       html = renderVotePhone(); break;
        case 'voted':      html = renderVotedPhone(); break;
        case 'podium':     html = renderPodiumPhone(); break;
        case 'viewer':     html = renderViewer(); break;
        default:           html = renderHome();
    }
    app.innerHTML = html;
    app.classList.toggle('fresh', fresh);
    // post-render wiring
    if (ui === 'work' && !submitted) {
        if ($id('draw-cv')) { initSketchCanvas(); syncToolbar(); }
        const view = $id('view-cv');
        if (view && D?.input?.strokes) { sizeCanvas(view); drawStrokes(view, D.input.strokes); }
    }
}

    const stage = !newest ? '' : (newest.kind === 'drawing'
        ? `<div class="beat-paper"><div class="bwho">🖼️ ${esc(newest.author)} drew…</div><canvas id="beat-cv" style="width:62vmin"></canvas></div>`
        : `<div class="beat-paper" style="min-width:50%"><div class="bwho">${beats.length === 1 ? '💡 ' + esc(newest.author) + ' started with…' : '🔍 ' + esc(newest.author) + ' saw…'}</div><div class="btext" id="beat-text"></div></div>`);
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Captain')} taps Next` : 'Host taps Next';
    return tvShell(`
    <div class="tv-stagewrap">
        ${history ? `<div class="tv-history">${history}</div>` : ''}
        <div class="tv-stage">${stage}</div>
    </div>
    <div class="tv-waiting" style="text-align:center">${hint} · 😂 buttons are live on the phones!</div>`,
    `Chain ${vD.chainNum} of ${vD.totalChains} — started by ${vD.owner}`);
}

function renderViewerVote() {
    const opts = (vD.options || []).map((o, i) =>
        `<div class="tv-voteopt" style="--i:${i}"><span>${esc(o.label)} <span style="color:var(--muted)">— ${esc(o.author)}</span></span></div>`).join('');
    return tvShell(`
    <div class="tv-main" style="flex-direction:column;justify-content:center;gap:2vmin">
        <div style="text-align:center;font-family:'Patrick Hand',cursive;font-size:4vmin">🗳️ Funniest beat?</div>
        <div class="tv-voteopts">${opts}</div>
        <div class="tv-waiting" style="text-align:center" id="tv-votesin">${vD.votesIn} of ${vD.playerCount} voted</div>
    </div>`, `Chain ${vD.chainNum} of ${vD.totalChains}`);
}

function renderViewerVoted() {
    const r = vD.result || { winners: [] };
    const winners = r.winners.map((w, i) =>
        `<div class="tv-voteopt win" style="--i:${i}"><span>🏆 ${esc(w.label)} <span style="color:var(--muted)">— ${esc(w.author)}</span></span><span class="votes">+${r.pts} · ${w.votes} vote${w.votes === 1 ? '' : 's'}</span></div>`).join('');
    const chips = (vD.standings || []).map((p, i) =>
        `<div class="tv-voteopt" style="padding:.9vmin 1.6vmin;--i:${r.winners.length + i}"><span>${esc(p.avatar)} ${esc(p.name)}</span><span class="votes">${p.score}</span></div>`).join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Captain')}: ${vD.isLast ? '“See the podium”' : '“Next chain”'} is on your phone` : `Host: ${vD.isLast ? '“See the podium”' : '“Next chain”'} is on your phone`;
    return tvShell(`
    <div class="tv-main" style="flex-direction:column;justify-content:center;gap:2vmin">
        <div style="text-align:center;font-family:'Patrick Hand',cursive;font-size:4vmin">The votes are in!</div>
        <div class="tv-voteopts">${winners || '<div class="tv-waiting" style="text-align:center">Nobody voted!</div>'}</div>
        <div class="tv-voteopts" style="max-width:44%">${chips}</div>
        <div class="tv-waiting" style="text-align:center">${hint}</div>
    </div>`, `Chain ${vD.chainNum} of ${vD.totalChains}`);
}

function renderViewerPodium() {
    const st = vD.standings || [];
    const podOrder = [st[1], st[0], st[2]].filter(Boolean);
    const cls = st.length >= 3 ? ['p2', 'p1', 'p3'] : (st.length === 2 ? ['p2', 'p1'] : ['p1']);
    const medal = { p1: '🥇', p2: '🥈', p3: '🥉' };
    const pods = podOrder.map((p, i) => `
        <div class="pod ${cls[i]}" style="animation-delay:${i * 0.18}s">
            ${cls[i] === 'p1' ? '<div class="crown">👑</div>' : ''}
            <div class="big">${esc(p.avatar)}</div>
            <div class="pname">${esc(p.name)}</div>
            <div class="pscore">${p.score} pts${p.lols ? ` · 😂${p.lols}` : ''}</div>
            <div class="block">${medal[cls[i]]}</div>
        </div>`).join('');
    const awards = (vD.awards || []).map(a =>
        `<div class="award">${a.emoji} <span class="aw-t">${esc(a.title)}</span><br>${esc(a.name)} — ${esc(a.detail)}</div>`).join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Captain')}: “Play again” is on your phone` : 'Host: “Play again” is on your phone';
    return tvShell(`
    <div class="tv-main" style="flex-direction:column">
        <div class="podium-wrap">${pods}</div>
        <div class="awards-row">${awards}</div>
        <div class="tv-waiting" style="text-align:center;padding-bottom:1.5vmin">${hint}</div>
    </div>`, '🏆 Final gallery');
}

window.addEventListener('resize', () => {
    const cv = $id('confetti-cv');
    if (cv && _cf.running) { cv.width = innerWidth; cv.height = innerHeight; }
});

// ═══════════════════════════════════════════
// SIMULATION MODES — ?mode=tvsimulation | playersimulation  (&players=N)
// Self-driving demos with no PeerJS and no real people. Bots are counted as
// "connected" via stub guestConns so the normal host flow drives everything.
//   • tvsimulation     — watch the big-screen studio play itself
//   • playersimulation — watch a phone artist ("You") play itself
// (?mode=simulation stays as an alias for tvsimulation.)
// Drawing is a human act, so bots submit trivial placeholder squiggles/guesses;
// the demo is about the prompt → draw → describe → reveal → vote → podium FLOW.
// ═══════════════════════════════════════════
let simTimer = null, simMode = 'tv', simRunning = false;
const SIM_NAMES = ['Ace', 'Bux', 'Cash', 'Duke', 'Edie', 'Fox', 'Gwen', 'Hawk'];
const SIM_GUESSES = ['a happy dragon', 'dad dancing badly', 'a confused cat', 'pizza on the moon',
    'a robot at a party', 'a sleepy sloth', 'total banana chaos', 'a shark in a hat',
    'grandma on a skateboard', 'a duck reading news'];

function simStrokes() {
    const c = Math.floor(Math.random() * PENS.length);
    const pts = [];
    let x = 200 + Math.random() * 250, y = 200 + Math.random() * 200;
    const n = 6 + Math.floor(Math.random() * 8);
    for (let i = 0; i < n; i++) {
        x += (Math.random() - 0.5) * 300; y += (Math.random() - 0.5) * 220;
        x = Math.max(20, Math.min(CV_W - 20, x)); y = Math.max(20, Math.min(CV_H - 20, y));
        pts.push(Math.round(x), Math.round(y));
    }
    return [{ c, p: pts }];
}
function simGuess() { return SIM_GUESSES[Math.floor(Math.random() * SIM_GUESSES.length)]; }
function simDelay() { return simMode === 'player' ? 950 : 800; }

function startSimulation(nPlayers, mode) {
    simMode = mode === 'player' ? 'player' : 'tv';
    roomCode = 'DEMO';
    H.settings = { pace: 'brisk', shortCircuit: false };
    H.players = []; guestConns = {}; viewerConns = {};
    const n = Math.max(minPlayers(), Math.min(nPlayers || 4, MAX_PLAYERS));
    if (simMode === 'tv') {
        isHost = true; isTvHost = true; myId = '__sim_host__';
        document.body.classList.add('viewer-mode');
    } else {
        isHost = true; isTvHost = false; myName = 'You'; myId = '__you__';
        hostAddPlayer(myId, myName);                 // You are artist #1 (the host)
    }
    for (let i = H.players.length; i < n; i++) {
        const id = '__bot_' + i;
        hostAddPlayer(id, SIM_NAMES[i % SIM_NAMES.length]);
        guestConns[id] = { peer: id, send() {} };    // stub so bots count as present
    }
    broadcastLobby();                                // show the lobby first
    simTimer = setTimeout(() => { simRunning = true; simStartGame(); }, 2400);
}

function simStartGame() {
    if (!simRunning) return;
    hostStartGame();                                 // → phase 'work', step 0
    simTimer = setTimeout(simLoop, simMode === 'player' ? 1600 : 1200);
}

// One polling driver reads H.phase each tick and nudges the real host flow.
function simLoop() {
    if (!simRunning) return;
    const ph = H.phase;
    if (ph === 'work') {
        const step = H.step;
        const pending = H.players.filter(p => seatOf(p.id) >= 0 && !H.pending[p.id]);
        if (pending.length) simSubmit(pending[0], step);
        // maybeFinishStep auto-advances 500ms after the last submission
    } else if (ph === 'reveal') {
        hostNextBeat();                              // step through beats, then startVote()
    } else if (ph === 'vote') {
        const pending = H.players.filter(p => seatOf(p.id) >= 0 && H.votes[p.id] === undefined);
        if (pending.length) simVote(pending[0]);
        // maybeFinishVote auto-advances to 'voted'
    } else if (ph === 'voted') {
        hostNextChain();                             // → next chain reveal or podium
    } else if (ph === 'podium') {
        simRunning = false;                          // gameover: pause, then loop
        simTimer = setTimeout(() => {
            hostNewGame();
            simTimer = setTimeout(() => { simRunning = true; simStartGame(); }, 2600);
        }, 7000);
        return;
    }
    simTimer = setTimeout(simLoop, simDelay());
}

function simSubmit(p, step) {
    if (H.phase !== 'work' || H.step !== step || H.pending[p.id]) return;
    const kind = stepKind(step);
    if (simMode === 'player' && p.id === myId && D && ui === 'work' && !submitted) {
        // drive You through the real phone submit so its animation fires
        if (kind === 'draw') myStrokes = simStrokes(); else workText = simGuess();
        submitWork();
        return;
    }
    if (kind === 'draw') hostSubmit(p, { step, strokes: simStrokes() });
    else hostSubmit(p, { step, text: simGuess() });
}

function simVote(p) {
    if (H.phase !== 'vote') return;
    const beats = H.chains[H.revealChain].beats;
    const choices = [];
    beats.forEach((b, i) => { if (b.author !== p.id) choices.push(i); });
    if (!choices.length) return;
    const beat = choices[Math.floor(Math.random() * choices.length)];
    if (simMode === 'player' && p.id === myId && D && ui === 'vote' && !D.voted) { sendVote(beat); return; }
    hostVote(p, beat);
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
(function boot() {
    const params = new URLSearchParams(location.search);
    const mode = (params.get('mode') || '').toLowerCase();
    const simPlayers = parseInt(params.get('players'), 10) || 4;
    if (mode === 'playersimulation') { startSimulation(simPlayers, 'player'); return; }
    if (mode === 'tvsimulation' || mode === 'simulation') { startSimulation(simPlayers, 'tv'); return; }
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    if (!fAvatar) fAvatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];
    if (!musicOn) $id('tog-music').classList.add('off');
    if (!sfxOn) $id('tog-sfx').classList.add('off');
    render();
})();
</script>
