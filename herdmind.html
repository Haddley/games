<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Herd Mind</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230b1c10' width='100' height='100' rx='20'/><text x='50' y='68' font-size='52' text-anchor='middle'>🐄</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0b1c10;
            --paper: #f8f4e3; --paper2: #efe8cf; --ink: #2f3b24; --ink-soft: #6e7a58;
            --cream: #f2eeda; --muted: #9fb18c;
            --grass: #4ade80; --pink: #f472b6; --sun: #fde047; --bad: #ef4444;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--cream);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            padding: 26px 16px 48px; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 45% at 50% -5%, rgba(253,224,71,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 10% 100%, rgba(74,222,128,0.12) 0%, transparent 65%),
                radial-gradient(ellipse 60% 40% at 92% 100%, rgba(244,114,182,0.08) 0%, transparent 65%);
        }
        body.viewer-mode { padding: 0; overflow: hidden; display: block; height: 100dvh; width: 100vw; }

        h1.logo {
            font-family: 'Baloo 2', sans-serif; font-weight: 800; letter-spacing: 1px;
            font-size: clamp(1.7rem, 7vw, 2.6rem); text-align: center; color: var(--grass);
            text-shadow: 0 2px 0 rgba(0,0,0,.35), 0 0 30px rgba(74,222,128,.35);
        }
        .sub { color: var(--muted); font-size: .7rem; letter-spacing: 2.5px; text-transform: uppercase; margin: 6px 0 22px; text-align: center; font-weight: 800; }

        #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 14px; }
        body.viewer-mode #app { max-width: none; height: 100dvh; display: block; }

        .card {
            background: var(--paper); color: var(--ink); border-radius: 18px;
            padding: 20px; box-shadow: 0 14px 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(110,122,88,.2);
        }
        .card.dark { background: rgba(28,46,28,.72); color: var(--cream); box-shadow: 0 10px 30px rgba(0,0,0,.4), inset 0 0 0 1px rgba(74,222,128,.16); }
        .card.highlight { outline: 3px solid var(--grass); outline-offset: 2px; }
        .card.cow { outline: 3px solid var(--pink); outline-offset: 2px; }
        .slbl { font-size: .68rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 12px; }
        .card.dark .slbl { color: var(--muted); }

        .fg { margin-bottom: 12px; }
        .fg label { display: block; font-size: .68rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 5px; }
        input[type=text] {
            width: 100%; padding: 12px 14px; font-family: inherit; font-size: 1.05rem; font-weight: 700;
            border: 2px solid rgba(110,122,88,.4); border-radius: 12px; background: #fffdf2; color: var(--ink);
            outline: none;
        }
        input[type=text]:focus { border-color: var(--grass); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit; font-weight: 900; font-size: .95rem; letter-spacing: .4px;
            padding: 13px 18px; border: none; border-radius: 14px; cursor: pointer;
            transition: filter .12s, opacity .12s, box-shadow .12s; user-select: none; -webkit-user-select: none;
        }
        .btn:active { filter: brightness(.92); }
        .btn-p { background: linear-gradient(180deg, #86efac, #22c55e); color: #062812; box-shadow: 0 5px 0 #14532d, 0 10px 22px rgba(74,222,128,.3); }
        .btn-p:active { box-shadow: 0 2px 0 #14532d; }
        .btn-c { background: linear-gradient(180deg, #f9a8d4, #ec4899); color: #3d0a24; box-shadow: 0 5px 0 #831843, 0 10px 22px rgba(244,114,182,.3); }
        .btn-c:active { box-shadow: 0 2px 0 #831843; }
        .btn-g { background: rgba(47,59,36,.12); color: inherit; box-shadow: inset 0 0 0 2px rgba(110,122,88,.4); }
        .card.dark .btn-g, body.viewer-mode .btn-g { box-shadow: inset 0 0 0 2px rgba(159,177,140,.4); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 8px 13px; font-size: .78rem; border-radius: 11px; }
        .btn:disabled { opacity: .45; cursor: default; }

        .err {
            background: rgba(239,68,68,.14); border: 1px solid rgba(239,68,68,.5); color: #ffb3b3;
            padding: 11px 14px; border-radius: 12px; font-size: .82rem; font-weight: 700; text-align: center;
        }
        hr { border: none; border-top: 1px dashed rgba(110,122,88,.4); margin: 14px 0; }

        .connecting { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 46px 0; color: var(--muted); font-weight: 700; }
        .spin { width: 34px; height: 34px; border-radius: 50%; border: 4px solid rgba(74,222,128,.2); border-top-color: var(--grass); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .avrow { display: flex; flex-wrap: wrap; gap: 7px; }
        .av {
            width: 42px; height: 42px; border-radius: 12px; font-size: 1.35rem; display: flex; align-items: center; justify-content: center;
            background: #fffdf2; border: 2px solid rgba(110,122,88,.35); cursor: pointer;
        }
        .av.sel { border-color: var(--pink); background: #ffe9f4; box-shadow: 0 4px 12px rgba(244,114,182,.35); }

        .player-row { display: flex; align-items: center; gap: 11px; padding: 9px 4px; border-bottom: 1px dashed rgba(110,122,88,.3); font-weight: 800; }
        .player-row:last-child { border-bottom: none; }
        .pav { width: 38px; height: 38px; border-radius: 11px; background: var(--paper2); border: 2px solid rgba(110,122,88,.3); font-size: 1.25rem; display: flex; align-items: center; justify-content: center; }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--grass); box-shadow: 0 0 8px var(--grass); }
        .qr-wrap { width: min(220px, 60vw); margin: 6px auto 10px; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 22px rgba(0,0,0,.25); }
        .qr-wrap svg { display: block; width: 100%; height: auto; }
        .room-code { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 2.3rem; letter-spacing: 12px; text-align: center; color: var(--ink); padding-left: 12px; }
        .share-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px; }
        .seg-row { display: flex; flex-wrap: wrap; gap: 7px; }

        /* phone: answer phase */
        .prompt-card .pr { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.35rem; line-height: 1.35; }
        .prompt-kicker { font-size: .66rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: #d9488f; margin-bottom: 8px; }
        .locked-note { text-align: center; font-weight: 900; color: var(--grass); font-size: 1rem; padding: 8px 0 2px; }
        .waiting-big { text-align: center; padding: 30px 10px; }
        .waiting-big .big { font-size: 3.2rem; animation: bob 2.2s ease-in-out infinite; }
        @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
        .waiting-big .t { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.3rem; margin-top: 8px; }
        .waiting-big .s { color: var(--ink-soft); font-weight: 700; font-size: .82rem; margin-top: 5px; }

        /* judge merge UI */
        .herd-chip {
            display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
            background: #fffdf2; border: 2px solid rgba(110,122,88,.35); border-radius: 13px;
            padding: 11px 13px; font-family: inherit; font-weight: 800; font-size: .95rem; color: var(--ink);
            cursor: pointer; margin-bottom: 8px;
        }
        .herd-chip.selme { border-color: var(--pink); background: #ffe9f4; box-shadow: 0 0 0 3px rgba(244,114,182,.25); }
        .herd-chip .hc-count { margin-left: auto; background: var(--grass); color: #062812; border-radius: 10px; padding: 2px 10px; font-weight: 900; }
        .herd-chip .hc-names { font-size: .68rem; color: var(--ink-soft); font-weight: 700; }

        /* phone verdict */
        .verdict { text-align: center; padding: 8px 0 4px; }
        .verdict .vico { font-size: 3.2rem; }
        .verdict .vt { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.5rem; margin-top: 4px; }
        .verdict .vpts { font-size: 2rem; font-weight: 900; color: #16a34a; margin-top: 2px; }
        .chip { display: inline-block; padding: 4px 12px; border-radius: 12px; background: rgba(74,222,128,.16); border: 1px solid rgba(34,197,94,.45); color: #15803d; font-weight: 900; font-size: .78rem; margin: 3px; }
        .chip.cowchip { background: rgba(244,114,182,.14); border-color: rgba(244,114,182,.5); color: #d9488f; }
        .standings .sc { margin-left: auto; font-weight: 900; }
        .standings .delta { color: #16a34a; font-size: .75rem; font-weight: 900; margin-left: 7px; }

        /* ═════════ TV ═════════ */
        .tv { height: 100dvh; display: flex; flex-direction: column; padding: 3vmin 3.4vmin; gap: 2vmin; }
        .tv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2vmin; }
        .tv-logo { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 3.4vmin; color: var(--grass); text-shadow: 0 0 24px rgba(74,222,128,.4); }
        .tv-meta { font-size: 1.9vmin; font-weight: 900; letter-spacing: .4vmin; text-transform: uppercase; color: var(--muted); }
        .tv-main { flex: 1; display: flex; gap: 2.6vmin; min-height: 0; }
        .tv-stage { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
        .tv-rail { width: 30vmin; min-width: 240px; display: flex; flex-direction: column; gap: 1.4vmin; overflow: hidden; }
        .tv-rail .rail-title { font-size: 1.7vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .rail-row {
            display: flex; align-items: center; gap: 1.2vmin; background: rgba(28,46,28,.7);
            border: 1px solid rgba(74,222,128,.18); border-radius: 1.6vmin; padding: 1.2vmin 1.5vmin;
            font-weight: 800; font-size: 2vmin; position: relative;
        }
        .rail-row .rav { font-size: 2.6vmin; }
        .rail-row .rname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rail-row .rsc { font-weight: 900; color: var(--sun); font-variant-numeric: tabular-nums; }
        .rail-row .rcow { font-size: 2.4vmin; }
        .rail-row.locked::after { content: '✓'; color: var(--grass); font-weight: 900; font-size: 2vmin; }
        .rail-row .rdelta { position: absolute; right: 1vmin; top: -1.3vmin; font-size: 1.6vmin; font-weight: 900; color: #86efac; text-shadow: 0 2px 6px rgba(0,0,0,.6); animation: riseIn .5s ease both; }
        @keyframes riseIn { from { opacity: 0; transform: translateY(1vmin); } to { opacity: 1; transform: none; } }

        .tv-paper {
            flex: 1; background: var(--paper); color: var(--ink); border-radius: 2.4vmin;
            box-shadow: 0 18px 60px rgba(0,0,0,.55), inset 0 0 0 1px rgba(110,122,88,.25);
            padding: 4vmin 5vmin; overflow: auto; display: flex; flex-direction: column;
        }
        .tv-paper .prompt-kicker { font-size: 1.6vmin; letter-spacing: .45vmin; margin-bottom: 1.6vmin; }
        .tv-paper .tv-prompt { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 4.2vmin; line-height: 1.35; }
        .tv-pen { margin-top: auto; text-align: center; font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 3vmin; color: var(--ink-soft); }
        .tv-pen b { color: #16a34a; }

        .herd-rows { flex: 1; display: flex; flex-direction: column; gap: 1.4vmin; justify-content: center; }
        .herd-row {
            display: flex; align-items: center; gap: 1.6vmin; background: #fffdf2;
            border: 2px solid rgba(110,122,88,.3); border-radius: 1.8vmin; padding: 1.4vmin 2vmin;
            animation: popIn .45s ease both;
        }
        .herd-row.win { border-color: #22c55e; box-shadow: 0 0 26px rgba(74,222,128,.4); }
        .herd-row.cowrow { border-color: var(--pink); box-shadow: 0 0 26px rgba(244,114,182,.4); }
        .herd-row .h-count { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 3.6vmin; width: 6vmin; text-align: center; color: #16a34a; }
        .herd-row.cowrow .h-count { color: #d9488f; }
        .herd-row .h-label { font-weight: 900; font-size: 2.6vmin; color: var(--ink); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .herd-row .h-members { display: flex; gap: .6vmin; font-size: 2.6vmin; flex-wrap: wrap; justify-content: flex-end; }
        @keyframes popIn { from { opacity: 0; transform: scale(.75); } to { opacity: 1; transform: scale(1); } }
        .cow-banner {
            text-align: center; font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 3vmin;
            color: var(--pink); text-shadow: 0 0 20px rgba(244,114,182,.35); animation: popIn .5s ease both;
        }

        /* TV lobby */
        .tv-lobby { flex: 1; display: flex; gap: 4vmin; align-items: center; min-height: 0; }
        .tv-lobby .qr-side { background: var(--paper); color: var(--ink); border-radius: 2.4vmin; padding: 3.4vmin; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
        .tv-lobby .qr-side .qr-wrap { width: 34vmin; margin: 1.5vmin auto; }
        .tv-lobby .qr-side .room-code { font-size: 5vmin; letter-spacing: 2vmin; padding-left: 2vmin; }
        .tv-lobby .join-hint { font-size: 1.8vmin; font-weight: 800; color: var(--ink-soft); }
        .tv-players { flex: 1; display: flex; flex-direction: column; gap: 1.6vmin; min-width: 0; }
        .tv-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20vmin, 1fr)); gap: 1.6vmin; }
        .tv-pcard {
            background: rgba(28,46,28,.72); border: 1px solid rgba(74,222,128,.2); border-radius: 1.8vmin;
            padding: 1.8vmin; text-align: center; font-weight: 900; font-size: 2vmin; animation: popIn .35s ease both;
        }
        .tv-pcard .pav-big { font-size: 4.4vmin; }
        .tv-waiting { color: var(--muted); font-weight: 800; font-size: 2vmin; }

        /* podium */
        .podium-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 2.4vmin; padding-bottom: 2vmin; }
        .pod { text-align: center; font-weight: 900; animation: podRise .6s cubic-bezier(.2,.8,.3,1) both; }
        .pod .pname { font-size: 2.4vmin; margin-bottom: 1vmin; }
        .pod .pscore { font-size: 2vmin; color: var(--sun); margin-bottom: 1vmin; }
        .pod .block { border-radius: 1.6vmin 1.6vmin 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 1.4vmin; font-size: 3.4vmin; width: 18vmin; }
        .pod.p1 .block { height: 22vmin; background: linear-gradient(180deg, #86efac, #15803d); }
        .pod.p2 .block { height: 15vmin; background: linear-gradient(180deg, #d7d7e0, #8f8fa3); }
        .pod.p3 .block { height: 10vmin; background: linear-gradient(180deg, #f9a8d4, #be3d86); }
        .pod .pav-big { font-size: 5vmin; }
        .awards-row { display: flex; gap: 1.6vmin; justify-content: center; flex-wrap: wrap; }
        .award {
            background: rgba(28,46,28,.75); border: 1px solid rgba(253,224,71,.3); border-radius: 1.6vmin;
            padding: 1.4vmin 2.2vmin; font-weight: 800; font-size: 1.9vmin; text-align: center;
        }
        .award .aw-t { color: var(--sun); font-weight: 900; }

        #confetti-cv { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

        /* sound toggles */
        #sound-togs { position: fixed; top: 10px; right: 10px; z-index: 80; display: flex; gap: 6px; }
        #sound-togs button {
            width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem;
            background: rgba(28,46,28,.78); box-shadow: inset 0 0 0 1px rgba(74,222,128,.25);
            transition: opacity .2s, transform .12s;
        }
        #sound-togs button:active { transform: scale(.88); }
        #sound-togs button.off { opacity: .35; filter: grayscale(1); }
        body.viewer-mode .tv-top { padding-right: 96px; }

        /* FX layer — particles + floating pop text */
        .pt {
            position: fixed; width: 9px; height: 9px; border-radius: 2px;
            z-index: 950; pointer-events: none;
            animation: ptFly .75s cubic-bezier(.15,.65,.4,1) forwards;
        }
        @keyframes ptFly {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(560deg) scale(.3); opacity: 0; }
        }
        .pop {
            position: fixed; z-index: 960; pointer-events: none;
            font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.5rem;
            animation: popUp 1.1s cubic-bezier(.2,.8,.3,1) forwards;
            text-shadow: 0 2px 12px rgba(0,0,0,.6); white-space: nowrap;
        }
        .pop.good { color: var(--grass); }
        .pop.cow  { color: var(--pink); }
        @keyframes popUp {
            0%   { transform: translate(-50%, 0) scale(.5); opacity: 0; }
            15%  { transform: translate(-50%, -12px) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -78px) scale(1); opacity: 0; }
        }

        /* screen entrances — only on phase changes (#app.fresh), so patches never re-trigger */
        @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        #app.fresh .card { animation: cardIn .35s cubic-bezier(.2,.8,.3,1) both; }
        #app.fresh .tv-paper, #app.fresh .qr-side { animation: cardIn .4s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes rowIn { from { opacity: 0; transform: scale(.92) translateY(6px); } to { opacity: 1; transform: none; } }
        #app.fresh .player-row, #app.fresh .herd-chip { animation: rowIn .3s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 40ms); }
        @keyframes vicoPop { 0% { transform: scale(0) rotate(-14deg); } 60% { transform: scale(1.25) rotate(4deg); } 100% { transform: scale(1) rotate(0); } }
        #app.fresh .vico { animation: vicoPop .5s cubic-bezier(.2,.8,.3,1) both; display: inline-block; }
        @keyframes vptsPop { 0% { opacity: 0; transform: scale(.4); } 60% { transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }
        #app.fresh .vpts { animation: vptsPop .45s .18s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes cowWobble {
            0%, 100% { transform: rotate(0); } 20% { transform: rotate(-2.5deg); }
            40% { transform: rotate(2deg); } 60% { transform: rotate(-1.5deg); } 80% { transform: rotate(1deg); }
        }
        #app.fresh .card.verdict.cow { animation: cardIn .35s cubic-bezier(.2,.8,.3,1) both, cowWobble .8s .38s ease-in-out both; }
        @keyframes podRise { from { transform: translateY(35%); opacity: 0; } to { transform: none; opacity: 1; } }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
    </style>
</head>
<body>
    <div id="app"></div>
    <canvas id="confetti-cv"></canvas>
    <div id="sound-togs">
        <button id="tog-music" title="Music on/off" onclick="toggleMusic()">🎵</button>
        <button id="tog-sfx" title="Sound effects on/off" onclick="toggleSfx()">🔊</button>
    </div>
<script>
// TURN relay (Metered) so players on restrictive/remote networks can connect,
// not just those behind friendly NATs. Applied to every Peer below.
const ICE_CFG = { config: { iceServers: [
    { urls: 'stun:stun.relay.metered.ca:80' },
    { urls: 'turn:global.relay.metered.ca:80', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' },
    { urls: 'turn:global.relay.metered.ca:80?transport=tcp', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' },
    { urls: 'turn:global.relay.metered.ca:443', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' },
    { urls: 'turns:global.relay.metered.ca:443?transport=tcp', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' }
] } };

'use strict';

// ═══════════════════════════════════════════
// CONSTANTS & CONTENT
// ═══════════════════════════════════════════
const PFX = 'HERDMIND-';
const MAX_PLAYERS = 12, MIN_PLAYERS = 2;
const AVATARS = ['🐑', '🐷', '🐔', '🐴', '🦆', '🐐', '🐰', '🦔', '🐶', '🐱', '🦉', '🐸'];

const PROMPTS = [
    'Name a food you eat with your hands',
    'The best pizza topping',
    'A sound the dog makes',
    'Something you lose down the sofa',
    'The best superpower',

function $id(id) { return document.getElementById(id); }
function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function shuffle(a) { const r = a.slice(); for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// answer normalization: lowercase, trim, collapse spaces, naive singular
function normAnswer(s) {
    let t = String(s || '').toLowerCase().trim().replace(/\s+/g, ' ');
    if (t.length > 3 && t.endsWith('s') && !t.endsWith('ss')) t = t.slice(0, -1);
    return t;
}

// ── QR code (themed SVG) ──
function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++)
            for (let c = 0; c < n; c++)
                if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#fffdf2"/>` +
            `<g fill="#22321c">${rects}</g></svg>`;
    } catch (e) { return ''; }
}

// ── Confetti ──
let _cf = { parts: [], raf: 0, running: false, until: 0 };
function startConfetti(ms) {
    if (REDUCED) return;
    const cv = $id('confetti-cv'), ctx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    _cf.until = performance.now() + (ms || 2600);
    const cols = ['#4ade80', '#f472b6', '#fde047', '#86efac', '#f9a8d4', '#f8f4e3'];
    for (let i = 0; i < 130; i++) {
        _cf.parts.push({
            x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.5,
            vx: (Math.random() - 0.5) * 2.4, vy: 2 + Math.random() * 3.6,
            rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.25,
            w: 6 + Math.random() * 7, h: 4 + Math.random() * 5,
            col: cols[Math.floor(Math.random() * cols.length)],
        });
    }
    if (_cf.running) return;
    _cf.running = true;
    (function frame(t) {
        ctx.clearRect(0, 0, cv.width, cv.height);
        _cf.parts = _cf.parts.filter(p => p.y < cv.height + 30);
        for (const p of _cf.parts) {
            p.x += p.vx; p.y += p.vy; p.rot += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        }
        if (t < _cf.until || _cf.parts.length) _cf.raf = requestAnimationFrame(frame);
        else { _cf.running = false; ctx.clearRect(0, 0, cv.width, cv.height); }
    })(performance.now());
}

// AUDIO — procedural pastoral chiptune + SFX
// (G-major folk: plucky triangle lead over
//  drone-fifth bass; the melody repeats itself
//  like a herd copying. Gesture-started,
//  music ~0.33 vol, SFX on top.)
// ═══════════════════════════════════════════
let AC = null, masterGain = null, musicGain = null, sfxGain = null, noiseBuf = null;
let leadBus = null, musicDelay = null;
let musicOn = localStorage.getItem('herd-music') !== '0';
let sfxOn = localStorage.getItem('herd-sfx') !== '0';

function ac() {
    if (!AC) {
        try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
        masterGain = AC.createGain(); masterGain.gain.value = 1; masterGain.connect(AC.destination);
        musicGain = AC.createGain(); musicGain.gain.value = musicOn ? 0.33 : 0; musicGain.connect(masterGain);
        sfxGain = AC.createGain(); sfxGain.gain.value = sfxOn ? 0.55 : 0; sfxGain.connect(masterGain);
        // Lead bus with a gentle barn echo
        leadBus = AC.createGain(); leadBus.gain.value = 1; leadBus.connect(musicGain);
        musicDelay = AC.createDelay(1.5); musicDelay.delayTime.value = 0.28;
        const fb = AC.createGain(); fb.gain.value = 0.2;
        const dlp = AC.createBiquadFilter(); dlp.type = 'lowpass'; dlp.frequency.value = 2000;
        const wet = AC.createGain(); wet.gain.value = 0.18;
        leadBus.connect(musicDelay); musicDelay.connect(dlp); dlp.connect(fb); fb.connect(musicDelay);
        dlp.connect(wet); wet.connect(musicGain);
        const len = AC.sampleRate * 1.2;
        noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    if (AC.state === 'suspended') AC.resume();
    return AC;
}

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide, 20), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    if (lp) {
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
        o.connect(f); f.connect(g);
    } else {
        o.connect(g);
    }
    g.connect(dest || sfxGain);
    o.start(t); o.stop(t + dur + 0.06);
}

function noiseHit(dur, { vol = 0.3, when = 0, hp = 6000, dest = null } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const src = AC.createBufferSource(); src.buffer = noiseBuf;
    const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(dest || sfxGain);
    src.start(t); src.stop(t + dur + 0.05);
}

const mf = m => 440 * Math.pow(2, (m - 69) / 12); // midi → freq

// double per note; grows with how many matched
function sHerd(n) {
    if (!sfxOn || !AC) return;
    const PENT = [0, 2, 4, 7, 9, 12, 14, 16, 19];
    const count = Math.min(3 + (n || 2), PENT.length);
    for (let i = 0; i < count; i++) {
        const f = mf(74 + PENT[i]);
        tone(f, 0.12, { type: 'triangle', vol: 0.26, when: i * 0.06 });
        tone(f * 1.006, 0.12, { type: 'triangle', vol: 0.1, when: i * 0.06 });

            { 0: [55,59,62], 16: [55,60,64] },
            { 0: [54,57,62], 16: [55,59,62] },
        ] },
};
let musicTrack = 'lobby', musicStep = 0, musicBar = 0, musicNext = 0, musicTimer = null, musicUrgent = false;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    // Swing: push every off-16th slightly late for a looser folk sway
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) tone(140, 0.24, { type: 'sine', vol: 0.42, when: rel, slide: 42, dest: musicGain });
    if (tr.hat[i]) {
        const hv = (i % 4 === 2 ? 0.11 : 0.055) * (0.8 + Math.random() * 0.4);
        noiseHit(0.045, { vol: hv, when: rel, hp: 9500, dest: musicGain });
    }
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) tone(mf(b), stepDur * 1.6, { type: w.bass || 'triangle', vol: 0.3, when: rel, dest: musicGain, lp: 1000, attack: 0.006 });
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    if (tr.stab && tr.stab[i] && ch)
        ch.forEach(m => tone(mf(m + 12), stepDur * 0.9, { type: w.stab || 'sine', vol: 0.035, when: rel, lp: 2600, dest: musicGain, attack: 0.005 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null) {
        if (musicUrgent) l += 12;
        // Plucky lead: short attack, lowpassed triangle
        tone(mf(l), stepDur * 1.5, { type: w.lead || 'triangle', vol: 0.13 * (0.9 + Math.random() * 0.2), when: rel, dest: leadBus, lp: tr.leadLp || 3800, attack: 0.005 });
    }
    // Music-box shimmer two octaves above the pads
    if (tr.arp && i % tr.arp === 0 && ch)
        tone(mf(ch[(i / tr.arp) % ch.length] + 24), stepDur * tr.arp * 0.9, { type: w.arpW || 'sine', vol: 0.045, when: rel, lp: 5200, dest: musicGain, attack: 0.004 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.035, { vol: 0.1, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'think') musicUrgent = false;
}

function toggleMusic() {
    musicOn = !musicOn;
    localStorage.setItem('herd-music', musicOn ? '1' : '0');
    if (!AC && musicOn) { ac(); startMusicLoop(); }
    if (AC && musicGain) musicGain.gain.linearRampToValueAtTime(musicOn ? 0.33 : 0, AC.currentTime + 0.2);
    $id('tog-music').classList.toggle('off', !musicOn);
}
function toggleSfx() {
    sfxOn = !sfxOn;
    localStorage.setItem('herd-sfx', sfxOn ? '1' : '0');
    if (AC && sfxGain) sfxGain.gain.value = sfxOn ? 0.55 : 0;
    $id('tog-sfx').classList.toggle('off', !sfxOn);
}

// Unlock audio on first interaction (browser autoplay policy)
let _audioUnlocked = false;
document.addEventListener('pointerdown', () => {
    if (_audioUnlocked) return;
    _audioUnlocked = true;
    if (ac()) startMusicLoop();

// ── Particle bursts + floating score text ──
function burst(x, y, colors, n = 14) {

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let peer = null, myId = '', myName = '', myAvatar = '', isHost = false, isTvHost = false, isViewer = false, roomCode = '';
let hostConn = null, guestConns = {}, viewerConns = {};
let ui = 'home';   // home|creating|connecting|lobby_h|lobby_g|answer|grouping|reveal|podium|viewer
let uiErr = '';
let fName = localStorage.getItem('herd-name') || '';
let fAvatar = localStorage.getItem('herd-avatar') || '';
let fCode = '', fVCode = '';
let D = null, vD = null;

// phone-local
let myText = '', mergeSel = null;

// Host authoritative state
let H = {
    phase: 'lobby',            // lobby|answer|grouping|reveal|podium
    players: [],               // [{id,name,avatar,score,hasCow,majorities,cowPickups,lastGain,gotCowNow,answer}]
    settings: { target: 8 },
    round: 0,
    promptOrder: [], promptIx: -1, prompt: '',
    groups: [],                // [{key,label,members:[ids]}] — during grouping/reveal
    winningKeys: [], cowTaker: null, pendingWinner: null,
};

// ═══════════════════════════════════════════
// NETWORK
// ═══════════════════════════════════════════
function send(conn, msg) { try { conn.send(msg); } catch (e) { console.warn('send err', e); } }
function broadcastViewers(msg) { Object.values(viewerConns).forEach(c => send(c, msg)); }
function connectedPlayers() {
    return H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
}
function judgePlayer() { return isTvHost ? (connectedPlayers()[0] || H.players[0] || null) : null; }
function judgeName() { return isTvHost ? (judgePlayer()?.name || null) : null; }

function hostAddPlayer(id, name, avatar) {
    if (H.players.find(p => p.id === id) || H.players.length >= MAX_PLAYERS) return;
    const taken = new Set(H.players.map(p => p.avatar));
    const av = avatar && !taken.has(avatar) ? avatar : (AVATARS.find(a => !taken.has(a)) || '🐑');
    H.players.push({ id, name, avatar: av, score: 0, hasCow: false, majorities: 0, cowPickups: 0, lastGain: 0, gotCowNow: false, answer: null });
}

function railPlayers() {
    return H.players
        .map(p => ({ name: p.name, avatar: p.avatar, score: p.score, hasCow: p.hasCow, locked: p.answer !== null, delta: p.lastGain }))
        .sort((a, b) => b.score - a.score);
}
function standings() {
    return H.players.slice().sort((a, b) => b.score - a.score)
        .map(p => ({ name: p.name, avatar: p.avatar, score: p.score, hasCow: p.hasCow, delta: p.lastGain, majorities: p.majorities, cowPickups: p.cowPickups }));
}

function lobbyMsg() {
    return {
        type: 'lobby', roomCode,
        players: H.players.map(p => ({ name: p.name, avatar: p.avatar })),
        settings: { ...H.settings },
        tvHost: isTvHost, captain: judgeName(),
    };
}
function answerMsgFor(p) {
    return {
        type: 'answer', round: H.round, prompt: H.prompt, target: H.settings.target,
        lockedCount: H.players.filter(q => q.answer !== null).length,
        playerCount: connectedPlayers().length,
        myLocked: p ? p.answer !== null : false, myAnswer: p ? p.answer : null,
        tvHost: isTvHost, captain: judgeName(),
    };
}
function groupsPayload() {
    return H.groups.map(g => ({
        key: g.key, label: g.label, count: g.members.length,
        names: g.members.map(id => H.players.find(p => p.id === id)?.name || '?'),
        avatars: g.members.map(id => H.players.find(p => p.id === id)?.avatar || '❔'),
    })).sort((a, b) => b.count - a.count);
}
function groupingMsgFor(p) {
    const judge = (isHost && !isTvHost) ? (p && p.id === myId) : (isTvHost && p && p.id === judgePlayer()?.id);
    return {
        type: 'grouping', round: H.round, prompt: H.prompt,
        isJudge: judge, groups: judge ? groupsPayload() : null,
        tvHost: isTvHost, captain: judgeName(),
    };
}
function revealMsgFor(p) {
    return {
        type: 'reveal', round: H.round, prompt: H.prompt, target: H.settings.target,
        groups: groupsPayload(), winningKeys: H.winningKeys, cowTaker: H.cowTaker,
        my: p ? { gain: p.lastGain, gotCow: p.gotCowNow, hasCow: p.hasCow, answer: p.answer } : null,
        standings: standings(), pendingWinner: H.pendingWinner,
        tvHost: isTvHost, captain: judgeName(),
    };
}
function podiumMsg() {
    const most = k => H.players.filter(p => p[k] > 0).sort((a, b) => b[k] - a[k])[0];
    const awards = [];
    const hl = most('majorities');
    if (hl) awards.push({ emoji: '🏆', title: 'Herd Leader', name: hl.name, detail: hl.majorities + '× with the herd' });
    const lc = most('cowPickups');
    if (lc) awards.push({ emoji: '🐄', title: 'Lone Cow', name: lc.name, detail: lc.cowPickups + '× got the cow' });
    return { type: 'podium', standings: standings(), awards, tvHost: isTvHost, captain: judgeName() };
}
function phaseSnapshotFor(p) {
    if (H.phase === 'answer') return answerMsgFor(p);
    if (H.phase === 'grouping') return groupingMsgFor(p);
    if (H.phase === 'reveal') return revealMsgFor(p);
    if (H.phase === 'podium') return podiumMsg();
    return lobbyMsg();
}
function viewerSnapshot() {
    if (H.phase === 'answer') return { ...answerMsgFor(null), type: 'viewer_answer', players: railPlayers() };
    if (H.phase === 'grouping') return { type: 'viewer_grouping', round: H.round, prompt: H.prompt, groupCount: H.groups.length, captain: judgeName(), tvHost: isTvHost, players: railPlayers() };
    if (H.phase === 'reveal') return { ...revealMsgFor(null), type: 'viewer_reveal', players: railPlayers() };
    if (H.phase === 'podium') return { ...podiumMsg(), type: 'viewer_podium' };
    return { ...lobbyMsg(), type: 'viewer_lobby' };
}

function broadcastAll() {
    H.players.forEach(p => {
        if (p.id === myId) return;
        const c = guestConns[p.id];
        if (c) send(c, phaseSnapshotFor(p));
    });
    broadcastViewers(viewerSnapshot());
    hostSyncSelf();
}
function hostSyncSelf() {
    if (isTvHost) { applyViewerMsg(viewerSnapshot()); return; }
    if (isHost) applyMsg(phaseSnapshotFor(H.players.find(p => p.id === myId)));
}
function broadcastLobby() { broadcastAll(); }

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            send(conn, viewerSnapshot());
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const name = String(msg.name || 'Player').slice(0, 16);
                const zombie = H.players.find(p => p.name === name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else hostAddPlayer(conn.peer, name, msg.avatar);
                const p2 = H.players.find(p => p.id === conn.peer);
                if (!p2) { send(conn, lobbyMsg()); break; }
                broadcastAll();
                break;
            }
            case 'answer': if (player) hostAnswer(player, msg.text); break;
            case 'ctl': {
                if (!isTvHost || !player || player.id !== judgePlayer()?.id) break;
                hostCtl(msg.action, msg);
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastAll(); }
        } else if (H.phase === 'answer') {
            maybeCloseAnswers();
        }
    });
    conn.on('error', e => console.warn('conn err', e));
}

function hostCtl(action, msg) {
    if (action === 'start' && H.phase === 'lobby') hostStartGame();
    else if (action === 'close' && H.phase === 'answer') hostCloseAnswers(true);
    else if (action === 'merge' && H.phase === 'grouping') hostMerge(msg.a, msg.b);
    else if (action === 'confirm' && H.phase === 'grouping') hostConfirm();
    else if (action === 'next' && H.phase === 'reveal') hostNext();
    else if (action === 'again' && H.phase === 'podium') hostNewGame();
    else if (action === 'set' && H.phase === 'lobby') {
        if ([5, 8, 12].includes(msg.target)) H.settings.target = msg.target;
        broadcastAll();
    }
}
function guestCtl(action, extra) {
    if (isHost && !isTvHost) { hostCtl(action, extra || {}); return; }
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ── Create a room ──
function makeRoom(onOpen) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(PFX + roomCode, ICE_CFG);
    peer.on('open', id => { myId = id; isHost = true; onOpen(); });
    peer.on('connection', conn => setupGuestConn(conn));
    // The broker periodically drops the socket; when it does the room ID is
    // de-registered and new guests get 'peer-unavailable'. Reconnect to re-list
    // the room so late joiners can still find it.
    peer.on('disconnected', () => { try { if (peer && !peer.destroyed) peer.reconnect(); } catch (_) {} });
    peer.on('error', e => {
        // Recoverable network/broker blips: reconnect instead of tearing down the room.
        if (e && (e.type === 'network' || e.type === 'disconnected' || e.type === 'server-error' || e.type === 'socket-error' || e.type === 'socket-closed')) {
            try { if (peer && !peer.destroyed && peer.disconnected) peer.reconnect(); } catch (_) {}
            return;
        }
        uiErr = 'Connection error: ' + e.message;
        isHost = false; isTvHost = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

function hostGame(name) {
    myName = name.trim().slice(0, 16) || 'Host';
    myAvatar = fAvatar || AVATARS[0];
    localStorage.setItem('herd-name', myName);
    localStorage.setItem('herd-avatar', myAvatar);
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        hostAddPlayer(myId, myName, myAvatar);
        ui = 'lobby_h';
        render();
    });
}

function hostOnTV() {
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        isTvHost = true;
        document.body.classList.add('viewer-mode');
        applyViewerMsg(viewerSnapshot());
    });
}

function joinGame(code, name, _attempt) {
    const attempt = _attempt || 1;
    myName = name.trim().slice(0, 16) || 'Player';
    myAvatar = fAvatar || AVATARS[Math.floor(Math.random() * AVATARS.length)];
    localStorage.setItem('herd-name', myName);
    localStorage.setItem('herd-avatar', myAvatar);
    uiErr = ''; ui = 'connecting'; render();

    let connected = false, done = false;
    // Both peer-unavailable and WebRTC negotiation failures are often transient —
    // funnel every pre-connect failure through one retry-or-give-up path.
    const fail = () => {
        if (connected || done) return;   // ignore benign post-connect errors
        done = true;
        if (attempt < 3) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinGame(code, name, attempt + 1), 700);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'home'; render();
    };

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        isHost = false;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => { connected = true; send(hostConn, { type: 'join', name: myName, avatar: myAvatar }); });
        hostConn.on('data', msg => applyMsg(msg));
        hostConn.on('close', () => { if (connected) { uiErr = 'Disconnected from the game.'; ui = 'home'; D = null; render(); } });
        hostConn.on('error', fail);
    });
    peer.on('error', fail);
}

function joinAsViewer(code, _attempt) {
    const attempt = _attempt || 1;
    isViewer = true;
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join_viewer' }));
        hostConn.on('data', msg => applyViewerMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the game.'; isViewer = false; vD = null; document.body.classList.remove('viewer-mode'); ui = 'home'; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; isViewer = false; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

// ═══════════════════════════════════════════
// HOST GAME FLOW
// ═══════════════════════════════════════════
function hostStartGame() {
    if (connectedPlayers().length < MIN_PLAYERS) { uiErr = 'Need at least ' + MIN_PLAYERS + ' players.'; if (ui === 'lobby_h') render(); return; }
    H.round = 0;
    H.promptOrder = shuffle(PROMPTS.map((_, i) => i));
    H.promptIx = -1;
    H.players.forEach(p => { p.score = 0; p.hasCow = false; p.majorities = 0; p.cowPickups = 0; p.lastGain = 0; p.gotCowNow = false; p.answer = null; });
    H.pendingWinner = null;
    hostStartRound();
}

function hostStartRound() {
    H.round += 1;
    H.promptIx += 1;
    if (H.promptIx >= H.promptOrder.length) { H.promptOrder = shuffle(PROMPTS.map((_, i) => i)); H.promptIx = 0; }
    H.prompt = PROMPTS[H.promptOrder[H.promptIx]];
    H.players.forEach(p => { p.answer = null; p.lastGain = 0; p.gotCowNow = false; });
    H.groups = []; H.winningKeys = []; H.cowTaker = null;
    H.phase = 'answer';
    broadcastAll();
}

function hostAnswer(player, text) {
    if (H.phase !== 'answer' || player.answer !== null) return;
    const t = String(text || '').trim().slice(0, 24);
    if (!t) return;
    player.answer = t;
    // patch-style broadcast: everyone gets a fresh answer msg (clients patch counts by id)
    broadcastAll();
    maybeCloseAnswers();
}

function maybeCloseAnswers() {
    if (H.phase !== 'answer') return;
    const active = connectedPlayers();
    if (active.length >= MIN_PLAYERS && active.every(p => p.answer !== null)) hostCloseAnswers(false);
}

function hostCloseAnswers(manual) {
    if (H.phase !== 'answer') return;
    const answered = H.players.filter(p => p.answer !== null);
    if (answered.length < 2) { if (manual) return; return; }   // nothing to herd
    // auto-group by normalized answer
    const map = new Map();
    answered.forEach(p => {
        const key = normAnswer(p.answer);
        if (!map.has(key)) map.set(key, { key, label: p.answer.trim(), members: [] });
        map.get(key).members.push(p.id);
    });
    H.groups = [...map.values()];
    H.phase = 'grouping';
    broadcastAll();
}

function hostMerge(a, b) {
    if (H.phase !== 'grouping' || a === b) return;
    const ga = H.groups.find(g => g.key === a), gb = H.groups.find(g => g.key === b);
    if (!ga || !gb) return;
    // merge smaller into larger (keep the larger group's label)
    const [big, small] = ga.members.length >= gb.members.length ? [ga, gb] : [gb, ga];
    big.members.push(...small.members);
    H.groups = H.groups.filter(g => g !== small);
    broadcastAll();
}

function hostConfirm() {
    if (H.phase !== 'grouping') return;
    // score: biggest herd(s) of size >= 2
    const max = Math.max(0, ...H.groups.map(g => g.members.length));
    H.winningKeys = max >= 2 ? H.groups.filter(g => g.members.length === max).map(g => g.key) : [];
    const winnerIds = new Set(H.groups.filter(g => H.winningKeys.includes(g.key)).flatMap(g => g.members));
    // cow: exactly one singleton group in the whole round
    const singletons = H.groups.filter(g => g.members.length === 1);
    H.cowTaker = null;
    if (singletons.length === 1) {
        const cowId = singletons[0].members[0];
        const taker = H.players.find(p => p.id === cowId);
        if (taker && !taker.hasCow) {
            H.players.forEach(p => { p.hasCow = false; });
            taker.hasCow = true;
            taker.cowPickups += 1;
            taker.gotCowNow = true;
            H.cowTaker = taker.name;
        }
    }
    H.players.forEach(p => {
        if (winnerIds.has(p.id)) { p.lastGain = 1; p.score += 1; p.majorities += 1; }
        else p.lastGain = 0;
    });
    const contenders = H.players.filter(p => p.score >= H.settings.target && !p.hasCow);
    H.pendingWinner = contenders.length ? contenders.sort((a, b) => b.score - a.score)[0].name : null;
    H.phase = 'reveal';
    broadcastAll();
}

function hostNext() {
    if (H.pendingWinner) { H.phase = 'podium'; broadcastAll(); }
    else hostStartRound();
}

function hostNewGame() {
    H.phase = 'lobby';
    H.round = 0; H.prompt = ''; H.groups = []; H.pendingWinner = null;
    H.players.forEach(p => { p.score = 0; p.hasCow = false; p.majorities = 0; p.cowPickups = 0; p.lastGain = 0; p.gotCowNow = false; p.answer = null; });
    H.players = H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
    broadcastAll();
    if (isHost && !isTvHost) { ui = 'lobby_h'; render(); }
}

function hostSet(patch) {
    Object.assign(H.settings, patch);
    broadcastAll();
    if (ui === 'lobby_h') render();
}

// ═══════════════════════════════════════════
// CLIENT (phone) MESSAGE HANDLING
// ═══════════════════════════════════════════
// biggest winning herd size — scales the MATCH! chorus chime
function winHerdSize(msg) {
    return Math.max(0, ...(msg.groups || [])
        .filter(g => (msg.winningKeys || []).includes(g.key))
        .map(g => g.count));
}

function applyMsg(msg) {
    switch (msg.type) {
        case 'lobby': {
            const prevN = D && D.type === 'lobby' ? (D.players || []).length : -1;
            D = msg;
            ui = (isHost && !isTvHost) ? 'lobby_h' : 'lobby_g';
            setMusic('lobby');
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            render();
            break;
        }
        case 'answer': {
            const prev = D;
            D = msg;
            setMusic('think');
            const fresh = !prev || prev.type !== 'answer' || prev.round !== msg.round;
            if (fresh) { myText = ''; ui = 'answer'; render(); sStart(); }
            else if (ui === 'answer') {
                // PATCH ONLY — never re-render while someone may be typing
                const lc = $id('locked-count');
                if (lc) lc.textContent = `🐑 ${msg.lockedCount} of ${msg.playerCount} in the pen`;
                if (msg.myLocked && !prev.myLocked) { render(); sLock(); }
            } else { ui = 'answer'; render(); }
            break;
        }
        case 'grouping': {
            const was = ui === 'grouping';
            D = msg;
            mergeSel = null;
            ui = 'grouping';
            setMusic('sort');
            if (!was) sClose();
            render();
            break;
        }
        case 'reveal': {
            D = msg;
            ui = 'reveal';
            setMusic('reveal');
            render();
            const my = msg.my || {};
            if (my.gotCow) {
                sMoo();
                popText(innerWidth / 2, innerHeight * 0.28, '🐄 MOO!', 'cow');
                burst(innerWidth / 2, innerHeight * 0.28 + 20, ['#f472b6', '#f9a8d4', '#fde047'], 16);
                try { navigator.vibrate && navigator.vibrate([80, 60, 200]); } catch (e) {}
            } else if (my.gain > 0) {
                sHerd(winHerdSize(msg));
                popText(innerWidth / 2, innerHeight * 0.28, '+1', 'good');
                burst(innerWidth / 2, innerHeight * 0.28 + 20, ['#4ade80', '#86efac', '#fde047', '#f8f4e3'], 14);
            } else if (my.answer != null) sAlone();
            break;
        }
        case 'podium':
            D = msg;
            ui = 'podium';
            setMusic('over');
            render();
            sWin(); startConfetti(3600);
            break;
    }
}

function lockAnswer() {
    const inp = $id('ans-input');
    const text = (inp ? inp.value : myText).trim();
    if (!text) return;
    myText = text;
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostAnswer(me, text);
    } else send(hostConn, { type: 'answer', text });
}

function tapMerge(key) {
    if (!mergeSel) { mergeSel = key; render(); return; }
    if (mergeSel === key) { mergeSel = null; render(); return; }
    const a = mergeSel; mergeSel = null;
    sMerge();
    guestCtl('merge', { a, b: key });
}

// ═══════════════════════════════════════════
// VIEWER (TV) MESSAGE HANDLING
// ═══════════════════════════════════════════
function applyViewerMsg(msg) {
    document.body.classList.add('viewer-mode');
    ui = 'viewer';
    const prev = vD;
    vD = msg;
    if (msg.type === 'viewer_answer' && prev && prev.type === 'viewer_answer' && prev.round === msg.round) {
        // patch the pen counter + rail only
        const pen = $id('v-pen');
        if (pen) pen.innerHTML = `<b>${msg.lockedCount}</b> of ${msg.playerCount} in the pen 🐑`;
        const rail = $id('v-rail');
        if (rail) rail.innerHTML = railRowsHTML(msg.players, true);
        if (msg.lockedCount > prev.lockedCount) sPen();
        return;
    }
    switch (msg.type) {
        case 'viewer_lobby':
            setMusic('lobby');
            if (prev && prev.type === 'viewer_lobby' && (msg.players || []).length > (prev.players || []).length) sJoin();
            break;
        case 'viewer_answer':
            setMusic('think');
            if (!prev || prev.type !== 'viewer_answer') sStart();
            break;
        case 'viewer_grouping':
            setMusic('sort');
            if (!prev || prev.type !== 'viewer_grouping') sClose();
            break;
        case 'viewer_reveal': setMusic('reveal'); break;
        case 'viewer_podium': setMusic('over'); break;
    }
    render();
    if (msg.type === 'viewer_reveal' && (!prev || prev.type !== 'viewer_reveal')) {
        sReveal();   // drum-roll, then the verdict sound lands after it
        setTimeout(() => {
            if (msg.cowTaker) {
                sMoo();
                burst(innerWidth / 2, innerHeight * 0.3, ['#f472b6', '#f9a8d4', '#fde047'], 22);
            } else if (msg.winningKeys?.length) sHerd(winHerdSize(msg));
        }, 620);
    }
    if (msg.type === 'viewer_podium') { sWin(); startConfetti(5200); }
}

let _lastUi = '', _lastVType = '';
function render() {
    const app = $id('app');
    if (isTvHost || isViewer) ui = 'viewer';
    // 'fresh' marks a real screen change → entrance animations run once,
    // never on same-screen re-renders (merge taps, joins, lock-in)
    const vt = ui === 'viewer' ? (vD?.type || '') : '';
    const fresh = ui !== _lastUi || vt !== _lastVType;
    _lastUi = ui; _lastVType = vt;
    let html = '';
    switch (ui) {
        case 'home':       html = renderHome(); break;
        case 'creating':   html = renderSpinner('Opening the meadow…'); break;
        case 'connecting': html = renderSpinner('Joining the herd…'); break;
        case 'lobby_h':    html = renderLobbyH(); break;
        case 'lobby_g':    html = renderLobbyG(); break;
        case 'answer':     html = renderAnswer(); break;
        case 'grouping':   html = renderGrouping(); break;
        case 'reveal':     html = renderReveal(); break;
        case 'podium':     html = renderPodium(); break;
        case 'viewer':     html = renderViewer(); break;
        default:           html = renderHome();
    }
    app.innerHTML = html;
    app.classList.toggle('fresh', fresh);
}

function renderSpinner(msg) {
    return `${hdrHTML()}<div class="connecting"><div class="spin"></div><div>${esc(msg)}</div></div>`;
}

            <div class="qr-wrap">${qrSVG(url)}</div>
            <div class="room-code">${esc(vD.roomCode || '')}</div>
            <div class="join-hint">${location.host}${location.pathname}</div>
        </div>
        <div class="tv-players">
            <div class="tv-meta">The herd — ${players.length}/${MAX_PLAYERS}</div>
            <div class="tv-player-grid">${cards}</div>
            <div class="tv-waiting">${players.length === 0
                ? 'Waiting for the first phone… they become 👑 the Shepherd'
                : (players.length < MIN_PLAYERS ? 'Need at least ' + MIN_PLAYERS + ' players…' :
                    (vD.tvHost ? `Waiting for 👑 ${esc(vD.captain || '')} to start` : 'Waiting for the host to start') + ` · 🎯 first to ${s.target} cow-free`)}</div>
        </div>
    </div>`, 'Lobby');
}

function renderViewerAnswer() {
    return tvShell(`
    <div class="tv-main">
        <div class="tv-stage">
            <div class="tv-paper">
                <div class="prompt-kicker">Round ${vD.round} — everyone answers in secret</div>
                <div class="tv-prompt">${esc(vD.prompt)}</div>
                <div class="tv-pen" id="v-pen"><b>${vD.lockedCount}</b> of ${vD.playerCount} in the pen 🐑</div>
            </div>
        </div>
        <div class="tv-rail" id="v-rail-wrap">
            <div class="rail-title">Locked in</div>
            <div id="v-rail" style="display:flex;flex-direction:column;gap:1.4vmin">${railRowsHTML(vD.players, true)}</div>
        </div>
    </div>`, `Round ${vD.round} · first to ${vD.target} 🐄-free`);
}

function renderViewerGrouping() {
    return tvShell(`
    <div class="tv-main">
        <div class="tv-stage">
            <div class="tv-paper" style="align-items:center;justify-content:center;text-align:center">
                <div style="font-size:8vmin">🧑‍🌾</div>
                <div class="tv-prompt" style="font-size:3.4vmin;margin-top:1.5vmin">The shepherd is sorting the herds…</div>
                <div style="color:var(--ink-soft);font-weight:800;font-size:2vmin;margin-top:1.2vmin">
                    ${vD.groupCount} different answer${vD.groupCount === 1 ? '' : 's'} to “${esc(vD.prompt)}”
                </div>
            </div>
        </div>
        <div class="tv-rail">
            <div class="rail-title">Scores</div>
            ${railRowsHTML(vD.players)}
        </div>
    </div>`, `Round ${vD.round}`);
}

function renderViewerReveal() {
    const rows = (vD.groups || []).map((g, i) => {
        const win = (vD.winningKeys || []).includes(g.key);
        const cowrow = g.count === 1 && vD.cowTaker && g.names[0] === vD.cowTaker;
        return `<div class="herd-row${win ? ' win' : ''}${cowrow ? ' cowrow' : ''}" style="animation-delay:${i * 0.14}s">
            <div class="h-count">${g.count}</div>
            <div class="h-label">${esc(g.label)}${win ? ' 🏆' : ''}${cowrow ? ' 🐄' : ''}</div>
            <div class="h-members">${g.avatars.map(esc).join(' ')}</div>
        </div>`;
    }).join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Shepherd')}: tap ${vD.pendingWinner ? '“See the podium”' : '“Next prompt”'} on your phone` : `Host: tap ${vD.pendingWinner ? '“See the podium”' : '“Next prompt”'} on your phone`;
    return tvShell(`
    <div class="tv-main">
        <div class="tv-stage">
            <div class="tv-paper">
                <div class="prompt-kicker">“${esc(vD.prompt)}”</div>
                ${vD.cowTaker ? `<div class="cow-banner">🐄 MOOOO! ${esc(vD.cowTaker)} is all alone — take the cow!</div>` : ''}
                <div class="herd-rows">${rows}</div>
            </div>
            <div style="text-align:center;color:var(--muted);font-weight:800;font-size:1.8vmin;margin-top:1.4vmin">${hint}</div>
        </div>
        <div class="tv-rail">
            <div class="rail-title">Scores</div>
            ${railRowsHTML(vD.players)}
        </div>
    </div>`, `Round ${vD.round} · first to ${vD.target} 🐄-free`);
}

function renderViewerPodium() {
    const st = vD.standings || [];
    const podOrder = [st[1], st[0], st[2]].filter(Boolean);
    const cls = st.length >= 3 ? ['p2', 'p1', 'p3'] : (st.length === 2 ? ['p2', 'p1'] : ['p1']);
    const medal = { p1: '🥇', p2: '🥈', p3: '🥉' };
    const pods = podOrder.map((p, i) => `
        <div class="pod ${cls[i]}" style="animation-delay:${i * 0.18}s">
            <div class="pav-big">${esc(p.avatar)}</div>
            <div class="pname">${esc(p.name)} ${p.hasCow ? '🐄' : ''}</div>
            <div class="pscore">${p.score} pts</div>
            <div class="block">${medal[cls[i]]}</div>
        </div>`).join('');
    const awards = (vD.awards || []).map(a =>
        `<div class="award">${a.emoji} <span class="aw-t">${esc(a.title)}</span><br>${esc(a.name)} — ${esc(a.detail)}</div>`).join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Shepherd')}: “Play again” is on your phone` : 'Host: “Play again” is on your phone';
    return tvShell(`
    <div class="tv-main" style="flex-direction:column">
        <div class="podium-wrap">${pods}</div>
        <div class="awards-row">${awards}</div>
        <div class="tv-waiting" style="text-align:center;margin-top:1.6vmin">${hint}</div>
    </div>`, '🏆 Final scores');
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
window.addEventListener('resize', () => {
    const cv = $id('confetti-cv');
    if (cv && _cf.running) { cv.width = innerWidth; cv.height = innerHeight; }
});

(function boot() {
    const params = new URLSearchParams(location.search);
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    if (!fAvatar) fAvatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];
    if (!musicOn) $id('tog-music').classList.add('off');
    if (!sfxOn) $id('tog-sfx').classList.add('off');
    render();
})();
</script>
</body>
</html>
