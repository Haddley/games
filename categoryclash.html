<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Category Clash</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230b0620' width='100' height='100' rx='20'/><text x='50' y='68' font-size='52' text-anchor='middle'>⚡</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0b0620; --panel: rgba(30,20,64,0.8); --panel2: rgba(42,28,88,0.9);
            --border: rgba(255,225,77,0.25); --border2: rgba(148,132,206,0.3);
            --text: #f1edff; --muted: #9484ce;
            --letter: #ffe14d; --cyan: #22d3ee; --clash: #f472b6; --good: #4ade80; --bad: #f87171;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            padding: 52px 16px 48px; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 65% 45% at 50% -5%, rgba(255,225,77,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 42% at 8% 100%, rgba(34,211,238,0.10) 0%, transparent 65%),
                radial-gradient(ellipse 50% 42% at 95% 100%, rgba(244,114,182,0.09) 0%, transparent 65%);
        }
        body.viewer-mode { padding: 0; overflow: hidden; display: block; height: 100dvh; width: 100vw; }

        h1.logo {
            font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 2px;
            font-size: clamp(1.5rem, 6.5vw, 2.3rem); text-align: center; color: var(--letter);
            text-shadow: 0 0 26px rgba(255,225,77,.4);
        }
        h1.logo em { font-style: normal; color: var(--clash); text-shadow: 0 0 26px rgba(244,114,182,.5); }
        .sub { color: var(--muted); font-size: .7rem; letter-spacing: 2.5px; text-transform: uppercase; margin: 7px 0 22px; text-align: center; }

        #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 13px; }
        body.viewer-mode #app { max-width: none; height: 100dvh; display: block; }

        .card {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 16px;
            padding: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 12px 34px rgba(0,0,0,.5);
        }
        .card.highlight { border-color: var(--letter); box-shadow: 0 0 26px rgba(255,225,77,.13), 0 12px 34px rgba(0,0,0,.5); }
        .slbl { font-size: .64rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 11px; }

        .fg { margin-bottom: 12px; }
        .fg label { display: block; font-size: .64rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        input[type=text] {
            width: 100%; padding: 12px 14px; font-family: inherit; font-size: 1rem; font-weight: 700;
            border: 2px solid var(--border2); border-radius: 11px; background: rgba(11,6,32,.7); color: var(--text);
            outline: none;
        }
        input[type=text]:focus { border-color: var(--letter); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit; font-weight: 900; font-size: .92rem; letter-spacing: .4px;
            padding: 13px 18px; border: none; border-radius: 13px; cursor: pointer;
            transition: opacity .12s, filter .12s; user-select: none; -webkit-user-select: none;
            color: var(--text);
        }
        .btn:active { filter: brightness(1.25); }
        .btn-p { background: linear-gradient(180deg, #ffe97a, #f5c518); color: #2e2300; box-shadow: 0 5px 0 #9a7a00, 0 10px 22px rgba(255,225,77,.28); }
        .btn-c { background: linear-gradient(180deg, #67e8f9, #0891b2); color: #012a33; box-shadow: 0 5px 0 #065666, 0 10px 22px rgba(34,211,238,.28); }
        .btn-g { background: rgba(148,132,206,.14); box-shadow: inset 0 0 0 2px var(--border2); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 8px 13px; font-size: .74rem; border-radius: 10px; }
        .btn:disabled { opacity: .4; cursor: default; }

        .err {
            background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.5); color: #fecaca;
            padding: 11px 14px; border-radius: 12px; font-size: .8rem; font-weight: 700; text-align: center;
        }
        hr { border: none; border-top: 1px dashed var(--border2); margin: 13px 0; }

        .connecting { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 46px 0; color: var(--muted); font-weight: 700; }
        .spin { width: 34px; height: 34px; border-radius: 50%; border: 4px solid rgba(255,225,77,.15); border-top-color: var(--letter); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .player-row { display: flex; align-items: center; gap: 11px; padding: 8px 4px; border-bottom: 1px dashed var(--border2); font-weight: 700; font-size: .92rem; }
        .player-row:last-child { border-bottom: none; }
        .pdot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 10px currentColor; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); box-shadow: 0 0 8px var(--good); margin-left: auto; }
        .qr-wrap { width: min(210px, 58vw); margin: 6px auto 10px; border-radius: 13px; overflow: hidden; box-shadow: 0 8px 22px rgba(0,0,0,.4); }
        .qr-wrap svg { display: block; width: 100%; height: auto; }
        .room-code { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.2rem; letter-spacing: 11px; text-align: center; color: var(--letter); padding-left: 11px; text-shadow: 0 0 18px rgba(255,225,77,.4); }
        .share-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px; }
        .seg-row { display: flex; flex-wrap: wrap; gap: 7px; }

        /* ── phone: race ── */
        .race-head { display: flex; align-items: center; gap: 12px; }
        .letter-tile {
            width: 64px; height: 64px; flex-shrink: 0; border-radius: 14px;
            background: linear-gradient(180deg, #ffe97a, #f5c518); color: #2e2300;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.2rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 0 #9a7a00, 0 0 26px rgba(255,225,77,.35);
        }
        .race-meta { flex: 1; }
        .race-meta .r1 { font-weight: 900; font-size: .95rem; }
        .race-meta .r2 { color: var(--muted); font-weight: 700; font-size: .72rem; }
        .timebar-wrap { height: 10px; border-radius: 6px; background: rgba(255,255,255,.09); overflow: hidden; margin-top: 8px; }
        .timebar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--cyan), var(--letter)); transition: width .2s linear; }
        .ans-list { display: flex; flex-direction: column; gap: 9px; }
        .ans-item label { display: block; font-size: .66rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--cyan); margin-bottom: 3px; }
        .ans-item input { padding: 10px 12px; font-size: .95rem; }
        .ans-item input.filled { border-color: rgba(74,222,128,.5); }

        /* ── phone/TV: judge ── */
        .judge-cat { font-weight: 900; font-size: 1.1rem; }
        .judge-cat small { display: block; color: var(--muted); font-size: .7rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; }
        .entry-row {
            display: flex; align-items: center; gap: 10px; padding: 9px 4px;
            border-bottom: 1px dashed var(--border2); font-weight: 700; font-size: .92rem;
        }
        .entry-row:last-child { border-bottom: none; }
        .entry-row .ans { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .entry-row .ans.strike { text-decoration: line-through; color: var(--clash); }
        .entry-row .ans.invalid { text-decoration: line-through; color: var(--muted); }
        .entry-row .verdict { font-weight: 900; font-size: .74rem; white-space: nowrap; }
        .entry-row .verdict.ok { color: var(--good); }
        .entry-row .verdict.clash { color: var(--clash); }
        .entry-row .verdict.bad { color: var(--muted); }
        .vbtn { border: none; border-radius: 9px; padding: 6px 10px; font-family: inherit; font-weight: 900; font-size: .74rem; cursor: pointer; background: rgba(148,132,206,.16); color: var(--text); box-shadow: inset 0 0 0 2px var(--border2); }
        .vbtn.on { background: rgba(248,113,113,.2); box-shadow: inset 0 0 0 2px rgba(248,113,113,.6); }
        .chip { display: inline-block; padding: 4px 12px; border-radius: 11px; background: rgba(255,225,77,.1); border: 1px solid var(--border); color: var(--letter); font-weight: 900; font-size: .74rem; margin: 3px; }
        .standings .sc { margin-left: auto; font-weight: 900; }
        .standings .delta { color: var(--good); font-size: .72rem; font-weight: 900; margin-left: 7px; }

        /* ═════════ TV ═════════ */
        .tv { height: 100dvh; display: flex; flex-direction: column; padding: 2.6vmin 3.2vmin; gap: 1.8vmin; }
        .tv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2vmin; }
        .tv-logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 3vmin; letter-spacing: .3vmin; color: var(--letter); text-shadow: 0 0 24px rgba(255,225,77,.4); }
        .tv-logo em { font-style: normal; color: var(--clash); }
        .tv-meta { font-size: 1.8vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .tv-main { flex: 1; display: flex; gap: 2.4vmin; min-height: 0; }
        .tv-rail { width: 30vmin; min-width: 240px; display: flex; flex-direction: column; gap: 1.3vmin; }
        .rail-title { font-size: 1.6vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .rail-row {
            display: flex; align-items: center; gap: 1.2vmin; background: var(--panel);
            border: 1px solid var(--border2); border-radius: 1.5vmin; padding: 1.1vmin 1.5vmin;
            font-weight: 800; font-size: 2vmin; position: relative;
        }
        .rail-row .rdot { width: 1.6vmin; height: 1.6vmin; border-radius: 50%; box-shadow: 0 0 10px currentColor; flex-shrink: 0; }
        .rail-row .rname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rail-row .rsc { font-family: 'Orbitron', sans-serif; font-weight: 900; color: var(--letter); font-variant-numeric: tabular-nums; }
        .rail-row .rdelta { position: absolute; right: 1vmin; top: -1.2vmin; font-size: 1.6vmin; font-weight: 900; color: var(--good); text-shadow: 0 2px 6px rgba(0,0,0,.6); animation: riseIn .5s ease both; }
        @keyframes riseIn { from { opacity: 0; transform: translateY(1vmin); } to { opacity: 1; transform: none; } }

        .tv-stage { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; gap: 1.6vmin; }
        .tv-race { flex: 1; display: flex; gap: 2.6vmin; min-height: 0; }
        .tv-letter {
            width: 26vmin; height: 26vmin; align-self: center; border-radius: 3vmin; flex-shrink: 0;
            background: linear-gradient(180deg, #ffe97a, #f5c518); color: #2e2300;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 17vmin;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1.4vmin 0 #9a7a00, 0 0 8vmin rgba(255,225,77,.35);
            animation: popIn .5s ease both;
        }
        @keyframes popIn { from { opacity: 0; transform: scale(.6); } to { opacity: 1; transform: scale(1); } }
        .tv-cats { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 1.1vmin; min-width: 0; }
        .tv-cat {
            display: flex; align-items: center; gap: 1.4vmin; background: var(--panel);
            border: 1px solid var(--border2); border-radius: 1.4vmin; padding: 1.2vmin 1.8vmin;
            font-weight: 800; font-size: 2.3vmin;
        }
        .tv-cat .n { font-family: 'Orbitron', sans-serif; color: var(--cyan); font-size: 1.9vmin; width: 2.6vmin; }
        .tv-race-bottom { display: flex; align-items: center; gap: 2vmin; }
        .tv-progress-chips { display: flex; gap: 1vmin; flex-wrap: wrap; flex: 1; }
        .prog-chip {
            display: flex; align-items: center; gap: .8vmin; background: var(--panel);
            border: 1px solid var(--border2); border-radius: 1.2vmin; padding: .7vmin 1.3vmin;
            font-weight: 800; font-size: 1.8vmin;
        }
        .prog-chip .rdot { width: 1.4vmin; height: 1.4vmin; border-radius: 50%; }
        .prog-chip.done { border-color: rgba(74,222,128,.55); }
        .tv-timebar-wrap { flex: 0 0 30vmin; height: 1.6vmin; border-radius: .9vmin; background: rgba(255,255,255,.1); overflow: hidden; }
        .tv-timebar { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--letter)); border-radius: .9vmin; transition: width .2s linear; }
        .tv-timenum { font-family: 'Orbitron', sans-serif; font-size: 2.6vmin; font-weight: 900; width: 6vmin; text-align: right; font-variant-numeric: tabular-nums; }

        .tv-judge { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .tv-judge-head { display: flex; align-items: center; gap: 2vmin; margin-bottom: 1.8vmin; }
        .tv-judge-head .letter-mini {
            width: 7vmin; height: 7vmin; border-radius: 1.4vmin; flex-shrink: 0;
            background: linear-gradient(180deg, #ffe97a, #f5c518); color: #2e2300;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 4.4vmin;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 .5vmin 0 #9a7a00;
        }
        .tv-judge-head .cat { font-weight: 900; font-size: 3.4vmin; }
        .tv-judge-head .cat small { display: block; font-size: 1.6vmin; color: var(--muted); letter-spacing: .3vmin; text-transform: uppercase; font-weight: 800; }
        .tv-entries { flex: 1; display: flex; flex-direction: column; gap: 1.2vmin; justify-content: center; }
        .tv-entry {
            display: flex; align-items: center; gap: 1.6vmin; background: var(--panel);
            border: 1px solid var(--border2); border-radius: 1.6vmin; padding: 1.5vmin 2vmin;
            font-size: 2.5vmin; font-weight: 800;
        }
        .tv-entry .rdot { width: 1.7vmin; height: 1.7vmin; border-radius: 50%; box-shadow: 0 0 10px currentColor; flex-shrink: 0; }
        .tv-entry .who { color: var(--muted); font-size: 1.8vmin; width: 14vmin; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
        .tv-entry .ans { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tv-entry .ans.strike { text-decoration: line-through; color: var(--clash); }
        .tv-entry .ans.invalid { text-decoration: line-through; color: var(--muted); }
        .tv-entry .verdict { font-weight: 900; font-size: 2vmin; white-space: nowrap; }
        .tv-entry .verdict.ok { color: var(--good); }
        .tv-entry .verdict.clash { color: var(--clash); text-shadow: 0 0 14px rgba(244,114,182,.5); }
        .tv-entry .verdict.bad { color: var(--muted); }
        .tv-entry.zap { border-color: rgba(244,114,182,.6); }
        .tv-nobody { text-align: center; color: var(--muted); font-weight: 800; font-size: 2.2vmin; }
        .tv-hint { text-align: center; color: var(--muted); font-weight: 800; font-size: 1.8vmin; }

        /* TV lobby */
        .tv-lobby { flex: 1; display: flex; gap: 4vmin; align-items: center; min-height: 0; }
        .tv-lobby .qr-side { background: #1a1040; border: 1px solid var(--border); border-radius: 2.2vmin; padding: 3.2vmin; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
        .tv-lobby .qr-side .qr-wrap { width: 32vmin; margin: 1.4vmin auto; }
        .tv-lobby .qr-side .room-code { font-size: 4.6vmin; letter-spacing: 1.9vmin; padding-left: 1.9vmin; }
        .tv-lobby .join-hint { font-size: 1.7vmin; font-weight: 700; color: var(--muted); }
        .tv-players { flex: 1; display: flex; flex-direction: column; gap: 1.5vmin; min-width: 0; }
        .tv-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20vmin, 1fr)); gap: 1.5vmin; }
        .tv-pcard {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 1.7vmin;
            padding: 1.7vmin; text-align: center; font-weight: 900; font-size: 2vmin; animation: popIn .35s ease both;
        }
        .tv-pcard .pdot { width: 2.2vmin; height: 2.2vmin; margin: 0 auto 1vmin; }
        .tv-waiting { color: var(--muted); font-weight: 800; font-size: 1.9vmin; }

        /* podium */
        .podium-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 2.4vmin; padding-bottom: 1vmin; }
        .pod { text-align: center; font-weight: 900; animation: podRise .55s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes podRise { from { opacity: 0; transform: translateY(30%); } to { opacity: 1; transform: none; } }
        .pod .pname { font-size: 2.4vmin; margin-bottom: .8vmin; }
        .pod .pscore { font-size: 2vmin; color: var(--letter); margin-bottom: .8vmin; font-family: 'Orbitron', sans-serif; }
        .pod .block { border-radius: 1.5vmin 1.5vmin 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 1.3vmin; font-size: 3.2vmin; width: 17vmin; }
        .pod.p1 .block { height: 21vmin; background: linear-gradient(180deg, #ffe97a, #9a7a00); }
        .pod.p2 .block { height: 14vmin; background: linear-gradient(180deg, #d7d7e0, #8f8fa3); }
        .pod.p3 .block { height: 9.5vmin; background: linear-gradient(180deg, #e8a06a, #9c5a33); }
        .awards-row { display: flex; gap: 1.5vmin; justify-content: center; flex-wrap: wrap; padding-bottom: 2vmin; }
        .award { background: var(--panel); border: 1px solid var(--border); border-radius: 1.5vmin; padding: 1.3vmin 2vmin; font-weight: 800; font-size: 1.8vmin; text-align: center; }
        .award .aw-t { color: var(--letter); font-weight: 900; }

        #confetti-cv { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

        /* sound toggles */
        #sound-togs { position: fixed; top: 10px; right: 10px; z-index: 80; display: flex; gap: 6px; }
        #sound-togs button {
            width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem;
            background: rgba(30,20,64,.85); box-shadow: inset 0 0 0 1px var(--border2);
            transition: opacity .2s, transform .12s;
        }
        #sound-togs button:active { transform: scale(.88); }
        #sound-togs button.off { opacity: .35; filter: grayscale(1); }
        body.viewer-mode #sound-togs { top: 12px; right: 12px; }
        body.viewer-mode .tv-top { padding-right: 96px; }

        /* FX layer — particles + score pops */
        .pt {
            position: fixed; width: 9px; height: 9px; border-radius: 2px;
            z-index: 950; pointer-events: none;
            animation: ptFly .75s cubic-bezier(.15,.65,.4,1) forwards;
        }
        @keyframes ptFly {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(560deg) scale(.3); opacity: 0; }
        }
        .pop {
            position: fixed; z-index: 960; pointer-events: none;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.5rem;
            animation: popUp 1.1s cubic-bezier(.2,.8,.3,1) forwards;
            text-shadow: 0 2px 12px rgba(0,0,0,.7); white-space: nowrap;
        }
        .pop.good { color: var(--good); }
        .pop.gold { color: var(--letter); }
        .pop.bad  { color: var(--clash); font-size: 1.1rem; }
        @keyframes popUp {
            0%   { transform: translate(-50%, 0) scale(.5); opacity: 0; }
            15%  { transform: translate(-50%, -12px) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -78px) scale(1); opacity: 0; }
        }

        /* screen entrances — only on phase changes (#app.fresh), so patches never re-trigger */
        @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        #app.fresh .card { animation: cardIn .35s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes itemIn { from { opacity: 0; transform: scale(.9) translateY(8px); } to { opacity: 1; transform: none; } }
        #app.fresh .ans-item { animation: itemIn .3s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 40ms); }
        #app.fresh .entry-row { animation: itemIn .32s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 55ms); }
        #app.fresh .tv-cat { animation: itemIn .35s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 60ms); }
        #app.fresh .tv-entry { animation: riseIn .4s ease both; animation-delay: calc(var(--i, 0) * 70ms); }
        @keyframes clashPulse {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.25) rotate(-2deg); }
            60% { transform: scale(1.1) rotate(2deg); }
        }
        #app.fresh .verdict.clash { animation: clashPulse .8s ease .45s 2; display: inline-block; }

function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++)
            for (let c = 0; c < n; c++)
                if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#fffbe6"/>` +
            `<g fill="#1a1040">${rects}</g></svg>`;

let _cf = { parts: [], raf: 0, running: false, until: 0 };
function startConfetti(ms) {
    if (REDUCED) return;
    const cv = $id('confetti-cv'), ctx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    _cf.until = performance.now() + (ms || 2600);
    const cols = ['#ffe14d', '#22d3ee', '#f472b6', '#4ade80', '#a78bfa', '#f1edff'];
    for (let i = 0; i < 130; i++) {
        _cf.parts.push({
            x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.5,
            vx: (Math.random() - 0.5) * 2.4, vy: 2 + Math.random() * 3.6,
            rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.25,
            w: 6 + Math.random() * 7, h: 4 + Math.random() * 5,
            col: cols[Math.floor(Math.random() * cols.length)],
        });
    }
    if (_cf.running) return;
    _cf.running = true;
    (function frame(t) {
        ctx.clearRect(0, 0, cv.width, cv.height);
        _cf.parts = _cf.parts.filter(p => p.y < cv.height + 30);
        for (const p of _cf.parts) {
            p.x += p.vx; p.y += p.vy; p.rot += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        }
        if (t < _cf.until || _cf.parts.length) _cf.raf = requestAnimationFrame(frame);
        else { _cf.running = false; ctx.clearRect(0, 0, cv.width, cv.height); }
    })(performance.now());
}

function ac() {
    if (!AC) {
        try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
        masterGain = AC.createGain(); masterGain.gain.value = 1; masterGain.connect(AC.destination);
        musicGain = AC.createGain(); musicGain.gain.value = musicOn ? 0.33 : 0; musicGain.connect(masterGain);
        sfxGain = AC.createGain(); sfxGain.gain.value = sfxOn ? 0.55 : 0; sfxGain.connect(masterGain);
        // Lead bus with a tight slapback — game-show PA, not a cathedral
        leadBus = AC.createGain(); leadBus.gain.value = 1; leadBus.connect(musicGain);
        musicDelay = AC.createDelay(1.2); musicDelay.delayTime.value = 0.24;
        const fb = AC.createGain(); fb.gain.value = 0.16;
        const dlp = AC.createBiquadFilter(); dlp.type = 'lowpass'; dlp.frequency.value = 2400;
        const wet = AC.createGain(); wet.gain.value = 0.15;
        leadBus.connect(musicDelay); musicDelay.connect(dlp); dlp.connect(fb); fb.connect(musicDelay);
        dlp.connect(wet); wet.connect(musicGain);
        const len = AC.sampleRate * 1.2;
        noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    if (AC.state === 'suspended') AC.resume();
    return AC;
}

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide, 20), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    if (lp) {
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
        o.connect(f); f.connect(g);
    } else {
        o.connect(g);
    }
    g.connect(dest || sfxGain);
    o.start(t); o.stop(t + dur + 0.06);
}

function noiseHit(dur, { vol = 0.3, when = 0, hp = 6000, dest = null } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const src = AC.createBufferSource(); src.buffer = noiseBuf;
    const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(dest || sfxGain);
    src.start(t); src.stop(t + dur + 0.05);
}

let musicTrack = 'lobby', musicStep = 0, musicBar = 0, musicNext = 0, musicTimer = null, musicUrgent = false;
// Adaptive arrangement: 1 = rhythm + lead, 2 = full (stabs + shimmer).
// Key shift lifts everything a whole tone for the final round — stakes music.
let musicIntensity = 2, musicKeyShift = 0;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Swing: push every off-16th slightly late for a looser bounce
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) tone(150, 0.22, { type: 'sine', vol: 0.5, when: rel, slide: 45, dest: musicGain });
    if (tr.hat[i]) {
        const open = musicTrack === 'race' && (i === 14 || i === 30);
        const hv = (i % 4 === 2 ? 0.14 : 0.07) * (0.8 + Math.random() * 0.4);
        noiseHit(open ? 0.13 : 0.05, { vol: hv, when: rel, hp: 9000, dest: musicGain });
    }
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) tone(mf(b + k), stepDur * 1.5, { type: w.bass || 'square', vol: 0.22, when: rel, dest: musicGain, lp: 950, attack: 0.004 });
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    // Syncopated chord stabs — the quiz-desk comping
    if (full && tr.stab && tr.stab[i] && ch)
        ch.forEach(m => tone(mf(m + 12 + k), stepDur * 0.9, { type: w.stab || 'square', vol: 0.032, when: rel, lp: 2800, dest: musicGain, attack: 0.004 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12;
        tone(mf(l + k), stepDur * 1.4, { type: w.lead || 'square', vol: 0.12 * (0.9 + Math.random() * 0.2), when: rel, dest: leadBus, lp: tr.leadLp || 4800, attack: 0.004 });
    }
    // Running arpeggio shimmer an octave over the pads
    if (full && tr.arp && i % tr.arp === 0 && ch)
        tone(mf(ch[(i / tr.arp) % ch.length] + 12 + k), stepDur * tr.arp * 0.9, { type: w.arpW || 'square', vol: 0.04, when: rel, lp: 5500, dest: musicGain, attack: 0.003 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.04, { vol: 0.11, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    // adaptive: the race starts lean — stabs + shimmer pile in as the field locks in
    musicIntensity = track === 'race' ? 1 : 2;
    if (track === 'lobby' || track === 'over') musicKeyShift = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'race') musicUrgent = false;
    // one-beat snare fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) noiseHit(0.06, { vol: 0.1 + f * 0.035, when: f * s, hp: 2800 + f * 900, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}
// Adaptive layers: the full arrangement kicks in once half the field is DONE;
// timer urgency (musicUrgent) forces it on its own in the last seconds
function bumpRaceIntensity(progress) {
    const list = progress || [];
    const done = list.filter(p => p.done).length;
    if (list.length && done / list.length >= 0.5) musicIntensity = Math.max(musicIntensity, 2);
}

function toggleMusic() {
    musicOn = !musicOn;
    localStorage.setItem('cc-music', musicOn ? '1' : '0');
    if (!AC && musicOn) { ac(); startMusicLoop(); }
    if (AC && musicGain) musicGain.gain.linearRampToValueAtTime(musicOn ? 0.33 : 0, AC.currentTime + 0.2);
    $id('tog-music').classList.toggle('off', !musicOn);
}
function toggleSfx() {
    sfxOn = !sfxOn;
    localStorage.setItem('cc-sfx', sfxOn ? '1' : '0');
    if (AC && sfxGain) sfxGain.gain.value = sfxOn ? 0.55 : 0;
    $id('tog-sfx').classList.toggle('off', !sfxOn);
}

// Unlock audio on first interaction (browser autoplay policy)
let _audioUnlocked = false;
document.addEventListener('pointerdown', () => {
    if (_audioUnlocked) return;
    _audioUnlocked = true;
    if (ac()) startMusicLoop();
}, { capture: true });

// ── Particle bursts + floating score text ──
function burst(x, y, colors, n = 14) {
    if (REDUCED) return;
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;
        p.style.cssText = `left:${x}px;top:${y}px;background:${colors[i % colors.length]};` +
            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}
function popText(x, y, text, cls = 'good') {
    const el = document.createElement('div');
    el.className = 'pop ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1150);
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let peer = null, myId = '', myName = '', isHost = false, isTvHost = false, isViewer = false, roomCode = '';
let hostConn = null, guestConns = {}, viewerConns = {};
let ui = 'home';   // home|creating|connecting|lobby_h|lobby_g|race|judge|podium|viewer
let uiErr = '';
let fName = localStorage.getItem('cc-name') || '';
let fCode = '', fVCode = '';
let D = null, vD = null;

// phone-local race state
let myAnswers = [];
let myDone = false;
let raceEndsAt = 0, raceTotal = 0;
let _raceTick = null, _ansTimer = null;

// Host authoritative state
let H = {
    phase: 'lobby',              // lobby|race|judge|podium
    players: [],                 // [{id,name,color,score,answers:[8],done,uniques,clashes,lastDelta}]
    settings: { rounds: 3, timerSecs: 90 },
    round: 0,
    usedLetters: [], usedCats: [],
    cur: null,                   // {letter, categories:[8]}
    judge: null,                 // {catIndex}
    vetoSet: new Set(),          // `${catIndex}|${pid}`
    winnerStats: null,
};
let _raceTimer = null, _vProgTimer = null;

// ═══════════════════════════════════════════
// NETWORK
// ═══════════════════════════════════════════
function send(conn, msg) { try { conn.send(msg); } catch (e) { console.warn('send err', e); } }
function broadcastViewers(msg) { Object.values(viewerConns).forEach(c => send(c, msg)); }
function connectedPlayers() {
    return H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
}

function hostAddPlayer(id, name) {
    if (H.players.find(p => p.id === id) || H.players.length >= MAX_PLAYERS) return;
    H.players.push({
        id, name, color: PLAYER_COLORS[H.players.length % PLAYER_COLORS.length],
        score: 0, answers: [], done: false, uniques: 0, clashes: 0, lastDelta: 0,
    });
}

function lobbyMsg() {
    return {
        type: 'lobby', roomCode,
        players: H.players.map(p => ({ name: p.name, color: p.color })),
        settings: { ...H.settings },
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function broadcastLobby() {
    H.players.forEach(p => { if (p.id !== myId && guestConns[p.id]) send(guestConns[p.id], lobbyMsg()); });
    broadcastViewers({ ...lobbyMsg(), type: 'viewer_lobby' });
    hostSyncSelf(lobbyMsg());
}

function raceMsg() {
    return {
        type: 'race', round: H.round, rounds: H.settings.rounds,
        letter: H.cur.letter, categories: H.cur.categories, seconds: H.settings.timerSecs,
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function raceProgress() {
    return H.players.map(p => ({
        name: p.name, color: p.color, score: p.score,
        filled: (p.answers || []).filter(a => a && a.trim()).length, done: !!p.done,
    }));
}
function viewerRaceMsg() { return { ...raceMsg(), type: 'viewer_race', progress: raceProgress() }; }

function judgeEntries() {
    const cat = H.judge.catIndex;
    const L = H.cur.letter.toLowerCase();
    const raw = H.players
        .map(p => ({ pid: p.id, name: p.name, color: p.color, ans: (p.answers[cat] || '').trim() }))
        .filter(e => e.ans);
    raw.forEach(e => {
        e.norm = normAns(e.ans);
        e.letterOk = e.norm.startsWith(L);
        e.veto = H.vetoSet.has(cat + '|' + e.pid);
    });
    const counts = {};
    raw.forEach(e => { if (e.letterOk && !e.veto) counts[e.norm] = (counts[e.norm] || 0) + 1; });
    raw.forEach(e => {
        e.clash = e.letterOk && !e.veto && counts[e.norm] > 1;
        const words = e.norm.split(' ').filter(Boolean);
        e.allit = words.length >= 2 && words.every(w => w.startsWith(L));
        e.pts = (e.letterOk && !e.veto && !e.clash) ? (10 + (e.allit ? 5 : 0)) : 0;
    });
    return raw;
}

function judgeMsg() {
    const cat = H.judge.catIndex;
    return {
        type: 'judge', round: H.round, rounds: H.settings.rounds,
        letter: H.cur.letter, catIndex: cat, catTotal: CATS_PER_ROUND,
        category: H.cur.categories[cat],
        entries: judgeEntries().map(e => ({ pid: e.pid, name: e.name, color: e.color, ans: e.ans, letterOk: e.letterOk, veto: e.veto, clash: e.clash, allit: e.allit, pts: e.pts })),
        players: H.players.map(p => ({ name: p.name, color: p.color, score: p.score, delta: p.lastDelta })),
        isLastCat: cat === CATS_PER_ROUND - 1,
        isLastRound: H.round >= H.settings.rounds,
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}

function podiumMsg() {
    const st = H.players.slice().sort((a, b) => b.score - a.score)
        .map(p => ({ name: p.name, color: p.color, score: p.score }));
    const most = k => H.players.slice().sort((x, y) => y[k] - x[k])[0];
    const awards = [];
    const w = most('uniques'), c = most('clashes');
    if (w && w.uniques > 0) awards.push({ emoji: '🖋️', title: 'Wordsmith', name: w.name, detail: w.uniques + ' unique answers' });
    if (c && c.clashes > 0) awards.push({ emoji: '💥', title: 'Clash Magnet', name: c.name, detail: c.clashes + ' duplicates' });
    return {
        type: 'podium', standings: st, awards, winner: st[0]?.name || '',
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}

function phaseSnapshotFor() {
    if (H.phase === 'race') return raceMsg();
    if (H.phase === 'judge') return judgeMsg();
    if (H.phase === 'podium') return podiumMsg();
    return lobbyMsg();
}
function viewerSnapshot() {
    if (H.phase === 'race') return viewerRaceMsg();
    if (H.phase === 'judge') return { ...judgeMsg(), type: 'viewer_judge' };
    if (H.phase === 'podium') return { ...podiumMsg(), type: 'viewer_podium' };
    return { ...lobbyMsg(), type: 'viewer_lobby' };
}

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            send(conn, viewerSnapshot());
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const name = String(msg.name || 'Player').slice(0, 16);
                const zombie = H.players.find(p => p.name === name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else hostAddPlayer(conn.peer, name);
                const p2 = H.players.find(p => p.id === conn.peer);
                if (!p2) { send(conn, lobbyMsg()); break; }         // room full
                if (H.phase === 'lobby') broadcastLobby();
                else { send(conn, phaseSnapshotFor()); broadcastViewers(viewerSnapshot()); if (isTvHost) tvHostSync(); }
                break;
            }
            case 'answers': if (player) hostReceiveAnswers(player, msg.answers, msg.round, false); break;
            case 'done':    if (player) hostReceiveAnswers(player, msg.answers, msg.round, true); break;
            case 'ctl': {
                if (!isTvHost || !player || player.id !== H.players[0]?.id) break;
                hostCtl(msg.action, msg);
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        } else if (H.phase === 'race') {
            maybeEndRaceEarly();
        }
    });
    conn.on('error', e => console.warn('conn err', e));
}

function hostCtl(action, msg) {
    if (action === 'start' && H.phase === 'lobby') hostStartGame();
    else if (action === 'veto' && H.phase === 'judge') hostVeto(msg.pid);
    else if (action === 'nextcat' && H.phase === 'judge') hostNextCategory();
    else if (action === 'again' && H.phase === 'podium') hostNewGame();
    else if (action === 'set' && H.phase === 'lobby') {
        if ([2, 3, 5].includes(msg.rounds)) H.settings.rounds = msg.rounds;
        if ([60, 90, 120].includes(msg.timerSecs)) H.settings.timerSecs = msg.timerSecs;
        broadcastLobby();
    }
}
function guestCtl(action, extra) {
    if (action === 'veto') sVeto();
    if (isHost && !isTvHost) { hostCtl(action, extra || {}); return; }
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ── Create a room (phone host or TV host) ──
function makeRoom(onOpen) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(PFX + roomCode, ICE_CFG);
    peer.on('open', id => { myId = id; isHost = true; onOpen(); });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        isHost = false; isTvHost = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

function hostGame(name) {
    myName = name.trim().slice(0, 16) || 'Host';
    localStorage.setItem('cc-name', myName);
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        hostAddPlayer(myId, myName);
        ui = 'lobby_h';
        render();
    });
}

function hostOnTV() {
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        isTvHost = true;
        document.body.classList.add('viewer-mode');
        tvHostSync();
        render();
    });
}

// ── Guest ──
function joinGame(code, name) {
    myName = name.trim().slice(0, 16) || 'Player';
    localStorage.setItem('cc-name', myName);
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        isHost = false;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join', name: myName }));
        hostConn.on('data', msg => applyMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the game.'; ui = 'home'; D = null; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'home'; render();
    });
}

// ── Viewer (TV joining a phone-hosted game) ──
function joinAsViewer(code, _attempt) {
    const attempt = _attempt || 1;
    isViewer = true;
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join_viewer' }));
        hostConn.on('data', msg => applyViewerMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the game.'; isViewer = false; vD = null; document.body.classList.remove('viewer-mode'); ui = 'home'; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; isViewer = false; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

// The TV-host mirrors authoritative state into its own viewer UI
function tvHostSync() {
    if (!isTvHost) return;
    applyViewerMsg(viewerSnapshot());
}
// The phone-host applies its own broadcasts through the same client path as guests
function hostSyncSelf(msg) {
    if (isTvHost) { tvHostSync(); return; }
    if (isHost && msg) applyMsg(msg);
}

// ═══════════════════════════════════════════
// HOST GAME FLOW
// ═══════════════════════════════════════════
function hostStartGame() {
    if (connectedPlayers().length < MIN_PLAYERS) { uiErr = 'Need at least ' + MIN_PLAYERS + ' players.'; if (ui === 'lobby_h') render(); return; }
    H.round = 0;
    H.usedLetters = []; H.usedCats = [];
    H.players.forEach(p => { p.score = 0; p.uniques = 0; p.clashes = 0; p.lastDelta = 0; });
    nextRound();
}

function nextRound() {
    clearTimeout(_raceTimer);
    H.round += 1;
    if (H.round > H.settings.rounds) { showPodium(); return; }
    const letterPool = LETTERS.filter(l => !H.usedLetters.includes(l));
    H.cur = { letter: shuffle(letterPool)[0], categories: [] };
    H.usedLetters.push(H.cur.letter);
    let catPool = CATEGORIES.filter(c => !H.usedCats.includes(c));
    if (catPool.length < CATS_PER_ROUND) { H.usedCats = []; catPool = CATEGORIES.slice(); }
    H.cur.categories = shuffle(catPool).slice(0, CATS_PER_ROUND);
    H.usedCats.push(...H.cur.categories);
    H.players.forEach(p => { p.answers = Array(CATS_PER_ROUND).fill(''); p.done = false; p.lastDelta = 0; });
    H.vetoSet = new Set();
    H.judge = null;
    H.phase = 'race';
    broadcastPhase();
    _raceTimer = setTimeout(endRace, H.settings.timerSecs * 1000 + 600);
}

function broadcastPhase() {
    const msg = phaseSnapshotFor();
    H.players.forEach(p => { if (p.id !== myId && guestConns[p.id]) send(guestConns[p.id], msg); });
    broadcastViewers(viewerSnapshot());
    hostSyncSelf(msg);
}

function hostReceiveAnswers(player, answers, round, done) {
    if (H.phase !== 'race' || round !== H.round) return;
    if (Array.isArray(answers))
        player.answers = Array.from({ length: CATS_PER_ROUND }, (_, i) => String(answers[i] || '').slice(0, 48));
    if (done) player.done = true;
    throttledProgress();
    if (done) maybeEndRaceEarly();
}

let _progPending = false;
function throttledProgress() {
    if (_progPending) return;
    _progPending = true;
    setTimeout(() => {
        _progPending = false;
        if (H.phase !== 'race') return;
        bumpRaceIntensity(raceProgress());   // phone-host hears the build-up too
        broadcastViewers({ type: 'viewer_race', ...raceMsg(), progress: raceProgress() });
        if (isTvHost) tvHostSync();
    }, 500);
}

function maybeEndRaceEarly() {
    if (H.phase !== 'race') return;
    const active = connectedPlayers();
    if (active.length && active.every(p => p.done)) setTimeout(endRace, 400);
}

function endRace() {
    if (H.phase !== 'race') return;
    clearTimeout(_raceTimer);
    H.phase = 'judge';
    H.judge = { catIndex: 0 };
    H.players.forEach(p => { p.lastDelta = 0; });
    broadcastPhase();
}

function hostVeto(pid) {
    const key = H.judge.catIndex + '|' + pid;
    if (H.vetoSet.has(key)) H.vetoSet.delete(key);
    else H.vetoSet.add(key);
    broadcastPhase();
}

function hostNextCategory() {
    // commit the current category's points, then advance
    const entries = judgeEntries();
    H.players.forEach(p => { p.lastDelta = 0; });
    entries.forEach(e => {
        const p = H.players.find(q => q.id === e.pid);
        if (!p) return;
        p.score += e.pts;
        p.lastDelta = e.pts;
        if (e.pts > 0) p.uniques += 1;
        if (e.clash) p.clashes += 1;
    });
    H.judge.catIndex += 1;
    if (H.judge.catIndex >= CATS_PER_ROUND) {
        if (H.round < H.settings.rounds) nextRound();
        else showPodium();
    } else broadcastPhase();
}

function showPodium() {
    clearTimeout(_raceTimer);
    H.phase = 'podium';
    broadcastPhase();
}

function hostNewGame() {
    clearTimeout(_raceTimer);
    H.phase = 'lobby';
    H.round = 0; H.cur = null; H.judge = null; H.vetoSet = new Set();
    H.usedLetters = []; H.usedCats = [];
    H.players.forEach(p => { p.score = 0; p.answers = []; p.done = false; p.uniques = 0; p.clashes = 0; p.lastDelta = 0; });
    H.players = H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
    broadcastLobby();
    if (isHost && !isTvHost) { ui = 'lobby_h'; render(); }
}

function hostSet(patch) {
    Object.assign(H.settings, patch);
    broadcastLobby();
    if (ui === 'lobby_h') render();
}

// ═══════════════════════════════════════════
// CLIENT (phone) MESSAGE HANDLING
// ═══════════════════════════════════════════
function stopRaceTick() { clearInterval(_raceTick); _raceTick = null; }

function applyMsg(msg) {
    switch (msg.type) {
        case 'lobby': {
            const prevN = D && D.type === 'lobby' ? (D.players || []).length : -1;
            D = msg;
            stopRaceTick();
            ui = (isHost && !isTvHost) ? 'lobby_h' : 'lobby_g';
            setMusic('lobby');
            render();
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            break;
        }
        case 'race': {
            const fresh = !D || D.type !== 'race' || D.round !== msg.round;
            D = msg;
            if (fresh) {
                myAnswers = Array(CATS_PER_ROUND).fill('');
                myDone = false;
                raceTotal = msg.seconds * 1000;
                raceEndsAt = Date.now() + raceTotal;
                ui = 'race';
                musicUrgent = false;
                setMusic('race');
                musicKeyShift = msg.round >= msg.rounds ? 2 : 0;   // final round: key up
                render();
                sGo();
                stopRaceTick();
                _raceTick = setInterval(patchRaceTimer, 200);
            }
            break;
        }
        case 'judge': {
            const prev = D;
            D = msg;
            stopRaceTick();
            const newCat = !prev || prev.type !== 'judge' || prev.catIndex !== msg.catIndex || prev.round !== msg.round;
            ui = 'judge';
            setMusic('judge');
            musicKeyShift = msg.isLastRound ? 2 : 0;   // final round: key up
            render();
            if (newCat) {
                const hasClash = msg.entries.some(e => e.clash), hasPts = msg.entries.some(e => e.pts > 0);
                if (hasClash) sZap();
                if (hasPts) sDing(hasClash ? 0.45 : 0);
                const mine = (msg.entries || []).find(e => e.name === myName);
                if (mine && mine.pts > 0) {
                    popText(innerWidth / 2, innerHeight * 0.3, '+' + mine.pts, mine.allit ? 'gold' : 'good');
                    burst(innerWidth / 2, innerHeight * 0.3, ['#ffe14d', '#4ade80', '#22d3ee']);
                } else if (mine && mine.clash) {
                    popText(innerWidth / 2, innerHeight * 0.3, '💥 CLASH!', 'bad');
                }
            }
            break;
        }
        case 'podium':
            D = msg;
            stopRaceTick();
            ui = 'podium';
            setMusic('over');
            render();
            sWin(); startConfetti(3600);
            break;
    }
}

function patchRaceTimer() {
    const left = Math.max(0, raceEndsAt - Date.now());
    const bar = $id('race-timebar'), num = $id('race-timenum');
    if (bar) bar.style.width = (left / raceTotal * 100) + '%';
    if (num) {
        const s = Math.ceil(left / 1000);
        const low = s <= 10 && s > 0;
        if (low && musicTrack === 'race') musicUrgent = true;
        num.classList.toggle('low', low);
        if (bar) bar.classList.toggle('low', low);
        if (num.textContent !== String(s)) { num.textContent = s; if (s <= 5 && s > 0) sTick(); }
    }
    if (left <= 0) stopRaceTick();
}

// ── race inputs (local-first, debounced sync) ──
function onAns(i, val) {
    myAnswers[i] = val;
    sType();
    const el = document.querySelector(`#ans-${i}`);
    if (el) el.classList.toggle('filled', !!val.trim());
    clearTimeout(_ansTimer);
    _ansTimer = setTimeout(() => flushAnswers(false), 500);
}
function flushAnswers(done) {
    clearTimeout(_ansTimer);
    if (!D || D.type !== 'race') return;
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostReceiveAnswers(me, myAnswers, D.round, done);
    } else if (hostConn) {
        send(hostConn, { type: done ? 'done' : 'answers', round: D.round, answers: myAnswers });
    }
}
function tapDone() {
    if (myDone) return;
    myDone = true;
    sDone();
    if (musicTrack === 'race') musicIntensity = 2;   // locked in — full arrangement while the others sweat
    flushAnswers(true);
    const btn = $id('done-btn');
    if (btn) { btn.disabled = true; btn.textContent = '✅ Waiting for the others…'; }
    document.querySelectorAll('.ans-item input').forEach(el => { el.disabled = true; });
}

// ═══════════════════════════════════════════
// VIEWER (TV) MESSAGE HANDLING
// ═══════════════════════════════════════════
let _vTick = null, _vEndsAt = 0, _vTotal = 0;
function stopViewerTick() { clearInterval(_vTick); _vTick = null; }

function applyViewerMsg(msg) {
    document.body.classList.add('viewer-mode');
    ui = 'viewer';
    const prev = vD;
    vD = msg;
    switch (msg.type) {
        case 'viewer_lobby': {
            const prevN = prev && prev.type === 'viewer_lobby' ? (prev.players || []).length : -1;
            stopViewerTick();
            setMusic('lobby');
            render();
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            break;
        }
        case 'viewer_race': {
            const fresh = !prev || prev.type !== 'viewer_race' || prev.round !== msg.round;
            if (fresh) {
                stopViewerTick();
                musicUrgent = false;
                setMusic('race');
                musicKeyShift = msg.round >= msg.rounds ? 2 : 0;   // final round: key up
                bumpRaceIntensity(msg.progress);
                render();
                sGo();
                _vTotal = msg.seconds * 1000;
                _vEndsAt = Date.now() + _vTotal;
                _vLastSec = -1;
                _vTick = setInterval(patchViewerTimer, 200);
            } else {
                bumpRaceIntensity(msg.progress);
                const prog = $id('v-prog');
                if (prog) prog.innerHTML = progChipsHTML(msg.progress);
            }
            break;
        }
        case 'viewer_judge': {
            stopViewerTick();
            const newCat = !prev || prev.type !== 'viewer_judge' || prev.catIndex !== msg.catIndex || prev.round !== msg.round;
            setMusic('judge');
            musicKeyShift = msg.isLastRound ? 2 : 0;   // final round: key up
            render();
            if (newCat) {
                const hasClash = msg.entries.some(e => e.clash), hasPts = msg.entries.some(e => e.pts > 0);
                if (hasClash) { sZap(); burst(innerWidth * 0.5, innerHeight * 0.4, ['#f472b6', '#ffe14d', '#f1edff'], 18); }
                if (hasPts) sDing(hasClash ? 0.45 : 0);
            }
            break;
        }
        case 'viewer_podium':
            stopViewerTick(); setMusic('over'); render(); sWin(); startConfetti(5200); break;
    }
}

let _vLastSec = -1;
function patchViewerTimer() {
    const left = Math.max(0, _vEndsAt - Date.now());
    const bar = $id('v-timebar'), num = $id('v-timenum');
    if (bar) bar.style.width = (left / _vTotal * 100) + '%';
    if (num) {
        const s = Math.ceil(left / 1000);
        const low = s <= 10 && s > 0;
        if (low && musicTrack === 'race') musicUrgent = true;
        num.classList.toggle('low', low);
        if (bar) bar.classList.toggle('low', low);
        num.textContent = s;
        if (s !== _vLastSec) { _vLastSec = s; if (s <= 5 && s > 0) sTick(); }
    }
    if (left <= 0) stopViewerTick();
}

function hdrHTML(sub) {
    return `<h1 class="logo">⚡ CATEGORY <em>CLASH</em></h1><div class="sub">${esc(sub || 'one letter · eight categories · duplicates clash')}</div>`;
}
function joinURL() { return location.origin + location.pathname + '?room=' + roomCode; }
function isCaptain() { return !!(D && D.tvHost && D.captain && D.captain === myName); }
function canDrive() { return (isHost && !isTvHost) || isCaptain(); }

function settingsSegsHTML(settings, expr) {
    const seg = (opts, curV, key) => `<div class="seg-row">${opts.map(o =>
        `<button class="btn btn-sm ${curV === o.v ? 'btn-p' : 'btn-g'}" onclick="${expr(`{${key}:${o.j}}`)}">${o.l}</button>`).join('')}</div>`;
    return `
        <div class="fg"><label>Rounds</label>${seg(
            [2, 3, 5].map(v => ({ v, j: v, l: v })), settings.rounds, 'rounds')}</div>
        <div class="fg"><label>Timer</label>${seg(
            [60, 90, 120].map(v => ({ v, j: v, l: v + 's' })), settings.timerSecs, 'timerSecs')}</div>`;
}

function verdictOf(e, letter) {
    if (e.veto) return { cls: 'bad', txt: '👎 vetoed', ansCls: 'invalid' };
    if (!e.letterOk) return { cls: 'bad', txt: `✗ not “${letter}”`, ansCls: 'invalid' };
    if (e.clash) return { cls: 'clash', txt: '💥 CLASH! 0', ansCls: 'strike' };
    return { cls: 'ok', txt: e.allit ? '✨ +' + e.pts : '✓ +' + e.pts, ansCls: '' };
}

function standingsHTML(players, deltas) {
    const medals = ['🥇', '🥈', '🥉'];
    const st = players.slice().sort((a, b) => b.score - a.score);
    return `<div class="card standings"><div class="slbl">Scores</div>${
        st.map((p, i) => `
        <div class="player-row">
            <span style="width:22px;text-align:center">${medals[i] || (i + 1)}</span>
            <span class="pdot" style="background:${p.color};color:${p.color}"></span>
            <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}${p.name === myName ? ' <span style="color:var(--letter)">(you)</span>' : ''}</div>
            <div class="sc">${p.score}${deltas && p.delta ? `<span class="delta">+${p.delta}</span>` : ''}</div>
        </div>`).join('')
    }</div>`;
}

function progChipsHTML(progress) {
    return (progress || []).map(p => `
        <div class="prog-chip${p.done ? ' done' : ''}">
            <span class="rdot" style="background:${p.color}"></span>
            ${esc(p.name)} <b>${p.filled}/${CATS_PER_ROUND}</b>${p.done ? ' ✅' : ''}

}

let _lastSig = '';
function render() {
    const app = $id('app');
    if (isTvHost || isViewer) ui = 'viewer';
    // 'fresh' marks a real screen change (phase / round / judged category) →
    // entrance animations run once, never on same-screen re-renders
    // (veto toggles, joins, settings taps, progress patches)
    const sig = ui === 'viewer'
        ? 'v|' + (vD ? vD.type + '|' + (vD.round ?? '') + '|' + (vD.catIndex ?? '') : '')
        : ui + '|' + (D ? (D.round ?? '') + '|' + (D.catIndex ?? '') : '');
    const fresh = sig !== _lastSig;
    _lastSig = sig;
    let html = '';
    switch (ui) {
        case 'home':       html = renderHome(); break;
        case 'creating':   html = renderSpinner('Setting up the game…'); break;
        case 'connecting': html = renderSpinner('Joining the game…'); break;
        case 'lobby_h':    html = renderLobbyH(); break;
        case 'lobby_g':    html = renderLobbyG(); break;
        case 'race':       html = renderRace(); break;
        case 'judge':      html = renderJudge(); break;
        case 'podium':     html = renderPodium(); break;
        case 'viewer':     html = renderViewer(); break;
        default:           html = renderHome();
    }
    app.innerHTML = html;
    app.classList.toggle('fresh', fresh);
}

function renderSpinner(msg) {
    return `${hdrHTML()}<div class="connecting"><div class="spin"></div><div>${esc(msg)}</div></div>`;
}

function renderViewer() {
    if (!vD) return renderSpinner('Waiting for the game…');
    switch (vD.type) {
        case 'viewer_lobby':  return renderViewerLobby();
        case 'viewer_race':   return renderViewerRace();
        case 'viewer_judge':  return renderViewerJudge();
        case 'viewer_podium': return renderViewerPodium();
        default:              return renderSpinner('Waiting for the game…');
    }
}

function renderViewerLobby() {
    const url = location.origin + location.pathname + '?room=' + (vD.roomCode || '');
    const players = vD.players || [];
    const cards = players.map(p =>
        `<div class="tv-pcard"><div class="pdot" style="background:${p.color};color:${p.color}"></div>${esc(p.name)}${vD.tvHost && p.name === vD.captain ? ' 👑' : ''}</div>`).join('');
    const s = vD.settings || {};
    return tvShell(`
    <div class="tv-lobby">
        <div class="qr-side">
            <div class="slbl">Scan with your phone to join</div>
            <div class="qr-wrap">${qrSVG(url)}</div>
            <div class="room-code">${esc(vD.roomCode || '')}</div>
            <div class="join-hint">${location.host}${location.pathname}</div>
        </div>
        <div class="tv-players">
            <div class="tv-meta">Players — ${players.length}/${MAX_PLAYERS}</div>
            <div class="tv-player-grid">${cards}</div>
            <div class="tv-waiting">${players.length === 0
                ? 'Waiting for the first phone… they become 👑 Captain'
                : (players.length < MIN_PLAYERS ? 'Need at least ' + MIN_PLAYERS + ' players…'
                    : `${vD.tvHost ? `Waiting for 👑 ${esc(vD.captain || '')}` : 'Waiting for the host'} to start · 🔁 ${s.rounds} rounds · ⏱️ ${s.timerSecs}s`)}</div>
        </div>
    </div>`, 'Lobby');
}

function renderViewerRace() {
    const cats = vD.categories.map((c, i) =>
        `<div class="tv-cat" style="--i:${i}"><span class="n">${i + 1}</span>${esc(c)}</div>`).join('');
    return tvShell(`
    <div class="tv-stage">
        <div class="tv-race">
            <div class="tv-letter">${esc(vD.letter)}</div>
            <div class="tv-cats">${cats}</div>
        </div>
        <div class="tv-race-bottom">
            <div class="tv-progress-chips" id="v-prog">${progChipsHTML(vD.progress)}</div>
            <div class="tv-timebar-wrap"><div class="tv-timebar" id="v-timebar" style="width:100%"></div></div>
            <div class="tv-timenum" id="v-timenum">${vD.seconds}</div>
        </div>
    </div>`, `Round ${vD.round} of ${vD.rounds}`);
}

function renderViewerJudge() {
    const rows = (vD.entries || []).map((e, i) => {
        const v = verdictOf(e, vD.letter);
        return `
        <div class="tv-entry${e.clash ? ' zap' : ''}" style="--i:${i}">
            <span class="rdot" style="background:${e.color};color:${e.color}"></span>
            <span class="who">${esc(e.name)}</span>
            <span class="ans ${v.ansCls}">${esc(e.ans)}</span>
            <span class="verdict ${v.cls}">${v.txt}</span>
        </div>`;
    }).join('');
    const hint = vD.tvHost
        ? `👑 ${esc(vD.captain || 'Captain')} judges on their phone — 👎 veto, then next category`
        : 'The host judges on their phone — 👎 veto, then next category';
    return tvShell(`
    <div class="tv-main">
        <div class="tv-stage">
            <div class="tv-judge">
                <div class="tv-judge-head">
                    <div class="letter-mini">${esc(vD.letter)}</div>
                    <div class="cat"><small>Category ${vD.catIndex + 1} of ${vD.catTotal}</small>${esc(vD.category)}</div>
                </div>
                <div class="tv-entries">${rows || '<div class="tv-nobody">Nobody had one! 🦗</div>'}</div>
                <div class="tv-hint">${hint}</div>
            </div>
        </div>
        <div class="tv-rail">
            <div class="rail-title">Scores</div>
            ${railHTML(vD.players)}
        </div>
    </div>`, `Round ${vD.round} of ${vD.rounds} · Judging`);
}

function renderViewerPodium() {
    const st = vD.standings || [];
    const podOrder = [st[1], st[0], st[2]].filter(Boolean);
    const cls = st.length >= 3 ? ['p2', 'p1', 'p3'] : (st.length === 2 ? ['p2', 'p1'] : ['p1']);
    const medal = { p1: '🥇', p2: '🥈', p3: '🥉' };
    const pods = podOrder.map((p, i) => `
        <div class="pod ${cls[i]}" style="animation-delay:${i * 0.18}s">
            <div class="pname"><span class="pdot" style="background:${p.color};color:${p.color};display:inline-block;vertical-align:middle;margin-right:.6vmin"></span>${esc(p.name)}</div>
            <div class="pscore">${p.score} pts</div>
            <div class="block">${medal[cls[i]]}</div>
        </div>`).join('');
    const rest = st.slice(3).map((p, i) =>
        `<div class="rail-row"><span>${i + 4}.</span><span class="rdot" style="background:${p.color}"></span><span class="rname">${esc(p.name)}</span><span class="rsc">${p.score}</span></div>`).join('');
    const awards = (vD.awards || []).map(a =>
        `<div class="award">${a.emoji} <span class="aw-t">${esc(a.title)}</span><br>${esc(a.name)} — ${esc(a.detail)}</div>`).join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Captain')}: “Play again” is on your phone` : 'Host: “Play again” is on your phone';
    return tvShell(`
    <div class="tv-main" style="flex-direction:column">
        <div class="podium-wrap">${pods}</div>
        <div class="awards-row">${awards}</div>
        ${rest ? `<div style="display:flex;gap:1.4vmin;justify-content:center;flex-wrap:wrap">${rest}</div>` : ''}
        <div class="tv-waiting" style="text-align:center;padding-bottom:1.6vmin">${hint}</div>
    </div>`, '🏆 Final scores');
}

// ═══════════════════════════════════════════
// SIMULATION MODES — ?mode=tvsimulation | playersimulation  (&players=N)
// Self-driving demos with no PeerJS and no real people. Bots are counted as
// "connected" via stub guestConns so the normal host flow drives everything.
//   • tvsimulation     — watch the big-screen scoreboard play itself
//   • playersimulation — watch a phone racer ("You") play itself
// (?mode=simulation stays as an alias for tvsimulation.)
// ═══════════════════════════════════════════
let simTimer = null, simMode = 'tv';
const SIM_NAMES = ['Ace', 'Bux', 'Cash', 'Duke', 'Edie', 'Fox', 'Gwen', 'Hawk'];
const SIM_SUFFIX = ['amson', 'erry', 'onzo', 'ippo', 'otter', 'umble', 'azzle', 'indle', 'oodle', 'anana'];
function simWord(L) { return L + SIM_SUFFIX[Math.floor(Math.random() * SIM_SUFFIX.length)]; }

function startSimulation(nPlayers, mode) {
    simMode = mode === 'player' ? 'player' : 'tv';
    roomCode = 'DEMO';
    H.settings.rounds = 2;
    H.settings.timerSecs = 90;       // races end early once every bot is done
    H.players = []; guestConns = {}; viewerConns = {};
    const n = Math.max(MIN_PLAYERS, Math.min(nPlayers || 4, MAX_PLAYERS));
    if (simMode === 'tv') {
        isHost = true; isTvHost = true; myId = '__sim_host__';
        document.body.classList.add('viewer-mode');
    } else {
        isHost = true; isTvHost = false; myName = 'You'; myId = '__you__';
        hostAddPlayer(myId, myName);                  // you are racer #1 (the host)
    }
    for (let i = H.players.length; i < n; i++) {
        const id = '__bot_' + i;
        hostAddPlayer(id, SIM_NAMES[i % SIM_NAMES.length]);
        guestConns[id] = { peer: id, send() {} };     // stub so bots count as present
    }
    broadcastLobby();
    simTimer = setTimeout(simStart, 2400);
}

function simStart() {
    if (H.phase !== 'lobby') return;
    hostStartGame();                                  // phase 'race', round 1
    simTimer = setTimeout(simRace, 2400);
}

function simRace() {
    if (H.phase !== 'race' || !H.cur) return;
    const L = H.cur.letter;
    let delay = 500;
    H.players.forEach(p => {
        if (simMode === 'player' && p.id === myId) return;
        const d = delay; delay += 450 + Math.random() * 550;
        setTimeout(() => simBotRace(p, L), d);
    });
    if (simMode === 'player') { const dY = delay; delay += 600; setTimeout(simYouRace, dY); }
    simTimer = setTimeout(simAfterRace, delay + 1800);
}

function simBotRace(p, L) {
    if (H.phase !== 'race' || !H.cur) return;
    const ans = H.cur.categories.map(() => Math.random() < 0.15 ? '' : simWord(L));
    hostReceiveAnswers(p, ans, H.round, true);        // fill answers + mark done
}

function simYouRace() {
    if (H.phase !== 'race' || !H.cur) return;
    const me = H.players.find(p => p.id === myId);
    if (!me) return;
    const L = H.cur.letter;
    const ans = H.cur.categories.map(() => Math.random() < 0.85 ? simWord(L) : '');
    if (ui === 'race') {
        ans.forEach((v, i) => onAns(i, v));           // through the real inputs (animates)
        setTimeout(() => { if (!myDone) tapDone(); }, 550);
    } else {
        hostReceiveAnswers(me, ans, H.round, true);
    }
}

function simAfterRace() {
    if (H.phase === 'race') endRace();                // force judge if anyone stalled
    if (H.phase === 'judge') simTimer = setTimeout(simJudgeStep, 1400);
}

function simJudgeStep() {
    if (H.phase !== 'judge') {
        if (H.phase === 'race') simTimer = setTimeout(simRace, 1800);        // next round
        else if (H.phase === 'podium') simTimer = setTimeout(simRestart, 7000);
        return;
    }
    hostNextCategory();                               // score this category, advance
    simTimer = setTimeout(simJudgeStep, 1300);
}

function simRestart() {
    hostNewGame();                                    // → lobby
    simTimer = setTimeout(simStart, 2600);
}

(function boot() {
    const params = new URLSearchParams(location.search);
    $id('tog-music').classList.toggle('off', !musicOn);
    $id('tog-sfx').classList.toggle('off', !sfxOn);
    const mode = (params.get('mode') || '').toLowerCase();
    const simPlayers = parseInt(params.get('players'), 10) || 4;
    if (mode === 'playersimulation') { startSimulation(simPlayers, 'player'); return; }
    if (mode === 'tvsimulation' || mode === 'simulation') { startSimulation(simPlayers, 'tv'); return; }
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    render();
})();
</script>
