<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Best Guess</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23070b1a' width='100' height='100' rx='20'/><text x='50' y='68' font-size='52' text-anchor='middle'>💰</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #070b1a; --panel: rgba(17,24,48,0.86); --panel2: rgba(26,34,66,0.92);
            --border: rgba(45,212,191,0.28); --border2: rgba(139,147,184,0.26);
            --text: #eef2ff; --muted: #8b93b8;
            --gold: #fbbf24; --teal: #2dd4bf; --pink: #f472b6; --down: #f87171; --up: #34d399;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            padding: 26px 16px 48px; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 60% 45% at 50% -5%, rgba(45,212,191,0.13) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 10% 100%, rgba(251,191,36,0.09) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 92% 100%, rgba(244,114,182,0.08) 0%, transparent 65%);
        }
        body.viewer-mode { padding: 0; overflow: hidden; display: block; height: 100dvh; width: 100vw; }

        h1.logo {
            font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 2px;
            font-size: clamp(1.5rem, 6.5vw, 2.3rem); text-align: center; color: var(--teal);
            text-shadow: 0 0 26px rgba(45,212,191,.45);
        }
        h1.logo b { color: var(--gold); text-shadow: 0 0 26px rgba(251,191,36,.45); }
        .sub { color: var(--muted); font-size: .68rem; letter-spacing: 2.5px; text-transform: uppercase; margin: 7px 0 22px; text-align: center; }

        #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 13px; }
        body.viewer-mode #app { max-width: none; height: 100dvh; display: block; }

        .card {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 16px;
            padding: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 12px 34px rgba(0,0,0,.5);
        }
        .card.highlight { border-color: var(--gold); box-shadow: 0 0 26px rgba(251,191,36,.14), 0 12px 34px rgba(0,0,0,.5); }
        .slbl { font-size: .64rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 11px; }

        .fg { margin-bottom: 12px; }
        .fg label { display: block; font-size: .64rem; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        input[type=text] {
            width: 100%; padding: 12px 14px; font-family: inherit; font-size: 1rem; font-weight: 700;
            border: 2px solid var(--border2); border-radius: 11px; background: rgba(7,11,26,.7); color: var(--text);
            outline: none;
        }
        input[type=text]:focus { border-color: var(--teal); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit; font-weight: 900; font-size: .92rem; letter-spacing: .5px;
            padding: 13px 18px; border: none; border-radius: 13px; cursor: pointer;
            transition: filter .12s, opacity .12s, box-shadow .12s; user-select: none; -webkit-user-select: none;
            color: var(--text);
        }
        .btn:active { filter: brightness(1.2); }
        .btn-p { background: linear-gradient(180deg, #fcd34d, #f59e0b); color: #2a1700; box-shadow: 0 5px 0 #92600a, 0 10px 22px rgba(251,191,36,.3); }
        .btn-p:active { box-shadow: 0 2px 0 #92600a; }
        .btn-t { background: linear-gradient(180deg, #5eead4, #14b8a6); color: #032620; box-shadow: 0 5px 0 #0b6b60, 0 10px 22px rgba(45,212,191,.3); }
        .btn-t:active { box-shadow: 0 2px 0 #0b6b60; }
        .btn-g { background: rgba(139,147,184,.12); box-shadow: inset 0 0 0 2px var(--border2); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 8px 13px; font-size: .74rem; border-radius: 10px; }
        .btn:disabled { opacity: .4; cursor: default; }

        .err {
            background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.5); color: #fca5a5;
            padding: 11px 14px; border-radius: 12px; font-size: .8rem; font-weight: 700; text-align: center;
        }
        hr { border: none; border-top: 1px dashed var(--border2); margin: 13px 0; }

        .connecting { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 46px 0; color: var(--muted); font-weight: 700; }
        .spin { width: 34px; height: 34px; border-radius: 50%; border: 4px solid rgba(45,212,191,.15); border-top-color: var(--teal); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .avrow { display: flex; flex-wrap: wrap; gap: 7px; }
        .av {
            width: 42px; height: 42px; border-radius: 12px; font-size: 1.35rem; display: flex; align-items: center; justify-content: center;
            background: rgba(7,11,26,.7); border: 2px solid var(--border2); cursor: pointer;
        }
        .av.sel { border-color: var(--gold); background: rgba(251,191,36,.12); box-shadow: 0 4px 12px rgba(251,191,36,.3); }

        .player-row { display: flex; align-items: center; gap: 11px; padding: 8px 4px; border-bottom: 1px dashed var(--border2); font-weight: 800; font-size: .92rem; }
        .player-row:last-child { border-bottom: none; }
        .pav { width: 36px; height: 36px; border-radius: 10px; background: rgba(7,11,26,.7); border: 1px solid var(--border2); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--up); box-shadow: 0 0 8px var(--up); margin-left: auto; }
        .qr-wrap { width: min(210px, 58vw); margin: 6px auto 10px; border-radius: 13px; overflow: hidden; box-shadow: 0 8px 22px rgba(0,0,0,.4); }
        .qr-wrap svg { display: block; width: 100%; height: auto; }
        .room-code { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.2rem; letter-spacing: 11px; text-align: center; color: var(--gold); padding-left: 11px; text-shadow: 0 0 18px rgba(251,191,36,.4); }
        .share-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px; }
        .seg-row { display: flex; flex-wrap: wrap; gap: 7px; }

        /* ── phone: guess (keypad) ── */
        .q-card { text-align: center; }
        .q-text { font-weight: 900; font-size: 1.18rem; line-height: 1.45; }
        .q-unit { color: var(--teal); font-weight: 900; font-size: .8rem; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 6px; }
        .num-display {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.1rem; text-align: center;
            background: rgba(7,11,26,.75); border: 2px solid var(--border); border-radius: 14px;
            padding: 14px; min-height: 74px; color: var(--gold); letter-spacing: 2px;
            font-variant-numeric: tabular-nums; overflow: hidden;
        }
        .num-display .ph { color: var(--muted); font-size: 1rem; font-family: 'Nunito', sans-serif; letter-spacing: 0; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
        .key {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.3rem; padding: 16px 0;
            border: none; border-radius: 13px; cursor: pointer; color: var(--text);
            background: var(--panel2); box-shadow: inset 0 0 0 1px var(--border2), 0 4px 0 rgba(0,0,0,.35);
        }
        .key:active { box-shadow: inset 0 0 0 1px var(--border2), 0 1px 0 rgba(0,0,0,.35); filter: brightness(1.3); }
        .key.fn { font-size: 1rem; color: var(--muted); }
        .locked-note { text-align: center; font-weight: 900; color: var(--gold); font-size: 1rem; padding: 8px 0 2px; }

        /* ── phone: bet ── */
        .chips-left { text-align: center; font-weight: 900; font-size: 1rem; }
        .chips-left .coin { font-size: 1.5rem; vertical-align: middle; }
        .slot-btn {
            width: 100%; display: flex; align-items: center; gap: 10px; text-align: left;
            background: var(--panel2); border: 2px solid var(--border2); border-radius: 13px;
            padding: 11px 13px; cursor: pointer; font-family: inherit; color: var(--text);
            margin-bottom: 8px;
        }
        .slot-btn:disabled { opacity: .5; cursor: default; }
        .slot-btn .sv { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.15rem; color: var(--teal); min-width: 74px; }
        .slot-btn.house .sv { color: var(--down); font-size: .8rem; }
        .slot-btn .sa { flex: 1; font-size: .95rem; }
        .slot-btn .schips { font-size: .95rem; letter-spacing: -2px; }
        .slot-btn.mine { border-color: var(--gold); box-shadow: 0 0 14px rgba(251,191,36,.2); }

        /* ── phone: payout ── */
        .verdict { text-align: center; padding: 8px 0 4px; }
        .verdict .vico { font-size: 3rem; }
        .verdict .vt { font-weight: 900; font-size: 1.45rem; margin-top: 4px; }
        .verdict .vans { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.9rem; color: var(--teal); margin-top: 4px; }
        .verdict .vpts { font-size: 1.9rem; font-weight: 900; color: var(--gold); margin-top: 2px; }
        .chip { display: inline-block; padding: 4px 12px; border-radius: 11px; background: rgba(251,191,36,.12); border: 1px solid rgba(251,191,36,.4); color: var(--gold); font-weight: 900; font-size: .76rem; margin: 3px; }
        .chip.teal { background: rgba(45,212,191,.1); border-color: rgba(45,212,191,.4); color: var(--teal); }
        .standings .sc { margin-left: auto; font-weight: 900; }
        .standings .delta { color: var(--up); font-size: .74rem; font-weight: 900; margin-left: 7px; }

        /* ═════════ TV ═════════ */
        .tv { height: 100dvh; display: flex; flex-direction: column; padding: 2.6vmin 3.2vmin; gap: 1.8vmin; }
        .tv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2vmin; }
        .tv-logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 3vmin; letter-spacing: .35vmin; color: var(--teal); text-shadow: 0 0 24px rgba(45,212,191,.45); }
        .tv-logo b { color: var(--gold); }
        .tv-meta { font-size: 1.8vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .tv-main { flex: 1; display: flex; gap: 2.2vmin; min-height: 0; }
        .tv-stage { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; gap: 1.8vmin; }
        .tv-rail { width: 28vmin; min-width: 230px; display: flex; flex-direction: column; gap: 1.2vmin; overflow: hidden; }
        .rail-title { font-size: 1.6vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .rail-row {
            display: flex; align-items: center; gap: 1.1vmin; background: var(--panel);
            border: 1px solid var(--border2); border-radius: 1.5vmin; padding: 1.1vmin 1.4vmin;
            font-weight: 800; font-size: 1.9vmin; position: relative;
        }
        .rail-row .rav { font-size: 2.4vmin; }
        .rail-row .rname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rail-row .rsc { font-weight: 900; color: var(--gold); font-variant-numeric: tabular-nums; font-family: 'Orbitron', sans-serif; font-size: 1.9vmin; }
        .rail-row .rdelta { position: absolute; right: 1vmin; top: -1.2vmin; font-size: 1.5vmin; font-weight: 900; color: var(--up); text-shadow: 0 2px 6px rgba(0,0,0,.6); }
        .rail-row.locked::after { content: '✓'; color: var(--up); font-weight: 900; font-size: 1.9vmin; }

        .tv-q {
            background: var(--panel); border: 1px solid var(--border); border-radius: 2vmin;
            padding: 3vmin 4vmin; text-align: center;
        }
        .tv-q .qq { font-weight: 900; font-size: 3.2vmin; line-height: 1.4; }
        .tv-q .qu { color: var(--teal); font-weight: 900; font-size: 1.7vmin; letter-spacing: .35vmin; text-transform: uppercase; margin-top: 1.2vmin; }
        .tv-counter { text-align: center; font-weight: 900; font-size: 2.2vmin; color: var(--gold); }
        .tv-bigq { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 2.5vmin; }

        /* TV board */
        .board-wrap { flex: 1; display: flex; align-items: center; justify-content: center; gap: 1.4vmin; overflow-x: auto; padding: 1vmin 0; }
        .slot-card {
            flex: 1; min-width: 12vmin; max-width: 22vmin; background: var(--panel2);
            border: 2px solid var(--border2); border-radius: 1.8vmin; padding: 1.8vmin 1.2vmin;
            display: flex; flex-direction: column; align-items: center; gap: 1vmin; text-align: center;
            transition: border-color .3s, box-shadow .3s;
        }
        .slot-card .sval { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.6vmin; color: var(--teal); }
        .slot-card.house .sval { color: var(--down); font-size: 1.7vmin; }
        .slot-card .sauth { font-size: 2.4vmin; min-height: 3vmin; }
        .slot-card .schips { display: flex; flex-wrap: wrap; gap: .4vmin; justify-content: center; min-height: 3vmin; }
        .slot-card .schips .bchip {
            width: 2.6vmin; height: 2.6vmin; border-radius: 50%; font-size: 1.5vmin;
            background: radial-gradient(circle at 35% 30%, #fde68a, #d97706); color: #2a1700;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,.5);
        }
        .slot-card.winner { border-color: var(--gold); box-shadow: 0 0 34px rgba(251,191,36,.4); }
        .slot-card.winner .sval { color: var(--gold); }
        .tv-answer {
            text-align: center; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 3.4vmin;
            color: var(--gold); text-shadow: 0 0 24px rgba(251,191,36,.4);
        }

        /* TV lobby */
        .tv-lobby { flex: 1; display: flex; gap: 4vmin; align-items: center; min-height: 0; }
        .tv-lobby .qr-side { background: #101830; border: 1px solid var(--border); border-radius: 2.2vmin; padding: 3.2vmin; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
        .tv-lobby .qr-side .qr-wrap { width: 32vmin; margin: 1.4vmin auto; }
        .tv-lobby .qr-side .room-code { font-size: 4.6vmin; letter-spacing: 1.9vmin; padding-left: 1.9vmin; }
        .tv-lobby .join-hint { font-size: 1.7vmin; font-weight: 700; color: var(--muted); }
        .tv-players { flex: 1; display: flex; flex-direction: column; gap: 1.5vmin; min-width: 0; }
        .tv-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(19vmin, 1fr)); gap: 1.5vmin; }
        .tv-pcard {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 1.7vmin;
            padding: 1.6vmin; text-align: center; font-weight: 900; font-size: 1.9vmin;
        }
        .tv-pcard .pav-big { font-size: 4vmin; }
        .tv-waiting { color: var(--muted); font-weight: 800; font-size: 1.9vmin; }

        /* podium */
        .podium-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 2.4vmin; padding-bottom: 1vmin; }
        .pod { text-align: center; font-weight: 900; }
        .pod .pav-big { font-size: 4.6vmin; }
        .pod .pname { font-size: 2.3vmin; margin-bottom: .8vmin; }
        .pod .pscore { font-size: 1.9vmin; color: var(--gold); margin-bottom: .8vmin; font-family: 'Orbitron', sans-serif; }
        .pod .block { border-radius: 1.5vmin 1.5vmin 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 1.3vmin; font-size: 3.2vmin; width: 17vmin; }
        .pod.p1 .block { height: 21vmin; background: linear-gradient(180deg, #fcd34d, #92600a); }
        .pod.p2 .block { height: 14vmin; background: linear-gradient(180deg, #d7d7e0, #8f8fa3); }
        .pod.p3 .block { height: 9.5vmin; background: linear-gradient(180deg, #e8a06a, #9c5a33); }
        .awards-row { display: flex; gap: 1.5vmin; justify-content: center; flex-wrap: wrap; padding-bottom: 2vmin; }
        .award { background: var(--panel); border: 1px solid var(--border); border-radius: 1.5vmin; padding: 1.3vmin 2vmin; font-weight: 800; font-size: 1.8vmin; text-align: center; }
        .award .aw-t { color: var(--gold); font-weight: 900; }

        #confetti-cv { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

        /* sound toggles */
        #sound-togs { position: fixed; top: 10px; right: 10px; z-index: 80; display: flex; gap: 6px; }
        #sound-togs button {
            width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem;
            background: var(--panel2); box-shadow: inset 0 0 0 1px var(--border2);
            transition: opacity .2s, transform .12s;
        }
        #sound-togs button:active { transform: scale(.88); }
        #sound-togs button.off { opacity: .35; filter: grayscale(1); }
        body.viewer-mode .tv-top { padding-right: 92px; }

        /* FX layer — particles + score pops */
        .pt {
            position: fixed; width: 9px; height: 9px; border-radius: 2px;
            z-index: 950; pointer-events: none;
            animation: ptFly .75s cubic-bezier(.15,.65,.4,1) forwards;
        }
        @keyframes ptFly {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(560deg) scale(.3); opacity: 0; }
        }
        .pop {
            position: fixed; z-index: 960; pointer-events: none;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.5rem;
            animation: popUp 1.1s cubic-bezier(.2,.8,.3,1) forwards;
            text-shadow: 0 2px 12px rgba(0,0,0,.6); white-space: nowrap;
        }
        .pop.good { color: var(--up); }
        .pop.gold { color: var(--gold); }
        .pop.bad  { color: var(--down); font-size: 1rem; }
        @keyframes popUp {
            0%   { transform: translate(-50%, 0) scale(.5); opacity: 0; }
            15%  { transform: translate(-50%, -12px) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -78px) scale(1); opacity: 0; }
        }

        /* screen entrances — only on phase changes (#app.fresh), so patches never re-trigger */
        @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        #app.fresh .card { animation: cardIn .35s cubic-bezier(.2,.8,.3,1) both; }
        #app.fresh .tv-q { animation: cardIn .4s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes slotIn { from { opacity: 0; transform: scale(.88) translateY(8px); } to { opacity: 1; transform: none; } }
        #app.fresh .slot-btn, #app.fresh .slot-card { animation: slotIn .32s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 45ms); }
        #app.fresh .tv-pcard { animation: slotIn .35s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 50ms); }
        @keyframes keyIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        #app.fresh .key { animation: keyIn .28s ease-out both; animation-delay: calc(var(--i, 0) * 25ms); }
        @keyframes vicoPop { 0% { transform: scale(0) rotate(-14deg); } 60% { transform: scale(1.25) rotate(4deg); } 100% { transform: scale(1) rotate(0); } }
        #app.fresh .vico { animation: vicoPop .5s cubic-bezier(.2,.8,.3,1) both; display: inline-block; }
        @keyframes vptsPop { 0% { opacity: 0; transform: scale(.4); } 60% { transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }
        #app.fresh .vpts { animation: vptsPop .45s .18s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes shakeX {
            10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-6px); } 40%, 60% { transform: translateX(6px); }
        }
        .err { animation: shakeX .45s both; }

        /* TV: winner slot spotlight, podium rise */
        @keyframes winnerPulse { 0%, 100% { box-shadow: 0 0 24px rgba(251,191,36,.35); } 50% { box-shadow: 0 0 56px rgba(251,191,36,.7); } }
        .slot-card.winner { animation: winnerPulse 1.6s ease-in-out .3s infinite; }
        @keyframes podRise { from { transform: translateY(30%); opacity: 0; } to { transform: none; opacity: 1; } }
        #app.fresh .pod { animation: podRise .55s cubic-bezier(.2,.8,.3,1) both; }
        #app.fresh .award { animation: cardIn .5s .6s both; }

        /* ── themed ambient background: drifting question marks, coins & wagers ── */
        #ambient { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .amb { position: absolute; top: 100%; line-height: 1; user-select: none; -webkit-user-select: none;
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            animation: ambRise var(--d, 24s) linear infinite; animation-delay: var(--delay, 0s); }
        @keyframes ambRise {

// The one rule of the game, kept pure so tests can hit it directly:
// winning slot = closest guess NOT over the answer; if every guess is over, the house slot (0) wins.
function winningSlot(slots, answer) {
    let win = 0;
    for (let i = 1; i < slots.length; i++) {
        if (slots[i].value <= answer) win = i;   // slots are sorted ascending
    }
    return win;
}

// ── QR code (themed SVG) ──
function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++)
            for (let c = 0; c < n; c++)
                if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#f0fdfa"/>` +
            `<g fill="#101830">${rects}</g></svg>`;
    } catch (e) { return ''; }
}

let _cf = { parts: [], raf: 0, running: false, until: 0 };
function startConfetti(ms) {
    if (REDUCED) return;
    const cv = $id('confetti-cv'), ctx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    _cf.until = performance.now() + (ms || 2600);
    const cols = ['#fbbf24', '#2dd4bf', '#f472b6', '#34d399', '#a78bfa', '#eef2ff'];
    for (let i = 0; i < 130; i++) {
        _cf.parts.push({
            x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.5,
            vx: (Math.random() - 0.5) * 2.4, vy: 2 + Math.random() * 3.6,
            rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.25,
            w: 6 + Math.random() * 7, h: 4 + Math.random() * 5,
            col: cols[Math.floor(Math.random() * cols.length)],
        });
    }
    if (_cf.running) return;
    _cf.running = true;
    (function frame(t) {
        ctx.clearRect(0, 0, cv.width, cv.height);
        _cf.parts = _cf.parts.filter(p => p.y < cv.height + 30);
        for (const p of _cf.parts) {
            p.x += p.vx; p.y += p.vy; p.rot += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        }
        if (t < _cf.until || _cf.parts.length) _cf.raf = requestAnimationFrame(frame);
        else { _cf.running = false; ctx.clearRect(0, 0, cv.width, cv.height); }
    })(performance.now());
}

// Adaptive arrangement (0 = rhythm section, 1 = +lead, 2 = full band) and match-point key lift
let musicIntensity = 2, musicKeyShift = 0;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Swing: push every off-16th slightly late for a looser groove
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) tone(145, 0.22, { type: 'sine', vol: 0.46, when: rel, slide: 44, dest: musicGain });
    if (tr.hat[i]) {
        const hv = (i % 4 === 2 ? 0.13 : 0.07) * (0.8 + Math.random() * 0.4);
        noiseHit(0.05, { vol: hv, when: rel, hp: 9000, dest: musicGain });
    }
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) tone(mf(b + k), stepDur * 1.6, { type: w.bass || 'triangle', vol: 0.27, when: rel, dest: musicGain, lp: 1000, attack: 0.005 });
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    // Brass-section stabs: lowpassed saw comping on the off-beats (full band only)
    if (tr.stab && tr.stab[i] && ch && full)
        ch.forEach(m => tone(mf(m + 12 + k), stepDur * 0.9, { type: w.stab || 'sawtooth', vol: 0.028, when: rel, lp: 2400, dest: musicGain, attack: 0.005 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12;
        tone(mf(l + k), stepDur * 1.4, { type: w.lead || 'square', vol: 0.12 * (0.9 + Math.random() * 0.2), when: rel, dest: leadBus, lp: tr.leadLp || 4200, attack: 0.005 });
    }
    // Glockenspiel shimmer two octaves above the pads (full band only)
    if (tr.arp && i % tr.arp === 0 && ch && full)
        tone(mf(ch[(i / tr.arp) % ch.length] + 24 + k), stepDur * tr.arp * 0.9, { type: w.arpW || 'triangle', vol: 0.04, when: rel, lp: 5500, dest: musicGain, attack: 0.003 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.04, { vol: 0.11, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    // adaptive: think music starts on the rhythm section (bumpGuessIntensity fills it out)
    musicIntensity = track === 'guess' ? 0 : 2;
    if (track === 'lobby' || track === 'over') musicKeyShift = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'guess') musicUrgent = false;
    // one-beat snare fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) noiseHit(0.06, { vol: 0.1 + f * 0.035, when: f * s, hp: 2800 + f * 900, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}
// Adaptive layers: the lead joins once half the room has locked a guess,
// and the full band kicks in when only one player is still thinking
function bumpGuessIntensity(locked, total) {
    if (!total) return;
    if (locked / total >= 0.5) musicIntensity = Math.max(musicIntensity, 1);
    if (total > 1 && locked >= total - 1) musicIntensity = Math.max(musicIntensity, 2);
}

// ── Particle bursts + floating score text ──
function burst(x, y, colors, n = 14) {
    if (REDUCED) return;
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;
        p.style.cssText = `left:${x}px;top:${y}px;background:${colors[i % colors.length]};` +
            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}
function popText(x, y, text, cls = 'good') {
    const el = document.createElement('div');
    el.className = 'pop ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1150);
}

// ── Themed ambient background: question marks, coins & wagers drifting upward.
// Styled glyphs (?, $, %) are tinted in the palette; coin/dice emoji keep their
// own colour. Built once on load, never rebuilt on render, skipped for
// reduced-motion. Purely decorative. ──
function buildAmbient() {
    if (REDUCED) return;
    const host = $id('ambient');
    if (!host) return;
    const items = [
        { c: '?', col: '#2dd4bf' }, { c: '?', col: '#fbbf24' }, { c: '$', col: '#fbbf24' },
        { c: '%', col: '#f472b6' }, { c: '#', col: '#34d399' }, { c: '🪙' }, { c: '💰' }, { c: '🎲' },
    ];
    let html = '';
    for (let i = 0; i < 20; i++) {
        const it = items[Math.floor(Math.random() * items.length)];
        const size = 18 + Math.random() * 36;
        const dur = 18 + Math.random() * 18;
        const delay = -(Math.random() * dur);
        const left = Math.random() * 100;
        const sway = (Math.random() * 90 - 45).toFixed(0);
        const rot = (Math.random() * 100 - 50).toFixed(0);
        const op = (0.06 + Math.random() * 0.1).toFixed(2);
        const tint = it.col
            ? `color:${it.col};text-shadow:0 0 ${(size * 0.4).toFixed(0)}px ${it.col};`
            : '';
        html += `<span class="amb" style="left:${left.toFixed(1)}%;font-size:${size.toFixed(0)}px;${tint}` +
            `--d:${dur.toFixed(1)}s;--delay:${delay.toFixed(1)}s;--sway:${sway}px;--rot:${rot}deg;--op:${op}">${it.c}</span>`;
    }
    host.innerHTML = html;
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let peer = null, myId = '', myName = '', myAvatar = '', isHost = false, isTvHost = false, isViewer = false, roomCode = '';
let hostConn = null, guestConns = {}, viewerConns = {};
let ui = 'home';   // home|creating|connecting|lobby_h|lobby_g|guess|bet|payout|podium|viewer
let uiErr = '';
let fName = localStorage.getItem('bg-name') || '';
let fAvatar = localStorage.getItem('bg-avatar') || '';
let fCode = '', fVCode = '';
let D = null, vD = null;

// phone-local input state
let numEntry = '';

// Host authoritative state
let H = {
    phase: 'lobby',          // lobby|guess|bet|payout|podium
    players: [],             // [{id,name,avatar,score,guess,bets:[],lastDelta,oracle,smart}]
    settings: { qCount: 7 },
    questions: [], qIndex: -1,
    cur: null,               // {qid,q,a,unit}
    slots: null,             // built after guess phase
    payout: null,            // cached reveal
    lastPodium: null,
};
let _phaseTimer = null;

// ═══════════════════════════════════════════
// NETWORK
// ═══════════════════════════════════════════
function send(conn, msg) { try { conn.send(msg); } catch (e) { console.warn('send err', e); } }
function broadcastViewers(msg) { Object.values(viewerConns).forEach(c => send(c, msg)); }
function connectedPlayers() {
    return H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
}

function hostAddPlayer(id, name, avatar) {
    if (H.players.find(p => p.id === id) || H.players.length >= MAX_PLAYERS) return;
    const taken = new Set(H.players.map(p => p.avatar));
    const av = avatar && !taken.has(avatar) ? avatar : (AVATARS.find(a => !taken.has(a)) || '🙂');
    H.players.push({ id, name, avatar: av, score: 0, guess: null, bets: [], lastDelta: 0, oracle: 0, smart: 0 });
}

function lobbyMsg() {
    return {
        type: 'lobby', roomCode,
        players: H.players.map(p => ({ name: p.name, avatar: p.avatar })),
        settings: { ...H.settings },
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function broadcastLobby() {
    H.players.forEach(p => { if (p.id !== myId && guestConns[p.id]) send(guestConns[p.id], lobbyMsg()); });
    broadcastViewers({ ...lobbyMsg(), type: 'viewer_lobby' });
    hostSyncSelf(lobbyMsg());
}

function railPlayers(lockedKey) {
    return H.players
        .map(p => ({
            name: p.name, avatar: p.avatar, score: p.score, delta: p.lastDelta,
            locked: lockedKey === 'guess' ? p.guess !== null : (lockedKey === 'bet' ? p.bets.length >= CHIPS_PER_ROUND : false),
        }))
        .sort((a, b) => b.score - a.score);
}
function standings() {
    return H.players.slice()
        .sort((a, b) => b.score - a.score)
        .map(p => ({ name: p.name, avatar: p.avatar, score: p.score, delta: p.lastDelta, oracle: p.oracle, smart: p.smart }));
}
function caption() { return { tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null }; }
function progress() { return { num: H.qIndex + 1, total: H.questions.length }; }

function guessMsgFor(p) {
    return {
        type: 'guess', qid: H.cur.qid, ...progress(), ...caption(),
        q: H.cur.q, unit: H.cur.unit,
        lockedCount: H.players.filter(x => x.guess !== null).length,
        playerCount: connectedPlayers().length,
        myGuess: p ? p.guess : null,
    };
}
function slotsPayload() {
    return H.slots.map(s => ({
        value: s.value,
        authors: s.authors.map(a => ({ name: a.name, avatar: a.avatar })),
        chips: s.chips.map(c => ({ name: c.name, avatar: c.avatar })),
    }));
}
function boardMsgFor(p) {
    return {
        type: 'board', qid: H.cur.qid, ...progress(), ...caption(),
        q: H.cur.q, unit: H.cur.unit,
        slots: slotsPayload(),
        myBets: p ? p.bets.slice() : [],
        chipsLeft: p ? CHIPS_PER_ROUND - p.bets.length : 0,
        placedCount: H.players.filter(x => x.bets.length >= CHIPS_PER_ROUND).length,
        playerCount: connectedPlayers().length,
    };
}
function payoutMsgFor(p) {
    return {
        type: 'payout', qid: H.cur.qid, ...progress(), ...caption(),
        ...H.payout,
        my: p ? {
            delta: p.lastDelta,
            authorWin: H.payout.winnerAuthors.includes(p.name),
            chipWins: p.bets.filter(b => b === H.payout.winner).length,
            guess: p.guess,
        } : null,
        standings: standings(),
        isLast: H.qIndex >= H.questions.length - 1,
    };
}
function podiumMsg() { return { type: 'podium', ...caption(), standings: standings(), awards: H.lastPodium?.awards || [] }; }

function phaseSnapshotFor(p) {
    if (H.phase === 'guess') return guessMsgFor(p);
    if (H.phase === 'bet') return boardMsgFor(p);
    if (H.phase === 'payout') return payoutMsgFor(p);
    if (H.phase === 'podium') return podiumMsg();
    return lobbyMsg();
}
function viewerSnapshot() {
    if (H.phase === 'guess') return { ...guessMsgFor(null), type: 'viewer_guess', players: railPlayers('guess') };
    if (H.phase === 'bet') return { ...boardMsgFor(null), type: 'viewer_board', players: railPlayers('bet') };
    if (H.phase === 'payout') return { ...payoutMsgFor(null), type: 'viewer_payout', players: railPlayers() };
    if (H.phase === 'podium') return { ...podiumMsg(), type: 'viewer_podium' };
    return { ...lobbyMsg(), type: 'viewer_lobby' };
}
function broadcastPhase() {
    H.players.forEach(p => {
        if (p.id === myId) return;
        const conn = guestConns[p.id];
        if (conn) send(conn, phaseSnapshotFor(p));
    });
    broadcastViewers(viewerSnapshot());
    hostSyncSelf(isTvHost ? null : phaseSnapshotFor(H.players.find(p => p.id === myId)));
}

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            send(conn, viewerSnapshot());
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const name = String(msg.name || 'Player').slice(0, 16);
                const zombie = H.players.find(p => p.name === name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else hostAddPlayer(conn.peer, name, msg.avatar);
                const p2 = H.players.find(p => p.id === conn.peer);
                if (!p2) { send(conn, lobbyMsg()); break; }
                if (H.phase === 'lobby') broadcastLobby();
                else { send(conn, phaseSnapshotFor(p2)); broadcastViewers(viewerSnapshot()); if (isTvHost) tvHostSync(); }
                break;
            }
            case 'guess':      if (player) hostGuess(player, msg.qid, msg.value); break;
            case 'bet':        if (player) hostBet(player, msg.qid, msg.slot); break;
            case 'clear_bets': if (player) hostClearBets(player, msg.qid); break;
            case 'ctl': {
                if (!isTvHost || !player || player.id !== H.players[0]?.id) break;
                hostCtl(msg.action, msg);
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        } else if (H.phase === 'guess') maybeCloseGuessing();
        else if (H.phase === 'bet') maybeCloseBetting();
    });
    conn.on('error', e => console.warn('conn err', e));
}

function hostCtl(action, msg) {
    if (action === 'start' && H.phase === 'lobby') hostStartGame();
    else if (action === 'close_guess' && H.phase === 'guess') closeGuessing();
    else if (action === 'close_bets' && H.phase === 'bet') closeBetting();
    else if (action === 'next' && H.phase === 'payout') nextQuestion();
    else if (action === 'again' && H.phase === 'podium') hostNewGame();
    else if (action === 'set' && H.phase === 'lobby') {
        if ([5, 7, 10].includes(msg.qCount)) H.settings.qCount = msg.qCount;
        broadcastLobby();
    }
}
function guestCtl(action, extra) {
    if (isHost && !isTvHost) { hostCtl(action, extra || {}); return; }
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ── Room creation / joining (house pattern) ──
function makeRoom(onOpen) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(PFX + roomCode, ICE_CFG);
    peer.on('open', id => { myId = id; isHost = true; onOpen(); });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        isHost = false; isTvHost = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

function hostGame(name) {
    myName = name.trim().slice(0, 16) || 'Host';
    myAvatar = fAvatar || AVATARS[0];
    localStorage.setItem('bg-name', myName);
    localStorage.setItem('bg-avatar', myAvatar);
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        hostAddPlayer(myId, myName, myAvatar);
        ui = 'lobby_h';
        render();
    });
}

function hostOnTV() {
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        isTvHost = true;
        document.body.classList.add('viewer-mode');
        tvHostSync();
        render();
    });
}

function joinGame(code, name) {
    myName = name.trim().slice(0, 16) || 'Player';
    myAvatar = fAvatar || AVATARS[Math.floor(Math.random() * AVATARS.length)];
    localStorage.setItem('bg-name', myName);
    localStorage.setItem('bg-avatar', myAvatar);
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        isHost = false;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join', name: myName, avatar: myAvatar }));
        hostConn.on('data', msg => applyMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the game.'; ui = 'home'; D = null; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'home'; render();
    });
}

function joinAsViewer(code, _attempt) {
    const attempt = _attempt || 1;
    isViewer = true;
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join_viewer' }));
        hostConn.on('data', msg => applyViewerMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the game.'; isViewer = false; vD = null; document.body.classList.remove('viewer-mode'); ui = 'home'; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; isViewer = false; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

function tvHostSync() {
    if (!isTvHost) return;
    applyViewerMsg(viewerSnapshot());
}
function hostSyncSelf(msg) {
    if (isTvHost) { tvHostSync(); return; }
    if (isHost && msg) applyMsg(msg);
}

// ═══════════════════════════════════════════
// HOST GAME FLOW
// ═══════════════════════════════════════════
function hostStartGame() {
    if (!connectedPlayers().length) return;
    clearTimeout(_phaseTimer);
    H.questions = shuffle(QUESTIONS).slice(0, H.settings.qCount).map((q, i) => ({ qid: 'q' + i, ...q }));
    H.qIndex = -1;
    H.players.forEach(p => { p.score = 0; p.lastDelta = 0; p.oracle = 0; p.smart = 0; });
    nextQuestion();
}

function nextQuestion() {
    clearTimeout(_phaseTimer);
    H.qIndex += 1;
    if (H.qIndex >= H.questions.length) { showPodium(); return; }
    H.cur = H.questions[H.qIndex];
    H.slots = null; H.payout = null;
    H.players.forEach(p => { p.guess = null; p.bets = []; p.lastDelta = 0; });
    H.phase = 'guess';
    broadcastPhase();
}

function hostGuess(player, qid, value) {
    if (H.phase !== 'guess' || !H.cur || qid !== H.cur.qid) return;
    if (player.guess !== null) return;
    const v = Math.floor(Number(value));
    if (!Number.isFinite(v) || v < 0 || v > 1e12) return;
    player.guess = v;
    broadcastPhase();
    maybeCloseGuessing();
}

function maybeCloseGuessing() {
    if (H.phase !== 'guess') return;
    const active = connectedPlayers();
    if (active.length && active.every(p => p.guess !== null)) {
        clearTimeout(_phaseTimer);
        _phaseTimer = setTimeout(closeGuessing, 600);
    }
}

function closeGuessing() {
    if (H.phase !== 'guess') return;
    clearTimeout(_phaseTimer);
    const guessers = H.players.filter(p => p.guess !== null);
    if (!guessers.length) return;    // nothing to build a board from yet
    // build slots: house slot first, then unique guesses ascending (equal guesses merge)
    const byValue = new Map();
    guessers.forEach(p => {
        if (!byValue.has(p.guess)) byValue.set(p.guess, []);
        byValue.get(p.guess).push(p);
    });
    H.slots = [{ value: null, authors: [], chips: [] }]
        .concat([...byValue.keys()].sort((a, b) => a - b).map(v => ({
            value: v, authors: byValue.get(v), chips: [],
        })));
    H.phase = 'bet';
    broadcastPhase();
}

function hostBet(player, qid, slot) {
    if (H.phase !== 'bet' || !H.cur || qid !== H.cur.qid) return;
    if (!Number.isInteger(slot) || slot < 0 || slot >= H.slots.length) return;
    if (player.bets.length >= CHIPS_PER_ROUND) return;
    player.bets.push(slot);
    H.slots[slot].chips.push(player);
    broadcastPhase();
    maybeCloseBetting();
}

function hostClearBets(player, qid) {
    if (H.phase !== 'bet' || !H.cur || qid !== H.cur.qid || !player.bets.length) return;
    H.slots.forEach(s => { s.chips = s.chips.filter(c => c !== player); });
    player.bets = [];
    broadcastPhase();
}

function maybeCloseBetting() {
    if (H.phase !== 'bet') return;
    const active = connectedPlayers();
    if (active.length && active.every(p => p.bets.length >= CHIPS_PER_ROUND)) {
        clearTimeout(_phaseTimer);
        _phaseTimer = setTimeout(closeBetting, 700);
    }
}

function closeBetting() {
    if (H.phase !== 'bet') return;
    clearTimeout(_phaseTimer);
    const answer = H.cur.a;
    const winner = winningSlot(H.slots, answer);
    const winSlot = H.slots[winner];
    const winnerAuthors = winSlot.authors.map(a => a.name);
    H.players.forEach(p => {
        let delta = 0;
        if (winnerAuthors.includes(p.name)) { delta += 100; p.oracle += 1; }
        const chipWins = p.bets.filter(b => b === winner).length;
        if (chipWins) { delta += 50 * chipWins; p.smart += chipWins; }
        p.lastDelta = delta;
        p.score += delta;
    });
    H.payout = {
        answer, unit: H.cur.unit, q: H.cur.q,
        winner, winnerAuthors,
        exact: winSlot.value === answer,
        slots: slotsPayload(),
    };
    H.phase = 'payout';
    broadcastPhase();
}

function showPodium() {
    clearTimeout(_phaseTimer);
    H.phase = 'podium';
    const awards = [];
    const oracle = H.players.filter(p => p.oracle > 0).sort((a, b) => b.oracle - a.oracle)[0];
    if (oracle) awards.push({ emoji: '🔮', title: 'Oracle', name: oracle.name, detail: oracle.oracle + '× best guess' });
    const smart = H.players.filter(p => p.smart > 0).sort((a, b) => b.smart - a.smart)[0];
    if (smart) awards.push({ emoji: '💰', title: 'Smart Money', name: smart.name, detail: smart.smart + ' winning chip' + (smart.smart === 1 ? '' : 's') });
    H.lastPodium = { awards };
    broadcastPhase();
}

function hostNewGame() {
    clearTimeout(_phaseTimer);
    H.phase = 'lobby';
    H.questions = []; H.qIndex = -1; H.cur = null; H.slots = null; H.payout = null; H.lastPodium = null;
    H.players.forEach(p => { p.score = 0; p.guess = null; p.bets = []; p.lastDelta = 0; p.oracle = 0; p.smart = 0; });
    H.players = H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
    broadcastLobby();
    if (isHost && !isTvHost) { ui = 'lobby_h'; render(); }
}

function hostSet(patch) {
    Object.assign(H.settings, patch);
    broadcastLobby();
    if (ui === 'lobby_h') render();
}

// ═══════════════════════════════════════════
// CLIENT (phone) MESSAGE HANDLING
// ═══════════════════════════════════════════
function applyMsg(msg) {
    switch (msg.type) {
        case 'lobby': {
            const prevN = D && D.type === 'lobby' ? (D.players || []).length : -1;
            D = msg;
            ui = (isHost && !isTvHost) ? 'lobby_h' : 'lobby_g';
            setMusic('lobby');
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            render();
            break;
        }
        case 'guess': {
            const fresh = !D || D.type !== 'guess' || D.qid !== msg.qid;
            D = msg;
            setMusic('guess');
            if (fresh) musicIntensity = 0;   // new question: strip back to the rhythm section
            musicKeyShift = msg.total && msg.num === msg.total ? 2 : 0;   // final question: key up
            bumpGuessIntensity(msg.lockedCount, msg.playerCount);
            if (fresh) { numEntry = ''; ui = 'guess'; render(); sStart(); }
            else if (ui === 'guess') patchGuess(msg);
            else { ui = 'guess'; render(); }
            break;
        }
        case 'board': {
            const fresh = !D || D.type !== 'board' || D.qid !== msg.qid;
            D = msg;
            setMusic('bet');
            if (fresh) { ui = 'bet'; render(); sBoard(); }
            else if (ui === 'bet') patchBet(msg);
            else { ui = 'bet'; render(); }
            break;
        }
        case 'payout':
            D = msg;
            ui = 'payout';
            setMusic('results');
            musicKeyShift = msg.isLast ? 2 : 0;   // decisive reveal: key up
            render();
            if (msg.my && msg.my.delta > 0) {
                sPayout(msg.my.delta);
                popText(innerWidth / 2, innerHeight * 0.3, '+' + msg.my.delta, msg.my.delta >= 150 ? 'gold' : 'good');
                burst(innerWidth / 2, innerHeight * 0.3 + 20, ['#fbbf24', '#2dd4bf', '#34d399', '#eef2ff'], msg.my.delta >= 150 ? 20 : 12);
                if (msg.my.delta >= 150) startConfetti(2400);
                try { navigator.vibrate && navigator.vibrate([80, 40, 160]); } catch (e) {}
            } else sMiss();
            break;
        case 'podium':
            D = msg;
            ui = 'podium';
            setMusic('over');
            render();
            sWin();
            startConfetti(3600);
            break;
    }
}

function patchGuess(msg) {
    const el = $id('g-locked');
    if (el) el.textContent = `🔒 ${msg.lockedCount} of ${msg.playerCount} locked in`;
    // if my lock was acked (myGuess set) and I still show the keypad, re-render to the waiting state
    if (msg.myGuess !== null && $id('keypad')) render();
}

function patchBet(msg) {
    msg.slots.forEach((s, i) => {
        const chips = $id('slot-chips-' + i);
        if (chips) chips.innerHTML = s.chips.map(c => `<span>${esc(c.avatar)}</span>`).join('');
    });
    const left = $id('chips-left');
    if (left) left.innerHTML = chipsLeftHTML(msg);
    const cnt = $id('b-placed');
    if (cnt) cnt.textContent = `${msg.placedCount} of ${msg.playerCount} all-in`;
    document.querySelectorAll('.slot-btn').forEach((el, i) => {
        el.classList.toggle('mine', msg.myBets.includes(i));
        if (msg.chipsLeft <= 0) el.setAttribute('disabled', ''); else el.removeAttribute('disabled');
    });
}

// ── keypad ──
function keyTap(k) {
    if (!D || ui !== 'guess' || D.myGuess !== null) return;
    sKey();
    if (k === 'back') numEntry = numEntry.slice(0, -1);
    else if (k === 'clear') numEntry = '';
    else if (numEntry.length < 9) {
        if (!(numEntry === '' && k === '0' && false)) numEntry += k;   // leading zeros allowed, parsed away
    }
    const disp = $id('num-display');
    if (disp) disp.innerHTML = numEntry ? esc(fmt(Number(numEntry))) : '<span class="ph">type your guess…</span>';
    const lock = $id('btn-lock');
    if (lock) { if (numEntry === '') lock.setAttribute('disabled', ''); else lock.removeAttribute('disabled'); }
}

function lockGuess() {
    if (numEntry === '' || !D) return;
    const value = Number(numEntry);
    sLock();
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostGuess(me, D.qid, value);
    } else {
        send(hostConn, { type: 'guess', qid: D.qid, value });
        D.myGuess = value;   // optimistic; host snapshot confirms
        render();
    }
}

function placeChip(slot) {
    if (!D || ui !== 'bet' || D.chipsLeft <= 0) return;
    sChip();
    try { navigator.vibrate && navigator.vibrate(30); } catch (e) {}
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostBet(me, D.qid, slot);
    } else send(hostConn, { type: 'bet', qid: D.qid, slot });
}

function clearChips() {
    sClear();
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostClearBets(me, D.qid);
    } else send(hostConn, { type: 'clear_bets', qid: D.qid });
}

// ═══════════════════════════════════════════
// VIEWER (TV) MESSAGE HANDLING
// ═══════════════════════════════════════════
function applyViewerMsg(msg) {
    document.body.classList.add('viewer-mode');
    ui = 'viewer';
    const prev = vD;
    vD = msg;
    switch (msg.type) {
        case 'viewer_lobby': {
            const prevN = prev && prev.type === 'viewer_lobby' ? (prev.players || []).length : -1;
            setMusic('lobby');
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            render();
            break;
        }
        case 'viewer_guess': {
            const fresh = !prev || prev.type !== 'viewer_guess' || prev.qid !== msg.qid;
            setMusic('guess');
            if (fresh) musicIntensity = 0;   // new question: strip back to the rhythm section
            musicKeyShift = msg.total && msg.num === msg.total ? 2 : 0;   // final question: key up
            bumpGuessIntensity(msg.lockedCount, msg.playerCount);
            if (fresh) { render(); sStart(); }
            else {
                if (msg.lockedCount > prev.lockedCount) sLockTick();
                const el = $id('v-locked');
                if (el) el.textContent = `🔒 ${msg.lockedCount} of ${msg.playerCount} locked in`;
                const rail = $id('v-rail');
                if (rail) rail.innerHTML = railRowsHTML(msg.players, true);
            }
            break;
        }
        case 'viewer_board': {
            const fresh = !prev || prev.type !== 'viewer_board' || prev.qid !== msg.qid;
            setMusic('bet');
            if (fresh) { render(); sBoard(); }
            else {
                const chipCount = m => (m.slots || []).reduce((n, s) => n + s.chips.length, 0);
                if (chipCount(msg) > chipCount(prev)) sChip();
                msg.slots.forEach((s, i) => {
                    const chips = $id('vslot-chips-' + i);
                    if (chips) chips.innerHTML = s.chips.map(c => `<span class="bchip">${esc(c.avatar)}</span>`).join('');
                });
                const cnt = $id('v-placed');
                if (cnt) cnt.textContent = `💰 ${msg.placedCount} of ${msg.playerCount} all-in`;
                const rail = $id('v-rail');
                if (rail) rail.innerHTML = railRowsHTML(msg.players, true);
            }
            break;
        }
        case 'viewer_payout':
            setMusic('results');
            musicKeyShift = msg.isLast ? 2 : 0;   // decisive reveal: key up
            render();
            sReveal();
            if (msg.exact) startConfetti(2600);
            requestAnimationFrame(() => requestAnimationFrame(() => {
                const w = $id('vslot-' + msg.winner);
                if (w) {
                    w.classList.add('winner');
                    // gold shower timed to land with the drum-roll's brass hit
                    setTimeout(() => {
                        const r = w.getBoundingClientRect();
                        burst(r.left + r.width / 2, r.top + r.height / 2, ['#fbbf24', '#2dd4bf', '#f472b6', '#eef2ff'], 18);
                    }, 600);
                }
            }));
            break;
        case 'viewer_podium':
            setMusic('over');
            render();
            sWin();
            startConfetti(5200);
            break;
    }
}

// ═══════════════════════════════════════════
// SIMULATION MODES — ?mode=tvsimulation | playersimulation  (&players=N)
// Self-driving demos with no PeerJS and no real people. Bots are counted as
// "connected" via stub guestConns so the normal host flow drives everything.
//   • tvsimulation     — watch the big-screen betting board play itself
//   • playersimulation — watch a phone guesser ("You") play itself
// (?mode=simulation stays as an alias for tvsimulation.)
// ═══════════════════════════════════════════
let simTimer = null, simMode = 'tv';
const SIM_NAMES = ['Ace', 'Bux', 'Cash', 'Duke', 'Edie', 'Fox', 'Gwen', 'Hawk'];
function simGuessValue(answer) {
    const a = Math.max(1, Math.abs(Number(answer) || 10));
    const v = Math.round(a * (0.45 + Math.random() * 1.25));   // spread around the true answer
    return Math.max(0, v);
}

function startSimulation(nPlayers, mode) {
    simMode = mode === 'player' ? 'player' : 'tv';
    roomCode = 'DEMO';
    H.settings.qCount = 3;
    H.players = []; guestConns = {}; viewerConns = {};
    const n = Math.max(2, Math.min(nPlayers || 4, MAX_PLAYERS));
    if (simMode === 'tv') {
        isHost = true; isTvHost = true; myId = '__sim_host__';
        document.body.classList.add('viewer-mode');
    } else {
        isHost = true; isTvHost = false; myName = 'You'; myId = '__you__';
        hostAddPlayer(myId, myName);                  // you are guesser #1 (the host)
    }
    for (let i = H.players.length; i < n; i++) {
        const id = '__bot_' + i;
        hostAddPlayer(id, SIM_NAMES[i % SIM_NAMES.length]);
        guestConns[id] = { peer: id, send() {} };     // stub so bots count as present
    }
    broadcastLobby();
    simTimer = setTimeout(simStart, 2400);
}

function simStart() {
    if (H.phase !== 'lobby') return;
    hostStartGame();                                  // phase 'guess'
    simTimer = setTimeout(simGuess, 2600);
}

function simGuess() {
    if (H.phase !== 'guess' || !H.cur) return;
    let delay = 400;
    H.players.forEach(p => {
        if (simMode === 'player' && p.id === myId) return;
        const d = delay; delay += 380 + Math.random() * 460;
        setTimeout(() => simBotGuess(p), d);
    });
    if (simMode === 'player') { const dY = delay; delay += 500; setTimeout(simYouGuess, dY); }
    simTimer = setTimeout(simAfterGuess, delay + 1700);
}

function simBotGuess(p) {
    if (H.phase !== 'guess' || !H.cur || p.guess !== null) return;
    hostGuess(p, H.cur.qid, simGuessValue(H.cur.a));
}

function simYouGuess() {
    if (H.phase !== 'guess' || !H.cur) return;
    const me = H.players.find(p => p.id === myId);
    if (!me || me.guess !== null) return;
    const val = simGuessValue(H.cur.a);
    if (ui === 'guess') { numEntry = String(val); lockGuess(); }   // through the real keypad
    if (me.guess === null) hostGuess(me, H.cur.qid, val);
}

function simAfterGuess() {
    if (H.phase === 'guess') closeGuessing();          // force board build if anyone stalled
    if (H.phase === 'bet') simTimer = setTimeout(simBet, 1400);
}

function simBet() {
    if (H.phase !== 'bet' || !H.slots) return;
    const nSlots = H.slots.length;
    let delay = 400;
    H.players.forEach(p => {
        if (simMode === 'player' && p.id === myId) {
            for (let c = p.bets.length; c < CHIPS_PER_ROUND; c++) {
                const d = delay; delay += 500;
                setTimeout(() => simYouBet(), d);
            }
            return;
        }
        for (let c = p.bets.length; c < CHIPS_PER_ROUND; c++) {
            const d = delay; delay += 260 + Math.random() * 340;
            setTimeout(() => simBotBet(p, nSlots), d);
        }
    });
    simTimer = setTimeout(simAfterBet, delay + 1700);
}

function simBotBet(p, nSlots) {
    if (H.phase !== 'bet' || !H.cur || p.bets.length >= CHIPS_PER_ROUND) return;
    hostBet(p, H.cur.qid, Math.floor(Math.random() * nSlots));
}

function simYouBet() {
    if (H.phase !== 'bet' || !H.cur) return;
    const me = H.players.find(p => p.id === myId);
    if (!me || me.bets.length >= CHIPS_PER_ROUND) return;
    const slot = Math.floor(Math.random() * H.slots.length);
    if (ui === 'bet' && D && D.chipsLeft > 0) placeChip(slot);   // through the real board
    else hostBet(me, H.cur.qid, slot);
}

function simAfterBet() {
    if (H.phase === 'bet') closeBetting();              // force payout if anyone stalled
    if (H.phase === 'payout') simTimer = setTimeout(simNext, 3600);
}

function simNext() {
    if (H.phase === 'payout') nextQuestion();           // → next guess, or podium
    if (H.phase === 'guess') simTimer = setTimeout(simGuess, 2600);
    else if (H.phase === 'podium') simTimer = setTimeout(simRestart, 7000);
}

function simRestart() {
    hostNewGame();                                      // → lobby
    simTimer = setTimeout(simStart, 2600);
}

(function boot() {
    buildAmbient();
    const params = new URLSearchParams(location.search);
    if (!fAvatar) fAvatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];
    if (!musicOn) $id('tog-music').classList.add('off');
    if (!sfxOn) $id('tog-sfx').classList.add('off');
    const mode = (params.get('mode') || '').toLowerCase();
    const simPlayers = parseInt(params.get('players'), 10) || 4;
    if (mode === 'playersimulation') { startSimulation(simPlayers, 'player'); return; }
    if (mode === 'tvsimulation' || mode === 'simulation') { startSimulation(simPlayers, 'tv'); return; }
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    render();
})();
</script>
</body>
</html>
