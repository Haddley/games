<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Family Trivia</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23231409' width='100' height='100' rx='20'/><text x='50' y='68' font-size='52' text-anchor='middle'>📖</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #231409;
            --bg2: #2e1c0e;
            --paper: #f8efdc;
            --paper2: #f1e4c8;
            --ink: #3b2a1c;
            --ink-soft: #7a6450;
            --cream: #f3e7cf;
            --muted: #c9b391;
            --gold: #ffc16b;
            --ember: #ff7847;
            --good: #3fae72;
            --bad: #d84f4f;
            --a0: #e5484d; --a1: #3b82f6; --a2: #eab308; --a3: #22a06b; --a4: #8b5cf6; --a5: #0d9488;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--cream);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            padding: 26px 16px 48px; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 45% at 50% -5%, rgba(255,150,60,0.16) 0%, transparent 60%),
                radial-gradient(ellipse 55% 45% at 12% 100%, rgba(255,120,71,0.10) 0%, transparent 65%),
                radial-gradient(ellipse 55% 45% at 90% 95%, rgba(255,193,107,0.08) 0%, transparent 65%);
        }
        body.viewer-mode { padding: 0; overflow: hidden; display: block; height: 100dvh; width: 100vw; }

        h1.logo {
            font-family: 'Fraunces', serif; font-weight: 900; letter-spacing: 1px;
            font-size: clamp(1.7rem, 7vw, 2.6rem); text-align: center; color: var(--gold);
            text-shadow: 0 2px 0 rgba(0,0,0,.35), 0 0 34px rgba(255,150,60,.35);
        }
        .sub { color: var(--muted); font-size: .72rem; letter-spacing: 2.5px; text-transform: uppercase; margin: 6px 0 22px; text-align: center; }

        #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 14px; }
        body.viewer-mode #app { max-width: none; height: 100dvh; display: block; }

        .card {
            background: var(--paper); color: var(--ink); border-radius: 18px;
            padding: 20px; box-shadow: 0 14px 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(120,90,50,.18);
            position: relative;
        }
        .card.dark { background: rgba(60,38,18,.65); color: var(--cream); box-shadow: 0 10px 30px rgba(0,0,0,.4), inset 0 0 0 1px rgba(255,193,107,.14); }
        .card.highlight { outline: 3px solid var(--gold); outline-offset: 2px; }
        .slbl { font-size: .68rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 12px; }
        .card.dark .slbl { color: var(--muted); }

        .fg { margin-bottom: 12px; }
        .fg label { display: block; font-size: .68rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 5px; }
        input[type=text], textarea {
            width: 100%; padding: 12px 14px; font-family: inherit; font-size: 1rem; font-weight: 700;
            border: 2px solid rgba(120,90,50,.35); border-radius: 12px; background: #fffaf0; color: var(--ink);
            outline: none;
        }
        input[type=text]:focus, textarea:focus { border-color: var(--ember); }
        textarea { font-size: .72rem; font-weight: 500; font-family: ui-monospace, monospace; min-height: 130px; resize: vertical; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit; font-weight: 900; font-size: .95rem; letter-spacing: .5px;
            padding: 13px 18px; border: none; border-radius: 14px; cursor: pointer;
            transition: transform .12s, filter .12s, opacity .12s; user-select: none; -webkit-user-select: none;
        }
        .btn:active { transform: scale(.97); }
        .btn-p { background: linear-gradient(180deg, #ff9a4d, #ff7847); color: #3a1400; box-shadow: 0 5px 0 #b34322, 0 10px 22px rgba(255,120,71,.35); }
        .btn-p:active { box-shadow: 0 2px 0 #b34322; transform: translateY(3px); }
        .btn-c { background: linear-gradient(180deg, #ffd58a, #ffc16b); color: #4a2c00; box-shadow: 0 5px 0 #b58032, 0 10px 22px rgba(255,193,107,.3); }
        .btn-c:active { box-shadow: 0 2px 0 #b58032; transform: translateY(3px); }
        .btn-g { background: rgba(59,42,28,.12); color: inherit; box-shadow: inset 0 0 0 2px rgba(120,90,50,.35); }
        .card.dark .btn-g, body.viewer-mode .btn-g { box-shadow: inset 0 0 0 2px rgba(255,193,107,.3); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 8px 13px; font-size: .78rem; border-radius: 11px; }
        .btn:disabled { opacity: .45; cursor: default; }

        .err {
            background: rgba(216,79,79,.14); border: 1px solid rgba(216,79,79,.5); color: #ffb3b3;
            padding: 11px 14px; border-radius: 12px; font-size: .82rem; font-weight: 700; text-align: center;
        }
        hr { border: none; border-top: 1px dashed rgba(120,90,50,.4); margin: 14px 0; }

        .connecting { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 46px 0; color: var(--muted); font-weight: 700; }
        .spin { width: 34px; height: 34px; border-radius: 50%; border: 4px solid rgba(255,193,107,.2); border-top-color: var(--gold); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* avatar picker */
        .avrow { display: flex; flex-wrap: wrap; gap: 7px; }
        .av {
            width: 42px; height: 42px; border-radius: 12px; font-size: 1.35rem; display: flex; align-items: center; justify-content: center;
            background: #fffaf0; border: 2px solid rgba(120,90,50,.3); cursor: pointer; transition: transform .1s;
        }
        .av.sel { border-color: var(--ember); background: #ffe9d6; transform: scale(1.1); box-shadow: 0 4px 12px rgba(255,120,71,.35); }

        /* lobby */
        .player-row { display: flex; align-items: center; gap: 11px; padding: 9px 4px; border-bottom: 1px dashed rgba(120,90,50,.25); font-weight: 800; }
        .player-row:last-child { border-bottom: none; }
        .pav { width: 38px; height: 38px; border-radius: 11px; background: var(--paper2); border: 2px solid rgba(120,90,50,.3); font-size: 1.25rem; display: flex; align-items: center; justify-content: center; }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--good); box-shadow: 0 0 8px var(--good); }
        .crown { font-size: .95rem; }
        .qr-wrap { width: min(220px, 60vw); margin: 6px auto 10px; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 22px rgba(0,0,0,.25); }
        .qr-wrap svg { display: block; width: 100%; height: auto; }
        .room-code { font-family: 'Fraunces', serif; font-weight: 900; font-size: 2.3rem; letter-spacing: 12px; text-align: center; color: var(--ink); padding-left: 12px; }
        .share-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px; }
        .seg-row { display: flex; flex-wrap: wrap; gap: 7px; }

        /* phone: story phase */
        .eyes {
            text-align: center; padding: 42px 10px;
        }
        .eyes .big { font-size: 3.4rem; animation: bob 2.2s ease-in-out infinite; }
        @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
        .eyes .t { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.5rem; margin-top: 10px; }
        .eyes .s { color: var(--ink-soft); font-weight: 700; font-size: .85rem; margin-top: 6px; }

        .story-paper { font-family: 'Fraunces', serif; }
        .story-paper .st-title { font-weight: 900; font-size: 1.35rem; margin-bottom: 10px; }
        .story-paper .st-text { font-size: 1.02rem; line-height: 1.75; font-weight: 500; }
        .story-kicker { font-size: .66rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: var(--ember); margin-bottom: 8px; font-family: 'Nunito', sans-serif; }

        /* phone: question phase */
        .q-prompt { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.22rem; line-height: 1.4; }
        .q-meta { display: flex; justify-content: space-between; align-items: center; font-size: .72rem; font-weight: 800; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
        .timebar-wrap { height: 10px; border-radius: 6px; background: rgba(255,255,255,.09); overflow: hidden; }
        .timebar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--gold), var(--ember)); transition: width .2s linear; }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ans {
            border: none; border-radius: 15px; padding: 16px 13px; min-height: 96px;
            font-family: inherit; font-weight: 800; font-size: .95rem; line-height: 1.3; color: #fff; text-align: left;
            display: flex; flex-direction: column; gap: 6px; cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,.3), 0 10px 20px rgba(0,0,0,.35);
            transition: transform .1s, opacity .2s, filter .2s;
        }
        .ans:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,.3); }
        .ans .let { font-size: .68rem; font-weight: 900; letter-spacing: 2px; opacity: .85; }
        .ans.dim { opacity: .28; filter: saturate(.4); }
        .ans.picked { outline: 4px solid #fff; outline-offset: 2px; }
        .ans.right { outline: 4px solid #b7ff9e; outline-offset: 2px; }
        .ans.wrongpick { outline: 4px solid #ffb3b3; outline-offset: 2px; }
        .locked-note { text-align: center; font-weight: 900; color: var(--gold); font-size: 1rem; padding: 8px 0 2px; }

        /* phone: reveal */
        .verdict { text-align: center; padding: 8px 0 4px; }
        .verdict .vico { font-size: 3.2rem; }
        .verdict .vt { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.6rem; margin-top: 4px; }
        .verdict .vpts { font-size: 2rem; font-weight: 900; color: var(--ember); margin-top: 2px; }
        .verdict .vlab { font-weight: 900; letter-spacing: 1px; margin-top: 4px; }
        .chip { display: inline-block; padding: 4px 12px; border-radius: 12px; background: rgba(255,120,71,.14); border: 1px solid rgba(255,120,71,.4); color: var(--ember); font-weight: 900; font-size: .78rem; margin: 3px; }
        .standings .player-row { font-size: .9rem; }
        .standings .sc { margin-left: auto; font-weight: 900; }
        .standings .delta { color: var(--good); font-size: .75rem; font-weight: 900; margin-left: 7px; }

        /* ═════════ TV layout ═════════ */
        .tv { height: 100dvh; display: flex; flex-direction: column; padding: 3vmin 3.4vmin; gap: 2vmin; }
        .tv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2vmin; }
        .tv-logo { font-family: 'Fraunces', serif; font-weight: 900; font-size: 3.4vmin; color: var(--gold); text-shadow: 0 0 24px rgba(255,150,60,.4); }
        .tv-roundlbl { font-size: 1.9vmin; font-weight: 900; letter-spacing: .4vmin; text-transform: uppercase; color: var(--muted); }
        .tv-main { flex: 1; display: flex; gap: 2.6vmin; min-height: 0; }
        .tv-stage { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
        .tv-rail { width: 30vmin; min-width: 240px; display: flex; flex-direction: column; gap: 1.4vmin; }
        .tv-rail .rail-title { font-size: 1.7vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .rail-row {
            display: flex; align-items: center; gap: 1.2vmin; background: rgba(60,38,18,.6);
            border: 1px solid rgba(255,193,107,.16); border-radius: 1.6vmin; padding: 1.2vmin 1.5vmin;
            font-weight: 800; font-size: 2vmin; position: relative;
        }
        .rail-row .rav { font-size: 2.6vmin; }
        .rail-row .rname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rail-row .rsc { font-weight: 900; color: var(--gold); font-variant-numeric: tabular-nums; }
        .rail-row .rdelta { position: absolute; right: 1vmin; top: -1.3vmin; font-size: 1.6vmin; font-weight: 900; color: #b7ff9e; text-shadow: 0 2px 6px rgba(0,0,0,.6); animation: riseIn .5s ease both; }
        @keyframes riseIn { from { opacity: 0; transform: translateY(1vmin); } to { opacity: 1; transform: none; } }
        .rail-row.locked::after { content: '✓'; color: var(--good); font-weight: 900; font-size: 2vmin; }

        .tv-paper {
            flex: 1; background: var(--paper); color: var(--ink); border-radius: 2.4vmin;
            box-shadow: 0 18px 60px rgba(0,0,0,.55), inset 0 0 0 1px rgba(120,90,50,.2);
            padding: 4vmin 5vmin; overflow: auto; display: flex; flex-direction: column;
        }
        .tv-paper .story-kicker { font-size: 1.6vmin; letter-spacing: .45vmin; margin-bottom: 1.4vmin; }
        .tv-paper .st-title { font-family: 'Fraunces', serif; font-weight: 900; font-size: 3.6vmin; margin-bottom: 2vmin; }
        .tv-paper .st-text { font-family: 'Fraunces', serif; font-size: 2.75vmin; line-height: 1.8; font-weight: 500; flex: 1; }
        .tv-paper .st-text .wpend { opacity: 0; }
        .tv-progress { height: 1.1vmin; border-radius: .6vmin; background: rgba(120,90,50,.18); overflow: hidden; margin-top: 2.4vmin; }
        .tv-progress > div { height: 100%; background: linear-gradient(90deg, var(--gold), var(--ember)); width: 0%; transition: width .3s linear; border-radius: .6vmin; }

        .tv-q-prompt { font-family: 'Fraunces', serif; font-weight: 900; font-size: 3.4vmin; line-height: 1.35; margin-bottom: 2.4vmin; }
        .tv-ans-grid { flex: 1; display: grid; gap: 1.8vmin; grid-template-columns: 1fr 1fr; align-content: stretch; }
        .tv-ans-grid.six { grid-template-columns: 1fr 1fr 1fr; }
        .tv-ans {
            border-radius: 1.8vmin; padding: 2vmin 2.2vmin; color: #fff; display: flex; flex-direction: column; gap: .8vmin; justify-content: center;
            font-weight: 800; font-size: 2.15vmin; line-height: 1.3; box-shadow: 0 8px 26px rgba(0,0,0,.3);
            transition: opacity .5s, filter .5s, transform .5s;
        }
        .tv-ans .let { font-size: 1.4vmin; font-weight: 900; letter-spacing: .35vmin; opacity: .85; }
        .tv-ans.dim { opacity: .22; filter: saturate(.35); }
        .tv-ans.right { transform: scale(1.04); outline: .55vmin solid #fff; outline-offset: .35vmin; box-shadow: 0 0 44px rgba(255,255,255,.45); }
        .tv-bottom { display: flex; align-items: center; gap: 2.6vmin; }
        .tv-locked { font-size: 2.1vmin; font-weight: 900; color: var(--gold); white-space: nowrap; }
        .tv-timebar-wrap { flex: 1; height: 1.6vmin; border-radius: .9vmin; background: rgba(255,255,255,.1); overflow: hidden; }
        .tv-timebar { height: 100%; background: linear-gradient(90deg, var(--gold), var(--ember)); border-radius: .9vmin; transition: width .2s linear; }
        .tv-timenum { font-size: 2.4vmin; font-weight: 900; font-variant-numeric: tabular-nums; width: 5vmin; text-align: right; }

        /* TV reveal */
        .tv-payout { text-align: center; font-family: 'Fraunces', serif; font-weight: 900; font-size: 3.2vmin; color: var(--ember); margin: 1vmin 0 2vmin; text-shadow: 0 0 20px rgba(255,120,71,.3); }
        .tally-rows { flex: 1; display: flex; flex-direction: column; gap: 1.4vmin; justify-content: center; }
        .tally-row { display: flex; align-items: center; gap: 1.4vmin; }
        .tally-chip { width: 4.4vmin; height: 4.4vmin; border-radius: 1.1vmin; color: #fff; font-weight: 900; font-size: 1.9vmin; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .tally-text { width: 30%; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 800; font-size: 1.9vmin; color: var(--ink); }
        .tally-bar-wrap { flex: 1; height: 4vmin; border-radius: 1vmin; background: rgba(120,90,50,.14); overflow: hidden; position: relative; }
        .tally-bar { height: 100%; border-radius: 1vmin; width: 0%; transition: width .9s cubic-bezier(.2,.8,.2,1); display: flex; align-items: center; gap: .6vmin; padding-left: 1vmin; font-size: 2.1vmin; }
        .tally-row.correct .tally-text { font-weight: 900; }
        .tally-row.correct .tally-bar { box-shadow: 0 0 22px rgba(63,174,114,.55); }
        .tally-count { font-weight: 900; font-size: 1.9vmin; color: var(--ink); width: 3vmin; text-align: right; }

        /* TV lobby */
        .tv-lobby { flex: 1; display: flex; gap: 4vmin; align-items: center; min-height: 0; }
        .tv-lobby .qr-side { background: var(--paper); color: var(--ink); border-radius: 2.4vmin; padding: 3.4vmin; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
        .tv-lobby .qr-side .qr-wrap { width: 34vmin; margin: 1.5vmin auto; }
        .tv-lobby .qr-side .room-code { font-size: 5vmin; letter-spacing: 2vmin; padding-left: 2vmin; }
        .tv-lobby .join-hint { font-size: 1.8vmin; font-weight: 800; color: var(--ink-soft); }
        .tv-players { flex: 1; display: flex; flex-direction: column; gap: 1.6vmin; min-width: 0; }
        .tv-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20vmin, 1fr)); gap: 1.6vmin; }
        .tv-pcard {
            background: rgba(60,38,18,.65); border: 1px solid rgba(255,193,107,.18); border-radius: 1.8vmin;
            padding: 1.8vmin; text-align: center; font-weight: 900; font-size: 2vmin; animation: popIn .35s ease both;
        }
        .tv-pcard .pav-big { font-size: 4.4vmin; }
        @keyframes popIn { from { opacity: 0; transform: scale(.7); } to { opacity: 1; transform: scale(1); } }
        .tv-waiting { color: var(--muted); font-weight: 800; font-size: 2vmin; }

        /* podium */
        .podium-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 2.4vmin; padding-bottom: 2vmin; }
        .pod { text-align: center; font-weight: 900; animation: podRise .6s cubic-bezier(.2,.8,.3,1) both; }
        .pod .pname { font-size: 2.4vmin; margin-bottom: 1vmin; }
        .pod .pscore { font-size: 2vmin; color: var(--gold); margin-bottom: 1vmin; }
        .pod .block { border-radius: 1.6vmin 1.6vmin 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 1.4vmin; font-size: 3.4vmin; width: 18vmin; }
        .pod.p1 .block { height: 22vmin; background: linear-gradient(180deg, #ffd58a, #b58032); }
        .pod.p2 .block { height: 15vmin; background: linear-gradient(180deg, #d7d7e0, #8f8fa3); }
        .pod.p3 .block { height: 10vmin; background: linear-gradient(180deg, #e8a06a, #9c5a33); }
        .pod .pav-big { font-size: 5vmin; }
        .awards-row { display: flex; gap: 1.6vmin; justify-content: center; flex-wrap: wrap; }
        .award {
            background: rgba(60,38,18,.7); border: 1px solid rgba(255,193,107,.25); border-radius: 1.6vmin;
            padding: 1.4vmin 2.2vmin; font-weight: 800; font-size: 1.9vmin; text-align: center;
        }
        .award .aw-t { color: var(--gold); font-weight: 900; }

        #confetti-cv { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

        /* sound toggles */
        #sound-togs { position: fixed; top: 10px; right: 10px; z-index: 80; display: flex; gap: 6px; }
        #sound-togs button {
            width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem;
            background: rgba(60,38,18,.72); box-shadow: inset 0 0 0 1px rgba(255,193,107,.25);
            transition: opacity .2s, transform .12s;
        }
        #sound-togs button:active { transform: scale(.88); }
        #sound-togs button.off { opacity: .35; filter: grayscale(1); }

        /* FX layer — particles + score pops */
        .pt {
            position: fixed; width: 9px; height: 9px; border-radius: 2px;
            z-index: 950; pointer-events: none;
            animation: ptFly .75s cubic-bezier(.15,.65,.4,1) forwards;
        }
        @keyframes ptFly {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(560deg) scale(.3); opacity: 0; }
        }
        .pop {
            position: fixed; z-index: 960; pointer-events: none;
            font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.5rem;
            animation: popUp 1.1s cubic-bezier(.2,.8,.3,1) forwards;
            text-shadow: 0 2px 12px rgba(0,0,0,.6); white-space: nowrap;
        }
        .pop.good { color: var(--good); }
        .pop.gold { color: var(--gold); }
        .pop.bad  { color: var(--bad); font-size: 1rem; }
        @keyframes popUp {
            0%   { transform: translate(-50%, 0) scale(.5); opacity: 0; }
            15%  { transform: translate(-50%, -12px) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -78px) scale(1); opacity: 0; }
        }

        /* screen entrances — only on phase changes (#app.fresh), so patches never re-trigger */
        @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        #app.fresh .card { animation: cardIn .38s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes ansIn { from { opacity: 0; transform: scale(.85) translateY(8px); } to { opacity: 1; transform: none; } }
        #app.fresh .ans { animation: ansIn .32s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 55ms); }
        @keyframes vicoPop { 0% { transform: scale(0) rotate(-14deg); } 60% { transform: scale(1.25) rotate(4deg); } 100% { transform: scale(1) rotate(0); } }
        #app.fresh .vico { animation: vicoPop .5s cubic-bezier(.2,.8,.3,1) both; display: inline-block; }
        @keyframes vptsPop { 0% { opacity: 0; transform: scale(.4); } 60% { transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }
        #app.fresh .vpts { animation: vptsPop .45s .18s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes shakeX {
            10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-6px); } 40%, 60% { transform: translateX(6px); }
        }
        #app.fresh .card.shake { animation: cardIn .3s cubic-bezier(.2,.8,.3,1) both, shakeX .5s .3s both; }

        /* timer urgency */
        .timebar.low, .tv-timebar.low { background: linear-gradient(90deg, #ff7847, #d84f4f); }
        @keyframes pulseNum { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); color: var(--ember); } }
        #q-timenum.low, #v-timenum.low { animation: pulseNum .9s ease-in-out infinite; display: inline-block; }

        /* TV: winning answer glow, podium rise, awards entrance */
        @keyframes tvRightGlow { 0%, 100% { box-shadow: 0 0 44px rgba(255,255,255,.45); } 50% { box-shadow: 0 0 74px rgba(255,255,255,.8); } }
        .tv-ans.right { animation: tvRightGlow 1.6s ease-in-out .4s infinite; }
        @keyframes podRise { from { transform: translateY(35%); opacity: 0; } to { transform: none; opacity: 1; } }
        .award { animation: cardIn .5s 1.6s both; }

        @media (max-width: 480px) { .ans-grid { grid-template-columns: 1fr 1fr; } }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }

// ═══════════════════════════════════════════

const FAMILY_PACK = {"pack":"The Family Chronicles","description":"100 made-up funny stories about Karen (Mum), Neil (Dad), Jess (only sister), Ben (big brother), Archie (middle son) and Ollie (youngest). Listen carefully — the questions are about the details!","questions":[{"title":"The Quick Trip","story":"Karen announced she was popping to the garden centre 'for five minutes, just for compost'. She returned four hours later with three lavender plants, a bird bath, a scented candle called Autumn Whisper, and a garden gnome she named Gerald. She did not buy any compost.","prompt":"What did Karen forget to buy?","choices":["Compost","A candle","A gnome","Lavender","A bird bath"],"answer":0},{"title":"BBQ Legend","story":"Neil declared himself 'Grill Master Supreme' and refused all help at the family barbecue. He burned eleven sausages, set fire to one oven glove, and served burgers that Ben described as 'charcoal with ketchup'. Neil blamed the wind, the coals, and finally the sausages themselves.","prompt":"How many sausages did Neil burn?","choices":["Seven","Nine","Eleven","Thirteen","All of them plus the glove"],"answer":2},{"title":"The Remote Mystery","story":"The TV remote vanished for six days. Karen blamed Ollie, Ollie blamed Archie, and Archie started a formal investigation with a notebook labelled 'SUSPECTS'. It was finally found in the fridge, inside the salad drawer, next to a yoghurt. Nobody confessed, but Ben went suspiciously quiet.","prompt":"Where was the remote found?","choices":["Under the sofa","In the salad drawer","In Ollie's toy box","In the shed","Inside a cereal box","In the washing machine"],"answer":1},{"title":"Jess vs. The Boys","story":"Jess challenged all three brothers to a video game tournament, offering to do their chores for a week if she lost. She won every single match, celebrated with a slow dance around the living room, and pinned a chore rota to the fridge titled 'MY STAFF'.","prompt":"What did Jess call her chore rota?","choices":["THE LOSERS' LIST","MY STAFF","BROTHER DUTIES","PAYBACK TIME","HOUSEHOLD MINIONS"],"answer":1},{"title":"Archie's Big Business","story":"Archie set up a stall at the front gate selling 'gourmet lemonade' for two pounds a cup. His only customers were Karen, who bought one out of pity, and the postman, who was too polite to refuse. Archie declared the business 'a success' and immediately retired.","prompt":"Who were Archie's only customers?","choices":["Neil and Jess","Karen and the postman","Ben and Ollie","Two neighbours","Nobody at all"],"answer":1},{"title":"Ollie's Pocket Zoo","story":"Karen did the laundry and found the following in Ollie's trouser pockets: four snail shells, a slice of ham, two conkers, a plastic dinosaur, and a note that said 'do not look in my pockets'. Ollie said the ham was 'for emergencies'.","prompt":"What did Ollie say the ham was for?","choices":["The dog","Emergencies","A snack","His dinosaur","Trading at school"],"answer":1},{"title":"The Sat-Nav Standoff","story":"On the way to the seaside, the sat-nav said turn left. Neil said 'I know a shortcut' and turned right. Ninety minutes later the family arrived at a cabbage farm, where Neil confidently announced, 'Well, this is a lovely spot for lunch.' Karen has never let him forget it.","prompt":"Where did Neil's shortcut lead?","choices":["A car park","A cabbage farm","Back home","A different beach","A motorway services","A field of sheep"],"answer":1},{"title":"Ben's Protein Phase","story":"Ben started going to the gym and began adding protein powder to everything: porridge, smoothies, and once, horrifyingly, spaghetti bolognese. The family staged an intervention after he suggested 'protein trifle' for Karen's birthday. Ben agreed to limit himself to shakes, but everyone still checks the lasagne.","prompt":"What protein-powder creation triggered the family intervention?","choices":["Protein spaghetti","Protein trifle","Protein roast potatoes","Protein tea","Protein pizza"],"answer":1},{"title":"The Candle Situation","story":"Neil counted the candles in the living room and found twenty-three. When he suggested Karen might have enough candles, she bought two more the next day, one called Cosy Hearth and one called Winter Cuddle. Neil now measures time in candles. It is currently twenty-five o'clock.","prompt":"How many candles did Neil originally count?","choices":["Nineteen","Twenty-one","Twenty-three","Twenty-five","Thirty"],"answer":2},{"title":"Jess's Hair Adventure","story":"Jess decided to dye a streak of her hair purple using a kit from the chemist. The purple came out perfectly. Unfortunately she also turned one of her ears purple, plus the bathroom sink, one towel, and somehow Ollie's left hand. Ollie refused to wash it off for a week.","prompt":"Besides her hair, what did Jess accidentally dye?","choices":["Her ear, the sink, a towel and Ollie's hand","The cat and the curtains","Both ears and the carpet","Just the sink","Neil's toothbrush"],"answer":0},{"title":"Operation Biscuit","story":"Karen hid a packet of posh chocolate biscuits behind the tinned tomatoes, her secret spot for years. She returned to find only crumbs and a note in Archie's handwriting: 'The biscuits have moved to a better place.' Archie denied everything, despite having chocolate on his chin.","prompt":"Where did Karen hide her secret biscuits?","choices":["Behind the tinned tomatoes","In the washing machine","Under her bed","In an empty cereal box","In the vegetable drawer","On top of the wardrobe"],"answer":0},{"title":"The Smart Doorbell","story":"Neil installed a smart doorbell so he could 'see who's at the door from anywhere in the world'. In its first week it sent him 400 alerts: 397 were for next door's cat, two were for a pigeon, and one was Neil himself, waving at it to see if it worked.","prompt":"What triggered 397 of the doorbell alerts?","choices":["The postman","Next door's cat","A pigeon","Ollie's football","Neil waving"],"answer":1},{"title":"Ollie's Big Question","story":"During a quiet Sunday dinner, Ollie put down his fork and asked, 'If a tomato is a fruit, is ketchup a smoothie?' Neil choked on his roast potato. Karen said 'sort of'. Ben said 'no'. Jess googled it. Archie has called ketchup 'smoothie' ever since.","prompt":"What did Ollie ask about ketchup?","choices":["Whether it's a smoothie","Whether it's a soup","Who invented it","Whether tomatoes feel pain","Why it's red"],"answer":0},{"title":"The Shed of Secrets","story":"Neil spent an entire weekend 'organising the shed'. Karen looked inside afterwards and found he had mainly built a comfy chair area with a radio, a kettle, and a biscuit tin. Neil described it as 'a workshop'. There were no tools within reach of the chair.","prompt":"What did Karen find in Neil's 'organised' shed?","choices":["Perfectly sorted tools","A chair, radio, kettle and biscuit tin","A half-built boat","Christmas decorations","Archie's lemonade stand"],"answer":1},{"title":"Ben's Driving Lesson","story":"On Ben's first driving lesson with Neil, he did brilliantly for twenty minutes, then panicked at a roundabout and went around it four times because he 'couldn't find the exit'. Neil stayed calm for three laps. On the fourth he quietly said, 'We live on lap two, son.'","prompt":"How many times did Ben go around the roundabout?","choices":["Twice","Three times","Four times","Five times","They're still there"],"answer":2},{"title":"The Great Sock Heist","story":"Every one of Neil's left socks kept disappearing. He suspected the washing machine, then Karen, then 'sock thieves'. The truth emerged when the sofa was moved: the dog had built a nest of fourteen socks behind it, arranged by colour. Everyone agreed the dog had better organisational skills than Neil.","prompt":"How many socks were in the dog's nest?","choices":["Ten","Twelve","Fourteen","Sixteen","Twenty"],"answer":2},{"title":"Karen's Label Maker","story":"Karen got a label maker for her birthday and labelled everything in the kitchen within 48 hours. Cupboards, jars, drawers, the kettle ('KETTLE'), and eventually the label maker itself ('LABEL MAKER'). The family drew the line when a label appeared on Neil's forehead reading 'HUSBAND'.","prompt":"What did the label on Neil's forehead say?","choices":["DAD","HUSBAND","NEIL","GRUMPY","DO NOT WASH"],"answer":1},{"title":"Archie's Magic Show","story":"Archie charged the family 50p each to watch his magic show. His grand finale was making Ollie disappear, which worked perfectly because Ollie simply hid in the airing cupboard and then fell asleep. The show ended with the whole family searching the house for the 'disappeared' Ollie for an hour.","prompt":"Where did Ollie fall asleep during the magic show?","choices":["Under his bed","In the airing cupboard","In the shed","Behind the sofa","In the car","In the bath"],"answer":1},{"title":"The Pancake Incident","story":"Neil attempted a dramatic pancake flip to impress the kids. The pancake left the pan beautifully, spun twice, and stuck to the kitchen ceiling, where it stayed for two full days because nobody could reach it. Ollie named it 'Ceiling Steve' and said good morning to it daily.","prompt":"What did Ollie name the ceiling pancake?","choices":["Flippy","Ceiling Steve","Pancake Pete","Sir Flapjack","Dave"],"answer":1},{"title":"Jess's Homework Excuse","story":"Jess told her teacher the dog ate her homework. The teacher didn't believe her, so Jess brought in evidence: a chewed maths book, a signed witness statement from Ollie, and a formal apology letter dictated by the dog and 'signed' with a muddy paw print. She got an extension and a merit for creativity.","prompt":"What evidence did Jess bring to school?","choices":["A photo of the dog","A chewed book, a witness statement and a pawprint apology","The dog itself","A note from Karen","A video recording"],"answer":1},{"title":"The Thermostat Wars","story":"Karen likes the house warm. Neil guards the thermostat 'for the bills'. Their secret war escalated for weeks: Karen nudging it up two degrees, Neil sneaking it down three. It ended when Neil installed a smart thermostat with a passcode, and Jess cracked the code in nine minutes. It was 1234.","prompt":"What was Neil's thermostat passcode?","choices":["0000","1234","His birthday","4321","BBQ1"],"answer":1},{"title":"Ben's Mystery Smoothie","story":"Ben made a smoothie with 'whatever was around': banana, spinach, peanut butter, and what he thought was vanilla yoghurt. It was mayonnaise. He drank half of it before his face changed. He described the flavour as 'a betrayal'. The blender has been labelled 'BEN: CHECK FIRST' ever since.","prompt":"What did Ben accidentally put in his smoothie?","choices":["Mustard","Mayonnaise","Gravy","Salad cream","Horseradish","Cream cheese"],"answer":1},{"title":"Ollie the Tooth Tycoon","story":"Ollie lost a tooth and got two pounds from the tooth fairy. Sensing opportunity, he tried to sell his remaining teeth to the family at 'a discount' — one pound fifty each, 'while stocks last'. Karen declined. Archie offered 20p. Neil asked if there was a loyalty card.","prompt":"How much did Ollie charge for his remaining teeth?","choices":["One pound","One pound fifty","Two pounds","50p","Two pounds fifty"],"answer":1},{"title":"The Christmas Rehearsal","story":"In mid-July, Karen announced a 'Christmas rehearsal' to test a new roast recipe. The family ate turkey in the garden in 28-degree heat, wearing paper hats that stuck to their foreheads. Neil said it was the best Christmas ever. Ollie asked if rehearsal-Christmas meant rehearsal-presents. It did not.","prompt":"What was the weather like at the Christmas rehearsal?","choices":["Snowing","Raining","28 degrees and sunny","Foggy","Windy"],"answer":2},{"title":"Archie's Secret Menu","story":"When Karen and Neil went out, Archie was left in charge of dinner. He created a 'restaurant' called Chez Archie with a menu of exactly one item: cereal, served 'deconstructed' (the box on the table). He charged his siblings a compliment each as payment. Ben paid with 'nice apron'. It was Karen's.","prompt":"What was the only item on the Chez Archie menu?","choices":["Beans on toast","Deconstructed cereal","Crisps sandwich","Microwave pizza","Toast three ways"],"answer":1},{"title":"The Fitness Tracker","story":"Neil got a fitness tracker and became obsessed with his step count. He was caught marching on the spot in the kitchen at 11pm to hit 10,000 steps, and once strapped the tracker to the dog 'as an experiment'. The dog did 22,000 steps. Neil has not spoken about it since.","prompt":"How many steps did the dog do wearing Neil's tracker?","choices":["12,000","15,000","18,000","22,000","30,000"],"answer":3},{"title":"Jess's Big Sleep","story":"Jess claimed she 'barely slept' before her exam. Ben checked the shared tablet: she had fallen asleep at 8:45pm watching a documentary about penguins and slept for eleven hours. Jess maintains the penguins were 'educational stress relief' and that eleven hours 'barely counts as sleeping if you're tired enough'.","prompt":"What was Jess watching when she fell asleep?","choices":["A penguin documentary","A baking show","A horror film","Revision videos","A dance tutorial"],"answer":0},{"title":"The Supermarket Split","story":"Karen sent Neil to the supermarket with a list of six items. He returned with fourteen items, including a novelty cheese board, a plant, and a magazine about camper vans. Of the original six items, he had remembered two: bread and 'the wrong milk'. Karen now texts the list with photos.","prompt":"How many items from Karen's list did Neil actually get?","choices":["All six","Four","Three","Two","None"],"answer":3},{"title":"Ollie's Invisible Friend","story":"Ollie's invisible friend 'Captain Trousers' got blamed for everything for a month: crumbs in the bed, the missing felt tips, a suspicious drawing on the hallway wall. The scam collapsed when Ollie demanded Karen set a dinner place for the Captain, then ate both puddings himself.","prompt":"What was Ollie's invisible friend called?","choices":["Captain Trousers","Mr Biscuit","Sergeant Socks","Big Kevin","Captain Pants","The Colonel"],"answer":0},{"title":"Ben's Leftover Radar","story":"Karen saved one slice of her famous lasagne for lunch and hid it under a bag of frozen peas. Ben, who can allegedly hear a fridge open from upstairs with headphones on, found and ate it within the hour. His defence: 'It didn't have a label.' The label maker was used within minutes.","prompt":"Where did Karen hide the last slice of lasagne?","choices":["Behind the tinned tomatoes","Under frozen peas","In a salad box","In the shed fridge","Inside a bread bag"],"answer":1},{"title":"The Car Wash Surprise","story":"Neil paid for the deluxe car wash and forgot the sunroof was open. He described the experience as 'a theme park ride I didn't ask for'. The car interior got the deluxe treatment too, including tropical wax scent. Archie now calls the car 'the aquarium'. Neil dried the seats with Karen's hairdryer.","prompt":"What does Archie now call the car?","choices":["The submarine","The aquarium","The swamp","Soggy Sally","The car wash special"],"answer":1},{"title":"Karen's Book Club","story":"Karen hosted book club but hadn't finished the book — she'd read four chapters. She got through the whole evening by saying 'the ending really surprised me' and refilling everyone's glasses at key moments. It later turned out only one of the seven attendees had finished the book. It was a 900-page book.","prompt":"How many chapters of the book had Karen actually read?","choices":["None","Two","Four","Six","All of them"],"answer":2},{"title":"Archie's Weather Machine","story":"Archie convinced Ollie he could control the weather with a cardboard box covered in bottle tops. He charged Ollie 30p for 'guaranteed snow'. It did not snow. Ollie demanded a refund. Archie offered store credit at the weather machine. Ollie accepted, and ordered 'sunshine for Saturday', which — annoyingly for everyone — worked.","prompt":"How much did Archie charge Ollie for guaranteed snow?","choices":["20p","30p","50p","One pound","A packet of crisps"],"answer":1},{"title":"The Family Photo","story":"Karen wanted one nice family photo for the hallway. It took 47 attempts. In various shots: Ollie blinked, Ben yawned, Archie held up bunny ears, Jess was mid-sneeze, and the dog walked through with a stolen shoe. The photo Karen finally framed has Neil's eyes closed. She says it's 'the best of a bad bunch'.","prompt":"How many attempts did the family photo take?","choices":["27","37","47","57","They gave up"],"answer":2},{"title":"Jess the Referee","story":"When Ben and Archie argued over the last slice of pizza, Jess appointed herself referee. She held a formal hearing at the kitchen table, heard both sides, reviewed the evidence, and then ruled — after eleven minutes of deliberation — that the pizza was hers. She'd eaten it before the hearing started.","prompt":"How did Jess resolve the pizza dispute?","choices":["Split it in half","Gave it to Ollie","Awarded it to herself, having already eaten it","Flipped a coin","Gave it to the dog"],"answer":2},{"title":"Neil's Password Problem","story":"Neil forgot the wifi password he himself had set. He tried nine guesses, blamed the router, threatened to phone the internet company, and finally found it written in his own handwriting on a sticky note under the router, where he had put it 'somewhere safe'. The password was BiscuitTin99.","prompt":"What was the wifi password?","choices":["BiscuitTin99","Lasagne123","GrillMaster1","Password99","TheShed2024","KarensCandles"],"answer":0},{"title":"Ollie's Bath Protest","story":"Ollie declared himself 'allergic to baths' and presented Karen with a petition. It had three signatures: his own, one from 'Captain Trousers', and a paw print. Karen countered with a professional-looking document titled 'The Smell Report'. Ollie took the bath but negotiated two extra bedtime stories as compensation.","prompt":"How many signatures were on Ollie's anti-bath petition?","choices":["One","Two","Three","Five","Ten"],"answer":2},{"title":"The Wardrobe Avalanche","story":"Karen asked Ben to tidy his room. Ben moved everything into his wardrobe and jammed the doors shut, achieving a technically tidy room in four minutes. The wardrobe held for two days before bursting open at 3am with a crash so loud Neil rang 999 before realising it was trainers, not burglars.","prompt":"How long did Ben's wardrobe hold before the avalanche?","choices":["Two hours","One day","Two days","A week","It's still holding"],"answer":2},{"title":"Archie's Autograph","story":"Archie became convinced he'd be famous one day, so he started practising his autograph and 'pre-signing' things around the house to make them valuable. Karen found his signature on the toaster, three bananas, Neil's briefcase, and the dog. He offered to sign Jess's forehead 'for free, this once'. She declined.","prompt":"Which of these did Archie NOT sign?","choices":["The toaster","Three bananas","Neil's briefcase","The dog","Jess's forehead"],"answer":4},{"title":"Karen's Gnome Empire","story":"It started with Gerald the gnome. Within a year Karen had six gnomes, each with a name and a backstory: Gerald, Beryl, Nigel, Susan, Big Trevor and Little Trevor. Neil says he doesn't mind them, but he was once caught moving Big Trevor so it wasn't 'staring through the kitchen window at breakfast'.","prompt":"Which gnome was staring through the kitchen window?","choices":["Gerald","Nigel","Big Trevor","Little Trevor","Beryl","Susan"],"answer":2},{"title":"The Sports Day Sprint","story":"At school sports day, Neil entered the dads' race declaring he'd 'still got it'. He led for the first half, pulled his hamstring showboating at the halfway cone, and finished last, walking backwards and waving like a champion. Ollie told everyone at school his dad came 'first at the end'.","prompt":"Where did Neil pull his hamstring?","choices":["At the start line","At the halfway cone","At the finish","In the car park","During the warm-up"],"answer":1},{"title":"Jess's Cooking Debut","story":"Jess cooked dinner for the family for the first time: fajitas. They were genuinely delicious, but she used every pan in the kitchen, two mixing bowls, three chopping boards, and somehow the potato masher. The kitchen looked like a crime scene. Jess took a bow and left the washing up 'for her staff'.","prompt":"What did Jess cook for her debut family dinner?","choices":["Spaghetti","Fajitas","Curry","Roast chicken","Stir fry","Pizza"],"answer":1},{"title":"Ben's Alarm Orchestra","story":"Ben sets seven alarms every morning: 6:30, 6:45, 7:00, 7:05, 7:10, 7:15 and one at 7:20 labelled 'ACTUAL EMERGENCY'. He sleeps through all seven. The only thing that reliably wakes him is Karen opening the fridge downstairs, which gets him up in under a minute.","prompt":"What reliably wakes Ben up?","choices":["The seventh alarm","The dog barking","Karen opening the fridge","Ollie jumping on him","The smell of toast"],"answer":2},{"title":"The Tent Situation","story":"The family went camping. Neil refused to read the tent instructions because he had 'put up hundreds of tents'. Two hours later, the tent resembled a collapsed pterodactyl, and Karen quietly assembled it in twenty minutes using the instructions while Neil held a pole and said 'that's what I was doing'.","prompt":"How long did Karen take to put up the tent?","choices":["Ten minutes","Twenty minutes","Forty-five minutes","Two hours","She gave up too"],"answer":1},{"title":"Ollie's Word of the Week","story":"Ollie learned the word 'technically' and used it constantly for a week. 'Technically I'm not jumping on the bed, I'm bouncing.' 'Technically the dog started it.' It peaked at dinner when he announced, 'Technically, broccoli is a tiny tree, and I don't eat trees.' Nobody had a comeback. He didn't eat the broccoli.","prompt":"What did Ollie technically refuse to eat?","choices":["Tiny trees (broccoli)","Baby leaves (spinach)","Orange sticks (carrots)","Green balls (peas)","Mash"],"answer":0},{"title":"Karen's Secret Talent","story":"At the school quiz night, the tiebreaker question was about 1980s pop lyrics. Karen stood up, sang the entire second verse perfectly, added the dance moves, and won the trophy for the family team. The kids stared in horror and awe. Neil said, 'That's how she got me, you know.'","prompt":"What was the tiebreaker question about?","choices":["80s pop lyrics","Football scores","Capital cities","Soap operas","Famous gardens"],"answer":0},{"title":"Archie's Nickname Factory","story":"Archie went through a phase of giving everyone nicknames. Neil was 'Chief Burnt Sausage', Karen was 'The Candle Queen', Ben was 'Fridge Radar', Jess was 'The Lawyer', and Ollie was 'Pockets'. The nicknames were so accurate that everyone secretly liked them, except Neil, who campaigned unsuccessfully to be 'Grill Master'.","prompt":"What nickname did Archie give Ben?","choices":["Chief Burnt Sausage","Fridge Radar","The Lawyer","Pockets","Protein Pete","Wardrobe"],"answer":1},{"title":"The Ice Cream Negotiation","story":"The ice cream van came while Karen was on the phone. Ollie needed money fast. He negotiated a loan from Archie at what Archie called 'family rates': 50p borrowed, 70p back by Friday. Jess reviewed the deal, declared it 'outrageous', and lent Ollie the 50p for free — in exchange for his flake.","prompt":"What did Jess want in exchange for her interest-free loan?","choices":["Ollie's flake","First lick","50p back by Friday","A week of compliments","Nothing at all"],"answer":0},{"title":"Neil's Karaoke Moment","story":"At a family wedding, Neil had one lemonade too many and commandeered the karaoke machine. He performed a heartfelt power ballad, pointing at Karen during the chorus, and finished on one knee with a slide across the dance floor that ripped function $id(id) { return document.getElementById(id); }
function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function shuffle(a) { const r = a.slice(); for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function getPacks() {
    const packs = [
        { id: 'family', name: FAMILY_PACK.pack, emoji: '🏠', q: FAMILY_PACK.questions },
        { id: 'fairy', name: FAIRY_PACK.pack, emoji: '🧚', q: FAIRY_PACK.questions },

    if (custom) packs.push({ id: 'custom', name: '✍️ Our Own Pack', emoji: '✍️', q: custom });
    return packs;
}
function getCustomPack() {
    try {
        const raw = localStorage.getItem('ft-custom');
        if (!raw) return null;
        const data = JSON.parse(raw);
        const qs = Array.isArray(data) ? data : data.questions;
        if (!Array.isArray(qs) || !qs.length) return null;
        return qs;
    } catch (e) { return null; }
}

// ── QR code (paper-themed SVG) ──
function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++)
            for (let c = 0; c < n; c++)
                if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#fffaf0"/>` +
            `<g fill="#2e1c0e">${rects}</g></svg>`;
    } catch (e) { return ''; }
}

// ── Confetti ──
let _cf = { parts: [], raf: 0, running: false, until: 0 };
function startConfetti(ms) {
    if (REDUCED) return;
    const cv = $id('confetti-cv'), ctx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    _cf.until = performance.now() + (ms || 2600);
    const cols = ['#ffc16b', '#ff7847', '#3fae72', '#3b82f6', '#8b5cf6', '#f8efdc'];
    for (let i = 0; i < 130; i++) {
        _cf.parts.push({
            x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.5,
            vx: (Math.random() - 0.5) * 2.4, vy: 2 + Math.random() * 3.6,
            rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.25,
            w: 6 + Math.random() * 7, h: 4 + Math.random() * 5,
            col: cols[Math.floor(Math.random() * cols.length)],
        });
    }
    if (_cf.running) return;
    _cf.running = true;
    (function frame(t) {
        ctx.clearRect(0, 0, cv.width, cv.height);
        _cf.parts = _cf.parts.filter(p => p.y < cv.height + 30);
        for (const p of _cf.parts) {
            p.x += p.vx; p.y += p.vy; p.rot += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        }
        if (t < _cf.until || _cf.parts.length) _cf.raf = requestAnimationFrame(frame);
        else { _cf.running = false; ctx.clearRect(0, 0, cv.width, cv.height); }
    })(performance.now());
}

// AUDIO — procedural fireside chiptune + SFX
// (warm triangle/sine storybook palette,
//  gesture-started, music ~0.3 vol, SFX on top)
// ═══════════════════════════════════════════
let AC = null, masterGain = null, musicGain = null, sfxGain = null, noiseBuf = null;
let leadBus = null, musicDelay = null;
let musicOn = localStorage.getItem('ft-music') !== '0';
let sfxOn = localStorage.getItem('ft-sfx') !== '0';

function ac() {
    if (!AC) {
        try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
        masterGain = AC.createGain(); masterGain.gain.value = 1; masterGain.connect(AC.destination);
        musicGain = AC.createGain(); musicGain.gain.value = musicOn ? 0.3 : 0; musicGain.connect(masterGain);
        sfxGain = AC.createGain(); sfxGain.gain.value = sfxOn ? 0.55 : 0; sfxGain.connect(masterGain);
        // Lead bus with a gentle echo — storyteller's living room
        leadBus = AC.createGain(); leadBus.gain.value = 1; leadBus.connect(musicGain);
        musicDelay = AC.createDelay(1.5); musicDelay.delayTime.value = 0.3;
        const fb = AC.createGain(); fb.gain.value = 0.22;
        const dlp = AC.createBiquadFilter(); dlp.type = 'lowpass'; dlp.frequency.value = 1800;
        const wet = AC.createGain(); wet.gain.value = 0.2;
        leadBus.connect(musicDelay); musicDelay.connect(dlp); dlp.connect(fb); fb.connect(musicDelay);
        dlp.connect(wet); wet.connect(musicGain);
        const len = AC.sampleRate * 1.2;
        noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    if (AC.state === 'suspended') AC.resume();
    return AC;
}

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide, 20), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    if (lp) {
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
        o.connect(f); f.connect(g);
    } else {
        o.connect(g);
    }
    g.connect(dest || sfxGain);
    o.start(t); o.stop(t + dur + 0.06);
}

function noiseHit(dur, { vol = 0.3, when = 0, hp = 6000, dest = null } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const src = AC.createBufferSource(); src.buffer = noiseBuf;
    const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(dest || sfxGain);
    src.start(t); src.stop(t + dur + 0.05);
}

const mf = m => 440 * Math.pow(2, (m - 69) / 12); // midi → freq

// ── SFX (warm storybook: soft chimes, page turns, a real howl) ──
function sJoin() {

    if (!AC || !musicGain || !musicOn) return;

}

            [41,null,53,null, 41,null,53,null, 48,null,55,null, 48,null,55,null, 41,null,53,null, 41,null,53,null, 48,null,55,null, 48,null,55,null],
            [46,null,58,null, 46,null,58,null, 41,null,53,null, 41,null,53,null, 46,null,58,null, 46,null,58,null, 41,null,53,null, 43,null,45,null],
        ],

            [65,65,null,65, null,69,null,72, 74,null,72,null, 71,null,67,null, 65,65,null,65, null,69,null,72, 76,null,74,null, 72,null,null,null],
            [70,70,null,70, null,74,null,77, 77,null,76,null, 74,null,72,null, 70,null,72,null, 74,null,76,null, 77,null,null,null, null,null,null,null],
        ],
