        stab: [0,0,1,0, 0,0,1,0, 0,0,1,0, 0,0,1,0, 0,0,1,0, 0,0,1,0, 0,0,1,0, 0,0,1,0],
        pads: [
            { 0: [53,57,60], 16: [48,52,55] },
            { 0: [46,50,53], 16: [53,57,60] },
        ] },
};
let musicTrack = 'lobby', musicStep = 0, musicBar = 0, musicNext = 0, musicTimer = null, musicUrgent = false;
// Adaptive arrangement: intensity gates the stab/shimmer (2) and lead (1) layers,
// keyShift lifts every melodic voice a whole step for the final question
let musicIntensity = 2, musicKeyShift = 0;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Swing: push every off-16th slightly late for a looser sway
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) tone(140, 0.25, { type: 'sine', vol: 0.42, when: rel, slide: 42, dest: musicGain });
    if (tr.hat[i]) {
        const hv = (i % 4 === 2 ? 0.11 : 0.055) * (0.8 + Math.random() * 0.4);
        noiseHit(0.045, { vol: hv, when: rel, hp: 9500, dest: musicGain });
    }
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) tone(mf(b + k), stepDur * 1.6, { type: w.bass || 'triangle', vol: 0.3, when: rel, dest: musicGain, lp: 1000, attack: 0.006 });
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    if (tr.stab && tr.stab[i] && ch && full)
        ch.forEach(m => tone(mf(m + 12 + k), stepDur * 0.9, { type: w.stab || 'sine', vol: 0.035, when: rel, lp: 2600, dest: musicGain, attack: 0.005 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12;
        tone(mf(l + k), stepDur * 1.5, { type: w.lead || 'triangle', vol: 0.13 * (0.9 + Math.random() * 0.2), when: rel, dest: leadBus, lp: tr.leadLp || 3800, attack: 0.006 });
    }
    // Music-box shimmer two octaves up from the pads
    if (tr.arp && i % tr.arp === 0 && ch && full)
        tone(mf(ch[(i / tr.arp) % ch.length] + 24 + k), stepDur * tr.arp * 0.9, { type: w.arpW || 'sine', vol: 0.045, when: rel, lp: 5200, dest: musicGain, attack: 0.004 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.035, { vol: 0.1, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    // Question starts lean; answers coming in (or timer urgency) open it up
    musicIntensity = track === 'question' ? 1 : 2;
    if (track === 'lobby' || track === 'over') musicKeyShift = 0;
    if (track !== 'question') musicUrgent = false;
    // one-beat snare fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) noiseHit(0.06, { vol: 0.1 + f * 0.035, when: f * s, hp: 2800 + f * 900, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}

// Half the room has locked in → open the full arrangement
// (timer urgency via musicUrgent forces it on its own)
function bumpAnswerIntensity(locked, total) {
    if (musicTrack !== 'question') return;
    if (total > 0 && locked / total >= 0.5) musicIntensity = 2;
}

function toggleMusic() {
    musicOn = !musicOn;
    localStorage.setItem('ft-music', musicOn ? '1' : '0');
    if (!AC && musicOn) { ac(); startMusicLoop(); }
    if (AC && musicGain) musicGain.gain.linearRampToValueAtTime(musicOn ? 0.3 : 0, AC.currentTime + 0.2);
    $id('tog-music').classList.toggle('off', !musicOn);
}
function toggleSfx() {
    sfxOn = !sfxOn;
    localStorage.setItem('ft-sfx', sfxOn ? '1' : '0');
    if (AC && sfxGain) sfxGain.gain.value = sfxOn ? 0.55 : 0;
    $id('tog-sfx').classList.toggle('off', !sfxOn);
}

// Unlock audio on first interaction (browser autoplay policy)
let _audioUnlocked = false;
document.addEventListener('pointerdown', () => {
    if (_audioUnlocked) return;
    _audioUnlocked = true;
    if (ac()) startMusicLoop();
}, { capture: true });

// ── Particle bursts + floating score text ──
function burst(x, y, colors, n = 14) {
    if (REDUCED) return;
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;
        p.style.cssText = `left:${x}px;top:${y}px;background:${colors[i % colors.length]};` +
            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}
function popText(x, y, text, cls = 'good') {
    const el = document.createElement('div');
    el.className = 'pop ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1150);
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let peer = null, myId = '', myName = '', myAvatar = '', isHost = false, isTvHost = false, isViewer = false, roomCode = '';
let hostConn = null, guestConns = {}, viewerConns = {};
let ui = 'home';   // home|creating|connecting|lobby_h|lobby_g|story|question|reveal|podium|viewer
let uiErr = '';
let fName = localStorage.getItem('ft-name') || '';
let fAvatar = localStorage.getItem('ft-avatar') || '';
let fCode = '', fVCode = '', fShowCustom = false, fCustomText = '';
let D = null;      // latest message driving the phone UI
let vD = null;     // latest message driving the TV UI

// phone-local question state
let myChoice = null, lockedIn = false, qShownAt = 0, qEndsAt = 0;
let _clientTick = null, _typeTimer = null;

// Host authoritative state
let H = {
    phase: 'lobby',          // lobby|story|question|reveal|podium
    players: [],             // [{id,name,avatar,score,streak,totalMs,lone,flock,lastDelta}]
    settings: { packId: 'family', qCount: 10, answerSecs: 20, storyMode: 'auto' },
    questions: [], qIndex: -1,
    cur: null,               // {qid,title,story,prompt,choices,answer,storySecs}
    answers: {},             // playerId -> {choice, ms}
    lastReveal: null,        // cached viewer_reveal payload
    lastPodium: null,
};
let _storyTimer = null, _qTimeout = null, _qTick = null;

// ═══════════════════════════════════════════
// NETWORK
// ═══════════════════════════════════════════
function send(conn, msg) { try { conn.send(msg); } catch (e) { console.warn('send err', e); } }
function broadcastViewers(msg) { Object.values(viewerConns).forEach(c => send(c, msg)); }
function broadcastPlayers(fn) {
    H.players.forEach(p => {
        if (p.id === myId) return;
        const c = guestConns[p.id];
        if (c) send(c, typeof fn === 'function' ? fn(p) : fn);
    });
}
function connectedPlayers() {
    return H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
}
function captainId() { return isTvHost ? (H.players[0]?.id || null) : null; }

function hostAddPlayer(id, name, avatar) {
    if (H.players.find(p => p.id === id) || H.players.length >= MAX_PLAYERS) return;
    const taken = new Set(H.players.map(p => p.avatar));
    const av = avatar && !taken.has(avatar) ? avatar : (AVATARS.find(a => !taken.has(a)) || '🙂');
    H.players.push({ id, name, avatar: av, score: 0, streak: 0, totalMs: 0, lone: 0, flock: 0, lastDelta: 0 });
}

function lobbyMsg() {
    return {
        type: 'lobby', roomCode,
        players: H.players.map(p => ({ name: p.name, avatar: p.avatar })),
        settings: { ...H.settings },
        packs: getPacks().map(p => ({ id: p.id, name: p.name, emoji: p.emoji, count: p.q.length })),
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function broadcastLobby() {
    broadcastPlayers(lobbyMsg());
    broadcastViewers({ ...lobbyMsg(), type: 'viewer_lobby' });
    hostSyncSelf(lobbyMsg());
}

function progressLbl() { return { num: H.qIndex + 1, total: H.questions.length }; }

function storyMsg() {
    const showOnPhones = !isTvHost && Object.keys(viewerConns).length === 0;
    return {
        type: 'story', qid: H.cur.qid, ...progressLbl(),
        title: H.cur.title, text: showOnPhones ? H.cur.story : null,
        seconds: H.cur.storySecs, mode: H.settings.storyMode,
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function viewerStoryMsg() {
    return { ...storyMsg(), type: 'viewer_story', text: H.cur.story, players: railPlayers() };
}
function questionMsg() {
    return {
        type: 'question', qid: H.cur.qid, ...progressLbl(),
        prompt: H.cur.prompt, choices: H.cur.choices, seconds: H.settings.answerSecs,
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function viewerQuestionMsg() {
    return {
        ...questionMsg(), type: 'viewer_question', title: H.cur.title,
        lockedCount: Object.keys(H.answers).length, playerCount: connectedPlayers().length,
        players: railPlayers(),
    };
}
function railPlayers() {
    return H.players
        .map(p => ({ name: p.name, avatar: p.avatar, score: p.score, locked: !!H.answers[p.id], delta: p.lastDelta }))
        .sort((a, b) => b.score - a.score);
}
function standings() {
    return H.players.slice()
        .sort((a, b) => b.score - a.score || a.totalMs - b.totalMs)
        .map(p => ({ name: p.name, avatar: p.avatar, score: p.score, delta: p.lastDelta, lone: p.lone, flock: p.flock }));
}

// snapshot for a (re)joining player or self, based on current phase
function phaseSnapshotFor(p) {
    if (H.phase === 'lobby') return lobbyMsg();
    if (H.phase === 'story') return storyMsg();
    if (H.phase === 'question') return questionMsg();
    if (H.phase === 'reveal') return revealMsgFor(p);
    if (H.phase === 'podium') return podiumMsg();
    return lobbyMsg();
}

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            send(conn, viewerSnapshot());
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const name = String(msg.name || 'Player').slice(0, 16);
                const zombie = H.players.find(p => p.name === name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else hostAddPlayer(conn.peer, name, msg.avatar);
                const p2 = H.players.find(p => p.id === conn.peer);
                if (!p2) { send(conn, lobbyMsg()); break; }         // room full — show them the lobby
                if (H.phase === 'lobby') broadcastLobby();
                else { send(conn, phaseSnapshotFor(p2)); broadcastLobby0(); }
                break;
            }
            case 'answer': {
                if (player) hostAnswer(player, msg.qid, msg.choice, msg.ms);
                break;
            }
            case 'ctl': {
                if (!isTvHost || !player || player.id !== H.players[0]?.id) break;
                hostCtl(msg.action, msg);
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        } else if (H.phase === 'question') {
            maybeEndEarly();
        }
    });
    conn.on('error', e => console.warn('conn err', e));
}

// after a mid-game (re)join, refresh viewer rails without changing anyone's phase screen
function broadcastLobby0() {
    if (H.phase === 'question') broadcastViewers(viewerQuestionMsg());
    else if (H.phase === 'story') broadcastViewers(viewerStoryMsg());
    if (isTvHost) tvHostSync();
}

function viewerSnapshot() {
    if (H.phase === 'lobby') return { ...lobbyMsg(), type: 'viewer_lobby' };
    if (H.phase === 'story') return viewerStoryMsg();
    if (H.phase === 'question') return viewerQuestionMsg();
    if (H.phase === 'reveal') return H.lastReveal || viewerQuestionMsg();
    if (H.phase === 'podium') return H.lastPodium;
    return { ...lobbyMsg(), type: 'viewer_lobby' };
}

// controls arriving from the captain's phone (TV-first mode)
function hostCtl(action, msg) {
    if (action === 'start' && H.phase === 'lobby') hostStartGame();
    else if (action === 'next' && H.phase === 'story') startQuestion();
    else if (action === 'next' && H.phase === 'reveal') nextQuestion();
    else if (action === 'again' && H.phase === 'podium') hostNewGame();
    else if (action === 'set' && H.phase === 'lobby') {
        const s = H.settings;
        if (getPacks().find(p => p.id === msg.packId)) s.packId = msg.packId;
        if ([5, 10, 15].includes(msg.qCount)) s.qCount = msg.qCount;
        if ([15, 20, 30].includes(msg.answerSecs)) s.answerSecs = msg.answerSecs;
        if (['auto', 'manual'].includes(msg.storyMode)) s.storyMode = msg.storyMode;
        broadcastLobby();
    }
}

function guestCtl(action, extra) {
    if (isHost && !isTvHost) { hostCtl(action, extra || {}); return; }
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ── Create a room (phone host or TV host) ──
function makeRoom(onOpen) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(PFX + roomCode, ICE_CFG);
    peer.on('open', id => { myId = id; isHost = true; onOpen(); });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        isHost = false; isTvHost = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

function hostGame(name) {
    myName = name.trim().slice(0, 16) || 'Host';
    myAvatar = fAvatar || AVATARS[0];
    localStorage.setItem('ft-name', myName);
    localStorage.setItem('ft-avatar', myAvatar);
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        hostAddPlayer(myId, myName, myAvatar);
        ui = 'lobby_h';
        render();
    });
}

function hostOnTV() {
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        isTvHost = true;
        document.body.classList.add('viewer-mode');
        tvHostSync();
        render();
    });
}

// ── Guest ──
function joinGame(code, name) {
    myName = name.trim().slice(0, 16) || 'Player';
    myAvatar = fAvatar || AVATARS[Math.floor(Math.random() * AVATARS.length)];
    localStorage.setItem('ft-name', myName);
    localStorage.setItem('ft-avatar', myAvatar);
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        isHost = false;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join', name: myName, avatar: myAvatar }));
        hostConn.on('data', msg => applyMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the game.'; ui = 'home'; D = null; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'home'; render();
    });
}

// ── Viewer (a TV joining a phone-hosted game) ──
function joinAsViewer(code, _attempt) {
    const attempt = _attempt || 1;
    isViewer = true;
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join_viewer' }));
        hostConn.on('data', msg => applyViewerMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the game.'; isViewer = false; vD = null; document.body.classList.remove('viewer-mode'); ui = 'home'; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; isViewer = false; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

// The TV-host mirrors the authoritative state into its own viewer UI
function tvHostSync() {
    if (!isTvHost) return;
    applyViewerMsg(viewerSnapshot());
}

// The phone-host applies its own broadcast messages through the same client path as guests
function hostSyncSelf(msg) {
    if (isTvHost) { tvHostSync(); return; }
    if (isHost) applyMsg(msg);
}

// ═══════════════════════════════════════════
// HOST GAME FLOW
// ═══════════════════════════════════════════
function clearHostTimers() {
    clearTimeout(_storyTimer); clearTimeout(_qTimeout); clearInterval(_qTick);
}

function drawQuestions() {
    const pack = getPacks().find(p => p.id === H.settings.packId) || getPacks()[0];
    const picked = shuffle(pack.q).slice(0, Math.min(H.settings.qCount, pack.q.length));
    return picked.map((q, i) => {
        // shuffle the choices, remap the answer index
        const order = shuffle(q.choices.map((_, ix) => ix));
        const choices = order.map(ix => q.choices[ix]).slice(0, 6);
        let answer = order.indexOf(q.answer);
        if (answer < 0 || answer >= choices.length) { choices[0] = q.choices[q.answer]; answer = 0; }
        const words = String(q.story).split(/\s+/).length;
        return {
            qid: 'q' + i, title: q.title, story: q.story, prompt: q.prompt,
            choices, answer,
            storySecs: Math.max(6, Math.min(40, Math.round(words / 3.2) + 3)),
        };
    });
}

function hostStartGame() {
    if (!connectedPlayers().length) return;
    clearHostTimers();
    H.questions = drawQuestions();
    if (!H.questions.length) return;
    H.qIndex = -1;
    H.players.forEach(p => { p.score = 0; p.streak = 0; p.totalMs = 0; p.lone = 0; p.flock = 0; p.lastDelta = 0; });
    nextQuestion();
}

function nextQuestion() {
    clearHostTimers();
    H.qIndex += 1;
    if (H.qIndex >= H.questions.length) { showPodium(); return; }
    H.cur = H.questions[H.qIndex];
    H.answers = {};
    H.phase = 'story';
    broadcastPlayers(storyMsg());
    broadcastViewers(viewerStoryMsg());
    hostSyncSelf(storyMsg());
    if (H.settings.storyMode === 'auto')
        _storyTimer = setTimeout(startQuestion, H.cur.storySecs * 1000 + 1500);
}

function startQuestion() {
    if (H.phase !== 'story') return;
    clearHostTimers();
    H.phase = 'question';
    H.answers = {};
    broadcastPlayers(questionMsg());
    broadcastViewers(viewerQuestionMsg());
    hostSyncSelf(questionMsg());
    _qTimeout = setTimeout(endQuestion, H.settings.answerSecs * 1000 + 600);
}

function hostAnswer(player, qid, choice, ms) {
    if (H.phase !== 'question' || !H.cur || qid !== H.cur.qid) return;
    if (H.answers[player.id]) return;
    if (!Number.isInteger(choice) || choice < 0 || choice >= H.cur.choices.length) return;
    const capMs = Math.max(0, Math.min(Number(ms) || 0, H.settings.answerSecs * 1000));
    H.answers[player.id] = { choice, ms: capMs };
    const conn = guestConns[player.id];
    if (conn) send(conn, { type: 'locked', qid, choice });
    broadcastViewers(viewerQuestionMsg());
    if (isTvHost) tvHostSync();
    maybeEndEarly();
}

function maybeEndEarly() {
    if (H.phase !== 'question') return;
    const active = connectedPlayers();
    if (active.length && active.every(p => H.answers[p.id]))
        setTimeout(endQuestion, 700);
}

function rarity(N, C) {
    if (C === 0) return { pts: 0, label: '😴 Nobody got it!' };
    const pts = Math.min(500, Math.round((100 * N / C) / 10) * 10);
    let label;
    if (C === 1 && N >= 2) label = '🐺 LONE WOLF!';
    else if (C === N) label = '🐑 With the Flock';
    else if (C / N <= 0.34) label = '🕵️ Inner Circle';
    else label = '⚖️ Split Decision';
    return { pts, label };
}

function endQuestion() {
    if (H.phase !== 'question') return;
    clearHostTimers();
    H.phase = 'reveal';
    const cur = H.cur;
    const answered = H.players.filter(p => H.answers[p.id]);
    const N = answered.length;
    const C = answered.filter(p => H.answers[p.id].choice === cur.answer).length;
    const { pts, label } = rarity(N, C);

    H.players.forEach(p => {
        const a = H.answers[p.id];
        const correct = !!a && a.choice === cur.answer;
        let base = 0, bonus = 0;
        if (correct) {
            base = pts;
            p.streak += 1;
            if (p.streak >= 3) bonus = 50 * (p.streak - 2);
            p.totalMs += a.ms;
            if (C === 1 && N >= 2) p.lone += 1;
            if (C === N && N >= 2) p.flock += 1;
        } else {
            p.streak = 0;
            if (a) p.totalMs += a.ms;
        }
        p.lastDelta = base + bonus;
        p.score += p.lastDelta;
        p._rev = { choice: a ? a.choice : null, correct, base, bonus, streak: p.streak };
    });

    const tally = cur.choices.map((c, i) => ({
        choice: c, count: answered.filter(p => H.answers[p.id].choice === i).length,
        avatars: answered.filter(p => H.answers[p.id].choice === i).map(p => p.avatar),
    }));
    const isLast = H.qIndex >= H.questions.length - 1;

    H.players.forEach(p => {
        if (p.id === myId) return;
        const conn = guestConns[p.id];
        if (conn) send(conn, revealMsgFor(p));
    });
    H.lastReveal = {
        type: 'viewer_reveal', qid: cur.qid, ...progressLbl(),
        title: cur.title, prompt: cur.prompt, choices: cur.choices, correct: cur.answer,
        tally, label, pts, N, C, isLast, players: railPlayers(),
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
    broadcastViewers(H.lastReveal);
    hostSyncSelf(revealMsgFor(H.players.find(p => p.id === myId)));
    if (isTvHost) tvHostSync();
}

function revealMsgFor(p) {
    const cur = H.cur;
    return {
        type: 'reveal', qid: cur.qid, ...progressLbl(),
        prompt: cur.prompt, choices: cur.choices, correct: cur.answer,
        label: rarityLabelCached(), pts: H.lastRevealPts,
        my: p && p._rev ? p._rev : { choice: null, correct: false, base: 0, bonus: 0, streak: 0 },
        counts: cur.choices.map((_, i) => H.players.filter(q => H.answers[q.id]?.choice === i).length),
        N: Object.keys(H.answers).length,
        C: H.players.filter(q => H.answers[q.id]?.choice === cur.answer).length,
        standings: standings(),
        isLast: H.qIndex >= H.questions.length - 1,
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function rarityLabelCached() {
    const answered = H.players.filter(p => H.answers[p.id]);
    const C = answered.filter(p => H.answers[p.id].choice === H.cur.answer).length;
    const r = rarity(answered.length, C);
    H.lastRevealPts = r.pts;
    return r.label;
}

function showPodium() {
    clearHostTimers();
    H.phase = 'podium';
    const st = standings();
    const awards = [];
    const byLone = H.players.filter(p => p.lone > 0).sort((a, b) => b.lone - a.lone)[0];
    if (byLone) awards.push({ emoji: '🐺', title: 'Sharpest Ear', name: byLone.name, detail: byLone.lone + '× Lone Wolf' });
    const byFlock = H.players.filter(p => p.flock > 0).sort((a, b) => b.flock - a.flock)[0];
    if (byFlock) awards.push({ emoji: '🐑', title: 'Crowd Surfer', name: byFlock.name, detail: byFlock.flock + '× with the flock' });
    const msg = {
        type: 'podium', standings: st, awards,
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
    H.lastPodium = { ...msg, type: 'viewer_podium' };
    broadcastPlayers(msg);
    broadcastViewers(H.lastPodium);
    hostSyncSelf(msg);
}

function podiumMsg() { return { ...(H.lastPodium || {}), type: 'podium' }; }

function hostNewGame() {
    clearHostTimers();
    H.phase = 'lobby';
    H.questions = []; H.qIndex = -1; H.cur = null; H.answers = {};
    H.players.forEach(p => { p.score = 0; p.streak = 0; p.totalMs = 0; p.lone = 0; p.flock = 0; p.lastDelta = 0; delete p._rev; });
    // drop players whose connection is gone
    H.players = H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
    broadcastLobby();
    if (isHost && !isTvHost) { ui = 'lobby_h'; render(); }
}

// host phone settings changes (phone-first mode)
function hostSet(patch) {

// ═══════════════════════════════════════════
// CLIENT (phone) MESSAGE HANDLING
// ═══════════════════════════════════════════
function stopClientTimers() { clearInterval(_clientTick); _clientTick = null; }

function applyMsg(msg) {
    switch (msg.type) {
        case 'lobby': {
            const prevN = D && D.type === 'lobby' ? (D.players || []).length : -1;
            D = msg;
            if (isHost && !isTvHost) { if (ui !== 'lobby_h') ui = 'lobby_h'; }
            else ui = 'lobby_g';
            stopClientTimers();
            setMusic('lobby');
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            render();
            break;
        }
        case 'story':
            D = msg;
            stopClientTimers();
            myChoice = null; lockedIn = false;
            ui = 'story';
            setMusic('story');
            sPage();
            render();
            break;
        case 'question': {
            D = msg;
            myChoice = null; lockedIn = false;
            qShownAt = Date.now();
            qEndsAt = qShownAt + msg.seconds * 1000;
            ui = 'question';
            setMusic('question');
            musicKeyShift = msg.num === msg.total ? 2 : 0;   // final question: key up
            render();
            stopClientTimers();
            _clientTick = setInterval(patchQuestionTimer, 200);
            break;
        }
        case 'locked':
            if (!lockedIn) { lockedIn = true; myChoice = msg.choice; sLock(); }
            else myChoice = msg.choice;
            if (musicTrack === 'question') musicIntensity = 2;   // I've answered — full arrangement while I wait
            if (ui === 'question') render();
            break;
        case 'reveal':
            D = msg;
            stopClientTimers();
            ui = 'reveal';
            setMusic('reveal');
            render();
            if (msg.my.correct) {
                const pts = msg.my.base + msg.my.bonus;
                const wolf = msg.label.indexOf('LONE WOLF') >= 0;
                if (wolf) {
                    sWolf(); startConfetti(2800);
                    try { navigator.vibrate && navigator.vibrate([80, 40, 80, 40, 200]); } catch (e) {}
                } else sRight(msg.my.base, msg.my.bonus);
                popText(innerWidth / 2, innerHeight * 0.3, '+' + pts, (wolf || msg.my.base >= 400) ? 'gold' : 'good');
                burst(innerWidth / 2, innerHeight * 0.3 + 20, ['#ffc16b', '#ff7847', '#3fae72', '#f8efdc'], msg.my.base >= 400 ? 22 : 14);
            } else if (msg.my.choice !== null) sWrong();
            break;
        case 'podium':
            D = msg;
            stopClientTimers();
            ui = 'podium';
            setMusic('over');
            render();
            sPodium();
            startConfetti(3600);
            break;
    }
}

let _lastTickSec = -1;
function patchQuestionTimer() {
    const left = Math.max(0, qEndsAt - Date.now());
    const total = (D?.seconds || 20) * 1000;
    const bar = $id('q-timebar'), num = $id('q-timenum');
    const low = left <= 5200 && left > 0;
    const sec = Math.ceil(left / 1000);
    if (bar) { bar.style.width = (left / total * 100) + '%'; bar.classList.toggle('low', low); }
    if (num) { num.textContent = sec; num.classList.toggle('low', low); }
    musicUrgent = left <= 8000 && left > 0;
    if (low && sec !== _lastTickSec) { _lastTickSec = sec; sTickT(); }
    if (left <= 0) stopClientTimers();
}

function sendAnswer(i) {
    if (lockedIn || ui !== 'question' || !D) return;
    if (Date.now() > qEndsAt + 400) return;
    const ms = Date.now() - qShownAt;
    myChoice = i;
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) {
            hostAnswer(me, D.qid, i, ms);
            lockedIn = true; sLock(); render();
        }
    } else {
        send(hostConn, { type: 'answer', qid: D.qid, choice: i, ms });
        lockedIn = true; sLock(); render();   // optimistic — 'locked' ack confirms
    }
    if (lockedIn && musicTrack === 'question') musicIntensity = 2;   // answered — full arrangement while I wait
}

// ═══════════════════════════════════════════
// VIEWER (TV) MESSAGE HANDLING
// ═══════════════════════════════════════════
let _vTick = null, _vEndsAt = 0, _vTotal = 0;
function stopViewerTimers() { clearInterval(_vTick); _vTick = null; clearInterval(_typeTimer); _typeTimer = null; }

function applyViewerMsg(msg) {
    document.body.classList.add('viewer-mode');
    ui = 'viewer';
    switch (msg.type) {
        case 'viewer_lobby': {
            const prevN = vD && vD.type === 'viewer_lobby' ? (vD.players || []).length : -1;
            vD = msg; stopViewerTimers();
            setMusic('lobby');
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            render(); break;
        }
        case 'viewer_story':
            vD = msg; stopViewerTimers();
            setMusic('story'); sPage();
            render(); startTypewriter(msg); break;
        case 'viewer_question': {
            const fresh = !vD || vD.type !== 'viewer_question' || vD.qid !== msg.qid;
            vD = msg;
            if (fresh) {
                stopViewerTimers();
                setMusic('question');
                musicKeyShift = msg.num === msg.total ? 2 : 0;   // final question: key up
                bumpAnswerIntensity(msg.lockedCount, msg.playerCount);
                render();
                _vTotal = msg.seconds * 1000;
                _vEndsAt = Date.now() + _vTotal;
                _vTick = setInterval(patchViewerTimer, 200);
            } else patchViewerLocked(msg);
            break;
        }
        case 'viewer_reveal':
            vD = msg; stopViewerTimers();
            setMusic('reveal');
            render();
            requestAnimationFrame(() => requestAnimationFrame(animateTally));
            sReveal();
            if (msg.label.indexOf('LONE WOLF') >= 0) { sWolf(); startConfetti(3000); }
            break;
        case 'viewer_podium':
            vD = msg; stopViewerTimers();
            setMusic('over');
            render();
            sPodium();
            startConfetti(5200); break;
    }
}

function startTypewriter(msg) {
    const el = $id('st-text'), prog = $id('st-prog');
    if (!el) return;
    const words = String(msg.text || '').split(/\s+/);
    if (REDUCED) { el.textContent = msg.text; if (prog) prog.style.width = '100%'; return; }
    el.innerHTML = words.map(w => `<span class="wpend">${esc(w)}</span>`).join(' ');
    const spans = el.querySelectorAll('.wpend');
    const step = Math.max(40, (msg.seconds * 1000 * 0.82) / words.length);
    let i = 0;
    const t0 = Date.now(), total = msg.seconds * 1000;
    _typeTimer = setInterval(() => {
        if (i < spans.length) { spans[i].style.transition = 'opacity .25s'; spans[i].style.opacity = '1'; if (i % 2 === 0) sType(); i++; }
        if (prog) prog.style.width = Math.min(100, (Date.now() - t0) / total * 100) + '%';
        if (i >= spans.length && Date.now() - t0 >= total) clearInterval(_typeTimer);
    }, step);
}

let _vLastTickSec = -1;
function patchViewerTimer() {
    const left = Math.max(0, _vEndsAt - Date.now());
    const bar = $id('v-timebar'), num = $id('v-timenum');
    const low = left <= 5200 && left > 0;
    const sec = Math.ceil(left / 1000);
    if (bar) { bar.style.width = (left / _vTotal * 100) + '%'; bar.classList.toggle('low', low); }
    if (num) { num.textContent = sec; num.classList.toggle('low', low); }
    musicUrgent = left <= 8000 && left > 0;
    if (low && sec !== _vLastTickSec) { _vLastTickSec = sec; sTickT(); }
    if (left <= 0) clearInterval(_vTick);
}

function patchViewerLocked(msg) {
    bumpAnswerIntensity(msg.lockedCount, msg.playerCount);
    const el = $id('v-locked');
    if (el) el.textContent = `🔒 ${msg.lockedCount} of ${msg.playerCount} locked in`;
    const rail = $id('v-rail');
    if (rail) rail.innerHTML = railRowsHTML(msg.players, true);
}

function animateTally() {
    document.querySelectorAll('.tally-bar').forEach(b => { b.style.width = b.dataset.w + '%'; });
}

let _lastUi = '', _lastVType = '';
function render() {
    const app = $id('app');
    if (isTvHost || isViewer) ui = 'viewer';
    // 'fresh' marks a real screen change → entrance animations run once,
    // never on same-screen re-renders (lock-in, avatar picks, joins)
    const vt = ui === 'viewer' ? (vD?.type || '') : '';
    const fresh = ui !== _lastUi || vt !== _lastVType;
    _lastUi = ui; _lastVType = vt;
    let html = '';
    switch (ui) {
        case 'home':       html = renderHome(); break;
        case 'creating':   html = renderSpinner('Setting up your game…'); break;
        case 'connecting': html = renderSpinner('Joining the game…'); break;
        case 'lobby_h':    html = renderLobbyH(); break;
        case 'lobby_g':    html = renderLobbyG(); break;
        case 'story':      html = renderStory(); break;
        case 'question':   html = renderQuestion(); break;
        case 'reveal':     html = renderReveal(); break;
        case 'podium':     html = renderPodium(); break;
        case 'viewer':     html = renderViewer(); break;
        default:           html = renderHome();
    }
    app.innerHTML = html;
    app.classList.toggle('fresh', fresh);
}

function renderCustomEditorHTML() {

function saveCustomPack() {
    try {
        const data = JSON.parse(fCustomText);
        const qs = Array.isArray(data) ? data : data.questions;
        if (!Array.isArray(qs) || !qs.length) throw new Error('No questions found');
        qs.forEach((q, i) => {
            if (!q.story || !q.prompt || !Array.isArray(q.choices)) throw new Error('Question ' + (i + 1) + ' is missing story/prompt/choices');
            if (q.choices.length < 2 || q.choices.length > 6) throw new Error('Question ' + (i + 1) + ' needs 2–6 choices');
            if (!Number.isInteger(q.answer) || q.answer < 0 || q.answer >= q.choices.length) throw new Error('Question ' + (i + 1) + ' has a bad answer index');
        });
        localStorage.setItem('ft-custom', JSON.stringify(qs));
        fShowCustom = false; uiErr = '';
        if (isHost) broadcastLobby(); else render();
    } catch (e) {
        uiErr = 'Pack not saved: ' + e.message;
        render();
    }
}

function renderLobbyH() {
    const pList = H.players.map((p, i) =>
        `<div class="player-row">
            <div class="pav">${esc(p.avatar)}</div>
            <div style="flex:1">${esc(p.name)}${i === 0 ? ' <span style="color:var(--ink-soft)">(you — host)</span>' : ''}</div>
            <div class="dot"></div>
        </div>`).join('');
    return `
    ${hdrHTML('Host Lobby')}
    ${uiErr ? `<div class="err">${esc(uiErr)}</div>` : ''}
    <div class="card highlight">
        <div class="slbl">Scan to join — or share the code</div>
        <div class="qr-wrap">${qrSVG(joinURL())}</div>
        <div class="room-code">${esc(roomCode)}</div>
        <div class="share-row">
            <button class="btn btn-g btn-sm"
                onclick="navigator.clipboard&&navigator.clipboard.writeText(joinURL()).then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='📋 Copy link',1500)})">📋 Copy link</button>
            <button class="btn btn-g btn-sm"
                onclick="navigator.share&&navigator.share({title:'Join Family Trivia',text:'Room code: ${esc(roomCode)}',url:joinURL()})">📤 Share</button>
        </div>
        <div style="font-size:.68rem;color:var(--ink-soft);text-align:center">Put the TV screen up with code <b>${esc(roomCode)}</b> — the story shows there</div>
    </div>
    <div class="card">
        <div class="slbl">Players (${H.players.length}/${MAX_PLAYERS})</div>
        ${pList || '<div style="color:var(--ink-soft);font-weight:700">Waiting for the family…</div>'}
    </div>
    <div class="card">
        <div class="slbl">Settings</div>
        ${settingsSegsHTML(H.settings, getPacks().map(p => ({ id: p.id, name: p.name, emoji: p.emoji, count: p.q.length })), patch => `hostSet(${patch})`)}
        <hr>
        ${renderCustomEditorHTML()}

}

function renderLobbyG() {
    const cap = isCaptain();
    const pList = (D.players || []).map(p =>
        `<div class="player-row">
            <div class="pav">${esc(p.avatar)}</div>
            <div style="flex:1">${esc(p.name)}${p.name === myName ? ' <span style="color:var(--ink-soft)">(you)</span>' : ''}${D.tvHost && p.name === D.captain ? ' <span class="crown">👑</span>' : ''}</div>
            <div class="dot"></div>
        </div>`).join('');
    const s = D.settings || {};
    const packName = (D.packs || []).find(p => p.id === s.packId)?.name || '';
    return `

        ${pList}
    </div>
    ${cap ? `
    <div class="card highlight">
        <div class="slbl">👑 Captain's Settings</div>
        ${settingsSegsHTML(s, D.packs || [], patch => `guestCtl('set',${patch})`)}
    </div>
    <button class="btn btn-p btn-full" style="font-size:1.1rem;padding:16px" onclick="guestCtl('start')">📖 Start the game</button>`
    : `
    <div class="card dark">
        <div class="slbl">Settings</div>
        <div style="font-weight:800;font-size:.85rem;line-height:1.9">
            📚 ${esc(packName)} · ${s.qCount} questions · ${s.answerSecs}s answers
        </div>

        </div>

function renderStory() {
    const driveBtn = canDrive()
        ? `<button class="btn btn-p btn-full" onclick="guestCtl('next')">❓ Ask the question now</button>`
        : '';
    const body = D.text
        ? `<div class="card story-paper">
            <div class="story-kicker">Story ${D.num} of ${D.total}</div>
            <div class="st-title">${esc(D.title)}</div>
            <div class="st-text">${esc(D.text)}</div>
        </div>`
        : `<div class="card eyes">
            <div class="big">👀</div>
            <div class="t">Eyes on the TV!</div>
            <div class="s">Story ${D.num} of ${D.total} — “${esc(D.title)}”</div>
            <div class="s" style="margin-top:14px">${D.mode === 'manual' && !canDrive() ? `👑 ${esc(D.captain || 'The host')} asks the question when everyone's ready` : 'The question is coming…'}</div>
        </div>`;
    return `${hdrHTML(`Question ${D.num} of ${D.total}`)}${body}${driveBtn}`;
}

function renderQuestion() {
    const n = D.choices.length;
    const btns = D.choices.map((c, i) => {
        const cls = ['ans'];
        if (lockedIn) cls.push(i === myChoice ? 'picked' : 'dim');
        return `<button class="${cls.join(' ')}" style="background:${ANS_COLORS[i]};--i:${i}"
            ${lockedIn ? 'disabled' : ''} onclick="sendAnswer(${i})">
            <span class="let">${ANS_LETTERS[i]}</span><span>${esc(c)}</span>
        </button>`;
    }).join('');
    return `
    <div class="q-meta"><span>Question ${D.num} / ${D.total}</span><span id="q-timenum">${D.seconds}</span></div>
    <div class="timebar-wrap"><div class="timebar" id="q-timebar" style="width:100%"></div></div>
    <div class="card"><div class="q-prompt">${esc(D.prompt)}</div></div>
    <div class="ans-grid">${btns}</div>
    ${lockedIn ? `<div class="locked-note">🔒 Locked in! Watch the TV…</div>` : ''}`;
}

function renderReveal() {
    const my = D.my || {};
    const answered = my.choice !== null && my.choice !== undefined;
    const ico = my.correct ? '🎉' : (answered ? '😬' : '😴');
    const vt = my.correct ? 'Correct!' : (answered ? 'Not this time' : 'Too slow!');
    const btns = D.choices.map((c, i) => {
        const cls = ['ans'];
        if (i === D.correct) cls.push('right');
        else if (i === my.choice) cls.push('wrongpick');
        else cls.push('dim');
        return `<div class="${cls.join(' ')}" style="background:${ANS_COLORS[i]};cursor:default;--i:${i}">
            <span class="let">${ANS_LETTERS[i]} · ${D.counts?.[i] ?? 0} ${(D.counts?.[i] ?? 0) === 1 ? 'vote' : 'votes'}</span><span>${esc(c)}</span>
        </div>`;
    }).join('');
    const driveBtn = canDrive()
        ? `<button class="btn btn-p btn-full" style="font-size:1.05rem;padding:15px" onclick="guestCtl('next')">${D.isLast ? '🏆 See the podium' : '➡️ Next story'}</button>`
        : `<div style="text-align:center;color:var(--muted);font-size:.75rem;font-weight:800">${D.tvHost ? `👑 ${esc(D.captain || '')} taps next` : 'The host taps next'}…</div>`;
    return `
    <div class="card verdict${!my.correct && answered ? ' shake' : ''}">
        <div class="vico">${ico}</div>
        <div class="vt">${vt}</div>
        ${my.correct ? `<div class="vpts">+${my.base + my.bonus}</div>` : ''}
        <div class="vlab">
            ${my.correct ? `<span class="chip">${esc(D.label)} +${my.base}</span>` : ''}
            ${my.bonus ? `<span class="chip">🔥 ${my.streak} in a row +${my.bonus}</span>` : ''}
        </div>
        <div style="color:var(--ink-soft);font-weight:800;font-size:.8rem;margin-top:8px">${D.C} of ${D.N} got it right</div>
    </div>
    <div class="card"><div class="q-prompt" style="font-size:1rem">${esc(D.prompt)}</div></div>
    <div class="ans-grid">${btns}</div>
    ${standingsHTML(D.standings || [])}
    ${driveBtn}`;
}

function renderPodium() {
    const st = D.standings || [];
    const awards = (D.awards || []).map(a =>
        `<span class="chip">${a.emoji} ${esc(a.title)}: ${esc(a.name)} (${esc(a.detail)})</span>`).join('');
    const driveBtn = canDrive()
        ? `<button class="btn btn-p btn-full" style="font-size:1.05rem;padding:15px" onclick="guestCtl('again')">🔁 Play again</button>` : '';
    const winner = st[0];
    return `
    ${hdrHTML('Game over!')}
    <div class="card verdict">
        <div class="vico">🏆</div>
        <div class="vt">${esc(winner?.name || '')} wins!</div>

    ${driveBtn}`;
}

function tvShell(inner, roundLbl) {
    return `<div class="tv">
        <div class="tv-top">
            <div class="tv-logo">📖 Family Trivia</div>
            <div class="tv-roundlbl">${esc(roundLbl || ('Room ' + (vD.roomCode || roomCode || '')))}</div>
        </div>
        ${inner}
    </div>`;
}

function renderViewer() {
    if (!vD) return renderSpinner('Waiting for the game…');
    switch (vD.type) {
        case 'viewer_lobby':    return renderViewerLobby();
        case 'viewer_story':    return renderViewerStory();
        case 'viewer_question': return renderViewerQuestion();
        case 'viewer_reveal':   return renderViewerReveal();
        case 'viewer_podium':   return renderViewerPodium();
        default:                return renderSpinner('Waiting for the game…');
    }
}

function renderViewerLobby() {
    const url = location.origin + location.pathname + '?room=' + (vD.roomCode || '');
    const players = vD.players || [];
    const cards = players.map(p =>
        `<div class="tv-pcard"><div class="pav-big">${esc(p.avatar)}</div>${esc(p.name)}${vD.tvHost && p.name === vD.captain ? ' 👑' : ''}</div>`).join('');
    const s = vD.settings || {};
    const packName = (vD.packs || []).find(p => p.id === s.packId)?.name || '';
    return tvShell(`
    <div class="tv-lobby">
        <div class="qr-side">
            <div class="slbl">Scan with your phone to join</div>
            <div class="qr-wrap">${qrSVG(url)}</div>
            <div class="room-code">${esc(vD.roomCode || '')}</div>
            <div class="join-hint">${location.host}${location.pathname}</div>
        </div>
        <div class="tv-players">
            <div class="rail-title">Players — ${players.length}/${MAX_PLAYERS}</div>
            <div class="tv-player-grid">${cards}</div>
            <div class="tv-waiting">${players.length === 0
                ? 'Waiting for the first phone… they become 👑 Captain'

function renderViewerQuestion() {

function renderViewerReveal() {
    const total = Math.max(1, (vD.tally || []).reduce((s, t) => s + t.count, 0));
    const rows = (vD.tally || []).map((t, i) => `
        <div class="tally-row${i === vD.correct ? ' correct' : ''}">
            <div class="tally-chip" style="background:${ANS_COLORS[i]}">${ANS_LETTERS[i]}</div>
            <div class="tally-text">${esc(t.choice)}${i === vD.correct ? ' ✓' : ''}</div>
            <div class="tally-bar-wrap"><div class="tally-bar" style="background:${ANS_COLORS[i]}" data-w="${Math.round(t.count / total * 100)}">${t.avatars.map(a => `<span>${esc(a)}</span>`).join('')}</div></div>
            <div class="tally-count">${t.count}</div>
        </div>`).join('');
    const nextHint = vD.tvHost
        ? `👑 ${esc(vD.captain || 'Captain')}: tap ${vD.isLast ? '“See the podium”' : '“Next story”'} on your phone`
        : `Host: tap ${vD.isLast ? '“See the podium”' : '“Next story”'} on your phone`;
    return tvShell(`
    <div class="tv-main">
        <div class="tv-stage">
            <div class="tv-paper">
                <div class="story-kicker">✅ The answer</div>
                <div class="tv-q-prompt">${esc(vD.prompt)}</div>
                <div class="tv-payout">${esc(vD.label)}${vD.C > 0 ? ` — ${vD.pts} pts each` : ''}</div>
                <div class="tally-rows">${rows}</div>
            </div>
            <div style="text-align:center;color:var(--muted);font-weight:800;font-size:1.8vmin;margin-top:1.4vmin">${nextHint}</div>
        </div>
        <div class="tv-rail">
            <div class="rail-title">Scores</div>
            ${railRowsHTML(vD.players)}
        </div>
    </div>`, `Question ${vD.num} of ${vD.total}`);
}

function renderViewerPodium() {
    const st = vD.standings || [];
    const podOrder = [st[1], st[0], st[2]].filter(Boolean);
    const cls = st.length >= 3 ? ['p2', 'p1', 'p3'] : (st.length === 2 ? ['p2', 'p1'] : ['p1']);
    const medal = { p1: '🥇', p2: '🥈', p3: '🥉' };
    const podDelay = { p1: '1s', p2: '.5s', p3: '0s' };
    const pods = podOrder.map((p, i) => `
        <div class="pod ${cls[i]}" style="animation-delay:${podDelay[cls[i]]}">
            <div class="pav-big">${esc(p.avatar)}</div>
            <div class="pname">${esc(p.name)}</div>
            <div class="pscore">${p.score} pts</div>
            <div class="block">${medal[cls[i]]}</div>
        </div>`).join('');
    const rest = st.slice(3).map((p, i) =>
        `<div class="rail-row"><span>${i + 4}.</span><span class="rav">${esc(p.avatar)}</span><span class="rname">${esc(p.name)}</span><span class="rsc">${p.score}</span></div>`).join('');
    const awards = (vD.awards || []).map(a =>
        `<div class="award">${a.emoji} <span class="aw-t">${esc(a.title)}</span><br>${esc(a.name)} — ${esc(a.detail)}</div>`).join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Captain')}: “Play again” is on your phone` : 'Host: “Play again” is on your phone';
    return tvShell(`
    <div class="tv-main" style="flex-direction:column">
        <div class="podium-wrap">${pods}</div>
        <div class="awards-row">${awards}</div>
        ${rest ? `<div style="display:flex;gap:1.4vmin;justify-content:center;flex-wrap:wrap;margin-top:1.4vmin">${rest}</div>` : ''}
        <div style="text-align:center;color:var(--muted);font-weight:800;font-size:1.8vmin;margin-top:1.6vmin">${hint}</div>
    </div>`, '🏆 Final scores');
}

// ═══════════════════════════════════════════
// SIMULATION MODES — ?mode=tvsimulation | playersimulation  (&players=N)
// Self-driving demos with no PeerJS and no real people. Bots are counted as
// "connected" via stub guestConns so the normal host flow drives everything.
//   • tvsimulation     — watch the big-screen scoreboard play itself
//   • playersimulation — watch a phone contestant ("You") play itself
// (?mode=simulation stays as an alias for tvsimulation.)
// ═══════════════════════════════════════════
let simTimer = null, simMode = 'tv';
const SIM_NAMES = ['Ace', 'Bux', 'Cash', 'Duke', 'Edie', 'Fox', 'Gwen', 'Hawk'];

function startSimulation(nPlayers, mode) {
    simMode = mode === 'player' ? 'player' : 'tv';
    roomCode = 'DEMO';
    H.settings.storyMode = 'manual';   // drive story→question on our own short timer
    H.settings.qCount = 3;
    H.settings.answerSecs = 20;
    H.players = []; guestConns = {}; viewerConns = {};
    const n = Math.max(2, Math.min(nPlayers || 4, MAX_PLAYERS));
    if (simMode === 'tv') {
        isHost = true; isTvHost = true; myId = '__sim_host__';
        document.body.classList.add('viewer-mode');
    } else {
        isHost = true; isTvHost = false; myName = 'You'; myId = '__you__';
        hostAddPlayer(myId, myName);                  // you are contestant #1 (the host)
    }
    for (let i = H.players.length; i < n; i++) {
        const id = '__bot_' + i;
        hostAddPlayer(id, SIM_NAMES[i % SIM_NAMES.length]);
        guestConns[id] = { peer: id, send() {} };     // stub so bots count as present
    }
    broadcastLobby();
    simTimer = setTimeout(simStart, 2400);
}

function simStart() {
    if (H.phase !== 'lobby') return;
    hostStartGame();                                  // deal + phase 'story'
    simTimer = setTimeout(simToQuestion, 2800);
}

function simToQuestion() {
    if (H.phase !== 'story') return;
    startQuestion();                                  // phase 'question'
    simTimer = setTimeout(simAnswers, 1400);
}

function simAnswers() {
    if (H.phase !== 'question') return;
    let delay = 300;
    H.players.forEach(p => {
        if (simMode === 'player' && p.id === myId) return;
        const d = delay; delay += 320 + Math.random() * 420;
        setTimeout(() => simBotAnswer(p), d);
    });
    if (simMode === 'player') { const dY = delay; delay += 400; setTimeout(simYouAnswer, dY); }
    // all answers land → maybeEndEarly → endQuestion → reveal; give it a buffer
    simTimer = setTimeout(simReveal, delay + 1700);
}

function simBotAnswer(p) {
    if (H.phase !== 'question' || !H.cur || H.answers[p.id]) return;
    const nC = H.cur.choices.length;
    const choice = Math.random() < 0.62 ? H.cur.answer : Math.floor(Math.random() * nC);
    hostAnswer(p, H.cur.qid, choice, 1500 + Math.floor(Math.random() * 8000));
}

function simYouAnswer() {
    if (H.phase !== 'question' || !H.cur) return;
    const me = H.players.find(p => p.id === myId);
    if (!me || H.answers[myId]) return;
    const nC = H.cur.choices.length;
    const choice = Math.random() < 0.6 ? H.cur.answer : Math.floor(Math.random() * nC);
    if (ui === 'question' && D) sendAnswer(choice);   // through the real phone UI (animates)
    if (!H.answers[myId]) hostAnswer(me, H.cur.qid, choice, 2000 + Math.floor(Math.random() * 6000));
}

function simReveal() {
    if (H.phase === 'question') endQuestion();        // force reveal if anyone stalled
    simTimer = setTimeout(simNext, 3400);
}

function simNext() {
    if (H.phase === 'reveal') nextQuestion();          // → next story, or podium if last
    if (H.phase === 'story') simTimer = setTimeout(simToQuestion, 2600);
    else if (H.phase === 'podium') simTimer = setTimeout(simRestart, 7000);
}

function simRestart() {
    hostNewGame();                                     // → lobby
    simTimer = setTimeout(simStart, 2600);
}

(function boot() {
    const params = new URLSearchParams(location.search);
    if (!fAvatar) fAvatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];
    if (!musicOn) $id('tog-music').classList.add('off');
    if (!sfxOn) $id('tog-sfx').classList.add('off');
    const mode = (params.get('mode') || '').toLowerCase();
    const simPlayers = parseInt(params.get('players'), 10) || 4;
    if (mode === 'playersimulation') { startSimulation(simPlayers, 'player'); return; }
    if (mode === 'tvsimulation' || mode === 'simulation') { startSimulation(simPlayers, 'tv'); return; }
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    render();
})();
</script>
