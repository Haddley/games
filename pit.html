<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pit! — Trading Floor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2304070f' width='100' height='100' rx='20'/><text x='50' y='68' font-size='52' text-anchor='middle'>🔔</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="common.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #04070f; --panel: rgba(13,23,42,0.82); --panel2: rgba(20,33,58,0.9);
            --border: rgba(251,191,36,0.22); --border2: rgba(125,138,165,0.25);
            --text: #e6edf7; --muted: #7d8aa5;
            --gold: #fbbf24; --up: #22c55e; --down: #ef4444; --cyan: #22d3ee;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            padding: 26px 16px 48px; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 65% 45% at 50% -5%, rgba(251,191,36,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 8% 100%, rgba(34,197,94,0.08) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 95% 100%, rgba(239,68,68,0.07) 0%, transparent 65%),
                repeating-linear-gradient(0deg, transparent 0 34px, rgba(125,138,165,0.045) 34px 35px),
                repeating-linear-gradient(90deg, transparent 0 34px, rgba(125,138,165,0.045) 34px 35px);
        }
        body.viewer-mode { padding: 0; overflow: hidden; display: block; height: 100dvh; width: 100vw; }

        h1.logo {
            font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 3px;
            font-size: clamp(1.6rem, 7vw, 2.4rem); text-align: center; color: var(--gold);
            text-shadow: 0 0 26px rgba(251,191,36,.45);
        }
        .sub { color: var(--muted); font-size: .68rem; letter-spacing: 2.5px; text-transform: uppercase; margin: 7px 0 22px; text-align: center; }

        #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 13px; }
        body.viewer-mode #app { max-width: none; height: 100dvh; display: block; }

        .card {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 16px;
            padding: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 12px 34px rgba(0,0,0,.5);
        }
        .card.highlight { border-color: var(--gold); box-shadow: 0 0 26px rgba(251,191,36,.14), 0 12px 34px rgba(0,0,0,.5); }
        .slbl { font-size: .64rem; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 11px; }

        .fg { margin-bottom: 12px; }
        .fg label { display: block; font-size: .64rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        input[type=text] {
            width: 100%; padding: 12px 14px; font-family: inherit; font-size: 1rem; font-weight: 700;
            border: 2px solid var(--border2); border-radius: 11px; background: rgba(4,7,15,.7); color: var(--text);
            outline: none;
        }
        input[type=text]:focus { border-color: var(--gold); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit; font-weight: 800; font-size: .92rem; letter-spacing: .5px;
            padding: 13px 18px; border: none; border-radius: 13px; cursor: pointer;
            transition: transform .12s, filter .12s, opacity .12s; user-select: none; -webkit-user-select: none;
            color: var(--text);
        }
        .btn:active { transform: scale(.97); }
        .btn-p { background: linear-gradient(180deg, #fcd34d, #f59e0b); color: #2a1700; box-shadow: 0 5px 0 #92600a, 0 10px 22px rgba(251,191,36,.3); }
        .btn-p:active { box-shadow: 0 2px 0 #92600a; transform: translateY(3px); }
        .btn-up { background: linear-gradient(180deg, #34d399, #16a34a); color: #03210f; box-shadow: 0 5px 0 #0c5c28, 0 10px 22px rgba(34,197,94,.3); }
        .btn-up:active { box-shadow: 0 2px 0 #0c5c28; transform: translateY(3px); }
        .btn-g { background: rgba(125,138,165,.12); box-shadow: inset 0 0 0 2px var(--border2); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 8px 13px; font-size: .74rem; border-radius: 10px; }
        .btn:disabled { opacity: .4; cursor: default; }

        .err {
            background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.5); color: #fca5a5;
            padding: 11px 14px; border-radius: 12px; font-size: .8rem; font-weight: 700; text-align: center;
        }
        hr { border: none; border-top: 1px dashed var(--border2); margin: 13px 0; }

        .connecting { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 46px 0; color: var(--muted); font-weight: 700; }
        .spin { width: 34px; height: 34px; border-radius: 50%; border: 4px solid rgba(251,191,36,.15); border-top-color: var(--gold); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .player-row { display: flex; align-items: center; gap: 11px; padding: 8px 4px; border-bottom: 1px dashed var(--border2); font-weight: 700; font-size: .92rem; }
        .player-row:last-child { border-bottom: none; }
        .pdot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 10px currentColor; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--up); box-shadow: 0 0 8px var(--up); margin-left: auto; }
        .qr-wrap { width: min(210px, 58vw); margin: 6px auto 10px; border-radius: 13px; overflow: hidden; box-shadow: 0 8px 22px rgba(0,0,0,.4); }
        .qr-wrap svg { display: block; width: 100%; height: auto; }
        .room-code { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.2rem; letter-spacing: 11px; text-align: center; color: var(--gold); padding-left: 11px; text-shadow: 0 0 18px rgba(251,191,36,.4); }
        .share-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px; }
        .seg-row { display: flex; flex-wrap: wrap; gap: 7px; }

        /* ── phone: trading ── */
        /* every trader visible at once — wrap instead of scrolling off-screen */
        .scores-strip { display: flex; flex-wrap: wrap; gap: 7px; padding-bottom: 2px; }
        .sc-chip {
            display: flex; align-items: center; gap: 6px;
            background: var(--panel); border: 1px solid var(--border2); border-radius: 11px;
            padding: 6px 10px; font-size: .7rem; font-weight: 800; white-space: nowrap;
        }
        /* a trader who's shouting a number lights up gold so you can match them */
        .sc-chip.offering { border-color: var(--gold); background: rgba(251,191,36,.12); animation: shoutPulse 1.1s ease-in-out infinite; }
        .sc-chip .shout { color: var(--gold); display: inline-flex; align-items: center; gap: 3px; }
        .hand-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .pcard {
            border: none; border-radius: 13px; padding: 10px 6px 9px; font-family: inherit;
            display: flex; flex-direction: column; align-items: center; gap: 1px; cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,.35), 0 8px 16px rgba(0,0,0,.35);
            transition: transform .1s, outline .1s, opacity .15s; position: relative;
        }
        .pcard::before { content: ''; position: absolute; inset: 0; border-radius: 13px; pointer-events: none;
            background: linear-gradient(157deg, rgba(255,255,255,.22), rgba(255,255,255,0) 44%); }
        .pcard .big, .pcard .nm, .pcard .pt { position: relative; }
        .pcard .big { font-size: 1.5rem; font-weight: 800; line-height: 1.1; }
        .pcard .nm { font-size: .62rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
        .pcard .pt { font-size: .58rem; font-weight: 700; opacity: .8; }
        .pcard.sel { outline: 3px solid #fff; outline-offset: 2px; transform: translateY(-4px);
            box-shadow: 0 8px 0 rgba(0,0,0,.3), 0 14px 26px rgba(0,0,0,.45), 0 0 22px rgba(255,255,255,.3); }
        .pcard.dim { opacity: .35; }
        .pcard.inoffer { opacity: .45; }
        .pcard.inoffer::after { content: '📢'; position: absolute; top: 4px; right: 6px; font-size: .8rem; }
        .shout-bar { display: flex; gap: 9px; }
        .shout-bar .btn { flex: 1; font-size: 1.02rem; padding: 15px; }
        /* keep the SHOUT / CORNER actions pinned to the bottom of the phone so
           they never fall below the fold behind a tall hand or scores strip */
        .game-actions {
            position: sticky; bottom: 0; z-index: 30;
            display: flex; flex-direction: column; gap: 9px;
            padding: 12px 0 max(10px, env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 62%, rgba(4,7,15,0));
        }
        .game-actions:empty { display: none; }
        body.viewer-mode .game-actions { position: static; background: none; }
        /* floating "Traded!" toast — replaces the old reserved empty line */
        .trade-toast {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            z-index: 970; pointer-events: none; white-space: nowrap;
            background: linear-gradient(180deg, #34d399, #16a34a); color: #03210f;
            font-weight: 900; font-size: .92rem; letter-spacing: .3px;
            padding: 9px 18px; border-radius: 999px;
            box-shadow: 0 10px 26px rgba(0,0,0,.5), inset 0 0 0 2px rgba(255,255,255,.22);
            animation: toastPop 1.5s cubic-bezier(.2,.8,.3,1) forwards;
        }
        @keyframes toastPop {
            0%   { opacity: 0; transform: translate(-50%,-14px) scale(.7); }
            12%  { opacity: 1; transform: translate(-50%,0) scale(1.06); }
            24%  { transform: translate(-50%,0) scale(1); }
            82%  { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%,-10px) scale(.96); }
        }
        .offer-banner {
            text-align: center; background: rgba(251,191,36,.1); border: 1px solid var(--border);
            border-radius: 13px; padding: 11px; font-weight: 800; color: var(--gold);
            animation: shoutPulse 1.1s ease-in-out infinite;
        }
        /* a matching offering chip becomes a tappable "trade" button (green) */
        .sc-chip.cantrade {
            border-color: var(--up); background: rgba(34,197,94,.16); cursor: pointer;
            animation: tradePulse 1s ease-in-out infinite;
        }
        .sc-chip.cantrade .shout { color: #4ade80; }
        .sc-chip.cantrade:active { transform: scale(.96); }
        @keyframes tradePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); } 50% { box-shadow: 0 0 0 7px rgba(34,197,94,0); } }
        @keyframes shoutPulse { 0%,100% { box-shadow: 0 0 0 rgba(251,191,36,0); } 50% { box-shadow: 0 0 22px rgba(251,191,36,.35); } }
        .btn-corner {
            width: 100%; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.15rem; letter-spacing: 2px;
            padding: 17px; border: none; border-radius: 15px; cursor: pointer;
            background: linear-gradient(180deg, #4ade80, #16a34a); color: #03210f;
            box-shadow: 0 0 0 rgba(34,197,94,.4); animation: cornerPulse 1s ease-in-out infinite;
        }
        @keyframes cornerPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
            50% { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
        }
        .feed { display: flex; flex-direction: column; gap: 5px; }
        .feed-row { font-size: .72rem; font-weight: 700; color: var(--muted); }
        .feed-row b { color: var(--text); }
        .feed-row.hot { color: var(--gold); }

        /* ── phone: corner / game over ── */
        .bell-card { text-align: center; padding: 20px 14px; }
        .bell-card .bell { font-size: 3.6rem; display: inline-block; animation: ring 1s ease-in-out; }
        @keyframes ring {
            0% { transform: rotate(0); } 15% { transform: rotate(24deg); } 30% { transform: rotate(-20deg); }
            45% { transform: rotate(14deg); } 60% { transform: rotate(-10deg); } 75% { transform: rotate(5deg); } 100% { transform: rotate(0); }
        }
        .bell-card .ct { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; margin-top: 6px; }
        .bell-card .cpts { font-size: 2rem; font-weight: 800; color: var(--up); margin-top: 2px; }
        .chip { display: inline-block; padding: 4px 12px; border-radius: 11px; background: rgba(251,191,36,.12); border: 1px solid var(--border); color: var(--gold); font-weight: 800; font-size: .74rem; margin: 3px; }
        .chip.pen { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.45); color: #fca5a5; }
        .standings .sc { margin-left: auto; font-weight: 800; }
        .standings .delta { font-size: .72rem; font-weight: 800; margin-left: 7px; }
        .standings .delta.plus { color: var(--up); }
        .standings .delta.minus { color: var(--down); }

        /* ── countdown overlay ── */
        #count-ov {
            position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
            background: rgba(4,7,15,.78); backdrop-filter: blur(4px); flex-direction: column; gap: 10px;
        }
        #count-ov .n { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: clamp(4rem, 22vmin, 9rem); color: var(--gold); text-shadow: 0 0 44px rgba(251,191,36,.55); animation: popNum .9s ease both; }
        @keyframes popNum { 0% { transform: scale(.3); opacity: 0; } 40% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); } }
        #count-ov .lbl { color: var(--muted); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; font-size: .8rem; }

        /* ═════════ TV ═════════ */
        .tv { height: 100dvh; display: flex; flex-direction: column; padding: 2.6vmin 3.2vmin 0; gap: 1.8vmin; position: relative; overflow: hidden; }
        .tv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2vmin; }
        .tv-logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 3.1vmin; letter-spacing: .4vmin; color: var(--gold); text-shadow: 0 0 24px rgba(251,191,36,.45); }
        .tv-meta { font-size: 1.8vmin; font-weight: 800; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .tv-main { flex: 1; display: flex; gap: 2.2vmin; min-height: 0; }

        .tv-floor { flex: 1.6; display: grid; grid-template-columns: 1fr 1fr; gap: 1.6vmin; align-content: start; min-width: 0; }
        .tv-trader {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 1.6vmin;
            padding: 1.5vmin 1.8vmin; display: flex; align-items: center; gap: 1.4vmin; min-width: 0;
        }
        .tv-trader .tdot { width: 1.7vmin; height: 1.7vmin; border-radius: 50%; box-shadow: 0 0 12px currentColor; flex-shrink: 0; }
        .tv-trader .tname { font-weight: 800; font-size: 2.1vmin; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tv-trader .tcards { color: var(--muted); font-size: 1.5vmin; font-weight: 700; }
        .tv-trader .tscore { margin-left: auto; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.4vmin; color: var(--gold); font-variant-numeric: tabular-nums; }
        .tv-trader .tpill {
            background: linear-gradient(180deg, #fcd34d, #f59e0b); color: #2a1700;
            font-weight: 800; font-size: 1.9vmin; border-radius: 1vmin; padding: .5vmin 1.2vmin;
            animation: shoutPulse 1s ease-in-out infinite;
        }
        .tv-side { flex: 1; display: flex; flex-direction: column; gap: 1.4vmin; min-width: 0; }
        .tv-panel { background: var(--panel); border: 1px solid var(--border2); border-radius: 1.6vmin; padding: 1.6vmin 1.9vmin; }
        .tv-panel .ptitle { font-size: 1.5vmin; font-weight: 800; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); margin-bottom: 1vmin; }
        .tv-feed { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .tv-feed .rows { display: flex; flex-direction: column; gap: .7vmin; }
        .tv-feed .frow { font-size: 1.9vmin; font-weight: 700; color: var(--muted); animation: riseIn .4s ease both; }
        .tv-feed .frow b { color: var(--text); }
        .tv-feed .frow.hot { color: var(--gold); }
        @keyframes riseIn { from { opacity: 0; transform: translateY(1vmin); } to { opacity: 1; transform: none; } }
        .tv-bigstat { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 4.6vmin; color: var(--text); }
        .tv-bigstat small { font-size: 1.5vmin; color: var(--muted); display: block; letter-spacing: .3vmin; }

        .ticker { overflow: hidden; border-top: 1px solid var(--border2); background: rgba(4,7,15,.75); margin: 0 -3.2vmin; padding: 1vmin 0; }
        .ticker-inner { display: inline-block; white-space: nowrap; animation: tickmove 26s linear infinite; font-weight: 800; font-size: 1.9vmin; }
        .ticker-inner .tk { margin: 0 2.4vmin; }
        .ticker-inner .up { color: var(--up); }
        .ticker-inner .dn { color: var(--down); }
        @keyframes tickmove { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* TV lobby */
        .tv-lobby { flex: 1; display: flex; gap: 4vmin; align-items: center; min-height: 0; }
        .tv-lobby .qr-side { background: #0d172a; border: 1px solid var(--border); border-radius: 2.2vmin; padding: 3.2vmin; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
        .tv-lobby .qr-side .qr-wrap { width: 32vmin; margin: 1.4vmin auto; }
        .tv-lobby .qr-side .room-code { font-size: 4.6vmin; letter-spacing: 1.9vmin; padding-left: 1.9vmin; }
        .tv-lobby .join-hint { font-size: 1.7vmin; font-weight: 700; color: var(--muted); }
        .tv-players { flex: 1; display: flex; flex-direction: column; gap: 1.5vmin; min-width: 0; }
        .tv-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20vmin, 1fr)); gap: 1.5vmin; }
        .tv-pcard {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 1.7vmin;
            padding: 1.7vmin; text-align: center; font-weight: 800; font-size: 2vmin; animation: popIn .35s ease both;
        }
        .tv-pcard .pdot { width: 2.2vmin; height: 2.2vmin; margin: 0 auto 1vmin; }
        @keyframes popIn { from { opacity: 0; transform: scale(.7); } to { opacity: 1; transform: scale(1); } }
        .tv-waiting { color: var(--muted); font-weight: 700; font-size: 1.9vmin; }

        /* TV corner overlay + podium */
        .tv-bell { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.6vmin; text-align: center; }
        .tv-bell .bell { font-size: 12vmin; animation: ring 1.1s ease-in-out; }
        .tv-bell .who { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 5vmin; letter-spacing: .5vmin; }
        .tv-bell .what { font-size: 3vmin; font-weight: 800; color: var(--gold); }
        .tv-bell .pens { display: flex; gap: 1.2vmin; flex-wrap: wrap; justify-content: center; }
        .tv-bell .chip { font-size: 1.9vmin; }
        .tv-lead { display: flex; gap: 1.2vmin; flex-wrap: wrap; justify-content: center; }
        .tv-lead .rail-chip {
            display: flex; align-items: center; gap: 1vmin; background: var(--panel); border: 1px solid var(--border2);
            border-radius: 1.3vmin; padding: 1vmin 1.6vmin; font-weight: 800; font-size: 2vmin;
        }
        .tv-lead .rail-chip .sc { color: var(--gold); font-family: 'Orbitron', sans-serif; }
        .podium-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 2.4vmin; padding-bottom: 1vmin; }
        .pod { text-align: center; font-weight: 800; animation: podRise .55s cubic-bezier(.2,.8,.3,1) both; }
        .pod .pname { font-size: 2.4vmin; margin-bottom: .8vmin; }
        .pod .pscore { font-size: 2vmin; color: var(--gold); margin-bottom: .8vmin; font-family: 'Orbitron', sans-serif; }
        .pod .block { border-radius: 1.5vmin 1.5vmin 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 1.3vmin; font-size: 3.2vmin; width: 17vmin; }
        .pod.p1 .block { height: 21vmin; }
        .pod.p2 .block { height: 14vmin; }
        .pod.p3 .block { height: 9.5vmin; }
        .pod.mrank-0 .block { background: linear-gradient(180deg, #fcd34d, #92600a); }
        .pod.mrank-1 .block { background: linear-gradient(180deg, #d7d7e0, #8f8fa3); }
        .pod.mrank-2 .block { background: linear-gradient(180deg, #e8a06a, #9c5a33); }
        .awards-row { display: flex; gap: 1.5vmin; justify-content: center; flex-wrap: wrap; padding-bottom: 2vmin; }
        .award { background: var(--panel); border: 1px solid var(--border); border-radius: 1.5vmin; padding: 1.3vmin 2vmin; font-weight: 700; font-size: 1.8vmin; text-align: center; }
        .award .aw-t { color: var(--gold); font-weight: 800; }

        #confetti-cv { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

        /* sound toggles */
        #sound-togs { position: fixed; top: 10px; right: 10px; z-index: 80; display: flex; gap: 6px; }
        #sound-togs button {
            width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem;
            background: rgba(13,23,42,.8); box-shadow: inset 0 0 0 1px var(--border);
            transition: opacity .2s, transform .12s;
        }
        #sound-togs button:active { transform: scale(.88); }
        #sound-togs button.off { opacity: .35; filter: grayscale(1); }
        body.viewer-mode .tv-top { padding-right: 96px; }

        /* FX layer — particles + score pops (`.fxp`, not `.pt`: hand cards use .pt for points) */
        .fxp {
            position: fixed; width: 8px; height: 8px; border-radius: 2px;
            z-index: 950; pointer-events: none;
            animation: fxpFly .75s cubic-bezier(.15,.65,.4,1) forwards;
        }
        @keyframes fxpFly {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }

        }
        .pop {
            position: fixed; z-index: 960; pointer-events: none;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.4rem;
            animation: popUp 1.1s cubic-bezier(.2,.8,.3,1) forwards;

        @keyframes popUp {

            15%  { transform: translate(-50%, -12px) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -78px) scale(1); opacity: 0; }
        }

        /* screen entrances — only on phase changes (#app.fresh), so patches never re-trigger */
        @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        #app.fresh .card { animation: cardIn .35s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes dealIn { from { opacity: 0; transform: translateY(10px) scale(.85); } to { opacity: 1; transform: none; } }
        #app.fresh .hand-grid .pcard { animation: dealIn .32s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 40ms); }
        @keyframes rowIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
        #app.fresh .player-row { animation: rowIn .3s ease-out both; animation-delay: calc(var(--i, 0) * 40ms); }
        @keyframes cptsPop { 0% { opacity: 0; transform: scale(.4); } 60% { transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        #app.fresh .cpts { animation: cptsPop .45s .15s both; }
        #app.fresh .bell-card .chip { animation: cardIn .35s .3s both; }
        @keyframes shakeX {
            10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-6px); } 40%, 60% { transform: translateX(6px); }
        }
        .err { animation: shakeX .4s; }
        @keyframes podRise { from { transform: translateY(30%); opacity: 0; } to { transform: none; opacity: 1; } }
        .award { animation: cardIn .5s 1s both; }

        /* ═════════ HERITAGE: badges, hand signals, pit crowd, paper ═════════ */

        /* Laminated red trading badge (acronym + floor number) */
        .badge {
            display: inline-flex; align-items: center; gap: 2px; vertical-align: middle;
            font-family: 'JetBrains Mono', monospace; font-weight: 800; letter-spacing: .5px;
            font-size: .56rem; text-transform: uppercase; color: #fff;
            padding: 2px 6px 3px; border-radius: 4px;
            background: linear-gradient(180deg, #f04747 0%, #b91c1c 100%);
            border-top: 1.5px solid rgba(255,255,255,.55);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.28), 0 1px 3px rgba(0,0,0,.55);
            position: relative;
        }
        .badge::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: rgba(0,0,0,.35); box-shadow: inset 0 0 0 1px rgba(255,255,255,.3); margin-right: 1px; }
        .badge .bnum { opacity: .82; font-weight: 700; }
        .badge.ontv { font-size: 1.35vmin; padding: .3vmin .8vmin .4vmin; border-radius: .55vmin; gap: .3vmin; }
        .badge.ontv::before { width: .8vmin; height: .8vmin; }

        /* Open-outcry hand signal — n fingers over a palm */
        /* em-based hand so it scales by font-size; fingers rise index-first (left)
           from a palm with a thumb out to the side — so "1" is a pointing index,
           never a lone middle finger. Size set per context via font-size. */
        .hsig { position: relative; display: inline-block; width: 1.5em; height: 1.6em; vertical-align: middle; font-size: 12px; }
        .hsig.big { font-size: 21px; } .hsig.ontv { font-size: 2.2vmin; }
        .hsig .hpalm { position: absolute; left: .2em; bottom: 0; width: 1.02em; height: .62em; border-radius: .26em; background: linear-gradient(180deg, #f4c89c, #d99b6c); box-shadow: inset 0 -.08em 0 rgba(0,0,0,.1); }
        .hsig .hthumb { position: absolute; left: -.02em; bottom: .16em; width: .34em; height: .52em; border-radius: .2em; background: linear-gradient(180deg, #f4c89c, #d99b6c); transform: rotate(30deg); transform-origin: bottom right; }
        .hsig .hfings { position: absolute; left: .3em; bottom: .52em; display: flex; gap: .12em; align-items: flex-end; }
        .hsig .hfings i { width: .26em; height: 1em; border-radius: .13em .13em 0 0; background: linear-gradient(180deg, #f4c89c, #d99b6c); box-shadow: inset -.06em 0 0 rgba(0,0,0,.12); }
        /* real hand proportions: middle longest, index ≈ ring, pinky shortest */
        .hsig .hfings i:nth-child(1) { height: .95em; }  /* index  */
        .hsig .hfings i:nth-child(2) { height: 1.1em; }  /* middle — longest */
        .hsig .hfings i:nth-child(3) { height: .9em; }   /* ring   */
        .hsig .hfings i:nth-child(4) { height: .68em; }  /* pinky — shortest */

        /* The roaring pit — red-jacketed traders waving arms behind the whole TV show */
        #pit-crowd { position: absolute; left: 0; right: 0; bottom: 0; height: 42%; z-index: 0; pointer-events: none; overflow: hidden; }
        .tfig { position: absolute; bottom: -1.5vmin; transform-origin: bottom center; filter: brightness(var(--br, 1)) saturate(1.1); }
        /* colored firm jackets — the London LIFFE floor was a riot of colour */
        .tfig .body { width: 5.2vmin; height: 8vmin; border-radius: 2.2vmin 2.2vmin .5vmin .5vmin; position: relative;
            background: linear-gradient(100deg, var(--jkt, #ef4444) 0%, var(--jkt) 55%, var(--jkd, #9b1c1c) 100%); box-shadow: inset -0.7vmin 0 0 rgba(0,0,0,.18); }
        .tfig .body::before { content: ''; position: absolute; left: 50%; top: .6vmin; width: .5vmin; height: 6vmin; background: rgba(0,0,0,.2); transform: translateX(-50%); } /* jacket seam */
        .tfig .body::after { content: ''; position: absolute; left: .9vmin; top: 1.6vmin; width: 1.6vmin; height: 1.1vmin; border-radius: .2vmin; background: rgba(255,255,255,.82); box-shadow: 0 0 0 .15vmin rgba(0,0,0,.15); } /* clip-on badge */
        .tfig .head { position: absolute; left: 50%; top: -2.7vmin; transform: translateX(-50%); width: 3vmin; height: 3vmin; border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #f6cfa4, #d69b6b); box-shadow: inset -.4vmin -.3vmin 0 rgba(0,0,0,.12); }
        .tfig .head::before { content: ''; position: absolute; left: -.3vmin; right: -.3vmin; top: -.4vmin; height: 1.4vmin; border-radius: 1.4vmin 1.4vmin 0 0; background: var(--hair, #263041); } /* hair */
        .tfig .head::after { content: ''; position: absolute; right: -.5vmin; top: 1vmin; width: 1vmin; height: 1vmin; border-radius: 50%; background: #1a2231; box-shadow: 0 0 0 .3vmin rgba(26,34,49,.35); } /* headset cup */
        .tfig .arm { position: absolute; top: .8vmin; width: 1.5vmin; height: 5vmin; border-radius: 1vmin; transform-origin: top center;
            background: linear-gradient(180deg, var(--jkt, #ef4444), var(--jkd, #9b1c1c)); }
        .tfig .arm::after { content: ''; position: absolute; left: 50%; bottom: -1vmin; transform: translateX(-50%); width: 1.9vmin; height: 1.9vmin; border-radius: 50%; background: radial-gradient(circle at 40% 35%, #f6cfa4, #d69b6b); } /* hand */
        .tfig .arm.l { left: -.7vmin; animation: waveL var(--aw, 0.9s) ease-in-out infinite; }
        .tfig .arm.r { right: -.7vmin; animation: waveR var(--aw2, 1.05s) ease-in-out infinite; }
        @keyframes waveL { 0%,100% { transform: rotate(24deg); } 50% { transform: rotate(58deg); } }
        @keyframes waveR { 0%,100% { transform: rotate(-58deg); } 50% { transform: rotate(-12deg); } }
        /* order-slips carpeting the floor, as they always did after a frenzy */
        .floorslip { position: absolute; bottom: 0; width: 1.5vmin; height: 2vmin; background: linear-gradient(160deg,#fff,#dbe0ea); border-radius: .2vmin; box-shadow: 0 .2vmin .5vmin rgba(0,0,0,.35); opacity: .85; }
        .tv > .tv-top, .tv > .tv-main, .tv > .tv-lobby, .tv > .tv-bell, .tv > .ticker { position: relative; z-index: 1; }

        /* TV shout: comic speech bubble + signal over a trader */
        .tv-trader { position: relative; }
        .tv-trader .tsig { display: inline-flex; align-items: center; }
        .tv-trader .tpill {
            position: relative; box-shadow: 0 .3vmin 1vmin rgba(0,0,0,.4);
        }
        .tv-trader .tpill::after {
            content: ''; position: absolute; left: -.9vmin; top: 50%; transform: translateY(-50%);
            border: .7vmin solid transparent; border-right-color: #f59e0b;
        }

        /* Paper order-slips — thrown on every trade, and a storm at the close */
        .slip { position: fixed; z-index: 940; width: 15px; height: 20px; border-radius: 2px; pointer-events: none;
            background: linear-gradient(160deg, #ffffff, #dfe4ec); box-shadow: 0 2px 6px rgba(0,0,0,.45); }
        .slip::before, .slip::after { content: ''; position: absolute; left: 2.5px; right: 2.5px; height: 1.6px; background: #9aa6bb; border-radius: 2px; }
        .slip::before { top: 5px; } .slip::after { top: 10px; box-shadow: 0 4px 0 #9aa6bb; }
        .slip.gold { background: linear-gradient(160deg, #fef3c7, #fcd34d); }
        .slip.gold::before, .slip.gold::after { background: #b45309; box-shadow: none; }
        @keyframes slipFall { to { transform: translate(var(--drift, 0), 106vh) rotate(var(--rot, 360deg)); opacity: .15; } }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } #pit-crowd { display: none; } }
    </style>
</head>
<body>
    <div id="app"></div>
    <canvas id="confetti-cv"></canvas>
    <div id="sound-togs">
        <button id="tog-music" title="Music on/off" onclick="toggleMusic()">🎵</button>
        <button id="tog-sfx" title="Sound effects on/off" onclick="toggleSfx()">🔊</button>
    </div>
<script>
// ICE_CFG + rankByScore now come from common.js (loaded in <head>).
typeof mountScene === 'function' && mountScene('market');   // themed ambient scene along the bottom of the TV

'use strict';

// ═══════════════════════════════════════════
// CONSTANTS & HELPERS
// ═══════════════════════════════════════════
const PFX = 'PITPARTY-';
const MAX_PLAYERS = 8, MIN_PLAYERS = 3;   // classic Pit needs 3+ (commodities = player count, 9 cards each)
const COMMODITIES = [
    { name: 'Wheat',  pts: 100, bg: '#b45309', fg: '#fef3c7' },
    { name: 'Coffee', pts: 90,  bg: '#7c2d12', fg: '#ffedd5' },
    { name: 'Barley', pts: 85,  bg: '#1d4ed8', fg: '#dbeafe' },
    { name: 'Corn',   pts: 75,  bg: '#ca8a04', fg: '#fef9c3' },
    { name: 'Rye',    pts: 70,  bg: '#7e22ce', fg: '#f3e8ff' },
    { name: 'Oats',   pts: 60,  bg: '#15803d', fg: '#dcfce7' },
    { name: 'Hay',    pts: 50,  bg: '#4d7c0f', fg: '#ecfccb' },
    { name: 'Flax',   pts: 40,  bg: '#155e75', fg: '#cffafe' },
];
const SPECIALS = {
    Bull: { name: 'Bull', pts: 0, bg: '#991b1b', fg: '#fee2e2', emoji: '🐂' },
    Bear: { name: 'Bear', pts: 0, bg: '#374151', fg: '#f3f4f6', emoji: '🐻' },
};
const PENALTY = 20;
const PLAYER_COLORS = ['#fbbf24', '#22d3ee', '#f472b6', '#4ade80', '#a78bfa', '#fb923c', '#f87171', '#38bdf8'];

function $id(id) { return document.getElementById(id); }
function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function shuffle(a) { const r = a.slice(); for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function commOf(name) { return COMMODITIES.find(c => c.name === name) || SPECIALS[name] || null; }
function isSpecial(name) { return name === 'Bull' || name === 'Bear'; }
function cardStyle(name) {
    const c = commOf(name);
    return c ? `background:${c.bg};color:${c.fg}` : '';
}
function sortHand(hand) {
    const order = n => isSpecial(n) ? 100 + (n === 'Bull' ? 0 : 1) : COMMODITIES.findIndex(c => c.name === n);
    return hand.slice().sort((a, b) => order(a) - order(b));
}

// ── Open-outcry heritage: the laminated red trading badge every pit trader wore
// (think "KB 737" in the trading-floor photos). Deterministic from the name so
// every screen shows the same badge with no extra protocol traffic. ──
function _hash(s) { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }
function traderBadge(name) {
    const clean = String(name || '').toUpperCase().replace(/[^A-Z0-9 ]/g, '');
    const words = clean.split(/\s+/).filter(Boolean);
    let acr;
    if (words.length >= 2) acr = words[0][0] + words[1][0] + (words[1][1] || '');
    else if (words[0]) acr = words[0].slice(0, 3);
    else acr = 'TDR';
    return { acr, num: (_hash(name) % 900) + 100 };   // 100–999, like a real floor badge
}
function badgeHTML(name, cls) {
    const b = traderBadge(name);
    return `<span class="badge ${cls || ''}">${esc(b.acr)}<span class="bnum">${b.num}</span></span>`;
}

// ── Hand signal — fingers held up for the bundle size, the way pit traders
// signalled quantity across a roaring floor. A little CSS hand, 1–4 fingers. ──
function handSigHTML(n, cls) {
    n = Math.max(1, Math.min(4, n | 0));
    return `<span class="hsig ${cls || ''}"><span class="hpalm"></span><span class="hthumb"></span><span class="hfings">${'<i></i>'.repeat(n)}</span></span>`;
}
function badgePrevHTML(name) {
    return name && name.trim()
        ? `Your floor badge → ${badgeHTML(name)}`
        : 'Your floor badge appears here';
}
function updateBadgePrev(v) {
    fName = v;
    const el = $id('badge-prev');
    if (el) el.innerHTML = badgePrevHTML(v);
}

// ── QR code (themed SVG) ──
function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++)
            for (let c = 0; c < n; c++)
                if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#fffbeb"/>` +
            `<g fill="#0d172a">${rects}</g></svg>`;
    } catch (e) { return ''; }
}

// ── Confetti ──
let _cf = { parts: [], raf: 0, running: false, until: 0 };
function startConfetti(ms) {
    if (REDUCED) return;
    const cv = $id('confetti-cv'), ctx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    _cf.until = performance.now() + (ms || 2600);
    const cols = ['#fbbf24', '#22c55e', '#22d3ee', '#f472b6', '#a78bfa', '#e6edf7'];
    for (let i = 0; i < 130; i++) {
        _cf.parts.push({
            x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.5,
            vx: (Math.random() - 0.5) * 2.4, vy: 2 + Math.random() * 3.6,
            rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.25,
            w: 6 + Math.random() * 7, h: 4 + Math.random() * 5,
            col: cols[Math.floor(Math.random() * cols.length)],
        });
    }
    if (_cf.running) return;
    _cf.running = true;
    (function frame(t) {
        ctx.clearRect(0, 0, cv.width, cv.height);
        _cf.parts = _cf.parts.filter(p => p.y < cv.height + 30);
        for (const p of _cf.parts) {
            p.x += p.vx; p.y += p.vy; p.rot += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        }
        if (t < _cf.until || _cf.parts.length) _cf.raf = requestAnimationFrame(frame);
        else { _cf.running = false; ctx.clearRect(0, 0, cv.width, cv.height); }
    })(performance.now());
}

// ═══════════════════════════════════════════
// AUDIO — procedural "trading motivation" + open-outcry SFX
// (uplifting-corporate music in C major: four-on-the-floor, warm plucks,
//  anthemic lead; SFX = cash register, crowd roar, ticker, THE bell.
//  gesture-started, music ~0.33 vol, SFX on top)
// ═══════════════════════════════════════════
let AC = null, masterGain = null, musicGain = null, sfxGain = null, noiseBuf = null;
let leadBus = null, musicDelay = null;
let musicOn = localStorage.getItem('pit-music') !== '0';
let sfxOn = localStorage.getItem('pit-sfx') !== '0';

function ac() {
    if (!AC) {
        try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
        masterGain = AC.createGain(); masterGain.gain.value = 1; masterGain.connect(AC.destination);
        musicGain = AC.createGain(); musicGain.gain.value = musicOn ? 0.33 : 0; musicGain.connect(masterGain);
        sfxGain = AC.createGain(); sfxGain.gain.value = sfxOn ? 0.55 : 0; sfxGain.connect(masterGain);
        // Lead bus with a short slapback — a big noisy exchange hall
        leadBus = AC.createGain(); leadBus.gain.value = 1; leadBus.connect(musicGain);
        musicDelay = AC.createDelay(1.2); musicDelay.delayTime.value = 0.25;
        const fb = AC.createGain(); fb.gain.value = 0.16;
        const dlp = AC.createBiquadFilter(); dlp.type = 'lowpass'; dlp.frequency.value = 2400;
        const wet = AC.createGain(); wet.gain.value = 0.15;
        leadBus.connect(musicDelay); musicDelay.connect(dlp); dlp.connect(fb); fb.connect(musicDelay);
        dlp.connect(wet); wet.connect(musicGain);
        const len = AC.sampleRate * 1.2;
        noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    if (AC.state === 'suspended') AC.resume();
    return AC;
}

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide, 20), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    if (lp) {
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
        o.connect(f); f.connect(g);
    } else {
        o.connect(g);
    }
    g.connect(dest || sfxGain);
    o.start(t); o.stop(t + dur + 0.06);
}

function noiseHit(dur, { vol = 0.3, when = 0, hp = 6000, dest = null } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const src = AC.createBufferSource(); src.buffer = noiseBuf;
    const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(dest || sfxGain);
    src.start(t); src.stop(t + dur + 0.05);
}

// Hand-clap / snare-ish backbeat — three quick band-passed noise bursts
function clapHit(when) {
    if (!AC) return;
    const t0 = AC.currentTime + (when || 0);
    for (let j = 0; j < 3; j++) {
        const t = t0 + j * 0.009;
        const src = AC.createBufferSource(); src.buffer = noiseBuf;
        const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1700; f.Q.value = 1.1;
        const g = AC.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.linearRampToValueAtTime(0.10, t + 0.001);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
        src.connect(f); f.connect(g); g.connect(musicGain);
        src.start(t); src.stop(t + 0.12);
    }
}

const mf = m => 440 * Math.pow(2, (m - 69) / 12); // midi → freq

// ── SFX (open outcry: ticker clicks, coin, and THE bell) ──
// Trader steps onto the floor: two bright brass pips
function sJoin() {
    if (!sfxOn || !AC) return;
    tone(mf(65), 0.07, { type: 'square', vol: 0.2, lp: 3600 });
    tone(mf(72), 0.13, { type: 'square', vol: 0.22, when: 0.06, lp: 3600 });
}
// Card tap: tiny ticker click, pitch climbs with selection size
function sSelect(n) {
    if (!sfxOn || !AC) return;
    noiseHit(0.02, { vol: 0.05, hp: 9000 });

// 2 is the full band; keyShift transposes every melodic voice (match point)
let musicIntensity = 2, musicKeyShift = 0;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Straight modern feel (tiny swing only in the lobby); push off-16ths a hair late
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) tone(150, 0.22, { type: 'sine', vol: 0.45, when: rel, slide: 45, dest: musicGain });
    if (tr.hat[i]) {
        const hv = (i % 4 === 2 ? 0.13 : 0.07) * (0.8 + Math.random() * 0.4);
        noiseHit(0.05, { vol: hv, when: rel, hp: 9000, dest: musicGain });
    }
    if (tr.clap && tr.clap[i]) clapHit(rel);      // backbeat clap (2 & 4) — the pop groove
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) tone(mf(b + k), stepDur * 1.5, { type: w.bass || 'triangle', vol: 0.26, when: rel, dest: musicGain, lp: 1150, attack: 0.005 });
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    // Muted plucked chord — the signature "uplifting corporate" offbeat pluck
    if (full && tr.stab && tr.stab[i] && ch)
        ch.forEach(m => tone(mf(m + 12 + k), stepDur * 0.7, { type: w.stab || 'triangle', vol: 0.05, when: rel, lp: 3000, dest: musicGain, attack: 0.003 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12;
        tone(mf(l + k), stepDur * 1.4, { type: w.lead || 'square', vol: 0.12 * (0.9 + Math.random() * 0.2), when: rel, dest: leadBus, lp: tr.leadLp || 4400, attack: 0.004 });
    }
    // Ticker-tape arpeggio shimmer an octave over the pads
    if (full && tr.arp && i % tr.arp === 0 && ch)
        tone(mf(ch[(i / tr.arp) % ch.length] + 24 + k), stepDur * tr.arp * 0.9, { type: w.arpW || 'triangle', vol: 0.04, when: rel, lp: 5500, dest: musicGain, attack: 0.003 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.04, { vol: 0.11, when: rel + stepDur * 2, hp: 11000, dest: musicGain });

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    musicIntensity = 2;
    if (track === 'lobby' || track === 'over') musicKeyShift = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'trading') musicUrgent = false;
    // one-beat snare fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) noiseHit(0.06, { vol: 0.1 + f * 0.035, when: f * s, hp: 2800 + f * 900, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}

// Open-outcry mood, driven by each state broadcast: the band thins out while
// the floor is quiet and swells when shouts stack up; your own phone turns
// urgent while a corner is sitting in your hand. Match point (someone within
// one top-value corner of the win) bumps the whole arrangement up a whole step.
function updateMusicMood(msg) {
    if (!msg || !msg.players) return;
    if (musicTrack === 'trading') {
        const shouts = msg.players.filter(p => p.offerCount > 0).length;
        musicIntensity = shouts >= 2 ? 2 : 1;
        musicUrgent = !!msg.canCorner;
    }
    if (musicTrack === 'trading' || musicTrack === 'corner') {
        const top = Math.max(0, ...msg.players.map(p => p.score || 0));
        musicKeyShift = msg.winScore && top >= msg.winScore - 100 ? 2 : 0;
    }
}

    musicOn = !musicOn;
    localStorage.setItem('pit-music', musicOn ? '1' : '0');
    if (!AC && musicOn) { ac(); startMusicLoop(); }
    if (AC && musicGain) musicGain.gain.linearRampToValueAtTime(musicOn ? 0.33 : 0, AC.currentTime + 0.2);
    $id('tog-music').classList.toggle('off', !musicOn);
}

// ── Particle bursts + floating score text ──
function burst(x, y, colors, n = 14) {
    if (REDUCED) return;
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'fxp';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;
        p.style.cssText = `left:${x}px;top:${y}px;background:${colors[i % colors.length]};` +
            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}
function popText(x, y, text, cls = 'gold') {
    const el = document.createElement('div');
    el.className = 'pop ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1150);
}
