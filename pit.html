        out += `<div class="tfig" style="left:${left.toFixed(1)}%;bottom:${(-1.5 - (1 - sz) * 6).toFixed(1)}vmin;` +
            `transform:scale(${sz.toFixed(2)});--br:${br.toFixed(2)};--aw:${aw}s;--aw2:${aw2}s;` +
            `--jkt:${jk[0]};--jkd:${jk[1]};--hair:${hair};z-index:${Math.round(sz * 10)}">` +
            `<div class="head"></div><div class="body">` +
            `<div class="arm l" style="animation-delay:${dl}s"></div><div class="arm r" style="animation-delay:${dl}s"></div>` +
            `</div></div>`;
    }
    // paper slips scattered across the floor
    let paper = '';
    for (let i = 0; i < 26; i++) {
        paper += `<div class="floorslip" style="left:${(Math.random() * 100).toFixed(1)}%;bottom:${(Math.random() * 5).toFixed(1)}vmin;` +
            `transform:scale(${(0.7 + Math.random() * 0.9).toFixed(2)}) rotate(${(Math.random() * 90 - 45).toFixed(0)}deg);opacity:${(0.5 + Math.random() * 0.4).toFixed(2)}"></div>`;
    }
    return `<div id="pit-crowd">${paper}${out}</div>`;
}

// Paper order-slips fly between two traders when a trade completes
function findTraderEl(name) { return [...document.querySelectorAll('.tv-trader')].find(el => el.dataset.name === name); }
function flySlip(x0, y0, x1, y1, delay, gold) {
    if (REDUCED) return;
    setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'slip' + (gold ? ' gold' : '');
        s.style.cssText = `left:${x0}px;top:${y0}px;opacity:0;transform:translate(-50%,-50%) rotate(0deg);` +
            `transition:transform .52s cubic-bezier(.3,.7,.35,1),opacity .52s;`;
        document.body.appendChild(s);
        requestAnimationFrame(() => requestAnimationFrame(() => {
            s.style.opacity = '1';
            s.style.transform = `translate(-50%,-50%) translate(${x1 - x0}px,${y1 - y0}px) rotate(${Math.random() * 720 - 360}deg)`;
        }));
        setTimeout(() => { s.style.opacity = '0'; }, 430);
        setTimeout(() => s.remove(), 760);
    }, delay || 0);
}
function flyTradeSlips(aName, bName, count) {
    const ae = findTraderEl(aName), be = findTraderEl(bName);
    if (!ae || !be) return;
    const ar = ae.getBoundingClientRect(), br = be.getBoundingClientRect();
    const ax = ar.left + ar.width / 2, ay = ar.top + ar.height / 2;
    const bx = br.left + br.width / 2, by = br.top + br.height / 2;
    const k = Math.max(1, Math.min(count || 1, 4));
    for (let i = 0; i < k; i++) { flySlip(ax, ay, bx, by, i * 60); flySlip(bx, by, ax, ay, i * 60 + 30); }
}

// A blizzard of paper thrown at the closing bell / corner
function paperStorm(n) {
    if (REDUCED) return;
    n = n || 46;
    for (let i = 0; i < n; i++) {
        const s = document.createElement('div');
        s.className = 'slip' + (Math.random() < 0.4 ? ' gold' : '');
        const dur = 1.7 + Math.random() * 1.7;
        s.style.cssText = `left:${Math.random() * innerWidth}px;top:${-30 - Math.random() * 200}px;` +
            `--drift:${(Math.random() * 180 - 90)}px;--rot:${Math.random() * 900 - 450}deg;` +
            `animation:slipFall ${dur}s linear ${(Math.random() * 0.5).toFixed(2)}s forwards;`;
        document.body.appendChild(s);
        setTimeout(() => s.remove(), dur * 1000 + 700);
    }
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let peer = null, myId = '', myName = '', isHost = false, isTvHost = false, isViewer = false, roomCode = '';
let hostConn = null, guestConns = {}, viewerConns = {};
let ui = 'home';   // home|creating|connecting|lobby_h|lobby_g|game|corner|gameover|viewer
let uiErr = '';
let fName = localStorage.getItem('pit-name') || '';
let fCode = '', fVCode = '';
let D = null, vD = null;

// phone-local trading state
let selection = new Set();       // indices into D.myHand
let _prevHandKey = '';

// Host authoritative state
let H = {
    phase: 'lobby',              // lobby|trading|corner|gameover
    players: [],                 // [{id,name,color,hand:[],offer:null,score:0,trades:0,corners:0,lastDelta:0}]
    settings: { bullBear: false, winScore: 500, autoMatch: true },
    round: 0,
    feed: [],                    // last 12 [{id,t,...}]
    tradeCount: 0,
    biggestTrade: null,          // {a,b,count}
    lastCorner: null,            // {name,color,commodity,pts,kind,penalties:[{name,amount}]}
    winner: null, stats: null,
};
let _feedSeq = 0;
function feedPush(ev) {
    ev.id = ++_feedSeq;
    H.feed.push(ev);
    if (H.feed.length > 12) H.feed.shift();
}

// ═══════════════════════════════════════════
// NETWORK
// ═══════════════════════════════════════════
function send(conn, msg) { try { conn.send(msg); } catch (e) { console.warn('send err', e); } }
function broadcastViewers(msg) { Object.values(viewerConns).forEach(c => send(c, msg)); }
function connectedPlayers() {
    return H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
}

function hostAddPlayer(id, name) {
    if (H.players.find(p => p.id === id) || H.players.length >= MAX_PLAYERS) return;
    H.players.push({
        id, name, color: PLAYER_COLORS[H.players.length % PLAYER_COLORS.length],
        hand: [], offer: null, score: 0, trades: 0, corners: 0, lastDelta: 0,
    });
}

function lobbyMsg() {
    return {
        type: 'lobby', roomCode,
        players: H.players.map(p => ({ name: p.name, color: p.color })),
        settings: { ...H.settings },
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function broadcastLobby() {
    H.players.forEach(p => { if (p.id !== myId && guestConns[p.id]) send(guestConns[p.id], lobbyMsg()); });
    broadcastViewers({ ...lobbyMsg(), type: 'viewer_lobby' });
    hostSyncSelf(lobbyMsg());
}

function bestCorner(hand) {
    const counts = {};
    hand.forEach(n => { if (!isSpecial(n)) counts[n] = (counts[n] || 0) + 1; });
    const hasBull = hand.includes('Bull');
    let best = null;
    for (const [name, count] of Object.entries(counts)) {
        const pts = commOf(name).pts;
        let opt = null;
        if (count >= 9) opt = hasBull ? { commodity: name, kind: 'double_bull', pts: pts * 2 } : { commodity: name, kind: 'standard', pts };
        else if (count === 8 && hasBull) opt = { commodity: name, kind: 'bull', pts };
        if (opt && (!best || opt.pts > best.pts)) best = opt;
    }
    return best;
}

function stateFor(p) {
    const corner = p && H.phase === 'trading' ? bestCorner(p.hand) : null;
    return {
        type: 'state',
        phase: H.phase, round: H.round, roomCode,
        winScore: H.settings.winScore, bullBear: H.settings.bullBear, autoMatch: H.settings.autoMatch,
        myHand: p ? sortHand(p.hand) : [],
        myOffer: p && p.offer ? { cards: p.offer.cards, count: p.offer.count } : null,
        canCorner: !!corner, cornerInfo: corner,
        myDelta: p ? p.lastDelta : 0,
        players: H.players.map((q, idx) => ({
            idx, name: q.name, color: q.color, score: q.score, cards: q.hand.length,
            offerCount: q.offer ? q.offer.count : 0, trades: q.trades, delta: q.lastDelta,
            me: !!(p && q.id === p.id),
        })),
        feed: H.feed.slice(-8),
        tradeCount: H.tradeCount,
        lastCorner: H.lastCorner, winner: H.winner, stats: H.stats,
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function viewerStateMsg() {
    return { ...stateFor(null), type: 'viewer_state', feed: H.feed.slice(-12) };
}
function broadcastState() {
    H.players.forEach(p => {
        if (p.id === myId) return;
        const conn = guestConns[p.id];
        if (conn) send(conn, stateFor(p));
    });
    broadcastViewers(viewerStateMsg());
    hostSyncSelf(isTvHost ? null : stateFor(H.players.find(p => p.id === myId)));
}

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            send(conn, H.phase === 'lobby' ? { ...lobbyMsg(), type: 'viewer_lobby' } : viewerStateMsg());
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const name = String(msg.name || 'Trader').slice(0, 16);
                const zombie = H.players.find(p => p.name === name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else hostAddPlayer(conn.peer, name);
                const p2 = H.players.find(p => p.id === conn.peer);
                if (!p2) { send(conn, lobbyMsg()); break; }         // room full
                if (H.phase === 'lobby') broadcastLobby();
                else { send(conn, stateFor(p2)); broadcastViewers(viewerStateMsg()); if (isTvHost) tvHostSync(); }
                break;
            }
            case 'offer':        if (player) hostOffer(player, msg.cards); break;
            case 'cancel_offer': if (player) hostCancelOffer(player); break;
            case 'trade_with':   if (player) hostTradeWith(player, msg.targetIdx, msg.cards); break;
            case 'corner':       if (player) hostCorner(player); break;
            case 'ctl': {
                if (!isTvHost || !player || player.id !== H.players[0]?.id) break;
                hostCtl(msg.action, msg);
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        }
    });
    conn.on('error', e => console.warn('conn err', e));
}

function hostCtl(action, msg) {
    if (action === 'start' && H.phase === 'lobby') hostStartRound(true);
    else if (action === 'next' && H.phase === 'corner') hostStartRound(false);
    else if (action === 'again' && H.phase === 'gameover') hostNewGame();
    else if (action === 'set' && H.phase === 'lobby') {
        if (typeof msg.bullBear === 'boolean') H.settings.bullBear = msg.bullBear;
        if (typeof msg.autoMatch === 'boolean') H.settings.autoMatch = msg.autoMatch;
        if ([300, 500, 750].includes(msg.winScore)) H.settings.winScore = msg.winScore;
        broadcastLobby();
    }
}
function guestCtl(action, extra) {
    if (isHost && !isTvHost) { hostCtl(action, extra || {}); return; }
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ── Create a room (phone host or TV host) ──
function makeRoom(onOpen) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(PFX + roomCode, ICE_CFG);
    peer.on('open', id => { myId = id; isHost = true; onOpen(); });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        isHost = false; isTvHost = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

function hostGame(name) {
    myName = name.trim().slice(0, 16) || 'Host';
    localStorage.setItem('pit-name', myName);
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        hostAddPlayer(myId, myName);
        ui = 'lobby_h';
        render();
    });
}

function hostOnTV() {
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        isTvHost = true;
        document.body.classList.add('viewer-mode');
        tvHostSync();
        render();
    });
}

// ── Guest ──
function joinGame(code, name) {
    myName = name.trim().slice(0, 16) || 'Trader';
    localStorage.setItem('pit-name', myName);
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        isHost = false;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join', name: myName }));
        hostConn.on('data', msg => applyMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the pit.'; ui = 'home'; D = null; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'home'; render();
    });
}

// ── Viewer (TV joining a phone-hosted game) ──
function joinAsViewer(code, _attempt) {
    const attempt = _attempt || 1;
    isViewer = true;
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join_viewer' }));
        hostConn.on('data', msg => applyViewerMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the pit.'; isViewer = false; vD = null; document.body.classList.remove('viewer-mode'); ui = 'home'; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; isViewer = false; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

// The TV-host mirrors authoritative state into its own viewer UI
function tvHostSync() {
    if (!isTvHost) return;
    applyViewerMsg(H.phase === 'lobby' ? { ...lobbyMsg(), type: 'viewer_lobby' } : viewerStateMsg());
}
// The phone-host applies its own broadcasts through the same client path as guests
function hostSyncSelf(msg) {
    if (isTvHost) { tvHostSync(); return; }
    if (isHost && msg) applyMsg(msg);
}

// ═══════════════════════════════════════════
// HOST GAME FLOW
// ═══════════════════════════════════════════
function activeCommodities() {
    const n = Math.max(MIN_PLAYERS, Math.min(H.players.length, MAX_PLAYERS));
    return COMMODITIES.slice(0, n);
}

function hostDeal() {
    const comms = activeCommodities();
    let deck = [];
    comms.forEach(c => { for (let i = 0; i < 9; i++) deck.push(c.name); });
    if (H.settings.bullBear) deck.push('Bull', 'Bear');
    deck = shuffle(deck);
    H.players.forEach(p => { p.hand = []; p.offer = null; p.lastDelta = 0; });
    let i = 0;
    deck.forEach(card => { H.players[i % H.players.length].hand.push(card); i++; });
}

function hostStartRound(fresh) {
    if (connectedPlayers().length < MIN_PLAYERS) { uiErr = 'Need at least ' + MIN_PLAYERS + ' traders.'; if (ui === 'lobby_h') render(); return; }
    if (fresh) {
        H.round = 0;
        H.tradeCount = 0; H.biggestTrade = null;
        H.players.forEach(p => { p.score = 0; p.trades = 0; p.corners = 0; });
        H.winner = null; H.stats = null; H.feed = [];
    }
    H.round += 1;
    H.lastCorner = null;
    hostDeal();
    H.phase = 'trading';
    feedPush({ t: 'round', round: H.round });
    broadcastState();
}

// ── Offers & trades ──
function removeCards(hand, cards) {
    // multiset removal; returns false if any card missing
    const h = hand.slice();
    for (const c of cards) {
        const i = h.indexOf(c);
        if (i < 0) return false;
        h.splice(i, 1);
    }
    hand.length = 0; hand.push(...h);
    return true;
}

function validBundle(hand, cards) {
    if (!Array.isArray(cards) || cards.length < 1 || cards.length > 4) return false;
    const h = hand.slice();
    for (const c of cards) {
        const i = h.indexOf(c);
        if (i < 0) return false;
        h.splice(i, 1);
    }
    const comms = [...new Set(cards.filter(c => !isSpecial(c)))];
    return comms.length <= 1;    // one commodity + any specials
}

// Shouting posts a standing offer (you're holding out your cards). With auto-match
// ON ("Frantic Floor") the first equal-count offer swaps instantly; with it OFF
// ("Open Outcry") offers stand until a trader taps a match — so several people can
// hold out the same number and you choose your partner (see hostTradeWith).
function hostOffer(player, cards) {
    if (H.phase !== 'trading' || !validBundle(player.hand, cards)) return;
    player.offer = { cards: cards.slice(), count: cards.length };
    if (H.settings.autoMatch) {
        const match = H.players.find(q => q.id !== player.id && q.offer && q.offer.count === player.offer.count);
        if (match) { executeTrade(player, match); return; }
    }
    broadcastState();
}

// You picked a specific trader who's holding out the same number → blind swap.
// No refusal: their standing offer is a commitment to swap that count with
// whoever completes it first.
function hostTradeWith(me, targetIdx, cards) {
    if (H.phase !== 'trading') return;
    const target = H.players[targetIdx];
    if (!target || target.id === me.id || !target.offer) return;
    // use my standing offer if I have one, else the cards I sent
    const give = (me.offer ? me.offer.cards : cards) || [];
    if (give.length !== target.offer.count || !validBundle(me.hand, give)) return;
    me.offer = { cards: give.slice(), count: give.length };
    executeTrade(me, target);
}

function hostCancelOffer(player) {
    if (!player.offer) return;
    player.offer = null;
    broadcastState();
}

function executeTrade(a, b) {
    const aCards = a.offer.cards, bCards = b.offer.cards;
    if (!removeCards(a.hand, aCards) || !removeCards(b.hand, bCards)) { a.offer = null; b.offer = null; broadcastState(); return; }
    a.hand.push(...bCards);
    b.hand.push(...aCards);
    a.offer = null; b.offer = null;
    a.trades++; b.trades++;
    H.tradeCount++;
    const count = aCards.length;
    if (!H.biggestTrade || count > H.biggestTrade.count) H.biggestTrade = { a: a.name, b: b.name, count };
    feedPush({ t: 'trade', a: a.name, ac: a.color, b: b.name, bc: b.color, count });
    [a, b].forEach(p => {
        if (p.id === myId) { if (isHost && !isTvHost) tradeFlash(count); }
        else { const c = guestConns[p.id]; if (c) send(c, { type: 'traded', count }); }
    });
    broadcastState();
}

// ── Corner ──
function hostCorner(player) {
    if (H.phase !== 'trading') return;
    const corner = bestCorner(player.hand);
    if (!corner) return;
    player.score += corner.pts;
    player.corners++;
    player.lastDelta = corner.pts;
    const penalties = [];
    H.players.forEach(q => {
        if (q.id === player.id) { return; }
        let pen = 0;
        q.hand.forEach(c => { if (isSpecial(c)) pen += PENALTY; });
        q.lastDelta = -pen;
        if (pen) { q.score -= pen; penalties.push({ name: q.name, amount: pen }); }
    });
    H.players.forEach(q => { q.offer = null; });
    H.lastCorner = {
        name: player.name, color: player.color,
        commodity: corner.commodity, pts: corner.pts, kind: corner.kind, penalties,
    };
    feedPush({ t: 'corner', name: player.name, color: player.color, commodity: corner.commodity, pts: corner.pts });
    if (player.score >= H.settings.winScore) {
        H.phase = 'gameover';
        H.winner = player.name;
        const most = k => H.players.slice().sort((x, y) => y[k] - x[k])[0];
        H.stats = {
            trades: { name: most('trades').name, n: most('trades').trades },
            corners: { name: most('corners').name, n: most('corners').corners },
            biggest: H.biggestTrade,
            totalTrades: H.tradeCount,
        };
    } else {
        H.phase = 'corner';
    }
    broadcastState();
}

function hostNewGame() {
    H.phase = 'lobby';
    H.round = 0; H.lastCorner = null; H.winner = null; H.stats = null; H.feed = [];
    H.tradeCount = 0; H.biggestTrade = null;
    H.players.forEach(p => { p.hand = []; p.offer = null; p.score = 0; p.trades = 0; p.corners = 0; p.lastDelta = 0; });
    H.players = H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
    broadcastLobby();
    if (isHost && !isTvHost) { ui = 'lobby_h'; render(); }
}

function hostSet(patch) {
    Object.assign(H.settings, patch);
    broadcastLobby();
    if (ui === 'lobby_h') render();
}

// ═══════════════════════════════════════════
// CLIENT (phone) MESSAGE HANDLING
// ═══════════════════════════════════════════
function standingsOf(players) {
    return players.slice().sort((a, b) => b.score - a.score);
}

function applyMsg(msg) {
    switch (msg.type) {
        case 'lobby': {
            const prevN = D && D.type === 'lobby' ? (D.players || []).length : -1;
            D = msg;
            selection.clear(); _prevHandKey = '';
            ui = (isHost && !isTvHost) ? 'lobby_h' : 'lobby_g';
            setMusic('lobby');
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            render();
            break;
        }
        case 'traded':
            tradeFlash(msg.count);
            break;
        case 'state': {
            const prev = D;
            D = msg;
            if (msg.phase === 'trading') {
                setMusic('trading');
                const newRound = !prev || prev.phase !== 'trading' || prev.round !== msg.round;
                const handKey = msg.myHand.join('|');
                if (newRound) {
                    selection.clear(); _prevHandKey = handKey;
                    ui = 'game';
                    render();
                    showOpeningBell(msg.round);
                } else if (ui === 'game') {
                    if (handKey !== _prevHandKey) {
                        // A Bull/Bear just slipped into the hand mid-trade → uh-oh sting
                        const prevSp = prev && prev.myHand ? prev.myHand.filter(isSpecial).length : 0;
                        if (msg.myHand.filter(isSpecial).length > prevSp) sSpecial();
                        selection.clear(); _prevHandKey = handKey; render();
                    }
                    else patchGame(msg);
                } else { ui = 'game'; _prevHandKey = handKey; render(); }
            } else if (msg.phase === 'corner') {
                if (ui !== 'corner') {
                    selection.clear();
                    ui = 'corner';
                    setMusic('corner');
                    render();
                    sBell(3);
                    if (msg.myDelta > 0) {
                        startConfetti(2400);
                        paperStorm(30);
                        burst(innerWidth / 2, innerHeight * 0.3, ['#fbbf24', '#fcd34d', '#fff7ed', '#4ade80'], 24);
                        popText(innerWidth / 2, innerHeight * 0.26, '+' + msg.myDelta, 'gold');
                        try { navigator.vibrate && navigator.vibrate([90, 40, 90, 40, 220]); } catch (e) {}
                    }
                    else if (msg.myDelta < 0) {
                        sBuzz();
                        popText(innerWidth / 2, innerHeight * 0.3, msg.myDelta + ' 🐻', 'bad');
                    }
                } else render();
            } else if (msg.phase === 'gameover') {
                if (ui !== 'gameover') {
                    ui = 'gameover';
                    setMusic('over');
                    render();
                    sWin(); startConfetti(3800); paperStorm(44);
                } else render();
            } else render();
            updateMusicMood(msg);
            break;
        }
    }
}

function tradeFlash(count) {
    sTrade(count);
    try { navigator.vibrate && navigator.vibrate(60); } catch (e) {}
    // floating toast — reserves no layout space (no dead gap in the hand view)
    const t = document.createElement('div');
    t.className = 'trade-toast';
    t.textContent = '🤝 Traded ' + count + '!';
    document.body.appendChild(t);
    const r = t.getBoundingClientRect();
    burst(r.left + r.width / 2, r.top + r.height / 2, ['#fbbf24', '#22d3ee', '#4ade80'], 12);
    setTimeout(() => t.remove(), 1500);
}

// opening-bell countdown overlay (non-blocking)
function showOpeningBell(round) {
    if (REDUCED) { sBell(2); sRoar(1.2); return; }
    const ov = document.createElement('div');
    ov.id = 'count-ov';
    document.body.appendChild(ov);
    const steps = ['3', '2', '1', '🔔'];
    let i = 0;
    const step = () => {
        if (i >= steps.length) { ov.remove(); return; }
        ov.innerHTML = `<div class="n">${steps[i]}</div><div class="lbl">Round ${round} — trade!</div>`;
        if (steps[i] === '🔔') { sBell(2); sRoar(1.3); } else sCount(i);
        i++;
        setTimeout(step, i === steps.length ? 700 : 750);
    };
    step();
}

// ── selection & actions ──
function selInfo() {
    const cards = [...selection].map(i => D.myHand[i]);
    const comms = [...new Set(cards.filter(c => !isSpecial(c)))];
    return { cards, valid: cards.length >= 1 && cards.length <= 4 && comms.length <= 1, comm: comms[0] || null };
}

function toggleCard(i) {
    if (!D || D.phase !== 'trading' || D.myOffer) return;
    if (selection.has(i)) selection.delete(i);
    else {
        if (selection.size >= 4) return;
        const name = D.myHand[i];
        if (!isSpecial(name)) {
            const { comm } = selInfo();
            if (comm && comm !== name) return;   // one commodity at a time
        }
        selection.add(i);
    }
    sSelect(selection.size);
    patchHandSelection();
    patchShoutBar();
    patchScoresStrip();
}

function shout() {
    const { cards, valid } = selInfo();
    if (!valid) return;
    sShout(cards.length);
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostOffer(me, cards);
    } else send(hostConn, { type: 'offer', cards });
    selection.clear();
}

function cancelShout() {
    sCancel();
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostCancelOffer(me);
    } else send(hostConn, { type: 'cancel_offer' });
}

function ringBell() {
    sSelect(4);
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostCorner(me);
    } else send(hostConn, { type: 'corner' });
}

// Pick a specific trader who's shouting your number → blind swap with them.
// Uses your standing offer's cards if you've shouted, else your selection.
function myTradeCards() {
    if (D && D.myOffer) return D.myOffer.cards.slice();
    const { cards, valid } = selInfo();
    return valid ? cards : null;
}
function tradeWithPlayer(idx) {
    if (!D || D.phase !== 'trading') return;
    const cards = myTradeCards();
    const target = (D.players || []).find(p => p.idx === idx);
    if (!cards || !target || target.me || !target.offerCount || target.offerCount !== cards.length) return;
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostTradeWith(me, idx, cards);
    } else send(hostConn, { type: 'trade_with', targetIdx: idx, cards });
    selection.clear();
}

// ── patching (never re-render the hand mid-selection) ──
function patchGame(msg) {
    const strip = $id('scores-strip');
    if (strip) strip.innerHTML = scoresStripHTML(msg);
    const off = $id('offer-zone');
    if (off) off.innerHTML = offerZoneHTML(msg);
    const feed = $id('feed');
    if (feed) feed.innerHTML = feedHTML(msg.feed);
    const cw = $id('corner-wrap');
    if (cw) cw.innerHTML = cornerBtnHTML(msg);
    patchHandOffered(msg);
}
// re-render the strip so offering chips light up as tappable "trade" targets
// the moment my selection matches their number
function patchScoresStrip() {
    const strip = $id('scores-strip');
    if (strip && D) strip.innerHTML = scoresStripHTML(D);
}

function patchHandSelection() {
    document.querySelectorAll('.hand-grid .pcard').forEach((el, i) => {
        el.classList.toggle('sel', selection.has(i));
    });
}
function patchShoutBar() {
    const sb = $id('shout-zone');
    if (sb) sb.innerHTML = shoutBarHTML();
}
function patchHandOffered(msg) {
    const offered = msg.myOffer ? msg.myOffer.cards.slice() : [];
    document.querySelectorAll('.hand-grid .pcard').forEach((el, i) => {
        const name = msg.myHand[i];
        const oi = offered.indexOf(name);
        const inOffer = oi >= 0;
        if (inOffer) offered.splice(oi, 1);
        el.classList.toggle('inoffer', inOffer);
    });
}

// ═══════════════════════════════════════════
// VIEWER (TV) MESSAGE HANDLING
// ═══════════════════════════════════════════
function applyViewerMsg(msg) {
    document.body.classList.add('viewer-mode');
    ui = 'viewer';
    const prev = vD;
    vD = msg;
    if (msg.type === 'viewer_lobby') {
        setMusic('lobby');
        if (prev && prev.type === 'viewer_lobby' && (msg.players || []).length > (prev.players || []).length) sJoin();
        render();
        return;
    }
    // viewer_state
    if (msg.phase === 'trading') {
        setMusic('trading');
        const newRound = !prev || prev.type !== 'viewer_state' || prev.phase !== 'trading' || prev.round !== msg.round;
        if (newRound) { render(); sBell(1); sRoar(1.3); }
        else {
            const traded = prev && msg.tradeCount > (prev.tradeCount || 0);
            if (traded) sTick();
            patchViewer(msg);
            if (traded) {
                const tr = [...(msg.feed || [])].reverse().find(e => e.t === 'trade');
                if (tr) flyTradeSlips(tr.a, tr.b, tr.count);
            }
        }
    } else if (msg.phase === 'corner') {
        if (!prev || prev.phase !== 'corner') {
            setMusic('corner');
            render();
            sBell(3);
            paperStorm(56);
            // gold burst shower behind the bell
            for (let i = 0; i < 3; i++)
                setTimeout(() => burst(innerWidth * (0.3 + Math.random() * 0.4), innerHeight * (0.2 + Math.random() * 0.3),
                    ['#fbbf24', '#fcd34d', '#fff7ed'], 18), i * 220);
        }
        else render();
    } else if (msg.phase === 'gameover') {
        if (!prev || prev.phase !== 'gameover') { setMusic('over'); render(); sWin(); startConfetti(5200); paperStorm(72); }
        else render();
    } else render();
    updateMusicMood(msg);
}

function patchViewer(msg) {
    const floor = $id('v-floor');
    if (floor) floor.innerHTML = tvTradersHTML(msg);
    const feed = $id('v-feed');
    if (feed) feed.innerHTML = feedHTML(msg.feed, true);
    const tc = $id('v-trades');
    if (tc) tc.textContent = msg.tradeCount;
}

function hdrHTML(sub) {
    return `<h1 class="logo">🔔 PIT!</h1><div class="sub">${esc(sub || 'corner the market · ring the bell')}</div>`;
}
function joinURL() { return location.origin + location.pathname + '?room=' + roomCode; }
function isCaptain() { return !!(D && D.tvHost && D.captain && D.captain === myName); }
function canDrive() { return (isHost && !isTvHost) || isCaptain(); }
function kindLabel(kind) {
    return kind === 'double_bull' ? '🐂🐂 DOUBLE BULL ×2' : kind === 'bull' ? '🐂 BULL CORNER' : '';
}

function settingsSegsHTML(settings, expr) {
    const seg = (opts, curV, key) => `<div class="seg-row">${opts.map(o =>
        `<button class="btn btn-sm ${curV === o.v ? 'btn-p' : 'btn-g'}" onclick="${expr(`{${key}:${o.j}}`)}">${o.l}</button>`).join('')}</div>`;
    return `
        <div class="fg"><label>Trading style</label>${seg(
            [{ v: true, j: 'true', l: '⚡ Frantic (auto-match)' }, { v: false, j: 'false', l: '✋ Open outcry (pick)' }], settings.autoMatch !== false, 'autoMatch')}</div>
        <div class="fg"><label>Bull &amp; Bear cards</label>${seg(
            [{ v: false, j: 'false', l: 'Off' }, { v: true, j: 'true', l: '🐂🐻 On (−20 traps)' }], settings.bullBear, 'bullBear')}</div>
        <div class="fg"><label>Win score</label>${seg(
            [300, 500, 750].map(v => ({ v, j: v, l: v })), settings.winScore, 'winScore')}</div>`;
}

function scoresStripHTML(msg) {
    // my tradeable count = my standing offer, else my current valid selection
    const myCount = (D && D.myOffer) ? D.myOffer.count : (selInfo().valid ? selInfo().cards.length : 0);
    return standingsOf(msg.players).map(p => {
        const offering = p.offerCount > 0;
        const canTrade = offering && !p.me && myCount && p.offerCount === myCount;
        const cls = `sc-chip${offering ? ' offering' : ''}${canTrade ? ' cantrade' : ''}`;
        const tap = canTrade ? ` role="button" tabindex="0" onclick="tradeWithPlayer(${p.idx})"` : '';
        const shout = offering
            ? `<span class="shout">${handSigHTML(p.offerCount)} ${canTrade ? '🤝 trade ' + p.offerCount + '!' : 'shouting ' + p.offerCount + '!'}</span>`
            : `<span style="color:var(--muted)">${p.cards}🂠</span>`;
        return `<div class="${cls}"${tap}>
            <span class="pdot" style="background:${p.color};color:${p.color}"></span>
            ${badgeHTML(p.name)} ${esc(p.name)} <b>${p.score}</b>${shout}
        </div>`;
    }).join('');
}

function feedHTML(feed, tv) {
    const rows = (feed || []).slice().reverse().map(ev => {
        if (ev.t === 'trade') return `<div class="${tv ? 'frow' : 'feed-row'}">🤝 <b>${esc(ev.a)}</b> ⇄ <b>${esc(ev.b)}</b> — ${ev.count} card${ev.count > 1 ? 's' : ''}</div>`;
        if (ev.t === 'corner') return `<div class="${tv ? 'frow' : 'feed-row'} hot">🔔 <b>${esc(ev.name)}</b> corners ${esc(ev.commodity.toUpperCase())} +${ev.pts}</div>`;
        if (ev.t === 'round') return `<div class="${tv ? 'frow' : 'feed-row'} hot">🔔 Round ${ev.round} — the pit is open!</div>`;
        return '';
    }).join('');
    return rows || `<div class="${tv ? 'frow' : 'feed-row'}">Waiting for the first trade…</div>`;
}

function standingsHTML(players, deltas) {
    const medals = ['🥇', '🥈', '🥉'];
    const st = standingsOf(players);
    const ranks = rankByScore(st, 'score');
    return `<div class="card standings"><div class="slbl">Scores</div>${
        st.map((p, i) => `
        <div class="player-row" style="--i:${i}">
            <span style="width:22px;text-align:center">${medals[ranks[i]] || (ranks[i] + 1)}</span>
            <span class="pdot" style="background:${p.color};color:${p.color}"></span>
            ${badgeHTML(p.name)}
            <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}${p.name === myName ? ' <span style="color:var(--gold)">(you)</span>' : ''}</div>
            <div class="sc">${p.score}${deltas && p.delta ? `<span class="delta ${p.delta > 0 ? 'plus' : 'minus'}">${p.delta > 0 ? '+' : ''}${p.delta}</span>` : ''}</div>
        </div>`).join('')
    }</div>`;
}

// ═══════════════════════════════════════════
// RENDER — phone screens
// ═══════════════════════════════════════════
let _lastUi = '', _lastVPhase = '';
function render() {
    const app = $id('app');
    if (isTvHost || isViewer) ui = 'viewer';
    // 'fresh' marks a real screen/phase change → entrance animations run once,
    // never on same-screen re-renders (joins, hand changes, feed updates)
    const vp = ui === 'viewer' ? (vD ? (vD.type === 'viewer_lobby' ? 'lobby' : (vD.phase || '')) : '') : '';
    const fresh = ui !== _lastUi || vp !== _lastVPhase;
    _lastUi = ui; _lastVPhase = vp;
    let html = '';
    switch (ui) {
        case 'home':       html = renderHome(); break;
        case 'creating':   html = renderSpinner('Opening the pit…'); break;
        case 'connecting': html = renderSpinner('Joining the pit…'); break;
        case 'lobby_h':    html = renderLobbyH(); break;
        case 'lobby_g':    html = renderLobbyG(); break;
        case 'game':       html = renderGame(); break;
        case 'corner':     html = renderCorner(); break;
        case 'gameover':   html = renderGameover(); break;
        case 'viewer':     html = renderViewer(); break;
        default:           html = renderHome();
    }
    app.innerHTML = html;
    app.classList.toggle('fresh', fresh);
}

function renderSpinner(msg) {

}

    if (!msg.myOffer) return '';

    <div class="offer-banner">${handSigHTML(n, 'big')} You're shouting “${n}! ${n}! ${n}!” — ${wait}</div>
    <button class="btn btn-g btn-full" style="margin-top:9px" onclick="cancelShout()">🤫 Stop shouting</button>`;
}


function handCardHTML(name, i) {
    const c = commOf(name);
    const big = isSpecial(name) ? SPECIALS[name].emoji : name[0];
    return `<button class="pcard${selection.has(i) ? ' sel' : ''}" style="${cardStyle(name)};--i:${i}" onclick="toggleCard(${i})">
        <span class="big">${big}</span><span class="nm">${esc(name)}</span><span class="pt">${isSpecial(name) ? '−20 trap' : c.pts + ' pts'}</span>
    </button>`;
}

function renderGame() {
    return `
    <div class="scores-strip" id="scores-strip">${scoresStripHTML(D)}</div>
    <div class="card">
        <div class="slbl">Your hand — round ${D.round} · first to ${D.winScore}</div>
        <div class="hand-grid">${D.myHand.map((n, i) => handCardHTML(n, i)).join('')}</div>
    </div>
    <div class="card">
        <div class="slbl">Pit floor — ${'🤝 '}<span id="trade-count">${D.tradeCount}</span> trades</div>
        <div class="feed" id="feed">${feedHTML(D.feed)}</div>
    </div>
    <div class="game-actions">
        <div id="corner-wrap">${cornerBtnHTML(D)}</div>
        <div id="shout-zone">${shoutBarHTML()}</div>
        <div id="offer-zone">${offerZoneHTML(D)}</div>
    </div>`;
}

function renderCorner() {
    const lc = D.lastCorner || {};
    const mine = lc.name === myName;
    const pens = (lc.penalties || []).map(p =>
        `<span class="chip pen">🐻 ${esc(p.name)} −${p.amount}</span>`).join('');
    const driveBtn = canDrive()
        ? `<button class="btn btn-up btn-full" style="font-size:1.02rem;padding:15px" onclick="guestCtl('next')">🔔 Next round</button>`
        : `<div style="text-align:center;color:var(--muted);font-size:.72rem;font-weight:700">${D.tvHost ? `👑 ${esc(D.captain || '')} starts the next round` : 'The host starts the next round'}…</div>`;
    return `
    <div class="card bell-card${mine ? ' highlight' : ''}">
        <div class="bell">🔔</div>
        <div class="ct">${mine ? 'YOU CORNERED IT!' : esc((lc.name || '').toUpperCase()) + ' CORNERS!'}</div>
        <div style="font-weight:800;color:var(--gold);margin-top:4px">${esc((lc.commodity || '').toUpperCase())} ${lc.kind && lc.kind !== 'standard' ? '· ' + kindLabel(lc.kind) : ''}</div>
        <div class="cpts">+${lc.pts || 0}</div>
        ${D.myDelta < 0 ? `<div class="chip pen" style="margin-top:8px">You were caught with specials: ${D.myDelta}</div>` : ''}
        ${pens ? `<div style="margin-top:8px">${pens}</div>` : ''}
    </div>
    ${standingsHTML(D.players, true)}
    ${driveBtn}`;
}

function renderGameover() {
    const st = standingsOf(D.players);
    const s = D.stats || {};
    const awards = [
        s.corners ? `<span class="chip">🔔 Bell ringer: ${esc(s.corners.name)} (${s.corners.n})</span>` : '',
        s.trades ? `<span class="chip">🤝 Most trades: ${esc(s.trades.name)} (${s.trades.n})</span>` : '',
        s.biggest ? `<span class="chip">💼 Biggest swap: ${esc(s.biggest.a)} ⇄ ${esc(s.biggest.b)} (${s.biggest.count})</span>` : '',
    ].join('');
    const driveBtn = canDrive()
        ? `<button class="btn btn-p btn-full" style="font-size:1.02rem;padding:15px" onclick="guestCtl('again')">🔁 Play again</button>` : '';
    return `
    ${hdrHTML('Market closed!')}
    <div class="card bell-card highlight">
        <div class="bell">🏆</div>
        <div class="ct">${D.winner === myName ? 'YOU WIN!' : esc((D.winner || '').toUpperCase()) + ' WINS!'}</div>
        <div style="margin-top:10px">${awards}</div>
        <div style="color:var(--muted);font-size:.72rem;font-weight:700;margin-top:8px">${s.totalTrades || 0} trades this game</div>
    </div>
    ${standingsHTML(D.players)}
    ${driveBtn}`;
}

// ═══════════════════════════════════════════
// RENDER — TV screens
// ═══════════════════════════════════════════
function tvShell(inner, meta, ticker) {
    return `<div class="tv">
        ${pitCrowdHTML()}
        <div class="tv-top">
            <div class="tv-logo">🔔 PIT! — TRADING FLOOR</div>
            <div class="tv-meta">${esc(meta || ('Room ' + (vD.roomCode || roomCode || '')))}</div>
        </div>
        ${inner}
        ${ticker ? tickerHTML() : ''}
    </div>`;
}

function tickerHTML() {
    const n = Math.max(MIN_PLAYERS, Math.min((vD.players || []).length, MAX_PLAYERS));
    const comms = COMMODITIES.slice(0, n);
    const one = comms.map((c, i) =>
        `<span class="tk" style="color:${c.bg === '#7c2d12' || c.bg === '#b45309' ? '#f8b26a' : c.fg}">${c.name.toUpperCase()} <span class="${i % 2 ? 'dn' : 'up'}">${i % 2 ? '▼' : '▲'} ${c.pts}</span></span>`).join('') +
        (vD.bullBear ? `<span class="tk">🐂 BULL</span><span class="tk">🐻 BEAR −20</span>` : '') +
        `<span class="tk" style="color:var(--gold)">FIRST TO ${vD.winScore || ''} WINS</span>`;
    return `<div class="ticker"><div class="ticker-inner">${one}${one}</div></div>`;
}

function renderViewer() {
    if (!vD) return renderSpinner('Waiting for the pit…');
    if (vD.type === 'viewer_lobby') return renderViewerLobby();
    if (vD.phase === 'trading') return renderViewerTrading();
    if (vD.phase === 'corner') return renderViewerCorner();
    if (vD.phase === 'gameover') return renderViewerPodium();
    return renderSpinner('Waiting for the pit…');
}

function renderViewerLobby() {
    const s = vD.settings || {};
    return tvLobby({
        title: 'PIT!',
        accent: '#fbbf24',
        roomCode: vD.roomCode,
        isTvHost: vD.tvHost,
        captainName: vD.captain,
        settings: `🎯 first to ${s.winScore} · 🐂🐻 ${s.bullBear ? 'on' : 'off'}`,
        players: (vD.players || []).map(p => ({ name: p.name, color: p.color, captain: p.name === vD.captain })),
    });
}

function tvTradersHTML(msg) {
    return standingsOf(msg.players).map(p => `
        <div class="tv-trader" data-name="${esc(p.name)}">
            <span class="tdot" style="background:${p.color};color:${p.color}"></span>
            <div style="min-width:0">
                <div class="tname">${badgeHTML(p.name, 'ontv')} ${esc(p.name)}</div>
                <div class="tcards">${p.cards} cards · ${p.trades} trades</div>
            </div>
            ${p.offerCount ? `<span class="tsig">${handSigHTML(p.offerCount, 'ontv')}</span><span class="tpill">${p.offerCount}!</span>` : ''}
            <span class="tscore">${p.score}</span>
        </div>`).join('');
}

function renderViewerTrading() {
    return tvShell(`
    <div class="tv-main">
        <div class="tv-floor" id="v-floor">${tvTradersHTML(vD)}</div>
        <div class="tv-side">
            <div class="tv-panel">
                <div class="ptitle">Trades this game</div>
                <div class="tv-bigstat"><span id="v-trades">${vD.tradeCount}</span><small>shout a number, match a bundle</small></div>
            </div>
            <div class="tv-panel tv-feed">
                <div class="ptitle">Pit floor</div>
                <div class="rows" id="v-feed">${feedHTML(vD.feed, true)}</div>
            </div>
        </div>
    </div>`, `Round ${vD.round} · first to ${vD.winScore}`, true);
}

function renderViewerCorner() {
    const lc = vD.lastCorner || {};
    const pens = (lc.penalties || []).map(p => `<span class="chip pen">🐻 ${esc(p.name)} −${p.amount}</span>`).join('');
    const lead = standingsOf(vD.players).map(p =>
        `<div class="rail-chip"><span class="pdot" style="background:${p.color};color:${p.color}"></span>${badgeHTML(p.name, 'ontv')} ${esc(p.name)}<span class="sc">${p.score}</span>${p.delta ? `<span style="color:${p.delta > 0 ? 'var(--up)' : 'var(--down)'};font-size:1.5vmin">${p.delta > 0 ? '+' : ''}${p.delta}</span>` : ''}</div>`).join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Captain')}: “Next round” is on your phone` : 'Host: “Next round” is on your phone';
    return tvShell(`
    <div class="tv-bell">
        <div class="bell">🔔</div>
        <div class="who" style="color:${lc.color || 'var(--gold)'}">${esc((lc.name || '').toUpperCase())} CORNERS ${esc((lc.commodity || '').toUpperCase())}!</div>
        <div class="what">+${lc.pts || 0} ${lc.kind && lc.kind !== 'standard' ? '· ' + kindLabel(lc.kind) : ''}</div>
        ${pens ? `<div class="pens">${pens}</div>` : ''}
        <div class="tv-lead">${lead}</div>
        <div class="tv-waiting">${hint}</div>
    </div>`, `Round ${vD.round}`);
}

function renderViewerPodium() {
    const st = standingsOf(vD.players);
    const medals = ['🥇', '🥈', '🥉'];
    const ranks = rankByScore(st, 'score');   // ties share a place → joint medals
    const wm = st.map((p, i) => ({ ...p, medal: medals[ranks[i]] || '', mr: ranks[i] }));
    const podOrder = [wm[1], wm[0], wm[2]].filter(Boolean);
    const cls = st.length >= 3 ? ['p2', 'p1', 'p3'] : (st.length === 2 ? ['p2', 'p1'] : ['p1']);
    const pods = podOrder.map((p, i) => `
        <div class="pod ${cls[i]} mrank-${Math.min(p.mr, 2)}" style="animation-delay:${i * 0.18}s">
            <div class="pname"><span class="pdot" style="background:${p.color};color:${p.color};display:inline-block;vertical-align:middle;margin-right:.6vmin"></span>${badgeHTML(p.name, 'ontv')} ${esc(p.name)}</div>
            <div class="pscore">${p.score} pts</div>
            <div class="block">${p.medal}</div>
        </div>`).join('');
    const s = vD.stats || {};
    const awards = [
        s.corners ? `<div class="award">🔔 <span class="aw-t">Bell ringer</span><br>${esc(s.corners.name)} — ${s.corners.n} corner${s.corners.n === 1 ? '' : 's'}</div>` : '',
        s.trades ? `<div class="award">🤝 <span class="aw-t">Most trades</span><br>${esc(s.trades.name)} — ${s.trades.n}</div>` : '',
        s.biggest ? `<div class="award">💼 <span class="aw-t">Biggest swap</span><br>${esc(s.biggest.a)} ⇄ ${esc(s.biggest.b)} — ${s.biggest.count} cards</div>` : '',
    ].join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Captain')}: “Play again” is on your phone` : 'Host: “Play again” is on your phone';
    return tvShell(`
    <div class="tv-main" style="flex-direction:column">
        <div class="podium-wrap">${pods}</div>
        <div class="awards-row">${awards}</div>
        <div class="tv-waiting" style="text-align:center;padding-bottom:1.5vmin">${hint}</div>
    </div>`, '🏆 Market closed');
}

// ═══════════════════════════════════════════
// SIMULATION MODES — ?mode=tvsimulation | playersimulation  (&players=N)
// Self-driving demos with no PeerJS and no real people. Bots are counted as
// "connected" via stub guestConns so the normal host flow drives everything.
//   • tvsimulation     — watch the big-screen TRADING FLOOR play itself
//   • playersimulation — watch a phone TRADER play itself (your hand, your
//     SHOUT with hand signals, your pulsing CORNER button)
// (?mode=simulation stays as an alias for tvsimulation.)
// ═══════════════════════════════════════════
let simTimer = null, simMode = 'tv';
const SIM_NAMES = ['Ace', 'Bux', 'Cash', 'Duke', 'Edie', 'Fox', 'Gwen', 'Hawk'];

function startSimulation(nPlayers, mode) {
    simMode = mode === 'player' ? 'player' : 'tv';
    roomCode = 'DEMO';
    H.settings.bullBear = true;
    H.settings.winScore = 300;
    H.settings.autoMatch = false;   // showcase the "Open outcry" pick-your-trade flow
    H.players = []; guestConns = {}; viewerConns = {};
    const n = Math.max(MIN_PLAYERS, Math.min(nPlayers || 4, MAX_PLAYERS));
    if (simMode === 'tv') {
        isHost = true; isTvHost = true; myId = '__sim_host__';
        document.body.classList.add('viewer-mode');
    } else {
        isHost = true; isTvHost = false; myName = 'You'; myId = '__you__';
        hostAddPlayer(myId, myName);                 // you are trader #1 (the host)
    }
    for (let i = H.players.length; i < n; i++) {
        const id = '__bot_' + i;
        hostAddPlayer(id, SIM_NAMES[i % SIM_NAMES.length]);
        guestConns[id] = { peer: id, send() {} };    // stub so bots count as present
    }
    broadcastLobby();                                // show the lobby first
    simTimer = setTimeout(() => simRound(true), 2400);
}

function simRound(fresh) {
    hostStartRound(fresh);                            // deal + phase 'trading' + bell/roar
    let ticks = 9 + Math.floor(Math.random() * 7);
    const step = () => {
        if (H.phase !== 'trading') return;
        simBotAction();
        if (simMode === 'player' && Math.random() < 0.55) simYouAction();
        if (--ticks > 0) simTimer = setTimeout(step, 650 + Math.random() * 450);
        else simTimer = setTimeout(simForceCorner, 1100);
    };
    // in player mode wait out the phone's 3-2-1 opening-bell overlay first
    simTimer = setTimeout(step, simMode === 'player' ? 3600 : 1500);
}

// A bot either completes a standing offer it can fulfil (tap-to-trade) or posts
// its own offer of the least-held commodity. Works with auto-match on or off.
function simBotAction() {
    const free = H.players.filter(p => !p.offer && !(simMode === 'player' && p.id === myId));
    if (!free.length) return;
    const bot = free[Math.floor(Math.random() * free.length)];
    const held = {};
    bot.hand.forEach(c => { if (!isSpecial(c)) held[c] = (held[c] || 0) + 1; });
    const names = Object.keys(held);
    if (!names.length) return;
    names.sort((a, b) => held[a] - held[b]);
    const dump = names[0], dumpMax = held[dump];
    const targets = H.players.filter(p => p.offer && p.id !== bot.id && p.offer.count <= dumpMax);
    if (targets.length && Math.random() < 0.75) {
        const t = targets[Math.floor(Math.random() * targets.length)];
        hostTradeWith(bot, H.players.indexOf(t), Array(t.offer.count).fill(dump));
    } else {
        const k = Math.min(dumpMax, 1 + Math.floor(Math.random() * 3));
        hostOffer(bot, Array(k).fill(dump));
    }
}

// You (phone demo): tap a couple of cards then SHOUT — through the real UI
// functions so the selection outline, ticker clicks and hand signal all animate
function simYouAction() {
    if (H.phase !== 'trading' || !D || D.myOffer) return;
    const hand = D.myHand || [];
    const held = {};
    hand.forEach((c, i) => { if (!isSpecial(c)) (held[c] = held[c] || []).push(i); });
    const names = Object.keys(held);
    if (!names.length) return;
    names.sort((a, b) => held[a].length - held[b].length);
    const idxs = held[names[0]].slice(0, 1 + Math.floor(Math.random() * 2));   // 1–2 cards
    selection.clear(); patchHandSelection(); patchShoutBar();
    idxs.forEach((idx, j) => setTimeout(() => { if (H.phase === 'trading') toggleCard(idx); }, j * 280));
    setTimeout(() => { if (selection.size && D && !D.myOffer) shout(); }, idxs.length * 280 + 520);
}

// Force a winning corner so the demo always resolves; sometimes a Bull corner,
// and drop a Bear on someone else to show the penalty. In player mode it's
// sometimes YOU — then the pulsing CORNER button shows before it's rung.
function simForceCorner() {
    if (H.phase !== 'trading') return;
    const comms = activeCommodities();
    const youMode = simMode === 'player';
    const me = H.players.find(x => x.id === myId);
    const p = (youMode && me && Math.random() < 0.5) ? me
        : H.players[Math.floor(Math.random() * H.players.length)];
    const comm = comms[Math.floor(Math.random() * comms.length)].name;
    const bull = H.settings.bullBear && Math.random() < 0.4;
    p.hand = bull ? [...Array(8).fill(comm), 'Bull'] : Array(9).fill(comm);
    if (H.settings.bullBear) {
        const other = H.players.filter(q => q.id !== p.id)[0];
        if (other) { const oc = comms[(comms.findIndex(c => c.name === comm) + 1) % comms.length].name; other.hand = [...Array(8).fill(oc), 'Bear']; }
    }
    if (youMode && p.id === myId) {
        broadcastState();                             // pulsing 🔔 CORNER button appears on the phone
        simTimer = setTimeout(() => { ringBell(); simAfterCorner(); }, 1500);
    } else {
        hostCorner(p);
        simAfterCorner();
    }
}

function simAfterCorner() {
    if (H.phase === 'gameover') simTimer = setTimeout(simRestart, 7000);
    else simTimer = setTimeout(() => simRound(false), 4200);
}

function simRestart() {
    hostNewGame();
    simTimer = setTimeout(() => simRound(true), 2600);
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
window.addEventListener('resize', () => {
    const cv = $id('confetti-cv');
    if (cv && _cf.running) { cv.width = innerWidth; cv.height = innerHeight; }
});

(function boot() {
    const params = new URLSearchParams(location.search);
    if (!musicOn) $id('tog-music').classList.add('off');
    if (!sfxOn) $id('tog-sfx').classList.add('off');
    const mode = (params.get('mode') || '').toLowerCase();
    const simPlayers = parseInt(params.get('players'), 10) || 4;
    if (mode === 'playersimulation') { startSimulation(simPlayers, 'player'); return; }
    if (mode === 'tvsimulation' || mode === 'simulation') { startSimulation(simPlayers, 'tv'); return; }
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    render();
})();
</script>
