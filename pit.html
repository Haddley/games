<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pit! — Trading Floor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2304070f' width='100' height='100' rx='20'/><text x='50' y='68' font-size='52' text-anchor='middle'>🔔</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #04070f; --panel: rgba(13,23,42,0.82); --panel2: rgba(20,33,58,0.9);
            --border: rgba(251,191,36,0.22); --border2: rgba(125,138,165,0.25);
            --text: #e6edf7; --muted: #7d8aa5;
            --gold: #fbbf24; --up: #22c55e; --down: #ef4444; --cyan: #22d3ee;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            padding: 26px 16px 48px; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 65% 45% at 50% -5%, rgba(251,191,36,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 8% 100%, rgba(34,197,94,0.08) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 95% 100%, rgba(239,68,68,0.07) 0%, transparent 65%),
                repeating-linear-gradient(0deg, transparent 0 34px, rgba(125,138,165,0.045) 34px 35px),
                repeating-linear-gradient(90deg, transparent 0 34px, rgba(125,138,165,0.045) 34px 35px);
        }
        body.viewer-mode { padding: 0; overflow: hidden; display: block; height: 100dvh; width: 100vw; }

        h1.logo {
            font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 3px;
            font-size: clamp(1.6rem, 7vw, 2.4rem); text-align: center; color: var(--gold);
            text-shadow: 0 0 26px rgba(251,191,36,.45);
        }
        .sub { color: var(--muted); font-size: .68rem; letter-spacing: 2.5px; text-transform: uppercase; margin: 7px 0 22px; text-align: center; }

        #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 13px; }
        body.viewer-mode #app { max-width: none; height: 100dvh; display: block; }

        .card {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 16px;
            padding: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 12px 34px rgba(0,0,0,.5);
        }
        .card.highlight { border-color: var(--gold); box-shadow: 0 0 26px rgba(251,191,36,.14), 0 12px 34px rgba(0,0,0,.5); }
        .slbl { font-size: .64rem; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 11px; }

        .fg { margin-bottom: 12px; }
        .fg label { display: block; font-size: .64rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        input[type=text] {
            width: 100%; padding: 12px 14px; font-family: inherit; font-size: 1rem; font-weight: 700;
            border: 2px solid var(--border2); border-radius: 11px; background: rgba(4,7,15,.7); color: var(--text);
            outline: none;
        }
        input[type=text]:focus { border-color: var(--gold); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit; font-weight: 800; font-size: .92rem; letter-spacing: .5px;
            padding: 13px 18px; border: none; border-radius: 13px; cursor: pointer;
            transition: transform .12s, filter .12s, opacity .12s; user-select: none; -webkit-user-select: none;
            color: var(--text);
        }
        .btn:active { transform: scale(.97); }
        .btn-p { background: linear-gradient(180deg, #fcd34d, #f59e0b); color: #2a1700; box-shadow: 0 5px 0 #92600a, 0 10px 22px rgba(251,191,36,.3); }
        .btn-p:active { box-shadow: 0 2px 0 #92600a; transform: translateY(3px); }
        .btn-up { background: linear-gradient(180deg, #34d399, #16a34a); color: #03210f; box-shadow: 0 5px 0 #0c5c28, 0 10px 22px rgba(34,197,94,.3); }
        .btn-up:active { box-shadow: 0 2px 0 #0c5c28; transform: translateY(3px); }
        .btn-g { background: rgba(125,138,165,.12); box-shadow: inset 0 0 0 2px var(--border2); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 8px 13px; font-size: .74rem; border-radius: 10px; }
        .btn:disabled { opacity: .4; cursor: default; }

        .err {
            background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.5); color: #fca5a5;
            padding: 11px 14px; border-radius: 12px; font-size: .8rem; font-weight: 700; text-align: center;
        }
        hr { border: none; border-top: 1px dashed var(--border2); margin: 13px 0; }

        .connecting { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 46px 0; color: var(--muted); font-weight: 700; }
        .spin { width: 34px; height: 34px; border-radius: 50%; border: 4px solid rgba(251,191,36,.15); border-top-color: var(--gold); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .player-row { display: flex; align-items: center; gap: 11px; padding: 8px 4px; border-bottom: 1px dashed var(--border2); font-weight: 700; font-size: .92rem; }
        .player-row:last-child { border-bottom: none; }
        .pdot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 10px currentColor; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--up); box-shadow: 0 0 8px var(--up); margin-left: auto; }
        .qr-wrap { width: min(210px, 58vw); margin: 6px auto 10px; border-radius: 13px; overflow: hidden; box-shadow: 0 8px 22px rgba(0,0,0,.4); }
        .qr-wrap svg { display: block; width: 100%; height: auto; }
        .room-code { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.2rem; letter-spacing: 11px; text-align: center; color: var(--gold); padding-left: 11px; text-shadow: 0 0 18px rgba(251,191,36,.4); }
        .share-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px; }
        .seg-row { display: flex; flex-wrap: wrap; gap: 7px; }

        /* ── phone: trading ── */
        .scores-strip { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; }
        .sc-chip {
            flex-shrink: 0; display: flex; align-items: center; gap: 6px;
            background: var(--panel); border: 1px solid var(--border2); border-radius: 11px;
            padding: 6px 10px; font-size: .7rem; font-weight: 800; white-space: nowrap;
        }
        .sc-chip .shout { color: var(--gold); }
        .hand-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .pcard {
            border: none; border-radius: 13px; padding: 10px 6px 9px; font-family: inherit;
            display: flex; flex-direction: column; align-items: center; gap: 1px; cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,.35), 0 8px 16px rgba(0,0,0,.35);
            transition: transform .1s, outline .1s, opacity .15s; position: relative;
        }
        .pcard .big { font-size: 1.5rem; font-weight: 800; line-height: 1.1; }
        .pcard .nm { font-size: .62rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
        .pcard .pt { font-size: .58rem; font-weight: 700; opacity: .8; }
        .pcard.sel { outline: 3px solid #fff; outline-offset: 2px; transform: translateY(-4px); }
        .pcard.dim { opacity: .35; }
        .pcard.inoffer { opacity: .45; }
        .pcard.inoffer::after { content: '📢'; position: absolute; top: 4px; right: 6px; font-size: .8rem; }
        .shout-bar { display: flex; gap: 9px; }
        .shout-bar .btn { flex: 1; font-size: 1.02rem; padding: 15px; }
        .offer-banner {
            text-align: center; background: rgba(251,191,36,.1); border: 1px solid var(--border);
            border-radius: 13px; padding: 11px; font-weight: 800; color: var(--gold);
            animation: shoutPulse 1.1s ease-in-out infinite;
        }
        @keyframes shoutPulse { 0%,100% { box-shadow: 0 0 0 rgba(251,191,36,0); } 50% { box-shadow: 0 0 22px rgba(251,191,36,.35); } }
        .btn-corner {
            width: 100%; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.15rem; letter-spacing: 2px;
            padding: 17px; border: none; border-radius: 15px; cursor: pointer;
            background: linear-gradient(180deg, #4ade80, #16a34a); color: #03210f;
            box-shadow: 0 0 0 rgba(34,197,94,.4); animation: cornerPulse 1s ease-in-out infinite;
        }
        @keyframes cornerPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
            50% { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
        }
        .feed { display: flex; flex-direction: column; gap: 5px; }
        .feed-row { font-size: .72rem; font-weight: 700; color: var(--muted); }
        .feed-row b { color: var(--text); }
        .feed-row.hot { color: var(--gold); }

        /* ── phone: corner / game over ── */
        .bell-card { text-align: center; padding: 20px 14px; }
        .bell-card .bell { font-size: 3.6rem; display: inline-block; animation: ring 1s ease-in-out; }
        @keyframes ring {
            0% { transform: rotate(0); } 15% { transform: rotate(24deg); } 30% { transform: rotate(-20deg); }
            45% { transform: rotate(14deg); } 60% { transform: rotate(-10deg); } 75% { transform: rotate(5deg); } 100% { transform: rotate(0); }
        }
        .bell-card .ct { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; margin-top: 6px; }
        .bell-card .cpts { font-size: 2rem; font-weight: 800; color: var(--up); margin-top: 2px; }
        .chip { display: inline-block; padding: 4px 12px; border-radius: 11px; background: rgba(251,191,36,.12); border: 1px solid var(--border); color: var(--gold); font-weight: 800; font-size: .74rem; margin: 3px; }
        .chip.pen { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.45); color: #fca5a5; }
        .standings .sc { margin-left: auto; font-weight: 800; }
        .standings .delta { font-size: .72rem; font-weight: 800; margin-left: 7px; }
        .standings .delta.plus { color: var(--up); }
        .standings .delta.minus { color: var(--down); }

        /* ── countdown overlay ── */
        #count-ov {
            position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
            background: rgba(4,7,15,.78); backdrop-filter: blur(4px); flex-direction: column; gap: 10px;
        }
        #count-ov .n { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: clamp(4rem, 22vmin, 9rem); color: var(--gold); text-shadow: 0 0 44px rgba(251,191,36,.55); animation: popNum .9s ease both; }
        @keyframes popNum { 0% { transform: scale(.3); opacity: 0; } 40% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); } }
        #count-ov .lbl { color: var(--muted); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; font-size: .8rem; }

        /* ═════════ TV ═════════ */
        .tv { height: 100dvh; display: flex; flex-direction: column; padding: 2.6vmin 3.2vmin 0; gap: 1.8vmin; }
        .tv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2vmin; }
        .tv-logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 3.1vmin; letter-spacing: .4vmin; color: var(--gold); text-shadow: 0 0 24px rgba(251,191,36,.45); }
        .tv-meta { font-size: 1.8vmin; font-weight: 800; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .tv-main { flex: 1; display: flex; gap: 2.2vmin; min-height: 0; }

        .tv-floor { flex: 1.6; display: grid; grid-template-columns: 1fr 1fr; gap: 1.6vmin; align-content: start; min-width: 0; }
        .tv-trader {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 1.6vmin;
            padding: 1.5vmin 1.8vmin; display: flex; align-items: center; gap: 1.4vmin; min-width: 0;
        }
        .tv-trader .tdot { width: 1.7vmin; height: 1.7vmin; border-radius: 50%; box-shadow: 0 0 12px currentColor; flex-shrink: 0; }
        .tv-trader .tname { font-weight: 800; font-size: 2.1vmin; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tv-trader .tcards { color: var(--muted); font-size: 1.5vmin; font-weight: 700; }
        .tv-trader .tscore { margin-left: auto; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.4vmin; color: var(--gold); font-variant-numeric: tabular-nums; }
        .tv-trader .tpill {
            background: linear-gradient(180deg, #fcd34d, #f59e0b); color: #2a1700;
            font-weight: 800; font-size: 1.9vmin; border-radius: 1vmin; padding: .5vmin 1.2vmin;
            animation: shoutPulse 1s ease-in-out infinite;
        }
        .tv-side { flex: 1; display: flex; flex-direction: column; gap: 1.4vmin; min-width: 0; }
        .tv-panel { background: var(--panel); border: 1px solid var(--border2); border-radius: 1.6vmin; padding: 1.6vmin 1.9vmin; }
        .tv-panel .ptitle { font-size: 1.5vmin; font-weight: 800; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); margin-bottom: 1vmin; }
        .tv-feed { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .tv-feed .rows { display: flex; flex-direction: column; gap: .7vmin; }
        .tv-feed .frow { font-size: 1.9vmin; font-weight: 700; color: var(--muted); animation: riseIn .4s ease both; }
        .tv-feed .frow b { color: var(--text); }
        .tv-feed .frow.hot { color: var(--gold); }
        @keyframes riseIn { from { opacity: 0; transform: translateY(1vmin); } to { opacity: 1; transform: none; } }
        .tv-bigstat { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 4.6vmin; color: var(--text); }
        .tv-bigstat small { font-size: 1.5vmin; color: var(--muted); display: block; letter-spacing: .3vmin; }

        .ticker { overflow: hidden; border-top: 1px solid var(--border2); background: rgba(4,7,15,.75); margin: 0 -3.2vmin; padding: 1vmin 0; }
        .ticker-inner { display: inline-block; white-space: nowrap; animation: tickmove 26s linear infinite; font-weight: 800; font-size: 1.9vmin; }
        .ticker-inner .tk { margin: 0 2.4vmin; }
        .ticker-inner .up { color: var(--up); }
        .ticker-inner .dn { color: var(--down); }
        @keyframes tickmove { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* TV lobby */
        .tv-lobby { flex: 1; display: flex; gap: 4vmin; align-items: center; min-height: 0; }
        .tv-lobby .qr-side { background: #0d172a; border: 1px solid var(--border); border-radius: 2.2vmin; padding: 3.2vmin; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
        .tv-lobby .qr-side .qr-wrap { width: 32vmin; margin: 1.4vmin auto; }
        .tv-lobby .qr-side .room-code { font-size: 4.6vmin; letter-spacing: 1.9vmin; padding-left: 1.9vmin; }
        .tv-lobby .join-hint { font-size: 1.7vmin; font-weight: 700; color: var(--muted); }
        .tv-players { flex: 1; display: flex; flex-direction: column; gap: 1.5vmin; min-width: 0; }
        .tv-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20vmin, 1fr)); gap: 1.5vmin; }
        .tv-pcard {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 1.7vmin;
            padding: 1.7vmin; text-align: center; font-weight: 800; font-size: 2vmin; animation: popIn .35s ease both;
        }
        .tv-pcard .pdot { width: 2.2vmin; height: 2.2vmin; margin: 0 auto 1vmin; }
        @keyframes popIn { from { opacity: 0; transform: scale(.7); } to { opacity: 1; transform: scale(1); } }
        .tv-waiting { color: var(--muted); font-weight: 700; font-size: 1.9vmin; }

        /* TV corner overlay + podium */
        .tv-bell { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.6vmin; text-align: center; }
        .tv-bell .bell { font-size: 12vmin; animation: ring 1.1s ease-in-out; }
        .tv-bell .who { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 5vmin; letter-spacing: .5vmin; }
        .tv-bell .what { font-size: 3vmin; font-weight: 800; color: var(--gold); }
        .tv-bell .pens { display: flex; gap: 1.2vmin; flex-wrap: wrap; justify-content: center; }
        .tv-bell .chip { font-size: 1.9vmin; }
        .tv-lead { display: flex; gap: 1.2vmin; flex-wrap: wrap; justify-content: center; }
        .tv-lead .rail-chip {
            display: flex; align-items: center; gap: 1vmin; background: var(--panel); border: 1px solid var(--border2);
            border-radius: 1.3vmin; padding: 1vmin 1.6vmin; font-weight: 800; font-size: 2vmin;
        }
        .tv-lead .rail-chip .sc { color: var(--gold); font-family: 'Orbitron', sans-serif; }
        .podium-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 2.4vmin; padding-bottom: 1vmin; }
        .pod { text-align: center; font-weight: 800; animation: popIn .5s ease both; }
        .pod .pname { font-size: 2.4vmin; margin-bottom: .8vmin; }
        .pod .pscore { font-size: 2vmin; color: var(--gold); margin-bottom: .8vmin; font-family: 'Orbitron', sans-serif; }
        .pod .block { border-radius: 1.5vmin 1.5vmin 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 1.3vmin; font-size: 3.2vmin; width: 17vmin; }
        .pod.p1 .block { height: 21vmin; background: linear-gradient(180deg, #fcd34d, #92600a); }
        .pod.p2 .block { height: 14vmin; background: linear-gradient(180deg, #d7d7e0, #8f8fa3); }
        .pod.p3 .block { height: 9.5vmin; background: linear-gradient(180deg, #e8a06a, #9c5a33); }
        .awards-row { display: flex; gap: 1.5vmin; justify-content: center; flex-wrap: wrap; padding-bottom: 2vmin; }
        .award { background: var(--panel); border: 1px solid var(--border); border-radius: 1.5vmin; padding: 1.3vmin 2vmin; font-weight: 700; font-size: 1.8vmin; text-align: center; }
        .award .aw-t { color: var(--gold); font-weight: 800; }

        #confetti-cv { position: fixed; inset: 0; pointer-events: none; z-index: 60; }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
    </style>
</head>
<body>
    <div id="app"></div>
    <canvas id="confetti-cv"></canvas>
<script>
'use strict';

// ═══════════════════════════════════════════
// CONSTANTS & HELPERS
// ═══════════════════════════════════════════
const PFX = 'PITPARTY-';
const MAX_PLAYERS = 8, MIN_PLAYERS = 2;
const COMMODITIES = [
    { name: 'Wheat',  pts: 100, bg: '#b45309', fg: '#fef3c7' },
    { name: 'Coffee', pts: 90,  bg: '#7c2d12', fg: '#ffedd5' },
    { name: 'Barley', pts: 85,  bg: '#1d4ed8', fg: '#dbeafe' },
    { name: 'Corn',   pts: 75,  bg: '#ca8a04', fg: '#fef9c3' },
    { name: 'Rye',    pts: 70,  bg: '#7e22ce', fg: '#f3e8ff' },
    { name: 'Oats',   pts: 60,  bg: '#15803d', fg: '#dcfce7' },
    { name: 'Hay',    pts: 50,  bg: '#4d7c0f', fg: '#ecfccb' },
    { name: 'Flax',   pts: 40,  bg: '#155e75', fg: '#cffafe' },
];
const SPECIALS = {
    Bull: { name: 'Bull', pts: 0, bg: '#991b1b', fg: '#fee2e2', emoji: '🐂' },
    Bear: { name: 'Bear', pts: 0, bg: '#374151', fg: '#f3f4f6', emoji: '🐻' },
};
const PENALTY = 20;
const PLAYER_COLORS = ['#fbbf24', '#22d3ee', '#f472b6', '#4ade80', '#a78bfa', '#fb923c', '#f87171', '#38bdf8'];

function $id(id) { return document.getElementById(id); }
function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function shuffle(a) { const r = a.slice(); for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function commOf(name) { return COMMODITIES.find(c => c.name === name) || SPECIALS[name] || null; }
function isSpecial(name) { return name === 'Bull' || name === 'Bear'; }
function cardStyle(name) {
    const c = commOf(name);
    return c ? `background:${c.bg};color:${c.fg}` : '';
}
function sortHand(hand) {
    const order = n => isSpecial(n) ? 100 + (n === 'Bull' ? 0 : 1) : COMMODITIES.findIndex(c => c.name === n);
    return hand.slice().sort((a, b) => order(a) - order(b));
}

// ── QR code (themed SVG) ──
function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++)
            for (let c = 0; c < n; c++)
                if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#fffbeb"/>` +
            `<g fill="#0d172a">${rects}</g></svg>`;
    } catch (e) { return ''; }
}

// ── Confetti ──
let _cf = { parts: [], raf: 0, running: false, until: 0 };
function startConfetti(ms) {
    if (REDUCED) return;
    const cv = $id('confetti-cv'), ctx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    _cf.until = performance.now() + (ms || 2600);
    const cols = ['#fbbf24', '#22c55e', '#22d3ee', '#f472b6', '#a78bfa', '#e6edf7'];
    for (let i = 0; i < 130; i++) {
        _cf.parts.push({
            x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.5,
            vx: (Math.random() - 0.5) * 2.4, vy: 2 + Math.random() * 3.6,
            rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.25,
            w: 6 + Math.random() * 7, h: 4 + Math.random() * 5,
            col: cols[Math.floor(Math.random() * cols.length)],
        });
    }
    if (_cf.running) return;
    _cf.running = true;
    (function frame(t) {
        ctx.clearRect(0, 0, cv.width, cv.height);
        _cf.parts = _cf.parts.filter(p => p.y < cv.height + 30);
        for (const p of _cf.parts) {
            p.x += p.vx; p.y += p.vy; p.rot += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        }
        if (t < _cf.until || _cf.parts.length) _cf.raf = requestAnimationFrame(frame);
        else { _cf.running = false; ctx.clearRect(0, 0, cv.width, cv.height); }
    })(performance.now());
}

// ── Synth sounds (no assets) ──
let _ac = null;
function ac() { if (!_ac) { try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return _ac; }
function tone(freq, dur, type, gain, when) {
    const a = ac(); if (!a) return;
    try {
        const t0 = a.currentTime + (when || 0);
        const o = a.createOscillator(), g = a.createGain();
        o.type = type || 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(gain || 0.07, t0);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.connect(g); g.connect(a.destination);
        o.start(t0); o.stop(t0 + dur);
    } catch (e) {}
}
function sBell() { // trading bell: detuned partials, long decay
    [880, 1320, 1760, 884].forEach((f, i) => tone(f, 1.3 - i * 0.15, 'sine', 0.06, 0));
    [880, 1320].forEach(f => tone(f, 1.0, 'sine', 0.05, 0.18));
}
function sTrade() { tone(660, 0.09, 'triangle', 0.07); tone(990, 0.14, 'triangle', 0.06, 0.07); }
function sBuzz() { tone(140, 0.35, 'sawtooth', 0.05); }
function sCount(hi) { tone(hi ? 880 : 520, 0.12, 'square', 0.05); }
function sWin() { [523, 659, 784, 1046].forEach((f, i) => tone(f, 0.3, 'triangle', 0.06, i * 0.13)); }

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let peer = null, myId = '', myName = '', isHost = false, isTvHost = false, isViewer = false, roomCode = '';
let hostConn = null, guestConns = {}, viewerConns = {};
let ui = 'home';   // home|creating|connecting|lobby_h|lobby_g|game|corner|gameover|viewer
let uiErr = '';
let fName = localStorage.getItem('pit-name') || '';
let fCode = '', fVCode = '';
let D = null, vD = null;

// phone-local trading state
let selection = new Set();       // indices into D.myHand
let _prevHandKey = '';

// Host authoritative state
let H = {
    phase: 'lobby',              // lobby|trading|corner|gameover
    players: [],                 // [{id,name,color,hand:[],offer:null,score:0,trades:0,corners:0,lastDelta:0}]
    settings: { bullBear: false, winScore: 500 },
    round: 0,
    feed: [],                    // last 12 [{id,t,...}]
    tradeCount: 0,
    biggestTrade: null,          // {a,b,count}
    lastCorner: null,            // {name,color,commodity,pts,kind,penalties:[{name,amount}]}
    winner: null, stats: null,
};
let _feedSeq = 0;
function feedPush(ev) {
    ev.id = ++_feedSeq;
    H.feed.push(ev);
    if (H.feed.length > 12) H.feed.shift();
}

// ═══════════════════════════════════════════
// NETWORK
// ═══════════════════════════════════════════
function send(conn, msg) { try { conn.send(msg); } catch (e) { console.warn('send err', e); } }
function broadcastViewers(msg) { Object.values(viewerConns).forEach(c => send(c, msg)); }
function connectedPlayers() {
    return H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
}

function hostAddPlayer(id, name) {
    if (H.players.find(p => p.id === id) || H.players.length >= MAX_PLAYERS) return;
    H.players.push({
        id, name, color: PLAYER_COLORS[H.players.length % PLAYER_COLORS.length],
        hand: [], offer: null, score: 0, trades: 0, corners: 0, lastDelta: 0,
    });
}

function lobbyMsg() {
    return {
        type: 'lobby', roomCode,
        players: H.players.map(p => ({ name: p.name, color: p.color })),
        settings: { ...H.settings },
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function broadcastLobby() {
    H.players.forEach(p => { if (p.id !== myId && guestConns[p.id]) send(guestConns[p.id], lobbyMsg()); });
    broadcastViewers({ ...lobbyMsg(), type: 'viewer_lobby' });
    hostSyncSelf(lobbyMsg());
}

function bestCorner(hand) {
    const counts = {};
    hand.forEach(n => { if (!isSpecial(n)) counts[n] = (counts[n] || 0) + 1; });
    const hasBull = hand.includes('Bull');
    let best = null;
    for (const [name, count] of Object.entries(counts)) {
        const pts = commOf(name).pts;
        let opt = null;
        if (count >= 9) opt = hasBull ? { commodity: name, kind: 'double_bull', pts: pts * 2 } : { commodity: name, kind: 'standard', pts };
        else if (count === 8 && hasBull) opt = { commodity: name, kind: 'bull', pts };
        if (opt && (!best || opt.pts > best.pts)) best = opt;
    }
    return best;
}

function stateFor(p) {
    const corner = p && H.phase === 'trading' ? bestCorner(p.hand) : null;
    return {
        type: 'state',
        phase: H.phase, round: H.round, roomCode,
        winScore: H.settings.winScore, bullBear: H.settings.bullBear,
        myHand: p ? sortHand(p.hand) : [],
        myOffer: p && p.offer ? { cards: p.offer.cards, count: p.offer.count } : null,
        canCorner: !!corner, cornerInfo: corner,
        myDelta: p ? p.lastDelta : 0,
        players: H.players.map(q => ({
            name: q.name, color: q.color, score: q.score, cards: q.hand.length,
            offerCount: q.offer ? q.offer.count : 0, trades: q.trades, delta: q.lastDelta,
        })),
        feed: H.feed.slice(-8),
        tradeCount: H.tradeCount,
        lastCorner: H.lastCorner, winner: H.winner, stats: H.stats,
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function viewerStateMsg() {
    return { ...stateFor(null), type: 'viewer_state', feed: H.feed.slice(-12) };
}
function broadcastState() {
    H.players.forEach(p => {
        if (p.id === myId) return;
        const conn = guestConns[p.id];
        if (conn) send(conn, stateFor(p));
    });
    broadcastViewers(viewerStateMsg());
    hostSyncSelf(isTvHost ? null : stateFor(H.players.find(p => p.id === myId)));
}

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            send(conn, H.phase === 'lobby' ? { ...lobbyMsg(), type: 'viewer_lobby' } : viewerStateMsg());
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const name = String(msg.name || 'Trader').slice(0, 16);
                const zombie = H.players.find(p => p.name === name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else hostAddPlayer(conn.peer, name);
                const p2 = H.players.find(p => p.id === conn.peer);
                if (!p2) { send(conn, lobbyMsg()); break; }         // room full
                if (H.phase === 'lobby') broadcastLobby();
                else { send(conn, stateFor(p2)); broadcastViewers(viewerStateMsg()); if (isTvHost) tvHostSync(); }
                break;
            }
            case 'offer':        if (player) hostOffer(player, msg.cards); break;
            case 'cancel_offer': if (player) hostCancelOffer(player); break;
            case 'corner':       if (player) hostCorner(player); break;
            case 'ctl': {
                if (!isTvHost || !player || player.id !== H.players[0]?.id) break;
                hostCtl(msg.action, msg);
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        }
    });
    conn.on('error', e => console.warn('conn err', e));
}

function hostCtl(action, msg) {
    if (action === 'start' && H.phase === 'lobby') hostStartRound(true);
    else if (action === 'next' && H.phase === 'corner') hostStartRound(false);
    else if (action === 'again' && H.phase === 'gameover') hostNewGame();
    else if (action === 'set' && H.phase === 'lobby') {
        if (typeof msg.bullBear === 'boolean') H.settings.bullBear = msg.bullBear;
        if ([300, 500, 750].includes(msg.winScore)) H.settings.winScore = msg.winScore;
        broadcastLobby();
    }
}
function guestCtl(action, extra) {
    if (isHost && !isTvHost) { hostCtl(action, extra || {}); return; }
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ── Create a room (phone host or TV host) ──
function makeRoom(onOpen) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(PFX + roomCode);
    peer.on('open', id => { myId = id; isHost = true; onOpen(); });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        isHost = false; isTvHost = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

function hostGame(name) {
    myName = name.trim().slice(0, 16) || 'Host';
    localStorage.setItem('pit-name', myName);
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        hostAddPlayer(myId, myName);
        ui = 'lobby_h';
        render();
    });
}

function hostOnTV() {
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        isTvHost = true;
        document.body.classList.add('viewer-mode');
        tvHostSync();
        render();
    });
}

// ── Guest ──
function joinGame(code, name) {
    myName = name.trim().slice(0, 16) || 'Trader';
    localStorage.setItem('pit-name', myName);
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer();
    peer.on('open', id => {
        myId = id;
        isHost = false;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join', name: myName }));
        hostConn.on('data', msg => applyMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the pit.'; ui = 'home'; D = null; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'home'; render();
    });
}

// ── Viewer (TV joining a phone-hosted game) ──
function joinAsViewer(code, _attempt) {
    const attempt = _attempt || 1;
    isViewer = true;
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer();
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join_viewer' }));
        hostConn.on('data', msg => applyViewerMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the pit.'; isViewer = false; vD = null; document.body.classList.remove('viewer-mode'); ui = 'home'; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; isViewer = false; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

// The TV-host mirrors authoritative state into its own viewer UI
function tvHostSync() {
    if (!isTvHost) return;
    applyViewerMsg(H.phase === 'lobby' ? { ...lobbyMsg(), type: 'viewer_lobby' } : viewerStateMsg());
}
// The phone-host applies its own broadcasts through the same client path as guests
function hostSyncSelf(msg) {
    if (isTvHost) { tvHostSync(); return; }
    if (isHost && msg) applyMsg(msg);
}

// ═══════════════════════════════════════════
// HOST GAME FLOW
// ═══════════════════════════════════════════
function activeCommodities() {
    const n = Math.max(MIN_PLAYERS, Math.min(H.players.length, MAX_PLAYERS));
    return COMMODITIES.slice(0, n);
}

function hostDeal() {
    const comms = activeCommodities();
    let deck = [];
    comms.forEach(c => { for (let i = 0; i < 9; i++) deck.push(c.name); });
    if (H.settings.bullBear) deck.push('Bull', 'Bear');
    deck = shuffle(deck);
    H.players.forEach(p => { p.hand = []; p.offer = null; p.lastDelta = 0; });
    let i = 0;
    deck.forEach(card => { H.players[i % H.players.length].hand.push(card); i++; });
}

function hostStartRound(fresh) {
    if (connectedPlayers().length < MIN_PLAYERS) { uiErr = 'Need at least ' + MIN_PLAYERS + ' traders.'; if (ui === 'lobby_h') render(); return; }
    if (fresh) {
        H.round = 0;
        H.tradeCount = 0; H.biggestTrade = null;
        H.players.forEach(p => { p.score = 0; p.trades = 0; p.corners = 0; });
        H.winner = null; H.stats = null; H.feed = [];
    }
    H.round += 1;
    H.lastCorner = null;
    hostDeal();
    H.phase = 'trading';
    feedPush({ t: 'round', round: H.round });
    broadcastState();
}

// ── Offers & trades ──
function removeCards(hand, cards) {
    // multiset removal; returns false if any card missing
    const h = hand.slice();
    for (const c of cards) {
        const i = h.indexOf(c);
        if (i < 0) return false;
        h.splice(i, 1);
    }
    hand.length = 0; hand.push(...h);
    return true;
}

function validBundle(hand, cards) {
    if (!Array.isArray(cards) || cards.length < 1 || cards.length > 4) return false;
    const h = hand.slice();
    for (const c of cards) {
        const i = h.indexOf(c);
        if (i < 0) return false;
        h.splice(i, 1);
    }
    const comms = [...new Set(cards.filter(c => !isSpecial(c)))];
    return comms.length <= 1;    // one commodity + any specials
}

function hostOffer(player, cards) {
    if (H.phase !== 'trading' || !validBundle(player.hand, cards)) return;
    player.offer = { cards: cards.slice(), count: cards.length };
    const match = H.players.find(q => q.id !== player.id && q.offer && q.offer.count === player.offer.count);
    if (match) executeTrade(player, match);
    else broadcastState();
}

function hostCancelOffer(player) {
    if (!player.offer) return;
    player.offer = null;
    broadcastState();
}

function executeTrade(a, b) {
    const aCards = a.offer.cards, bCards = b.offer.cards;
    if (!removeCards(a.hand, aCards) || !removeCards(b.hand, bCards)) { a.offer = null; b.offer = null; broadcastState(); return; }
    a.hand.push(...bCards);
    b.hand.push(...aCards);
    a.offer = null; b.offer = null;
    a.trades++; b.trades++;
    H.tradeCount++;
    const count = aCards.length;
    if (!H.biggestTrade || count > H.biggestTrade.count) H.biggestTrade = { a: a.name, b: b.name, count };
    feedPush({ t: 'trade', a: a.name, ac: a.color, b: b.name, bc: b.color, count });
    [a, b].forEach(p => {
        if (p.id === myId) { if (isHost && !isTvHost) tradeFlash(count); }
        else { const c = guestConns[p.id]; if (c) send(c, { type: 'traded', count }); }
    });
    broadcastState();
}

// ── Corner ──
function hostCorner(player) {
    if (H.phase !== 'trading') return;
    const corner = bestCorner(player.hand);
    if (!corner) return;
    player.score += corner.pts;
    player.corners++;
    player.lastDelta = corner.pts;
    const penalties = [];
    H.players.forEach(q => {
        if (q.id === player.id) { return; }
        let pen = 0;
        q.hand.forEach(c => { if (isSpecial(c)) pen += PENALTY; });
        q.lastDelta = -pen;
        if (pen) { q.score -= pen; penalties.push({ name: q.name, amount: pen }); }
    });
    H.players.forEach(q => { q.offer = null; });
    H.lastCorner = {
        name: player.name, color: player.color,
        commodity: corner.commodity, pts: corner.pts, kind: corner.kind, penalties,
    };
    feedPush({ t: 'corner', name: player.name, color: player.color, commodity: corner.commodity, pts: corner.pts });
    if (player.score >= H.settings.winScore) {
        H.phase = 'gameover';
        H.winner = player.name;
        const most = k => H.players.slice().sort((x, y) => y[k] - x[k])[0];
        H.stats = {
            trades: { name: most('trades').name, n: most('trades').trades },
            corners: { name: most('corners').name, n: most('corners').corners },
            biggest: H.biggestTrade,
            totalTrades: H.tradeCount,
        };
    } else {
        H.phase = 'corner';
    }
    broadcastState();
}

function hostNewGame() {
    H.phase = 'lobby';
    H.round = 0; H.lastCorner = null; H.winner = null; H.stats = null; H.feed = [];
    H.tradeCount = 0; H.biggestTrade = null;
    H.players.forEach(p => { p.hand = []; p.offer = null; p.score = 0; p.trades = 0; p.corners = 0; p.lastDelta = 0; });
    H.players = H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
    broadcastLobby();
    if (isHost && !isTvHost) { ui = 'lobby_h'; render(); }
}

function hostSet(patch) {
    Object.assign(H.settings, patch);
    broadcastLobby();
    if (ui === 'lobby_h') render();
}

// ═══════════════════════════════════════════
// CLIENT (phone) MESSAGE HANDLING
// ═══════════════════════════════════════════
function standingsOf(players) {
    return players.slice().sort((a, b) => b.score - a.score);
}

function applyMsg(msg) {
    switch (msg.type) {
        case 'lobby':
            D = msg;
            selection.clear(); _prevHandKey = '';
            ui = (isHost && !isTvHost) ? 'lobby_h' : 'lobby_g';
            render();
            break;
        case 'traded':
            tradeFlash(msg.count);
            break;
        case 'state': {
            const prev = D;
            D = msg;
            if (msg.phase === 'trading') {
                const newRound = !prev || prev.phase !== 'trading' || prev.round !== msg.round;
                const handKey = msg.myHand.join('|');
                if (newRound) {
                    selection.clear(); _prevHandKey = handKey;
                    ui = 'game';
                    render();
                    showOpeningBell(msg.round);
                } else if (ui === 'game') {
                    if (handKey !== _prevHandKey) { selection.clear(); _prevHandKey = handKey; render(); }
                    else patchGame(msg);
                } else { ui = 'game'; _prevHandKey = handKey; render(); }
            } else if (msg.phase === 'corner') {
                if (ui !== 'corner') {
                    selection.clear();
                    ui = 'corner';
                    render();
                    sBell();
                    if (msg.myDelta > 0) { startConfetti(2400); try { navigator.vibrate && navigator.vibrate([90, 40, 90, 40, 220]); } catch (e) {} }
                    else if (msg.myDelta < 0) sBuzz();
                } else render();
            } else if (msg.phase === 'gameover') {
                if (ui !== 'gameover') {
                    ui = 'gameover';
                    render();
                    sWin(); startConfetti(3800);
                } else render();
            } else render();
            break;
        }
    }
}

function tradeFlash(count) {
    sTrade();
    try { navigator.vibrate && navigator.vibrate(60); } catch (e) {}
    const el = $id('trade-note');
    if (el) { el.textContent = '🤝 Traded ' + count + '!'; el.style.opacity = '1'; setTimeout(() => { el.style.opacity = '0'; }, 1600); }
}

// opening-bell countdown overlay (non-blocking)
function showOpeningBell(round) {
    if (REDUCED) { sBell(); return; }
    const ov = document.createElement('div');
    ov.id = 'count-ov';
    document.body.appendChild(ov);
    const steps = ['3', '2', '1', '🔔'];
    let i = 0;
    const step = () => {
        if (i >= steps.length) { ov.remove(); return; }
        ov.innerHTML = `<div class="n">${steps[i]}</div><div class="lbl">Round ${round} — trade!</div>`;
        if (steps[i] === '🔔') sBell(); else sCount(false);
        i++;
        setTimeout(step, i === steps.length ? 700 : 750);
    };
    step();
}

// ── selection & actions ──
function selInfo() {
    const cards = [...selection].map(i => D.myHand[i]);
    const comms = [...new Set(cards.filter(c => !isSpecial(c)))];
    return { cards, valid: cards.length >= 1 && cards.length <= 4 && comms.length <= 1, comm: comms[0] || null };
}

function toggleCard(i) {
    if (!D || D.phase !== 'trading' || D.myOffer) return;
    if (selection.has(i)) selection.delete(i);
    else {
        if (selection.size >= 4) return;
        const name = D.myHand[i];
        if (!isSpecial(name)) {
            const { comm } = selInfo();
            if (comm && comm !== name) return;   // one commodity at a time
        }
        selection.add(i);
    }
    patchHandSelection();
    patchShoutBar();
}

function shout() {
    const { cards, valid } = selInfo();
    if (!valid) return;
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostOffer(me, cards);
    } else send(hostConn, { type: 'offer', cards });
    selection.clear();
}

function cancelShout() {
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostCancelOffer(me);
    } else send(hostConn, { type: 'cancel_offer' });
}

function ringBell() {
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostCorner(me);
    } else send(hostConn, { type: 'corner' });
}

// ── patching (never re-render the hand mid-selection) ──
function patchGame(msg) {
    const strip = $id('scores-strip');
    if (strip) strip.innerHTML = scoresStripHTML(msg);
    const off = $id('offer-zone');
    if (off) off.innerHTML = offerZoneHTML(msg);
    const feed = $id('feed');
    if (feed) feed.innerHTML = feedHTML(msg.feed);
    const cw = $id('corner-wrap');
    if (cw) cw.innerHTML = cornerBtnHTML(msg);
    patchHandOffered(msg);
}

function patchHandSelection() {
    document.querySelectorAll('.hand-grid .pcard').forEach((el, i) => {
        el.classList.toggle('sel', selection.has(i));
    });
}
function patchShoutBar() {
    const sb = $id('shout-zone');
    if (sb) sb.innerHTML = shoutBarHTML();
}
function patchHandOffered(msg) {
    const offered = msg.myOffer ? msg.myOffer.cards.slice() : [];
    document.querySelectorAll('.hand-grid .pcard').forEach((el, i) => {
        const name = msg.myHand[i];
        const oi = offered.indexOf(name);
        const inOffer = oi >= 0;
        if (inOffer) offered.splice(oi, 1);
        el.classList.toggle('inoffer', inOffer);
    });
}

// ═══════════════════════════════════════════
// VIEWER (TV) MESSAGE HANDLING
// ═══════════════════════════════════════════
function applyViewerMsg(msg) {
    document.body.classList.add('viewer-mode');
    ui = 'viewer';
    const prev = vD;
    vD = msg;
    if (msg.type === 'viewer_lobby') { render(); return; }
    // viewer_state
    if (msg.phase === 'trading') {
        const newRound = !prev || prev.type !== 'viewer_state' || prev.phase !== 'trading' || prev.round !== msg.round;
        if (newRound) { render(); sBell(); }
        else patchViewer(msg);
    } else if (msg.phase === 'corner') {
        if (!prev || prev.phase !== 'corner') { render(); sBell(); }
        else render();
    } else if (msg.phase === 'gameover') {
        if (!prev || prev.phase !== 'gameover') { render(); sWin(); startConfetti(5200); }
        else render();
    } else render();
}

function patchViewer(msg) {
    const floor = $id('v-floor');
    if (floor) floor.innerHTML = tvTradersHTML(msg);
    const feed = $id('v-feed');
    if (feed) feed.innerHTML = feedHTML(msg.feed, true);
    const tc = $id('v-trades');
    if (tc) tc.textContent = msg.tradeCount;
}

function hdrHTML(sub) {
    return `<h1 class="logo">🔔 PIT!</h1><div class="sub">${esc(sub || 'corner the market · ring the bell')}</div>`;
}
function joinURL() { return location.origin + location.pathname + '?room=' + roomCode; }
function isCaptain() { return !!(D && D.tvHost && D.captain && D.captain === myName); }
function canDrive() { return (isHost && !isTvHost) || isCaptain(); }
function kindLabel(kind) {
    return kind === 'double_bull' ? '🐂🐂 DOUBLE BULL ×2' : kind === 'bull' ? '🐂 BULL CORNER' : '';
}

function settingsSegsHTML(settings, expr) {
    const seg = (opts, curV, key) => `<div class="seg-row">${opts.map(o =>
        `<button class="btn btn-sm ${curV === o.v ? 'btn-p' : 'btn-g'}" onclick="${expr(`{${key}:${o.j}}`)}">${o.l}</button>`).join('')}</div>`;
    return `
        <div class="fg"><label>Bull &amp; Bear cards</label>${seg(
            [{ v: false, j: 'false', l: 'Off' }, { v: true, j: 'true', l: '🐂🐻 On (−20 traps)' }], settings.bullBear, 'bullBear')}</div>
        <div class="fg"><label>Win score</label>${seg(
            [300, 500, 750].map(v => ({ v, j: v, l: v })), settings.winScore, 'winScore')}</div>`;
}

function scoresStripHTML(msg) {
    return standingsOf(msg.players).map(p => `
        <div class="sc-chip">
            <span class="pdot" style="background:${p.color};color:${p.color}"></span>
            ${esc(p.name)} <b>${p.score}</b>
            ${p.offerCount ? `<span class="shout">📢${p.offerCount}!</span>` : `<span style="color:var(--muted)">${p.cards}🂠</span>`}
        </div>`).join('');
}

function feedHTML(feed, tv) {
    const rows = (feed || []).slice().reverse().map(ev => {
        if (ev.t === 'trade') return `<div class="${tv ? 'frow' : 'feed-row'}">🤝 <b>${esc(ev.a)}</b> ⇄ <b>${esc(ev.b)}</b> — ${ev.count} card${ev.count > 1 ? 's' : ''}</div>`;
        if (ev.t === 'corner') return `<div class="${tv ? 'frow' : 'feed-row'} hot">🔔 <b>${esc(ev.name)}</b> corners ${esc(ev.commodity.toUpperCase())} +${ev.pts}</div>`;
        if (ev.t === 'round') return `<div class="${tv ? 'frow' : 'feed-row'} hot">🔔 Round ${ev.round} — the pit is open!</div>`;
        return '';
    }).join('');
    return rows || `<div class="${tv ? 'frow' : 'feed-row'}">Waiting for the first trade…</div>`;
}

function standingsHTML(players, deltas) {
    const medals = ['🥇', '🥈', '🥉'];
    return `<div class="card standings"><div class="slbl">Scores</div>${
        standingsOf(players).map((p, i) => `
        <div class="player-row">
            <span style="width:22px;text-align:center">${medals[i] || (i + 1)}</span>
            <span class="pdot" style="background:${p.color};color:${p.color}"></span>
            <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}${p.name === myName ? ' <span style="color:var(--gold)">(you)</span>' : ''}</div>
            <div class="sc">${p.score}${deltas && p.delta ? `<span class="delta ${p.delta > 0 ? 'plus' : 'minus'}">${p.delta > 0 ? '+' : ''}${p.delta}</span>` : ''}</div>
        </div>`).join('')
    }</div>`;
}

function render() {
    const app = $id('app');
    if (isTvHost || isViewer) ui = 'viewer';
    let html = '';
    switch (ui) {
        case 'home':       html = renderHome(); break;
        case 'creating':   html = renderSpinner('Opening the pit…'); break;
        case 'connecting': html = renderSpinner('Joining the pit…'); break;
        case 'lobby_h':    html = renderLobbyH(); break;
        case 'lobby_g':    html = renderLobbyG(); break;
        case 'game':       html = renderGame(); break;
        case 'corner':     html = renderCorner(); break;
        case 'gameover':   html = renderGameover(); break;
        case 'viewer':     html = renderViewer(); break;
        default:           html = renderHome();
    }
    app.innerHTML = html;
}

    return tvShell(`
    <div class="tv-lobby">
        <div class="qr-side">
            <div class="slbl">Scan with your phone to join</div>
            <div class="qr-wrap">${qrSVG(url)}</div>
            <div class="room-code">${esc(vD.roomCode || '')}</div>
            <div class="join-hint">${location.host}${location.pathname}</div>
        </div>
        <div class="tv-players">
            <div class="tv-meta">Traders — ${players.length}/${MAX_PLAYERS}</div>
            <div class="tv-player-grid">${cards}</div>
            <div class="tv-waiting">${players.length === 0
                ? 'Waiting for the first phone… they become 👑 Captain'
                : (players.length < MIN_PLAYERS ? 'Need at least ' + MIN_PLAYERS + ' traders…' :
                    (vD.tvHost ? `Waiting for 👑 ${esc(vD.captain || '')}` : 'Waiting for the host') + ` to ring the bell · 🎯 first to ${s.winScore} · 🐂🐻 ${s.bullBear ? 'on' : 'off'}`)}</div>
        </div>
    </div>`, 'Lobby');
}

function tvTradersHTML(msg) {
    return standingsOf(msg.players).map(p => `
        <div class="tv-trader">
            <span class="tdot" style="background:${p.color};color:${p.color}"></span>
            <div style="min-width:0">
                <div class="tname">${esc(p.name)}</div>
                <div class="tcards">${p.cards} cards · ${p.trades} trades</div>
            </div>
            ${p.offerCount ? `<span class="tpill">${p.offerCount}!</span>` : ''}
            <span class="tscore">${p.score}</span>
        </div>`).join('');
}

function renderViewerTrading() {
    return tvShell(`
    <div class="tv-main">
        <div class="tv-floor" id="v-floor">${tvTradersHTML(vD)}</div>
        <div class="tv-side">
            <div class="tv-panel">
                <div class="ptitle">Trades this game</div>
                <div class="tv-bigstat"><span id="v-trades">${vD.tradeCount}</span><small>shout a number, match a bundle</small></div>
            </div>
            <div class="tv-panel tv-feed">
                <div class="ptitle">Pit floor</div>
                <div class="rows" id="v-feed">${feedHTML(vD.feed, true)}</div>
            </div>
        </div>
    </div>`, `Round ${vD.round} · first to ${vD.winScore}`, true);
}

function renderViewerCorner() {
    const lc = vD.lastCorner || {};
    const pens = (lc.penalties || []).map(p => `<span class="chip pen">🐻 ${esc(p.name)} −${p.amount}</span>`).join('');
    const lead = standingsOf(vD.players).map(p =>
        `<div class="rail-chip"><span class="pdot" style="background:${p.color};color:${p.color}"></span>${esc(p.name)}<span class="sc">${p.score}</span>${p.delta ? `<span style="color:${p.delta > 0 ? 'var(--up)' : 'var(--down)'};font-size:1.5vmin">${p.delta > 0 ? '+' : ''}${p.delta}</span>` : ''}</div>`).join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Captain')}: “Next round” is on your phone` : 'Host: “Next round” is on your phone';
    return tvShell(`
    <div class="tv-bell">
        <div class="bell">🔔</div>
        <div class="who" style="color:${lc.color || 'var(--gold)'}">${esc((lc.name || '').toUpperCase())} CORNERS ${esc((lc.commodity || '').toUpperCase())}!</div>
        <div class="what">+${lc.pts || 0} ${lc.kind && lc.kind !== 'standard' ? '· ' + kindLabel(lc.kind) : ''}</div>
        ${pens ? `<div class="pens">${pens}</div>` : ''}
        <div class="tv-lead">${lead}</div>
        <div class="tv-waiting">${hint}</div>
    </div>`, `Round ${vD.round}`);
}

function renderViewerPodium() {
    const st = standingsOf(vD.players);
    const podOrder = [st[1], st[0], st[2]].filter(Boolean);
    const cls = st.length >= 3 ? ['p2', 'p1', 'p3'] : (st.length === 2 ? ['p2', 'p1'] : ['p1']);
    const medal = { p1: '🥇', p2: '🥈', p3: '🥉' };
    const pods = podOrder.map((p, i) => `
        <div class="pod ${cls[i]}" style="animation-delay:${i * 0.18}s">
            <div class="pname"><span class="pdot" style="background:${p.color};color:${p.color};display:inline-block;vertical-align:middle;margin-right:.6vmin"></span>${esc(p.name)}</div>
            <div class="pscore">${p.score} pts</div>
            <div class="block">${medal[cls[i]]}</div>
        </div>`).join('');
    const s = vD.stats || {};
    const awards = [
        s.corners ? `<div class="award">🔔 <span class="aw-t">Bell ringer</span><br>${esc(s.corners.name)} — ${s.corners.n} corner${s.corners.n === 1 ? '' : 's'}</div>` : '',
        s.trades ? `<div class="award">🤝 <span class="aw-t">Most trades</span><br>${esc(s.trades.name)} — ${s.trades.n}</div>` : '',
        s.biggest ? `<div class="award">💼 <span class="aw-t">Biggest swap</span><br>${esc(s.biggest.a)} ⇄ ${esc(s.biggest.b)} — ${s.biggest.count} cards</div>` : '',
    ].join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Captain')}: “Play again” is on your phone` : 'Host: “Play again” is on your phone';
    return tvShell(`
    <div class="tv-main" style="flex-direction:column">
        <div class="podium-wrap">${pods}</div>
        <div class="awards-row">${awards}</div>
        <div class="tv-waiting" style="text-align:center;padding-bottom:1.5vmin">${hint}</div>
    </div>`, '🏆 Market closed');
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
window.addEventListener('resize', () => {
    const cv = $id('confetti-cv');
    if (cv && _cf.running) { cv.width = innerWidth; cv.height = innerHeight; }
});

(function boot() {
    const params = new URLSearchParams(location.search);
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    render();
})();
</script>
</body>
</html>
