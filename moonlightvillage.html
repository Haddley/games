<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Moonlight Village</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230b0d1f' width='100' height='100' rx='20'/><text x='50' y='68' font-size='52' text-anchor='middle'>🌙</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="common.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0b0d1f; --panel: rgba(26,29,58,0.8); --panel2: rgba(35,39,74,0.9);
            --border: rgba(167,139,250,0.28); --border2: rgba(148,155,200,0.24);
            --text: #e9eaf6; --muted: #8d93bd;
            --moon: #f5e6b8; --violet: #a78bfa; --wolf: #ef4444; --heal: #4ade80; --vill: #fbbf24;
            --dawn1: #ff9a56; --dawn2: #ffd39a;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            padding: 26px 16px 48px; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 50% at 50% -10%, rgba(167,139,250,0.14) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 10% 100%, rgba(96,105,180,0.12) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 92% 100%, rgba(245,230,184,0.06) 0%, transparent 65%);
        }
        /* starfield */
        body::after {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: .8;
            background-image:
                radial-gradient(1.5px 1.5px at 12% 22%, #fff8 0%, transparent 100%),
                radial-gradient(1px 1px at 32% 8%, #fff7 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 55% 30%, #fff6 0%, transparent 100%),
                radial-gradient(1px 1px at 72% 12%, #fff8 0%, transparent 100%),
                radial-gradient(2px 2px at 88% 26%, #fff5 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 55%, #fff5 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 44% 70%, #fff4 0%, transparent 100%),
                radial-gradient(1px 1px at 66% 58%, #fff6 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 92% 66%, #fff5 0%, transparent 100%),
                radial-gradient(1px 1px at 8% 82%, #fff4 0%, transparent 100%);
        }
        body.viewer-mode { padding: 0; overflow: hidden; display: block; height: 100dvh; width: 100vw; }

        h1.logo {
            font-family: 'Fraunces', serif; font-weight: 900; letter-spacing: 1px;
            font-size: clamp(1.6rem, 7vw, 2.4rem); text-align: center; color: var(--moon);
            text-shadow: 0 0 30px rgba(245,230,184,.4);
        }
        .sub { color: var(--muted); font-size: .7rem; letter-spacing: 2.5px; text-transform: uppercase; margin: 7px 0 22px; text-align: center; }

        #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 13px; }
        body.viewer-mode #app { max-width: none; height: 100dvh; display: block; }

        .card {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 17px;
            padding: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 12px 34px rgba(0,0,0,.5);
        }
        .card.highlight { border-color: var(--violet); box-shadow: 0 0 26px rgba(167,139,250,.16), 0 12px 34px rgba(0,0,0,.5); }
        .slbl { font-size: .64rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 11px; }

        .fg { margin-bottom: 12px; }
        .fg label { display: block; font-size: .64rem; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        input[type=text] {
            width: 100%; padding: 12px 14px; font-family: inherit; font-size: 1rem; font-weight: 700;
            border: 2px solid var(--border2); border-radius: 11px; background: rgba(11,13,31,.7); color: var(--text);
            outline: none;
        }
        input[type=text]:focus { border-color: var(--violet); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit; font-weight: 900; font-size: .92rem; letter-spacing: .4px;
            padding: 13px 18px; border: none; border-radius: 13px; cursor: pointer;
            transition: filter .12s, opacity .12s, box-shadow .12s, transform .1s; user-select: none; -webkit-user-select: none;
            color: var(--text);
        }
        .btn:active { filter: brightness(1.15); transform: scale(.97); }
        .btn-p { background: linear-gradient(180deg, #c4b5fd, #8b5cf6); color: #1c1040; box-shadow: 0 5px 0 #5b3fa8, 0 10px 22px rgba(139,92,246,.35); }
        .btn-p:active { box-shadow: 0 2px 0 #5b3fa8; }
        .btn-moon { background: linear-gradient(180deg, #f9edc8, #e5c96b); color: #3a2c05; box-shadow: 0 5px 0 #9a832f, 0 10px 22px rgba(229,201,107,.3); }
        .btn-moon:active { box-shadow: 0 2px 0 #9a832f; }
        .btn-g { background: rgba(148,155,200,.12); box-shadow: inset 0 0 0 2px var(--border2); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 8px 13px; font-size: .74rem; border-radius: 10px; }
        .btn:disabled { opacity: .4; cursor: default; }

        .err {
            background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.5); color: #fca5a5;
            padding: 11px 14px; border-radius: 12px; font-size: .8rem; font-weight: 700; text-align: center;
        }
        hr { border: none; border-top: 1px dashed var(--border2); margin: 13px 0; }

        .connecting { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 46px 0; color: var(--muted); font-weight: 700; }
        .spin { width: 34px; height: 34px; border-radius: 50%; border: 4px solid rgba(167,139,250,.2); border-top-color: var(--violet); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .player-row { display: flex; align-items: center; gap: 11px; padding: 8px 4px; border-bottom: 1px dashed var(--border2); font-weight: 800; font-size: .92rem; }
        .player-row:last-child { border-bottom: none; }
        .pdot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 10px currentColor; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--heal); box-shadow: 0 0 8px var(--heal); margin-left: auto; }
        .qr-wrap { width: min(210px, 58vw); margin: 6px auto 10px; border-radius: 13px; overflow: hidden; box-shadow: 0 8px 22px rgba(0,0,0,.4); }
        .qr-wrap svg { display: block; width: 100%; height: auto; }
        .room-code { font-family: 'Fraunces', serif; font-weight: 900; font-size: 2.2rem; letter-spacing: 11px; text-align: center; color: var(--moon); padding-left: 11px; text-shadow: 0 0 18px rgba(245,230,184,.35); }
        .share-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px; }
        .seg-row { display: flex; flex-wrap: wrap; gap: 7px; }

        /* role card (hold to peek) */
        .role-card {
            border-radius: 18px; padding: 26px 16px; text-align: center; cursor: pointer;
            background: linear-gradient(160deg, #232749, #151833); border: 2px dashed var(--border);
            user-select: none; -webkit-user-select: none; touch-action: none; position: relative;
        }
        .role-card .hint { color: var(--muted); font-weight: 800; font-size: .82rem; }
        .role-card .secret { opacity: 0; transition: opacity .12s; margin-top: 10px; }
        .role-card.peeked .secret { opacity: 1; }
        .role-card.peeked .hint { opacity: .35; }
        .role-card .r-emoji { font-size: 3.2rem; }
        .role-card .r-name { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.7rem; letter-spacing: 1px; margin-top: 4px; }
        .role-card .r-desc { color: var(--muted); font-size: .8rem; font-weight: 700; margin-top: 6px; line-height: 1.5; }
        .role-card .r-mates { margin-top: 8px; font-weight: 900; font-size: .9rem; }

        /* night action pick list */
        .pick-list { display: flex; flex-direction: column; gap: 9px; }
        .pickbtn {
            display: flex; align-items: center; gap: 11px; width: 100%;
            padding: 14px; border: none; border-radius: 13px; cursor: pointer;
            background: var(--panel2); color: var(--text); font-family: inherit; font-weight: 900; font-size: 1rem;
            box-shadow: inset 0 0 0 2px var(--border2);
        }
        .pickbtn:active { box-shadow: inset 0 0 0 2px var(--violet); }
        .pickbtn.picked { box-shadow: inset 0 0 0 3px var(--violet); background: rgba(139,92,246,.18); }
        .pickbtn:disabled { opacity: .4; cursor: default; }

        .scene { text-align: center; padding: 30px 12px; }
        .scene .big { font-size: 3.6rem; }
        .scene .t { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.45rem; margin-top: 10px; line-height: 1.35; }
        .scene .s { color: var(--muted); font-weight: 700; font-size: .84rem; margin-top: 8px; line-height: 1.6; }
        .scene.dawnbg { background: linear-gradient(170deg, rgba(255,154,86,.25), rgba(255,211,154,.08)); border-color: rgba(255,154,86,.4); }
        .chip { display: inline-block; padding: 4px 12px; border-radius: 11px; background: rgba(167,139,250,.14); border: 1px solid var(--border); color: var(--violet); font-weight: 900; font-size: .74rem; margin: 3px; }
        .chip.dead { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.4); color: #fca5a5; }
        .chip.gold { background: rgba(245,230,184,.12); border-color: rgba(245,230,184,.4); color: var(--moon); }

        .ghost-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .ghost-tile { background: var(--panel2); border-radius: 12px; padding: 10px; font-weight: 800; font-size: .8rem; text-align: center; border: 1px solid var(--border2); }
        .ghost-tile.dead { opacity: .5; text-decoration: line-through; }

        .timerbar-wrap { height: 10px; border-radius: 6px; background: rgba(255,255,255,.09); overflow: hidden; }
        .timerbar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--moon), var(--violet)); transition: width .25s linear; }

        /* ═════════ TV ═════════ */
        .tv { height: 100dvh; display: flex; flex-direction: column; padding: 3vmin 3.4vmin; gap: 2vmin; position: relative; }
        .tv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2vmin; }
        .tv-logo { font-family: 'Fraunces', serif; font-weight: 900; font-size: 3.2vmin; color: var(--moon); text-shadow: 0 0 26px rgba(245,230,184,.4); }
        .tv-meta { font-size: 1.8vmin; font-weight: 900; letter-spacing: .35vmin; text-transform: uppercase; color: var(--muted); }
        .tv-scene { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.2vmin; text-align: center; min-height: 0; position: relative; }
        .tv-scene .moon-big { font-size: 13vmin; filter: drop-shadow(0 0 5vmin rgba(245,230,184,.45)); }
        .tv-narrator { font-family: 'Fraunces', serif; font-weight: 900; font-size: 3.6vmin; line-height: 1.4; max-width: 78%; min-height: 2.6em; }
        .tv-subline { color: var(--muted); font-weight: 800; font-size: 2vmin; }
        .tv-scene.dawn-scene::before {
            content: ''; position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(180deg, rgba(255,154,86,.28) 0%, rgba(255,211,154,.10) 45%, transparent 75%);
        }
        .tv-villagers { display: flex; gap: 1.4vmin; flex-wrap: wrap; justify-content: center; max-width: 84%; }
        .tv-vchip {
            display: flex; align-items: center; gap: 1vmin; background: var(--panel); border: 1px solid var(--border2);
            border-radius: 1.4vmin; padding: 1.1vmin 1.7vmin; font-weight: 900; font-size: 2.1vmin;
        }
        .tv-vchip.dead { opacity: .45; }
        .tv-vchip.dead .nm { text-decoration: line-through; }
        .tv-vchip .role-tag { font-size: 1.5vmin; color: var(--muted); }
        .tv-count { font-family: 'Fraunces', serif; font-weight: 900; font-size: 5vmin; color: var(--moon); }
        .tv-timer-wrap { width: 56%; height: 1.5vmin; border-radius: .8vmin; background: rgba(255,255,255,.1); overflow: hidden; }
        .tv-timer { height: 100%; background: linear-gradient(90deg, var(--moon), var(--violet)); border-radius: .8vmin; transition: width .25s linear; }
        .tv-daynum { position: absolute; top: 0; right: 0; font-size: 1.8vmin; font-weight: 900; color: var(--muted); letter-spacing: .3vmin; }

        /* TV lobby */
        .tv-lobby { flex: 1; display: flex; gap: 4vmin; align-items: center; min-height: 0; }
        .tv-lobby .qr-side { background: #171a36; border: 1px solid var(--border); border-radius: 2.2vmin; padding: 3.2vmin; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
        .tv-lobby .qr-side .qr-wrap { width: 32vmin; margin: 1.4vmin auto; }
        .tv-lobby .qr-side .room-code { font-size: 4.6vmin; letter-spacing: 1.9vmin; padding-left: 1.9vmin; }
        .tv-lobby .join-hint { font-size: 1.7vmin; font-weight: 700; color: var(--muted); }
        .tv-players { flex: 1; display: flex; flex-direction: column; gap: 1.5vmin; min-width: 0; }
        .tv-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20vmin, 1fr)); gap: 1.5vmin; }
        .tv-pcard {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 1.7vmin;
            padding: 1.7vmin; text-align: center; font-weight: 900; font-size: 2vmin; animation: popIn .35s ease both;
        }
        .tv-pcard .pdot { width: 2.2vmin; height: 2.2vmin; margin: 0 auto 1vmin; }
        @keyframes popIn { from { opacity: 0; } to { opacity: 1; } }
        .tv-waiting { color: var(--muted); font-weight: 800; font-size: 1.9vmin; }

        /* TV finale */
        .reveal-grid { display: flex; gap: 1.6vmin; flex-wrap: wrap; justify-content: center; max-width: 88%; }
        .reveal-tile {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 1.8vmin;
            padding: 1.8vmin 2.4vmin; font-weight: 900; font-size: 2.1vmin; text-align: center; animation: popIn .5s ease both;
        }
        .reveal-tile .re { font-size: 3.4vmin; }
        .reveal-tile.dead { opacity: .55; }
        .reveal-tile .rr { font-size: 1.6vmin; letter-spacing: .2vmin; text-transform: uppercase; }
        .stats-row { display: flex; gap: 1.4vmin; flex-wrap: wrap; justify-content: center; color: var(--muted); font-weight: 800; font-size: 1.7vmin; }

        #confetti-cv { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

        /* sound toggles (stacked so they never cross the centred logo) */
        #sound-togs { position: fixed; top: 8px; right: 8px; z-index: 80; display: flex; flex-direction: column; gap: 5px; }
        #sound-togs button {
            width: 31px; height: 31px; border-radius: 50%; border: none; cursor: pointer; font-size: .85rem;
            background: rgba(26,29,58,.85); box-shadow: inset 0 0 0 1px var(--border); color: var(--text);
            transition: opacity .2s, transform .12s;
        }
        #sound-togs button:active { transform: scale(.88); }
        #sound-togs button.off { opacity: .35; filter: grayscale(1); }
        body.viewer-mode .tv-top { padding-right: 4.5vmin; }

        /* FX layer — particles + floating pop text */
        .pt {
            position: fixed; width: 8px; height: 8px; border-radius: 50%; z-index: 950; pointer-events: none;
            animation: ptFly .8s cubic-bezier(.15,.65,.4,1) forwards;
        }
        @keyframes ptFly {
            0%   { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(.25); opacity: 0; }
        }
        .pop {
            position: fixed; z-index: 960; pointer-events: none;
            font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.5rem; white-space: nowrap;
            animation: popUp 1.1s cubic-bezier(.2,.8,.3,1) forwards; text-shadow: 0 2px 14px rgba(0,0,0,.7);
        }
        .pop.gold { color: var(--moon); }
        .pop.good { color: var(--heal); }
        .pop.bad  { color: #fca5a5; }
        @keyframes popUp {
            0%   { transform: translate(-50%, 0) scale(.5); opacity: 0; }
            15%  { transform: translate(-50%, -12px) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -74px) scale(1); opacity: 0; }
        }

        /* entrances — only on real screen changes (#app.fresh), never on mid-phase patches */
        @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        body:not(.viewer-mode) #app.fresh > * { animation: cardIn .38s cubic-bezier(.2,.8,.3,1) both; }
        body:not(.viewer-mode) #app.fresh > *:nth-child(2) { animation-delay: .05s; }
        body:not(.viewer-mode) #app.fresh > *:nth-child(3) { animation-delay: .1s; }
        body:not(.viewer-mode) #app.fresh > *:nth-child(4) { animation-delay: .15s; }
        body:not(.viewer-mode) #app.fresh > *:nth-child(5) { animation-delay: .2s; }
        body:not(.viewer-mode) #app.fresh > *:nth-child(6) { animation-delay: .25s; }
        @keyframes pickIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: none; } }
        #app.fresh .pickbtn, #app.fresh .player-row, #app.fresh .ghost-tile {
            animation: pickIn .32s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(.12s + var(--i, 0) * 45ms);
        }
        @keyframes bigPop { 0% { transform: scale(.3); opacity: 0; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        #app.fresh .scene .big { animation: bigPop .5s cubic-bezier(.2,.8,.3,1) both; display: inline-block; }
        @keyframes shakeX {
            10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-5px); } 40%, 60% { transform: translateX(5px); }
        }
        .err { animation: shakeX .45s both; }
        body:not(.viewer-mode) #app.fresh > .err { animation: cardIn .38s cubic-bezier(.2,.8,.3,1) both, shakeX .45s .38s both; }
        .role-card.peeked { transform: scale(.985); transition: transform .15s; }

        /* TV entrances + moon drift */
        @keyframes tvSceneIn { from { opacity: 0; transform: translateY(2.4vmin); } to { opacity: 1; transform: none; } }
        body.viewer-mode #app.fresh .tv-scene, body.viewer-mode #app.fresh .tv-lobby { animation: tvSceneIn .5s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes moonFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1.1vmin); } }
        .tv-scene .moon-big { animation: moonFloat 6.5s ease-in-out infinite; }
        @keyframes moonIn { 0% { transform: scale(.4); opacity: 0; } 70% { transform: scale(1.08); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        body.viewer-mode #app.fresh .moon-big { animation: moonIn .65s cubic-bezier(.2,.8,.3,1) both, moonFloat 6.5s ease-in-out .65s infinite; }
        @keyframes tileIn { from { opacity: 0; transform: translateY(2vmin) scale(.85); } to { opacity: 1; transform: none; } }
        .reveal-tile { animation: tileIn .55s cubic-bezier(.2,.8,.3,1) both; }

        /* timer urgency — final 10s */
        .timerbar.low, .tv-timer.low { background: linear-gradient(90deg, #f97316, #ef4444); }
        @keyframes pulseNum { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.28); color: #ef4444; } }
        #day-num.low, #tv-day-num.low { animation: pulseNum .9s ease-in-out infinite; display: inline-block; }

        /* ── ambient night: drifting crescent moons, twinkles & a passing wolf ── */
        #ambient { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        #ambient .amb {
            position: absolute; top: var(--y, 40%); left: var(--x, 50%);
            font-size: var(--sz, 3rem); line-height: 1; opacity: 0; will-change: transform;
            filter: drop-shadow(0 0 10px rgba(245,230,184,.35));
            animation: ambFloat var(--d, 40s) ease-in-out var(--dl, 0s) infinite;
        }
        #ambient .amb.wolf { filter: drop-shadow(0 0 8px rgba(0,0,0,.6)); }
        #ambient .amb.twinkle {
            filter: none;
            animation: ambTwinkle var(--d, 5s) ease-in-out var(--dl, 0s) infinite;
        }
        @keyframes ambFloat {
            0%   { opacity: 0; transform: translate3d(0, 10px, 0) rotate(var(--r0, -6deg)) scale(.94); }
            16%  { opacity: var(--o, .18); }
            50%  { transform: translate3d(var(--dx, 24px), -16px, 0) rotate(var(--r1, 8deg)) scale(1.03); }
            84%  { opacity: var(--o, .18); }
            100% { opacity: 0; transform: translate3d(0, 10px, 0) rotate(var(--r0, -6deg)) scale(.94); }
        }
        @keyframes ambTwinkle {
            0%, 100% { opacity: 0; transform: scale(.5); }
            50%      { opacity: var(--o, .5); transform: scale(1.15); }
        }
        body.viewer-mode #ambient .amb { font-size: var(--tsz, var(--sz, 4vmin)); }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } #ambient { display: none; } }
    </style>
</head>
<body>
    <div id="ambient" aria-hidden="true">

<script>
// ICE_CFG + rankByScore now come from common.js (loaded in <head>).
typeof mountScene === 'function' && mountScene('night');   // themed ambient scene along the bottom of the TV

'use strict';

// ═══════════════════════════════════════════
// CONSTANTS & HELPERS
// ═══════════════════════════════════════════
const PFX = 'MOONVILL-';
const MAX_PLAYERS = 12, MIN_PLAYERS = 4;
const PLAYER_COLORS = ['#f5e6b8', '#a78bfa', '#22d3ee', '#f472b6', '#4ade80', '#fb923c', '#f87171', '#38bdf8', '#facc15', '#34d399', '#e879f9', '#94a3b8'];
const ROLES = {
    wolf:     { name: 'Werewolf', emoji: '🐺', color: '#ef4444', desc: 'Each night, choose someone to take. By day, blend in. Win when the wolves equal the rest.' },
    seer:     { name: 'Seer',     emoji: '🔮', color: '#a78bfa', desc: 'Each night, peek at one villager and learn whether they are a wolf. Guide the village — carefully.' },
    healer:   { name: 'Healer',   emoji: '💊', color: '#4ade80', desc: 'Each night, watch over one person (even yourself). If the wolves strike them, they survive.' },
    villager: { name: 'Villager', emoji: '🌾', color: '#fbbf24', desc: 'Sleep tight, then talk it out. Find the wolves before they find you.' },
};

function $id(id) { return document.getElementById(id); }
function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function shuffle(a) { const r = a.slice(); for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ── QR code (themed SVG) ──
function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++)
            for (let c = 0; c < n; c++)
                if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#fdf8ea"/>` +
            `<g fill="#171a36">${rects}</g></svg>`;
    } catch (e) { return ''; }
}

// ── Confetti ──
let _cf = { parts: [], raf: 0, running: false, until: 0 };
function startConfetti(ms) {
    if (REDUCED) return;
    const cv = $id('confetti-cv'), ctx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    _cf.until = performance.now() + (ms || 2600);
    const cols = ['#f5e6b8', '#a78bfa', '#4ade80', '#fbbf24', '#22d3ee', '#e9eaf6'];
    for (let i = 0; i < 130; i++) {
        _cf.parts.push({
            x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.5,
            vx: (Math.random() - 0.5) * 2.4, vy: 2 + Math.random() * 3.6,
            rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.25,
            w: 6 + Math.random() * 7, h: 4 + Math.random() * 5,
            col: cols[Math.floor(Math.random() * cols.length)],
        });
    }
    if (_cf.running) return;
    _cf.running = true;
    (function frame(t) {
        ctx.clearRect(0, 0, cv.width, cv.height);
        _cf.parts = _cf.parts.filter(p => p.y < cv.height + 30);
        for (const p of _cf.parts) {
            p.x += p.vx; p.y += p.vy; p.rot += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        }
        if (t < _cf.until || _cf.parts.length) _cf.raf = requestAnimationFrame(frame);
        else { _cf.running = false; ctx.clearRect(0, 0, cv.width, cv.height); }
    })(performance.now());
}

// ═══════════════════════════════════════════
// AUDIO — procedural moonlit dread
// (WebAudio sequencer + atmospheric SFX, all
//  synthesized. A-minor/phrygian, hushed sines
//  and music-box highs. Gesture-started.)
// ═══════════════════════════════════════════
let AC = null, masterGain = null, musicGain = null, sfxGain = null, noiseBuf = null;
let leadBus = null, musicDelay = null;
let musicOn = localStorage.getItem('moon-music') !== '0';
let sfxOn = localStorage.getItem('moon-sfx') !== '0';

function ac() {
    if (!AC) {
        try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
        masterGain = AC.createGain(); masterGain.gain.value = 1; masterGain.connect(AC.destination);
        musicGain = AC.createGain(); musicGain.gain.value = musicOn ? 0.33 : 0; musicGain.connect(masterGain);
        sfxGain = AC.createGain(); sfxGain.gain.value = sfxOn ? 0.55 : 0; sfxGain.connect(masterGain);
        // Lead bus with a long, dark echo — an empty village square at night
        leadBus = AC.createGain(); leadBus.gain.value = 1; leadBus.connect(musicGain);
        musicDelay = AC.createDelay(2.0); musicDelay.delayTime.value = 0.42;
        const fb = AC.createGain(); fb.gain.value = 0.3;
        const dlp = AC.createBiquadFilter(); dlp.type = 'lowpass'; dlp.frequency.value = 1500;
        const wet = AC.createGain(); wet.gain.value = 0.24;
        leadBus.connect(musicDelay); musicDelay.connect(dlp); dlp.connect(fb); fb.connect(musicDelay);
        dlp.connect(wet); wet.connect(musicGain);
        const len = AC.sampleRate * 1.2;
        noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    if (AC.state === 'suspended') AC.resume();
    return AC;
}

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide, 20), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    if (lp) {
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
        o.connect(f); f.connect(g);
    } else {
        o.connect(g);
    }
    g.connect(dest || sfxGain);
    o.start(t); o.stop(t + dur + 0.06);
}

function noiseHit(dur, { vol = 0.3, when = 0, hp = 6000, dest = null } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const src = AC.createBufferSource(); src.buffer = noiseBuf;
    const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(dest || sfxGain);
    src.start(t); src.stop(t + dur + 0.05);
}

const mf = m => 440 * Math.pow(2, (m - 69) / 12); // midi → freq

// ── SFX (hushed, atmospheric: soft chimes, bell tolls, owls, one real howl) ──
function sJoin() {  // a villager arrives — soft rising fifth
    if (!sfxOn || !AC) return;
    tone(mf(69), 0.09, { type: 'triangle', vol: 0.18 });
    tone(mf(76), 0.16, { type: 'triangle', vol: 0.18, when: 0.07 });
}
function sTap() { if (!sfxOn || !AC) return; tone(mf(72), 0.05, { type: 'triangle', vol: 0.1, lp: 1800 }); }
function sPeek() {  // hold-to-peek — a whisper of cloth
    if (!sfxOn || !AC) return;
    noiseHit(0.05, { vol: 0.04, hp: 4000 });
    tone(mf(81), 0.06, { type: 'sine', vol: 0.07, lp: 2500 });
}
function sReady() {  // role memorised — soft confirm chime
    if (!sfxOn || !AC) return;
    tone(mf(69), 0.08, { type: 'triangle', vol: 0.16, lp: 2200 });
    tone(mf(76), 0.13, { type: 'triangle', vol: 0.14, when: 0.07, lp: 2200 });
}
function sPick() {  // night action — a private, muffled click
    if (!sfxOn || !AC) return;
    tone(mf(64), 0.05, { type: 'sine', vol: 0.15, lp: 1400 });
    noiseHit(0.025, { vol: 0.035, hp: 5000, when: 0.01 });
}
function sDeal() {  // roles dealt — card swishes over a low root
    if (!sfxOn || !AC) return;
    noiseHit(0.14, { vol: 0.09, hp: 2000 });
    noiseHit(0.12, { vol: 0.07, hp: 3400, when: 0.09 });
    tone(mf(45), 0.3, { type: 'sine', vol: 0.14, when: 0.04 });
}
function sNight() {  // night falls — descending whoosh, wind, owl fifth E5→A4
    if (!sfxOn || !AC) return;
    tone(460, 1.0, { type: 'sine', vol: 0.14, slide: 50 });
    noiseHit(0.8, { vol: 0.045, hp: 900 });
    tone(mf(76), 0.45, { type: 'sine', vol: 0.09, when: 0.85 });
    tone(mf(69), 0.7, { type: 'sine', vol: 0.09, when: 1.15 });
}
function sSeer() {  // the vision arrives — mystical shimmer
    if (!sfxOn || !AC) return;
    [76, 80, 83, 88].forEach((m, i) => tone(mf(m), 0.28, { type: 'sine', vol: 0.08, when: i * 0.08, lp: 4200 }));
}
function sDawn() {  // dawn reveal sting — slow minor arpeggio, first birds

    [57, 64, 69, 72].forEach((m, i) => tone(mf(m), 0.5, { type: 'sine', vol: 0.09, when: i * 0.13 }));

}
function sBirds() { if (!sfxOn || !AC) return; [2350, 2700, 2500, 2950, 2600].forEach((f, i) => tone(f, 0.08, { type: 'sine', vol: 0.035, when: i * 0.12 })); }
function sSaved() {  // the healer's save — gentle A-major sparkle
    if (!sfxOn || !AC) return;
    [69, 73, 76, 81].forEach((m, i) => tone(mf(m), 0.35, { type: 'triangle', vol: 0.12, when: i * 0.09, lp: 3500 }));
}
function sBell(n = 2) {  // elimination bell — deep toll with minor-third partial
    if (!sfxOn || !AC) return;
    duckMusic(1.2 * n);
    for (let k = 0; k < n; k++) {
        const w = k * 1.15;
        tone(220, 2.2, { type: 'sine', vol: 0.26, when: w });
        tone(551, 1.3, { type: 'sine', vol: 0.07, when: w });
        tone(882, 0.6, { type: 'sine', vol: 0.035, when: w });
        noiseHit(0.03, { vol: 0.05, hp: 6000, when: w });
    }
}
function sVoteBell() {  // the vote opens — one softer, higher toll
    if (!sfxOn || !AC) return;
    tone(311, 1.5, { type: 'sine', vol: 0.16 });
    tone(777, 0.8, { type: 'sine', vol: 0.05 });
    tone(1245, 0.35, { type: 'sine', vol: 0.03 });
}
function sVoteCast() {  // accusation lands — a stamp on parchment
    if (!sfxOn || !AC) return;
    tone(196, 0.12, { type: 'sine', vol: 0.18, slide: 140 });
    noiseHit(0.05, { vol: 0.06, hp: 2800, when: 0.02 });
}
function sTie() { if (!sfxOn || !AC) return; tone(mf(62), 0.35, { type: 'triangle', vol: 0.11 }); tone(mf(61), 0.5, { type: 'triangle', vol: 0.09, when: 0.28 }); }
function sTickT() { if (!sfxOn || !AC) return; tone(1150, 0.04, { type: 'square', vol: 0.07, lp: 2800 }); }
function sHowl() {  // a real wolf howl — rise, hold, droop; a distant answer
    if (!sfxOn || !AC) return;
    duckMusic(2.0);
    const t = AC.currentTime;
    const howl = (start, peak, end, dur, vol, delay) => {
        const o = AC.createOscillator(), g = AC.createGain();
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1100;
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(start, t + delay);
        o.frequency.linearRampToValueAtTime(peak, t + delay + dur * 0.32);
        o.frequency.linearRampToValueAtTime(peak * 0.97, t + delay + dur * 0.6);
        o.frequency.linearRampToValueAtTime(end, t + delay + dur);
        g.gain.setValueAtTime(0, t + delay);
        g.gain.linearRampToValueAtTime(vol, t + delay + 0.09);
        g.gain.exponentialRampToValueAtTime(0.0001, t + delay + dur);
        o.connect(f); f.connect(g); g.connect(sfxGain);
        o.start(t + delay); o.stop(t + delay + dur + 0.05);
    };
    howl(233, 494, 311, 1.7, 0.16, 0);
    howl(175, 370, 233, 1.6, 0.055, 0.55);
}
function sWinV() {  // village wins — the dusk melody bugled into morning light
    if (!sfxOn || !AC) return;
    duckMusic(1.6);
    // quotes the lobby lead's opening phrase — the village reclaims its own tune
    [69, 72, 71, 69, 67, 64, 65, 67].forEach((m, i) => tone(mf(m), 0.2, { type: 'triangle', vol: 0.2, when: i * 0.12, lp: 3600 }));
    [84, 81, 84, 88].forEach((m, i) => tone(mf(m), 0.14, { type: 'sine', vol: 0.1, when: 1.02 + i * 0.09 }));
    noiseHit(0.6, { vol: 0.1, when: 1.35, hp: 6000 });
}
function sWinW() {  // wolves win — deep phrygian shudder under the howl
    if (!sfxOn || !AC) return;
    duckMusic(1.6);
    tone(mf(33), 1.8, { type: 'sine', vol: 0.3 });
    // the same lobby phrase, dragged two octaves down — the village tune belongs to the wolves now
    [45, 48, 47, 45, 43, 40, 41, 43].forEach((m, i) => tone(mf(m), 0.42, { type: 'sine', vol: 0.13, when: 0.2 + i * 0.17, lp: 1100 }));
    tone(mf(34), 1.6, { type: 'sine', vol: 0.16, when: 1.0 });
    sHowl();
}
// Duck the music briefly so big stingers read clearly (sidechain feel)
function duckMusic(dur = 0.5) {
    if (!AC || !musicGain || !musicOn) return;
    const t = AC.currentTime;
    musicGain.gain.cancelScheduledValues(t);
    musicGain.gain.setValueAtTime(0.1, t);
    musicGain.gain.linearRampToValueAtTime(0.33, t + dur);
}

// Adaptive arrangement: 1 = drums + bass + lead, 2 = full (stabs + moonlight shimmer).
// Key shift creeps the whole score up a semitone when the wolves near parity.
let musicIntensity = 2, musicKeyShift = 0;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Swing: push every off-16th slightly late for a looser sway
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) tone(130, 0.28, { type: 'sine', vol: 0.4, when: rel, slide: 40, dest: musicGain });
    if (tr.hat[i]) {
        const hv = (i % 4 === 2 ? 0.1 : 0.05) * (0.8 + Math.random() * 0.4);
        noiseHit(0.04, { vol: hv, when: rel, hp: 9500, dest: musicGain });
    }
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) tone(mf(b + k), stepDur * 1.7, { type: w.bass || 'sine', vol: 0.3, when: rel, dest: musicGain, lp: 900, attack: 0.008 });
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    if (full && tr.stab && tr.stab[i] && ch)
        ch.forEach(m => tone(mf(m + 12 + k), stepDur * 0.9, { type: w.stab || 'sine', vol: 0.03, when: rel, lp: 2400, dest: musicGain, attack: 0.005 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12;
        tone(mf(l + k), stepDur * 1.6, { type: w.lead || 'sine', vol: 0.12 * (0.9 + Math.random() * 0.2), when: rel, dest: leadBus, lp: tr.leadLp || 2800, attack: 0.008 });
    }
    // Music-box shimmer two octaves above the pads — the moonlight voice
    if (full && tr.arp && i % tr.arp === 0 && ch)
        tone(mf(ch[(i / tr.arp) % ch.length] + 24 + k), stepDur * tr.arp * 0.9, { type: w.arpW || 'sine', vol: 0.04, when: rel, lp: 5000, dest: musicGain, attack: 0.004 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.035, { vol: 0.09, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    // adaptive: full arrangement by default; the vote strips it back (see below)
    musicIntensity = 2;
    if (track === 'lobby' || track === 'over_v' || track === 'over_w') musicKeyShift = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'day') musicUrgent = false;
    // one-beat low-tom fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) tone(110 - f * 8, 0.09, { type: 'sine', vol: 0.16 + f * 0.03, when: f * s, slide: 70, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}
// Adaptive layers: the vote opens with shimmer and stabs withdrawn — the village
// holds its breath — and the full arrangement returns once half have voted
function bumpVoteIntensity(counts) {
    if (!counts || !counts.votesNeeded) return;
    if (counts.votesIn / counts.votesNeeded >= 0.5) musicIntensity = Math.max(musicIntensity, 2);
}
// A semitone of dread: when the wolves are one death from parity, the whole score
// creeps up a half-step. Uses public info only (dead roles + the dealt wolf count).
function updateDreadShift(msg) {
    if (!msg || !msg.players || msg.winner || msg.phase === 'lobby' || msg.phase === 'gameover') return;
    const ps = msg.players;
    const wolvesAlive = wolvesFor(ps.length) - ps.filter(p => !p.alive && p.role === 'wolf').length;
    const othersAlive = ps.filter(p => p.alive).length - wolvesAlive;
    musicKeyShift = (wolvesAlive > 0 && wolvesAlive >= othersAlive - 1) ? 1 : 0;
}

// ── Particle bursts + floating pop text ──
function burst(x, y, colors, n = 14) {
    if (REDUCED) return;
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;
        p.style.cssText = `left:${x}px;top:${y}px;background:${colors[i % colors.length]};` +
            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 850);
    }
}
function popText(x, y, text, cls = 'gold') {
    const el = document.createElement('div');
    el.className = 'pop ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1150);
}

function send(conn, msg) { try { conn.send(msg); } catch (e) { console.warn('send err', e); } }
function broadcastViewers(msg) { Object.values(viewerConns).forEach(c => send(c, msg)); }

function hostAddPlayer(id, name) {
    if (H.players.find(p => p.id === id) || H.players.length >= MAX_PLAYERS) return;
    H.players.push({
        id, name, color: PLAYER_COLORS[H.players.length % PLAYER_COLORS.length],
        role: null, alive: true, ready: false, vote: null,
    });
}

function lobbyMsg() {
    return {
        type: 'lobby', roomCode,
        players: H.players.map(p => ({ name: p.name, color: p.color })),
        settings: { ...H.settings },
        wolves: wolvesFor(Math.max(H.players.length, MIN_PLAYERS)),
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function broadcastLobby() {
    H.players.forEach(p => { if (p.id !== myId && guestConns[p.id]) send(guestConns[p.id], lobbyMsg()); });
    broadcastViewers({ ...lobbyMsg(), type: 'viewer_lobby' });
    hostSyncSelf(lobbyMsg());
}

function nightCounts() {
    if (!H.night) return { in: 0, needed: 0 };
    const wolves = aliveWolves();
    const seer = alivePlayers().find(p => p.role === 'seer');
    const healer = H.settings.healer ? alivePlayers().find(p => p.role === 'healer') : null;
    let needed = wolves.length + (seer ? 1 : 0) + (healer ? 1 : 0);
    let got = Object.keys(H.night.wolfVotes).length + (seer && H.night.seerDone ? 1 : 0) + (healer && H.night.healerDone ? 1 : 0);
    return { in: got, needed };
}

function publicPlayers() {
    // roles are public only for the dead, or for everyone at game over
    return H.players.map(q => ({
        name: q.name, color: q.color, alive: q.alive, ready: q.ready,
        role: (!q.alive || H.phase === 'gameover') ? q.role : null,
    }));
}

function stateFor(p) {
    const nc = nightCounts();
    const votesNeeded = alivePlayers().length;
    const votesIn = alivePlayers().filter(q => q.vote).length;
    return {
        type: 'state',
        phase: H.phase, dayNum: H.dayNum, roomCode,
        settings: { ...H.settings },
        me: p ? {
            role: p.role, alive: p.alive, ready: p.ready, votedFor: p.vote,
            mates: p.role === 'wolf' ? H.players.filter(q => q.role === 'wolf' && q.id !== p.id).map(q => q.name) : [],
            nightDone: hasActed(p),
            seer: p.role === 'seer' ? (p.seerSeen || []) : [],
            reveal: !p.alive ? H.players.map(q => ({ name: q.name, role: q.role, alive: q.alive })) : null,
        } : null,
        players: publicPlayers(),
        counts: {
            ready: H.players.filter(q => q.ready).length, total: H.players.length,
            actionsIn: nc.in, actionsNeeded: nc.needed,
            votesIn, votesNeeded,
        },
        lastNight: H.lastNight, lastBanish: H.lastBanish, winner: H.winner,
        stats: H.phase === 'gameover' ? H.sessionStats : null,
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function viewerStateMsg() { return { ...stateFor(null), type: 'viewer_state', me: undefined }; }
function broadcastState() {
    H.players.forEach(p => {
        if (p.id === myId) return;
        const conn = guestConns[p.id];
        if (conn) send(conn, stateFor(p));
    });
    broadcastViewers(viewerStateMsg());
    hostSyncSelf(isTvHost ? null : stateFor(H.players.find(p => p.id === myId)));
}

function hasActed(p) {
    if (!H.night || !p.alive) return true;
    if (p.role === 'wolf') return !!H.night.wolfVotes[p.id];
    if (p.role === 'seer') return H.night.seerDone;
    if (p.role === 'healer' && H.settings.healer) return H.night.healerDone;
    return true;
}

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            send(conn, H.phase === 'lobby' ? { ...lobbyMsg(), type: 'viewer_lobby' } : viewerStateMsg());
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const name = String(msg.name || 'Villager').slice(0, 16);
                const zombie = H.players.find(p => p.name === name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else if (H.phase === 'lobby') hostAddPlayer(conn.peer, name);
                const p2 = H.players.find(p => p.id === conn.peer);
                if (!p2) { send(conn, lobbyMsg()); break; }
                if (H.phase === 'lobby') broadcastLobby();
                else { send(conn, stateFor(p2)); broadcastViewers(viewerStateMsg()); if (isTvHost) tvHostSync(); }
                break;
            }
            case 'role_ready':   if (player) hostRoleReady(player); break;
            case 'night_action': if (player) hostNightAction(player, msg.pick); break;
            case 'vote':         if (player) hostVote(player, msg.pick); break;
            case 'ctl': {
                if (!isTvHost || !player || player.id !== H.players[0]?.id) break;
                hostCtl(msg.action, msg);
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        } else {
            // mid-game disconnect: don't stall the night/vote on a vanished player
            checkNightResolve();
            checkVoteResolve();
        }
    });
    conn.on('error', e => console.warn('conn err', e));
}

function hostCtl(action, msg) {
    if (action === 'start' && H.phase === 'lobby') hostStartGame();
    else if (action === 'skipday' && H.phase === 'day') startVote();
    else if (action === 'again' && H.phase === 'gameover') hostNewGame();
    else if (action === 'set' && H.phase === 'lobby') {
        if (typeof msg.healer === 'boolean') H.settings.healer = msg.healer;
        if ([60, 90, 120].includes(msg.daySecs)) H.settings.daySecs = msg.daySecs;
        broadcastLobby();
    }
}
function guestCtl(action, extra) {
    sTap();
    if (isHost && !isTvHost) { hostCtl(action, extra || {}); return; }
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ── Create a room (phone host or TV host) ──
function makeRoom(onOpen) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(PFX + roomCode, ICE_CFG);
    peer.on('open', id => { myId = id; isHost = true; onOpen(); });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        isHost = false; isTvHost = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

function tvHostSync() {
    if (!isTvHost) return;
    applyViewerMsg(H.phase === 'lobby' ? { ...lobbyMsg(), type: 'viewer_lobby' } : viewerStateMsg());
}
function hostSyncSelf(msg) {
    if (isTvHost) { tvHostSync(); return; }
    if (isHost && msg) applyMsg(msg);
}

// ═══════════════════════════════════════════
// HOST GAME FLOW
// ═══════════════════════════════════════════
function clearPhaseTimer() { clearTimeout(_phaseTimer); _phaseTimer = null; }

function assignRoles() {
    const n = H.players.length;
    const roles = [];
    for (let i = 0; i < wolvesFor(n); i++) roles.push('wolf');
    roles.push('seer');
    if (H.settings.healer && roles.length < n) roles.push('healer');
    while (roles.length < n) roles.push('villager');
    const dealt = shuffle(roles);
    H.players.forEach((p, i) => {
        p.role = dealt[i]; p.alive = true; p.ready = false; p.vote = null; p.seerSeen = [];
    });
}

function hostStartGame() {
    if (connectedPlayers().length < MIN_PLAYERS) {
        uiErr = 'Need at least ' + MIN_PLAYERS + ' villagers.';
        if (ui === 'lobby_h') render();
        return;
    }
    clearPhaseTimer();
    H.dayNum = 0; H.lastNight = null; H.lastBanish = null; H.winner = null;
    assignRoles();
    H.phase = 'deal';
    broadcastState();
}

function hostRoleReady(p) {
    if (H.phase !== 'deal' || p.ready) return;
    p.ready = true;
    if (H.players.every(q => q.ready)) startNight();
    else broadcastState();
}

function startNight() {
    clearPhaseTimer();
    H.dayNum += 1;
    H.lastNight = null; H.lastBanish = null;
    H.night = { wolfVotes: {}, order: [], seerDone: false, healerPick: null, healerDone: false };
    H.players.forEach(p => { p.vote = null; });
    H.phase = 'night';
    broadcastState();
}

function hostNightAction(p, pick) {
    if (H.phase !== 'night' || !p.alive || !H.night) return;
    const target = H.players.find(q => q.name === pick && q.alive);
    if (p.role === 'wolf') {
        if (!target || target.role === 'wolf' || H.night.wolfVotes[p.id]) return;
        H.night.wolfVotes[p.id] = target.name;
        H.night.order.push(target.name);
    } else if (p.role === 'seer') {
        if (!target || target.id === p.id || H.night.seerDone) return;
        p.seerSeen = p.seerSeen || [];
        p.seerSeen.push({ name: target.name, isWolf: target.role === 'wolf' });
        H.night.seerDone = true;
    } else if (p.role === 'healer' && H.settings.healer) {
        if (!target || H.night.healerDone) return;
        H.night.healerPick = target.name;
        H.night.healerDone = true;
    } else return;
    checkNightResolve();
    broadcastState();
}

function checkNightResolve() {
    if (H.phase !== 'night' || !H.night) return;
    // only wait for actors who are alive AND still connected
    const pending = alivePlayers().filter(p =>
        (p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]) && !hasActed(p));
    if (pending.length) return;
    if (!Object.keys(H.night.wolfVotes).length) return;  // a wolf must have voted
    resolveNight();
}

function resolveNight() {
    // majority victim; ties go to the earliest-cast vote among the tied
    const tally = {};
    Object.values(H.night.wolfVotes).forEach(n => { tally[n] = (tally[n] || 0) + 1; });
    const max = Math.max(...Object.values(tally));
    const tied = Object.keys(tally).filter(n => tally[n] === max);
    const victimName = tied.length === 1 ? tied[0] : H.night.order.find(n => tied.includes(n));
    const victim = H.players.find(p => p.name === victimName);
    const saved = H.night.healerPick === victimName;
    if (victim && !saved) victim.alive = false;
    H.lastNight = { victim: victimName, role: victim ? victim.role : null, saved };
    H.night = null;
    H.phase = 'dawn';
    checkWin();
    broadcastState();
    clearPhaseTimer();
    _phaseTimer = setTimeout(() => {
        if (H.winner) { showGameover(); return; }
        startDay();
    }, 7000);
}

function startDay() {
    clearPhaseTimer();
    H.phase = 'day';
    broadcastState();
    _phaseTimer = setTimeout(startVote, H.settings.daySecs * 1000);
}

function startVote() {
    if (H.phase !== 'day') return;
    clearPhaseTimer();
    H.phase = 'vote';
    H.players.forEach(p => { p.vote = null; });
    broadcastState();
}

function hostVote(p, pick) {
    if (H.phase !== 'vote' || !p.alive || p.vote) return;
    const target = H.players.find(q => q.name === pick && q.alive && q.id !== p.id);
    if (!target) return;
    p.vote = target.name;
    checkVoteResolve();
    broadcastState();
}

function checkVoteResolve() {
    if (H.phase !== 'vote') return;
    const pending = alivePlayers().filter(p =>
        (p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]) && !p.vote);
    if (pending.length) return;
    if (!alivePlayers().some(p => p.vote)) return;
    resolveVote();
}

function resolveVote() {
    const tally = {};
    alivePlayers().forEach(p => { if (p.vote) tally[p.vote] = (tally[p.vote] || 0) + 1; });
    const max = Math.max(...Object.values(tally));
    const tied = Object.keys(tally).filter(n => tally[n] === max);
    if (tied.length === 1) {
        const banished = H.players.find(p => p.name === tied[0]);
        banished.alive = false;
        H.lastBanish = { name: banished.name, role: banished.role, tie: false };
    } else {
        H.lastBanish = { name: null, role: null, tie: true };
    }
    H.phase = 'verdict';
    checkWin();
    broadcastState();
    clearPhaseTimer();
    _phaseTimer = setTimeout(() => {
        if (H.winner) { showGameover(); return; }
        startNight();
    }, 7000);
}

function checkWin() {
    const wolves = aliveWolves().length;
    const others = alivePlayers().length - wolves;
    if (wolves === 0) H.winner = 'village';
    else if (wolves >= others) H.winner = 'wolves';
}

function showGameover() {
    clearPhaseTimer();
    H.phase = 'gameover';
    H.players.forEach(p => {
        const s = H.sessionStats[p.name] = H.sessionStats[p.name] || { games: 0, wolfWins: 0, villageWins: 0 };
        s.games += 1;
        if (H.winner === 'wolves' && p.role === 'wolf') s.wolfWins += 1;
        if (H.winner === 'village' && p.role !== 'wolf') s.villageWins += 1;
    });
    broadcastState();
}

function hostNewGame() {
    clearPhaseTimer();
    H.phase = 'lobby';
    H.dayNum = 0; H.night = null; H.lastNight = null; H.lastBanish = null; H.winner = null;
    H.players.forEach(p => { p.role = null; p.alive = true; p.ready = false; p.vote = null; p.seerSeen = []; });
    H.players = H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
    broadcastLobby();
    if (isHost && !isTvHost) { ui = 'lobby_h'; render(); }
}

function hostSet(patch) {
    Object.assign(H.settings, patch);
    broadcastLobby();
    if (ui === 'lobby_h') render();
}

// ═══════════════════════════════════════════
// CLIENT (phone) MESSAGE HANDLING
// ═══════════════════════════════════════════
function stopClientTick() { clearInterval(_clientTick); _clientTick = null; }

function applyMsg(msg) {
    const prev = D;
    switch (msg.type) {
        case 'lobby': {
            const prevN = prev && prev.type === 'lobby' ? (prev.players || []).length : -1;
            D = msg;
            stopClientTick();
            setMusic('lobby');
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            ui = (isHost && !isTvHost) ? 'lobby_h' : 'lobby_g';
            render();
            break;
        }
        case 'state': {
            D = msg;
            const phaseChanged = !prev || prev.type !== 'state' || prev.phase !== msg.phase || prev.dayNum !== msg.dayNum
                || (prev.me && msg.me && prev.me.role !== msg.me.role);   // re-deal reaches a phone mid-phase
            if (msg.phase === 'day' && phaseChanged) {
                _dayTotal = msg.settings.daySecs * 1000;
                _dayEndsAt = Date.now() + _dayTotal;
                _lastTickSec = -1;
                stopClientTick();
                _clientTick = setInterval(patchDayTimer, 250);
            } else if (msg.phase !== 'day') stopClientTick();
            ui = msg.phase === 'lobby' ? ((isHost && !isTvHost) ? 'lobby_h' : 'lobby_g') : msg.phase;
            if (phaseChanged) {
                if (msg.phase !== 'day') musicUrgent = false;
                updateDreadShift(msg);
                render();
                if (msg.phase === 'lobby') setMusic('lobby');
                else if (msg.phase === 'deal') { setMusic('night'); sDeal(); }
                else if (msg.phase === 'night') { setMusic('night'); sNight(); }
                else if (msg.phase === 'dawn') {
                    setMusic('night');
                    if (msg.lastNight && msg.lastNight.saved) { sDawn(); sSaved(); }
                    else if (msg.lastNight && msg.lastNight.victim) { sBell(2); setTimeout(sHowl, 1100); }
                    else sDawn();
                }
                else if (msg.phase === 'day') { setMusic('day'); sBirds(); }
                else if (msg.phase === 'vote') { setMusic('day'); musicIntensity = 1; sVoteBell(); }
                else if (msg.phase === 'verdict') {
                    setMusic('day');
                    musicIntensity = 2;
                    const lb = msg.lastBanish || {};
                    if (lb.tie) sTie(); else sBell(1);
                    if (lb.role === 'wolf' && msg.me && msg.me.role !== 'wolf')
                        burst(innerWidth / 2, innerHeight * 0.3, ['#f5e6b8', '#a78bfa', '#4ade80'], 16);
                }
                else if (msg.phase === 'gameover') {
                    setMusic(msg.winner === 'village' ? 'over_v' : 'over_w');
                    const iWon = msg.me && ((msg.winner === 'wolves') === (msg.me.role === 'wolf'));
                    if (msg.winner === 'village') sWinV(); else sWinW();
                    if (iWon) {
                        startConfetti(3600);
                        popText(innerWidth / 2, innerHeight * 0.24, 'Victory!', 'gold');
                        burst(innerWidth / 2, innerHeight * 0.28, ['#f5e6b8', '#a78bfa', '#4ade80', '#fbbf24'], 20);
                        try { navigator.vibrate && navigator.vibrate([90, 40, 90, 40, 220]); } catch (e) {}
                    }
                }
            } else patchState(msg);
            break;
        }
    }
}

// mid-phase updates only touch counters — never re-render a phone mid-choice
function patchState(msg) {
    const rc = $id('ready-count');
    if (rc) rc.textContent = `${msg.counts.ready} of ${msg.counts.total} ready`;
    const na = $id('night-count');
    if (na) na.textContent = `${msg.counts.actionsIn} of ${msg.counts.actionsNeeded}`;
    const vc = $id('vote-count');
    if (vc) vc.textContent = `${msg.counts.votesIn} of ${msg.counts.votesNeeded} votes in`;
    if (msg.phase === 'vote') bumpVoteIntensity(msg.counts);
    // seer result arrives mid-night without a phase change
    if (msg.phase === 'night' && msg.me && msg.me.role === 'seer' && msg.me.nightDone && !$id('seer-result')) { render(); sSeer(); }
    if (msg.phase === 'night' && msg.me && msg.me.nightDone && $id('pick-wrap') && !$id('night-waiting')) render();
}

let _lastTickSec = -1;
function patchDayTimer() {
    const left = Math.max(0, _dayEndsAt - Date.now());
    const bar = $id('day-bar'), num = $id('day-num');
    const low = left <= 10500 && left > 0;
    const sec = Math.ceil(left / 1000);
    if (bar) { bar.style.width = (left / _dayTotal * 100) + '%'; bar.classList.toggle('low', low); }
    if (num) { num.textContent = sec + 's'; num.classList.toggle('low', low); }
    musicUrgent = low;
    if (low && sec !== _lastTickSec) { _lastTickSec = sec; sTickT(); }
    if (left <= 0) { stopClientTick(); musicUrgent = false; }
}

function sendReady() {
    if (D && D.me && D.me.ready) return;   // already acknowledged — don't re-send / re-chime
    sReady();
    if (isHost && !isTvHost) { const me = H.players.find(p => p.id === myId); if (me) hostRoleReady(me); }
    else send(hostConn, { type: 'role_ready' });
}
function sendNightAction(name) {
    if (D && D.me && D.me.nightDone) return;
    sPick();
    if (isHost && !isTvHost) { const me = H.players.find(p => p.id === myId); if (me) hostNightAction(me, name); }
    else send(hostConn, { type: 'night_action', pick: name });
}
function sendVote(name) {
    if (D && D.me && D.me.votedFor) return;
    sVoteCast();
    if (isHost && !isTvHost) { const me = H.players.find(p => p.id === myId); if (me) hostVote(me, name); }
    else send(hostConn, { type: 'vote', pick: name });
}

// ═══════════════════════════════════════════
// VIEWER (TV) MESSAGE HANDLING
// ═══════════════════════════════════════════
let _vTick = null, _vEndsAt = 0, _vTotal = 1;
function stopViewerTimers() { clearInterval(_vTick); _vTick = null; clearInterval(_typeTimer); _typeTimer = null; }

let _vLastTickSec = -1;
function applyViewerMsg(msg) {
    document.body.classList.add('viewer-mode');
    ui = 'viewer';
    const prev = vD;
    vD = msg;
    if (msg.type === 'viewer_lobby') {
        const prevN = prev && prev.type === 'viewer_lobby' ? (prev.players || []).length : -1;
        stopViewerTimers();
        setMusic('lobby');
        if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
        render();
        return;
    }
    const phaseChanged = !prev || prev.type !== 'viewer_state' || prev.phase !== msg.phase || prev.dayNum !== msg.dayNum;
    if (phaseChanged) {
        stopViewerTimers();
        if (msg.phase !== 'day') musicUrgent = false;
        updateDreadShift(msg);
        render();
        typewrite();
        if (msg.phase === 'lobby') setMusic('lobby');
        else if (msg.phase === 'deal') { setMusic('night'); sDeal(); }
        else if (msg.phase === 'night') { setMusic('night'); sNight(); }
        else if (msg.phase === 'dawn') {
            setMusic('night');
            if (msg.lastNight && msg.lastNight.saved) { sDawn(); sSaved(); }
            else if (msg.lastNight && msg.lastNight.victim) { sBell(2); setTimeout(sHowl, 1100); }
            else sDawn();
        }
        else if (msg.phase === 'vote') { setMusic('day'); musicIntensity = 1; sVoteBell(); }
        else if (msg.phase === 'verdict') {
            setMusic('day');
            musicIntensity = 2;
            if (msg.lastBanish && msg.lastBanish.tie) sTie(); else sBell(1);
        }
        else if (msg.phase === 'gameover') {
            setMusic(msg.winner === 'village' ? 'over_v' : 'over_w');
            if (msg.winner === 'village') sWinV(); else sWinW();
            startConfetti(5200);
        }
        if (msg.phase === 'day') {
            setMusic('day'); sBirds();
            _vTotal = msg.settings.daySecs * 1000;
            _vEndsAt = Date.now() + _vTotal;
            _vLastTickSec = -1;
            _vTick = setInterval(() => {
                const left = Math.max(0, _vEndsAt - Date.now());
                const bar = $id('tv-day-bar'), num = $id('tv-day-num');
                const low = left <= 10500 && left > 0;
                const sec = Math.ceil(left / 1000);
                if (bar) { bar.style.width = (left / _vTotal * 100) + '%'; bar.classList.toggle('low', low); }
                if (num) { num.textContent = sec; num.classList.toggle('low', low); }
                musicUrgent = low;
                if (low && sec !== _vLastTickSec) { _vLastTickSec = sec; sTickT(); }
                if (left <= 0) { clearInterval(_vTick); musicUrgent = false; }
            }, 250);
        }
    } else {
        if (msg.phase === 'vote') bumpVoteIntensity(msg.counts);
        const el = $id('tv-progress');
        if (el) el.textContent = tvProgressText(msg);
    }
}

function tvProgressText(msg) {
    if (msg.phase === 'deal') return `${msg.counts.ready} of ${msg.counts.total} have seen their role`;
    if (msg.phase === 'night') return `the night stirs… ${msg.counts.actionsIn} of ${msg.counts.actionsNeeded}`;
    if (msg.phase === 'vote') return `${msg.counts.votesIn} of ${msg.counts.votesNeeded} votes cast`;
    return '';
}

// typewriter for the TV narrator line
function typewrite() {
    const el = $id('tv-narrator');
    if (!el) return;
    const text = el.dataset.line || '';
    if (REDUCED) { el.textContent = text; return; }
    el.textContent = '';
    let i = 0;
    clearInterval(_typeTimer);
    _typeTimer = setInterval(() => {
        if (i >= text.length) { clearInterval(_typeTimer); return; }
        el.textContent += text[i++];
    }, 34);
}

let _lastUi = '', _lastVKey = '';
function render() {
    const app = $id('app');
    if (isTvHost || isViewer) ui = 'viewer';
    // 'fresh' marks a real screen change → entrance animations run once,
    // never on same-screen re-renders (joins, counters, seer results)
    const vKey = ui === 'viewer' ? `${vD?.type || ''}|${vD?.phase || ''}|${vD?.dayNum || 0}` : '';
    const fresh = ui !== _lastUi || vKey !== _lastVKey;
    _lastUi = ui; _lastVKey = vKey;
    let html = '';
    switch (ui) {
        case 'home':       html = renderHome(); break;
        case 'creating':   html = renderSpinner('Founding the village…'); break;

        case 'lobby_h':    html = renderLobbyH(); break;
        case 'lobby_g':    html = renderLobbyG(); break;

    app.innerHTML = html;
    app.classList.toggle('fresh', fresh);

}

            return tvScene('🌙', `Night falls on Moonlight Village… the wolves are hungry.`,

        case 'dawn': {
            const ln = vD.lastNight || {};
            const line = ln.saved

// ═══════════════════════════════════════════
// SIMULATION MODES — ?mode=tvsimulation | playersimulation  (&players=N)
// Self-driving demos with no PeerJS and no real people. Bots are counted as
// "connected" via stub guestConns so the normal host night/day flow drives itself.
//   • tvsimulation     — watch the big-screen VILLAGE play itself out
//   • playersimulation — watch a phone VILLAGER ("You") ready up, act & vote itself
// (?mode=simulation stays as an alias for tvsimulation.)
// ═══════════════════════════════════════════
let simTimer = null, simMode = 'tv', simActive = false, simPhaseSeen = '';
const SIM_NAMES = ['Ace', 'Bux', 'Cash', 'Duke', 'Edie', 'Fox', 'Gwen', 'Hawk'];

function startSimulation(nPlayers, mode) {
    simMode = mode === 'player' ? 'player' : 'tv';
    simActive = true; simPhaseSeen = '';
    roomCode = 'DEMO';
    H.settings.healer = true;
    H.settings.daySecs = 5;                           // brief day debate for the demo loop
    H.players = []; guestConns = {}; viewerConns = {};
    const n = Math.max(MIN_PLAYERS, Math.min(nPlayers || 4, MAX_PLAYERS));
    if (simMode === 'tv') {
        isHost = true; isTvHost = true; myId = '__sim_host__';
        document.body.classList.add('viewer-mode');
    } else {
        isHost = true; isTvHost = false; myName = 'You'; myId = '__you__';
        hostAddPlayer(myId, myName);                  // you are villager #1 (the host)
    }
    for (let i = H.players.length; i < n; i++) {
        const id = '__bot_' + i;
        hostAddPlayer(id, SIM_NAMES[i % SIM_NAMES.length]);
        guestConns[id] = { peer: id, send() {} };     // stub so bots count as present
    }
    broadcastLobby();                                 // show the lobby first
    simTimer = setTimeout(() => { hostStartGame(); simLoop(); }, 2400);
}

// Host phase timers (dawn→day→verdict→night) run on their own; the loop supplies
// the human inputs each phase is waiting on: readies, night actions, day votes.
function simLoop() {
    if (!simActive) return;
    const ph = H.phase;
    if (ph !== simPhaseSeen) { simPhaseSeen = ph; simTimer = setTimeout(simLoop, 1500); return; }  // let the new screen breathe
    switch (ph) {
        case 'deal':  simReadyAll(); break;
        case 'night': simNightAll(); break;
        case 'vote':  simVoteAll(); break;
        case 'gameover': simTimer = setTimeout(simRestart, 8000); return;
        // day (host daySecs timer → vote), dawn & verdict (host 7s timers) advance themselves
    }
    simTimer = setTimeout(simLoop, 1300);
}

function simReadyAll() {
    H.players.forEach(p => {
        if (p.ready) return;
        if (simMode === 'player' && p.id === myId) sendReady();   // real phone "I'm ready" path
        else hostRoleReady(p);
    });
}

function simNightAll() {
    const alive = alivePlayers();
    alive.forEach(p => {
        if (hasActed(p)) return;
        let target = null;
        if (p.role === 'wolf') {
            const prey = alive.filter(q => q.role !== 'wolf');
            target = prey[Math.floor(Math.random() * prey.length)];
        } else if (p.role === 'seer') {
            const others = alive.filter(q => q.id !== p.id);
            target = others[Math.floor(Math.random() * others.length)];
        } else if (p.role === 'healer' && H.settings.healer) {
            target = alive[Math.floor(Math.random() * alive.length)];
        }
        if (!target) return;
        if (simMode === 'player' && p.id === myId) sendNightAction(target.name);
        else hostNightAction(p, target.name);
    });
}

function simVoteAll() {
    const alive = alivePlayers();
    if (alive.length < 2) return;
    // one shared lynch target so the vote is decisive; sometimes a wolf, sometimes
    // an innocent, so both the village and the wolves get to win across the loop.
    const wolves = alive.filter(p => p.role === 'wolf');
    const target = (wolves.length && Math.random() < 0.5)
        ? wolves[Math.floor(Math.random() * wolves.length)]
        : alive[Math.floor(Math.random() * alive.length)];
    alive.forEach(p => {
        if (p.vote) return;
        let pick = target;
        if (pick.id === p.id) pick = alive.find(q => q.id !== p.id);   // can't vote yourself
        if (!pick) return;
        if (simMode === 'player' && p.id === myId) sendVote(pick.name);
        else hostVote(p, pick.name);
    });
}

function simRestart() {
    if (!simActive) return;
    simPhaseSeen = '';
    hostNewGame();
    simTimer = setTimeout(() => { hostStartGame(); simLoop(); }, 2400);
}

(function boot() {
    const params = new URLSearchParams(location.search);
    if (!musicOn) $id('tog-music').classList.add('off');
    if (!sfxOn) $id('tog-sfx').classList.add('off');
    const mode = (params.get('mode') || '').toLowerCase();
    const simPlayers = parseInt(params.get('players'), 10) || 4;
    if (mode === 'playersimulation') { startSimulation(simPlayers, 'player'); return; }
    if (mode === 'tvsimulation' || mode === 'simulation') { startSimulation(simPlayers, 'tv'); return; }
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    render();
})();
</script>
