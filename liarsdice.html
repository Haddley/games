// ── Particle bursts + floating score text ──
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function burst(x, y, colors, n = 14) {
    if (REDUCED) return;
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;
        p.style.cssText = `left:${x}px;top:${y}px;background:${colors[i % colors.length]};` +
            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}
function popText(x, y, text, cls = 'good') {
    const el = document.createElement('div');
    el.className = 'pop ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1150);
}
function celebrate() {
    const cs = ['#e0a83a', '#d8443a', '#4bb98d', '#ffdca0'];
    const cx = window.innerWidth / 2;
    const el = document.querySelector('.trophy .icon');
    let y = 170;
    if (el) { const r = el.getBoundingClientRect(); y = r.top + r.height / 2; }
    burst(cx, y, cs, 18);
    setTimeout(() => burst(cx - 80, y + 40, cs, 12), 250);
    setTimeout(() => burst(cx + 80, y + 40, cs, 12), 500);
}

// The signature moment: a challenge is called — full-screen shout, cannon
// smoke and a screen shake. "LIAR!" if the bid was a lie, "AYE, TRUE!" if it held.
function liarDrama(r) {
    if (REDUCED || !r) return;
    const lie = !r.valid;
    const fl = document.createElement('div');
    fl.id = 'liar-flash';
    fl.innerHTML = `<div class="liar-word">${lie ? 'LIAR!' : 'AYE, TRUE!'}</div>`;
    document.body.appendChild(fl);
    setTimeout(() => fl.remove(), 1200);
    document.body.classList.add('shake-screen');
    setTimeout(() => document.body.classList.remove('shake-screen'), 600);
    const cx = innerWidth / 2, cy = innerHeight * 0.42;
    for (let i = 0; i < 6; i++) {
        const s = document.createElement('div'); s.className = 'smoke';
        const size = 30 + Math.random() * 50;
        s.style.cssText = `left:${cx + (Math.random() * 160 - 80)}px;top:${cy + (Math.random() * 80 - 40)}px;` +
            `width:${size}px;height:${size}px;--sx:${(Math.random() * 80 - 40)}px;--sy:${-30 - Math.random() * 50}px`;
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1050);
    }
    burst(cx, cy, lie ? ['#d8443a', '#ffdca0', '#8a5e12'] : ['#4bb98d', '#e0a83a', '#ffdca0'], 20);
}

// ── State-diff FX: one function for host, guest and viewer paths ──
// prev/next are display objects (D or vD shaped); call AFTER render()
function fxOnState(prev, next) {
    if (!next) return;
    const pPhase = (prev && prev.phase) || '';
    const nPhase = next.phase;
    if (next.newRound) sRoll(); // shake, slam, settle
    const pBids = (prev && prev.bidHistory && prev.bidHistory.length) || 0;
    const nBids = (next.bidHistory && next.bidHistory.length) || 0;
    if (nPhase === 'bidding' && nBids > pBids && !next.newRound) {
        const bid = next.bidHistory[nBids - 1];
        sBid(bid.qty);
        const bb = document.getElementById('bid-now');
        if (bb) bb.classList.add('bump');
    }
    if (nPhase === 'bidding' && next.isMyTurn && !(prev && prev.isMyTurn)) sTurn();
    if (nPhase === 'reveal' && pPhase !== 'reveal' && next.challengeResult) {
        const r = next.challengeResult;
        const loserOut = !!(next.players || []).find(p => p.name === r.loserName && !p.active);
        sLiar();
        sReveal(r, loserOut);
        liarDrama(r);
        if (prev && typeof next.myDiceCount === 'number' && typeof prev.myDiceCount === 'number'
            && next.myDiceCount < prev.myDiceCount) {
            const b = document.getElementById('result-banner');
            if (b) b.classList.add('shake');
            popText(window.innerWidth / 2, 180, '−1 die', 'bad');
        }
    }
    if (nPhase === 'gameover' && pPhase !== 'gameover') {
        sWin();
        if (!isViewer) setTimeout(celebrate, 350); // TV keeps its confetti
    }
}

    <div class="card">
      <div class="trophy">
        <div class="icon">🏆</div>
        <div class="w-name">${esc(D.winner??'')}</div>
        <div class="w-sub">Last pirate standing!</div>
      </div>
      <div class="rankings">${ranks}</div>
      ${btn}
    </div>`;
}

// ═══════════════════════════════════════════════
//  VIEWER SCREEN
// ═══════════════════════════════════════════════
function screenViewer() {
    if (!vD) {
        return `<div class="v-screen" style="align-items:center;justify-content:center">
          <div class="spin" style="width:40px;height:40px;border-width:3px"></div>
          <div style="color:var(--muted);margin-top:16px;font-size:.9rem;letter-spacing:2px">CONNECTING…</div>
        </div>`;
    }

    // Lobby view
    if (vD.phase === 'lobby') {
        return `<div id="v-bg"></div>` + tvLobby({
            title: "LIAR'S DICE",
            accent: '#e0a83a',
            roomCode: (vD.roomCode || '').toUpperCase(),
            joinUrl: `${location.origin}${location.pathname}?join=${vD.roomCode || ''}`,
            isTvHost: !!vD.tvHost,
            captainName: vD.captain,
            scanHint: 'Scan to come aboard',
            waitingText: 'Waiting for the first pirate…',
            players: (vD.players ?? []).map(n => ({ name: n, avatar: pirateAvatar(n), captain: n === vD.captain })),
        });
    }

    // Player cards
    const playerCards = (vD.players ?? []).map((p, pi) => {
        const diceIcons = Array.from({length: p.diceCount}, () =>
            dieSVG(1, {size: 28})
        ).join('');
        const isBidding = p.isBidding && vD.phase === 'bidding';
        const isElim = !p.active;
        return `<div class="v-player-wrap" style="--i:${pi}">
          <div class="v-bidding-tag${isBidding ? '' : ' hidden'}">WAGERING</div>
          <div class="v-player-card${isBidding ? ' bidding' : ''}${isElim ? ' elim' : ''}">
            <div class="v-player-av">${pirateAvatar(p.name)}</div>
            <div class="v-player-name">${esc(p.name)}${isElim ? ' ☠️' : ''}</div>
            <div class="v-player-dice">${diceIcons}</div>
          </div>
        </div>`;
    }).join('');

    // Current bid area
    let bidContent = '';
    if (vD.currentBid) {
        const {qty, face, bidderName} = vD.currentBid;
        const animId = `vbd-${vD.bidCount}`;
        bidContent = `
          <div class="v-bid-label">THE WAGER</div>
          <div class="v-bid-face-wrap">
            <div id="${animId}" class="bid-bounce">${dieSVG(face, {size: 100, hi: true})}</div>
          </div>
          <div class="v-bid-qty">${qty}×</div>
          <div class="v-bid-by">by <strong>${pirateAvatar(bidderName)} ${esc(bidderName)}</strong></div>
          <div class="v-bid-total">${vD.totalDice} bones on the table</div>`;
    } else {
        bidContent = `<div class="v-bid-label">THE WAGER</div>
          <div class="v-no-bid">No wager yet — first pirate opens the biddin'!</div>`;
    }

    // Bid history feed (last 5)
    const hist = (vD.bidHistory ?? []);
    const last5 = hist.slice(-5);
    let histFeed = '';
    if (last5.length > 0) {
        const pills = last5.map((h, idx) => {
            const isLatest = idx === last5.length - 1;
            return `<div class="v-hist-pill${isLatest ? ' latest' : ''}">${esc(h.name)} ${h.qty}×${h.face}</div>`;
        });
        const withArrows = pills.reduce((acc, p, i) => {
            if (i > 0) acc.push('<div class="v-hist-arrow">→</div>');
            acc.push(p);
            return acc;
        }, []);
        histFeed = withArrows.join('');
    }

    // Phase overlay
    let overlay = '';
    if (vD.phase === 'reveal' && vD.challengeResult) {
        const r = vD.challengeResult;
        const ok = r.valid;
        const headline = ok ? '⚓ THE WAGER HOLDS!' : '☠️ LIAR!';
        const headCls = ok ? 'correct' : 'liar';
        const detail = ok
            ? `${r.actual} bones of face ${r.face} on the table — the wager of ${r.qty} holds true`
            : `Only ${r.actual} bones of face ${r.face} — ${r.qty} was a filthy lie`;

        const revPlayers = (r.allDice ?? []).filter(pd => pd.active || pd.dice?.length).map((pd, ri) => {
            const isLoser = pd.name === r.loserName;
            const diceHTML = (pd.dice ?? []).map(f =>
                dieSVG(f, {
                    size: 44,
                    hi:  f === r.face || (vD.wildOnes && f === 1 && r.face !== 1),
                    dim: f !== r.face && !(vD.wildOnes && f === 1 && r.face !== 1),
                })
            ).join('');
            return `<div class="v-reveal-player" style="--i:${ri}">
              <div class="v-reveal-player-name${isLoser ? ' loser' : ''}">${pirateAvatar(pd.name)} ${esc(pd.name)}${isLoser ? ' −1 bone' : ''}</div>
              <div class="v-reveal-dice">${diceHTML}</div>
            </div>`;
        }).join('');

        overlay = `<div class="v-overlay">
          <div class="v-reveal-headline ${headCls}">${headline}</div>
          <div class="v-reveal-dice-row">${revPlayers}</div>
          <div class="v-reveal-detail">${detail}</div>
          <div class="v-reveal-loser">${(r.allDice||[]).some(pd=>pd.name===r.loserName&&!pd.active) ? `☠️ ${esc(r.loserName)} is sent to Davy Jones' Locker` : `${esc(r.loserName)} loses a bone`}</div>
        </div>`;
    } else if (vD.phase === 'gameover') {
        const medals = ['🥇','🥈','🥉'];
        const rankChips = (vD.rankings ?? []).map((r, i) =>
            `<div class="v-rank-chip">
              <span class="v-rank-medal">${medals[i] ?? (i+1)+'.'}</span>
              <span class="pirate-av">${pirateAvatar(r.name ?? r)}</span>
              <span>${esc(r.name ?? r)}</span>
            </div>`
        ).join('');
        overlay = `<div class="v-overlay">
          <div class="v-gameover-trophy">🏆</div>
          <div class="v-gameover-winner">${esc(vD.winner ?? '')}</div>
          <div class="v-gameover-sub">Last Pirate Standing</div>
          <div class="v-gameover-rankings">${rankChips}</div>
        </div>`;
    }

    return `<div class="v-screen" style="position:relative">
      <div id="v-bg"></div>
      ${overlay}
      <div class="v-header">
        <div class="v-title">LIAR'S DICE</div>
        <div class="v-header-code">${esc((vD.roomCode||'').toUpperCase())}</div>
        <div class="v-header-dice">${vD.totalDice ?? 0} dice</div>
        <button class="v-fs-btn" id="v-fs-btn" onclick="toggleFullscreen()" title="Toggle fullscreen">${document.fullscreenElement ? '⊡' : '⛶'}</button>
      </div>
      <div class="v-players">${playerCards}</div>
      <div class="v-bid-area">
        <div class="v-bid-card">${bidContent}</div>
      </div>
      <div class="v-history">
        ${hist.length > 0 ? `<div class="v-hist-label">Bids:</div>${histFeed}` : `<div class="v-hist-label" style="font-style:italic">No bids yet</div>`}
      </div>
    </div>`;
}

// ── Viewer background dice ──
function initViewerBg() {
    const bg = document.getElementById('v-bg');
    if (!bg || REDUCED) return;
    let html = '';
    for (let i = 0; i < 16; i++) {
        const size = 8 + Math.random() * 30, left = Math.random() * 100;
        const dur = 14 + Math.random() * 18, delay = -Math.random() * dur;
        const bx = (Math.random() * 80 - 40) + 'px';
        html += `<div class="vb-bub" style="width:${size}px;height:${size}px;left:${left}%;bottom:-5%;--bx:${bx};animation-duration:${dur}s;animation-delay:${delay}s"></div>`;
    }
    const EMO = ['🎲','💀','🪙','⚓','🦴','🗝️','🧭'];
    const anims = ['flt1','flt2','flt3'];
    const positions = [[5,8],[15,45],[25,75],[38,20],[50,60],[62,10],[72,85],[80,35],[90,55],[95,15]];
    positions.forEach(([left,top], i) => {
        const anim = anims[i % 3], dur = 18 + (i * 3.7) % 14, delay = -(i * 2.1), size = 34 + (i * 11) % 40;
        html += `<div class="vb-em" style="left:${left}%;top:${top}%;font-size:${size}px;animation:${anim} ${dur}s ${delay}s linear infinite">${EMO[i % EMO.length]}</div>`;
    });
    bg.innerHTML = html;
}

// ── Confetti ──
function launchConfetti() {
    const colors = ['#f59e0b','#ef4444','#4ade80','#3b82f6','#a855f7','#ec4899'];
    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
    for (let i = 0; i < 80; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        const color = colors[Math.floor(Math.random() * colors.length)];
        const left = Math.random() * 100;
        const dur = 2 + Math.random() * 2;
        const delay = Math.random() * 2;
        const w = 6 + Math.random() * 8;
        const h = 6 + Math.random() * 8;
        el.style.cssText = `left:${left}%;background:${color};width:${w}px;height:${h}px;animation:confettiFall ${dur}s ${delay}s ease-in forwards`;
        container.appendChild(el);
    }
    document.body.appendChild(container);
    setTimeout(() => { container.remove(); }, 6000);
}

// ═══════════════════════════════════════════════
//  RENDER DISPATCHER
// ═══════════════════════════════════════════════
function render() {
    document.body.classList.toggle('viewer-mode', isViewer);

    const app = document.getElementById('app');
    let html = '';

    switch (ui) {
        case 'home':      html = screenHome();       break;
        case 'creating':  html = screenCreating();   break;
        case 'connecting':html = screenConnecting(); break;
        case 'lobby_h':   html = screenLobbyHost();  break;
        case 'lobby_g':   html = screenLobbyGuest(); break;
        case 'gameover':  html = screenGameOver();   break;
        case 'viewer':    html = screenViewer();     break;
        case 'game':
            if (D?.phase === 'reveal')   html = screenReveal();
            else if (D?.phase === 'gameover') { ui = 'gameover'; html = screenGameOver(); }
            else                         html = screenGame();
            break;
        default: html = screenHome();
    }

    app.innerHTML = html;

    // 'fresh' marks a real screen/phase change → entrance animations run once,
    // never on same-screen re-renders (bid taps, qty changes, joins)
    const screenKey = ui + ':' + (ui === 'game' ? (D?.phase || '') : ui === 'viewer' ? (vD?.phase || '') : '');
    app.classList.toggle('fresh', screenKey !== _lastScreenKey);
    _lastScreenKey = screenKey;

    // Music follows the game state on every path (host, guest, viewer)
    setMusic(musicForState());
    tuneMusicToGame();

    if (ui === 'viewer') {
        setTimeout(initViewerBg, 50);
    }

    if (vD?.phase === 'gameover' && !confettiLaunched) {
        confettiLaunched = true;
        setTimeout(launchConfetti, 300);
    }
}

// ── Theme ──
function toggleTheme() {
    document.body.classList.toggle('day');
    const day = document.body.classList.contains('day');
    document.getElementById('theme-btn').textContent = day ? '🌙' : '☀️';
    localStorage.setItem('liarsdice-theme', day ? 'day' : 'dark');
}
if (localStorage.getItem('liarsdice-theme') !== 'dark') {
    document.body.classList.add('day');
    document.getElementById('theme-btn').textContent = '🌙';
}

// ═══════════════════════════════════════════════
//  SIMULATION MODES — ?mode=tvsimulation | playersimulation  (&players=N)
//  Self-driving demos with no PeerJS and no real people. Bots are counted as
//  "connected" via stub guestConns so the normal host flow drives everything.
//    • tvsimulation     — watch the big-screen TAVERN TABLE play itself
//    • playersimulation — watch a phone player ("You") bid & challenge itself
//  (?mode=simulation stays as an alias for tvsimulation.)
// ═══════════════════════════════════════════════
let simTimer = null, simMode = 'tv', simCount = 4;
const SIM_NAMES = ['Ace', 'Bux', 'Cash', 'Duke', 'Edie', 'Fox', 'Gwen', 'Hawk'];

function startSimulation(nPlayers, mode) {
    simMode = mode === 'player' ? 'player' : 'tv';
    simCount = Math.max(2, Math.min(nPlayers || 4, SIM_NAMES.length));
    roomCode = 'DEMO';
    simSetup();
    simTimer = setTimeout(simBegin, 2400);
}

function simSetup() {
    H = { players:[], activePlayers:[], phase:'lobby', bidderIdx:0,
          currentBid:null, bidHistory:[], wildOnes:fWild,
          challengeResult:null, winner:null, eliminated:[], rankings:[] };
    guestConns = {}; viewerConns = {};
    isHost = true;
    if (simMode === 'tv') {
        isTvHost = true; isViewer = true; myId = '__sim_host__'; myName = '';
        document.body.classList.add('viewer-mode');
        for (let i = 0; i < simCount; i++) {
            const id = '__bot_' + i;
            hostAddPlayer(id, SIM_NAMES[i % SIM_NAMES.length]);
            guestConns[id] = { peer: id, send() {} };   // stub so bots count as present
        }
    } else {
        isTvHost = false; isViewer = false; myName = 'You'; myId = '__you__';
        hostAddPlayer(myId, 'You');                       // you are player #1 (the host)
        for (let i = 1; i < simCount; i++) {
            const id = '__bot_' + i;
            hostAddPlayer(id, SIM_NAMES[i % SIM_NAMES.length]);
            guestConns[id] = { peer: id, send() {} };
        }
        ui = 'lobby_h';
    }
    broadcastLobby();                                    // show the lobby first
}

function simBegin() {
    if (simMode !== 'tv') ui = 'game';
    hostStartGame();                                     // deal + phase 'bidding'
    simTimer = setTimeout(simStep, 1800);
}

function simRestart() {
    simSetup();
    simTimer = setTimeout(simBegin, 2400);
}

// One driver tick: a bidder acts, a reveal is acknowledged, or the game loops.
function simStep() {
    simTimer = null;
    if (H.phase === 'gameover') { simTimer = setTimeout(simRestart, 6500); return; }
    if (H.phase === 'reveal') {
        hostContinue(H.players[0].id);                   // -> next round or gameover
        simTimer = setTimeout(simStep, H.phase === 'gameover' ? 3200 : 1600);
        return;
    }
    if (H.phase === 'bidding') {
        simBidderAction();
        // linger on a reveal so the die-flip animation reads
        const d = H.phase === 'reveal' ? 2600 : 800 + Math.random() * 700;
        simTimer = setTimeout(simStep, d);
    }
}

// The current bidder either challenges a shaky standing bid or raises it.
function simBidderAction() {
    if (H.phase !== 'bidding') return;
    const p = H.players[H.activePlayers[H.bidderIdx]];
    const total = totalDice();
    const cur = H.currentBid;
    if (cur) {
        const per = (H.wildOnes && cur.face !== 1) ? 2 / 6 : 1 / 6;
        const expected = total * per;
        let pch = 0.05;
        if (cur.qty > expected) pch = Math.min(0.9, 0.2 + (cur.qty - expected) * 0.35);
        if (cur.qty >= total) pch = 0.97;
        if (Math.random() < pch) { simDoAction(p, 'challenge'); return; }
    }
    simDoAction(p, 'bid', simMakeBid(p, cur, total));
}

// Build a valid, escalating bid biased toward the dice the bot actually holds.
function simMakeBid(p, cur, total) {
    const counts = [0, 0, 0, 0, 0, 0, 0];
    p.dice.forEach(d => counts[d]++);
    const held = f => counts[f] + ((H.wildOnes && f !== 1) ? counts[1] : 0);
    if (!cur) {
        let best = 0, bf = 2 + Math.floor(Math.random() * 5);
        for (let f = 2; f <= 6; f++) { if (held(f) > best) { best = held(f); bf = f; } }
        const qty = Math.min(Math.max(2, best), Math.max(2, Math.floor(total * 0.4)));
        return { qty, face: bf };
    }
    // same qty, one pip higher — cheapest raise
    if (cur.face < 6 && Math.random() < 0.5) return { qty: cur.qty, face: cur.face + 1 };
    // otherwise bump quantity (any face is then valid) toward our strongest face
    let best = 0, bf = cur.face;
    for (let f = 1; f <= 6; f++) { if (held(f) > best) { best = held(f); bf = f; } }
    return { qty: cur.qty + 1, face: bf };
}

// Apply a bot action via the host handlers; "You" goes through the real phone
// actions so the selection/animation paths fire in player mode.
function simDoAction(p, kind, bid) {
    const isYou = simMode === 'player' && p.id === myId;
    if (kind === 'challenge') {
        if (isYou) actChallenge(); else hostChallenge(p.id);
    } else {
        if (isYou) { bQty = bid.qty; bFace = bid.face; actBid(); }
        else hostBid(p.id, bid.qty, bid.face);
    }
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
// Ambient drifting dice behind the phone screens — built once on load.
// Decorative only; the reduced-motion media query freezes its animation.
(function initPhoneBg() {
    const bg = document.getElementById('ld-bg');
    if (!bg || REDUCED) return;
    let html = '';
    // rising bubbles from the deep
    for (let i = 0; i < 14; i++) {
        const size = 6 + Math.random() * 22, left = Math.random() * 100;
        const dur = 12 + Math.random() * 16, delay = -Math.random() * dur;
        const bx = (Math.random() * 60 - 30) + 'px';
        html += `<div class="ld-bub" style="width:${size}px;height:${size}px;left:${left}%;bottom:-6%;--bx:${bx};animation-duration:${dur}s;animation-delay:${delay}s"></div>`;
    }
    // drifting treasure & bones
    const EMO = ['🎲','💀','🪙','⚓','🦴','🗝️'];
    const anims = ['flt1', 'flt2', 'flt3'];
    const pos = [[7,14],[22,62],[35,30],[50,80],[63,20],[78,55],[90,78],[15,88],[46,46]];
    pos.forEach(([left, top], i) => {
        const anim = anims[i % 3], dur = 20 + (i * 3.3) % 16, delay = -(i * 2.4), size = 22 + (i * 7) % 22;
        html += `<div class="ld-em" style="left:${left}%;top:${top}%;font-size:${size}px;animation:${anim} ${dur}s ${delay}s linear infinite">${EMO[i % EMO.length]}</div>`;
    });
    bg.innerHTML = html;
})();

const _params  = new URLSearchParams(location.search);
const _simMode = (_params.get('mode') || '').toLowerCase();
const _simN    = parseInt(_params.get('players'), 10) || 4;
const _viewParam = _params.get('view');
if (_simMode === 'playersimulation') {
    startSimulation(_simN, 'player');
} else if (_simMode === 'tvsimulation' || _simMode === 'simulation') {
    startSimulation(_simN, 'tv');
} else if (_viewParam) {
    joinAsViewer(_viewParam);
} else {
    // Pre-fill join code from URL
    const _auto = _params.get('join');
    if (_auto) { fCode = _auto; ui = 'home'; }
    render();
}
