<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Liar's Dice</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0f' width='100' height='100' rx='20'/><rect x='12' y='12' width='76' height='76' rx='14' fill='%231e1e2e' stroke='%23f59e0b' stroke-width='4'/><circle cx='32' cy='32' r='8' fill='%23f59e0b'/><circle cx='50' cy='50' r='8' fill='%23f59e0b'/><circle cx='68' cy='68' r='8' fill='%23f59e0b'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@500;700;900&family=Pirata+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="common.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Davy Jones' Locker: candlelit hold of the Flying Dutchman ── */
        :root {
            --bg: #060f0d;
            --surface: #12201c;
            --s2: #1a2b25;
            --border: #33473d;
            --text: #f2e8cf;
            --muted: #8ba093;
            --accent: #e0a83a;           /* brass / candle gold */
            --ag: rgba(224,168,58,0.22);
            --danger: #d8443a;           /* blood red */
            --dg: rgba(216,68,58,0.22);
            --success: #4bb98d;          /* sea-green */
            --sea: #2c8f7c;              /* Davy Jones teal */
            --bone: #e9dcbe;
            --wood: #2a1d12;
            --candle: #ffbf5a;
        }

        body.day {
            --bg: #e9e0c8;               /* sun-bleached parchment / day at sea */
            --surface: #f5efdc;
            --s2: #ded2b2;
            --border: #c3b590;
            --text: #2a1d12;
            --muted: #6b6350;
            --accent: #a86a17;
            --ag: rgba(168,106,23,0.16);
            --danger: #b23026;
            --dg: rgba(178,48,38,0.16);
            --success: #2f8a5f;
            --sea: #1f7a68;
            --bone: #4a3a22;
            --wood: #7a5a38;
            --candle: #c98a2a;
        }
        body.day::before {
            background:
                radial-gradient(ellipse at 50% -8%, rgba(168,106,23,0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 12% 100%, rgba(31,122,104,0.08) 0%, transparent 60%),
                repeating-linear-gradient(93deg, rgba(122,90,56,0.05) 0 3px, transparent 3px 46px);
        }
        body.day .hdr h1 { filter: drop-shadow(0 0 10px rgba(168,106,23,0.3)); }
        /* Viewer always stays in the dark hold */
        body.day.viewer-mode {
            --bg: #040d0b; --surface: #12201c; --s2: #1a2b25; --border: #33473d;
            --text: #f2e8cf; --muted: #8ba093; --accent: #e0a83a; --ag: rgba(224,168,58,0.22);
            --danger: #d8443a; --dg: rgba(216,68,58,0.22); --success: #4bb98d;
            --sea: #2c8f7c; --bone: #e9dcbe; --wood: #2a1d12; --candle: #ffbf5a;
        }

        /* ── Theme toggle button ── */
        .theme-toggle {
            position: fixed; top: 14px; right: 14px; z-index: 1000;
            background: var(--s2); border: 1px solid var(--border);
            color: var(--text); border-radius: 8px;
            width: 38px; height: 38px; font-size: 1.1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: border-color .15s, background .15s;
        }
        .theme-toggle:hover { border-color: var(--accent); }
        body.viewer-mode .theme-toggle { display: none; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 14px 48px;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 45% at 50% -6%, rgba(255,191,90,0.12) 0%, transparent 60%),   /* swinging lantern */
                radial-gradient(ellipse 55% 50% at 8% 108%, rgba(44,143,124,0.12) 0%, transparent 62%),   /* eerie sea glow */
                radial-gradient(ellipse 55% 50% at 96% 106%, rgba(216,68,58,0.07) 0%, transparent 62%),
                repeating-linear-gradient(91deg, rgba(0,0,0,0.28) 0 2px, transparent 2px 52px),           /* hull planks */
                radial-gradient(ellipse 120% 120% at 50% 40%, transparent 55%, rgba(0,0,0,0.55) 100%);    /* vignette */
            pointer-events: none; z-index: -1;
        }

        #app { width: 100%; max-width: 480px; }

        /* ── Header ── */
        .hdr { text-align: center; margin-bottom: 20px; padding-top: 4px; }
        .hdr h1 {
            font-family: 'Pirata One', 'Orbitron', sans-serif;
            font-size: clamp(2.3rem, 10vw, 3.4rem);
            font-weight: 400;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffcf6e 0%, #e0a83a 45%, #2c8f7c 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,.6)) drop-shadow(0 0 16px rgba(224,168,58,0.3));
            line-height: 1;
        }
        .hdr .sub { color: var(--muted); font-size: 0.72rem; letter-spacing: 2px; margin-top: 2px; text-transform: uppercase; font-style: italic; }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .card.highlight { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 24px var(--ag); }

        /* ── Buttons ── */
        .btn {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600; font-size: .875rem; letter-spacing: 1px;
            padding: 13px 20px; border-radius: 8px; border: none;
            cursor: pointer; transition: all .15s ease;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(.97); }
        .btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
        .btn-full { width: 100%; }
        .btn-p { background: var(--accent); color: #0a0a0f; box-shadow: 0 4px 14px var(--ag); }
        .btn-p:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-d { background: var(--danger); color: #fff; box-shadow: 0 4px 14px var(--dg); }
        .btn-d:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-g { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-g:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm { padding: 8px 14px; font-size: .78rem; }
        .btn-icon { background: var(--s2); color: var(--text); border: 1px solid var(--border); width: 42px; height: 42px; padding: 0; font-size: 1.1rem; border-radius: 8px; }
        .btn-icon:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }

        /* ── Inputs ── */
        .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .fg label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .fg input {
            background: var(--s2); border: 1px solid var(--border); border-radius: 8px;
            padding: 11px 14px; color: var(--text);
            font-family: 'JetBrains Mono', monospace; font-size: .9rem;
            outline: none; transition: border-color .15s;
            -webkit-appearance: none;
            appearance: none;
        }
        .fg input:focus { border-color: var(--accent); }
        .fg input::placeholder { color: var(--muted); }

        /* ── Toggle ── */
        .tog-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 4px 0; }
        .tog-label { font-size: .83rem; }
        .tog-desc { font-size: .68rem; color: var(--muted); margin-top: 2px; }
        .tog { position: relative; width: 42px; height: 22px; flex-shrink: 0; }
        .tog input { opacity: 0; width: 0; height: 0; }
        .tog-track { position: absolute; inset: 0; background: var(--border); border-radius: 11px; cursor: pointer; transition: background .2s; }
        .tog-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: var(--muted); border-radius: 50%; transition: all .2s; }
        .tog input:checked + .tog-track { background: var(--accent); }
        .tog input:checked + .tog-track::after { transform: translateX(20px); background: #0a0a0f; }

        /* ── Room code ── */
        .room-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem; font-weight: 900; letter-spacing: 8px;
            color: var(--accent); text-align: center;
            background: var(--s2); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px; margin: 12px 0;
        }
        .share-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }

        /* ── Player chips ── */
        .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
        .chip {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 10px; border-radius: 20px;
            border: 1px solid var(--border); background: var(--s2);
            font-size: .75rem; color: var(--muted);
            transition: all .2s;
        }
        .chip.you { border-color: rgba(245,158,11,.5); color: var(--text); }
        .chip.bidding { border-color: var(--accent); color: var(--accent); background: var(--ag); font-weight: 700; }
        .chip.elim { opacity: .3; text-decoration: line-through; }
        .chip-pips { display: flex; gap: 2px; }
        .pip { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .7; }

        /* ── Dice ── */
        .dice-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .die-svg { display: block; }
        .die-svg.roll { animation: dieRoll .5s cubic-bezier(.3,.7,.4,1) both; animation-delay: calc(var(--i, 0) * 70ms); }
        @keyframes dieRoll {
            0%   { transform: rotate(0deg)   scale(.65); opacity: .3; }
            40%  { transform: rotate(150deg) scale(1.1); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* ── Bid display ── */
        .bid-box {
            background: var(--s2); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            margin-bottom: 14px;
        }
        .bid-box .lbl { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .bid-val { font-size: 1.1rem; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .bid-by { font-size: .7rem; color: var(--muted); text-align: right; }
        .no-bid { text-align: center; color: var(--muted); font-size: .8rem; width: 100%; padding: 4px 0; }

        /* ── Bid builder ── */
        .bid-builder { display: flex; flex-direction: column; gap: 12px; }
        .build-row { display: flex; align-items: center; gap: 10px; }
        .build-lbl { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; width: 66px; flex-shrink: 0; }
        .qty-ctrl { display: flex; align-items: center; gap: 10px; }
        .qty-val { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); min-width: 30px; text-align: center; }
        .face-btns { display: flex; gap: 5px; flex-wrap: wrap; }
        .face-btn { background: var(--s2); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; padding: 3px; opacity: .65; transition: all .15s; -webkit-tap-highlight-color: transparent; }
        .face-btn:hover { border-color: var(--accent); opacity: 1; }
        .face-btn.sel { border-color: var(--accent); background: var(--ag); opacity: 1; }

        /* ── Action row ── */
        .act-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }

        /* ── Section label ── */
        .slbl { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }

        /* ── Bid history ── */
        .hist-toggle { background: none; border: none; color: var(--muted); font-family: inherit; font-size: .7rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; padding: 0; margin-top: 14px; display: flex; align-items: center; gap: 5px; }
        .hist-toggle:hover { color: var(--text); }
        .hist-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; max-height: 130px; overflow-y: auto; }
        .hist-item { font-size: .75rem; color: var(--muted); padding: 5px 10px; background: var(--s2); border-radius: 6px; display: flex; justify-content: space-between; }
        .hist-item strong { color: var(--text); }

        /* ── Status banner ── */
        .status { text-align: center; padding: 10px; border-radius: 8px; font-size: .82rem; color: var(--muted); background: var(--s2); border: 1px solid var(--border); margin-bottom: 14px; }
        .status.your-turn { color: var(--accent); border-color: var(--accent); background: var(--ag); font-weight: 700; animation: pulse 1.8s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 var(--ag); } 50% { box-shadow: 0 0 0 4px var(--ag); } }

        /* ── Reveal ── */
        .result-banner { border-radius: 10px; padding: 14px 16px; text-align: center; margin-bottom: 14px; }
        .result-banner.ok { background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.3); }
        .result-banner.fail { background: var(--dg); border: 1px solid var(--danger); }
        .r-head { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
        .result-banner.ok .r-head { color: var(--success); }
        .result-banner.fail .r-head { color: var(--danger); }
        .r-detail { font-size: .78rem; color: var(--muted); }
        .reveal-player { margin-bottom: 14px; }
        .rev-name { font-size: .82rem; font-weight: 600; margin-bottom: 6px; }
        .rev-name.loser { color: var(--danger); }

        /* ── Wild badge ── */
        .wild { display: inline-block; background: var(--ag); border: 1px solid rgba(245,158,11,.35); color: var(--accent); font-size: .65rem; padding: 2px 8px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; }

        /* ── Divider ── */
        hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

        /* ── Game over ── */
        .trophy { text-align: center; padding: 12px 0; }
        .trophy .icon { font-size: 3.5rem; margin-bottom: 10px; }
        .trophy .w-name { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; color: var(--accent); letter-spacing: 3px; }
        .trophy .w-sub { color: var(--muted); font-size: .75rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .rankings { display: flex; flex-direction: column; gap: 7px; margin: 14px 0; }
        .rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--s2); border-radius: 8px; border: 1px solid var(--border); font-size: .88rem; }
        .rank-num { font-family: 'Orbitron', sans-serif; font-size: .95rem; font-weight: 700; width: 26px; color: var(--muted); }
        .rank-num.g { color: #f59e0b; } .rank-num.s { color: #94a3b8; } .rank-num.b { color: #b45309; }

        /* ── Spinner ── */
        .spin { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Connecting ── */
        .connecting { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 30px 20px; }

        /* ── Error ── */
        .err { color: var(--danger); font-size: .78rem; padding: 8px 12px; background: var(--dg); border: 1px solid var(--danger); border-radius: 8px; margin-top: 8px; }

        /* ── Player list in lobby ── */
        .player-list { display: flex; flex-direction: column; gap: 7px; margin: 10px 0; }
        .player-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--s2); border-radius: 8px; border: 1px solid var(--border); font-size: .85rem; }
        .player-row .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
        .player-row.host-row { border-color: rgba(245,158,11,.3); }

        .info-row { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); margin-bottom: 4px; }
        .info-row strong { color: var(--text); }

        /* ══════════════════════════════════════════
           VIEWER MODE CSS
        ══════════════════════════════════════════ */
        body.viewer-mode {
            padding: 0; overflow: hidden;
            display: block; /* override flex so fixed children fill viewport freely */
            height: 100dvh; width: 100vw;
            /* the dark-hold backdrop lives here (not on .v-screen) so the ambient
               pirate scene at the bottom of the screen shows behind the content */
            background:
                radial-gradient(ellipse 70% 50% at 50% -8%, rgba(255,191,90,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 80% 60% at 50% 120%, rgba(44,143,124,0.12) 0%, transparent 65%),
                #040d0b;
        }
        body.viewer-mode #app { max-width: none; width: 100vw; height: 100dvh; }

        .v-screen {
            position: fixed; inset: 0;
            background: transparent;   /* backdrop lives on body.viewer-mode so the ambient scene shows behind */
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        #v-bg {
            position: absolute; inset: 0;
            overflow: hidden; pointer-events: none;
        }

        .v-bg-die { position: absolute; }

        @keyframes flt1 {
            0%   { transform: translate(0px, 0px) rotate(0deg); }
            33%  { transform: translate(30px, -40px) rotate(40deg); }
            66%  { transform: translate(-20px, 20px) rotate(80deg); }
            100% { transform: translate(0px, 0px) rotate(120deg); }
        }
        @keyframes flt2 {
            0%   { transform: translate(0px, 0px) rotate(0deg); }
            25%  { transform: translate(-50px, 30px) rotate(22deg); }
            50%  { transform: translate(20px, -30px) rotate(45deg); }
            75%  { transform: translate(40px, 20px) rotate(67deg); }
            100% { transform: translate(0px, 0px) rotate(90deg); }
        }
        @keyframes flt3 {
            0%   { transform: translate(0px, 0px) rotate(0deg); }
            20%  { transform: translate(40px, 40px) rotate(14deg); }
            40%  { transform: translate(-30px, 20px) rotate(29deg); }
            60%  { transform: translate(20px, -50px) rotate(43deg); }
            80%  { transform: translate(-40px, -20px) rotate(57deg); }
            100% { transform: translate(0px, 0px) rotate(72deg); }
        }

        /* ── Viewer header ── */
        .v-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: clamp(10px, 2vh, 20px) clamp(16px, 3vw, 40px);
            border-bottom: 1px solid rgba(245,158,11,0.15);
            flex-shrink: 0; position: relative; z-index: 10;
        }
        .v-title {
            font-family: 'Pirata One', 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 4.5vw, 3rem);
            font-weight: 400; letter-spacing: 2px;
            background: linear-gradient(135deg, #ffcf6e 0%, #e0a83a 45%, #2c8f7c 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,.6));
        }
        .v-header-code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: var(--accent); letter-spacing: 4px;
        }
        .v-header-dice {
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
        }
        .v-fs-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--muted); font-size: clamp(1rem, 2vw, 1.4rem);
            width: 2.2em; height: 2.2em; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .15s; flex-shrink: 0; padding: 0; line-height: 1;
        }
        .v-fs-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── Viewer player cards ── */
        .v-players {
            display: flex; flex-direction: row; gap: clamp(8px, 1.5vw, 18px);
            padding: clamp(10px, 2vh, 20px) clamp(16px, 3vw, 40px);
            overflow-x: auto; flex-shrink: 0; position: relative; z-index: 10;
        }
        .v-player-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
        .v-bidding-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.5rem, 1vw, 0.65rem);
            color: var(--accent); letter-spacing: 2px;
            background: var(--ag); border: 1px solid var(--accent);
            border-radius: 4px; padding: 2px 8px; text-transform: uppercase;
        }
        .v-bidding-tag.hidden { visibility: hidden; }
        .v-player-card {
            background: #14141f; border: 1px solid #2a2a3a;
            border-radius: 10px; padding: clamp(8px, 1.5vw, 14px) clamp(10px, 2vw, 18px);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            min-width: clamp(80px, 12vw, 130px);
            transition: all .3s ease;
        }
        .v-player-card.bidding {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 0 28px rgba(245,158,11,0.35);
        }
        .v-player-card.elim { opacity: 0.3; }
        .v-player-name {
            font-size: clamp(0.65rem, 1.3vw, 0.9rem);
            font-weight: 700; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 100%;
        }
        .v-player-dice { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; }

        /* ── Viewer bid area ── */
        .v-bid-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: clamp(8px, 1.5vh, 16px); padding: 0 clamp(16px, 3vw, 40px);
            position: relative; z-index: 10;
        }
        .v-bid-card {
            background: rgba(20,20,31,0.9); border: 1px solid rgba(245,158,11,0.25);
            border-radius: 16px; padding: clamp(16px, 3vh, 32px) clamp(24px, 4vw, 48px);
            display: flex; flex-direction: column; align-items: center; gap: clamp(6px, 1.5vh, 14px);
            min-width: clamp(220px, 40vw, 480px); text-align: center;
        }
        .v-bid-label {
            font-size: clamp(0.55rem, 1vw, 0.75rem);
            color: var(--muted); text-transform: uppercase; letter-spacing: 3px;
        }
        .v-bid-face-wrap { position: relative; }
        .v-bid-qty {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 900; color: var(--accent); line-height: 1;
        }
        .v-bid-by {
            font-size: clamp(0.65rem, 1.2vw, 0.85rem);
            color: var(--muted);
        }
        .v-bid-total {
            font-size: clamp(0.55rem, 1vw, 0.7rem);
            color: #3a3a5a;
        }
        .v-no-bid {
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            color: var(--muted); font-style: italic;
        }

        @keyframes bidIn {
            0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
            60%  { transform: scale(1.15) rotate(3deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .bid-bounce { animation: bidIn .5s cubic-bezier(.34,1.56,.64,1) both; }

        /* ── Bid history feed ── */
        .v-history {
            display: flex; flex-direction: row; align-items: center; gap: 6px;
            padding: clamp(8px, 1.5vh, 14px) clamp(16px, 3vw, 40px);
            overflow-x: auto; flex-shrink: 0; position: relative; z-index: 10;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .v-hist-label {
            font-size: clamp(0.55rem, 0.9vw, 0.65rem);
            color: var(--muted); text-transform: uppercase; letter-spacing: 2px;
            flex-shrink: 0; margin-right: 4px;
        }
        .v-hist-pill {
            background: rgba(26,26,42,0.8); border: 1px solid #2a2a3a;
            border-radius: 20px; padding: 4px 12px;
            font-size: clamp(0.6rem, 1vw, 0.75rem); color: var(--muted);
            white-space: nowrap; flex-shrink: 0;
        }
        .v-hist-pill.latest { border-color: rgba(245,158,11,0.4); color: var(--text); }
        .v-hist-arrow { color: #3a3a5a; font-size: 0.7rem; flex-shrink: 0; }

        /* ── Phase overlays ── */
        .v-overlay {
            position: absolute; inset: 0; z-index: 50;
            background: radial-gradient(ellipse at 50% 40%, rgba(10,20,17,0.86), rgba(2,8,6,0.95));
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: clamp(12px, 2.5vh, 28px); padding: clamp(20px, 4vw, 60px);
        }

        /* Reveal overlay */
        @keyframes resultPop {
            0%   { transform: scale(0.5); opacity: 0; }
            70%  { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); }
        }
        .v-reveal-headline {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 4rem);
            font-weight: 900; letter-spacing: 3px; text-align: center;
            animation: resultPop .6s cubic-bezier(.34,1.56,.64,1) both;
        }
        .v-reveal-headline.liar { color: var(--danger); }
        .v-reveal-headline.correct { color: var(--success); }

        .v-reveal-dice-row {
            display: flex; flex-wrap: wrap; gap: clamp(16px, 3vw, 32px);
            align-items: flex-start; justify-content: center;
        }
        .v-reveal-player { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .v-reveal-player-name {
            font-size: clamp(0.65rem, 1.2vw, 0.85rem);
            font-weight: 700; color: var(--muted); text-align: center;
        }
        .v-reveal-player-name.loser { color: var(--danger); }
        .v-reveal-dice { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }

        .v-reveal-detail {
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            color: var(--muted); text-align: center; max-width: 600px;
        }
        .v-reveal-loser {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.4rem);
            color: var(--danger); text-align: center;
            animation: resultPop .5s .3s cubic-bezier(.34,1.56,.64,1) both;
        }

        /* Game over overlay */
        @keyframes trophyBounce {
            0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
            60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes winnerSlide {
            0%   { transform: translateY(40px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideIn {
            0%   { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .v-gameover-trophy {
            font-size: clamp(3rem, 8vw, 6rem);
            animation: trophyBounce .8s cubic-bezier(.34,1.56,.64,1) both;
        }
        .v-gameover-winner {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 5rem);
            font-weight: 900; color: var(--accent); letter-spacing: 4px;
            text-align: center;
            animation: winnerSlide .6s .3s ease-out both;
        }
        .v-gameover-sub {
            font-size: clamp(0.8rem, 2vw, 1.3rem);
            color: var(--muted); text-transform: uppercase; letter-spacing: 4px;
            animation: winnerSlide .6s .5s ease-out both;
        }
        .v-gameover-rankings {
            display: flex; flex-direction: row; gap: clamp(8px, 2vw, 20px);
            flex-wrap: wrap; justify-content: center;
            animation: slideIn .6s .7s ease-out both;
        }
        .v-rank-chip {
            display: flex; align-items: center; gap: 8px;
            background: rgba(26,26,42,0.9); border: 1px solid #2a2a3a;
            border-radius: 8px; padding: 8px 16px;
            font-size: clamp(0.7rem, 1.3vw, 0.9rem);
        }
        .v-rank-medal { font-size: 1.2rem; }

        /* Lobby viewer */
        .v-lobby-screen {
            position: fixed; inset: 0;
            background: transparent;   /* backdrop on body.viewer-mode; ambient scene shows behind */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: clamp(14px, 2.5vh, 26px); padding: 40px;
            z-index: 1;
        }
        .v-lobby-title {
            font-family: 'Pirata One', 'Orbitron', sans-serif;
            font-size: clamp(3rem, 9vw, 6.5rem);
            font-weight: 400; letter-spacing: 3px;
            background: linear-gradient(135deg, #ffcf6e 0%, #e0a83a 45%, #2c8f7c 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; text-align: center;
            filter: drop-shadow(0 3px 12px rgba(0,0,0,.7));
        }
        .v-lobby-code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 900; color: var(--accent);
            letter-spacing: 10px; text-align: center;
            background: rgba(245,158,11,0.08); border: 2px solid rgba(245,158,11,0.3);
            border-radius: 16px; padding: 16px 32px;
        }
        .v-lobby-sub {
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            color: var(--muted); text-transform: uppercase; letter-spacing: 3px;
        }
        .v-lobby-players {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            max-width: 800px;
        }
        .v-lobby-chip {
            background: rgba(26,26,42,0.9); border: 1px solid rgba(245,158,11,0.3);
            border-radius: 24px; padding: 8px 20px;
            font-size: clamp(0.8rem, 1.5vw, 1rem); color: var(--text);
            font-weight: 700;
        }
        .v-waiting {
            display: flex; align-items: center; gap: 10px;
            color: var(--muted); font-size: clamp(0.7rem, 1.3vw, 0.85rem);
        }

        /* Confetti */
        .confetti {
            position: fixed; top: -20px; width: 10px; height: 10px;
            border-radius: 2px; z-index: 9999; pointer-events: none;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
        }

        /* ══════════════════════════════════════════
           SOUND TOGGLES + FX LAYER + ENTRANCES
        ══════════════════════════════════════════ */
        #sound-togs { position: fixed; top: 58px; right: 14px; z-index: 900; display: flex; flex-direction: column; gap: 6px; }
        #sound-togs button {
            width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--s2); color: var(--text); font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 0;
            transition: opacity .2s, transform .12s, border-color .15s;
        }
        #sound-togs button:hover { border-color: var(--accent); }
        #sound-togs button:active { transform: scale(.9); }
        #sound-togs button.off { opacity: .35; filter: grayscale(1); }
        body.viewer-mode #sound-togs { top: auto; bottom: 14px; right: 14px; flex-direction: row; }

        /* particles + floating score text */
        .pt {
            position: fixed; width: 9px; height: 9px; border-radius: 2px;
            z-index: 950; pointer-events: none;
            animation: ptFly .75s cubic-bezier(.15,.65,.4,1) forwards;
        }
        @keyframes ptFly {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(560deg) scale(.3); opacity: 0; }
        }
        .pop {
            position: fixed; z-index: 960; pointer-events: none;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.3rem;
            animation: popUp 1.1s cubic-bezier(.2,.8,.3,1) forwards;
            text-shadow: 0 2px 12px rgba(0,0,0,.6); white-space: nowrap;
        }
        .pop.good { color: var(--success); }
        .pop.gold { color: var(--accent); }
        .pop.bad  { color: var(--danger); font-size: 1rem; }
        @keyframes popUp {
            0%   { transform: translate(-50%, 0) scale(.5); opacity: 0; }
            15%  { transform: translate(-50%, -12px) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -78px) scale(1); opacity: 0; }
        }

        /* screen entrances — only on phase changes (#app.fresh), so patches never re-trigger */
        @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        #app.fresh .card { animation: cardIn .35s cubic-bezier(.2,.8,.3,1) both; }
        #app.fresh .hdr { animation: cardIn .3s ease-out both; }
        @keyframes rowIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: none; } }
        #app.fresh .player-row, #app.fresh .rank-item { animation: rowIn .3s ease-out both; animation-delay: calc(var(--i, 0) * 45ms); }
        #app.fresh .face-btn { animation: cardIn .28s ease-out both; animation-delay: calc(var(--i, 0) * 30ms); }
        #app.fresh .result-banner { animation: resultPop .45s cubic-bezier(.34,1.56,.64,1) both; }
        @keyframes shakeX {
            10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-6px); } 40%, 60% { transform: translateX(6px); }
        }
        .result-banner.shake,
        #app.fresh .result-banner.shake { animation: resultPop .45s cubic-bezier(.34,1.56,.64,1) both, shakeX .5s .5s both; }
        @keyframes bumpPop { 0% { transform: scale(.94); } 55% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .bid-box.bump { animation: bumpPop .32s ease-out; }
        #app.fresh .trophy .icon { animation: trophyBounce .8s cubic-bezier(.34,1.56,.64,1) both; }
        #app.fresh .trophy .w-name { animation: winnerSlide .6s .25s ease-out both; }

        /* TV entrances (fresh-gated, phase changes only) */
        #app.fresh .v-player-wrap { animation: cardIn .4s ease-out both; animation-delay: calc(var(--i, 0) * 50ms); }
        #app.fresh .v-lobby-chip { animation: cardIn .35s ease-out both; animation-delay: calc(var(--i, 0) * 45ms); }
        #app.fresh .v-reveal-player { animation: cardIn .4s ease-out both; animation-delay: calc(.25s + var(--i, 0) * 90ms); }

        /* ── Ambient drifting-dice backdrop behind the phone screens ──
           (viewer mode has its own #v-bg; this is hidden there) */
        #ld-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        #ld-bg .ld-die { position: absolute; opacity: .05; will-change: transform; }
        #ld-bg .ld-die svg { display: block; }
        body.viewer-mode #ld-bg { display: none; }
        body.day #ld-bg .ld-die { opacity: .04; }

        /* ══════════════════════════════════════════
           PIRATE FLOURISHES — avatars, QR, LIAR drama, ambient
        ══════════════════════════════════════════ */
        /* pirate avatar tokens */
        .pirate-av { display: inline-block; font-size: 1em; line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
        .chip .pirate-av { font-size: .95rem; margin-right: 1px; }
        .player-row .pirate-av, .rank-item .pirate-av { font-size: 1.15rem; }
        .v-player-av { font-size: clamp(1.3rem, 2.6vw, 2.1rem); line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,.6)); }
        .v-lobby-chip .pirate-av { margin-right: 4px; }

        /* themed QR (weathered parchment) */
        /* QR layout matched to pit.html: vmin-based square that scales with the screen
           (never squished by a flex column), aspect-ratio + no-shrink as belt-and-braces */
        .qr-box { width: min(210px, 58vw); aspect-ratio: 1; flex-shrink: 0; margin: 10px auto 12px; border-radius: 13px; overflow: hidden;
            box-shadow: 0 8px 22px rgba(0,0,0,.5), 0 0 0 3px var(--wood); background: var(--bone); }
        .qr-box svg { display: block; width: 100%; height: auto; }
        .v-qr-box { width: 32vmin; aspect-ratio: 1; flex-shrink: 0; border-radius: 2.2vmin; overflow: hidden;
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,.6), 0 0 0 .5vmin var(--wood); background: var(--bone); }
        .v-qr-box svg { display: block; width: 100%; height: auto; }
        .cap-hint { text-align: center; font-size: .72rem; color: var(--muted); font-style: italic; margin-top: 6px; }

        /* full-screen "LIAR!" drama on a challenge */
        #liar-flash {
            position: fixed; inset: 0; z-index: 980; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, rgba(216,68,58,.28), rgba(3,8,6,.55) 70%);
            animation: liarFlash 1.15s ease-out forwards;
        }
        @keyframes liarFlash { 0% { opacity: 0; } 8% { opacity: 1; } 78% { opacity: 1; } 100% { opacity: 0; } }
        #liar-flash .liar-word {
            font-family: 'Pirata One', 'Orbitron', sans-serif; font-weight: 400;
            font-size: clamp(3.5rem, 20vw, 12rem); letter-spacing: 3px;
            color: #ffdca0; text-transform: uppercase;
            text-shadow: 0 0 6px #d8443a, 0 0 26px #d8443a, 0 6px 20px rgba(0,0,0,.8);
            animation: liarWord 1.15s cubic-bezier(.2,.8,.3,1) forwards;
        }
        @keyframes liarWord {
            0% { transform: scale(.2) rotate(-9deg); opacity: 0; }
            18% { transform: scale(1.18) rotate(3deg); opacity: 1; }
            34% { transform: scale(1) rotate(-1deg); }
            80% { transform: scale(1.02) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.15); opacity: 0; }
        }
        @keyframes screenShake {
            0%,100% { transform: translate(0,0); } 15% { transform: translate(-9px,4px); }
            30% { transform: translate(8px,-6px); } 45% { transform: translate(-7px,-3px); }
            60% { transform: translate(6px,5px); } 75% { transform: translate(-4px,2px); } 90% { transform: translate(3px,-2px); }
        }
        body.shake-screen #app { animation: screenShake .55s cubic-bezier(.36,.07,.19,.97) both; }

        /* cannon-smoke puff (JS-spawned) */
        .smoke {
            position: fixed; z-index: 970; pointer-events: none; border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, rgba(230,230,220,.9), rgba(120,120,120,.5) 55%, rgba(60,60,60,0) 72%);
            animation: smokePuff 1s ease-out forwards;
        }
        @keyframes smokePuff {
            0% { transform: translate(-50%,-50%) scale(.2); opacity: .9; }
            100% { transform: translate(calc(-50% + var(--sx,0px)), calc(-50% + var(--sy,-40px))) scale(2.4); opacity: 0; }
        }

        /* a lost die sinks into the locker */
        @keyframes dieSink {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(90px) rotate(200deg); opacity: 0; }
        }
        .die-sink { animation: dieSink .8s cubic-bezier(.5,0,.9,.4) forwards; }

        /* richer ambient: drifting bones/coins/skulls + rising bubbles */
        #ld-bg .ld-bub {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(180,230,220,.5), rgba(44,143,124,.12) 60%, transparent 72%);
            box-shadow: inset 0 0 4px rgba(255,255,255,.3);
            animation: bubbleRise linear infinite;
        }
        @keyframes bubbleRise {
            0%   { transform: translateY(0) translateX(0); opacity: 0; }
            10%  { opacity: .5; }
            90%  { opacity: .5; }
            100% { transform: translateY(-108vh) translateX(var(--bx, 20px)); opacity: 0; }
        }
        #ld-bg .ld-em { position: absolute; opacity: .11; will-change: transform; }
        body.day #ld-bg .ld-em { opacity: .08; }
        #v-bg .vb-bub {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(180,230,220,.4), rgba(44,143,124,.1) 60%, transparent 72%);
            animation: bubbleRise linear infinite;
        }
        #v-bg .vb-em { position: absolute; opacity: .06; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
            #liar-flash, .smoke { display: none !important; }
        }
    </style>
</head>
<body>
<button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle day/night mode">&#x2600;&#xFE0F;</button>
<div id="sound-togs">
    <button id="tog-music" title="Music on/off" onclick="toggleMusic()">🎵</button>
    <button id="tog-sfx" title="Sound effects on/off" onclick="toggleSfx()">🔊</button>
</div>
<div id="ld-bg" aria-hidden="true"></div>
<div id="app"></div>
<script>
// ICE_CFG + rankByScore now come from common.js (loaded in <head>).
typeof mountScene === 'function' && mountScene('pirates');   // themed ambient scene along the bottom of the TV

'use strict';
// ═══════════════════════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════════════════════
const DICE_START = 5;

// ── Peer/network ──
let peer = null;
let myId = '';
let myName = '';
let isHost = false;
let isTvHost = false;     // sim: host that renders the TV/viewer UI
let roomCode = '';
let hostConn = null;      // guest → host connection
let guestConns = {};      // host: {peerId: DataConnection}
let viewerConns = {};     // host: {peerId: DataConnection} for viewers

// ── UI phase (pre-game setup screens) ──
let ui = 'home'; // home | creating | joining | connecting | lobby_h | lobby_g | game | gameover | viewer
let uiErr = '';
let fName  = localStorage.getItem('liarsdice-name') || '';
let fCode  = '';
let fVCode = '';   // viewer room-code input
let fWild  = true;

// ── Viewer client state ──
let isViewer = false;
let vD = null;
let confettiLaunched = false;

// ── Client display state (driven by host) ──
let D = null;
/*  D = {
      myDice: [],
      myDiceCount: 0,
      phase: 'bidding' | 'reveal' | 'gameover',
      isMyTurn: bool,
      players: [{name, diceCount, active, isBidding}],
      currentBid: null | {qty, face, bidderName},
      currentBidderName: string,
      totalDice: number,
      bidHistory: [{name, qty, face}],
      wildOnes: bool,
      challengeResult: null | {...},
      winner: null,
      rankings: [{name}],
      roomCode: string,
    }
*/

// ── Bid builder (local to this client) ──
let bQty = 1;
let bFace = 1;
let histOpen = false;

// ── Rolling animation trigger ──
let newRound = false;

// ── Host-only authoritative state ──
let H = {
    players: [],       // [{id,name,diceCount,dice,active}]
    activePlayers: [], // indices into players[]
    phase: 'lobby',
    bidderIdx: 0,
    currentBid: null,  // {qty,face,bidderName,bidderId}
    bidHistory: [],
    wildOnes: true,
    challengeResult: null,
    winner: null,
    eliminated: [],    // names, in order of elimination
    rankings: [],
};

// ═══════════════════════════════════════════════
//  DICE SVG
// ═══════════════════════════════════════════════
const PIP_POS = {
    tl:[20,20],tc:[44,20],tr:[68,20],
    ml:[20,44],            mr:[68,44],
    bl:[20,68],bc:[44,68],br:[68,68],
    cc:[44,44],
};
const PIP_MAP = {
    1:['cc'],
    2:['tr','bl'],
    3:['tr','cc','bl'],
    4:['tl','tr','bl','br'],
    5:['tl','tr','cc','bl','br'],
    6:['tl','tr','ml','mr','bl','br'],
};

// Weathered BONE dice: ivory body, dark-brown pips, brass-gold glow when
// highlighted (matches at the reveal), faded grey when dimmed.
function dieSVG(face, {size=64, hi=false, dim=false, anim=false}={}) {
    const r     = size <= 48 ? 4 : 6;
    const body  = hi ? '#f2c451' : (dim ? '#565b4e' : '#e9dcbe');
    const shade = hi ? '#c8922a' : (dim ? '#3c4037' : '#cdbd91');
    const edge  = hi ? '#8a5e12' : (dim ? '#2b2f27' : '#8a7448');
    const pip   = hi ? '#5a3d0c' : (dim ? '#2c3029' : '#3a2a16');
    const sw    = hi ? 3 : 2.4;
    const cls   = anim ? ' class="die-svg roll"' : ' class="die-svg"';
    const glow  = hi ? '<rect x="1.5" y="1.5" width="85" height="85" rx="18" fill="none" stroke="#ffe08a" stroke-width="1.4" opacity=".75"/>' : '';
    const pips  = PIP_MAP[face].map(k => `<circle cx="${PIP_POS[k][0]}" cy="${PIP_POS[k][1]}" r="${r}" fill="${pip}"/>`).join('');
    return `<svg${cls} width="${size}" height="${size}" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="82" height="82" rx="16" fill="${body}" stroke="${edge}" stroke-width="${sw}"/>
      <rect x="3" y="48" width="82" height="37" rx="16" fill="${shade}" opacity=".5"/>
      <rect x="9" y="8" width="70" height="24" rx="12" fill="#ffffff" opacity=".16"/>
      ${glow}${pips}
    </svg>`;
}

// Deterministic pirate avatar + epithet from a name (like a crew roster)
const PIRATE_AV = ['🏴‍☠️','💀','🐙','🦜','⚓','🗡️','🪝','🍺','🧭','☠️','🦑','🦀'];
function pirateAvatar(name) {
    let h = 0; const s = String(name || '');
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    return PIRATE_AV[h % PIRATE_AV.length];
}

// Themed QR (bone parchment) for the join / TV lobby
function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M'); qr.addData(url); qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++) for (let c = 0; c < n; c++)
            if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#e9dcbe"/><g fill="#2a1d12">${rects}</g></svg>`;
    } catch (e) { return ''; }
}

// ═══════════════════════════════════════════════
//  GAME LOGIC (dice / bid rules)
// ═══════════════════════════════════════════════
function rollDie() { return Math.floor(Math.random()*6)+1; }
function rollN(n)  { return Array.from({length:n}, rollDie); }

function countFace(allDice, face, wild) {
    let n = 0;
    for (const d of allDice) {
        if (d === face) n++;
        else if (wild && face !== 1 && d === 1) n++;
    }
    return n;
}

function bidHigher(newB, cur) {
    if (!cur) return newB.qty >= 1;
    if (newB.qty > cur.qty) return true;
    if (newB.qty === cur.qty && newB.face > cur.face) return true;
    return false;
}

function totalDice() {
    return H.activePlayers.reduce((s,i) => s + H.players[i].diceCount, 0);
}

// ═══════════════════════════════════════════════
//  HOST LOGIC
// ═══════════════════════════════════════════════
function hostAddPlayer(id, name) {
    if (H.players.find(p => p.id === id)) return;
    H.players.push({id, name, diceCount: DICE_START, dice: [], active: true});
}

function hostStartGame() {
    H.wildOnes = fWild;
    H.activePlayers = H.players.map((_,i) => i);
    H.rankings = [];
    H.eliminated = [];
    hostStartRound(0);
}

function hostStartRound(firstActiveIdx) {
    H.phase = 'bidding';
    H.currentBid = null;
    H.bidHistory = [];
    H.challengeResult = null;
    H.bidderIdx = firstActiveIdx % H.activePlayers.length;

    for (const i of H.activePlayers) {
        H.players[i].dice = rollN(H.players[i].diceCount);
    }
    hostBroadcast(true);
}

function hostBid(fromId, qty, face) {
    if (H.phase !== 'bidding') return;
    const bidderIdx = H.activePlayers[H.bidderIdx];
    if (H.players[bidderIdx].id !== fromId) return;
    if (!bidHigher({qty,face}, H.currentBid)) return;

    const name = H.players[bidderIdx].name;
    H.currentBid = {qty, face, bidderName: name, bidderId: fromId};
    H.bidHistory.push({name, qty, face});
    H.bidderIdx = (H.bidderIdx + 1) % H.activePlayers.length;
    hostBroadcast(false);
}

function hostChallenge(fromId) {
    if (H.phase !== 'bidding' || !H.currentBid) return;
    const chalActiveIdx = H.bidderIdx;
    const chalPlayerIdx = H.activePlayers[chalActiveIdx];
    if (H.players[chalPlayerIdx].id !== fromId) return;

    const bidderPlayerIdx = H.players.findIndex(p => p.id === H.currentBid.bidderId);
    const allDice = H.activePlayers.flatMap(i => H.players[i].dice);
    const actual  = countFace(allDice, H.currentBid.face, H.wildOnes);
    const valid   = actual >= H.currentBid.qty;

    const loserPlayerIdx = valid ? chalPlayerIdx : bidderPlayerIdx;
    const loser = H.players[loserPlayerIdx];

    H.challengeResult = {
        loserName:      loser.name,
        bidderName:     H.currentBid.bidderName,
        challengerName: H.players[chalPlayerIdx].name,
        actual, qty: H.currentBid.qty, face: H.currentBid.face, valid,
        loserPlayerIdx,
        allDice: H.players.map(p => ({name: p.name, dice: [...p.dice], active: p.active})),
    };

    loser.diceCount--;
    if (loser.diceCount === 0) {
        loser.active = false;
        H.eliminated.push(loser.name);
        H.activePlayers = H.activePlayers.filter(i => i !== loserPlayerIdx);
    }

    if (H.activePlayers.length === 1) {
        H.winner = H.players[H.activePlayers[0]].name;
        H.rankings = [H.winner, ...[...H.eliminated].reverse()];
    }

    H.phase = 'reveal';
    hostBroadcast(false);
}

function hostContinue(fromId) {
    if (H.players[0].id !== fromId) return; // only host-player can continue
    if (H.winner) { H.phase = 'gameover'; hostBroadcast(false); return; }

    const loserIdx  = H.challengeResult.loserPlayerIdx;
    const loserAIdx = H.activePlayers.indexOf(loserIdx);
    hostStartRound(loserAIdx >= 0 ? loserAIdx : 0);
}

function hostRestart(fromId) {
    if (H.players[0].id !== fromId) return;

    // Remember connected guests' names before wiping game state
    const returning = Object.keys(guestConns).map(pid => {
        const p = H.players.find(pl => pl.id === pid);
        return { id: pid, name: p?.name ?? 'Player' };
    });

    H = { players:[], activePlayers:[], phase:'lobby', bidderIdx:0,
          currentBid:null, bidHistory:[], wildOnes:fWild,
          challengeResult:null, winner:null, eliminated:[], rankings:[] };
    // Do NOT clear guestConns / viewerConns — PeerJS connections remain alive

    D = null;
    if (isTvHost) {
        ui = 'viewer';                       // TV host is not a player
    } else {
        ui = 'lobby_h';
        hostAddPlayer(myId, myName);
    }
    returning.forEach(({ id, name }) => hostAddPlayer(id, name));

    broadcastLobby();
}

// ── Build per-player display object ──
function buildDisplay(playerId, isNewRound) {
    const pi  = H.players.findIndex(p => p.id === playerId);
    const p   = H.players[pi];
    const cbpi = H.activePlayers[H.bidderIdx]; // current bidder player index

    return {
        myDice:      p?.dice ?? [],
        myDiceCount: p?.diceCount ?? 0,
        phase:       H.phase,
        isMyTurn:    H.phase === 'bidding' && cbpi !== undefined && H.players[cbpi]?.id === playerId,
        isHostPlayer: H.players[0]?.id === playerId,
        players:     H.players.map((pl, i) => ({
            name:      pl.name,
            diceCount: pl.diceCount,
            active:    pl.active,
            isBidding: i === cbpi && H.phase === 'bidding',
        })),
        currentBid:         H.currentBid,
        currentBidderName:  cbpi !== undefined ? H.players[cbpi]?.name ?? '' : '',
        totalDice:          H.activePlayers.reduce((s,i) => s + H.players[i].diceCount, 0),
        bidHistory:         H.bidHistory,
        wildOnes:           H.wildOnes,
        challengeResult:    H.phase === 'reveal' ? H.challengeResult : null,
        winner:             H.winner,
        rankings:           H.rankings,
        roomCode,
        newRound:           isNewRound,
    };
}

// ── Build viewer display object ──
function buildViewerDisplay(isNewRound) {
    const cbpi = H.activePlayers[H.bidderIdx];
    return {
        phase:      H.phase,
        players:    H.players.map((pl, i) => ({
            name:      pl.name,
            diceCount: pl.diceCount,
            active:    pl.active,
            isBidding: i === cbpi && H.phase === 'bidding',
        })),
        currentBid:        H.currentBid,
        currentBidderName: cbpi !== undefined ? H.players[cbpi]?.name ?? '' : '',
        totalDice:         H.activePlayers.reduce((s,i) => s + H.players[i].diceCount, 0),
        bidHistory:        H.bidHistory,
        wildOnes:          H.wildOnes,
        challengeResult:   H.phase === 'reveal' ? H.challengeResult : null,
        winner:            H.winner,
        rankings:          H.rankings,
        roomCode,
        bidCount:          H.bidHistory.length,
        newRound:          isNewRound,
    };
}

// ── Broadcast to all players ──
function hostBroadcast(isNewRound) {
    // Update host player's display
    const prevD = D;
    D = buildDisplay(myId, isNewRound);
    bQty = D.currentBid ? D.currentBid.qty : 1;
    bFace = D.currentBid ? D.currentBid.face : 1;
    if (!D.currentBid) { bQty = 1; bFace = 1; }
    newRound = isNewRound;
    render();
    fxOnState(prevD, D);

    // Send to guests
    Object.entries(guestConns).forEach(([pid, conn]) => {
        send(conn, {type:'state', display: buildDisplay(pid, isNewRound)});
    });

    // Send to viewers
    const vd = buildViewerDisplay(isNewRound);
    Object.values(viewerConns).forEach(conn => {
        send(conn, {type:'viewer_state', vd});
    });

    // TV-sim host renders the spectator UI directly from its own state
    if (isTvHost) {
        const prevVD = vD;
        vD = vd;
        ui = 'viewer';
        render();
        fxOnState(prevVD, vD);
    }
}

function broadcastLobby() {
    const players = H.players.map(p => p.name);
    const captain = isTvHost ? (players[0] || null) : null;
    const ls = {
        type: 'lobby',
        players,
        roomCode,
        wildOnes: H.wildOnes,
        tvHost: isTvHost,
        captain,
    };
    Object.values(guestConns).forEach(c => send(c, ls));

    // Also send to viewers
    Object.values(viewerConns).forEach(c => send(c, {type:'viewer_lobby', players, roomCode, tvHost: isTvHost, captain}));

    // TV host mirrors the lobby into the spectator UI
    if (isTvHost) {
        vD = {phase: 'lobby', players, roomCode, tvHost: true, captain};
        ui = 'viewer';
    }

    render();
}

// ═══════════════════════════════════════════════
//  NETWORK HELPERS
// ═══════════════════════════════════════════════
function send(conn, msg) {
    try { conn.send(msg); } catch(e) { console.warn('send err', e); }
}

function setupGuestConn(conn) {
    conn.on('open', () => {
        console.log('guest connected:', conn.peer);
        conn._role = null;
    });
    conn.on('data', msg => {
        // Handle viewer join before role is set
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            // Send current state immediately
            if (H.phase === 'lobby') {
                send(conn, {type:'viewer_lobby', players: H.players.map(p => p.name), roomCode, tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null});
            } else {
                send(conn, {type:'viewer_state', vd: buildViewerDisplay(false)});
            }
            return;
        }
        // Set role as player on first non-viewer message
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        switch (msg.type) {
            case 'join': {
                // If a zombie entry exists for this name (prior connection that
                // dropped before conn.on('close') fired on the host), evict it
                // so the reconnecting player doesn't appear twice.
                const zombie = H.players.find(
                    p => p.name === msg.name && p.id !== conn.peer && guestConns[p.id] === undefined
                );
                const nBefore = H.players.length;
                if (zombie) {
                    zombie.id = conn.peer;   // re-use the existing slot
                } else {
                    hostAddPlayer(conn.peer, msg.name);
                }
                broadcastLobby();
                if (H.players.length > nBefore) sJoin();
                break;
            }
            case 'bid':       hostBid(conn.peer, msg.qty, msg.face); break;
            case 'challenge': hostChallenge(conn.peer); break;
            case 'continue':  hostContinue(conn.peer); break;
            case 'restart':   hostRestart(conn.peer); break;
            case 'start':     // TV-host: only the captain (first player) may start
                if (isTvHost && H.phase === 'lobby' && H.players[0]?.id === conn.peer) hostStartGame();
                break;
        }
    });
    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        // Remove from game if in lobby; mid-game treat as eliminated
        const pi = H.players.findIndex(p => p.id === conn.peer);
        if (pi >= 0 && H.phase === 'lobby') {
            H.players.splice(pi, 1);
            broadcastLobby();
        }
    });
    conn.on('error', e => console.warn('conn err', e));
}

// ── Join as Viewer ──
function joinAsViewer(code, _attempt) {
    const pid = code.trim().toUpperCase();
    if (!pid) { uiErr = 'Enter a room code.'; render(); return; }
    const attempt = _attempt || 1;

    isViewer = true;
    ui = 'viewer';
    uiErr = '';
    render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(pid, {reliable: true});

        hostConn.on('open', () => {
            send(hostConn, {type:'join_viewer'});
        });

        hostConn.on('data', msg => {
            if (msg.type === 'viewer_state') {
                const prevVD = vD;
                const prevPhase = vD?.phase;
                vD = msg.vd;
                if (prevPhase === 'gameover' && vD.phase !== 'gameover') {
                    confettiLaunched = false;
                }
                ui = 'viewer';
                render();
                fxOnState(prevVD, vD);
                return;
            }
            if (msg.type === 'viewer_lobby') {
                const prevN = vD && vD.phase === 'lobby' && vD.players ? vD.players.length : -1;
                vD = {phase: 'lobby', players: msg.players, roomCode: msg.roomCode, tvHost: msg.tvHost, captain: msg.captain};
                ui = 'viewer';
                render();
                if (prevN >= 0 && vD.players.length > prevN) sJoin();
            }
        });

        hostConn.on('close', () => {
            uiErr = 'Disconnected from host.';
            isViewer = false;
            vD = null;
            ui = 'home';
            render();
        });

        hostConn.on('error', e => {
            uiErr = 'Could not connect: ' + e.message;
            isViewer = false;
            ui = 'home';
            render();
        });
    });

    peer.on('error', e => {
        // Retry once transparently — PeerJS signalling can fail transiently
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false;
        ui = 'home';
        render();
    });
}

// ═══════════════════════════════════════════════
//  CLIENT ACTIONS (work for both host & guest)
// ═══════════════════════════════════════════════
function actBid() {
    if (!D?.isMyTurn) return;
    if (!bidHigher({qty:bQty, face:bFace}, D.currentBid)) return;
    if (isHost) { hostBid(myId, bQty, bFace); }
    else        { send(hostConn, {type:'bid', qty:bQty, face:bFace}); }
}

function actChallenge() {
    if (!D?.isMyTurn || !D.currentBid) return;
    if (isHost) { hostChallenge(myId); }
    else        { send(hostConn, {type:'challenge'}); }
}

function actContinue() {
    if (isHost) { hostContinue(myId); }
    else        { send(hostConn, {type:'continue'}); }
}

function actRestart() {
    if (isHost) { hostRestart(myId); }
    else        { send(hostConn, {type:'restart'}); }
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
}

// ═══════════════════════════════════════════════
//  PEER SETUP
// ═══════════════════════════════════════════════
function createGame(name, wild) {
    myName = name.trim() || 'Host';
    localStorage.setItem('liarsdice-name', myName);
    fWild  = wild;
    ui     = 'creating';
    render();

    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // no I/O
    const code = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    roomCode = code;
    peer = new Peer(code, ICE_CFG);

    peer.on('open', id => {
        myId   = id;
        isHost = true;
        H.wildOnes = fWild;
        hostAddPlayer(myId, myName);
        ui = 'lobby_h';
        render();
    });

    peer.on('connection', conn => {
        setupGuestConn(conn);
    });

    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        ui = 'home';
        render();
    });
}

// TV / big-screen host: the TV creates the room, shows a QR + scoreboard, and
// the FIRST phone to join becomes Captain (H.players[0]) with the Start button.
function hostOnTV() {
    isTvHost = true; isViewer = true;
    document.body.classList.add('viewer-mode');
    ui = 'creating'; render();

    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // no I/O
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(roomCode, ICE_CFG);

    peer.on('open', id => {
        myId = id; isHost = true;
        H.wildOnes = fWild;                        // TV host is NOT a player
        vD = { phase: 'lobby', players: [], roomCode, tvHost: true, captain: null };
        ui = 'viewer';
        render();
    });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        isTvHost = false; isViewer = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

function joinGame(code, name) {
    myName = name.trim() || 'Player';
    localStorage.setItem('liarsdice-name', myName);
    const pid = code.trim().toUpperCase();
    if (!pid) { uiErr = 'Enter a room code.'; render(); return; }

    ui = 'connecting';
    uiErr = '';
    render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId   = id;
        isHost = false;

        hostConn = peer.connect(pid, {reliable: true});

        hostConn.on('open', () => {
            send(hostConn, {type:'join', name: myName});
            ui = 'lobby_g';
            render();
        });

        hostConn.on('data', msg => {
            if (msg.type === 'lobby') {
                const prevN = D && D.phase === 'lobby' && D.players ? D.players.length : -1;
                D = {phase:'lobby', players: msg.players, roomCode: msg.roomCode, wildOnes: msg.wildOnes, tvHost: msg.tvHost, captain: msg.captain};
                ui = 'lobby_g';
                render();
                if (prevN >= 0 && D.players.length > prevN) sJoin();
                return;
            }
            if (msg.type === 'state') {
                const prevD = D;
                D = msg.display;
                bQty = D.currentBid ? D.currentBid.qty : 1;
                bFace = D.currentBid ? D.currentBid.face : 1;
                if (!D.currentBid) { bQty = 1; bFace = 1; }
                if (D.phase === 'gameover') ui = 'gameover';
                else ui = 'game';
                render();
                fxOnState(prevD, D);
            }
        });

        hostConn.on('close', () => {
            uiErr = 'Disconnected from host.';
            ui = 'home';
            D = null;
            render();
        });

        hostConn.on('error', e => {
            uiErr = 'Could not connect: ' + e.message;
            ui = 'home';
            render();
        });
    });

    peer.on('error', e => {
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'joining';
        render();
    });
}

// ═══════════════════════════════════════════════
//  AUDIO — cinematic "He's a Pirate" gallop + SFX
//  (D-minor orchestral gallop: relentless staccato low strings, bold
//   brass/string minor-arpeggio lead, timpani + cymbal crashes, detuned
//   string-section doubling; gesture-started, music ~0.33 vol, SFX on top)
// ═══════════════════════════════════════════════
let AC = null, masterGain = null, musicGain = null, sfxGain = null, noiseBuf = null;
let leadBus = null, musicDelay = null;
let musicOn = localStorage.getItem('liarsdice-music') !== '0';
let sfxOn   = localStorage.getItem('liarsdice-sfx')   !== '0';

function ac() {
    if (!AC) {
        try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
        masterGain = AC.createGain(); masterGain.gain.value = 1; masterGain.connect(AC.destination);
        musicGain  = AC.createGain(); musicGain.gain.value = musicOn ? 0.33 : 0; musicGain.connect(masterGain);
        sfxGain    = AC.createGain(); sfxGain.gain.value   = sfxOn   ? 0.55 : 0; sfxGain.connect(masterGain);
        // Lead bus with a tavern-room slapback echo
        leadBus = AC.createGain(); leadBus.gain.value = 1; leadBus.connect(musicGain);
        musicDelay = AC.createDelay(1.5); musicDelay.delayTime.value = 0.29;
        const fb = AC.createGain(); fb.gain.value = 0.2;
        const dlp = AC.createBiquadFilter(); dlp.type = 'lowpass'; dlp.frequency.value = 1900;
        const wet = AC.createGain(); wet.gain.value = 0.18;
        leadBus.connect(musicDelay); musicDelay.connect(dlp); dlp.connect(fb); fb.connect(musicDelay);
        dlp.connect(wet); wet.connect(musicGain);
        const len = AC.sampleRate * 1.2;
        noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    if (AC.state === 'suspended') AC.resume();
    return AC;
}

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide, 20), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    if (lp) {
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
        o.connect(f); f.connect(g);
    } else {
        o.connect(g);
    }
    g.connect(dest || sfxGain);
    o.start(t); o.stop(t + dur + 0.06);
}

function noiseHit(dur, { vol = 0.3, when = 0, hp = 6000, dest = null } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const src = AC.createBufferSource(); src.buffer = noiseBuf;
    const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(dest || sfxGain);
    src.start(t); src.stop(t + dur + 0.05);
}

// Adaptive arrangement: 1 = rhythm + lead, 2 = full (accordion chops + shimmer).
// Key shift lifts every melodic voice a whole tone for the two-pirate duel.
let musicIntensity = 2, musicKeyShift = 0;
let _lastScreenKey = ''; // entrance-animation gating (see render)

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Swing: push every off-16th late — the shanty sway
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) { // timpani hit — low sine with a pitch drop + a soft thud
        tone(155, 0.3, { type: 'sine', vol: 0.5, when: rel, slide: 42, dest: musicGain });
        noiseHit(0.05, { vol: 0.06, when: rel, hp: 1600, dest: musicGain });
    }
    if (tr.crash && tr.crash[i]) noiseHit(0.5, { vol: 0.15, when: rel, hp: 5200, dest: musicGain }); // cymbal swell
    if (tr.hat[i]) {
        const hv = (i % 4 === 2 ? 0.12 : 0.06) * (0.8 + Math.random() * 0.4);
        noiseHit(tr.hatHp ? 0.07 : 0.045, { vol: hv, when: rel, hp: tr.hatHp || 9500, dest: musicGain });
    }
    if (tr.creak && tr.creak[i])
        tone(70 + Math.random() * 25, 0.6, { type: 'sawtooth', vol: 0.045, when: rel, slide: 55, lp: 380, dest: musicGain, attack: 0.08 }); // hull groan
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) {
        const bdur = tr.bassStac ? stepDur * 0.85 : stepDur * 1.6;   // galloping staccato
        tone(mf(b + k), bdur, { type: w.bass || 'triangle', vol: 0.3, when: rel, dest: musicGain, lp: 1100, attack: 0.004 });
        if (tr.orch) tone(mf(b + k) * 1.004, bdur, { type: 'sawtooth', vol: 0.12, when: rel, dest: musicGain, lp: 700, attack: 0.006 }); // detuned low-string body
    }
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    if (full && tr.stab && tr.stab[i] && ch) // brass chord accent
        ch.forEach(m => tone(mf(m + 12 + k), stepDur * 0.9, { type: w.stab || 'square', vol: 0.03, when: rel, lp: 2600, dest: musicGain, attack: 0.004 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12;
        const lf = mf(l + k), lv = 0.12 * (0.9 + Math.random() * 0.2);
        tone(lf, stepDur * 1.5, { type: w.lead || 'square', vol: lv, when: rel, dest: leadBus, lp: tr.leadLp || 3400, attack: 0.005 });
        if (tr.orch) tone(lf * 1.006, stepDur * 1.5, { type: 'sawtooth', vol: lv * 0.55, when: rel, dest: leadBus, lp: tr.leadLp || 3400, attack: 0.009 }); // detuned string-section double
    }
    // Concertina shimmer above the pads
    if (full && tr.arp && i % tr.arp === 0 && ch)
        tone(mf(ch[(i / tr.arp) % ch.length] + 24 + k), stepDur * tr.arp * 0.9, { type: w.arpW || 'triangle', vol: 0.04, when: rel, lp: 5200, dest: musicGain, attack: 0.004 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.035, { vol: 0.1, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    musicIntensity = 2; // tuneMusicToGame() thins the wager track while the table is still full
    if (track === 'lobby' || track === 'results') musicKeyShift = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'bidding') musicUrgent = false;
    // one-beat snare fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) noiseHit(0.06, { vol: 0.1 + f * 0.035, when: f * s, hp: 2800 + f * 900, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}

// Adaptive layers + endgame key, read off the table state each render:
// early wagers ride the rhythm section and lead; chops + shimmer pile on
// once the crew has gambled away a third of its dice. Two pirates left
// lifts the whole score a whole tone — the final duel.
function tuneMusicToGame() {
    const d = ui === 'viewer' ? vD : D;
    if (!d || !d.players || !d.players.length) return;
    const alive = d.players.filter(p => p.active).length;
    musicKeyShift = (alive === 2 && (musicTrack === 'bidding' || musicTrack === 'showdown')) ? 2 : 0;
    if (musicTrack === 'bidding') {
        const startTotal = d.players.length * DICE_START;
        musicIntensity = (d.totalDice ?? startTotal) > startTotal * 0.66 ? 1 : 2;
    }
}

// Which track fits the current screen — covers phone, host and TV paths
// (everything funnels through render(), where this is applied)
function musicForState() {
    if (ui === 'viewer') {
        const p = vD ? vD.phase : '';
        if (p === 'reveal') return 'showdown';
        if (p === 'gameover') return 'results';
        if (p === 'bidding') return 'bidding';
        return 'lobby';
    }
    if (ui === 'game') return (D && D.phase === 'reveal') ? 'showdown' : 'bidding';
    if (ui === 'gameover') return 'results';
    return 'lobby';
}
