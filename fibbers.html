<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fibbers! — bluff trivia</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23120a1c' width='100' height='100' rx='20'/><text x='50' y='68' font-size='52' text-anchor='middle'>🤥</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Nunito:wght@500;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #120a1c; --panel: rgba(43,26,66,0.75); --panel2: rgba(58,36,88,0.85);
            --border: rgba(255,200,87,0.25); --border2: rgba(160,130,200,0.28);
            --text: #f3ecfb; --muted: #a08fc4;
            --gold: #ffc857; --pink: #ff5d8f; --good: #4ade80; --bad: #f87171;
            --paper: #f6efdf; --ink: #2b2140; --ink-soft: #6f6488;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            padding: 26px 16px 48px; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 45% at 50% -5%, rgba(255,93,143,0.14) 0%, transparent 60%),
                radial-gradient(ellipse 55% 45% at 8% 100%, rgba(255,200,87,0.10) 0%, transparent 65%),
                radial-gradient(ellipse 55% 45% at 92% 100%, rgba(120,80,220,0.12) 0%, transparent 65%);
        }
        body.viewer-mode { padding: 0; overflow: hidden; display: block; height: 100dvh; width: 100vw; }

        /* drifting bluff-room ambience — masks & speech bubbles behind everything */
        #fib-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        #fib-bg span {
            position: absolute; bottom: -12vh; left: var(--x); font-size: var(--s, 2rem); opacity: 0;
            filter: drop-shadow(0 3px 9px rgba(0,0,0,.35));
            animation: fibFloat var(--d, 27s) linear var(--dl, 0s) infinite;
        }
        @keyframes fibFloat {
            0%   { transform: translateY(0) rotate(-12deg); opacity: 0; }
            12%  { opacity: .075; }
            88%  { opacity: .075; }
            100% { transform: translateY(-124vh) rotate(14deg); opacity: 0; }
        }

        h1.logo {
            font-family: 'Fraunces', serif; font-weight: 900; letter-spacing: 1px;
            font-size: clamp(1.7rem, 7vw, 2.6rem); text-align: center; color: var(--gold);
            text-shadow: 0 2px 0 rgba(0,0,0,.4), 0 0 34px rgba(255,200,87,.35);
        }
        h1.logo .nose { color: var(--pink); }
        .sub { color: var(--muted); font-size: .7rem; letter-spacing: 2.5px; text-transform: uppercase; margin: 7px 0 22px; text-align: center; }

        #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 13px; }
        body.viewer-mode #app { max-width: none; height: 100dvh; display: block; }

        .card {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 17px;
            padding: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 12px 34px rgba(0,0,0,.5);
        }
        .card.highlight { border-color: var(--gold); box-shadow: 0 0 26px rgba(255,200,87,.16), 0 12px 34px rgba(0,0,0,.5); }
        .slbl { font-size: .66rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 11px; }

        .fg { margin-bottom: 12px; }
        .fg label { display: block; font-size: .66rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        input[type=text] {
            width: 100%; padding: 12px 14px; font-family: inherit; font-size: 1rem; font-weight: 700;
            border: 2px solid var(--border2); border-radius: 12px; background: rgba(18,10,28,.7); color: var(--text);
            outline: none;
        }
        input[type=text]:focus { border-color: var(--pink); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit; font-weight: 900; font-size: .93rem; letter-spacing: .5px;
            padding: 13px 18px; border: none; border-radius: 13px; cursor: pointer;
            transition: filter .12s, opacity .12s; user-select: none; -webkit-user-select: none;
            color: var(--text);
        }
        .btn:active { filter: brightness(1.15); }
        .btn-p { background: linear-gradient(180deg, #ffd97a, #f5a623); color: #3a2400; box-shadow: 0 5px 0 #96601a, 0 10px 22px rgba(255,200,87,.3); }
        .btn-k { background: linear-gradient(180deg, #ff7ba6, #ef3e72); color: #fff; box-shadow: 0 5px 0 #8f1f43, 0 10px 22px rgba(255,93,143,.35); }
        .btn-g { background: rgba(160,130,200,.14); box-shadow: inset 0 0 0 2px var(--border2); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 8px 13px; font-size: .76rem; border-radius: 11px; }
        .btn:disabled { opacity: .4; cursor: default; }

        .err {
            background: rgba(248,113,113,.13); border: 1px solid rgba(248,113,113,.5); color: #fda4af;
            padding: 11px 14px; border-radius: 12px; font-size: .8rem; font-weight: 700; text-align: center;
        }
        hr { border: none; border-top: 1px dashed var(--border2); margin: 13px 0; }

        .connecting { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 46px 0; color: var(--muted); font-weight: 700; }
        .spin { width: 34px; height: 34px; border-radius: 50%; border: 4px solid rgba(255,200,87,.15); border-top-color: var(--gold); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .avrow { display: flex; flex-wrap: wrap; gap: 7px; }
        .av {
            width: 42px; height: 42px; border-radius: 12px; font-size: 1.35rem; display: flex; align-items: center; justify-content: center;
            background: rgba(18,10,28,.7); border: 2px solid var(--border2); cursor: pointer;
        }
        .av.sel { border-color: var(--pink); background: rgba(255,93,143,.18); box-shadow: 0 4px 12px rgba(255,93,143,.35); }

        .player-row { display: flex; align-items: center; gap: 11px; padding: 8px 4px; border-bottom: 1px dashed var(--border2); font-weight: 800; font-size: .92rem; }
        .player-row:last-child { border-bottom: none; }
        .pav { width: 38px; height: 38px; border-radius: 11px; background: rgba(18,10,28,.7); border: 2px solid var(--border2); font-size: 1.25rem; display: flex; align-items: center; justify-content: center; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); box-shadow: 0 0 8px var(--good); margin-left: auto; }
        .qr-wrap { width: min(210px, 58vw); margin: 6px auto 10px; border-radius: 13px; overflow: hidden; box-shadow: 0 8px 22px rgba(0,0,0,.4); }
        .qr-wrap svg { display: block; width: 100%; height: auto; }
        .room-code { font-family: 'Fraunces', serif; font-weight: 900; font-size: 2.3rem; letter-spacing: 12px; text-align: center; color: var(--gold); padding-left: 12px; }
        .share-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px; }
        .seg-row { display: flex; flex-wrap: wrap; gap: 7px; }

        /* question + countdown */
        .q-meta { display: flex; justify-content: space-between; align-items: center; font-size: .72rem; font-weight: 800; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
        .timebar-wrap { height: 10px; border-radius: 6px; background: rgba(255,255,255,.08); overflow: hidden; }
        .timebar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--gold), var(--pink)); transition: width .2s linear; }
        .q-prompt { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.28rem; line-height: 1.45; }
        .q-prompt .blank { color: var(--pink); border-bottom: 3px dotted var(--pink); }

        /* lie input */
        .lie-note { text-align: center; font-weight: 900; color: var(--gold); padding: 6px 0; }
        .truth-banner {
            background: rgba(74,222,128,.13); border: 1px solid rgba(74,222,128,.5); color: #86efac;
            border-radius: 13px; padding: 12px; font-weight: 900; text-align: center;
        }

        /* answer wall (phone) */
        .wall { display: flex; flex-direction: column; gap: 9px; }
        .wall-card {
            border: none; border-radius: 13px; padding: 13px 14px; text-align: left; cursor: pointer;
            background: var(--paper); color: var(--ink); font-family: 'JetBrains Mono', monospace;
            font-weight: 700; font-size: .92rem; line-height: 1.35;
            box-shadow: 0 4px 0 rgba(0,0,0,.35), 0 8px 16px rgba(0,0,0,.35);
            display: flex; gap: 10px; align-items: baseline;
            transition: opacity .2s, outline .1s;
        }
        .wall-card .let { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: .72rem; color: var(--ink-soft); letter-spacing: 1px; }
        .wall-card.mine { opacity: .45; cursor: default; }
        .wall-card.mine::after { content: 'your lie 🤥'; margin-left: auto; font-family: 'Nunito', sans-serif; font-size: .66rem; font-weight: 900; color: var(--pink); }
        .wall-card.picked { outline: 4px solid var(--pink); outline-offset: 2px; }
        .wall-card.truth-card { outline: 4px solid var(--good); outline-offset: 2px; }
        .wall-card.wrongpick { outline: 4px solid var(--bad); outline-offset: 2px; }
        .wall-card.faded { opacity: .35; }

        /* reveal (phone) */
        .verdict { text-align: center; padding: 8px 0 4px; }
        .verdict .vico { font-size: 3rem; }
        .verdict .vt { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.5rem; margin-top: 4px; }
        .verdict .vpts { font-size: 2rem; font-weight: 900; color: var(--gold); margin-top: 2px; }
        .chip { display: inline-block; padding: 4px 12px; border-radius: 12px; background: rgba(255,200,87,.13); border: 1px solid var(--border); color: var(--gold); font-weight: 900; font-size: .76rem; margin: 3px; }
        .chip.pk { background: rgba(255,93,143,.13); border-color: rgba(255,93,143,.45); color: var(--pink); }
        .chip.gd { background: rgba(74,222,128,.13); border-color: rgba(74,222,128,.45); color: #86efac; }
        .standings .sc { margin-left: auto; font-weight: 900; }
        .standings .delta { color: var(--good); font-size: .75rem; font-weight: 900; margin-left: 7px; }

        /* ═════════ TV ═════════ */
        .tv { height: 100dvh; display: flex; flex-direction: column; padding: 2.8vmin 3.4vmin; gap: 2vmin; }
        .tv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2vmin; }
        .tv-logo { font-family: 'Fraunces', serif; font-weight: 900; font-size: 3.3vmin; color: var(--gold); text-shadow: 0 0 24px rgba(255,200,87,.4); }
        .tv-meta { font-size: 1.8vmin; font-weight: 900; letter-spacing: .35vmin; text-transform: uppercase; color: var(--muted); }
        .tv-main { flex: 1; display: flex; gap: 2.4vmin; min-height: 0; }
        .tv-stage { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; gap: 1.6vmin; }
        .tv-rail { width: 29vmin; min-width: 230px; display: flex; flex-direction: column; gap: 1.3vmin; overflow: hidden; }
        .rail-title { font-size: 1.6vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .rail-row {
            display: flex; align-items: center; gap: 1.1vmin; background: var(--panel);
            border: 1px solid var(--border2); border-radius: 1.5vmin; padding: 1.1vmin 1.4vmin;
            font-weight: 800; font-size: 1.95vmin; position: relative;
        }
        .rail-row .rav { font-size: 2.5vmin; }
        .rail-row .rname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rail-row .rsc { font-weight: 900; color: var(--gold); font-variant-numeric: tabular-nums; }
        .rail-row .rdelta { position: absolute; right: 1vmin; top: -1.2vmin; font-size: 1.6vmin; font-weight: 900; color: #86efac; text-shadow: 0 2px 6px rgba(0,0,0,.6); }
        .rail-row.done::after { content: '✓'; color: var(--good); font-weight: 900; font-size: 1.9vmin; }

        .tv-qcard {
            background: var(--panel); border: 1px solid var(--border); border-radius: 2.2vmin;
            padding: 3.2vmin 4vmin; box-shadow: 0 16px 50px rgba(0,0,0,.5);
        }
        .tv-qcard .kicker { font-size: 1.6vmin; font-weight: 900; letter-spacing: .4vmin; text-transform: uppercase; color: var(--pink); margin-bottom: 1.2vmin; }
        .tv-qcard .q { font-family: 'Fraunces', serif; font-weight: 900; font-size: 3.6vmin; line-height: 1.4; }
        .tv-qcard .q .blank { color: var(--pink); border-bottom: .5vmin dotted var(--pink); }
        .tv-counter { text-align: center; font-size: 2.2vmin; font-weight: 900; color: var(--gold); }
        .tv-timebar-wrap { flex: 0 0 auto; height: 1.5vmin; border-radius: .8vmin; background: rgba(255,255,255,.08); overflow: hidden; }
        .tv-timebar { height: 100%; background: linear-gradient(90deg, var(--gold), var(--pink)); border-radius: .8vmin; transition: width .2s linear; }

        .tv-wall { flex: 1; display: grid; gap: 1.5vmin; grid-template-columns: repeat(auto-fit, minmax(26vmin, 1fr)); align-content: center; overflow: auto; }
        .tv-lie {
            background: var(--paper); color: var(--ink); border-radius: 1.5vmin; padding: 1.8vmin 2vmin;
            font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.95vmin; line-height: 1.35;
            box-shadow: 0 8px 22px rgba(0,0,0,.4); position: relative; min-height: 8vmin;
        }
        .tv-lie .let { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.3vmin; letter-spacing: .3vmin; color: var(--ink-soft); display: block; margin-bottom: .6vmin; }
        .tv-lie.hidden-card { visibility: hidden; }
        .tv-lie.flip { animation: flipIn .5s ease both; }
        @keyframes flipIn { from { opacity: 0; transform: rotateX(80deg); } to { opacity: 1; transform: none; } }
        .tv-lie.is-truth { outline: .55vmin solid var(--good); outline-offset: .3vmin; box-shadow: 0 0 34px rgba(74,222,128,.4); }
        .tv-lie .authors { position: absolute; top: -1.6vmin; right: 1vmin; font-size: 2.4vmin; }
        .tv-lie .fooled { margin-top: 1vmin; font-size: 2.2vmin; min-height: 2.6vmin; }
        .tv-lie .tag { font-family: 'Nunito', sans-serif; font-size: 1.2vmin; font-weight: 900; letter-spacing: .2vmin; text-transform: uppercase; color: var(--ink-soft); }
        .tv-lie .tag.truth { color: #15803d; }

        /* TV lobby */
        .tv-lobby { flex: 1; display: flex; gap: 4vmin; align-items: center; min-height: 0; }
        .tv-lobby .qr-side { background: var(--paper); color: var(--ink); border-radius: 2.4vmin; padding: 3.2vmin; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
        .tv-lobby .qr-side .slbl { color: var(--ink-soft); }
        .tv-lobby .qr-side .qr-wrap { width: 32vmin; margin: 1.4vmin auto; }
        .tv-lobby .qr-side .room-code { color: var(--ink); font-size: 4.6vmin; letter-spacing: 1.9vmin; padding-left: 1.9vmin; }
        .tv-lobby .join-hint { font-size: 1.7vmin; font-weight: 800; color: var(--ink-soft); }
        .tv-players { flex: 1; display: flex; flex-direction: column; gap: 1.5vmin; min-width: 0; }
        .tv-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20vmin, 1fr)); gap: 1.5vmin; }
        .tv-pcard {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 1.7vmin;
            padding: 1.7vmin; text-align: center; font-weight: 900; font-size: 2vmin; animation: popIn .35s ease both;
        }
        .tv-pcard .pav-big { font-size: 4.2vmin; }
        @keyframes popIn { from { opacity: 0; transform: scale(.7); } to { opacity: 1; transform: scale(1); } }
        .tv-waiting { color: var(--muted); font-weight: 800; font-size: 1.9vmin; }

        /* podium */
        .podium-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 2.4vmin; padding-bottom: 1.5vmin; }
        .pod { text-align: center; font-weight: 900; animation: podRise .6s cubic-bezier(.2,.8,.3,1) both; }
        .pod .pav-big { font-size: 4.8vmin; }
        .pod .pname { font-size: 2.3vmin; margin-bottom: .8vmin; }
        .pod .pscore { font-size: 1.9vmin; color: var(--gold); margin-bottom: .8vmin; }
        .pod .block { border-radius: 1.5vmin 1.5vmin 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 1.3vmin; font-size: 3.2vmin; width: 17vmin; }
        .pod.p1 .block { height: 21vmin; position: relative; overflow: hidden; }
        .pod.p1 .block::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: linear-gradient(115deg, transparent 36%, rgba(255,255,255,.55) 50%, transparent 64%);
            transform: translateX(-120%); animation: podShine 2.4s 1s ease-in-out infinite;
        }
        @keyframes podShine { 0% { transform: translateX(-120%); } 55%, 100% { transform: translateX(120%); } }
        .pod.p2 .block { height: 14vmin; }
        .pod.p3 .block { height: 9.5vmin; }
        .pod.mrank-0 .block { background: linear-gradient(180deg, #ffd97a, #96601a); }
        .pod.mrank-1 .block { background: linear-gradient(180deg, #d7d7e0, #8f8fa3); }
        .pod.mrank-2 .block { background: linear-gradient(180deg, #e8a06a, #9c5a33); }
        .awards-row { display: flex; gap: 1.5vmin; justify-content: center; flex-wrap: wrap; padding-bottom: 1.5vmin; }
        .award { background: var(--panel); border: 1px solid var(--border); border-radius: 1.5vmin; padding: 1.3vmin 2vmin; font-weight: 800; font-size: 1.8vmin; text-align: center; }
        .award .aw-t { color: var(--gold); font-weight: 900; }

        #confetti-cv { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

        /* sound toggles */
        #sound-togs { position: fixed; top: 10px; right: 10px; z-index: 80; display: flex; gap: 6px; }
        #sound-togs button {
            width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem;
            background: rgba(43,26,66,.82); box-shadow: inset 0 0 0 1px var(--border2);
            transition: opacity .2s, transform .12s;
        }
        #sound-togs button:active { transform: scale(.88); }
        #sound-togs button.off { opacity: .35; filter: grayscale(1); }
        body.viewer-mode #sound-togs { top: auto; bottom: 12px; right: 12px; }

        /* FX layer — particles + score pops */
        .pt {
            position: fixed; width: 9px; height: 9px; border-radius: 2px;
            z-index: 950; pointer-events: none;
            animation: ptFly .75s cubic-bezier(.15,.65,.4,1) forwards;
        }
        @keyframes ptFly {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(560deg) scale(.3); opacity: 0; }
        }
        .pop {
            position: fixed; z-index: 960; pointer-events: none;
            font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.5rem;
            animation: popUp 1.1s cubic-bezier(.2,.8,.3,1) forwards;
            text-shadow: 0 2px 12px rgba(0,0,0,.6); white-space: nowrap;
        }
        .pop.good { color: var(--good); }
        .pop.gold { color: var(--gold); }
        .pop.bad  { color: var(--bad); font-size: 1rem; }
        @keyframes popUp {
            0%   { transform: translate(-50%, 0) scale(.5); opacity: 0; }
            15%  { transform: translate(-50%, -12px) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -78px) scale(1); opacity: 0; }
        }

        /* screen entrances — only on phase changes (#app.fresh), so patches never re-trigger */
        @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        #app.fresh .card { animation: cardIn .35s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes wallIn { from { opacity: 0; transform: scale(.9) translateY(10px); } to { opacity: 1; transform: none; } }
        #app.fresh .wall-card { animation: wallIn .32s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 45ms); }
        #app.fresh .tv-lie.deal { animation: wallIn .4s cubic-bezier(.2,.8,.3,1) both; animation-delay: calc(var(--i, 0) * 70ms); }
        @keyframes vicoPop { 0% { transform: scale(0) rotate(-14deg); } 60% { transform: scale(1.25) rotate(4deg); } 100% { transform: scale(1) rotate(0); } }
        #app.fresh .vico { animation: vicoPop .5s cubic-bezier(.2,.8,.3,1) both; display: inline-block; }
        @keyframes vptsPop { 0% { opacity: 0; transform: scale(.4); } 60% { transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }
        #app.fresh .vpts { animation: vptsPop .45s .18s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes shakeX {
            10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-6px); } 40%, 60% { transform: translateX(6px); }
        }
        #app.fresh .card.shake { animation: cardIn .3s cubic-bezier(.2,.8,.3,1) both, shakeX .5s .35s both; }
        @keyframes notePop { 0% { opacity: 0; transform: scale(.7); } 60% { transform: scale(1.08); } 100% { opacity: 1; transform: scale(1); } }
        .lie-note { animation: notePop .32s cubic-bezier(.2,.8,.3,1); }

function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++)
            for (let c = 0; c < n; c++)
                if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#fdf8ec"/>` +
            `<g fill="#2b2140">${rects}</g></svg>`;
    } catch (e) { return ''; }
}

// ── Confetti ──
let _cf = { parts: [], raf: 0, running: false, until: 0 };
function startConfetti(ms) {
    if (REDUCED) return;
    const cv = $id('confetti-cv'), ctx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    _cf.until = performance.now() + (ms || 2600);
    const cols = ['#ffc857', '#ff5d8f', '#4ade80', '#a78bfa', '#f6efdf'];
    for (let i = 0; i < 130; i++) {
        _cf.parts.push({
            x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.5,
            vx: (Math.random() - 0.5) * 2.4, vy: 2 + Math.random() * 3.6,
            rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.25,
            w: 6 + Math.random() * 7, h: 4 + Math.random() * 5,
            col: cols[Math.floor(Math.random() * cols.length)],
        });
    }
    if (_cf.running) return;
    _cf.running = true;
    (function frame(t) {
        ctx.clearRect(0, 0, cv.width, cv.height);
        _cf.parts = _cf.parts.filter(p => p.y < cv.height + 30);
        for (const p of _cf.parts) {
            p.x += p.vx; p.y += p.vy; p.rot += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        }
        if (t < _cf.until || _cf.parts.length) _cf.raf = requestAnimationFrame(frame);
        else { _cf.running = false; ctx.clearRect(0, 0, cv.width, cv.height); }
    })(performance.now());
}

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {

    g.gain.setValueAtTime(0, t);

    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    if (lp) {
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
        o.connect(f); f.connect(g);

        o.connect(g);

    g.connect(dest || sfxGain);
    o.start(t); o.stop(t + dur + 0.06);
}

// Adaptive arrangement: intensity gates layers in, keyShift lifts the final question
let musicIntensity = 2, musicKeyShift = 0;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Swing: delay every off-8th (2nd half of each beat) — the noir shuffle
    const rel = t - AC.currentTime + (((i >> 1) % 2) ? stepDur * 2 * (tr.swing || 0) : 0);
    if (tr.kick[i]) tone(135, 0.24, { type: 'sine', vol: 0.42, when: rel, slide: 40, dest: musicGain });
    if (tr.hat[i]) {
        const hv = (i % 4 === 0 ? 0.1 : 0.06) * (0.8 + Math.random() * 0.4);
        noiseHit(i % 8 === 4 ? 0.09 : 0.05, { vol: hv, when: rel, hp: 8500, dest: musicGain });
    }
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) tone(mf(b + k), stepDur * 1.6, { type: w.bass || 'triangle', vol: 0.3, when: rel, dest: musicGain, lp: 850, attack: 0.006 });
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    if (tr.stab && tr.stab[i] && ch && full)
        ch.forEach(m => tone(mf(m + 12 + k), stepDur * 1.1, { type: w.stab || 'sine', vol: tr.stabVol || 0.035, when: rel, lp: 2400, dest: musicGain, attack: 0.005 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12;
        tone(mf(l + k), stepDur * 1.5, { type: w.lead || 'triangle', vol: 0.12 * (0.9 + Math.random() * 0.2), when: rel, dest: leadBus, lp: tr.leadLp || 3000, attack: 0.006 });
    }
    // High shimmer arp two octaves above the pads — full arrangement only
    if (tr.arp && i % tr.arp === 0 && ch && full)
        tone(mf(ch[(i / tr.arp) % ch.length] + 24 + k), stepDur * tr.arp * 0.9, { type: w.arpW || 'sine', vol: 0.04, when: rel, lp: 5000, dest: musicGain, attack: 0.004 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.035, { vol: 0.1, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    // adaptive: fib-writing and voting start lean and fill in as answers land (bumpFibIntensity)
    musicIntensity = (track === 'scheme' || track === 'vote') ? 1 : 2;
    if (track === 'lobby' || track === 'over') musicKeyShift = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'scheme' && track !== 'vote') musicUrgent = false;
    // one-beat snare fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) noiseHit(0.06, { vol: 0.1 + f * 0.035, when: f * s, hp: 2800 + f * 900, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}
// Adaptive layers: stabs + shimmer join once half the lies/votes are in;
// timer urgency (musicUrgent) forces the full arrangement on its own
function bumpFibIntensity(done, total) {
    if (total && done / total >= 0.5) musicIntensity = Math.max(musicIntensity, 2);
}

function toggleMusic() {

// ── Particle bursts + floating score text ──
function burst(x, y, colors, n = 14) {
    if (REDUCED) return;
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;
        p.style.cssText = `left:${x}px;top:${y}px;background:${colors[i % colors.length]};` +
            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}
function popText(x, y, text, cls = 'good') {
    const el = document.createElement('div');
    el.className = 'pop ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1150);
}
function burstAt(sel, colors) {
    const el = document.querySelector(sel);
    if (!el) return;
    const r = el.getBoundingClientRect();
    burst(r.left + r.width / 2, r.top + r.height / 2, colors);
}

function send(conn, msg) { try { conn.send(msg); } catch (e) { console.warn('send err', e); } }

function broadcastPlayers(fn) {

        if (p.id === myId) return;
        const c = guestConns[p.id];
        if (c) send(c, typeof fn === 'function' ? fn(p) : fn);
    });

function connectedPlayers() {
    return H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
}

function hostAddPlayer(id, name, avatar) {
    if (H.players.find(p => p.id === id) || H.players.length >= MAX_PLAYERS) return;
    const taken = new Set(H.players.map(p => p.avatar));
    const av = avatar && !taken.has(avatar) ? avatar : (AVATARS.find(a => !taken.has(a)) || '🙂');
    H.players.push({ id, name, avatar: av, score: 0, fools: 0, truths: 0, lastDelta: 0, _lie: null, _lieDone: false, _truthBonus: false, _vote: null });
}

function lobbyMsg() {

        players: H.players.map(p => ({ name: p.name, avatar: p.avatar })),
        settings: { ...H.settings },
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function broadcastLobby() {
    broadcastPlayers(lobbyMsg());
    broadcastViewers({ ...lobbyMsg(), type: 'viewer_lobby' });
    hostSyncSelf(lobbyMsg());
}

function railPlayers(doneFlag) {

        .map(p => ({

        .map(p => ({ name: p.name, avatar: p.avatar, score: p.score, delta: p.lastDelta, fools: p.fools, truths: p.truths }));
}

function capt() { return { tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null }; }

function lieMsg() { return { type: 'lie_phase', qid: H.cur.qid, ...progress(), q: H.cur.q, seconds: LIE_SECS, ...capt() }; }
function viewerLieMsg() {
    return { ...lieMsg(), type: 'viewer_lie', submitted: H.players.filter(p => p._lieDone).length, playerCount: connectedPlayers().length, players: railPlayers('lie') };
}
function voteMsgFor(p) {
    const mine = H.cards.find(c => !c.isTruth && p && c.authors.includes(p.id));
    return {
        type: 'vote_phase', qid: H.cur.qid, ...progress(), q: H.cur.q,

    };

        players: railPlayers('vote'),
    };

function phaseSnapshotFor(p) {
    if (H.phase === 'lie') return lieMsg();
    if (H.phase === 'vote') return voteMsgFor(p);
    if (H.phase === 'reveal') return H.lastRevealFor ? H.lastRevealFor(p) : lobbyMsg();
    if (H.phase === 'podium') return { ...(H.lastPodium || {}), type: 'podium' };
    return lobbyMsg();
}
function viewerSnapshot() {
    if (H.phase === 'lie') return viewerLieMsg();
    if (H.phase === 'vote') return viewerVoteMsg();
    if (H.phase === 'reveal') return H.lastReveal || viewerVoteMsg();
    if (H.phase === 'podium') return H.lastPodium;
    return { ...lobbyMsg(), type: 'viewer_lobby' };
}

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            send(conn, viewerSnapshot());
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const name = String(msg.name || 'Player').slice(0, 16);
                const zombie = H.players.find(p => p.name === name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else hostAddPlayer(conn.peer, name, msg.avatar);
                const p2 = H.players.find(p => p.id === conn.peer);
                if (!p2) { send(conn, lobbyMsg()); break; }
                if (H.phase === 'lobby') broadcastLobby();
                else { send(conn, phaseSnapshotFor(p2)); broadcastViewers(viewerSnapshot()); if (isTvHost) tvHostSync(); }
                break;
            }
            case 'lie':  if (player) hostLie(player, msg.qid, msg.text, conn); break;
            case 'vote': if (player) hostVote(player, msg.qid, msg.key, conn); break;
            case 'ctl': {
                if (!isTvHost || !player || player.id !== H.players[0]?.id) break;
                hostCtl(msg.action, msg);
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        } else if (H.phase === 'lie') maybeEndLie();
        else if (H.phase === 'vote') maybeEndVote();
    });
    conn.on('error', e => console.warn('conn err', e));
}

function hostCtl(action, msg) {
    if (action === 'start' && H.phase === 'lobby') hostStartGame();
    else if (action === 'next' && H.phase === 'reveal') nextQuestion();
    else if (action === 'again' && H.phase === 'podium') hostNewGame();
    else if (action === 'set' && H.phase === 'lobby') {
        if ([5, 8, 10].includes(msg.qCount)) H.settings.qCount = msg.qCount;
        broadcastLobby();
    }
}
function guestCtl(action, extra) {
    if (isHost && !isTvHost) { hostCtl(action, extra || {}); return; }
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ── Create a room ──
function makeRoom(onOpen) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(PFX + roomCode, ICE_CFG);
    peer.on('open', id => { myId = id; isHost = true; onOpen(); });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        isHost = false; isTvHost = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

    isViewer = true;
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join_viewer' }));
        hostConn.on('data', msg => applyViewerMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the game.'; isViewer = false; vD = null; document.body.classList.remove('viewer-mode'); ui = 'home'; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; isViewer = false; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

function tvHostSync() {
    if (!isTvHost) return;
    applyViewerMsg(viewerSnapshot());
}
function hostSyncSelf(msg) {
    if (isTvHost) { tvHostSync(); return; }
    if (isHost && msg) applyMsg(msg);
}

// ═══════════════════════════════════════════
// HOST GAME FLOW
// ═══════════════════════════════════════════
function clearHostTimers() { clearTimeout(_phaseTimeout); }

function hostStartGame() {
    if (connectedPlayers().length < MIN_PLAYERS) { uiErr = 'Need at least ' + MIN_PLAYERS + ' players.'; if (ui === 'lobby_h') render(); return; }
    clearHostTimers();
    H.questions = shuffle(QUESTIONS).slice(0, H.settings.qCount).map((q, i) => ({ qid: 'q' + i, q: q.q, a: q.a }));
    H.qIndex = -1;
    H.players.forEach(p => { p.score = 0; p.fools = 0; p.truths = 0; p.lastDelta = 0; });
    nextQuestion();
}

function nextQuestion() {
    clearHostTimers();
    H.qIndex += 1;
    if (H.qIndex >= H.questions.length) { showPodium(); return; }
    H.cur = H.questions[H.qIndex];
    H.cards = [];
    H.players.forEach(p => { p._lie = null; p._lieDone = false; p._truthBonus = false; p._vote = null; p.lastDelta = 0; });
    H.phase = 'lie';
    broadcastPlayers(lieMsg());
    broadcastViewers(viewerLieMsg());
    hostSyncSelf(lieMsg());
    _phaseTimeout = setTimeout(startVote, LIE_SECS * 1000 + 800);
}

function hostLie(player, qid, text, conn) {
    if (H.phase !== 'lie' || !H.cur || qid !== H.cur.qid || player._lieDone) return;
    const t = String(text || '').trim().slice(0, 60);
    if (!t) return;
    if (norm(t) === norm(H.cur.a)) {
        // they guessed the actual truth
        if (!player._truthBonus) {
            player._truthBonus = true;
            if (conn) send(conn, { type: 'lie_ack', status: 'truth' });
            else if (player.id === myId) applyMsg({ type: 'lie_ack', status: 'truth' });
            return; // still owes us a lie
        }
        // matched truth twice — lock them in with no lie
        player._lieDone = true;
    } else {
        player._lie = t;
        player._lieDone = true;
    }
    if (conn) send(conn, { type: 'lie_ack', status: 'ok' });
    else if (player.id === myId) applyMsg({ type: 'lie_ack', status: 'ok' });
    broadcastViewers(viewerLieMsg());
    if (isTvHost) tvHostSync();
    maybeEndLie();
}

function maybeEndLie() {
    if (H.phase !== 'lie') return;
    const active = connectedPlayers();
    if (active.length && active.every(p => p._lieDone)) {
        clearHostTimers();
        _phaseTimeout = setTimeout(startVote, 700);
    }
}

function startVote() {
    if (H.phase !== 'lie') return;
    clearHostTimers();
    // build the answer wall: merge duplicate lies, add the truth, shuffle
    const byNorm = {};
    H.players.forEach(p => {
        if (!p._lie) return;
        const k = norm(p._lie);
        if (!byNorm[k]) byNorm[k] = { text: p._lie, authors: [] };
        byNorm[k].authors.push(p.id);
    });
    const cards = Object.values(byNorm).map(c => ({ ...c, isTruth: false, votes: [] }));
    cards.push({ text: H.cur.a, authors: [], isTruth: true, votes: [] });
    H.cards = shuffle(cards).map((c, i) => ({ ...c, key: i }));
    H.phase = 'vote';
    broadcastPlayers(p => voteMsgFor(p));
    broadcastViewers(viewerVoteMsg());
    hostSyncSelf(isTvHost ? null : voteMsgFor(H.players.find(p => p.id === myId)));
    _phaseTimeout = setTimeout(endVote, VOTE_SECS * 1000 + 800);
}

function hostVote(player, qid, key, conn) {
    if (H.phase !== 'vote' || !H.cur || qid !== H.cur.qid || player._vote !== null) return;
    const card = H.cards.find(c => c.key === key);
    if (!card || card.authors.includes(player.id)) return;   // no self-votes
    player._vote = key;
    card.votes.push(player.id);
    if (conn) send(conn, { type: 'vote_ack', key });
    else if (player.id === myId) applyMsg({ type: 'vote_ack', key });
    broadcastViewers(viewerVoteMsg());
    if (isTvHost) tvHostSync();
    maybeEndVote();
}

function maybeEndVote() {
    if (H.phase !== 'vote') return;
    const active = connectedPlayers();
    if (active.length && active.every(p => p._vote !== null)) {
        clearHostTimers();
        _phaseTimeout = setTimeout(endVote, 700);
    }
}

function endVote() {
    if (H.phase !== 'vote') return;
    clearHostTimers();
    H.phase = 'reveal';
    const byId = id => H.players.find(p => p.id === id);
    const truthCard = H.cards.find(c => c.isTruth);

    H.players.forEach(p => {
        let delta = 0;
        if (p._vote !== null && p._vote === truthCard.key) { delta += 100; p.truths += 1; }
        if (p._truthBonus) { delta += 50; p.truths += 1; }
        p._delta0 = delta;
    });
    H.cards.forEach(c => {
        if (c.isTruth || !c.votes.length) return;
        const share = Math.max(10, Math.round(60 * c.votes.length / c.authors.length / 10) * 10);
        c.authors.forEach(id => {
            const p = byId(id);
            if (p) { p._delta0 += share; p.fools += c.votes.length; }
        });
    });
    H.players.forEach(p => { p.lastDelta = p._delta0 || 0; p.score += p.lastDelta; delete p._delta0; });

    const isLast = H.qIndex >= H.questions.length - 1;
    const fullCards = () => {
        // theatre order: least-voted lies first, truth always last
        const lies = H.cards.filter(c => !c.isTruth).sort((a, b) => a.votes.length - b.votes.length);
        return [...lies, truthCard].map(c => ({
            key: c.key, text: c.text, isTruth: c.isTruth,
            authors: c.authors.map(id => ({ name: byId(id)?.name, avatar: byId(id)?.avatar })),
            votes: c.votes.map(id => ({ name: byId(id)?.name, avatar: byId(id)?.avatar })),
        }));
    };

    H.lastRevealFor = (p) => ({
        type: 'reveal', qid: H.cur.qid, ...progress(), q: H.cur.q, truth: H.cur.a,
        cards: fullCards(), truthKey: truthCard.key,
        my: p ? {
            voted: p._vote, votedTruth: p._vote === truthCard.key,
            fooledBy: p._vote !== null && p._vote !== truthCard.key
                ? (H.cards.find(c => c.key === p._vote)?.authors || []).map(id => byId(id)?.name).join(' & ')
                : null,
            myFools: (H.cards.find(c => !c.isTruth && c.authors.includes(p.id))?.votes || []).map(id => ({ name: byId(id)?.name, avatar: byId(id)?.avatar })),
            truthBonus: p._truthBonus, delta: p.lastDelta,
        } : null,
        standings: standings(), isLast, ...capt(),
    });
    H.lastReveal = { ...H.lastRevealFor(null), type: 'viewer_reveal', players: railPlayers() };

    broadcastPlayers(p => H.lastRevealFor(p));
    broadcastViewers(H.lastReveal);
    hostSyncSelf(isTvHost ? null : H.lastRevealFor(H.players.find(p => p.id === myId)));
}

function showPodium() {
    clearHostTimers();
    H.phase = 'podium';
    const most = k => H.players.filter(p => p[k] > 0).sort((a, b) => b[k] - a[k])[0];
    const awards = [];
    const st1 = most('fools');
    if (st1) awards.push({ emoji: '🤥', title: 'Silver Tongue', name: st1.name, detail: st1.fools + ' fooled' });
    const st2 = most('truths');
    if (st2) awards.push({ emoji: '🕵️', title: 'Truth Hound', name: st2.name, detail: st2.truths + '× found the truth' });
    const msg = { type: 'podium', standings: standings(), awards, ...capt() };
    H.lastPodium = { ...msg, type: 'viewer_podium' };
    broadcastPlayers(msg);
    broadcastViewers(H.lastPodium);
    hostSyncSelf(msg);
}

function hostNewGame() {
    clearHostTimers();
    H.phase = 'lobby';
    H.questions = []; H.qIndex = -1; H.cur = null; H.cards = [];
    H.players.forEach(p => { p.score = 0; p.fools = 0; p.truths = 0; p.lastDelta = 0; p._lie = null; p._lieDone = false; p._truthBonus = false; p._vote = null; });
    H.players = H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
    broadcastLobby();
    if (isHost && !isTvHost) { ui = 'lobby_h'; render(); }
}

function hostSet(patch) {
    Object.assign(H.settings, patch);
    broadcastLobby();
    if (ui === 'lobby_h') render();
}

// ═══════════════════════════════════════════
// CLIENT (phone) MESSAGE HANDLING
// ═══════════════════════════════════════════
function stopClientTimers() { clearInterval(_clientTick); _clientTick = null; musicUrgent = false; }

let _lastTickSec = -1;
function startCountdown(seconds) {
    qEndsAt = Date.now() + seconds * 1000;
    stopClientTimers();
    _lastTickSec = -1;
    _clientTick = setInterval(() => {
        const left = Math.max(0, qEndsAt - Date.now());
        const bar = $id('q-timebar'), num = $id('q-timenum');
        if (bar) bar.style.width = (left / (seconds * 1000) * 100) + '%';
        if (num) num.textContent = Math.ceil(left / 1000);
        const low = left <= 8000 && left > 0;
        if (bar) bar.classList.toggle('low', low);
        if (num) num.classList.toggle('low', low);
        musicUrgent = low;
        if (low) {
            const sec = Math.ceil(left / 1000);
            if (sec !== _lastTickSec) { _lastTickSec = sec; sTick(); }
        }
        if (left <= 0) stopClientTimers();
    }, 200);
}

function applyMsg(msg) {
    switch (msg.type) {
        case 'lobby': {
            const prevN = D && D.type === 'lobby' ? (D.players || []).length : -1;
            D = msg;
            stopClientTimers();
            setMusic('lobby');
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            ui = (isHost && !isTvHost) ? 'lobby_h' : 'lobby_g';
            render();
            break;
        }
        case 'lie_phase':
            D = msg;
            myLieText = ''; lieLocked = false; foundTruth = false;
            myVote = null; voteLocked = false;
            ui = 'lie';
            setMusic('scheme');
            if (msg.num === 1) sStart(); else sPhase();
            render();
            startCountdown(msg.seconds);
            break;
        case 'lie_ack':
            if (msg.status === 'truth') {
                foundTruth = true; myLieText = '';
                sTruth();
                if (ui === 'lie') render();
                burstAt('.truth-banner', ['#4ade80', '#ffc857', '#f6efdf']);
            } else {
                lieLocked = true;
                musicIntensity = 2;   // your fib is in — open up the mix while you wait
                sFib();
                if (ui === 'lie') render();
            }
            break;
        case 'vote_phase':
            D = msg;
            myVote = null; voteLocked = false;
            ui = 'vote';
            setMusic('vote');
            sFlip();
            render();
            startCountdown(msg.seconds);
            break;
        case 'vote_ack':
            voteLocked = true; myVote = msg.key;
            musicIntensity = 2;   // vote cast — open up the mix while you wait
            sVote();
            if (ui === 'vote') render();
            break;
        case 'reveal':
            D = msg;
            stopClientTimers();
            ui = 'reveal';
            setMusic('reveal');
            musicKeyShift = msg.num === msg.total ? 2 : 0;   // final question: key up
            render();
            if (msg.my) {
                if (msg.my.votedTruth) { sTruth(); burstAt('.verdict .vico', ['#ffc857', '#4ade80', '#ff5d8f']); }
                else if (msg.my.voted !== null) sWrong();
                if (msg.my.myFools && msg.my.myFools.length) {
                    const n = msg.my.myFools.length;
                    setTimeout(() => {
                        sFooledN(n);
                        const v = document.querySelector('.verdict');
                        if (v) { const r = v.getBoundingClientRect(); popText(r.left + r.width / 2, r.top + 12, '🤥 fooled ' + n + '!', 'gold'); }
                    }, 600);
                    try { navigator.vibrate && navigator.vibrate([70, 40, 70]); } catch (e) {}
                }
            }
            break;
        case 'podium':
            D = msg;
            stopClientTimers();
            ui = 'podium';
            setMusic('over');
            render();
            sWin(); startConfetti(3600);
            break;
    }
}

function submitLie() {
    const t = myLieText.trim();
    if (!t || lieLocked || ui !== 'lie') return;
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostLie(me, D.qid, t, null);
    } else send(hostConn, { type: 'lie', qid: D.qid, text: t });
}

function castVote(key) {
    if (voteLocked || ui !== 'vote' || key === D.myKey) return;
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostVote(me, D.qid, key, null);
    } else send(hostConn, { type: 'vote', qid: D.qid, key });
}

// ═══════════════════════════════════════════
// VIEWER (TV) MESSAGE HANDLING
// ═══════════════════════════════════════════
let _vTick = null, _lastVTickSec = -1;
function stopViewerTimers() { clearInterval(_vTick); _vTick = null; clearInterval(_theatreTimer); _theatreTimer = null; musicUrgent = false; }

function startViewerCountdown(seconds) {
    const endsAt = Date.now() + seconds * 1000;
    clearInterval(_vTick);
    _lastVTickSec = -1;
    _vTick = setInterval(() => {
        const left = Math.max(0, endsAt - Date.now());
        const bar = $id('v-timebar');
        if (bar) bar.style.width = (left / (seconds * 1000) * 100) + '%';
        const low = left <= 8000 && left > 0;
        if (bar) bar.classList.toggle('low', low);
        musicUrgent = low;
        if (low) {
            const sec = Math.ceil(left / 1000);
            if (sec !== _lastVTickSec) { _lastVTickSec = sec; sTick(); }
        }
        if (left <= 0) clearInterval(_vTick);
    }, 200);
}

function applyViewerMsg(msg) {
    document.body.classList.add('viewer-mode');
    ui = 'viewer';
    const prev = vD;
    vD = msg;
    switch (msg.type) {
        case 'viewer_lobby':
            stopViewerTimers();
            setMusic('lobby');
            if (prev && prev.type === 'viewer_lobby' && (msg.players || []).length > (prev.players || []).length) sJoin();
            render();
            break;
        case 'viewer_lie': {
            const fresh = !prev || prev.type !== 'viewer_lie' || prev.qid !== msg.qid;
            if (fresh) {
                stopViewerTimers();
                setMusic('scheme');
                if (msg.num === 1) sStart(); else sPhase();
                render();
                startViewerCountdown(msg.seconds);
            }
            else patchViewerCounts(msg, 'lie');
            bumpFibIntensity(msg.submitted, msg.playerCount);
            break;
        }
        case 'viewer_vote': {
            const fresh = !prev || prev.type !== 'viewer_vote' || prev.qid !== msg.qid;
            if (fresh) { stopViewerTimers(); setMusic('vote'); render(); startViewerCountdown(msg.seconds); sFlip(); }
            else patchViewerCounts(msg, 'vote');
            bumpFibIntensity(msg.voted, msg.playerCount);
            break;
        }
        case 'viewer_reveal': {
            const fresh = !prev || prev.type !== 'viewer_reveal' || prev.qid !== msg.qid;
            stopViewerTimers();
            setMusic('reveal');
            musicKeyShift = msg.num === msg.total ? 2 : 0;   // final question: key up
            render();
            if (fresh) runTheatre(msg);
            else revealAllTheatre();
            break;
        }
        case 'viewer_podium':
            stopViewerTimers();
            setMusic('over');
            render();
            sWin();
            startConfetti(5200);
            break;
    }
}

function patchViewerCounts(msg, kind) {
    const el = $id('v-counter');
    if (el) el.textContent = kind === 'lie'
        ? `🤥 ${msg.submitted} of ${msg.playerCount} lies in`
        : `🗳️ ${msg.voted} of ${msg.playerCount} votes in`;
    const rail = $id('v-rail');
    if (rail) rail.innerHTML = railRowsHTML(msg.players, true);
}

// the reveal theatre: flip cards one by one, least-voted lies first, truth last
function runTheatre(msg) {
    if (REDUCED) { revealAllTheatre(); return; }
    const cards = msg.cards;
    let i = 0;
    clearInterval(_theatreTimer);
    const step = () => {
        if (i >= cards.length) {
            clearInterval(_theatreTimer);
            const hint = $id('v-nexthint');
            if (hint) hint.style.opacity = '1';
            return;
        }
        const el = $id('tvlie-' + cards[i].key);
        if (el) {
            el.classList.remove('hidden-card');
            el.classList.add('flip');
            if (cards[i].isTruth) { sTruth(); startConfetti(1800); } else sFlip();
        }
        i++;
    };
    step();
    _theatreTimer = setInterval(step, 2600);
}
function revealAllTheatre() {
    document.querySelectorAll('.tv-lie').forEach(el => el.classList.remove('hidden-card'));
    const hint = $id('v-nexthint');
    if (hint) hint.style.opacity = '1';
}

// Competition ranking (1-2-2-4): equal scores share a place, so tied players

function rankByScore(list, key = 'score') {

    return list.map((p, i) => { if (i > 0 && p[key] < list[i - 1][key]) rank = i; return rank; });

function standingsHTML(st) {

// ═══════════════════════════════════════════
// RENDER — phone screens

let _lastUi = '', _lastVType = '';
function render() {
    const app = $id('app');
    if (isTvHost || isViewer) ui = 'viewer';
    // 'fresh' marks a real screen change → entrance animations run once,
    // never on same-screen re-renders (lock-in, votes, avatar picks, joins)
    const vt = ui === 'viewer' ? ((vD?.type || '') + ':' + (vD?.qid ?? '')) : '';
    const fresh = ui !== _lastUi || vt !== _lastVType;
    _lastUi = ui; _lastVType = vt;
    let html = '';
    switch (ui) {
        case 'home':       html = renderHome(); break;
        case 'creating':   html = renderSpinner('Setting up the game…'); break;
        case 'connecting': html = renderSpinner('Joining the game…'); break;
        case 'lobby_h':    html = renderLobbyH(); break;
        case 'lobby_g':    html = renderLobbyG(); break;
        case 'lie':        html = renderLie(); break;
        case 'vote':       html = renderVote(); break;
        case 'reveal':     html = renderReveal(); break;
        case 'podium':     html = renderPodium(); break;
        case 'viewer':     html = renderViewer(); break;
        default:           html = renderHome();
    }
    app.innerHTML = html;
    app.classList.toggle('fresh', fresh);
}

function renderSpinner(msg) {

}

function renderHome() {

    const joinCard = `
    <div class="card${fromQR ? ' highlight' : ''}">

            <input type="text" maxlength="4" placeholder="4-letter code" value="${esc(fCode)}"
                oninput="fCode=this.value=this.value.toUpperCase()"
                onkeydown="if(event.key==='Enter')document.getElementById('btn-join').click()">

// ═══════════════════════════════════════════
// SIMULATION MODES — ?mode=tvsimulation | playersimulation  (&players=N)
// Self-driving demos with no PeerJS and no real people. Bots are counted as
// "connected" via stub guestConns so the normal host flow drives everything.
//   • tvsimulation     — watch the big-screen game play itself
//   • playersimulation — watch a phone fibber ("You") play itself
// (?mode=simulation stays as an alias for tvsimulation.)
// ═══════════════════════════════════════════
let simTimer = null, simMode = 'tv';
const SIM_NAMES = ['Ace', 'Bux', 'Cash', 'Duke', 'Edie', 'Fox', 'Gwen', 'Hawk'];
const SIM_LIES = ['a small dragon', 'the moon', 'purple socks', 'a rubber duck',
    'the number 7', 'a tiny wizard', 'left shoes', 'a jellybean', 'wet spaghetti', 'a grumpy owl'];

function startSimulation(nPlayers, mode) {
    simMode = mode === 'player' ? 'player' : 'tv';
    roomCode = 'DEMO';
    H.settings.qCount = 3;                          // short game so the demo loops
    H.players = []; guestConns = {}; viewerConns = {};
    const n = Math.max(MIN_PLAYERS, Math.min(nPlayers || 4, MAX_PLAYERS));
    if (simMode === 'tv') {
        isHost = true; isTvHost = true; myId = '__sim_host__';
        document.body.classList.add('viewer-mode');
    } else {
        isHost = true; isTvHost = false; myName = 'You'; myId = '__you__';
        myAvatar = AVATARS[0];
        hostAddPlayer(myId, myName, myAvatar);      // You are fibber #1 / the host
    }
    for (let i = H.players.length; i < n; i++) {
        const id = '__bot_' + i;
        hostAddPlayer(id, SIM_NAMES[i % SIM_NAMES.length], AVATARS[(i + 1) % AVATARS.length]);
        guestConns[id] = { peer: id, send() {} };    // stub so bots count as present
    }
    broadcastLobby();
    simTimer = setTimeout(() => { if (H.phase === 'lobby') { hostStartGame(); simDrive(); } }, 2400);
}

// Phase-driven driver: acts on the current phase, then reschedules itself.
function simDrive() {
    switch (H.phase) {
        case 'lie':
            simLieStep();
            simTimer = setTimeout(simDrive, 700 + Math.random() * 300);
            break;
        case 'vote':
            simVoteStep();
            simTimer = setTimeout(simDrive, 700 + Math.random() * 300);
            break;
        case 'reveal':
            simTimer = setTimeout(() => { if (H.phase === 'reveal') nextQuestion(); simDrive(); }, 3800);
            break;
        case 'podium':
            simTimer = setTimeout(simRestart, 6800);
            break;
        default:
            simTimer = setTimeout(simDrive, 900);
    }
}

function simLieFor() {
    let base = SIM_LIES[Math.floor(Math.random() * SIM_LIES.length)];
    if (H.cur && norm(base) === norm(H.cur.a)) base += ' (probably)';
    return base;
}

function simLieStep() {
    if (H.phase !== 'lie') return;
    const pending = H.players.filter(p => !p._lieDone);
    if (!pending.length) return;
    const p = pending[Math.floor(Math.random() * pending.length)];
    if (simMode === 'player' && p.id === myId) {
        const lie = simLieFor();
        myLieText = lie;
        const inp = $id('lie-input'); if (inp) inp.value = lie;
        submitLie();                                 // through the real phone path
        if (!p._lieDone) hostLie(p, H.cur.qid, lie, null);   // guaranteed fallback
    } else {
        hostLie(p, H.cur.qid, simLieFor(), null);
    }
}

function simVoteStep() {
    if (H.phase !== 'vote') return;
    const pending = H.players.filter(p => p._vote === null);
    if (!pending.length) return;
    const p = pending[Math.floor(Math.random() * pending.length)];
    const opts = H.cards.filter(c => !c.authors.includes(p.id));
    if (!opts.length) return;
    const truth = opts.find(c => c.isTruth);
    const card = (truth && Math.random() < 0.4) ? truth : opts[Math.floor(Math.random() * opts.length)];
    if (simMode === 'player' && p.id === myId) {
        castVote(card.key);                          // through the real phone path
        if (p._vote === null) hostVote(p, H.cur.qid, card.key, null);   // fallback
    } else {
        hostVote(p, H.cur.qid, card.key, null);
    }
}

function simRestart() {
    hostNewGame();
    simTimer = setTimeout(() => { if (H.phase === 'lobby') { hostStartGame(); simDrive(); } }, 2600);
}

(function boot() {
    const params = new URLSearchParams(location.search);
    $id('tog-music').classList.toggle('off', !musicOn);
    $id('tog-sfx').classList.toggle('off', !sfxOn);
    const mode = (params.get('mode') || '').toLowerCase();
    const simPlayers = parseInt(params.get('players'), 10) || 4;
    if (mode === 'playersimulation') { startSimulation(simPlayers, 'player'); return; }
    if (mode === 'tvsimulation' || mode === 'simulation') { startSimulation(simPlayers, 'tv'); return; }
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    if (!fAvatar) fAvatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];
    render();
})();
</script>
</body>
</html>
