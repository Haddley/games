<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Going, Going, GONE! — Auction House</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23150a1e' width='100' height='100' rx='20'/><text x='50' y='68' font-size='52' text-anchor='middle'>🔨</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #150a1e; --panel: rgba(45,26,64,0.72); --panel2: rgba(60,36,86,0.85);
            --border: rgba(232,183,90,0.3); --border2: rgba(160,130,190,0.28);
            --text: #f6eefb; --muted: #a893bd;
            --gold: #e8b75a; --gold2: #f5d38a; --up: #4ade80; --down: #f87171; --plum: #b478e0;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
            padding: 26px 16px 48px; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 55% 42% at 50% 0%, rgba(232,183,90,0.16) 0%, transparent 62%),
                radial-gradient(ellipse 45% 38% at 10% 100%, rgba(180,120,224,0.12) 0%, transparent 65%),
                radial-gradient(ellipse 45% 38% at 92% 100%, rgba(232,183,90,0.08) 0%, transparent 65%);
        }
        body.viewer-mode { padding: 0; overflow: hidden; display: block; height: 100dvh; width: 100vw; }

        h1.logo {
            font-family: 'Playfair Display', serif; font-weight: 900; letter-spacing: .5px;
            font-size: clamp(1.45rem, 6.2vw, 2.2rem); text-align: center; color: var(--gold);
            text-shadow: 0 2px 0 rgba(0,0,0,.4), 0 0 30px rgba(232,183,90,.4);
        }
        .sub { color: var(--muted); font-size: .68rem; letter-spacing: 2.5px; text-transform: uppercase; margin: 7px 0 22px; text-align: center; font-weight: 800; }

        #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 13px; }
        body.viewer-mode #app { max-width: none; height: 100dvh; display: block; }

        .card {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 16px;
            padding: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 12px 34px rgba(0,0,0,.5);
        }
        .card.highlight { border-color: var(--gold); box-shadow: 0 0 26px rgba(232,183,90,.16), 0 12px 34px rgba(0,0,0,.5); }
        .slbl { font-size: .64rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 11px; }

        .fg { margin-bottom: 12px; }
        .fg label { display: block; font-size: .64rem; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        input[type=text] {
            width: 100%; padding: 12px 14px; font-family: inherit; font-size: 1rem; font-weight: 700;
            border: 2px solid var(--border2); border-radius: 11px; background: rgba(21,10,30,.7); color: var(--text);
            outline: none;
        }
        input[type=text]:focus { border-color: var(--gold); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit; font-weight: 900; font-size: .92rem; letter-spacing: .4px;
            padding: 13px 18px; border: none; border-radius: 13px; cursor: pointer;
            transition: filter .12s, opacity .12s, box-shadow .12s; user-select: none; -webkit-user-select: none;
            color: var(--text);
        }
        .btn:active { filter: brightness(1.15); }
        .btn-p { background: linear-gradient(180deg, var(--gold2), #c99334); color: #2a1a05; box-shadow: 0 5px 0 #8a6220, 0 10px 22px rgba(232,183,90,.3); }
        .btn-p:active { box-shadow: 0 2px 0 #8a6220; }
        .btn-g { background: rgba(160,130,190,.14); box-shadow: inset 0 0 0 2px var(--border2); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 8px 13px; font-size: .74rem; border-radius: 10px; }
        .btn:disabled { opacity: .38; cursor: default; }

        .err {
            background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.5); color: #fda4af;
            padding: 11px 14px; border-radius: 12px; font-size: .8rem; font-weight: 700; text-align: center;
        }
        hr { border: none; border-top: 1px dashed var(--border2); margin: 13px 0; }

        .connecting { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 46px 0; color: var(--muted); font-weight: 700; }
        .spin { width: 34px; height: 34px; border-radius: 50%; border: 4px solid rgba(232,183,90,.15); border-top-color: var(--gold); animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .player-row { display: flex; align-items: center; gap: 11px; padding: 8px 4px; border-bottom: 1px dashed var(--border2); font-weight: 800; font-size: .92rem; }
        .player-row:last-child { border-bottom: none; }
        .pdot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 10px currentColor; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--up); box-shadow: 0 0 8px var(--up); margin-left: auto; }
        .qr-wrap { width: min(210px, 58vw); margin: 6px auto 10px; border-radius: 13px; overflow: hidden; box-shadow: 0 8px 22px rgba(0,0,0,.4); }
        .qr-wrap svg { display: block; width: 100%; height: auto; }
        .room-code { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 2.3rem; letter-spacing: 11px; text-align: center; color: var(--gold); padding-left: 11px; text-shadow: 0 0 18px rgba(232,183,90,.4); }
        .share-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px; }
        .seg-row { display: flex; flex-wrap: wrap; gap: 7px; }

        /* ── phone: lot & bidding ── */
        .lot-card { text-align: center; padding: 22px 16px; }
        .lot-card .lemoji { font-size: 3.4rem; }
        .lot-card .lname { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.4rem; margin-top: 8px; }
        .lot-card .ldesc { color: var(--muted); font-weight: 700; font-size: .85rem; margin-top: 6px; font-style: italic; }
        .lot-kicker { font-size: .62rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
        .price-big { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 3rem; color: var(--gold); text-shadow: 0 0 22px rgba(232,183,90,.35); font-variant-numeric: tabular-nums; }
        .lead-banner {
            border-radius: 13px; padding: 11px; font-weight: 900; text-align: center;
            background: rgba(74,222,128,.12); border: 1px solid rgba(74,222,128,.45); color: #a7f3c9;
        }
        .lead-banner.other { background: rgba(160,130,190,.12); border-color: var(--border2); color: var(--muted); }
        .bid-btns { display: flex; gap: 9px; }
        .bid-btns .btn { flex: 1; font-size: 1.05rem; padding: 16px 8px; }
        .gavel-wrap { height: 10px; border-radius: 6px; background: rgba(255,255,255,.09); overflow: hidden; }
        .gavel-bar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--gold), var(--down)); transition: width .1s linear; }
        .coins-chip { display: inline-block; padding: 4px 12px; border-radius: 11px; background: rgba(232,183,90,.12); border: 1px solid var(--border); color: var(--gold); font-weight: 900; font-size: .8rem; }
        .shelf { display: flex; flex-wrap: wrap; gap: 6px; }
        .shelf .sh-item {
            background: rgba(21,10,30,.6); border: 1px solid var(--border2); border-radius: 10px;
            padding: 6px 10px; font-size: .72rem; font-weight: 800;
        }
        .shelf .sh-item .val { font-weight: 900; }
        .shelf .sh-item .val.plus { color: var(--up); }
        .shelf .sh-item .val.minus { color: var(--down); }

        .sold-card { text-align: center; padding: 26px 16px; }
        .sold-card .gavel { font-size: 3.6rem; display: inline-block; animation: bang .7s ease; }
        @keyframes bang { 0% { transform: rotate(-38deg) translateY(-14px); } 55% { transform: rotate(8deg); } 75% { transform: rotate(-6deg); } 100% { transform: rotate(0); } }
        .sold-card .st { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.6rem; margin-top: 6px; }
        .chip { display: inline-block; padding: 4px 12px; border-radius: 11px; background: rgba(232,183,90,.12); border: 1px solid var(--border); color: var(--gold); font-weight: 900; font-size: .74rem; margin: 3px; }
        .standings .sc { margin-left: auto; font-weight: 900; font-variant-numeric: tabular-nums; }

        /* ═════════ TV ═════════ */
        .tv { height: 100dvh; display: flex; flex-direction: column; padding: 2.6vmin 3.2vmin; gap: 1.8vmin; }
        .tv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2vmin; }
        .tv-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 3.1vmin; color: var(--gold); text-shadow: 0 0 24px rgba(232,183,90,.4); }
        .tv-meta { font-size: 1.8vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .tv-main { flex: 1; display: flex; gap: 2.4vmin; min-height: 0; }
        .tv-stage { flex: 1.7; display: flex; flex-direction: column; min-width: 0; min-height: 0; gap: 1.6vmin; }
        .tv-rail { flex: 1; display: flex; flex-direction: column; gap: 1.2vmin; min-width: 0; overflow: hidden; }
        .rail-title { font-size: 1.5vmin; font-weight: 900; letter-spacing: .3vmin; text-transform: uppercase; color: var(--muted); }
        .rail-row {
            display: flex; align-items: center; gap: 1.2vmin; background: var(--panel);
            border: 1px solid var(--border2); border-radius: 1.5vmin; padding: 1.2vmin 1.5vmin;
            font-weight: 800; font-size: 2vmin;
        }
        .rail-row .rname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rail-row .rcoins { font-weight: 900; color: var(--gold); font-variant-numeric: tabular-nums; }
        .rail-row .rlots { color: var(--muted); font-size: 1.5vmin; }
        .rail-row.leader { border-color: var(--gold); box-shadow: 0 0 18px rgba(232,183,90,.22); }

        .tv-lot {
            flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 2.2vmin;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.2vmin;
            text-align: center; padding: 3vmin; position: relative; overflow: hidden;
        }
        .tv-lot::before {
            content: ''; position: absolute; inset: -30%; pointer-events: none;
            background: radial-gradient(ellipse 45% 38% at 50% 18%, rgba(232,183,90,.14) 0%, transparent 60%);
        }
        .tv-lot .lemoji { font-size: 9.5vmin; filter: drop-shadow(0 1vmin 2.4vmin rgba(0,0,0,.5)); }
        .tv-lot .lname { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 4.2vmin; }
        .tv-lot .ldesc { color: var(--muted); font-weight: 700; font-size: 2.1vmin; font-style: italic; max-width: 60vmin; }
        .tv-lot .lkick { font-size: 1.7vmin; font-weight: 900; letter-spacing: .45vmin; text-transform: uppercase; color: var(--gold); }
        .tv-price { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 7vmin; color: var(--gold); text-shadow: 0 0 30px rgba(232,183,90,.4); font-variant-numeric: tabular-nums; line-height: 1; }
        .tv-leader { font-size: 2.3vmin; font-weight: 900; }
        .tv-gavel-row { display: flex; align-items: center; gap: 2vmin; }
        .tv-gavel-row .going { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 2.6vmin; color: var(--down); min-width: 22vmin; text-align: right; }
        .tv-gavel-wrap { flex: 1; height: 1.6vmin; border-radius: .9vmin; background: rgba(255,255,255,.09); overflow: hidden; }
        .tv-gavel-bar { height: 100%; background: linear-gradient(90deg, var(--gold), var(--down)); border-radius: .9vmin; transition: width .1s linear; }

        .tv-sold {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 1.6vmin; text-align: center;
        }
        .tv-sold .gavel { font-size: 13vmin; animation: bang .8s ease; }
        .tv-sold .who { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 5.4vmin; color: var(--gold); }
        .tv-sold .sub2 { font-size: 2.4vmin; font-weight: 800; color: var(--muted); }

        /* valuation */
        .tv-val { flex: 1; display: flex; flex-direction: column; gap: 1.6vmin; min-height: 0; }
        .val-card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 2vmin;
            padding: 2.2vmin 3vmin; display: flex; align-items: center; gap: 2.2vmin; animation: valIn .5s ease both;
        }
        @keyframes valIn { from { opacity: 0; transform: translateY(2vmin); } to { opacity: 1; transform: none; } }
        .val-card .vemoji { font-size: 4.6vmin; }
        .val-card .vname { font-weight: 900; font-size: 2.4vmin; font-family: 'Playfair Display', serif; }
        .val-card .vpaid { color: var(--muted); font-weight: 800; font-size: 1.8vmin; }
        .val-card .vworth { margin-left: auto; text-align: right; font-weight: 900; font-size: 2.6vmin; font-variant-numeric: tabular-nums; }
        .val-card .vworth .profit { font-size: 1.9vmin; display: block; }
        .val-card .vworth .profit.plus { color: var(--up); }
        .val-card .vworth .profit.minus { color: var(--down); }
        .val-list { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 1.2vmin; justify-content: flex-end; }

        /* TV lobby */
        .tv-lobby { flex: 1; display: flex; gap: 4vmin; align-items: center; min-height: 0; }
        .tv-lobby .qr-side { background: #241333; border: 1px solid var(--border); border-radius: 2.2vmin; padding: 3.2vmin; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
        .tv-lobby .qr-side .qr-wrap { width: 32vmin; margin: 1.4vmin auto; }
        .tv-lobby .qr-side .room-code { font-size: 4.6vmin; letter-spacing: 1.9vmin; padding-left: 1.9vmin; }
        .tv-lobby .join-hint { font-size: 1.7vmin; font-weight: 800; color: var(--muted); }
        .tv-players { flex: 1; display: flex; flex-direction: column; gap: 1.5vmin; min-width: 0; }
        .tv-player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20vmin, 1fr)); gap: 1.5vmin; }
        .tv-pcard {
            background: var(--panel); border: 1px solid var(--border2); border-radius: 1.7vmin;
            padding: 1.7vmin; text-align: center; font-weight: 900; font-size: 2vmin;
        }
        .tv-pcard .pdot { width: 2.2vmin; height: 2.2vmin; margin: 0 auto 1vmin; }
        @keyframes popIn { from { opacity: 0; transform: scale(.7); } to { opacity: 1; transform: scale(1); } }
        .tv-waiting { color: var(--muted); font-weight: 800; font-size: 1.9vmin; }

        /* podium */
        .podium-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 2.4vmin; padding-bottom: 1vmin; }
        .pod { text-align: center; font-weight: 900; }
        .pod .pname { font-size: 2.4vmin; margin-bottom: .8vmin; }
        .pod .pscore { font-size: 2vmin; color: var(--gold); margin-bottom: .8vmin; font-family: 'Playfair Display', serif; }
        .pod .block { border-radius: 1.5vmin 1.5vmin 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 1.3vmin; font-size: 3.2vmin; width: 17vmin; }
        .pod.p1 .block { height: 21vmin; background: linear-gradient(180deg, var(--gold2), #8a6220); }
        .pod.p2 .block { height: 14vmin; background: linear-gradient(180deg, #d7d7e0, #8f8fa3); }
        .pod.p3 .block { height: 9.5vmin; background: linear-gradient(180deg, #e8a06a, #9c5a33); }
        .awards-row { display: flex; gap: 1.5vmin; justify-content: center; flex-wrap: wrap; padding-bottom: 2vmin; }
        .award { background: var(--panel); border: 1px solid var(--border); border-radius: 1.5vmin; padding: 1.3vmin 2vmin; font-weight: 800; font-size: 1.8vmin; text-align: center; }
        .award .aw-t { color: var(--gold); font-weight: 900; }

        #confetti-cv { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

        /* sound toggles */
        #sound-togs { position: fixed; top: 10px; right: 10px; z-index: 80; display: flex; gap: 6px; }
        #sound-togs button {
            width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem;
            background: rgba(45,26,64,.78); box-shadow: inset 0 0 0 1px var(--border);
            transition: opacity .2s, transform .12s;
        }
        #sound-togs button:active { transform: scale(.88); }
        #sound-togs button.off { opacity: .35; filter: grayscale(1); }
        body.viewer-mode #sound-togs { top: auto; bottom: 10px; right: 10px; opacity: .75; }

        /* FX layer — particles + floating text */
        .pt {
            position: fixed; width: 9px; height: 9px; border-radius: 2px;
            z-index: 950; pointer-events: none;
            animation: ptFly .75s cubic-bezier(.15,.65,.4,1) forwards;
        }
        @keyframes ptFly {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(560deg) scale(.3); opacity: 0; }
        }
        .pop {
            position: fixed; z-index: 960; pointer-events: none;
            font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.5rem;
            animation: popUp 1.1s cubic-bezier(.2,.8,.3,1) forwards;
            text-shadow: 0 2px 12px rgba(0,0,0,.6); white-space: nowrap;
        }
        .pop.good { color: var(--up); }
        .pop.gold { color: var(--gold); }
        .pop.bad  { color: var(--down); font-size: 1.15rem; }
        @keyframes popUp {
            0%   { transform: translate(-50%, 0) scale(.5); opacity: 0; }
            15%  { transform: translate(-50%, -12px) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -78px) scale(1); opacity: 0; }
        }

        /* screen entrances — only on phase changes (#app.fresh), never on same-screen re-renders */
        @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        #app.fresh .card { animation: cardIn .35s cubic-bezier(.2,.8,.3,1) both; }
        @keyframes rowIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: none; } }
        #app.fresh .player-row { animation: rowIn .3s ease-out both; animation-delay: calc(var(--i, 0) * 40ms); }
        @keyframes tvIn { from { opacity: 0; transform: translateY(2.4vmin); } to { opacity: 1; transform: none; } }
        #app.fresh .tv-lot, #app.fresh .qr-side, #app.fresh .tv-sold, #app.fresh .tv-val { animation: tvIn .4s cubic-bezier(.2,.8,.3,1) both; }
        #app.fresh .tv-pcard { animation: popIn .35s ease both; animation-delay: calc(var(--i, 0) * 50ms); }
        #app.fresh .pod { animation: popIn .5s ease both; }
        #app.fresh .award { animation: valIn .5s ease both; animation-delay: calc(.9s + var(--i, 0) * .15s); }

        /* bidding feedback */
        @keyframes bump { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
        .price-big.bump, .tv-price.bump { animation: bump .28s ease; }
        @keyframes shakeX {
            10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-6px); } 40%, 60% { transform: translateX(6px); }
        }
        #lead-banner.shake { animation: shakeX .45s both; }
        .gavel-bar.low, .tv-gavel-bar.low { background: linear-gradient(90deg, var(--down), #dc2626); }
        @keyframes goingPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: .72; } }
        #going-lbl.low, #v-going.low { animation: goingPulse .55s ease-in-out infinite; }

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
    </style>
</head>
<body>
    <div id="app"></div>
    <canvas id="confetti-cv"></canvas>
    <div id="sound-togs">
        <button id="tog-music" title="Music on/off" onclick="toggleMusic()">🎵</button>
        <button id="tog-sfx" title="Sound effects on/off" onclick="toggleSfx()">🔊</button>
    </div>
<script>
// TURN relay (Metered) so players on restrictive/remote networks can connect,
// not just those behind friendly NATs. Applied to every Peer below.
const ICE_CFG = { config: { iceServers: [
    { urls: 'stun:stun.relay.metered.ca:80' },
    { urls: 'turn:global.relay.metered.ca:80', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' },
    { urls: 'turn:global.relay.metered.ca:80?transport=tcp', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' },
    { urls: 'turn:global.relay.metered.ca:443', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' },
    { urls: 'turns:global.relay.metered.ca:443?transport=tcp', username: '35410ce7572a64d0dad7b813', credential: 'Tmwfl6WHxuBNXj2G' }
] } };

'use strict';

function $id(id) { return document.getElementById(id); }
function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function shuffle(a) { const r = a.slice(); for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function qrSVG(url) {
    try {
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const n = qr.getModuleCount(), m = 2, size = n + m * 2;
        let rects = '';
        for (let r = 0; r < n; r++)
            for (let c = 0; c < n; c++)
                if (qr.isDark(r, c)) rects += `<rect x="${c + m}" y="${r + m}" width="1.05" height="1.05"/>`;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">` +
            `<rect width="${size}" height="${size}" fill="#fdf6ec"/>` +
            `<g fill="#241333">${rects}</g></svg>`;
    } catch (e) { return ''; }
}

// ── Confetti ──
let _cf = { parts: [], raf: 0, running: false, until: 0 };
function startConfetti(ms) {
    if (REDUCED) return;
    const cv = $id('confetti-cv'), ctx = cv.getContext('2d');
    cv.width = innerWidth; cv.height = innerHeight;
    _cf.until = performance.now() + (ms || 2600);
    const cols = ['#e8b75a', '#b478e0', '#4ade80', '#22d3ee', '#f472b6', '#f6eefb'];
    for (let i = 0; i < 130; i++) {
        _cf.parts.push({
            x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.5,
            vx: (Math.random() - 0.5) * 2.4, vy: 2 + Math.random() * 3.6,
            rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.25,
            w: 6 + Math.random() * 7, h: 4 + Math.random() * 5,
            col: cols[Math.floor(Math.random() * cols.length)],
        });
    }
    if (_cf.running) return;
    _cf.running = true;
    (function frame(t) {
        ctx.clearRect(0, 0, cv.width, cv.height);
        _cf.parts = _cf.parts.filter(p => p.y < cv.height + 30);
        for (const p of _cf.parts) {
            p.x += p.vx; p.y += p.vy; p.rot += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.col; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        }
        if (t < _cf.until || _cf.parts.length) _cf.raf = requestAnimationFrame(frame);
        else { _cf.running = false; ctx.clearRect(0, 0, cv.width, cv.height); }
    })(performance.now());
}

// AUDIO — procedural auction-house engine
// (E-minor urgency: galloping bass, lowpassed
//  sawtooth brass, gavel percussion. Gesture-
//  started; music ~0.33 vol, SFX on top.)
// ═══════════════════════════════════════════
let AC = null, masterGain = null, musicGain = null, sfxGain = null, noiseBuf = null;
let leadBus = null, musicDelay = null;
let musicOn = localStorage.getItem('gavel-music') !== '0';
let sfxOn = localStorage.getItem('gavel-sfx') !== '0';

function ac() {
    if (!AC) {
        try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
        masterGain = AC.createGain(); masterGain.gain.value = 1; masterGain.connect(AC.destination);
        musicGain = AC.createGain(); musicGain.gain.value = musicOn ? 0.33 : 0; musicGain.connect(masterGain);
        sfxGain = AC.createGain(); sfxGain.gain.value = sfxOn ? 0.55 : 0; sfxGain.connect(masterGain);
        // Lead bus with a short dry slapback — big saleroom, hard walls
        leadBus = AC.createGain(); leadBus.gain.value = 1; leadBus.connect(musicGain);
        musicDelay = AC.createDelay(1.2); musicDelay.delayTime.value = 0.24;
        const fb = AC.createGain(); fb.gain.value = 0.16;
        const dlp = AC.createBiquadFilter(); dlp.type = 'lowpass'; dlp.frequency.value = 2000;
        const wet = AC.createGain(); wet.gain.value = 0.14;
        leadBus.connect(musicDelay); musicDelay.connect(dlp); dlp.connect(fb); fb.connect(musicDelay);
        dlp.connect(wet); wet.connect(musicGain);
        const len = AC.sampleRate * 1.2;
        noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    if (AC.state === 'suspended') AC.resume();
    return AC;
}

function tone(freq, dur, { type = 'sine', vol = 0.5, when = 0, slide = 0, dest = null, lp = 0, attack = 0.012 } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide, 20), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    if (lp) {
        const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
        o.connect(f); f.connect(g);
    } else {
        o.connect(g);
    }
    g.connect(dest || sfxGain);
    o.start(t); o.stop(t + dur + 0.06);
}

function noiseHit(dur, { vol = 0.3, when = 0, hp = 6000, dest = null } = {}) {
    if (!AC) return;
    const t = AC.currentTime + when;
    const src = AC.createBufferSource(); src.buffer = noiseBuf;
    const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(dest || sfxGain);
    src.start(t); src.stop(t + dur + 0.05);
}

const mf = m => 440 * Math.pow(2, (m - 69) / 12); // midi → freq

function sProfit(p) {

    steps.forEach((s, i) => tone(mf(76 + s), 0.09, { type: 'square', vol: 0.19, lp: 5200, when: i * 0.055 }));

function sLoss(l) {

function sWin() {

    [83, 81, 83, 81, 83, 88].forEach((m, i) => tone(mf(m), 0.08, { type: 'triangle', vol: 0.2, when: 1.6 + i * 0.06 }));

}
// Duck the music briefly so big stingers read clearly (sidechain feel)
function duckMusic(dur = 0.5) {
    if (!AC || !musicGain || !musicOn) return;
    const t = AC.currentTime;
    musicGain.gain.cancelScheduledValues(t);
    musicGain.gain.setValueAtTime(0.1, t);
    musicGain.gain.linearRampToValueAtTime(0.33, t + dur);
}

let musicTrack = 'lobby', musicStep = 0, musicBar = 0, musicNext = 0, musicTimer = null, musicUrgent = false;
// Adaptive arrangement: intensity gates the upper voices in/out;
// keyShift lifts every melodic lane for the final lot's drama
let musicIntensity = 2, musicKeyShift = 0;

function playMusicStep(i, t, bar) {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    const w = tr.waves || {};
    const k = musicKeyShift;
    const full = musicIntensity >= 2 || musicUrgent;
    // Swing: push every off-16th slightly late for a looser strut
    const rel = t - AC.currentTime + (i % 2 ? stepDur * (tr.swing || 0) : 0);
    if (tr.kick[i]) tone(145, 0.22, { type: 'sine', vol: 0.48, when: rel, slide: 44, dest: musicGain });
    if (tr.hat[i]) {
        const hv = (i % 4 === 2 ? 0.13 : 0.06) * (0.8 + Math.random() * 0.4);
        noiseHit(0.045, { vol: hv, when: rel, hp: 9500, dest: musicGain });
    }
    // Gavel-tap percussion (results track): woody double knock
    if (tr.knock && tr.knock[i]) {
        tone(185, 0.07, { type: 'square', vol: 0.16, lp: 750, when: rel, slide: 95, dest: musicGain });
        noiseHit(0.05, { vol: 0.09, when: rel, hp: 2200, dest: musicGain });
    }
    const bassArr = tr.bassBars ? tr.bassBars[bar % tr.bassBars.length] : tr.bass;
    const b = bassArr[i];
    if (b != null) tone(mf(b + k), stepDur * 1.5, { type: w.bass || 'sawtooth', vol: 0.24, when: rel, dest: musicGain, lp: 950, attack: 0.005 });
    const pad = tr.pads[bar % tr.pads.length];
    const ch = i < 16 ? pad[0] : pad[16];
    // Brass stabs — lowpassed sawtooth comping, the auction house signature
    if (tr.stab && tr.stab[i] && ch && full)
        ch.forEach(m => tone(mf(m + 12 + k), stepDur * 0.9, { type: w.stab || 'sawtooth', vol: 0.032, when: rel, lp: 1900, dest: musicGain, attack: 0.005 }));
    let l = tr.leads[bar % tr.leads.length][i];
    if (l != null && (musicIntensity >= 1 || musicUrgent)) {
        if (musicUrgent) l += 12;
        tone(mf(l + k), stepDur * 1.4, { type: w.lead || 'sawtooth', vol: 0.11 * (0.9 + Math.random() * 0.2), when: rel, dest: leadBus, lp: tr.leadLp || 3000, attack: 0.005 });
    }
    // Ticking arpeggio an octave up — the room counting along
    if (tr.arp && i % tr.arp === 0 && ch && full)
        tone(mf(ch[(i / tr.arp) % ch.length] + 12 + k), stepDur * tr.arp * 0.9, { type: w.arpW || 'triangle', vol: 0.04, when: rel, lp: 5200, dest: musicGain, attack: 0.003 });
    if (musicUrgent && i % 4 === 0) noiseHit(0.035, { vol: 0.11, when: rel + stepDur * 2, hp: 11000, dest: musicGain });
}

function musicScheduler() {
    const tr = TRACKS[musicTrack];
    const stepDur = 60 / tr.bpm / 4;
    while (musicNext < AC.currentTime + 0.18) {
        playMusicStep(musicStep, musicNext, musicBar);
        musicNext += stepDur;
        musicStep++;
        if (musicStep === 32) { musicStep = 0; musicBar++; }
    }
}

function startMusicLoop() {
    if (musicTimer || !AC) return;
    musicNext = AC.currentTime + 0.1;
    musicStep = 0;
    musicBar = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[musicTrack].bpm * 0.5;
    musicTimer = setInterval(musicScheduler, 30);
}

function setMusic(track) {
    if (musicTrack === track) return;
    const wasPlaying = !!(AC && musicTimer);
    musicTrack = track;
    musicStep = 0;
    musicBar = 0;
    // Bidding opens stripped back — the gavel countdown brings the full band in
    musicIntensity = track === 'bidding' ? 1 : 2;
    if (track === 'lobby' || track === 'over') musicKeyShift = 0;
    if (musicDelay) musicDelay.delayTime.value = 60 / TRACKS[track].bpm * 0.5;
    if (track !== 'bidding') musicUrgent = false;
    // one-beat snare fill so phase changes land on a downbeat instead of a hard cut
    if (wasPlaying) {
        const s = 60 / TRACKS[track].bpm / 4;
        for (let f = 0; f < 4; f++) noiseHit(0.06, { vol: 0.1 + f * 0.035, when: f * s, hp: 2800 + f * 900, dest: musicGain });
        musicNext = AC.currentTime + 4 * s;
    }
}

function toggleMusic() {
    musicOn = !musicOn;
    localStorage.setItem('gavel-music', musicOn ? '1' : '0');
    if (!AC && musicOn) { ac(); startMusicLoop(); }
    if (AC && musicGain) musicGain.gain.linearRampToValueAtTime(musicOn ? 0.33 : 0, AC.currentTime + 0.2);

// ── Particle bursts + floating text ──
function burst(x, y, colors, n = 14) {
    if (REDUCED) return;
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const ang = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 90;
        p.style.cssText = `left:${x}px;top:${y}px;background:${colors[i % colors.length]};` +
            `--dx:${Math.cos(ang) * dist}px;--dy:${Math.sin(ang) * dist - 30}px;`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}
function popText(x, y, text, cls = 'good') {
    const el = document.createElement('div');
    el.className = 'pop ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1150);
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let peer = null, myId = '', myName = '', isHost = false, isTvHost = false, isViewer = false, roomCode = '';
let hostConn = null, guestConns = {}, viewerConns = {};
let ui = 'home';   // home|creating|connecting|lobby_h|lobby_g|lot|bidding|sold|valuation|podium|viewer
let uiErr = '';
let fName = localStorage.getItem('gavel-name') || '';
let fCode = '', fVCode = '';

let _localGavelEnd = 0, _gavelTickClient = null;

// Host authoritative state
let H = {
    phase: 'lobby',              // lobby|lot_intro|bidding|sold|valuation|podium
    players: [],                 // [{id,name,color,coins,lots:[{lotIdx,paid}]}]
    settings: { lotCount: 8 },

    soldInfo: null,              // {lotIdx, winner, color, price} | {passed:true, lotIdx}
    reveals: [], revealIndex: -1,
    standings: null, awards: null, winner: null,
};

function clearHostTimers() { clearTimeout(_lotTimer); clearInterval(_gavelTick); clearTimeout(_revealTimer); }

// ═══════════════════════════════════════════
// NETWORK
// ═══════════════════════════════════════════
function send(conn, msg) { try { conn.send(msg); } catch (e) { console.warn('send err', e); } }
function broadcastViewers(msg) { Object.values(viewerConns).forEach(c => send(c, msg)); }
function connectedPlayers() {
    return H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
}

function hostAddPlayer(id, name) {
    if (H.players.find(p => p.id === id) || H.players.length >= MAX_PLAYERS) return;
    H.players.push({
        id, name, color: PLAYER_COLORS[H.players.length % PLAYER_COLORS.length],
        coins: START_COINS, lots: [],
    });
}

function lobbyMsg() {
    return {
        type: 'lobby', roomCode,
        players: H.players.map(p => ({ name: p.name, color: p.color })),
        settings: { ...H.settings },
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function broadcastLobby() {
    H.players.forEach(p => { if (p.id !== myId && guestConns[p.id]) send(guestConns[p.id], lobbyMsg()); });
    broadcastViewers({ ...lobbyMsg(), type: 'viewer_lobby' });
    hostSyncSelf(lobbyMsg());
}

function curLot() { return H.lotIndex >= 0 ? LOTS[H.lotOrder[H.lotIndex]] : null; }
function lotView(lot) {
    if (!lot) return null;
    return { emoji: lot.emoji, name: lot.name, desc: lot.desc, mystery: !!lot.mystery };
}

function stateFor(p) {
    const lot = curLot();
    const leader = H.bid && H.bid.leaderId ? H.players.find(q => q.id === H.bid.leaderId) : null;
    return {
        type: 'state',
        phase: H.phase, roomCode,
        lotNum: H.lotIndex + 1, lotTotal: H.lotOrder.length,
        lot: lotView(lot),
        bid: H.bid ? {
            price: H.bid.price,
            leader: leader ? leader.name : null,
            leaderColor: leader ? leader.color : null,
            youLead: !!(p && leader && leader.id === p.id),
            endsIn: Math.max(0, H.bid.endsAt - Date.now()),
        } : null,
        myCoins: p ? p.coins : 0,
        myLots: p ? p.lots.map(l => ({ name: LOTS[l.lotIdx].name, emoji: LOTS[l.lotIdx].emoji, paid: l.paid, lotIdx: l.lotIdx })) : [],
        soldInfo: H.soldInfo ? { ...H.soldInfo, lot: lotView(LOTS[H.soldInfo.lotIdx]) } : null,
        reveals: H.phase === 'valuation' || H.phase === 'podium' ? H.reveals : null,
        revealIndex: H.revealIndex,
        standings: H.standings, awards: H.awards, winner: H.winner,
        players: H.players.map(q => ({ name: q.name, color: q.color, coins: q.coins, lotCount: q.lots.length })),
        tvHost: isTvHost, captain: isTvHost ? (H.players[0]?.name || null) : null,
    };
}
function viewerStateMsg() { return { ...stateFor(null), type: 'viewer_state' }; }
function broadcastState() {
    H.players.forEach(p => {
        if (p.id === myId) return;
        const conn = guestConns[p.id];
        if (conn) send(conn, stateFor(p));
    });
    broadcastViewers(viewerStateMsg());
    hostSyncSelf(isTvHost ? null : stateFor(H.players.find(p => p.id === myId)));
}

// ── Host: incoming connections ──
function setupGuestConn(conn) {
    conn.on('open', () => { conn._role = null; });

    conn.on('data', msg => {
        if (conn._role === null && msg.type === 'join_viewer') {
            conn._role = 'viewer';
            viewerConns[conn.peer] = conn;
            send(conn, H.phase === 'lobby' ? { ...lobbyMsg(), type: 'viewer_lobby' } : viewerStateMsg());
            return;
        }
        if (conn._role === null) {
            conn._role = 'player';
            guestConns[conn.peer] = conn;
        }
        const player = H.players.find(p => p.id === conn.peer);
        switch (msg.type) {
            case 'join': {
                const name = String(msg.name || 'Bidder').slice(0, 16);
                const zombie = H.players.find(p => p.name === name && p.id !== conn.peer && !guestConns[p.id]);
                if (zombie) zombie.id = conn.peer;
                else hostAddPlayer(conn.peer, name);
                const p2 = H.players.find(p => p.id === conn.peer);
                if (!p2) { send(conn, lobbyMsg()); break; }
                if (H.phase === 'lobby') broadcastLobby();
                else { send(conn, stateFor(p2)); broadcastViewers(viewerStateMsg()); if (isTvHost) tvHostSync(); }
                break;
            }
            case 'bid': if (player) hostBid(player, msg.raise); break;
            case 'ctl': {
                if (!isTvHost || !player || player.id !== H.players[0]?.id) break;
                hostCtl(msg.action, msg);
                break;
            }
        }
    });

    conn.on('close', () => {
        delete guestConns[conn.peer];
        delete viewerConns[conn.peer];
        if (H.phase === 'lobby') {
            const pi = H.players.findIndex(p => p.id === conn.peer);
            if (pi >= 0) { H.players.splice(pi, 1); broadcastLobby(); }
        }
    });
    conn.on('error', e => console.warn('conn err', e));
}

function hostCtl(action, msg) {
    if (action === 'start' && H.phase === 'lobby') hostStartAuction();
    else if (action === 'again' && H.phase === 'podium') hostNewGame();
    else if (action === 'set' && H.phase === 'lobby') {
        if ([6, 8, 10].includes(msg.lotCount)) H.settings.lotCount = msg.lotCount;
        broadcastLobby();
    }
}
function guestCtl(action, extra) {
    if (isHost && !isTvHost) { hostCtl(action, extra || {}); return; }
    if (hostConn) send(hostConn, { type: 'ctl', action, ...(extra || {}) });
}

// ── Create a room ──
function makeRoom(onOpen) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    roomCode = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    peer = new Peer(PFX + roomCode, ICE_CFG);
    peer.on('open', id => { myId = id; isHost = true; onOpen(); });
    peer.on('connection', conn => setupGuestConn(conn));
    peer.on('error', e => {
        uiErr = 'Connection error: ' + e.message;
        isHost = false; isTvHost = false;
        document.body.classList.remove('viewer-mode');
        ui = 'home'; render();
    });
}

function hostGame(name) {
    myName = name.trim().slice(0, 16) || 'Host';
    localStorage.setItem('gavel-name', myName);
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        hostAddPlayer(myId, myName);
        ui = 'lobby_h';
        render();
    });
}

function hostOnTV() {
    uiErr = ''; ui = 'creating'; render();
    makeRoom(() => {
        isTvHost = true;
        document.body.classList.add('viewer-mode');
        tvHostSync();
        render();
    });
}

function joinGame(code, name) {
    myName = name.trim().slice(0, 16) || 'Bidder';
    localStorage.setItem('gavel-name', myName);
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        isHost = false;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join', name: myName }));
        hostConn.on('data', msg => applyMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the auction.'; ui = 'home'; D = null; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        ui = 'home'; render();
    });
}

function joinAsViewer(code, _attempt) {
    const attempt = _attempt || 1;
    isViewer = true;
    uiErr = ''; ui = 'connecting'; render();

    peer = new Peer(undefined, ICE_CFG);
    peer.on('open', id => {
        myId = id;
        hostConn = peer.connect(PFX + code.trim().toUpperCase(), { reliable: true });
        hostConn.on('open', () => send(hostConn, { type: 'join_viewer' }));
        hostConn.on('data', msg => applyViewerMsg(msg));
        hostConn.on('close', () => { uiErr = 'Disconnected from the auction.'; isViewer = false; vD = null; document.body.classList.remove('viewer-mode'); ui = 'home'; render(); });
        hostConn.on('error', e => { uiErr = 'Could not connect: ' + e.message; isViewer = false; ui = 'home'; render(); });
    });
    peer.on('error', () => {
        if (attempt < 2) {
            try { peer.destroy(); } catch (_) {}
            peer = null;
            setTimeout(() => joinAsViewer(code, 2), 600);
            return;
        }
        uiErr = 'Could not reach room "' + code.toUpperCase() + '". Check the code and try again.';
        isViewer = false; ui = 'home'; render();
    });
}

function tvHostSync() {
    if (!isTvHost) return;
    applyViewerMsg(H.phase === 'lobby' ? { ...lobbyMsg(), type: 'viewer_lobby' } : viewerStateMsg());
}
function hostSyncSelf(msg) {
    if (isTvHost) { tvHostSync(); return; }
    if (isHost && msg) applyMsg(msg);
}

// ═══════════════════════════════════════════
// HOST AUCTION FLOW
// ═══════════════════════════════════════════
function buildLotOrder(count) {
    const idx = LOTS.map((_, i) => i);
    const treasures = shuffle(idx.filter(i => !LOTS[i].mystery && LOTS[i].value >= 300));
    const duds = shuffle(idx.filter(i => !LOTS[i].mystery && LOTS[i].value < 300));
    const mysteries = shuffle(idx.filter(i => LOTS[i].mystery));
    const nT = Math.round(count * 0.4), nD = Math.round(count * 0.35);
    const nM = Math.max(1, count - nT - nD);
    return shuffle([...treasures.slice(0, nT), ...duds.slice(0, nD), ...mysteries.slice(0, nM)]).slice(0, count);
}

function hostStartAuction() {
    if (connectedPlayers().length < MIN_PLAYERS) { uiErr = 'Need at least ' + MIN_PLAYERS + ' bidders.'; if (ui === 'lobby_h') render(); return; }
    clearHostTimers();
    H.lotOrder = buildLotOrder(H.settings.lotCount);
    H.lotIndex = -1;
    H.players.forEach(p => { p.coins = START_COINS; p.lots = []; });
    H.reveals = []; H.revealIndex = -1;
    H.standings = null; H.awards = null; H.winner = null;
    startLot();
}

function startLot() {
    clearHostTimers();
    H.lotIndex += 1;
    H.bid = null; H.soldInfo = null;
    if (H.lotIndex >= H.lotOrder.length) { startValuation(); return; }
    H.phase = 'lot_intro';
    broadcastState();
    _lotTimer = setTimeout(startBidding, INTRO_MS);
}

function startBidding() {
    if (H.phase !== 'lot_intro') return;
    H.phase = 'bidding';
    H.bid = { price: 0, leaderId: null, endsAt: Date.now() + GAVEL_MS };
    broadcastState();
    clearInterval(_gavelTick);
    _gavelTick = setInterval(checkGavel, 120);
}

function hostBid(player, raise) {
    if (H.phase !== 'bidding' || !H.bid || !RAISES.includes(raise)) return;
    if (H.bid.leaderId === player.id) return;               // can't outbid yourself
    const newPrice = H.bid.price + raise;
    if (player.coins < newPrice) return;                     // must be able to pay
    H.bid.price = newPrice;
    H.bid.leaderId = player.id;
    H.bid.endsAt = Date.now() + GAVEL_MS;                    // gavel resets
    broadcastState();
}

function checkGavel() {
    if (H.phase !== 'bidding' || !H.bid) { clearInterval(_gavelTick); return; }
    if (Date.now() < H.bid.endsAt) return;
    clearInterval(_gavelTick);
    const lotIdx = H.lotOrder[H.lotIndex];
    const leader = H.bid.leaderId ? H.players.find(p => p.id === H.bid.leaderId) : null;
    if (leader) {
        leader.coins -= H.bid.price;
        leader.lots.push({ lotIdx, paid: H.bid.price });
        H.soldInfo = { lotIdx, winner: leader.name, color: leader.color, price: H.bid.price };
    } else {
        H.soldInfo = { lotIdx, passed: true };
    }
    H.phase = 'sold';
    H.bid = null;
    broadcastState();
    _lotTimer = setTimeout(startLot, H.soldInfo.passed ? PASSED_MS : SOLD_MS);
}

function startValuation() {
    clearHostTimers();
    H.reveals = [];
    H.lotOrder.forEach(lotIdx => {
        const owner = H.players.find(p => p.lots.some(l => l.lotIdx === lotIdx));
        if (!owner) return;
        const entry = owner.lots.find(l => l.lotIdx === lotIdx);
        const lot = LOTS[lotIdx];
        H.reveals.push({
            player: owner.name, color: owner.color,
            lotName: lot.name, emoji: lot.emoji, mystery: !!lot.mystery,
            paid: entry.paid, value: lot.value, profit: lot.value - entry.paid,
        });
    });
    H.revealIndex = -1;
    if (!H.reveals.length) { finishValuation(); return; }
    H.phase = 'valuation';
    broadcastState();
    _revealTimer = setTimeout(revealStep, 1400);
}

function revealStep() {
    H.revealIndex += 1;
    if (H.revealIndex >= H.reveals.length) {
        _revealTimer = setTimeout(finishValuation, 1600);
        broadcastState();
        return;
    }
    broadcastState();
    _revealTimer = setTimeout(revealStep, REVEAL_MS);
}

function finishValuation() {
    clearHostTimers();
    const rows = H.players.map(p => {
        const shelf = p.lots.reduce((s, l) => s + LOTS[l.lotIdx].value, 0);
        return { name: p.name, color: p.color, coins: p.coins, shelf, net: p.coins + shelf, lots: p.lots.length };
    }).sort((a, b) => b.net - a.net || b.coins - a.coins);
    H.standings = rows;
    H.winner = rows[0] ? rows[0].name : null;
    const awards = [];
    let eagle = null, mug = null;
    H.reveals.forEach(r => {
        if (r.profit > 0 && (!eagle || r.profit > eagle.profit)) eagle = r;
        if (r.profit < 0 && (!mug || r.profit < mug.profit)) mug = r;
    });
    if (eagle) awards.push({ emoji: '🦅', title: 'Eagle Eye', name: eagle.player, detail: `+${eagle.profit} on ${eagle.lotName}` });
    if (mug) awards.push({ emoji: '🫠', title: 'Mug of the Match', name: mug.player, detail: `${mug.profit} on ${mug.lotName}` });
    const scrooge = H.players.slice().sort((a, b) => b.coins - a.coins)[0];
    if (scrooge) awards.push({ emoji: '🪙', title: 'Scrooge', name: scrooge.name, detail: `${scrooge.coins} coins unspent` });
    H.awards = awards;
    H.phase = 'podium';
    broadcastState();
}

function hostNewGame() {
    clearHostTimers();
    H.phase = 'lobby';
    H.lotOrder = []; H.lotIndex = -1; H.bid = null; H.soldInfo = null;
    H.reveals = []; H.revealIndex = -1; H.standings = null; H.awards = null; H.winner = null;
    H.players.forEach(p => { p.coins = START_COINS; p.lots = []; });
    H.players = H.players.filter(p => p.id === myId ? (isHost && !isTvHost) : !!guestConns[p.id]);
    broadcastLobby();
    if (isHost && !isTvHost) { ui = 'lobby_h'; render(); }
}

function stopClientTick() { clearInterval(_gavelTickClient); _gavelTickClient = null; _goingStage = 0; musicUrgent = false; }

function applyMsg(msg) {
    switch (msg.type) {
        case 'lobby': {
            const prevN = D && D.type === 'lobby' ? (D.players || []).length : -1;
            D = msg;
            stopClientTick();
            setMusic('lobby');
            if (prevN >= 0 && (msg.players || []).length > prevN) sJoin();
            ui = (isHost && !isTvHost) ? 'lobby_h' : 'lobby_g';
            render();
            break;
        }
        case 'state': {
            const prev = D;
            D = msg;
            const lotKey = msg.phase + '|' + msg.lotNum;
            if (msg.phase === 'lot_intro') {
                stopClientTick();
                setMusic('bidding');
                musicIntensity = 1;   // new lot: strip back until the gavel countdown
                musicKeyShift = msg.lotNum === msg.lotTotal ? 2 : 0;   // final lot: key up
                if (_lastLotKey !== lotKey) { _lastLotKey = lotKey; _lastPrice = -1; ui = 'lot'; render(); sLotIntro(); }
                break;
            }
            if (msg.phase === 'bidding') {

                    _lastLotKey = lotKey;

                    const priceUp = !!(msg.bid && msg.bid.price !== _lastPrice);
                    const diff = priceUp ? msg.bid.price - Math.max(0, _lastPrice) : 0;
                    const wasLeading = !!(prev && prev.phase === 'bidding' && prev.bid && prev.bid.youLead);
                    const couldBefore = !(prev && prev.phase === 'bidding' && prev.bid) || prev.myCoins >= prev.bid.price + RAISES[0];
                    if (priceUp) _lastPrice = msg.bid.price;
                    patchBidding(msg);

                    if (priceUp) {
                        if (wasLeading && !msg.bid.youLead) {

                        }
                        const pe = $id('p-price');
                        if (pe) {
                            pe.classList.remove('bump'); void pe.offsetWidth; pe.classList.add('bump');
                            if (diff > 0) { const r = pe.getBoundingClientRect(); popText(r.left + r.width / 2, r.top + 6, '+' + diff, 'gold'); }
                        }
                        // priced out of this lot just now? womp.
                        if (!msg.bid.youLead && couldBefore && msg.myCoins < msg.bid.price + RAISES[0]) sBroke();
                    }
                }
                break;
            }
            if (msg.phase === 'sold') {
                stopClientTick();
                if (_lastLotKey !== lotKey) {
                    _lastLotKey = lotKey; ui = 'sold'; render();
                    const si = msg.soldInfo || {};
                    if (si.passed) sPassed();

function startClientGavel(msg) {
    _localGavelEnd = Date.now() + (msg.bid ? msg.bid.endsIn : 0);
    if (_gavelTickClient) return;
    _gavelTickClient = setInterval(() => {
        const left = Math.max(0, _localGavelEnd - Date.now());
        const frac = left / GAVEL_MS;
        const stage = left === 0 ? 0 : frac < 0.25 ? 2 : frac < 0.5 ? 1 : 0;
        const bar = $id('gavel-bar');
        if (bar) { bar.style.width = (frac * 100) + '%'; bar.classList.toggle('low', stage > 0); }
        const gl = $id('going-lbl');
        if (gl) {
            gl.textContent = left === 0 ? '' : stage === 2 ? 'going… GOING…' : stage === 1 ? 'going…' : '';
            gl.classList.toggle('low', stage > 0);
        }
        musicUrgent = left > 0 && stage > 0;
        if (musicUrgent) musicIntensity = 2;   // "going…" reached: full band stays in
        if (stage > _goingStage && left > 0) sGoing(stage);
        _goingStage = stage;   // a new bid refills the bar → stage drops → stings re-arm
    }, 100);
}

function sendBid(raise) {
    if (!D || D.phase !== 'bidding' || !D.bid || D.bid.youLead) return;
    if (D.myCoins < D.bid.price + raise) return;
    if (isHost && !isTvHost) {
        const me = H.players.find(p => p.id === myId);
        if (me) hostBid(me, raise);
    } else send(hostConn, { type: 'bid', raise });
}

                onclick="navigator.clipboard&&navigator.clipboard.writeText(joinURL()).then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='📋 Copy link',1500)})">📋 Copy link</button>
            <button class="btn btn-g btn-sm"
                onclick="navigator.share&&navigator.share({title:'Join the auction!',text:'Room code: ${esc(roomCode)}',url:joinURL()})">📤 Share</button>
        </div>
        <div style="font-size:.66rem;color:var(--muted);text-align:center">Put the auction floor on a TV with code <b style="color:var(--gold)">${esc(roomCode)}</b></div>
    </div>
    <div class="card">
        <div class="slbl">Bidders (${H.players.length}/${MAX_PLAYERS})</div>
        ${pList}
    </div>
    <div class="card">
        <div class="slbl">Settings</div>
        ${settingsSegsHTML(H.settings, patch => `hostSet(${patch})`)}
    </div>
    <button class="btn btn-p btn-full" style="font-size:1.08rem;padding:16px" onclick="hostStartAuction()">🔨 Start the auction</button>`;
}

function renderLobbyG() {
    const cap = isCaptain();
    const pList = (D.players || []).map((p, i) =>
        `<div class="player-row" style="--i:${i}">
            <span class="pdot" style="background:${p.color};color:${p.color}"></span>
            <div style="flex:1">${esc(p.name)}${p.name === myName ? ' <span style="color:var(--muted)">(you)</span>' : ''}${D.tvHost && p.name === D.captain ? ' 👑' : ''}</div>
            <div class="dot"></div>
        </div>`).join('');
    const s = D.settings || {};
    return `
    ${hdrHTML(cap ? '👑 You are the Captain' : 'Lobby')}
    ${uiErr ? `<div class="err">${esc(uiErr)}</div>` : ''}
    <div class="card">
        <div class="slbl">Room ${esc(D.roomCode || '')} — Bidders (${(D.players || []).length}/${MAX_PLAYERS})</div>
        ${pList}
    </div>
    ${cap ? `
    <div class="card highlight">
        <div class="slbl">👑 Captain's Settings</div>
        ${settingsSegsHTML(s, patch => `guestCtl('set',${patch})`)}
    </div>
    <button class="btn btn-p btn-full" style="font-size:1.08rem;padding:16px" onclick="guestCtl('start')">🔨 Start the auction</button>`
    : `
    <div class="card">
        <div class="slbl">Settings</div>
        <div style="font-weight:800;font-size:.85rem">🔨 ${s.lotCount} lots · 🪙 1,000 coins each</div>
        <div style="color:var(--muted);font-size:.72rem;font-weight:700;margin-top:8px">
            Waiting for ${D.tvHost ? `👑 ${esc(D.captain || 'the captain')}` : 'the host'} to start…
        </div>
    </div>`}`;
}

function renderLotIntro() {
    return `
    ${lotHeaderHTML(D)}
    <div class="card" style="text-align:center">
        <div style="font-weight:900;color:var(--gold)">Bidding opens in a moment…</div>
        <div style="margin-top:8px"><span class="coins-chip">🪙 <span id="my-coins">${D.myCoins}</span> coins</span></div>
    </div>
    <div class="card"><div class="slbl">Your shelf</div>${shelfHTML(D)}</div>`;
}

function renderBidding() {
    return `
    ${lotHeaderHTML(D, true)}
    <div class="card" style="text-align:center">
        <div class="lot-kicker">Current price</div>
        <div class="price-big" id="p-price">${D.bid.price}</div>
        <div class="gavel-wrap" style="margin:10px 0 4px"><div class="gavel-bar" id="gavel-bar" style="width:100%"></div></div>
        <div id="going-lbl" style="min-height:1.2em;font-weight:900;color:var(--down)"></div>
    </div>
    <div id="lead-banner">${leadBannerHTML(D)}</div>
    <div class="bid-btns" id="bid-btns">${bidBtnsHTML(D)}</div>
    <div style="text-align:center"><span class="coins-chip">🪙 <span id="my-coins">${D.myCoins}</span> coins left</span></div>
    <div class="card"><div class="slbl">Your shelf</div>${shelfHTML(D)}</div>`;
}

function renderSold() {
    const s = D.soldInfo || {};
    const mine = s.winner === myName;
    const inner = s.passed
        ? `<div class="gavel">🪶</div><div class="st">PASSED</div>
           <div style="color:var(--muted);font-weight:700;margin-top:6px">Not a single bid for ${esc(s.lot ? s.lot.name : '')}. Brutal.</div>`
        : `<div class="gavel">🔨</div><div class="st">${mine ? 'YOU WON IT!' : 'SOLD!'}</div>
           <div style="font-weight:800;color:var(--gold);margin-top:6px">${esc(s.lot ? s.lot.emoji + ' ' + s.lot.name : '')}</div>
           <div style="font-weight:900;font-size:1.3rem;margin-top:4px">${mine ? `You paid ${s.price}` : `${esc(s.winner)} pays ${s.price}`}</div>`;
    return `
    <div class="card sold-card${mine ? ' highlight' : ''}">${inner}</div>
    <div style="text-align:center"><span class="coins-chip">🪙 ${D.myCoins} coins left</span></div>
    <div class="card"><div class="slbl">Your shelf</div>${shelfHTML(D)}</div>`;
}

function renderValuation() {
    return `
    ${hdrHTML('The Valuation')}
    <div class="card" style="text-align:center">
        <div style="font-size:2.6rem">🧐</div>
        <div style="font-weight:900;font-size:1.15rem;margin-top:6px">The valuer is in — eyes on the TV!</div>
        <div style="color:var(--muted);font-weight:700;font-size:.78rem;margin-top:6px">True values revealed one lot at a time…</div>
    </div>
    <div class="card"><div class="slbl">Your shelf</div>${shelfHTML(D)}</div>
    <div style="text-align:center"><span class="coins-chip">🪙 ${D.myCoins} coins left</span></div>`;
}

function renderPodium() {
    const st = D.standings || [];
    const winner = st[0];
    const awards = (D.awards || []).map(a =>
        `<span class="chip">${a.emoji} ${esc(a.title)}: ${esc(a.name)} (${esc(a.detail)})</span>`).join('');
    const driveBtn = canDrive()
        ? `<button class="btn btn-p btn-full" style="font-size:1.02rem;padding:15px" onclick="guestCtl('again')">🔁 Play again</button>` : '';
    const medals = ['🥇', '🥈', '🥉'];
    return `
    ${hdrHTML('Auction closed!')}
    <div class="card sold-card highlight">
        <div class="gavel">🏆</div>
        <div class="st">${esc((winner?.name || '').toUpperCase())} WINS!</div>
        <div style="color:var(--muted);font-weight:700;font-size:.78rem;margin-top:4px">net worth ${winner ? winner.net : 0} — coins + shelf value</div>
        <div style="margin-top:10px">${awards}</div>
    </div>
    <div class="card standings"><div class="slbl">Net worth</div>${st.map((p, i) => `
        <div class="player-row" style="--i:${i}">
            <span style="width:22px;text-align:center">${medals[i] || (i + 1)}</span>
            <span class="pdot" style="background:${p.color};color:${p.color}"></span>
            <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}${p.name === myName ? ' <span style="color:var(--gold)">(you)</span>' : ''}</div>
            <div class="sc">${p.net} <span style="color:var(--muted);font-size:.7rem">(🪙${p.coins} + 🖼️${p.shelf})</span></div>
        </div>`).join('')}
    </div>
    ${driveBtn}`;
}

// ═══════════════════════════════════════════
// RENDER — TV screens
// ═══════════════════════════════════════════
function tvShell(inner, meta) {
    return `<div class="tv">
        <div class="tv-top">
            <div class="tv-logo">🔨 GOING, GOING, GONE!</div>
            <div class="tv-meta">${esc(meta || ('Room ' + (vD.roomCode || roomCode || '')))}</div>
        </div>
        ${inner}
    </div>`;
}

function renderViewer() {
    if (!vD) return renderSpinner('Waiting for the auction…');
    if (vD.type === 'viewer_lobby') return renderViewerLobby();
    if (vD.phase === 'lot_intro') return renderViewerLotIntro();
    if (vD.phase === 'bidding') return renderViewerBidding();
    if (vD.phase === 'sold') return renderViewerSold();
    if (vD.phase === 'valuation') return renderViewerValuation();
    if (vD.phase === 'podium') return renderViewerPodium();
    return renderSpinner('Waiting for the auction…');
}

function renderViewerLobby() {
    const url = location.origin + location.pathname + '?room=' + (vD.roomCode || '');
    const players = vD.players || [];
    const cards = players.map((p, i) =>
        `<div class="tv-pcard" style="--i:${i}"><div class="pdot" style="background:${p.color};color:${p.color}"></div>${esc(p.name)}${vD.tvHost && p.name === vD.captain ? ' 👑' : ''}</div>`).join('');
    const s = vD.settings || {};
    return tvShell(`
    <div class="tv-lobby">
        <div class="qr-side">
            <div class="slbl">Scan with your phone to join</div>
            <div class="qr-wrap">${qrSVG(url)}</div>
            <div class="room-code">${esc(vD.roomCode || '')}</div>
            <div class="join-hint">${location.host}${location.pathname}</div>
        </div>
        <div class="tv-players">
            <div class="tv-meta">Bidders — ${players.length}/${MAX_PLAYERS}</div>
            <div class="tv-player-grid">${cards}</div>
            <div class="tv-waiting">${players.length === 0
                ? 'Waiting for the first phone… they become 👑 Captain'
                : (players.length < MIN_PLAYERS ? 'Need at least ' + MIN_PLAYERS + ' bidders…' :
                    (vD.tvHost ? `Waiting for 👑 ${esc(vD.captain || '')}` : 'Waiting for the host') + ` to start · 🔨 ${s.lotCount} lots · 🪙 1,000 coins each`)}</div>
        </div>
    </div>`, 'Lobby');
}

function tvLotCardHTML(msg, compact) {
    const l = msg.lot;
    return `
    <div class="tv-lot" ${compact ? 'style="flex:0 0 auto;padding:2vmin 3vmin"' : ''}>
        <div class="lkick">Lot ${msg.lotNum} of ${msg.lotTotal}${l.mystery ? ' · ❓ mystery box' : ''}</div>
        <div class="lemoji" ${compact ? 'style="font-size:5.5vmin"' : ''}>${l.emoji}</div>
        <div class="lname" ${compact ? 'style="font-size:3vmin"' : ''}>${esc(l.name)}</div>
        <div class="ldesc">“${esc(l.desc)}”</div>
        ${compact ? '' : '<div class="tv-waiting" style="margin-top:1.4vmin">bidding opens in a moment…</div>'}
    </div>`;
}

function renderViewerLotIntro() {
    return tvShell(`
    <div class="tv-main">
        <div class="tv-stage">${tvLotCardHTML(vD)}</div>
        <div class="tv-rail"><div class="rail-title">Bidders</div><div id="v-rail" style="display:flex;flex-direction:column;gap:1.2vmin">${railRowsHTML(vD)}</div></div>
    </div>`, `Lot ${vD.lotNum} of ${vD.lotTotal}`);
}

function renderViewerBidding() {
    return tvShell(`
    <div class="tv-main">
        <div class="tv-stage">
            ${tvLotCardHTML(vD, true)}
            <div class="tv-lot" style="flex:1;gap:1.6vmin">
                <div class="lkick">Current price</div>
                <div class="tv-price" id="v-price">${vD.bid.price === 0 ? 'Any bids?' : vD.bid.price}</div>
                <div class="tv-leader" id="v-leader">${vD.bid.leader
                    ? `<span style="color:${vD.bid.leaderColor}">${esc(vD.bid.leader)}</span> holds the bid`
                    : 'Opening bid, anyone?'}</div>
                <div class="tv-gavel-row" style="width:80%">
                    <div class="tv-gavel-wrap"><div class="tv-gavel-bar" id="v-gavel-bar" style="width:100%"></div></div>
                    <div class="going" id="v-going"></div>
                </div>
            </div>
        </div>
        <div class="tv-rail"><div class="rail-title">Bidders</div><div id="v-rail" style="display:flex;flex-direction:column;gap:1.2vmin">${railRowsHTML(vD)}</div></div>
    </div>`, `Lot ${vD.lotNum} of ${vD.lotTotal}`);
}

function renderViewerSold() {
    const s = vD.soldInfo || {};
    const inner = s.passed
        ? `<div class="gavel">🪶</div>
           <div class="who">PASSED</div>
           <div class="sub2">Not one bid for ${esc(s.lot ? s.lot.name : '')}. The auctioneer is hurt.</div>`
        : `<div class="gavel">🔨</div>
           <div class="who">SOLD to <span style="color:${s.color}">${esc(s.winner)}</span> for ${s.price}!</div>
           <div class="sub2">${esc(s.lot ? s.lot.emoji + ' ' + s.lot.name : '')} — worth… well, we'll find out.</div>`;
    return tvShell(`<div class="tv-sold">${inner}</div>`, `Lot ${vD.lotNum} of ${vD.lotTotal}`);
}

function netWorthRows(msg) {
    const revealedByPlayer = {};
    (msg.reveals || []).forEach((r, i) => {
        if (i <= msg.revealIndex) revealedByPlayer[r.player] = (revealedByPlayer[r.player] || 0) + r.value;
    });
    return (msg.players || [])
        .map(p => ({ ...p, net: p.coins + (revealedByPlayer[p.name] || 0) }))
        .sort((a, b) => b.net - a.net)
        .map(p => `
        <div class="rail-row">
            <span class="pdot" style="background:${p.color};color:${p.color}"></span>
            <span class="rname">${esc(p.name)}</span>
            <span class="rcoins">${p.net}</span>
        </div>`).join('');
}

function renderViewerValuation() {
    const shown = (vD.reveals || []).slice(0, Math.max(0, vD.revealIndex + 1)).slice(-6);
    const cards = shown.map((r, i) => `
    <div class="val-card" ${i === shown.length - 1 ? '' : 'style="animation:none;opacity:.65"'}>
        <div class="vemoji">${r.emoji}</div>
        <div>
            <div class="vname">${esc(r.lotName)}</div>
            <div class="vpaid"><span style="color:${r.color}">${esc(r.player)}</span> paid ${r.paid}</div>
        </div>
        <div class="vworth">worth ${r.value}
            <span class="profit ${r.profit >= 0 ? 'plus' : 'minus'}">${r.profit >= 0 ? '+' : ''}${r.profit}</span>
        </div>
    </div>`).join('');
    return tvShell(`
    <div class="tv-main">
        <div class="tv-stage">
            <div class="tv-val">
                <div class="rail-title">🧐 The Valuation — what was it all actually worth?</div>
                <div class="val-list">${cards || '<div class="tv-waiting">Fetching the valuer\'s monocle…</div>'}</div>
            </div>
        </div>
        <div class="tv-rail"><div class="rail-title">Net worth (so far)</div>${netWorthRows(vD)}</div>
    </div>`, 'The Valuation');
}

function renderViewerPodium() {
    const st = vD.standings || [];
    const podOrder = [st[1], st[0], st[2]].filter(Boolean);
    const cls = st.length >= 3 ? ['p2', 'p1', 'p3'] : (st.length === 2 ? ['p2', 'p1'] : ['p1']);
    const medal = { p1: '🥇', p2: '🥈', p3: '🥉' };
    const pods = podOrder.map((p, i) => `
        <div class="pod ${cls[i]}" style="animation-delay:${i * 0.18}s">
            <div class="pname"><span class="pdot" style="background:${p.color};color:${p.color};display:inline-block;vertical-align:middle;margin-right:.6vmin"></span>${esc(p.name)}</div>
            <div class="pscore">${p.net} net</div>
            <div class="block">${medal[cls[i]]}</div>
        </div>`).join('');
    const awards = (vD.awards || []).map((a, i) =>
        `<div class="award" style="--i:${i}">${a.emoji} <span class="aw-t">${esc(a.title)}</span><br>${esc(a.name)} — ${esc(a.detail)}</div>`).join('');
    const hint = vD.tvHost ? `👑 ${esc(vD.captain || 'Captain')}: “Play again” is on your phone` : 'Host: “Play again” is on your phone';
    return tvShell(`
    <div class="tv-main" style="flex-direction:column">
        <div class="podium-wrap">${pods}</div>
        <div class="awards-row">${awards}</div>
        <div class="tv-waiting" style="text-align:center;padding-bottom:1.5vmin">${hint}</div>
    </div>`, '🏆 Auction closed');
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
window.addEventListener('resize', () => {
    const cv = $id('confetti-cv');
    if (cv && _cf.running) { cv.width = innerWidth; cv.height = innerHeight; }
});

(function boot() {
    const params = new URLSearchParams(location.search);
    const room = (params.get('room') || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    if (room) fCode = room;
    if (!musicOn) $id('tog-music').classList.add('off');
    if (!sfxOn) $id('tog-sfx').classList.add('off');
    render();
})();
</script>
</body>
</html>
